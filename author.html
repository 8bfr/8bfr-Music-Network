<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Authors — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--dark:#0b0014;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:rgba(15,0,30,.9);border-bottom:2px solid var(--primary);padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.8rem;color:var(--primary);}
.header a{color:var(--text);text-decoration:none;font-weight:600;}
.container{max-width:900px;margin:0 auto;padding:1.5rem;}
.search-bar{margin-bottom:1.25rem;}
.search-bar input{width:100%;padding:.6rem 1rem;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;}
.search-bar input:focus{outline:none;border-color:var(--primary);}
.author-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;}
.author-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;text-align:center;transition:all .3s;cursor:pointer;text-decoration:none;color:var(--text);}
.author-card:hover{transform:translateY(-3px);border-color:var(--primary);box-shadow:0 6px 20px rgba(124,58,237,.25);}
.ac-avatar{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto .6rem;overflow:hidden;border:3px solid rgba(124,58,237,.4);}
.ac-avatar img{width:100%;height:100%;object-fit:cover;}
.ac-name{font-weight:700;font-size:.95rem;margin-bottom:.15rem;}
.ac-role{font-size:.72rem;color:var(--dim);margin-bottom:.4rem;}
.ac-bio{font-size:.75rem;color:rgba(234,230,255,.5);line-height:1.4;max-height:3.6em;overflow:hidden;}
.ac-stats{display:flex;justify-content:center;gap:.75rem;font-size:.68rem;color:var(--dim);margin-top:.5rem;}
.info-box{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.25);border-radius:10px;padding:.75rem 1rem;font-size:.85rem;color:var(--dim);line-height:1.6;margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem;}
.empty{text-align:center;padding:3rem;color:var(--dim);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="header"><a href="feed.html">← Back</a><h1>📝 Authors</h1><a href="author-hub.html" style="font-size:.82rem;">🛠️ Hub</a></div>
<div class="container">
<div class="info-box"><span style="font-size:1.5rem;">📖</span><span>Authors, bloggers, and writers on 8BFR. Need writing tools? Visit the <a href="author-hub.html" style="color:var(--primary);font-weight:600;">Author Hub →</a></span></div>
<div class="search-bar"><input type="text" id="search" placeholder="🔍 Search authors..." oninput="filterAuthors(this.value)"></div>
<div id="authorList"><div class="spinner"></div></div>
</div>
<div style="text-align:center;padding:1rem 0;font-size:.72rem;color:rgba(168,85,247,.3);">Copyright 2025-2026 8BFR Music Network</div>
<script src="scripts.js" defer></script>
<script>
const db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
let allAuthors=[];
async function init(){
  var OWNER_ID='cb556180-f032-4b21-9470-1d786f2664ab';
  var{data}=await db.from('profiles').select('*').order('algorithm_points',{ascending:false}).limit(200);
  var writingRoles=['author','blogger','journalist','educator','podcaster','songwriter','owner','co-owner'];
  allAuthors=(data||[]).filter(function(p){
    var b=p.badges||[];
    return p.user_id===OWNER_ID||writingRoles.indexOf(p.role)!==-1||b.some(function(x){return writingRoles.indexOf(x)!==-1;});
  });
  render(allAuthors);
}
function render(authors){
  var el=document.getElementById('authorList');
  if(!authors.length){el.innerHTML='<div class="empty"><div style="font-size:2.5rem;margin-bottom:.5rem;">📝</div>No authors yet. Sign up with the Author role to appear here!</div>';return;}
  el.innerHTML='<div class="author-grid">'+authors.map(function(a){
    var av=a.avatar_url?'<img src="'+esc(a.avatar_url)+'" onerror="this.parentNode.textContent=\'📝\'">':'📝';
    var bio=(a.bio||'').substring(0,80);
    return '<a href="profile.html?id='+a.user_id+'" class="author-card"><div class="ac-avatar">'+av+'</div><div class="ac-name">'+esc(a.display_name||a.username||'Unknown')+(a.verified_artist?' <span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);vertical-align:middle;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>':'')+'</div><div class="ac-role">'+esc(a.role||'author')+'</div>'+(bio?'<div class="ac-bio">'+esc(bio)+'</div>':'')+'<div class="ac-stats"><span>📊 '+(a.algorithm_points||0)+' pts</span></div></a>';
  }).join('')+'</div>';
}
function filterAuthors(q){var l=q.toLowerCase();render(allAuthors.filter(function(a){return(a.display_name||'').toLowerCase().includes(l)||(a.username||'').toLowerCase().includes(l);}));}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
</body></html>
