<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Singles — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--dark:#0b0014;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:rgba(15,0,30,.9);border-bottom:2px solid var(--primary);padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.8rem;color:var(--primary);}
.header a{color:var(--text);text-decoration:none;font-weight:600;}
.container{max-width:800px;margin:0 auto;padding:1.5rem;}
.search-bar{margin-bottom:1.25rem;}
.search-bar input{width:100%;padding:.6rem 1rem;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;}
.search-bar input:focus{outline:none;border-color:var(--primary);}
.song-row{display:flex;align-items:center;gap:.75rem;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;margin-bottom:.5rem;transition:border-color .2s;}
.song-row:hover{border-color:var(--primary);}
.song-cover{width:50px;height:50px;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;overflow:hidden;}
.song-cover img{width:100%;height:100%;object-fit:cover;}
.song-info{flex:1;min-width:0;}
.song-title{font-weight:700;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.song-meta{font-size:.75rem;color:var(--dim);margin-top:.1rem;}
.price{color:#4ade80;font-weight:700;font-size:.82rem;flex-shrink:0;}
audio{width:100%;height:32px;margin-top:.4rem;}
.empty{text-align:center;padding:3rem;color:var(--dim);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="header"><a href="feed.html">← Back</a><h1>💿 Singles</h1><div></div></div>
<div class="container">
<div class="search-bar"><input type="text" id="search" placeholder="🔍 Search singles..." oninput="filterSongs(this.value)"></div>
<div id="songList"><div class="spinner"></div></div>
</div>
<script src="scripts.js" defer></script>
<script>
const db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
let allSongs=[];
async function init(){
  const{data}=await db.from('songs').select('*').or('type.eq.single,type.is.null').order('created_at',{ascending:false}).limit(100);
  allSongs=data||[];render(allSongs);
}
function render(songs){
  const el=document.getElementById('songList');
  if(!songs.length){el.innerHTML='<div class="empty"><div style="font-size:2.5rem;margin-bottom:.5rem;">💿</div>No singles yet.</div>';return;}
  el.innerHTML=songs.map(s=>{
    const cv=s.cover_art?'<img src="'+esc(s.cover_art)+'">':'🎵';
    const pr=parseFloat(s.price)||0;
    return '<div class="song-row"><div class="song-cover">'+cv+'</div><div class="song-info"><div class="song-title">'+esc(s.title||'Untitled')+(s.explicit?' 🔞':'')+'</div><div class="song-meta">'+esc(s.artist||'Unknown')+'</div>'+(s.song_url?'<audio controls preload="none" src="'+s.song_url+'"></audio>':'')+'</div>'+(pr>0?'<div class="price">$'+pr.toFixed(2)+'</div>':'')+'</div>';
  }).join('');
}
function filterSongs(q){const l=q.toLowerCase();render(allSongs.filter(s=>(s.title||'').toLowerCase().includes(l)||(s.artist||'').toLowerCase().includes(l)));}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
</body></html>
