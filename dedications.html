<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedications - 8BFR Music Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #7c3aed; --dark: #0b0014; --dark-card: #0c0618; --text: #eae6ff; --text-dim: #a855f7; --border: rgba(124,58,237,.35); --pink: #ec4899; --red: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Work Sans', sans-serif; background: linear-gradient(#0b0014, #0a0010, #000); color: var(--text); min-height: 100vh; padding-bottom: 80px; overflow-x: hidden; }
        .header { background: rgba(15,0,30,.9); border-bottom: 2px solid var(--pink); padding: 1.25rem 1.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
        .header h1 { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; background: linear-gradient(135deg, var(--pink), #f472b6, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .container { max-width: 800px; margin: 0 auto; padding: 1.5rem; position: relative; z-index: 1; }
        .card { background: var(--dark-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }

        /* Falling Hearts */
        .hearts-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .heart { position: absolute; top: -50px; font-size: 1.5rem; opacity: 0; animation: heartFall linear forwards; }
        @keyframes heartFall {
            0% { opacity: 0; transform: translateY(0) rotate(0deg) scale(0.5); }
            10% { opacity: 0.8; }
            90% { opacity: 0.6; }
            100% { opacity: 0; transform: translateY(105vh) rotate(360deg) scale(1); }
        }

        /* Hero */
        .hero { text-align: center; padding: 2rem 1rem; margin-bottom: 1.5rem; }
        .hero-icon { font-size: 4rem; margin-bottom: 0.5rem; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .hero h2 { font-family: 'Bebas Neue', cursive; font-size: 2.2rem; background: linear-gradient(135deg, var(--pink), #f9a8d4, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; }
        .hero p { color: var(--text-dim); font-size: 0.95rem; max-width: 500px; margin: 0 auto; line-height: 1.6; }

        /* Dedication Form */
        .form-card { border-color: rgba(236,72,153,0.3); background: rgba(236,72,153,0.04); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.82rem; color: var(--pink); margin-bottom: 0.35rem; font-weight: 600; }
        input[type="text"], textarea, select { width: 100%; padding: 0.75rem; background: var(--dark); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.92rem; }
        textarea { min-height: 80px; resize: vertical; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--pink); }
        select { appearance: auto; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .btn { background: linear-gradient(135deg, var(--pink), var(--primary)); color: white; border: none; padding: 0.8rem 2rem; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 1rem; transition: all 0.3s; width: 100%; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(236,72,153,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; vertical-align: middle; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Dedication Cards */
        .dedication { background: var(--dark); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; transition: all 0.3s; position: relative; overflow: hidden; }
        .dedication::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--pink), var(--primary), var(--pink)); }
        .dedication:hover { border-color: rgba(236,72,153,0.4); }
        .ded-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; gap: 0.5rem; }
        .ded-from { font-weight: 700; color: var(--pink); font-size: 0.95rem; }
        .ded-to { font-weight: 700; color: var(--text); font-size: 0.95rem; }
        .ded-arrow { color: var(--text-dim); font-size: 0.8rem; }
        .ded-time { font-size: 0.72rem; color: rgba(168,85,247,0.5); white-space: nowrap; }
        .ded-song { display: flex; align-items: center; gap: 0.75rem; background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.15); border-radius: 8px; padding: 0.6rem 0.75rem; margin-bottom: 0.75rem; }
        .ded-song .note { font-size: 1.3rem; }
        .ded-song-info { flex: 1; min-width: 0; }
        .ded-song-title { font-weight: 600; font-size: 0.88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ded-song-artist { font-size: 0.78rem; color: var(--text-dim); }
        .ded-message { font-size: 0.9rem; line-height: 1.6; color: rgba(234,230,255,0.85); font-style: italic; padding-left: 0.75rem; border-left: 2px solid rgba(236,72,153,0.3); }
        .ded-react { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
        .react-btn { background: rgba(124,58,237,0.1); border: 1px solid var(--border); color: var(--text-dim); padding: 0.3rem 0.6rem; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .react-btn:hover { border-color: var(--pink); color: var(--pink); }
        .react-btn.liked { background: rgba(236,72,153,0.2); border-color: var(--pink); color: var(--pink); }
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-dim); }
        .empty-state .emoji { font-size: 3rem; margin-bottom: 1rem; }

        .tab-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--dark); color: var(--text-dim); cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
        .tab-btn:hover { border-color: var(--pink); }
        .tab-btn.active { background: linear-gradient(135deg, var(--pink), var(--primary)); color: white; border-color: transparent; }
        .song-picker { position: relative; }
        .song-search { width: 100%; padding: 0.75rem; background: var(--dark); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.92rem; }
        .song-search:focus { outline: none; border-color: var(--pink); }
        .song-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--dark-card); border: 1px solid var(--border); border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto; z-index: 50; display: none; }
        .song-result { padding: 0.6rem 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 0.6rem; border-bottom: 1px solid rgba(124,58,237,0.1); transition: background 0.15s; }
        .song-result:hover { background: rgba(124,58,237,0.1); }
        .song-result:last-child { border: none; }
        .sr-cover { width: 32px; height: 32px; border-radius: 4px; background: rgba(124,58,237,0.15); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; overflow: hidden; flex-shrink: 0; }
        .sr-cover img { width: 100%; height: 100%; object-fit: cover; }
        .sr-info { flex: 1; min-width: 0; }
        .sr-title { font-weight: 600; font-size: 0.82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sr-artist { font-size: 0.72rem; color: var(--text-dim); }
        .selected-song { display: none; background: rgba(236,72,153,0.08); border: 1px solid rgba(236,72,153,0.25); border-radius: 8px; padding: 0.6rem 0.75rem; margin-top: 0.5rem; }
        .selected-song .clear-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 0.8rem; font-weight: 600; margin-left: 0.5rem; }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .container { padding: 1rem; }
            .hero h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="hearts-container" id="heartsContainer"></div>

    <div class="header">
        <h1>💕 Dedications</h1>
        <a href="feed.html">← Back</a>
    </div>
    <div class="container">

        <!-- HERO -->
        <div class="hero">
            <div class="hero-icon">💝</div>
            <h2>Dedicate a Song to Someone Special</h2>
            <p>Share the music that reminds you of someone — friends, family, your partner, or anyone who matters. Let them know they're on your mind.</p>
        </div>

        <!-- CREATE DEDICATION -->
        <div class="card form-card">
            <h2 style="font-family:'Bebas Neue',cursive;font-size:1.4rem;color:var(--pink);margin-bottom:1rem;">💌 New Dedication</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>To (name or @username)</label>
                    <input type="text" id="dedTo" placeholder="e.g. @jazzy or Mom">
                </div>
                <div class="form-group">
                    <label>Occasion (optional)</label>
                    <select id="dedOccasion">
                        <option value="">Just Because 💜</option>
                        <option value="birthday">🎂 Birthday</option>
                        <option value="anniversary">💍 Anniversary</option>
                        <option value="love">❤️ Love</option>
                        <option value="friendship">🤝 Friendship</option>
                        <option value="memorial">🕊️ In Memory</option>
                        <option value="congrats">🎉 Congratulations</option>
                        <option value="thankyou">🙏 Thank You</option>
                        <option value="getwell">💪 Get Well</option>
                        <option value="apology">💐 I'm Sorry</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Pick a Song (search 8BFR library or type manually)</label>
                <div class="song-picker">
                    <input type="text" class="song-search" id="songSearchInput" placeholder="Search songs by title or artist..." oninput="searchSongsForDed()" autocomplete="off">
                    <div class="song-results" id="songResults"></div>
                </div>
                <div class="selected-song" id="selectedSong">
                    <span id="selectedSongText"></span>
                    <button class="clear-btn" onclick="clearSelectedSong()">X Clear</button>
                </div>
                <input type="hidden" id="dedSong">
                <input type="hidden" id="dedArtist">
            </div>
            <div class="form-row" id="manualSongFields" style="display:none;">
                <div class="form-group">
                    <label>Song Title (manual)</label>
                    <input type="text" id="dedSongManual" placeholder="e.g. Best Part">
                </div>
                <div class="form-group">
                    <label>Artist (manual)</label>
                    <input type="text" id="dedArtistManual" placeholder="e.g. Daniel Caesar ft. H.E.R.">
                </div>
            </div>
            <div style="margin-bottom:0.75rem;">
                <button type="button" onclick="toggleManualSong()" style="background:none;border:none;color:var(--text-dim);font-size:0.78rem;cursor:pointer;text-decoration:underline;">Can't find it? Type song manually</button>
            </div>
            <div class="form-group">
                <label>Your Message</label>
                <textarea id="dedMessage" placeholder="Write something from the heart..."></textarea>
            </div>
            <div class="form-group">
                <label>Visibility</label>
                <select id="dedVisibility">
                    <option value="public">🌎 Public — everyone can see</option>
                    <option value="private">🔒 Private — only the recipient sees</option>
                </select>
            </div>
            <button class="btn" id="postBtn" onclick="postDedication()">💝 Send Dedication</button>
        </div>

        <!-- FEED TABS -->
        <div class="tab-bar" style="overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;">
            <button class="tab-btn active" onclick="switchTab('all', this)">All</button>
            <button class="tab-btn" onclick="switchTab('love', this)">Love</button>
            <button class="tab-btn" onclick="switchTab('birthday', this)">Birthday</button>
            <button class="tab-btn" onclick="switchTab('anniversary', this)">Anniversary</button>
            <button class="tab-btn" onclick="switchTab('friendship', this)">Friendship</button>
            <button class="tab-btn" onclick="switchTab('memorial', this)">Memorial</button>
            <button class="tab-btn" onclick="switchTab('congrats', this)">Congrats</button>
            <button class="tab-btn" onclick="switchTab('thankyou', this)">Thank You</button>
            <button class="tab-btn" onclick="switchTab('getwell', this)">Get Well</button>
            <button class="tab-btn" onclick="switchTab('apology', this)">Apology</button>
            <button class="tab-btn" onclick="switchTab('mine', this)">For Me</button>
        </div>

        <!-- DEDICATIONS FEED -->
        <div id="dedFeed">
            <div class="empty-state"><div class="emoji">💝</div><p>Loading dedications...</p></div>
        </div>
    </div>

    <script src="scripts.js" defer></script>
    <script>
    const SUPABASE_URL = 'https://novbuvwpjnxwwvdekjhr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentProfile = null;
    let currentTab = 'all';

    /* ═══ FALLING HEARTS ═══ */
    function spawnHeart() {
        const container = document.getElementById('heartsContainer');
        const heart = document.createElement('div');
        heart.className = 'heart';
        const hearts = ['❤️','💜','💗','💕','💖','🩷','🤍','💝'];
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';
        heart.style.animationDuration = (4 + Math.random() * 6) + 's';
        heart.style.animationDelay = Math.random() * 2 + 's';
        container.appendChild(heart);
        setTimeout(() => heart.remove(), 12000);
    }
    /* Spawn hearts continuously */
    setInterval(spawnHeart, 600);
    for (let i = 0; i < 8; i++) setTimeout(spawnHeart, i * 200);

    /* ═══ INIT ═══ */
    async function init() {
        try {
            const { data: { session } } = await db.auth.getSession();
            if (!session) { location.href = 'login.html?return=dedications.html'; return; }
            currentUser = session.user;
            const { data: profile } = await db.from('profiles').select('*').eq('user_id', session.user.id).single();
            currentProfile = profile;
            await loadDedications();
        } catch (e) { console.error('Init:', e); }
    }

    /* ═══ SONG PICKER ═══ */
    let songSearchTimer = null;
    let selectedSongData = null;

    function searchSongsForDed() {
        clearTimeout(songSearchTimer);
        songSearchTimer = setTimeout(async function() {
            const q = document.getElementById('songSearchInput').value.trim();
            const results = document.getElementById('songResults');
            if (!q || q.length < 2) { results.style.display = 'none'; return; }
            results.style.display = 'block';
            results.innerHTML = '<div style="padding:0.5rem;color:var(--text-dim);font-size:0.82rem;">Searching...</div>';
            try {
                const { data, error } = await db.from('songs').select('id,title,artist,cover_art')
                    .or('title.ilike.%' + q + '%,artist.ilike.%' + q + '%')
                    .not('song_url', 'is', null)
                    .order('play_count', { ascending: false, nullsFirst: false })
                    .limit(10);
                if (error) throw error;
                if (!data || !data.length) {
                    results.innerHTML = '<div style="padding:0.5rem;color:var(--text-dim);font-size:0.82rem;">No songs found. Use manual entry below.</div>';
                    return;
                }
                results.innerHTML = data.map(function(s) {
                    const cover = s.cover_art ? '<img src="' + s.cover_art + '" onerror="this.parentNode.innerHTML=\'&#127925;\'">' : '&#127925;';
                    return '<div class="song-result" onclick="pickSong(\'' + escHtml(s.title || '').replace(/'/g, '') + '\',\'' + escHtml(s.artist || '').replace(/'/g, '') + '\',\'' + (s.cover_art || '').replace(/'/g, '') + '\')">' +
                        '<div class="sr-cover">' + cover + '</div>' +
                        '<div class="sr-info"><div class="sr-title">' + escHtml(s.title) + '</div>' +
                        '<div class="sr-artist">' + escHtml(s.artist || 'Unknown') + '</div></div></div>';
                }).join('');
            } catch(e) {
                results.innerHTML = '<div style="padding:0.5rem;color:var(--red);font-size:0.82rem;">Error: ' + e.message + '</div>';
            }
        }, 300);
    }

    function pickSong(title, artist, cover) {
        document.getElementById('dedSong').value = title;
        document.getElementById('dedArtist').value = artist;
        document.getElementById('songSearchInput').value = '';
        document.getElementById('songResults').style.display = 'none';
        const sel = document.getElementById('selectedSong');
        document.getElementById('selectedSongText').textContent = '"' + title + '" by ' + (artist || 'Unknown');
        sel.style.display = 'flex';
        sel.style.alignItems = 'center';
        sel.style.justifyContent = 'space-between';
        selectedSongData = { title: title, artist: artist };
        document.getElementById('manualSongFields').style.display = 'none';
    }

    function clearSelectedSong() {
        document.getElementById('dedSong').value = '';
        document.getElementById('dedArtist').value = '';
        document.getElementById('selectedSong').style.display = 'none';
        selectedSongData = null;
    }

    function toggleManualSong() {
        const el = document.getElementById('manualSongFields');
        el.style.display = el.style.display === 'none' ? 'grid' : 'none';
        if (el.style.display !== 'none') clearSelectedSong();
    }

    // Close song results when clicking outside
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.song-picker')) {
            document.getElementById('songResults').style.display = 'none';
        }
    });

    /* ═══ POST DEDICATION ═══ */
    async function postDedication() {
        const to = document.getElementById('dedTo').value.trim();
        let song = document.getElementById('dedSong').value.trim();
        let artist = document.getElementById('dedArtist').value.trim();
        // Check manual fields if picker wasn't used
        if (!song) {
            song = (document.getElementById('dedSongManual') || {}).value || '';
            song = song.trim();
        }
        if (!artist) {
            artist = (document.getElementById('dedArtistManual') || {}).value || '';
            artist = artist.trim();
        }
        const message = document.getElementById('dedMessage').value.trim();
        const occasion = document.getElementById('dedOccasion').value;
        const visibility = document.getElementById('dedVisibility').value;

        if (!to) { alert('Enter who this dedication is for.'); return; }
        if (!song) { alert('Enter a song title.'); return; }

        const btn = document.getElementById('postBtn');
        btn.disabled = true; btn.textContent = 'Sending...';

        try {
            const { error } = await db.from('dedications').insert({
                user_id: currentUser.id,
                from_name: currentProfile?.display_name || currentProfile?.username || 'Anonymous',
                from_username: currentProfile?.username || '',
                to_name: to,
                song_title: song,
                song_artist: artist,
                message: message,
                occasion: occasion || null,
                visibility: visibility,
                hearts: 0
            });

            if (error) {
                /* Table might not exist — create it */
                if (error.message.includes('does not exist') || error.code === '42P01') {
                    alert('Dedications table needs to be created in Supabase first. Run the SQL setup. For now, saving locally.');
                    saveDedicationLocally({ to, song, artist, message, occasion, visibility });
                } else {
                    throw error;
                }
            }

            /* Clear form */
            document.getElementById('dedTo').value = '';
            document.getElementById('dedSong').value = '';
            document.getElementById('dedArtist').value = '';
            document.getElementById('dedMessage').value = '';
            document.getElementById('dedOccasion').value = '';
            document.getElementById('songSearchInput').value = '';
            if (document.getElementById('dedSongManual')) document.getElementById('dedSongManual').value = '';
            if (document.getElementById('dedArtistManual')) document.getElementById('dedArtistManual').value = '';
            clearSelectedSong();
            document.getElementById('manualSongFields').style.display = 'none';

            /* Burst hearts on send */
            for (let i = 0; i < 20; i++) setTimeout(spawnHeart, i * 80);

            await loadDedications();
        } catch (err) {
            console.error('Post error:', err);
            alert('Failed to post. Saving locally.');
            saveDedicationLocally({ to, song: document.getElementById('dedSong').value, artist: document.getElementById('dedArtist').value, message, occasion, visibility });
        } finally {
            btn.disabled = false; btn.textContent = '💝 Send Dedication';
        }
    }

    function saveDedicationLocally(data) {
        let local = JSON.parse(localStorage.getItem('8bfr_dedications') || '[]');
        local.unshift({
            id: 'local_' + Date.now(),
            from_name: currentProfile?.display_name || 'You',
            from_username: currentProfile?.username || '',
            to_name: data.to,
            song_title: data.song,
            song_artist: data.artist,
            message: data.message,
            occasion: data.occasion,
            visibility: data.visibility,
            hearts: 0,
            created_at: new Date().toISOString()
        });
        localStorage.setItem('8bfr_dedications', JSON.stringify(local));
        loadDedications();
    }

    /* ═══ LOAD DEDICATIONS ═══ */
    async function loadDedications() {
        const feed = document.getElementById('dedFeed');
        let dedications = [];

        /* Try Supabase first */
        try {
            let query = db.from('dedications').select('*').eq('visibility', 'public').order('created_at', { ascending: false }).limit(50);

            if (currentTab === 'mine') {
                query = db.from('dedications').select('*')
                    .or(`to_name.ilike.%${currentProfile?.username || ''}%,to_name.ilike.%${currentProfile?.display_name || ''}%`)
                    .order('created_at', { ascending: false }).limit(50);
            } else if (currentTab !== 'all') {
                query = db.from('dedications').select('*').eq('visibility', 'public').eq('occasion', currentTab).order('created_at', { ascending: false }).limit(50);
            }

            const { data, error } = await query;
            if (!error && data) dedications = data;
        } catch(e) { /* table may not exist */ }

        /* Merge local dedications */
        const local = JSON.parse(localStorage.getItem('8bfr_dedications') || '[]');
        if (local.length) {
            dedications = [...local, ...dedications];
            dedications.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        }

        /* Filter for tab */
        if (currentTab === 'mine' && !dedications.length) {
            /* If no results from Supabase, show local matches */
        } else if (currentTab !== 'all' && currentTab !== 'mine') {
            dedications = dedications.filter(d => d.occasion === currentTab);
        }

        if (!dedications.length) {
            feed.innerHTML = `<div class="empty-state"><div class="emoji">💝</div><p>No dedications yet. Be the first to send one!</p></div>`;
            return;
        }

        const occasionEmoji = { birthday: '🎂', anniversary: '💍', love: '❤️', friendship: '🤝', memorial: '🕊️', congrats: '🎉', thankyou: '🙏', getwell: '💪', apology: '💐' };

        feed.innerHTML = dedications.map(d => {
            const timeAgo = getTimeAgo(d.created_at);
            const occ = d.occasion ? `<span style="margin-left:0.5rem;font-size:0.75rem;background:rgba(236,72,153,0.12);padding:0.15rem 0.5rem;border-radius:12px;color:var(--pink);">${occasionEmoji[d.occasion] || '💜'} ${d.occasion}</span>` : '';
            return `
            <div class="dedication">
                <div class="ded-header">
                    <div>
                        <span class="ded-from">💜 ${escHtml(d.from_name)}</span>
                        <span class="ded-arrow"> → </span>
                        <span class="ded-to">${escHtml(d.to_name)}</span>
                        ${occ}
                    </div>
                    <span class="ded-time">${timeAgo}</span>
                </div>
                <div class="ded-song">
                    <span class="note">🎵</span>
                    <div class="ded-song-info">
                        <div class="ded-song-title">${escHtml(d.song_title)}</div>
                        ${d.song_artist ? '<div class="ded-song-artist">' + escHtml(d.song_artist) + '</div>' : ''}
                    </div>
                </div>
                ${d.message ? '<div class="ded-message">"' + escHtml(d.message) + '"</div>' : ''}
                <div class="ded-react">
                    <button class="react-btn" onclick="reactDedication('${d.id}',this)">❤️ ${d.hearts || 0}</button>
                    <button class="react-btn" onclick="shareDedication('${escHtml(d.from_name)}','${escHtml(d.to_name)}','${escHtml(d.song_title)}')">🔗 Share</button>
                </div>
            </div>`;
        }).join('');
    }

    function switchTab(tab, btn) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadDedications();
    }

    async function reactDedication(id, btn) {
        if (btn.classList.contains('liked')) return;
        btn.classList.add('liked');
        const current = parseInt(btn.textContent.replace(/[^\d]/g, '')) || 0;
        btn.textContent = '❤️ ' + (current + 1);
        /* Burst hearts */
        for (let i = 0; i < 5; i++) setTimeout(spawnHeart, i * 100);
        /* Update in DB */
        try {
            if (!id.startsWith('local_')) {
                await db.from('dedications').update({ hearts: current + 1 }).eq('id', id);
            }
        } catch(e) { /* ok */ }
    }

    function shareDedication(from, to, song) {
        const text = `💝 ${from} dedicated "${song}" to ${to} on 8BFR Music Network! #8BFR #MusicDedication`;
        if (navigator.share) {
            navigator.share({ title: 'Song Dedication', text: text, url: window.location.href });
        } else {
            navigator.clipboard.writeText(text).then(() => alert('✅ Copied share text!'));
        }
    }

    function getTimeAgo(dateStr) {
        const diff = Date.now() - new Date(dateStr).getTime();
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return 'just now';
        if (mins < 60) return mins + 'm ago';
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return hrs + 'h ago';
        const days = Math.floor(hrs / 24);
        if (days < 7) return days + 'd ago';
        return new Date(dateStr).toLocaleDateString();
    }

    function escHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
    </script>

    
</body>
</html>
