<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dedications — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);--pink:#ec4899;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#1a0022,#000);color:var(--text);min-height:100vh;padding-bottom:2rem;overflow-x:hidden;}
.header{background:rgba(15,0,30,.95);border-bottom:2px solid rgba(236,72,153,.5);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:#f472b6;}
.container{max-width:700px;margin:0 auto;padding:1.5rem;position:relative;z-index:1;}
.create-btn{display:block;width:100%;padding:.85rem;background:linear-gradient(135deg,#ec4899,#a855f7);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:1rem;cursor:pointer;margin-bottom:1.5rem;transition:all .2s;}
.create-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(236,72,153,.3);}
.ded-card{background:var(--card);border:1px solid rgba(236,72,153,.25);border-radius:16px;padding:1.25rem;margin-bottom:1rem;position:relative;overflow:hidden;}
.ded-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ec4899,#a855f7);}
.ded-to{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:#f472b6;margin-bottom:.3rem;}
.ded-from{font-size:.78rem;color:var(--dim);margin-bottom:.75rem;}
.ded-msg{font-size:.92rem;line-height:1.7;color:rgba(234,230,255,.8);font-style:italic;margin-bottom:.75rem;}
.ded-media{border-radius:10px;overflow:hidden;margin-bottom:.75rem;max-height:300px;}
.ded-media img{width:100%;max-height:300px;object-fit:cover;}
.ded-song{display:flex;align-items:center;gap:.5rem;background:rgba(236,72,153,.06);border:1px solid rgba(236,72,153,.2);border-radius:10px;padding:.5rem .75rem;font-size:.82rem;}
.ded-song a{color:#f472b6;text-decoration:none;font-weight:600;}
.ded-time{font-size:.68rem;color:rgba(168,85,247,.4);margin-top:.5rem;}
/* Form */
.form-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;display:none;}
.form-card.open{display:block;}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;font-size:.82rem;font-weight:600;color:var(--dim);margin-bottom:.3rem;}
.form-input{width:100%;padding:.6rem .85rem;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;outline:none;box-sizing:border-box;}
.form-input:focus{border-color:var(--pink);}
textarea.form-input{min-height:100px;font-family:inherit;resize:vertical;}
.btn{background:linear-gradient(135deg,#ec4899,#a855f7);color:#fff;border:none;padding:.65rem 1.5rem;border-radius:10px;cursor:pointer;font-weight:700;font-size:.9rem;}
.btn-ghost{background:rgba(124,58,237,.12);border:1px solid var(--border);color:var(--dim);padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.85rem;}
.empty{text-align:center;padding:3rem;color:rgba(244,114,182,.5);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:#f472b6;border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.heart{position:fixed;z-index:0;pointer-events:none;font-size:1.2rem;opacity:0;animation:fall linear forwards;}
@keyframes fall{0%{opacity:.7;transform:translateY(-20px) rotate(0deg);}100%{opacity:0;transform:translateY(100vh) rotate(360deg);}}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" style="color:var(--dim);text-decoration:none;font-weight:600;">← Home</a>
  <h1>💌 Dedications</h1>
  <span></span>
</div>
<div class="container">
  <button class="create-btn" onclick="toggleForm()">💌 Create a Dedication</button>

  <div class="form-card" id="dedForm">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <h3 style="font-size:1rem;font-weight:700;color:#f472b6;">Create Dedication</h3>
      <button class="btn-ghost" onclick="toggleForm()">✕</button>
    </div>
    <div class="form-group"><label>Dedicated To *</label><input class="form-input" id="dedTo" placeholder="Mom, Dad, a friend, an artist..."></div>
    <div class="form-group"><label>Your Message *</label><textarea class="form-input" id="dedMsg" placeholder="Write your heartfelt message..."></textarea></div>
    <div class="form-group"><label>Photo URL (optional)</label><input class="form-input" id="dedPhoto" placeholder="https://..."></div>
    <div class="form-group"><label>Song Link (optional)</label><input class="form-input" id="dedSong" placeholder="Spotify, YouTube, or 8BFR song link"></div>
    <button class="btn" onclick="submitDed()">💌 Post Dedication</button>
    <span id="dedNotice" style="margin-left:.75rem;font-size:.82rem;"></span>
  </div>

  <div id="dedList"><div class="spinner"></div></div>
</div>
<script src="scripts.js" defer></script>
<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
var currentUser=null;

async function init(){
  try{var s=await db.auth.getSession();if(s.data.session)currentUser=s.data.session.user;}catch(e){}
  loadDedications();
}

window.toggleForm=function(){document.getElementById('dedForm').classList.toggle('open');};

window.submitDed=async function(){
  if(!currentUser){alert('Sign in first');return;}
  var to=document.getElementById('dedTo').value.trim();
  var msg=document.getElementById('dedMsg').value.trim();
  var photo=document.getElementById('dedPhoto').value.trim();
  var song=document.getElementById('dedSong').value.trim();
  var notice=document.getElementById('dedNotice');
  if(!to||!msg){notice.textContent='Fill in the required fields';notice.style.color='#ef4444';return;}
  try{
    var r=await db.from('dedications').insert({user_id:currentUser.id,dedicated_to:to,message:msg,photo_url:photo||null,song_url:song||null});
    if(r.error)throw r.error;
    notice.textContent='Posted!';notice.style.color='#4ade80';
    document.getElementById('dedTo').value='';document.getElementById('dedMsg').value='';document.getElementById('dedPhoto').value='';document.getElementById('dedSong').value='';
    setTimeout(function(){toggleForm();loadDedications();},800);
  }catch(e){notice.textContent=e.message;notice.style.color='#ef4444';}
};

async function loadDedications(){
  var el=document.getElementById('dedList');
  try{
    var r=await db.from('dedications').select('*').order('created_at',{ascending:false}).limit(30);
    if(r.error)throw r.error;
    var deds=r.data||[];
    if(!deds.length){el.innerHTML='<div class="empty"><div style="font-size:3.5rem;margin-bottom:.75rem;">💌</div><h3 style="font-size:1.1rem;font-weight:700;margin-bottom:.5rem;">No dedications yet</h3><p style="font-size:.85rem;">Be the first to dedicate a message to someone special.</p></div>';return;}
    // Get profiles
    var uids=[...new Set(deds.map(function(d){return d.user_id;}).filter(Boolean))];
    var pMap={};
    if(uids.length){var pr=await db.from('profiles').select('user_id,username,display_name').in('user_id',uids);if(pr.data)pr.data.forEach(function(p){pMap[p.user_id]=p;});}

    el.innerHTML=deds.map(function(d){
      var from=pMap[d.user_id]||{};
      var name=from.display_name||from.username||'Anonymous';
      var media=d.photo_url?'<div class="ded-media"><img src="'+esc(d.photo_url)+'" onerror="this.parentNode.style.display=\'none\'"></div>':'';
      var song=d.song_url?'<div class="ded-song">🎵 <a href="'+esc(d.song_url)+'" target="_blank">Listen to the song</a></div>':'';
      return '<div class="ded-card">'
        +'<div class="ded-to">💜 For '+esc(d.dedicated_to)+'</div>'
        +'<div class="ded-from">From '+esc(name)+'</div>'
        +media
        +'<div class="ded-msg">"'+esc(d.message)+'"</div>'
        +song
        +'<div class="ded-time">'+ago(d.created_at)+'</div>'
        +'</div>';
    }).join('');
  }catch(e){
    el.innerHTML='<div class="empty"><div style="font-size:3.5rem;margin-bottom:.75rem;">💌</div><p>Dedications coming soon!</p></div>';
  }
}

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function ago(d){var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}

// Falling hearts
var hearts=['💜','💗','💖','💕','🩷','♥️','💝'];
function spawnHeart(){var h=document.createElement('div');h.className='heart';h.textContent=hearts[Math.floor(Math.random()*hearts.length)];h.style.left=Math.random()*100+'vw';h.style.fontSize=(0.8+Math.random()*1.2)+'rem';h.style.animationDuration=(4+Math.random()*6)+'s';document.body.appendChild(h);setTimeout(function(){h.remove();},12000);}
setInterval(spawnHeart,800);
for(var i=0;i<4;i++)setTimeout(spawnHeart,i*200);

init();
</script>
</body>
</html>
