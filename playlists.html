<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlists - 8BFR Music Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #7c3aed; --dark: #0b0014; --dark-card: #0c0618; --text: #eae6ff; --text-dim: #a855f7; --border: rgba(124,58,237,.35); --green: #00ff88; --cyan: #00d9ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Work Sans', sans-serif; background: linear-gradient(#0b0014,#000); color: var(--text); min-height: 100vh; padding-bottom: 80px; }
        .header { background: rgba(15,0,30,.9); border-bottom: 2px solid var(--primary); padding: 1.25rem 1.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
        .header h1 { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; color: var(--primary); }
        .header a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
        .card { background: var(--dark-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .section-title { color: var(--primary); font-family: 'Bebas Neue', cursive; font-size: 1.4rem; margin-bottom: 1rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 0.65rem 1.25rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.2s; }
        .btn:hover { background: #6d28d9; }
        .btn-outline { background: rgba(124,58,237,0.2); border: 1px solid var(--border); color: var(--text); }
        input, textarea, select { width: 100%; padding: 0.65rem; background: var(--dark); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.9rem; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); }
        .form-group { margin-bottom: 0.75rem; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.3rem; font-weight: 600; }
        .playlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
        .playlist-card { background: var(--dark); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.3s; text-decoration:none; color:inherit; display:block; }
        .playlist-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
        .playlist-cover { aspect-ratio: 1; background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(168,85,247,0.1)); display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; overflow: hidden; position: relative; }
        .playlist-cover .quad { background: rgba(124,58,237,0.15); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .playlist-cover .play-hover { position: absolute; bottom: 8px; right: 8px; width: 42px; height: 42px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; font-size: 1.1rem; opacity: 0; transition: opacity 0.2s; }
        .playlist-card:hover .play-hover { opacity: 1; }
        .playlist-meta { padding: 0.75rem; }
        .playlist-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .playlist-creator { font-size: 0.75rem; color: var(--text-dim); }
        .playlist-count { font-size: 0.7rem; color: rgba(168,85,247,0.6); margin-top: 0.2rem; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 300; display: none; align-items: center; justify-content: center; padding: 1rem; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--dark-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; max-width: 450px; width: 100%; }
        .modal h2 { font-family: 'Bebas Neue', cursive; color: var(--primary); font-size: 1.4rem; margin-bottom: 1rem; }
        .modal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .modal-actions button { flex: 1; padding: 0.7rem; border-radius: 8px; cursor: pointer; font-weight: 600; border:none; }
        .empty-state { text-align: center; padding: 2.5rem; color: var(--text-dim); }
        .empty-state .emoji { font-size: 3rem; margin-bottom: 0.75rem; }
        @media (max-width: 600px) { .playlist-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); } .container { padding: 1rem; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>📻 Playlists</h1>
        <a href="feed.html">← Back</a>
    </div>
    <div class="container">
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <h2 class="section-title" style="margin:0;">📁 Your Playlists</h2>
                <button class="btn" onclick="openCreateModal()">+ Create</button>
            </div>
            <div id="myPlaylists" style="margin-top:1rem;"></div>
        </div>
        <div class="card">
            <h2 class="section-title">🔥 Popular Playlists</h2>
            <div id="publicPlaylists" class="playlist-grid"></div>
        </div>
    </div>

    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <h2>+ New Playlist</h2>
            <div class="form-group"><label>Playlist Name</label><input type="text" id="newPlName" placeholder="e.g. Late Night Vibes"></div>
            <div class="form-group"><label>Description (optional)</label><textarea id="newPlDesc" placeholder="What's this playlist about?" style="min-height:60px;resize:vertical;"></textarea></div>
            <div class="form-group"><label>Visibility</label><select id="newPlVisibility"><option value="public">🌎 Public</option><option value="private">🔒 Private</option></select></div>
            <div class="modal-actions">
                <button class="btn-outline btn" onclick="closeCreateModal()">Cancel</button>
                <button class="btn" onclick="createPlaylist()">Create Playlist</button>
            </div>
        </div>
    </div>

    <script>
    var db = window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
    var currentUser = null;

    async function init() {
        var sess = await db.auth.getSession();
        if (!sess.data.session) { location.href = 'login.html?return=playlists.html'; return; }
        currentUser = sess.data.session.user;
        await Promise.all([loadMyPlaylists(), loadPublicPlaylists()]);
    }

    async function loadMyPlaylists() {
        var div = document.getElementById('myPlaylists');
        try {
            var result = await db.from('playlists').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            var playlists = result.data || [];
            if (!playlists.length) { div.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;">No playlists yet. Create your first one!</p>'; return; }
            div.innerHTML = '<div class="playlist-grid">' + playlists.map(function(pl){ return cardHTML(pl); }).join('') + '</div>';
        } catch(e) { div.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;">No playlists yet.</p>'; }
    }

    async function loadPublicPlaylists() {
        var div = document.getElementById('publicPlaylists');
        try {
            var result = await db.from('playlists').select('*').eq('visibility', 'public').order('created_at', { ascending: false }).limit(12);
            var playlists = result.data || [];
            if (!playlists.length) { div.innerHTML = '<div class="empty-state"><div class="emoji">📻</div><p>No public playlists yet.</p></div>'; return; }
            div.innerHTML = playlists.map(function(pl){ return cardHTML(pl); }).join('');
        } catch(e) { div.innerHTML = '<div class="empty-state"><div class="emoji">📻</div><p>No public playlists yet.</p></div>'; }
    }

    function cardHTML(pl) {
        return '<a href="playlist-details.html?id=' + pl.id + '" class="playlist-card">' +
            '<div class="playlist-cover"><div class="quad">🎵</div><div class="quad">🎤</div><div class="quad">🎹</div><div class="quad">🎧</div><div class="play-hover">▶</div></div>' +
            '<div class="playlist-meta"><div class="playlist-name">' + esc(pl.name) + '</div><div class="playlist-creator">' + esc(pl.creator_name || 'You') + '</div><div class="playlist-count">' + (pl.track_count || 0) + ' tracks</div></div></a>';
    }

    function openCreateModal() { document.getElementById('createModal').classList.add('show'); }
    function closeCreateModal() { document.getElementById('createModal').classList.remove('show'); }

    async function createPlaylist() {
        var name = document.getElementById('newPlName').value.trim();
        if (!name) { alert('Enter a name.'); return; }
        try {
            var pr = await db.from('profiles').select('display_name,username').eq('user_id', currentUser.id).single();
            await db.from('playlists').insert({ user_id: currentUser.id, name: name, description: document.getElementById('newPlDesc').value.trim(), visibility: document.getElementById('newPlVisibility').value, creator_name: pr.data ? (pr.data.display_name || pr.data.username) : 'Unknown', track_count: 0, followers: 0 });
        } catch(e) { console.warn(e); }
        closeCreateModal();
        document.getElementById('newPlName').value = '';
        document.getElementById('newPlDesc').value = '';
        await loadMyPlaylists();
    }

    function esc(s) { if(!s)return''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
    document.getElementById('createModal').addEventListener('click',function(e){if(e.target===this)closeCreateModal();});
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
    </script>
<script src="scripts.js" defer></script>
</body>
</html>
