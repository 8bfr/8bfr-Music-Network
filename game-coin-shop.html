<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Game Coin Shop — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--dark:#0b0014;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);--yellow:#fbbf24;--green:#4ade80;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:rgba(15,0,30,.9);border-bottom:2px solid var(--yellow);padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.8rem;color:var(--yellow);}
.header a{color:var(--text);text-decoration:none;font-weight:600;}
.container{max-width:800px;margin:0 auto;padding:1.5rem;}
.balance{background:var(--card);border:1px solid rgba(251,191,36,.3);border-radius:14px;padding:1rem 1.5rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;}
.balance-num{font-family:'Bebas Neue',cursive;font-size:2.5rem;color:var(--yellow);}
.balance-label{font-size:.85rem;color:var(--dim);}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.75rem;margin-bottom:1.5rem;}
.shop-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem .75rem;text-align:center;transition:all .3s;}
.shop-item:hover{border-color:var(--yellow);transform:translateY(-2px);}
.si-icon{font-size:2rem;margin-bottom:.5rem;}
.si-name{font-weight:700;font-size:.88rem;margin-bottom:.15rem;}
.si-desc{font-size:.7rem;color:var(--dim);margin-bottom:.5rem;min-height:2.5em;}
.si-price{font-family:'Bebas Neue',cursive;font-size:1.2rem;color:var(--yellow);margin-bottom:.5rem;}
.si-btn{width:100%;padding:.45rem;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:.82rem;transition:all .2s;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:var(--yellow);}
.si-btn:hover{background:rgba(251,191,36,.3);}
.si-btn:disabled{opacity:.4;cursor:not-allowed;}
.section-title{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:var(--primary);margin:1.5rem 0 .75rem;}
.info{font-size:.82rem;color:var(--dim);line-height:1.6;margin-bottom:1rem;}
</style>
</head>
<body>
<div class="header"><a href="games.html">← Games</a><h1>🪙 Game Coin Shop</h1><div></div></div>
<div class="container">

<div class="balance">
<div><div class="balance-label">🪙 Your Coins</div><div class="balance-num" id="coinBal">...</div></div>
<a href="games.html" style="color:var(--yellow);text-decoration:none;font-weight:600;font-size:.85rem;">🎮 Earn More →</a>
</div>

<div class="info">Coins are earned by playing games (5/min, 25 daily bonus, 200/day cap). Spend them on profile upgrades, chat flair, and more. Coins are NOT real money and cannot be cashed out.</div>

<div class="section-title">🎨 Profile Upgrades</div>
<div class="shop-grid" id="profileItems"></div>

<div class="section-title">💬 Chat Flair</div>
<div class="shop-grid" id="chatItems"></div>

<div class="section-title">🎮 Game Power-ups</div>
<div class="shop-grid" id="gameItems"></div>

</div>
<script src="scripts.js" defer></script>
<script>
const db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');

const SHOP={
  profile:[
    {id:'glow_frame',name:'Glow Frame',icon:'✨',desc:'Purple glow around your avatar',cost:500},
    {id:'fire_frame',name:'Fire Frame',icon:'🔥',desc:'Animated fire avatar frame',cost:1000},
    {id:'gold_name',name:'Gold Username',icon:'👑',desc:'Your name appears in gold in chat',cost:750},
    {id:'custom_banner',name:'Custom Banner',icon:'🖼️',desc:'Upload a custom profile banner',cost:1500},
    {id:'badge_vip',name:'VIP Badge',icon:'🎖️',desc:'Exclusive VIP badge on your profile',cost:2000},
  ],
  chat:[
    {id:'chat_emoji_pack',name:'Emoji Pack',icon:'😎',desc:'Unlock 50+ custom emojis in chat',cost:300},
    {id:'chat_color',name:'Color Name',icon:'🎨',desc:'Colored username in community chat',cost:400},
    {id:'chat_gif',name:'GIF Reactions',icon:'🎬',desc:'Send GIF reactions in chat',cost:600},
  ],
  game:[
    {id:'double_coins',name:'2x Coins',icon:'🪙',desc:'Double coins for 1 hour of gaming',cost:200},
    {id:'skip_cooldown',name:'Skip Cooldown',icon:'⏩',desc:'Reset daily coin cap once',cost:500},
    {id:'lucky_spin',name:'Lucky Spin',icon:'🎰',desc:'Spin for 50-500 bonus coins',cost:150},
  ]
};

let myCoins=0,myItems=[];

async function init(){
  const{data:{session}}=await db.auth.getSession();
  if(!session){location.href='login.html?return=game-coin-shop.html';return;}
  const{data:p}=await db.from('profiles').select('coins').eq('user_id',session.user.id).single();
  myCoins=p?p.coins||0:0;
  document.getElementById('coinBal').textContent=myCoins.toLocaleString();
  try{const{data}=await db.from('user_owned_items').select('item_id').eq('user_id',session.user.id);myItems=(data||[]).map(i=>i.item_id);}catch(e){myItems=[];}
  render('profileItems',SHOP.profile);
  render('chatItems',SHOP.chat);
  render('gameItems',SHOP.game);
}

function render(elId,items){
  document.getElementById(elId).innerHTML=items.map(i=>{
    const owned=myItems.indexOf(i.id)!==-1;
    const canAfford=myCoins>=i.cost;
    let btn='';
    if(owned)btn='<button class="si-btn" disabled style="color:var(--green);border-color:rgba(74,222,128,.3);">✅ Owned</button>';
    else if(!canAfford)btn='<button class="si-btn" disabled>Not enough coins</button>';
    else btn='<button class="si-btn" onclick="buyItem(\''+i.id+'\',\''+i.name.replace(/'/g,'')+'\','+i.cost+')">Buy 🪙 '+i.cost+'</button>';
    return '<div class="shop-item"><div class="si-icon">'+i.icon+'</div><div class="si-name">'+i.name+'</div><div class="si-desc">'+i.desc+'</div><div class="si-price">🪙 '+i.cost+'</div>'+btn+'</div>';
  }).join('');
}

async function buyItem(id,name,cost){
  if(!confirm('Buy '+name+' for '+cost+' coins?'))return;
  try{
    const{data:ok}=await db.rpc('decrement_coins',{user_uuid:(await db.auth.getSession()).data.session.user.id,amount:cost});
    if(ok===false){alert('Not enough coins!');return;}
    await db.from('user_owned_items').insert({user_id:(await db.auth.getSession()).data.session.user.id,item_id:id,item_type:'game_shop'});
    myCoins-=cost;myItems.push(id);
    document.getElementById('coinBal').textContent=myCoins.toLocaleString();
    render('profileItems',SHOP.profile);render('chatItems',SHOP.chat);render('gameItems',SHOP.game);
    alert('🎉 '+name+' unlocked!');
  }catch(e){alert('Error: '+e.message);}
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
</body></html>
