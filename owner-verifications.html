<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifications - 8BFR</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #7c3aed; --dark: #0b0014; --dark-card: #0c0618; --text: #eae6ff; --text-dim: #a855f7; --border: rgba(124,58,237,.35); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Work Sans', sans-serif; background: radial-gradient(1200px 600px at 10% -10%, rgba(124,58,237,.35), transparent 60%), linear-gradient(#0b0014, #000); color: var(--text); min-height: 100vh; }
        .header { background: rgba(15,0,30,.9); border-bottom: 2px solid var(--primary); padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .5rem; }
        .header h1 { font-family: 'Bebas Neue', cursive; font-size: 2rem; color: var(--primary); }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        .card { background: var(--dark-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card h2 { font-family: 'Bebas Neue', cursive; font-size: 1.5rem; color: var(--primary); margin-bottom: 1rem; border-left: 4px solid var(--primary); padding-left: 1rem; }
        .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; }
        .tab { flex: 1; text-align: center; padding: .65rem; font-weight: 600; font-size: .85rem; cursor: pointer; color: rgba(234,230,255,.5); border: none; border-bottom: 2px solid transparent; background: none; transition: all .2s; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .v-item { background: var(--dark); border: 1px solid var(--border); padding: 1.1rem; margin-bottom: .6rem; border-radius: 10px; }
        .v-item:hover { border-color: var(--primary); }
        .v-name { font-weight: 700; font-size: 1rem; margin-bottom: .2rem; }
        .v-meta { font-size: .78rem; color: var(--text-dim); line-height: 1.6; }
        .v-spotify { display: inline-flex; align-items: center; gap: .4rem; background: rgba(30,215,96,.1); border: 1px solid rgba(30,215,96,.3); padding: .3rem .7rem; border-radius: 8px; font-size: .78rem; color: #1ed760; text-decoration: none; margin-top: .4rem; word-break: break-all; }
        .v-spotify:hover { background: rgba(30,215,96,.2); }
        .btn { border: none; padding: .5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: .82rem; transition: all .15s; }
        .btn:hover { transform: translateY(-1px); }
        .btn-approve { background: rgba(0,255,136,.15); color: #00ff88; border: 1px solid rgba(0,255,136,.4); }
        .btn-reject { background: rgba(255,0,68,.15); color: #ff4466; border: 1px solid rgba(255,0,68,.4); }
        .btn-view { background: rgba(124,58,237,.15); color: #a855f7; border: 1px solid rgba(124,58,237,.4); }
        .status-badge { display: inline-block; padding: .15rem .55rem; border-radius: 999px; font-size: .7rem; font-weight: 700; }
        .status-approved { background: rgba(0,255,136,.15); color: #00ff88; }
        .status-rejected { background: rgba(255,0,68,.15); color: #ff4466; }
        .status-pending { background: rgba(251,191,36,.15); color: #fbbf24; }
        .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-dim); }
        .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin: 1rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .count-badge { background: rgba(251,191,36,.2); color: #fbbf24; border-radius: 999px; padding: .1rem .5rem; font-size: .72rem; font-weight: 800; margin-left: .4rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>✅ Artist & Beatmaker Verifications</h1>
        <a href="owner-panel.html" style="color: var(--text-dim); text-decoration: none; font-weight: 600;">← Back to Panel</a>
    </div>
    <div class="container">
        <div class="card">
            <h2>Verification Requests</h2>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('pending',this)">🟡 Pending <span id="pendingCount" class="count-badge" style="display:none;"></span></button>
                <button class="tab" onclick="switchTab('approved',this)">✅ Approved</button>
                <button class="tab" onclick="switchTab('rejected',this)">❌ Rejected</button>
            </div>
            <div id="listArea"><div class="spinner"></div></div>
        </div>
        <div class="card">
            <h2>🔍 Manual Verify by Profile</h2>
            <p style="font-size:.82rem;color:var(--text-dim);margin-bottom:.75rem;">Search for a user and manually verify them even without a request.</p>
            <div style="display:flex;gap:.5rem;margin-bottom:.75rem;">
                <input type="text" id="manualSearch" placeholder="Search username or email..." style="flex:1;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;color:var(--text);font-size:.85rem;outline:none;" onkeypress="if(event.key==='Enter')doManualSearch()">
                <button class="btn btn-view" onclick="doManualSearch()">Search</button>
            </div>
            <div id="manualResults"></div>
        </div>
    </div>
    <script src="scripts.js" defer></script>
    <script>
        var s = window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
        var currentTab = 'pending';
        var VERIFY_TABLE = 'verification_requests';

        async function init() {
            try {
                var res = await s.auth.getSession();
                if (!res.data.session) { location.href = 'login.html?return=owner-verifications.html'; return; }
                var pr = await s.from('profiles').select('role').eq('user_id', res.data.session.user.id).single();
                if (!pr.data || pr.data.role !== 'owner') { alert('Owner only'); location.href = 'index.html'; return; }
                // Auto-detect table
                var test = await s.from('verification_requests').select('id').limit(1);
                if (test.error && test.error.message && test.error.message.includes('does not exist')) {
                    VERIFY_TABLE = 'artist_verifications';
                }
                console.log('Verify table:', VERIFY_TABLE);
                loadList();
            } catch (e) {
                console.error(e);
                document.getElementById('listArea').innerHTML = '<p style="color:#ff4466;">Error: ' + e.message + '</p>';
            }
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            if (btn) btn.classList.add('active');
            loadList();
        }

        function esc(val) { return val ? String(val).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

        async function loadList() {
            var el = document.getElementById('listArea');
            el.innerHTML = '<div class="spinner"></div>';
            try {
                var query = s.from(VERIFY_TABLE).select('*').eq('status', currentTab).order('created_at', { ascending: false }).limit(50);
                var result = await query;
                if (result.error) throw result.error;
                var data = result.data || [];

                if (currentTab === 'pending') {
                    var badge = document.getElementById('pendingCount');
                    if (data.length > 0) { badge.textContent = data.length; badge.style.display = 'inline'; }
                    else { badge.style.display = 'none'; }
                }

                if (!data.length) { el.innerHTML = '<div class="empty">No ' + currentTab + ' verifications.</div>'; return; }

                // Fetch profiles
                var uids = []; data.forEach(function(v) { if (v.user_id && uids.indexOf(v.user_id) === -1) uids.push(v.user_id); });
                var pm = {};
                if (uids.length) {
                    var pr = await s.from('profiles').select('user_id,username,display_name,email,role,badges,verified_artist,verify_url').in('user_id', uids);
                    if (pr.data) pr.data.forEach(function(p) { pm[p.user_id] = p; });
                }

                el.innerHTML = data.map(function(v) {
                    var pr = pm[v.user_id] || {};
                    var name = pr.display_name || pr.username || pr.email || 'Unknown';
                    var spotUrl = v.spotify_url || v.url || v.verify_url || pr.verify_url || '';
                    var rolesStr = v.roles ? v.roles.join(', ') : (v.type || pr.role || 'artist');
                    var dateStr = new Date(v.created_at).toLocaleDateString();
                    var isVerified = pr.verified_artist;

                    var statusHtml = '';
                    if (v.status === 'approved') statusHtml = '<span class="status-badge status-approved">Approved</span>';
                    else if (v.status === 'rejected') statusHtml = '<span class="status-badge status-rejected">Rejected</span>';
                    else statusHtml = '<span class="status-badge status-pending">Pending</span>';

                    var btns = '';
                    if (v.status === 'pending') {
                        btns = '<button class="btn btn-approve" onclick="approve(\'' + v.id + '\',\'' + v.user_id + '\')">✅ Approve</button> ' +
                               '<button class="btn btn-reject" onclick="reject(\'' + v.id + '\')">❌ Reject</button>';
                    }

                    return '<div class="v-item">' +
                        '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.75rem;flex-wrap:wrap;">' +
                            '<div style="flex:1;min-width:0;">' +
                                '<div class="v-name">' + esc(name) + (isVerified ? ' <span style="color:#00d9ff;font-size:.8rem;">✓ Already Verified</span>' : '') + '</div>' +
                                '<div class="v-meta">Role: <strong>' + esc(rolesStr) + '</strong> · ' + statusHtml + '<br>Submitted: ' + dateStr + '</div>' +
                                (spotUrl ? '<a href="' + esc(spotUrl) + '" target="_blank" rel="noopener" class="v-spotify">🟢 ' + esc(spotUrl.length > 55 ? spotUrl.substring(0, 55) + '...' : spotUrl) + '</a>' : '<div style="font-size:.75rem;color:#ef4444;margin-top:.3rem;">⚠️ No Spotify URL</div>') +
                            '</div>' +
                            '<div style="display:flex;gap:.4rem;flex-shrink:0;align-items:flex-start;">' +
                                '<a href="profile.html?id=' + v.user_id + '" class="btn btn-view" style="text-decoration:none;" target="_blank">View</a> ' +
                                btns +
                            '</div>' +
                        '</div>' +
                    '</div>';
                }).join('');
            } catch (e) {
                el.innerHTML = '<p style="color:#ff4466;padding:1rem;">Error: ' + e.message + '</p>';
            }
        }

        window.approve = async function(id, userId) {
            try {
                var session = (await s.auth.getSession()).data.session;
                // Update verification status
                await s.from(VERIFY_TABLE).update({ status: 'approved', reviewed_by: session.user.id, reviewed_at: new Date().toISOString() }).eq('id', id);
                // Get current profile
                var pr = await s.from('profiles').select('badges,role').eq('user_id', userId).single();
                if (!pr.data) throw new Error('Profile not found');
                var badges = pr.data.badges || [];
                // Get the roles from the verification request
                var vr = await s.from(VERIFY_TABLE).select('roles,type,spotify_url').eq('id', id).single();
                var roles = (vr.data && vr.data.roles) ? vr.data.roles : [vr.data && vr.data.type ? vr.data.type : 'artist'];
                roles.forEach(function(r) { if (badges.indexOf(r) === -1) badges.push(r); });
                // Update profile
                var updates = { verified_artist: true, badges: badges };
                if (pr.data.role === 'fan') updates.role = roles[0] || 'artist';
                await s.from('profiles').update(updates).eq('user_id', userId);
                alert('✅ Approved! Artist badge + upload access now active.');
                loadList();
            } catch (e) { alert('Error: ' + e.message); }
        };

        window.reject = async function(id) {
            if (!confirm('Reject this verification?')) return;
            try {
                var session = (await s.auth.getSession()).data.session;
                await s.from(VERIFY_TABLE).update({ status: 'rejected', reviewed_by: session.user.id, reviewed_at: new Date().toISOString() }).eq('id', id);
                alert('Rejected.');
                loadList();
            } catch (e) { alert('Error: ' + e.message); }
        };

        window.doManualSearch = async function() {
            var q = document.getElementById('manualSearch').value.trim();
            var el = document.getElementById('manualResults');
            if (!q || q.length < 2) { el.innerHTML = '<p style="font-size:.8rem;color:var(--text-dim);">Enter at least 2 characters.</p>'; return; }
            el.innerHTML = '<div class="spinner"></div>';
            try {
                var r = await s.from('profiles').select('user_id,username,display_name,email,role,badges,verified_artist,verify_url')
                    .or('username.ilike.%' + q + '%,display_name.ilike.%' + q + '%,email.ilike.%' + q + '%').limit(10);
                if (r.error) throw r.error;
                if (!r.data || !r.data.length) { el.innerHTML = '<p style="font-size:.8rem;color:var(--text-dim);">No users found.</p>'; return; }
                el.innerHTML = r.data.map(function(p) {
                    var name = p.display_name || p.username || 'Unknown';
                    var iv = p.verified_artist;
                    return '<div class="v-item" style="padding:.75rem;">' +
                        '<div style="display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap;">' +
                            '<div><strong>' + esc(name) + '</strong>' + (iv ? ' <span style="color:#00d9ff;">✓</span>' : '') +
                            '<div style="font-size:.75rem;color:var(--text-dim);">' + esc(p.role || 'fan') + ' · ' + esc(p.email || '') + '</div>' +
                            (p.verify_url ? '<div style="font-size:.72rem;color:#1ed760;margin-top:.2rem;">🟢 ' + esc(p.verify_url) + '</div>' : '') +
                            '</div>' +
                            '<div style="display:flex;gap:.3rem;">' +
                                (iv ? '<button class="btn btn-reject" onclick="revokeVerify(\'' + p.user_id + '\')">Revoke</button>'
                                    : '<button class="btn btn-approve" onclick="manualVerify(\'' + p.user_id + '\')">✅ Verify</button>') +
                            '</div>' +
                        '</div>' +
                    '</div>';
                }).join('');
            } catch (e) { el.innerHTML = '<p style="color:#ff4466;">' + e.message + '</p>'; }
        };

        window.manualVerify = async function(userId) {
            if (!confirm('Manually verify this user?')) return;
            try {
                var pr = await s.from('profiles').select('badges,role').eq('user_id', userId).single();
                var badges = pr.data.badges || [];
                if (badges.indexOf('artist') === -1 && badges.indexOf('beatmaker') === -1) {
                    badges.push(pr.data.role === 'beatmaker' ? 'beatmaker' : 'artist');
                }
                await s.from('profiles').update({ verified_artist: true, badges: badges }).eq('user_id', userId);
                alert('✅ Verified!');
                doManualSearch();
            } catch (e) { alert('Error: ' + e.message); }
        };

        window.revokeVerify = async function(userId) {
            if (!confirm('Revoke verification? They lose upload access.')) return;
            try {
                await s.from('profiles').update({ verified_artist: false }).eq('user_id', userId);
                alert('Revoked.');
                doManualSearch();
            } catch (e) { alert('Error: ' + e.message); }
        };

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    </script>
</body>
</html>
