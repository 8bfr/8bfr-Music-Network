// ─── RENDERING ─────────────────────────────────────────────
var activeCategory='all', currentTool=null;

function renderNav(){
  var nav=document.getElementById('catNav');
  var html='<button class="cat-btn'+(activeCategory==='all'?' active':'')+'" onclick="setCategory(\'all\')">All Tools</button>';
  CATEGORIES.forEach(function(c){
    html+='<button class="cat-btn'+(activeCategory===c.id?' active':'')+'" onclick="setCategory(\''+c.id+'\')">'+c.name+'</button>';
  });
  nav.innerHTML=html;
}
function setCategory(id){activeCategory=id;renderNav();renderTools();window.scrollTo({top:0,behavior:'smooth'});}
window.setCategory=setCategory;

function renderTools(){
  var container=document.getElementById('toolsContainer');
  var q=(document.getElementById('searchInput').value||'').toLowerCase();
  var html='';
  CATEGORIES.forEach(function(cat){
    if(activeCategory!=='all'&&activeCategory!==cat.id)return;
    var catTools=TOOLS.filter(function(t){
      if(t.cat!==cat.id)return false;
      if(!q)return true;
      return (t.name+' '+t.desc).toLowerCase().indexOf(q)!==-1;
    });
    if(!catTools.length)return;
    html+='<h2 class="cat-title">'+cat.name+'</h2>';
    html+='<div class="cat-sub">'+catTools.length+' tool'+(catTools.length===1?'':'s')+'</div>';
    html+='<div class="tools-grid">';
    catTools.forEach(function(t){
      var badges=(t.badges||[]).map(function(b){return '<span class="tool-badge badge-'+b+'">'+b.toUpperCase()+'</span>';}).join('');
      html+='<div class="tool" onclick="openTool(\''+t.id+'\')">' +badges+
            '<div class="tool-icon">'+t.icon+'</div>'+
            '<div class="tool-name">'+t.name+'</div>'+
            '<div class="tool-desc">'+t.desc+'</div></div>';
    });
    html+='</div>';
  });
  if(!html)html='<div class="empty">No tools match your search.</div>';
  container.innerHTML=html;
}

function openTool(id){
  var tool=TOOLS.find(function(t){return t.id===id;});
  if(!tool)return;

  // Launcher tools: just open the URL in a new tab, no modal
  if(tool.type==='link' && tool.url){
    window.open(tool.url, tool.target||'_blank', 'noopener');
    return;
  }

  currentTool=tool;
  conversationHistory = [];  // Reset conversation when opening a new tool
  document.getElementById('mIcon').textContent=tool.icon;
  document.getElementById('mName').textContent=tool.name;
  var fieldsHtml='';
  tool.fields.forEach(function(f){
    var req=f.required?'<span class="req">*</span>':'';
    var id=f.id||f.name;
    fieldsHtml+='<div class="field"><label>'+f.label+' '+req+'</label>';
    if(f.type==='textarea'){
      fieldsHtml+='<textarea id="'+id+'" data-name="'+f.name+'" placeholder="'+(f.placeholder||'')+'"'+(f.required?' required':'')+'></textarea>';
    } else if(f.type==='select'){
      fieldsHtml+='<select id="'+id+'" data-name="'+f.name+'"><option value="">Choose...</option>';
      (f.options||[]).forEach(function(o){fieldsHtml+='<option value="'+o+'">'+o+'</option>';});
      fieldsHtml+='</select>';
    } else if(f.type==='color'){
      fieldsHtml+='<input type="color" id="'+id+'" data-name="'+f.name+'" value="'+(f.value||'#000000')+'">';
    } else if(f.type==='file'){
      fieldsHtml+='<input type="file" id="'+id+'" data-name="'+f.name+'" accept="'+(f.accept||'*')+'"'+(f.multiple?' multiple':'')+(f.required?' required':'')+' onchange="handleFilePreview(this,\''+id+'\')">';
      fieldsHtml+='<div id="'+id+'Preview" style="margin-top:0.5rem;"></div>';
    } else if(f.type==='number'){
      fieldsHtml+='<input type="number" id="'+id+'" data-name="'+f.name+'" value="'+(f.value||'')+'" placeholder="'+(f.placeholder||'')+'">';
    } else if(f.type==='preset'){
      fieldsHtml+='<div class="preset-row" id="'+id+'Row">';
      (f.options||[]).forEach(function(o,idx){
        fieldsHtml+='<button type="button" class="preset" data-w="'+o.w+'" data-h="'+o.h+'" onclick="applyPreset(this,\''+id+'\')">'+o.label+'</button>';
      });
      fieldsHtml+='</div><input type="hidden" id="'+id+'" data-name="'+f.name+'">';
    } else {
      fieldsHtml+='<input type="text" id="'+id+'" data-name="'+f.name+'" placeholder="'+(f.placeholder||'')+'"'+(f.required?' required':'')+'>';
    }
    fieldsHtml+='</div>';
  });
  document.getElementById('mFields').innerHTML=fieldsHtml;
  document.getElementById('mResult').innerHTML='';
  document.getElementById('mResult').classList.remove('show');
  document.getElementById('mRun').disabled=false;
  document.getElementById('mRun').textContent=tool.type==='client'?'🚀 Create':'✨ Generate';
  document.getElementById('modalOverlay').classList.add('show');
}
window.openTool=openTool;

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
  currentTool=null;
}
window.closeModal=closeModal;

// Preset button -> fill W/H for resizer
window.applyPreset=function(btn,presetId){
  btn.parentNode.querySelectorAll('.preset').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected');
  var w=btn.dataset.w,h=btn.dataset.h;
  document.getElementById(presetId).value=w+'x'+h;
  // If there are w/h inputs, fill them
  var wEl=document.getElementById('resizeW'),hEl=document.getElementById('resizeH');
  if(wEl)wEl.value=w;
  if(hEl)hEl.value=h;
};

// File preview (show thumbnail for images, file info otherwise)
window.handleFilePreview=function(input,id){
  var preview=document.getElementById(id+'Preview');
  if(!preview||!input.files||!input.files.length){preview.innerHTML='';return;}
  var files=Array.from(input.files);
  if(input.multiple){
    // GIF strip preview
    var stripHtml='<div class="gif-strip">';
    files.forEach(function(f){
      var url=URL.createObjectURL(f);
      stripHtml+='<img src="'+url+'" alt="">';
    });
    stripHtml+='</div><div style="font-size:0.75rem;color:rgba(168,85,247,0.7);">'+files.length+' files selected</div>';
    preview.innerHTML=stripHtml;
  } else {
    var f=files[0];
    if(f.type.startsWith('image/')){
      var url=URL.createObjectURL(f);
      preview.innerHTML='<img src="'+url+'" style="max-width:200px;max-height:150px;border-radius:8px;"><div style="font-size:0.75rem;color:rgba(168,85,247,0.7);">'+f.name+' ('+(f.size/1024).toFixed(1)+' KB)</div>';
    } else if(f.type.startsWith('video/')){
      var url=URL.createObjectURL(f);
      preview.innerHTML='<video src="'+url+'" controls style="max-width:100%;max-height:200px;border-radius:8px;"></video><div style="font-size:0.75rem;color:rgba(168,85,247,0.7);">'+f.name+' ('+(f.size/(1024*1024)).toFixed(1)+' MB)</div>';
    } else {
      preview.innerHTML='<div style="font-size:0.82rem;">'+f.name+' ('+(f.size/1024).toFixed(1)+' KB)</div>';
    }
  }
};

function collectValues(){
  var values={};
  var missing=false;
  currentTool.fields.forEach(function(f){
    var id=f.id||f.name;
    var el=document.getElementById(id);
    if(f.type==='file'){
      values[f.name]=el&&el.files?el.files:null;
      if(f.required&&(!el||!el.files||!el.files.length))missing=true;
    } else {
      var val=el?(el.value||'').trim():'';
      values[f.name]=val;
      if(f.required&&!val)missing=true;
    }
  });
  return {values:values,missing:missing};
}

function showResult(html){
  var r=document.getElementById('mResult');
  r.classList.add('show');
  r.innerHTML=html;
  // Add Read Aloud button if result has readable text (not just media)
  var textContent=r.textContent.trim();
  if(textContent.length>20&&!html.match(/^<(video|audio|canvas|img)/)){
    var speakBtn=document.createElement('button');
    speakBtn.className='btn btn-ghost btn-sm';
    speakBtn.textContent='Read Aloud';
    speakBtn.style.cssText='margin-top:.3rem;font-size:.6rem;';
    speakBtn.onclick=function(){
      speechSynthesis.cancel();
      var utter=new SpeechSynthesisUtterance(textContent.substring(0,5000));
      utter.rate=1;speechSynthesis.speak(utter);
      speakBtn.textContent='Speaking...';
      utter.onend=function(){speakBtn.textContent='Read Aloud';};
    };
    var stopBtn=document.createElement('button');
    stopBtn.className='btn btn-ghost btn-sm';
    stopBtn.textContent='Stop';
    stopBtn.style.cssText='margin-top:.3rem;margin-left:.2rem;font-size:.6rem;';
    stopBtn.onclick=function(){speechSynthesis.cancel();speakBtn.textContent='Read Aloud';};
    r.appendChild(speakBtn);r.appendChild(stopBtn);
  }
}
function showError(msg){
  showResult('<div class="error-msg">⚠️ '+esc(msg)+'</div>');
}
function showLoading(msg){
  showResult('<div class="loading-text"><span class="spinner"></span>'+esc(msg||'Working...')+'</div>');
}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// MAIN DISPATCH — runs either AI text tool or client-side tool
async function runTool(){
  if(!currentTool)return;
  var c=collectValues();
  if(c.missing){showError('Please fill in all required fields (*)');return;}

  var btn=document.getElementById('mRun');
  btn.disabled=true;
  btn.textContent='Working...';

  try {
    if(currentTool.type==='ai'){
      await runAiTool(c.values);
    } else if(currentTool.type==='client'){
      await CLIENT_HANDLERS[currentTool.handler](c.values);
    }
  } catch(e){
    showError('Error: '+(e.message||e));
  }

  btn.disabled=false;
  btn.textContent=currentTool.type==='client'?'🚀 Create Again':'✨ Generate Again';
}
window.runTool=runTool;

// Conversation history for current tool session
var conversationHistory = [];

async function runAiTool(values, isFollowUp){
  var prompt = isFollowUp ? values.followUpText : currentTool.buildPrompt(values);

  // Pre-processing: Artist Info tool needs Spotify oEmbed hydration
  if (currentTool.handler === 'artistLookup' && !isFollowUp) {
    var spotifyUrl = values.spotifyUrl && values.spotifyUrl.trim();
    if (spotifyUrl && spotifyUrl.indexOf('spotify.com') !== -1) {
      showLoading('Fetching Spotify metadata...');
      try {
        var oEmbed = await fetch('https://open.spotify.com/oembed?url=' + encodeURIComponent(spotifyUrl));
        if (oEmbed.ok) {
          var embedData = await oEmbed.json();
          values._spotifyInfo = 'Name: ' + (embedData.title || 'unknown') +
            (embedData.thumbnail_url ? '\nImage: ' + embedData.thumbnail_url : '') +
            '\nSpotify URL: ' + spotifyUrl;
          prompt = currentTool.buildPrompt(values);
        }
      } catch(e) {
        console.warn('Spotify oEmbed failed:', e.message);
      }
    }
  }

  showLoading(isFollowUp ? 'Thinking...' : 'Generating...');

  // Build messages array with 8BFR context, conversation history, and new message
  var systemContent = (currentTool.system || '') + '\n\n' + BFR_CONTEXT;
  var messages = [{role:'system', content:systemContent}];

  // Include prior turns in this conversation
  if (isFollowUp && conversationHistory.length > 0) {
    messages = messages.concat(conversationHistory);
  }

  messages.push({role:'user', content:prompt});

  var res = await fetch(API, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      messages: messages,
      tier: currentTool.tier || 'nano',
      max_tokens: 1500
    })
  });
  var data = await res.json();
  if (data.error) {
    showError(data.error + (data.attempts ? ' — ' + JSON.stringify(data.attempts).slice(0,200) : ''));
    return;
  }
  var text = data.text || '(No response)';
  window._lastResult = text;

  // Update conversation history
  conversationHistory.push({role:'user', content:prompt});
  conversationHistory.push({role:'assistant', content:text});
  // Cap history at 20 turns to keep token usage reasonable
  if (conversationHistory.length > 20) {
    conversationHistory = conversationHistory.slice(-20);
  }

  renderAiResult(text, data.provider);
}

function renderAiResult(text, provider) {
  var actions = '<div class="result-actions">' +
    '<button class="btn btn-ghost btn-sm" onclick="copyResult()">📋 Copy</button>' +
    '<button class="btn btn-ghost btn-sm" onclick="googleLookup()">🔍 Google</button>' +
    '<button class="btn btn-ghost btn-sm" onclick="regenAiTool()">🔄 Regenerate</button>' +
    '<button class="btn btn-ghost btn-sm" onclick="shareAiResult()">🔗 Share</button>' +
    '</div>';

  // Conversation follow-up input
  var followUp = '<div style="margin-top:0.85rem;padding-top:0.85rem;border-top:1px solid rgba(124,58,237,0.25);">' +
    '<label style="display:block;font-size:0.8rem;font-weight:700;color:#a855f7;margin-bottom:0.4rem;">Continue the conversation</label>' +
    '<div style="display:flex;gap:0.4rem;">' +
    '<input type="text" id="followUpInput" placeholder="Type a follow-up message..." style="flex:1;padding:0.55rem 0.8rem;background:rgba(0,0,0,0.4);border:1px solid rgba(124,58,237,0.35);border-radius:8px;color:#eae6ff;font-size:0.9rem;outline:none;font-family:inherit;" onkeydown="if(event.key===\'Enter\')sendFollowUp();">' +
    '<button class="btn btn-sm" style="width:auto;padding:0.5rem 1rem;" onclick="sendFollowUp()">Send</button>' +
    '</div>' +
    '</div>';

  var providerTag = '<div style="font-size:0.7rem;color:rgba(168,85,247,0.5);margin-top:0.5rem;">via ' + (provider || 'ai') + '</div>';

  // Build full conversation view if there are multiple turns
  var convoHtml = '<div>' + esc(text) + '</div>';
  if (conversationHistory.length > 2) {
    var convoFull = '';
    for (var i = 0; i < conversationHistory.length; i++) {
      var m = conversationHistory[i];
      var bg = m.role === 'user' ? 'rgba(124,58,237,0.15)' : 'rgba(0,0,0,0.25)';
      var label = m.role === 'user' ? 'You' : 'AI';
      var labelColor = m.role === 'user' ? '#c084fc' : '#a855f7';
      convoFull += '<div style="background:' + bg + ';padding:0.6rem 0.85rem;border-radius:8px;margin-bottom:0.5rem;">' +
        '<div style="font-size:0.7rem;color:' + labelColor + ';font-weight:700;margin-bottom:0.3rem;">' + label + '</div>' +
        '<div style="white-space:pre-wrap;">' + esc(m.content) + '</div>' +
        '</div>';
    }
    convoHtml = convoFull;
  }

  showResult(convoHtml + actions + followUp + providerTag);

  // Auto-focus follow-up input
  setTimeout(function(){
    var inp = document.getElementById('followUpInput');
    if (inp) inp.focus();
  }, 100);
}

window.sendFollowUp = async function() {
  var inp = document.getElementById('followUpInput');
  if (!inp) return;
  var txt = inp.value.trim();
  if (!txt) return;

  var btn = document.getElementById('mRun');
  if (btn) { btn.disabled = true; }

  try {
    await runAiTool({followUpText: txt}, true);
  } catch(e) {
    showError('Follow-up failed: ' + (e.message || e));
  }

  if (btn) { btn.disabled = false; }
};

window.regenAiTool = function() {
  // Clear history and re-run from scratch using original form values
  conversationHistory = [];
  var c = collectValues();
  runAiTool(c.values, false);
};

window.googleLookup = function() {
  if (!window._lastResult) return;
  // Take first 80 chars of result, or the tool name + most recent user question
  var queryBase = '';
  if (conversationHistory.length > 0) {
    // Use last user message as the search query
    for (var i = conversationHistory.length - 1; i >= 0; i--) {
      if (conversationHistory[i].role === 'user') {
        queryBase = conversationHistory[i].content.slice(0, 120);
        break;
      }
    }
  }
  if (!queryBase) queryBase = (currentTool && currentTool.name) || '';
  var url = 'https://www.google.com/search?q=' + encodeURIComponent(queryBase);
  window.open(url, '_blank', 'noopener');
};

window.copyResult=function(){
  if(!window._lastResult)return;
  navigator.clipboard.writeText(window._lastResult).then(function(){
    var r=document.getElementById('mResult');
    var ex=r.querySelector('.success-msg');if(ex)ex.remove();
    r.insertAdjacentHTML('beforeend','<div class="success-msg">✓ Copied</div>');
    setTimeout(function(){var m=r.querySelector('.success-msg');if(m)m.remove();},2000);
  });
};

window.shareAiResult=function(){
  if(!window._lastResult)return;

// Load scripts dynamically
function loadScript(url){
  return new Promise(function(resolve,reject){
    var s=document.createElement('script');
    s.src=url;s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });
}
function loadImage(src){
  return new Promise(function(resolve,reject){
    var img=new Image();
    img.onload=function(){resolve(img);};
    img.onerror=reject;
    img.crossOrigin='anonymous';
    img.src=src;
  });
}

// QR fallback: Google Charts API (works without any JS library)
async function qrCodeFallback(text, size, fg, bg) {
  try {
    // Google Charts QR doesn't support custom colors — use quickchart.io which does
    var qrUrl = 'https://quickchart.io/qr?text=' + encodeURIComponent(text) +
                '&size=' + size +
                '&dark=' + fg.replace('#','') +
                '&light=' + bg.replace('#','') +
                '&ecLevel=H&margin=2';

    // Fetch as blob so we can download it
    var resp = await fetch(qrUrl);
    if (!resp.ok) throw new Error('QR fallback failed');
    var blob = await resp.blob();
    var dataUrl = await new Promise(function(resolve){
      var reader = new FileReader();
      reader.onload = function(){ resolve(reader.result); };
      reader.readAsDataURL(blob);
    });

    window._lastImageUrl = dataUrl;
    showResult('<img src="' + dataUrl + '" alt="QR code" style="max-width:300px;background:#fff;padding:8px;border-radius:8px;">' +
      '<div class="result-actions"><button class="btn btn-sm" onclick="downloadImage(\'qr-8bfr.png\')">⬇️ Download</button></div>' +
      '<div style="font-size:0.75rem;color:rgba(168,85,247,0.7);margin-top:0.5rem;">' + size + '×' + size + ' • via QuickChart fallback</div>');
  } catch (e) {
    showError('QR generation failed: ' + e.message + '. Check that the text isn\'t too long.');
  }
}

  // ── QR CODE ──
  // ── QR CODE (uses node-qrcode library, reliable) ──
  qrCode: async function(v){
    var text = v.text;
    var size = parseInt(v.size) || 300;
    var fg = v.fg || '#000000';
    var bg = v.bg || '#ffffff';

    if (!text) { showError('Enter a URL or text.'); return; }

    showLoading('Generating QR code...');

    // Load node-qrcode library (more reliable than qrcodejs)
    if (!window.QRCode || !window.QRCode.toCanvas) {
      try {
        await loadScript('https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js');
      } catch(e) {
        // Fallback: use Google Charts API to render QR
        await qrCodeFallback(text, size, fg, bg);
        return;
      }
    }

    try {
      var canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;

      await new Promise(function(resolve, reject){
        var timeout = setTimeout(function(){ reject(new Error('QR generation timed out')); }, 10000);
        window.QRCode.toCanvas(canvas, text, {
          width: size,
          margin: 2,
          color: { dark: fg, light: bg },
          errorCorrectionLevel: 'H'
        }, function(err){
          clearTimeout(timeout);
          if (err) reject(err); else resolve();
        });
      });

      var dataUrl = canvas.toDataURL('image/png');
      window._lastImageUrl = dataUrl;

      showResult('<img src="' + dataUrl + '" alt="QR code" style="max-width:300px;background:#fff;padding:8px;border-radius:8px;">' +
        '<div class="result-actions"><button class="btn btn-sm" onclick="downloadImage(\'qr-8bfr.png\')">⬇️ Download</button></div>' +
        '<div style="font-size:0.75rem;color:rgba(168,85,247,0.7);margin-top:0.5rem;">' + size + '×' + size + ' • PNG</div>');
    } catch(err) {
      console.warn('QRCode.toCanvas failed, using fallback:', err.message);
      await qrCodeFallback(text, size, fg, bg);
    }
  },

  meme: async function(v){

      var url=URL.createObjectURL(files[0]);

      await new Promise(function(r,rej){img.onload=r;img.onerror=rej;img.src=url;});
    } else {
      showError('Upload an image or enter an AI prompt.');return;
    }

    var canvas=document.createElement('canvas');
    canvas.width=img.width;canvas.height=img.height;
    var ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0);
    var fontSize=parseInt(v.fontSize)||80;
    ctx.font='bold '+fontSize+'px Impact, sans-serif';
    ctx.textAlign='center';
    ctx.fillStyle=v.color||'#ffffff';
    ctx.strokeStyle=v.outline||'#000000';
    ctx.lineWidth=Math.max(3,fontSize/8);
    ctx.lineJoin='round';
    function wrapLines(ctx,text,maxW){
      var words=text.split(' '),lines=[],current='';
      words.forEach(function(w){
        var test=current?current+' '+w:w;
        if(ctx.measureText(test).width>maxW&&current){lines.push(current);current=w;}
        else current=test;
      });
      if(current)lines.push(current);
      return lines;
    }
    if(v.top){
      var lines=wrapLines(ctx,v.top.toUpperCase(),canvas.width-40);
      lines.forEach(function(line,i){
        var y=fontSize+10+i*(fontSize+8);
        ctx.strokeText(line,canvas.width/2,y);
        ctx.fillText(line,canvas.width/2,y);
      });
    }
    if(v.bottom){
      var lines=wrapLines(ctx,v.bottom.toUpperCase(),canvas.width-40);
      var startY=canvas.height-(lines.length*(fontSize+8))-10+fontSize;
      lines.forEach(function(line,i){
        var y=startY+i*(fontSize+8);
        ctx.strokeText(line,canvas.width/2,y);
        ctx.fillText(line,canvas.width/2,y);
      });
    }
    var dataUrl=canvas.toDataURL('image/png');
    window._lastImageUrl=dataUrl;
    showResult('<img src="'+dataUrl+'" alt="Meme">'+
      '<div class="result-actions">'+
      '<button class="btn btn-sm" onclick="downloadImage(\'meme-8bfr.png\')">Download</button>'+
      '<button class="btn btn-ghost btn-sm" onclick="runTool()">Try Again</button>'+
      '</div>');
  },

  // ── GIF (uses web worker from same CDN for reliability) ──
  gif: async function(v){
    var files=v.images;
    var aiPrompt=(v.aiPrompt||'').trim();
    var delay=parseInt(v.delay)||500;
    var width=parseInt(v.width)||480;
    var imgs=[];

    if(aiPrompt){
      // AI generate frames
      var numFrames=Math.min(parseInt(v.aiFrames)||6,10);
      showLoading('AI generating '+numFrames+' frames...');
      for(var f=0;f<numFrames;f++){
        showLoading('Generating frame '+(f+1)+'/'+numFrames+'...');
        var framePrompt=aiPrompt+', frame '+(f+1)+' of '+numFrames+' animation sequence, step '+(f+1)+', no text';
        var url=IMG_GEN+encodeURIComponent(framePrompt)+'?width='+width+'&height='+width+'&nologo=true&seed='+(Date.now()+f*100);
        try{var img=await loadImage(url);imgs.push(img);}catch(e){showError('Frame '+(f+1)+' failed.');return;}
      }
    } else if(files&&files.length>=2){
      showLoading('Loading '+files.length+' frames...');
      for(var i=0;i<files.length;i++){
        var url=URL.createObjectURL(files[i]);
        var img=new Image();
        await new Promise(function(r,rej){img.onload=r;img.onerror=rej;img.src=url;});
        imgs.push(img);
      }
    } else {
      showError('Upload at least 2 images or enter an AI prompt.');return;
    }
    // Calculate height from first image
    var ratio=imgs[0].height/imgs[0].width;
    var height=Math.round(width*ratio);

    // Load gif.js from a reliable CDN
    if(!window.GIF){
      try{
        await loadScript('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js');
      } catch(e){
        showError('Could not load GIF library. Check your internet connection.');
        return;
      }
    }

    showLoading('Encoding GIF frames...');

    // gif.js requires a worker script - use blob URL to avoid CORS
    var workerScriptUrl = 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js';

    // Try to fetch worker script as text and create blob URL (avoids CORS)
    var workerBlobUrl = null;
    try {
      var workerRes = await fetch(workerScriptUrl);
      if (workerRes.ok) {
        var workerText = await workerRes.text();
        var workerBlob = new Blob([workerText], {type: 'application/javascript'});
        workerBlobUrl = URL.createObjectURL(workerBlob);
      }
    } catch(e){
      console.warn('Worker fetch failed, using direct URL:', e.message);
    }

    var gif = new GIF({
      workers: 2,
      quality: 10,
      width: width,
      height: height,
      workerScript: workerBlobUrl || workerScriptUrl
    });

    for(var i=0;i<imgs.length;i++){
      var canvas=document.createElement('canvas');
      canvas.width=width;canvas.height=height;
      var ctx=canvas.getContext('2d');
      ctx.drawImage(imgs[i],0,0,width,height);
      gif.addFrame(canvas,{delay:delay,copy:true});
    }

    await new Promise(function(resolve,reject){
      var timeout = setTimeout(function(){
        reject(new Error('GIF encoding timed out after 60s. Try fewer/smaller frames.'));
      }, 60000);

      gif.on('finished', function(blob){
        clearTimeout(timeout);
        if (workerBlobUrl) URL.revokeObjectURL(workerBlobUrl);
        var url = URL.createObjectURL(blob);
        window._lastBlobUrl = url;
        window._lastBlob = blob;
        showResult('<img src="' + url + '" alt="GIF">' +
          '<div class="result-actions">' +
          '<button class="btn btn-sm" onclick="downloadBlob(\'animation-8bfr.gif\')">⬇️ Download GIF</button>' +
          '</div>' +
          '<div style="font-size:0.75rem;color:rgba(168,85,247,0.7);margin-top:0.5rem;">' + width + '×' + height + ' • ' + files.length + ' frames • ' + (blob.size/1024).toFixed(1) + ' KB</div>');
        resolve();
      });

      gif.on('abort', function(){
        clearTimeout(timeout);
        reject(new Error('GIF encoding aborted'));
      });

      try {
        gif.render();
      } catch(e) {
        clearTimeout(timeout);
        reject(e);
      }
    });
  },

  // ── IMAGE RESIZER ──
  resizer: async function(v){
    var files=v.image;
    if(!files||!files[0]){showError('Upload an image first.');return;}
    var w=parseInt(v.w)||parseInt(document.getElementById('resizeW').value);
    var h=parseInt(v.h)||parseInt(document.getElementById('resizeH').value);
    if(!w||!h){showError('Pick a preset or enter width and height.');return;}

    showLoading('Resizing...');
    var url=URL.createObjectURL(files[0]);
    var img=new Image();
    await new Promise(function(r,rej){img.onload=r;img.onerror=rej;img.src=url;});
    var canvas=document.createElement('canvas');
    canvas.width=w;canvas.height=h;
    var ctx=canvas.getContext('2d');
    // Cover-fit: fill entire canvas, crop overflow
    var srcRatio=img.width/img.height,dstRatio=w/h;
    var sx=0,sy=0,sw=img.width,sh=img.height;
    if(srcRatio>dstRatio){sw=img.height*dstRatio;sx=(img.width-sw)/2;}
    else {sh=img.width/dstRatio;sy=(img.height-sh)/2;}
    ctx.drawImage(img,sx,sy,sw,sh,0,0,w,h);
    var dataUrl=canvas.toDataURL('image/png');
    window._lastImageUrl=dataUrl;
    // Get size
    var byteStr=atob(dataUrl.split(',')[1]);
    showResult('<img src="'+dataUrl+'" alt="Resized">'+
      '<div class="result-actions">'+
      '<button class="btn btn-sm" onclick="downloadImage(\'resized-'+w+'x'+h+'.png\')">⬇️ Download</button>'+
      '</div>'+
      '<div style="font-size:0.75rem;color:rgba(168,85,247,0.7);margin-top:0.5rem;">Resized to '+w+'×'+h+' • '+(byteStr.length/1024).toFixed(1)+' KB</div>');
  },

  // ── IMAGE CONVERTER ──
  converter: async function(v){
    var files=v.image;
    if(!files||!files[0]){showError('Upload an image first.');return;}
    var fmt=(v.format||'png').toLowerCase();
    var quality=(parseInt(v.quality)||90)/100;
    var scale=(parseInt(v.scale)||100)/100;

    showLoading('Converting...');
    var url=URL.createObjectURL(files[0]);
    var img=new Image();
    await new Promise(function(r,rej){img.onload=r;img.onerror=rej;img.src=url;});
    var canvas=document.createElement('canvas');
    canvas.width=Math.round(img.width*scale);
    canvas.height=Math.round(img.height*scale);
    var ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    var mime=fmt==='jpeg'?'image/jpeg':fmt==='webp'?'image/webp':'image/png';
    var ext=fmt==='jpeg'?'jpg':fmt;
    var blob=await new Promise(function(r){canvas.toBlob(r,mime,quality);});
    var outUrl=URL.createObjectURL(blob);
    window._lastBlobUrl=outUrl;
    window._lastBlob=blob;
    showResult('<img src="'+outUrl+'" alt="Converted">'+
      '<div class="result-actions">'+
      '<button class="btn btn-sm" onclick="downloadBlob(\'converted.'+ext+'\')">⬇️ Download</button>'+
      '</div>'+
      '<div style="font-size:0.75rem;color:rgba(168,85,247,0.7);margin-top:0.5rem;">'+ext.toUpperCase()+' • '+canvas.width+'×'+canvas.height+' • '+(blob.size/1024).toFixed(1)+' KB</div>');
  },

  // ── VIDEO TRIMMER (simple - uses HTMLVideoElement + MediaRecorder) ──
  videoCut: async function(v){
    var files=v.video;
    if(!files||!files[0]){showError('Upload a video first.');return;}

    showLoading('Loading video...');
    var videoUrl=URL.createObjectURL(files[0]);
    var video=document.createElement('video');
    video.src=videoUrl;
    video.muted=false;
    video.playsInline=true;
    await new Promise(function(r,rej){video.onloadedmetadata=r;video.onerror=rej;});
    var dur=video.duration;

    // Show visual timeline UI
    showResult(
      '<video id="trimPreview" src="'+videoUrl+'" controls playsinline style="width:100%;border-radius:8px;margin-bottom:.5rem;"></video>'+
      '<div style="padding:.5rem 0;">'+
      '<div style="font-size:.72rem;color:rgba(255,255,255,.5);margin-bottom:.3rem;">Drag sliders to select the part to keep:</div>'+
      '<div style="position:relative;height:40px;background:rgba(0,0,0,.3);border-radius:8px;overflow:hidden;margin-bottom:.3rem;">'+
        '<div id="trimHighlight" style="position:absolute;top:0;bottom:0;background:rgba(124,58,237,.3);border:2px solid #a855f7;border-radius:6px;"></div>'+
        '<input type="range" id="trimStartR" min="0" max="'+dur.toFixed(1)+'" step="0.1" value="0" style="position:absolute;top:0;left:0;right:0;height:40px;opacity:.5;pointer-events:auto;-webkit-appearance:none;background:transparent;">'+
        '<input type="range" id="trimEndR" min="0" max="'+dur.toFixed(1)+'" step="0.1" value="'+dur.toFixed(1)+'" style="position:absolute;top:0;left:0;right:0;height:40px;opacity:.5;pointer-events:auto;-webkit-appearance:none;background:transparent;">'+
      '</div>'+
      '<div style="display:flex;justify-content:space-between;font-size:.72rem;">'+
        '<span>Start: <b id="trimSV">0.0</b>s</span>'+
        '<span>Duration: <b id="trimDV">'+dur.toFixed(1)+'</b>s</span>'+
        '<span>End: <b id="trimEV">'+dur.toFixed(1)+'</b>s</span>'+
      '</div>'+
      '</div>'+
      '<button class="btn btn-primary" onclick="doTrim()" style="margin-top:.3rem;">Trim Video</button>'
    );

    // Wire up sliders
    var rs=document.getElementById('trimStartR');
    var re=document.getElementById('trimEndR');
    var hl=document.getElementById('trimHighlight');
    function updateHL(){
      var s=parseFloat(rs.value),e=parseFloat(re.value);
      if(e<s){re.value=s;e=s;}
      var pctL=(s/dur)*100,pctR=(e/dur)*100;
      hl.style.left=pctL+'%';hl.style.width=(pctR-pctL)+'%';
      document.getElementById('trimSV').textContent=s.toFixed(1);
      document.getElementById('trimEV').textContent=e.toFixed(1);
      document.getElementById('trimDV').textContent=(e-s).toFixed(1);
    }
    rs.oninput=function(){updateHL();document.getElementById('trimPreview').currentTime=parseFloat(rs.value);};
    re.oninput=function(){updateHL();document.getElementById('trimPreview').currentTime=parseFloat(re.value);};
    updateHL();

    // Trim function
    window.doTrim=async function(){
      var start=parseFloat(rs.value),end=parseFloat(re.value);
      if(end<=start){showError('End must be after start.');return;}
      showLoading('Trimming '+(end-start).toFixed(1)+'s of video...');
      var tv=document.createElement('video');tv.src=videoUrl;tv.muted=true;
      await new Promise(function(r){tv.onloadedmetadata=r;});
      var canvas=document.createElement('canvas');
      canvas.width=tv.videoWidth;canvas.height=tv.videoHeight;
      var ctx=canvas.getContext('2d');
      var cs=canvas.captureStream(30);
      try{var ac=new(window.AudioContext||window.webkitAudioContext)();var src=ac.createMediaElementSource(tv);var dest=ac.createMediaStreamDestination();src.connect(dest);src.connect(ac.destination);dest.stream.getAudioTracks().forEach(function(t){cs.addTrack(t);});}catch(e){}
      var chunks=[];var rec=new MediaRecorder(cs,{mimeType:'video/webm'});

      setTimeout(function(){rec.stop();speechSynthesis.cancel();},duration*1000);
    };

    // Preview voice button
    window.taPreviewVoice=function(){
      speechSynthesis.cancel();
      var utter=new SpeechSynthesisUtterance(_t);
      var voices=speechSynthesis.getVoices();
      var vi=parseInt(document.getElementById('taVoice').value)||0;
      if(voices[vi])utter.voice=voices[vi];
      utter.rate=parseFloat(document.getElementById('taRate').value)||1;
      speechSynthesis.speak(utter);
    };
  },

  // VOICE RECORDER
  voiceRec: async function(){
    try{
      var stream=await navigator.mediaDevices.getUserMedia({audio:true});
      var chunks=[];var rec=new MediaRecorder(stream);
      rec.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
      rec.onstop=function(){
        var blob=new Blob(chunks,{type:'audio/webm'});var url=URL.createObjectURL(blob);
        window._lastBlob=blob;window._lastBlobUrl=url;
        showResult('<audio src="'+url+'" controls style="width:100%;"></audio><div class="result-actions"><button class="btn btn-sm" onclick="downloadBlob(\'voice-8bfr.webm\')">Download</button></div><div style="font-size:.72rem;color:rgba(168,85,247,.7);margin-top:.3rem;">'+(blob.size/1024).toFixed(0)+' KB</div>');
      };
      window._voiceStart=Date.now();
      rec.start();
      showResult('<div style="text-align:center;padding:1rem;"><div style="font-size:2rem;color:#ef4444;margin-bottom:.3rem;">&#x1F534;</div><div style="font-size:1rem;color:#ef4444;font-weight:700;margin-bottom:.5rem;">Recording...</div><div id="voiceTimer" style="font-family:Bebas Neue;font-size:1.5rem;color:#fff;">0:00</div><button class="btn btn-primary" style="margin-top:.5rem;" onclick="window._voiceRec.stop();window._voiceStream.getTracks().forEach(function(t){t.stop();});clearInterval(window._voiceIv);">Stop Recording</button></div>');
      window._voiceRec=rec;window._voiceStream=stream;
      window._voiceIv=setInterval(function(){var s=Math.floor((Date.now()-window._voiceStart)/1000);var el=document.getElementById('voiceTimer');if(el)el.textContent=Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);},1000);
    }catch(e){showError('Microphone access denied: '+e.message);}
  },

  // LYRICS TRANSCRIBER (Whisper)
  transcribeAudio: async function(){
    var fileInput=document.getElementById('trFile');
    if(!fileInput||!fileInput.files||!fileInput.files[0]){showError('Upload an audio file first.');return;}
    var file=fileInput.files[0];
    if(file.size>25*1024*1024){showError('File too large. Max 25MB for transcription.');return;}
    var langMap={'Auto Detect':'auto','English':'en','Spanish':'es','French':'fr','German':'de','Portuguese':'pt','Japanese':'ja','Korean':'ko','Chinese':'zh'};
    var langSel=document.getElementById('trLang');
    var lang=langSel?langMap[langSel.value]||'auto':'auto';
    showLoading('Transcribing "'+file.name+'" with AI... This may take 15-30 seconds.');
    try{
      // Convert file to base64
      var base64=await new Promise(function(resolve,reject){
        var reader=new FileReader();
        reader.onload=function(){resolve(reader.result.split(',')[1]);};
        reader.onerror=function(){reject(new Error('File read failed'));};
        reader.readAsDataURL(file);
      });
      var res=await fetch('https://8bfr-api.vercel.app/api/transcribe',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({audio:base64,filename:file.name,language:lang})
      });
      var data=await res.json();
      if(data.error){showError('Transcription error: '+data.error);return;}
      if(!data.text){showError('No lyrics detected in audio.');return;}
      var html='<div style="font-weight:700;color:#4ade80;margin-bottom:.5rem;">Lyrics Transcribed!</div>';
      if(data.language)html+='<div style="font-size:.72rem;color:rgba(255,255,255,.4);margin-bottom:.5rem;">Language: '+data.language+(data.duration?' | Duration: '+Math.round(data.duration)+'s':'')+'</div>';
      html+='<pre style="white-space:pre-wrap;background:rgba(0,0,0,.3);padding:.75rem;border-radius:8px;font-size:.85rem;line-height:1.6;max-height:400px;overflow-y:auto;">'+esc(data.text)+'</pre>';
      html+='<div class="result-actions" style="margin-top:.5rem;"><button class="btn btn-sm" onclick="navigator.clipboard.writeText(document.querySelector(\'#mResult pre\').textContent);this.textContent=\'Copied!\';">Copy Lyrics</button>';
      html+='<button class="btn btn-sm" onclick="var b=new Blob([document.querySelector(\'#mResult pre\').textContent],{type:\'text/plain\'});var u=URL.createObjectURL(b);var a=document.createElement(\'a\');a.href=u;a.download=\'lyrics.txt\';a.click();">Download .txt</button></div>';
      showResult(html);
    }catch(e){showError('Error: '+e.message);}
  }
};

function bestVideoMime(){
  if(MediaRecorder.isTypeSupported('video/mp4'))return{mime:'video/mp4',ext:'mp4'};
  if(MediaRecorder.isTypeSupported('video/webm;codecs=vp9'))return{mime:'video/webm;codecs=vp9',ext:'webm'};
  if(MediaRecorder.isTypeSupported('video/webm'))return{mime:'video/webm',ext:'webm'};
  return{mime:'',ext:'webm'};
}

// FFmpeg.wasm for webm->mp4 conversion
var _ffmpegLoaded=false,_ffmpeg=null;
async function loadFFmpeg(){
  if(_ffmpegLoaded)return _ffmpeg;
  var script=document.createElement('script');
  script.src='https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.min.js';
  document.head.appendChild(script);
  await new Promise(function(r){script.onload=r;});
  var script2=document.createElement('script');
  script2.src='https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/util.min.js';
  document.head.appendChild(script2);
  await new Promise(function(r){script2.onload=r;});
  _ffmpeg=new FFmpeg.FFmpeg();
  await _ffmpeg.load({coreURL:'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js'});
  _ffmpegLoaded=true;return _ffmpeg;
}
async function convertToMp4(webmBlob,filename){
  try{
    var ff=await loadFFmpeg();
    var data=new Uint8Array(await webmBlob.arrayBuffer());
    await ff.writeFile('input.webm',data);
    await ff.exec(['-i','input.webm','-c:v','libx264','-preset','fast','-crf','23','-c:a','aac','-movflags','+faststart','output.mp4']);
    var out=await ff.readFile('output.mp4');
    var mp4Blob=new Blob([out.buffer],{type:'video/mp4'});
    var url=URL.createObjectURL(mp4Blob);
    var a=document.createElement('a');a.href=url;a.download=filename||'video-8bfr.mp4';document.body.appendChild(a);a.click();document.body.removeChild(a);
    return url;
  }catch(e){console.error('MP4 convert error:',e);return null;}
}
// Adds a convert button to any result area
function addMp4ConvertBtn(containerId,blobRef,filename){
  var el=document.getElementById(containerId);
  if(!el)el=document.querySelector('.result-actions');
  if(!el)return;
  var btn=document.createElement('button');btn.className='btn btn-sm';btn.textContent='Convert to MP4';
  btn.onclick=async function(){
    btn.textContent='Loading FFmpeg...';btn.disabled=true;
    try{
      await loadFFmpeg();btn.textContent='Converting...';
      var blob=window[blobRef]||window._lastBlob;
      var url=await convertToMp4(blob,filename);
      if(url)btn.textContent='MP4 Downloaded!';
      else btn.textContent='Convert failed';
    }catch(e){btn.textContent='Error: '+e.message;}
  };
  el.appendChild(btn);
}
function audioBufferToWav(buffer){
  var numChannels=buffer.numberOfChannels,sampleRate=buffer.sampleRate,format=1,bitDepth=16;
  var length=buffer.length*numChannels*(bitDepth/8);
  var out=new ArrayBuffer(44+length),view=new DataView(out);
  function writeString(offset,str){for(var i=0;i<str.length;i++)view.setUint8(offset+i,str.charCodeAt(i));}
  writeString(0,'RIFF');view.setUint32(4,36+length,true);writeString(8,'WAVE');
  writeString(12,'fmt ');view.setUint32(16,16,true);view.setUint16(20,format,true);
  view.setUint16(22,numChannels,true);view.setUint32(24,sampleRate,true);
  view.setUint32(28,sampleRate*numChannels*(bitDepth/8),true);
  view.setUint16(32,numChannels*(bitDepth/8),true);view.setUint16(34,bitDepth,true);
  writeString(36,'data');view.setUint32(40,length,true);
  var offset=44,channels=[];
  for(var i=0;i<numChannels;i++)channels.push(buffer.getChannelData(i));
  for(var i=0;i<buffer.length;i++){
    for(var ch=0;ch<numChannels;ch++){
      var sample=Math.max(-1,Math.min(1,channels[ch][i]));
      view.setInt16(offset,sample<0?sample*0x8000:sample*0x7FFF,true);
      offset+=2;
    }
  }
  return new Blob([out],{type:'audio/wav'});
}

async function audioBufferToWebm(buffer){
  var ac=new (window.AudioContext||window.webkitAudioContext)();
  var src=ac.createBufferSource();src.buffer=buffer;
  var dest=ac.createMediaStreamDestination();
  src.connect(dest);
  var chunks=[];
  var recorder=new MediaRecorder(dest.stream,{mimeType:'audio/webm'});
  recorder.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
  return new Promise(function(resolve){
    recorder.onstop=function(){resolve(new Blob(chunks,{type:'audio/webm'}));};
    recorder.start();src.start();
    setTimeout(function(){recorder.stop();src.stop();},buffer.duration*1000+100);
  });
}
