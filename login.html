<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — 8BFR Music Network</title>
  <link rel="icon" href="assets/images/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #07000f;
      color: #eae6ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem 3rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 10% 10%, rgba(124,58,237,.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 90%, rgba(168,85,247,.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(168,85,247,.22);
      border-radius: 20px;
      padding: 2rem 1.75rem 1.75rem;
      backdrop-filter: blur(12px);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.4rem;
    }
    .logo-text {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #fff 30%, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -.5px;
    }
    .logo-sub {
      font-size: .78rem;
      color: rgba(196,181,253,.6);
      margin-top: .15rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: .3rem;
    }
    .subtitle {
      text-align: center;
      font-size: .82rem;
      color: rgba(196,181,253,.65);
      margin-bottom: 1.5rem;
    }

    .field { margin-bottom: .9rem; }
    label {
      display: block;
      font-size: .76rem;
      font-weight: 600;
      color: rgba(196,181,253,.7);
      margin-bottom: .3rem;
    }
    input {
      width: 100%;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(168,85,247,.25);
      border-radius: 10px;
      padding: .65rem .85rem;
      color: #eae6ff;
      font-size: .9rem;
      outline: none;
      transition: border-color .18s;
      -webkit-appearance: none;
    }
    input::placeholder { color: rgba(196,181,253,.35); }
    input:focus { border-color: #a855f7; }

    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute;
      right: .75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(196,181,253,.5);
      cursor: pointer;
      font-size: .85rem;
      padding: 0;
    }

    /* message box */
    .msg {
      display: none;
      border-radius: 10px;
      padding: .7rem 1rem;
      font-size: .82rem;
      margin-bottom: 1rem;
      line-height: 1.5;
      font-weight: 500;
    }
    .msg.error   { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; display: block; }
    .msg.success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25); color: #86efac; display: block; }

    .submit-btn {
      width: 100%;
      padding: .85rem;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      font-size: .95rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity .18s, transform .12s;
      letter-spacing: .2px;
      margin-top: .4rem;
    }
    .submit-btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .submit-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .ghost-btn {
      width: 100%;
      padding: .65rem;
      border-radius: 10px;
      border: 1px solid rgba(168,85,247,.2);
      background: transparent;
      color: rgba(196,181,253,.65);
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .18s, color .18s;
      margin-top: .45rem;
    }
    .ghost-btn:hover { border-color: rgba(168,85,247,.5); color: #c4b5fd; }

    .divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 1.1rem 0;
      color: rgba(196,181,253,.3);
      font-size: .75rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(168,85,247,.15);
    }

    .signup-link {
      text-align: center;
      font-size: .82rem;
      color: rgba(196,181,253,.6);
    }
    .signup-link a {
      color: #a855f7;
      font-weight: 700;
      text-decoration: none;
    }
    .signup-link a:hover { text-decoration: underline; }

    .back-home {
      display: block;
      text-align: center;
      margin-top: .6rem;
      color: rgba(196,181,253,.5);
      font-size: .78rem;
      text-decoration: none;
    }
    .back-home:hover { color: #a855f7; }

    /* spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }

    @media (max-width: 440px) {
      .card { padding: 1.5rem 1.25rem 1.25rem; border-radius: 16px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-text">8BFR</div>
    <div class="logo-sub">Music Network</div>
  </div>

  <h1>Welcome Back</h1>
  <p class="subtitle">Sign in to your 8BFR account</p>

  <div id="msgBox" class="msg"></div>

  <div class="field">
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>

  <div class="field">
    <label for="password">Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
      <button type="button" class="pw-toggle" onclick="togglePw()" aria-label="Show password">👁</button>
    </div>
  </div>

  <button class="submit-btn" id="loginBtn" onclick="doLogin()">🔑 Log In</button>

  <button class="ghost-btn" onclick="doReset()">Forgot password?</button>

  <div class="divider">or</div>

  <div class="signup-link">
    Don't have an account? <a href="signup.html">Sign up free</a>
  </div>

  <button class="ghost-btn" style="margin-top:.65rem;" onclick="window.location.href='feed.html'">
    Continue as guest (limited access)
  </button>

  <a href="index.html" class="back-home">← Back to Home</a>
</div>

<script>
  const SUPABASE_URL = 'https://novbuvwpjnxwwvdekjhr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // If already logged in, redirect
  db.auth.getSession().then(({ data: { session } }) => {
    if (session) {
      const params = new URLSearchParams(window.location.search);
      window.location.href = params.get('return') || 'feed.html';
    }
  });

  function togglePw() {
    const inp = document.getElementById('password');
    const btn = document.querySelector('.pw-toggle');
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  }

  function showMsg(text, type) {
    const box = document.getElementById('msgBox');
    box.textContent = text;
    box.className = 'msg ' + type;
  }
  function clearMsg() {
    const box = document.getElementById('msgBox');
    box.className = 'msg';
    box.textContent = '';
  }

  async function doLogin() {
    clearMsg();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !email.includes('@')) return showMsg('⚠️ Please enter a valid email address.', 'error');
    if (!password) return showMsg('⚠️ Please enter your password.', 'error');

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Logging in…';

    try {
      const { data, error } = await db.auth.signInWithPassword({ email, password });
      if (error) throw error;

      // Award daily login points (silent fail ok)
      try {
        await db.rpc('add_algorithm_points', {
          p_user_id: data.user.id,
          p_action: 'daily_login',
          p_points: 5
        });
      } catch(e) {}

      // Ensure profile exists
      const { data: profile } = await db
        .from('profiles')
        .select('user_id')
        .eq('user_id', data.user.id)
        .maybeSingle();

      if (!profile) {
        await db.from('profiles').insert({
          user_id: data.user.id,
          email: email,
          username: email.split('@')[0].replace(/[^a-zA-Z0-9_]/g, '_'),
          role: 'fan',
          badges: ['fan'],
          coins: 50
        });
      }

      // Redirect
      // Enforce email verification before entering the site
      try {
        var vRes = await db.from('profiles').select('email_verified, display_name').eq('user_id', data.user.id).maybeSingle();
        if (vRes.data && vRes.data.email_verified === false) {
          window._pendingUid = data.user.id;
          window._pendingName = vRes.data.display_name || '';
          window._pendingEmail = email;
          await startLoginVerify();
          return;
        }
      } catch(e) { console.warn('verify check:', e); }
      const params = new URLSearchParams(window.location.search);
      window.location.href = params.get('return') || 'feed.html';

    } catch(err) {
      let m = err.message || 'Login failed.';
      if (m.includes('Invalid login') || m.includes('invalid_credentials')) m = 'Incorrect email or password.';
      if (m.includes('Email not confirmed')) m = 'Please confirm your email before logging in. Check your inbox.';
      showMsg('⚠️ ' + m, 'error');
      btn.disabled = false;
      btn.innerHTML = '🔑 Log In';
    }
  }

  async function doReset() {
    clearMsg();
    const email = document.getElementById('email').value.trim();
    if (!email || !email.includes('@')) {
      return showMsg('⚠️ Enter your email address first, then click Forgot password.', 'error');
    }
    try {
      const { error } = await db.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html'
      });
      if (error) throw error;
      showMsg('✅ Password reset email sent! Check your inbox (and spam folder).', 'success');
    } catch(e) {
      showMsg('⚠️ ' + e.message, 'error');
    }
  }

  // Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('loginBtn').disabled) doLogin();
  });

// ===== Inline email verification (for accounts that skipped the code) =====
async function startLoginVerify(){
  var box = document.getElementById('loginVerifyBox');
  if(!box){
    box = document.createElement('div');
    box.id='loginVerifyBox';
    box.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem;';
    box.innerHTML='<div style="background:#14081f;border:1px solid rgba(124,58,237,.5);border-radius:14px;padding:1.25rem;max-width:380px;width:100%;">'+
      '<h3 style="color:#eae6ff;margin-bottom:.4rem;">Verify your email</h3>'+
      '<p style="color:rgba(234,230,255,.7);font-size:.85rem;margin-bottom:.75rem;">Your account was never verified. We just sent a 6-digit code to your email. Enter it below to continue.</p>'+
      '<input type="text" id="lvCode" inputmode="numeric" maxlength="6" placeholder="6-digit code" style="width:100%;padding:.7rem;border-radius:10px;border:1px solid rgba(124,58,237,.4);background:rgba(0,0,0,.4);color:#fff;font-size:1.1rem;text-align:center;letter-spacing:.4em;">'+
      '<div id="lvMsg" style="font-size:.8rem;margin-top:.5rem;color:#fca5a5;"></div>'+
      '<button onclick="confirmLoginVerify()" style="width:100%;margin-top:.75rem;padding:.8rem;border:none;border-radius:10px;background:#7c3aed;color:#fff;font-weight:800;">Verify</button>'+
      '<button onclick="sendLoginCode()" style="width:100%;margin-top:.4rem;padding:.6rem;border:1px solid rgba(124,58,237,.4);border-radius:10px;background:transparent;color:#c084fc;font-weight:700;">Resend code</button>'+
      '</div>';
    document.body.appendChild(box);
  }
  box.style.display='flex';
  await sendLoginCode();
}
async function sendLoginCode(){
  var code = String(Math.floor(100000 + Math.random()*900000));
  try{
    await db.from('email_verifications').upsert({
      user_id: window._pendingUid,
      code: code,
      expires_at: new Date(Date.now()+15*60*1000).toISOString()
    },{onConflict:'user_id'});
  }catch(e){console.warn('code save:',e);}
  try{
    emailjs.init('xGcw1bDESG7obtHJh');
    await emailjs.send('service_or00bc8','template_appp21r',{
      to_name: window._pendingName || 'Member',
      to_email: window._pendingEmail,
      verification_code: code
    });
    var m=document.getElementById('lvMsg'); if(m){m.style.color='#34d399';m.textContent='Code sent! Check your inbox (and spam).';}
  }catch(e){
    var m2=document.getElementById('lvMsg'); if(m2){m2.style.color='#fbbf24';m2.textContent='Email may be delayed - check spam.';}
  }
}
async function confirmLoginVerify(){
  var entered=(document.getElementById('lvCode').value||'').trim();
  var msg=document.getElementById('lvMsg');
  if(entered.length<6){msg.style.color='#fca5a5';msg.textContent='Enter all 6 digits.';return;}
  try{
    var res=await db.from('email_verifications').select('code,expires_at').eq('user_id',window._pendingUid).single();
    if(res.error)throw res.error;
    if(res.data.code!==entered){msg.style.color='#fca5a5';msg.textContent='Wrong code. Try again.';return;}
    if(new Date(res.data.expires_at)<new Date()){msg.style.color='#fca5a5';msg.textContent='Code expired. Tap resend.';return;}
    await db.from('profiles').update({email_verified:true}).eq('user_id',window._pendingUid);
    await db.from('email_verifications').delete().eq('user_id',window._pendingUid);
    var params=new URLSearchParams(window.location.search);
    window.location.href=params.get('return')||'feed.html';
  }catch(e){msg.style.color='#fca5a5';msg.textContent='Error: '+(e.message||'unknown');}
}
</script>

</body>
</html>
