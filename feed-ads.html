<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Feed - 8BFR Music Network</title>
<link rel="stylesheet" href="styles.css">
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;color:#eae6ff;font-family:'Work Sans',system-ui,sans-serif;}

/* TABS */
.feed-tabs{position:fixed;top:60px;left:0;right:0;z-index:200;display:flex;gap:0;background:rgba(11,0,20,.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(124,58,237,.2);padding:0 8px;}
.feed-tab{flex:1;text-align:center;padding:10px 4px;font-size:.78rem;font-weight:600;color:rgba(234,230,255,.4);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;}
.feed-tab.active{color:#a855f7;border-bottom-color:#a855f7;}

/* FEED CONTAINER */
.feed-container{position:fixed;top:100px;bottom:0;left:0;right:0;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;}

/* FULL SCREEN POST */
.feed-post{scroll-snap-align:start;scroll-snap-stop:always;height:calc(100vh - 100px);position:relative;display:flex;align-items:center;justify-content:center;background:#000;}

.post-inner{width:100%;height:100%;position:relative;display:flex;flex-direction:column;}

/* Media fills screen */
.post-media-full{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#0b0014;}
.post-media-full img{width:100%;height:100%;object-fit:cover;}
.post-media-full video{width:100%;height:100%;object-fit:cover;}
.post-media-full iframe{width:100%;height:100%;border:none;}
.post-media-full audio{width:90%;max-width:400px;}
.post-no-media{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;font-size:1.1rem;line-height:1.7;text-align:center;background:linear-gradient(135deg,#0b0014,#1a0533);}

/* Bottom overlay */
.post-overlay{position:absolute;bottom:0;left:0;right:0;padding:16px 70px 16px 14px;background:linear-gradient(transparent,rgba(0,0,0,.85));z-index:10;}
.po-user{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;}
.po-avatar{width:36px;height:36px;border-radius:50%;background:#333;object-fit:cover;border:2px solid rgba(124,58,237,.4);flex-shrink:0;}
.po-name{font-weight:700;font-size:.9rem;color:#fff;}
.po-badge{display:inline-block;width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);vertical-align:middle;margin-left:3px;position:relative;}
.po-badge::after{content:'';position:absolute;top:3px;left:5px;width:4px;height:7px;border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(45deg);}
.po-time{font-size:.68rem;color:rgba(255,255,255,.4);}
.po-text{font-size:.85rem;color:rgba(255,255,255,.85);line-height:1.5;max-height:3em;overflow:hidden;margin-bottom:4px;}
.po-text.expanded{max-height:none;}
.po-more{color:#a855f7;font-size:.75rem;cursor:pointer;font-weight:600;}

/* Right side action buttons */
.post-actions-side{position:absolute;right:8px;bottom:80px;display:flex;flex-direction:column;gap:16px;z-index:10;align-items:center;}
.pa-btn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;background:none;border:none;padding:0;}
.pa-icon{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.pa-btn.liked .pa-icon{background:rgba(239,68,68,.3);}
.pa-count{font-size:.65rem;color:rgba(255,255,255,.7);font-weight:600;}

/* Inline ad */
.feed-ad{scroll-snap-align:start;height:calc(100vh - 100px);display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0b0014,#1a0533);padding:20px;}
.ad-card{max-width:350px;width:100%;background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.2);border-radius:16px;padding:20px;text-align:center;}
.ad-card img{width:100%;border-radius:10px;margin-bottom:12px;max-height:300px;object-fit:cover;}
.ad-label{font-size:.6rem;color:rgba(168,85,247,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.ad-title{font-size:1rem;font-weight:700;color:#eae6ff;margin-bottom:6px;}
.ad-desc{font-size:.82rem;color:rgba(168,85,247,.6);margin-bottom:12px;}
.ad-link{display:inline-block;padding:8px 20px;border-radius:8px;background:#7c3aed;color:#fff;text-decoration:none;font-size:.85rem;font-weight:600;}

.empty-feed{height:calc(100vh - 100px);display:flex;flex-direction:column;justify-content:center;align-items:center;color:#666;text-align:center;padding:20px;}
.empty-feed h2{color:#aaa;font-size:18px;margin:0 0 8px;}
</style>
</head>
<body>

<div class="feed-tabs" id="feedTabs">
<button class="feed-tab active" onclick="switchFeed('all',this)">All</button>
<button class="feed-tab" onclick="switchFeed('friends',this)">Friends</button>
<button class="feed-tab" onclick="switchFeed('following',this)">Following</button>
<button class="feed-tab" onclick="switchFeed('trending',this)">Trending</button>
</div>

<div class="feed-container" id="feedContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="scripts.js" defer></script>
<script>
var sb=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');

var currentUser=null,profileCache={},allPosts=[],currentFeed='all',loading=false,page=0,PAGE_SIZE=20;
var friendIds=[],followingIds=[],adData=[];

async function init(){
  var s=await sb.auth.getSession();
  if(s.data&&s.data.session)currentUser=s.data.session.user;

  // Preload friends and following lists
  if(currentUser){
    var fr=await sb.from('friends').select('user_id,friend_id').or('user_id.eq.'+currentUser.id+',friend_id.eq.'+currentUser.id).eq('status','accepted');
    (fr.data||[]).forEach(function(f){
      var fid=f.user_id===currentUser.id?f.friend_id:f.user_id;
      if(friendIds.indexOf(fid)===-1)friendIds.push(fid);
    });
    var fo=await sb.from('follows').select('following_id').eq('follower_id',currentUser.id);
    followingIds=(fo.data||[]).map(function(f){return f.following_id;});
  }

  // Load ads
  var adR=await sb.from('ads').select('*').eq('status','approved').limit(5);
  adData=adR.data||[];

  loadFeed();

  // Infinite scroll
  document.getElementById('feedContainer').addEventListener('scroll',function(){
    var el=this;
    if(el.scrollTop+el.clientHeight>=el.scrollHeight-500&&!loading){loadFeed();}
  });
}

function switchFeed(feed,btn){
  currentFeed=feed;page=0;allPosts=[];
  document.querySelectorAll('.feed-tab').forEach(function(t){t.classList.remove('active');});
  if(btn)btn.classList.add('active');
  document.getElementById('feedContainer').innerHTML='';
  loadFeed();
}

async function loadFeed(){
  if(loading)return;loading=true;

  var q=sb.from('posts').select('id,user_id,text,media,media_type,likes,shares,favorites,comment_count,created_at,is_private,hidden,pinned,reshared_from,algorithm_score')
    .eq('is_private',false).eq('hidden',false);

  if(currentFeed==='friends'){
    if(!friendIds.length){showEmpty('Add friends to see their posts here');loading=false;return;}
    q=q.in('user_id',friendIds);
  }else if(currentFeed==='following'){
    if(!followingIds.length){showEmpty('Follow artists to see their posts here');loading=false;return;}
    q=q.in('user_id',followingIds);
  }

  if(currentFeed==='trending'){
    q=q.order('algorithm_score',{ascending:false,nullsFirst:false});
  }
  q=q.order('created_at',{ascending:false}).range(page*PAGE_SIZE,(page+1)*PAGE_SIZE-1);

  var r=await q;
  var posts=r.data||[];
  if(!posts.length&&page===0){showEmpty('No posts yet');loading=false;return;}

  // Fetch all profiles for these posts
  var uids=[...new Set(posts.map(function(p){return p.user_id;}).filter(Boolean))];
  var needFetch=uids.filter(function(u){return !profileCache[u];});
  if(needFetch.length){
    var pr=await sb.from('profiles').select('user_id,username,display_name,avatar_url,verified_artist');
    if(pr.data){
      pr.data.forEach(function(p){profileCache[p.user_id]=p;});
    }
  }

  allPosts=allPosts.concat(posts);
  renderPosts(posts,page===0);
  page++;
  loading=false;
}

function renderPosts(posts,replace){
  var container=document.getElementById('feedContainer');
  if(replace)container.innerHTML='';

  posts.forEach(function(post,i){
    var globalIdx=allPosts.length-posts.length+i;
    var profile=profileCache[post.user_id]||{};
    var name=profile.display_name||profile.username||'User';
    var avatar=profile.avatar_url||'';
    var verified=profile.verified_artist||false;
    var time=timeAgo(post.created_at);

    // Insert ad every 5 posts
    if(globalIdx>0&&globalIdx%5===0&&adData.length){
      var ad=adData[Math.floor(Math.random()*adData.length)];
      var adDiv=document.createElement('div');
      adDiv.className='feed-ad';
      adDiv.innerHTML='<div class="ad-card">'+
        '<div class="ad-label">Sponsored</div>'+
        (ad.image_url?'<img src="'+esc(ad.image_url)+'" alt="Ad">':'')+
        '<div class="ad-title">'+esc(ad.title||'')+'</div>'+
        '<div class="ad-desc">'+esc(ad.description||ad.content||'')+'</div>'+
        (ad.link_url?'<a href="'+esc(ad.link_url)+'" target="_blank" class="ad-link">Learn More</a>':'')+
        '</div>';
      container.appendChild(adDiv);
    }

    // Build media
    var mediaHtml='';
    var hasMedia=false;
    if(post.media&&(post.media_type==='photo'||post.media_type==='image')){
      mediaHtml='<img src="'+esc(post.media)+'" alt="" loading="lazy">';
      hasMedia=true;
    }else if(post.media&&post.media_type==='video'){
      var yt=post.media.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      if(yt){
        mediaHtml='<iframe src="https://www.youtube.com/embed/'+yt[1]+'?autoplay=0&rel=0" allowfullscreen></iframe>';
      }else{
        mediaHtml='<video src="'+esc(post.media)+'" controls playsinline preload="none"></video>';
      }
      hasMedia=true;
    }else if(post.media&&post.media_type==='audio'){
      mediaHtml='<audio src="'+esc(post.media)+'" controls preload="none"></audio>';
      hasMedia=true;
    }

    var textContent=post.text||'';
    var isLong=textContent.length>120;

    var div=document.createElement('div');
    div.className='feed-post';
    div.innerHTML='<div class="post-inner">'+
      // Media or text-only display
      (hasMedia
        ?'<div class="post-media-full">'+mediaHtml+'</div>'
        :'<div class="post-no-media"><div>'+esc(textContent)+'</div></div>')+

      // Bottom overlay with user info and text
      '<div class="post-overlay">'+
        '<div class="po-user" onclick="location.href=\'profile.html?id='+post.user_id+'\'">'+
          (avatar?'<img class="po-avatar" src="'+esc(avatar)+'" alt="" onerror="this.style.background=\'#333\';this.src=\'\'">':'<div class="po-avatar" style="background:#333;"></div>')+
          '<div><span class="po-name">'+esc(name)+(verified?'<span class="po-badge"></span>':'')+'</span> <span class="po-time">'+time+'</span></div>'+
        '</div>'+
        (hasMedia&&textContent?'<div class="po-text" id="pt-'+post.id+'">'+esc(isLong?textContent.substring(0,120)+'...':textContent)+'</div>'+
          (isLong?'<span class="po-more" onclick="expandText(\''+post.id+'\',\''+esc(textContent.replace(/'/g,"")).replace(/\n/g,' ')+'\')">more</span>':'')
        :'')+
      '</div>'+

      // Right side action buttons
      '<div class="post-actions-side">'+
        '<button class="pa-btn" onclick="likePost(\''+post.id+'\',this)"><div class="pa-icon">&#10084;</div><span class="pa-count">'+(post.likes||0)+'</span></button>'+
        '<button class="pa-btn" onclick="location.href=\'post.html?id='+post.id+'\'"><div class="pa-icon">&#128172;</div><span class="pa-count">'+(post.comment_count||0)+'</span></button>'+
        '<button class="pa-btn" onclick="sharePost(\''+post.id+'\')"><div class="pa-icon">&#128279;</div><span class="pa-count">Share</span></button>'+
      '</div>'+
    '</div>';

    container.appendChild(div);
  });

  setupMediaObserver();
}

function expandText(id,fullText){
  var el=document.getElementById('pt-'+id);
  if(el){el.textContent=fullText;el.classList.add('expanded');}
  var more=el?el.nextElementSibling:null;
  if(more)more.style.display='none';
}

function showEmpty(msg){
  document.getElementById('feedContainer').innerHTML='<div class="empty-feed"><h2>'+msg+'</h2></div>';
}

// Auto-pause media when scrolled away
function setupMediaObserver(){
  var observer=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      var media=entry.target.querySelectorAll('audio,video');
      media.forEach(function(m){if(!entry.isIntersecting&&!m.paused)m.pause();});
    });
  },{root:document.getElementById('feedContainer'),threshold:0.5});
  document.querySelectorAll('.feed-post').forEach(function(p){observer.observe(p);});
}

async function likePost(id,btn){
  if(!currentUser){location.href='login.html';return;}
  btn.classList.toggle('liked');
  var span=btn.querySelector('.pa-count');
  var count=parseInt(span.textContent)||0;
  if(btn.classList.contains('liked')){
    span.textContent=count+1;
    sb.from('post_likes').upsert({post_id:id,user_id:currentUser.id}).catch(function(){});
    sb.from('posts').update({likes:count+1}).eq('id',id).catch(function(){});
  }else{
    span.textContent=Math.max(0,count-1);
    sb.from('post_likes').delete().match({post_id:id,user_id:currentUser.id}).catch(function(){});
    sb.from('posts').update({likes:Math.max(0,count-1)}).eq('id',id).catch(function(){});
  }
}

async function sharePost(id){
  var url=location.origin+'/post.html?id='+id;
  if(navigator.share){try{await navigator.share({title:'8BFR Post',url:url});}catch(e){}}
  else{navigator.clipboard.writeText(url).then(function(){alert('Link copied!');}).catch(function(){});}
}

function timeAgo(d){var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

init();
</script>
</body>
</html>
