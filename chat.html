<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Chat — 8BFR Music Network</title>
  <link rel="icon" href="assets/images/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(#0b0014,#000);color:#eae6ff;min-height:100vh;display:flex;flex-direction:column;padding-bottom:72px;}
    .header{background:rgba(12,4,26,.95);border-bottom:1px solid rgba(124,58,237,.4);padding:.9rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
    .header h1{font-size:1.1rem;font-weight:800;color:#eae6ff;}
    .online-count{font-size:.75rem;color:#34d399;font-weight:600;}
    .room-tabs{display:flex;gap:0;border-bottom:1px solid rgba(124,58,237,.3);background:rgba(12,4,26,.8);overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
    .room-tabs::-webkit-scrollbar{display:none;}
    .room-tab{padding:.55rem .9rem;font-size:.8rem;font-weight:600;color:rgba(234,230,255,.5);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;cursor:pointer;white-space:nowrap;transition:all .2s;}
    .room-tab.active{color:#a855f7;border-bottom-color:#a855f7;}
    .chat-wrap{flex:1;display:flex;flex-direction:column;max-width:800px;width:100%;margin:0 auto;padding:0;}
    .messages{flex:1;overflow-y:auto;padding:.75rem 1rem;display:flex;flex-direction:column;gap:.4rem;min-height:0;}
    .msg{display:flex;gap:.55rem;align-items:flex-start;animation:fadeIn .2s ease;}
    .msg.own{flex-direction:row-reverse;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
    .msg-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;overflow:hidden;}
    .msg-avatar img{width:100%;height:100%;object-fit:cover;}
    .msg-body{max-width:72%;display:flex;flex-direction:column;gap:.15rem;}
    .msg.own .msg-body{align-items:flex-end;}
    .msg-name{font-size:.68rem;color:#a855f7;font-weight:700;}
    .msg-name .role-badge{font-size:.6rem;padding:.05rem .3rem;border-radius:3px;font-weight:800;margin-left:.25rem;}
    .rb-owner{background:rgba(245,158,11,.2);color:#f59e0b;border:1px solid rgba(245,158,11,.4);}
    .rb-cofounder{background:rgba(192,132,252,.2);color:#c084fc;border:1px solid rgba(192,132,252,.4);}
    .rb-admin{background:rgba(124,58,237,.2);color:#a855f7;border:1px solid rgba(124,58,237,.4);}
    .rb-mod{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.3);}
    .msg-bubble{padding:.45rem .75rem;border-radius:16px;border-top-left-radius:4px;font-size:.88rem;line-height:1.45;word-break:break-word;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.2);}
    .msg.own .msg-bubble{background:rgba(124,58,237,.3);border-color:rgba(124,58,237,.5);border-top-left-radius:16px;border-top-right-radius:4px;}
    .msg-time{font-size:.62rem;color:rgba(168,85,247,.4);}
    .msg.hidden-msg .msg-bubble{opacity:.35;font-style:italic;}
    .msg.hidden-msg .msg-bubble::before{content:'[hidden] ';}
    .system-msg{text-align:center;font-size:.72rem;color:rgba(168,85,247,.45);padding:.25rem 0;}
    .muted-notice{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:.65rem 1rem;margin:.5rem 1rem;font-size:.82rem;color:#fca5a5;text-align:center;}
    .input-bar{background:rgba(12,4,26,.97);border-top:1px solid rgba(124,58,237,.3);padding:.65rem 1rem;display:flex;gap:.5rem;align-items:flex-end;}
    .input-bar textarea{flex:1;background:rgba(18,3,39,.8);border:1px solid rgba(124,58,237,.35);border-radius:12px;color:#eae6ff;padding:.5rem .8rem;font-size:.9rem;resize:none;outline:none;font-family:inherit;line-height:1.4;max-height:100px;min-height:38px;}
    .input-bar textarea:focus{border-color:#a855f7;}
    .send-btn{background:#7c3aed;border:none;color:#fff;padding:.5rem .9rem;border-radius:12px;cursor:pointer;font-size:1rem;flex-shrink:0;transition:all .2s;}
    .send-btn:hover{background:#6d28d9;}
    .send-btn:disabled{opacity:.4;cursor:not-allowed;}
    .login-gate{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;gap:1rem;}
    .login-gate h2{font-size:1.2rem;font-weight:800;}
    .login-gate p{font-size:.9rem;color:#a855f7;opacity:.8;}
    .login-gate a{display:inline-block;background:#7c3aed;color:#fff;text-decoration:none;padding:.6rem 1.5rem;border-radius:10px;font-weight:700;margin-top:.5rem;}
    .spinner{width:28px;height:28px;border:3px solid rgba(124,58,237,.2);border-top-color:#a855f7;border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .scroll-bottom{position:fixed;bottom:130px;right:1.25rem;background:#7c3aed;border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:1rem;cursor:pointer;display:none;box-shadow:0 4px 12px rgba(0,0,0,.5);z-index:10;}
    .ctx-menu{position:fixed;z-index:9999;background:rgba(14,4,30,.98);border:1px solid rgba(124,58,237,.5);border-radius:10px;padding:.4rem 0;min-width:150px;box-shadow:0 8px 24px rgba(0,0,0,.7);display:none;}
    .ctx-item{padding:.45rem .9rem;font-size:.82rem;cursor:pointer;color:#eae6ff;transition:background .15s;}
    .ctx-item:hover{background:rgba(124,58,237,.2);}
    .ctx-item.danger{color:#f87171;}
  </style>
</head>
<body>

<div class="header">
  <h1>💬 Community Chat</h1>
  <span class="online-count" id="onlineCount">🟢 Loading...</span>
</div>

<div class="room-tabs">
  <button class="room-tab active" onclick="switchRoom('general',this)">🌐 General</button>
  <button class="room-tab" onclick="switchRoom('music',this)">🎵 Music Talk</button>
  <button class="room-tab" onclick="switchRoom('beats',this)">🎚️ Beat Lab</button>
  <button class="room-tab" onclick="switchRoom('collab',this)">🤝 Collab</button>
  <button class="room-tab" onclick="switchRoom('hype',this)">🔥 Hype</button>
</div>

<div class="chat-wrap">
  <div id="loadingDiv" style="flex:1;"><div class="spinner"></div></div>
  <div id="loginGate" class="login-gate" style="display:none;">
    <div style="font-size:3rem;">💬</div>
    <h2>Join the Conversation</h2>
    <p>Log in to chat with the 8BFR community</p>
    <a href="login.html?return=chat.html">Log In</a>
    <a href="signup.html" style="background:transparent;border:1px solid rgba(124,58,237,.5);color:#a855f7;margin-top:.25rem;">Sign Up Free</a>
  </div>
  <div id="mutedNotice" class="muted-notice" style="display:none;">🔇 You are currently muted in chat.</div>
  <div id="messages" class="messages" style="display:none;"></div>
  <div id="errorBar" style="display:none;background:rgba(239,68,68,.15);border-top:1px solid rgba(239,68,68,.3);padding:.45rem 1rem;font-size:.8rem;color:#fca5a5;text-align:center;"></div>
  <div id="inputArea" class="input-bar" style="display:none;">
    <textarea id="msgInput" placeholder="Say something…" rows="1" maxlength="500"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
  </div>
</div>

<button class="scroll-bottom" id="scrollBtn" onclick="scrollToBottom(true)" title="Scroll to latest">↓</button>

<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item danger" id="ctxHide" onclick="ctxAction('hide')">🙈 Hide Message</div>
  <div class="ctx-item" id="ctxUnhide" onclick="ctxAction('unhide')" style="display:none;">👁️ Unhide Message</div>
  <div class="ctx-item danger" id="ctxMute" onclick="ctxAction('mute')">🔇 Mute User</div>
  <div class="ctx-item danger" id="ctxKick" onclick="ctxAction('kick')">👢 Kick from Chat</div>
  <div class="ctx-item" onclick="closeCtx()">Cancel</div>
</div>

<script>
const SB = window.supabase.createClient(
  'https://novbuvwpjnxwwvdekjhr.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0'
);

let currentUser = null, currentProfile = null, currentRoom = 'general';
let channel = null, presenceChannel = null;
let isStaff = false, isMuted = false;
let ctxTarget = null;

const ROLE_BADGES = {
  owner:     '<span class="role-badge rb-owner">👑 Owner</span>',
  'co-owner':'<span class="role-badge rb-cofounder">🎖️ Co-Owner</span>',
  cofounder: '<span class="role-badge rb-cofounder">🎖️ Co-Founder</span>',
  admin:     '<span class="role-badge rb-admin">🛡️ Admin</span>',
  mod:       '<span class="role-badge rb-mod">🟢 Mod</span>',
};

async function init() {
  try {
    const { data: { session } } = await SB.auth.getSession();
    document.getElementById('loadingDiv').style.display = 'none';
    if (!session) { document.getElementById('loginGate').style.display = 'flex'; return; }
    currentUser = session.user;
    const { data: profile } = await SB.from('profiles').select('*').eq('user_id', currentUser.id).single();
    currentProfile = profile || { username: currentUser.email?.split('@')[0] || 'User', role: 'fan' };
    isStaff = ['owner','co-owner','cofounder','admin','mod'].includes(currentProfile.role);
    const { data: mute } = await SB.from('chat_mutes').select('expires_at').eq('user_id', currentUser.id).maybeSingle();
    isMuted = !!mute && (!mute.expires_at || new Date(mute.expires_at) > new Date());
    if (isMuted) document.getElementById('mutedNotice').style.display = 'block';
    document.getElementById('messages').style.display = 'flex';
    document.getElementById('inputArea').style.display = isMuted ? 'none' : 'flex';
    await loadMessages();
    subscribeToRoom();
    setupPresence();
  } catch(e) {
    document.getElementById('loadingDiv').innerHTML = '<p style="color:#ef4444;text-align:center;padding:2rem;">Error: ' + e.message + '</p>';
  }
}

// ══════════════════════════════════════════════════════
// ★ FIXED: loadMessages — no foreign key join needed
// ══════════════════════════════════════════════════════
async function loadMessages() {
  const el = document.getElementById('messages');
  try {
    // Step 1: Load messages WITHOUT profiles join
    const { data: msgs, error } = await SB.from('chat_messages')
      .select('id,user_id,message,created_at,hidden')
      .eq('room', currentRoom)
      .order('created_at', { ascending: true })
      .limit(80);
    if (error) throw error;

    // Step 2: Fetch profiles separately
    const uids = [...new Set((msgs || []).map(m => m.user_id).filter(Boolean))];
    const profileMap = {};
    if (uids.length) {
      const { data: profiles } = await SB.from('profiles')
        .select('user_id,username,display_name,avatar_url,role')
        .in('user_id', uids);
      if (profiles) profiles.forEach(p => { profileMap[p.user_id] = p; });
    }

    // Step 3: Attach profiles and render
    el.innerHTML = '';
    (msgs || []).forEach(m => {
      if (m.hidden && !isStaff) return;
      m.profiles = profileMap[m.user_id] || {};
      el.appendChild(buildMsg(m));
    });
    scrollToBottom(false);
  } catch(e) {
    el.innerHTML = '<p style="color:#ef4444;padding:1rem;text-align:center;">Error loading messages: ' + e.message + '</p>';
  }
}

function buildMsg(m) {
  const isOwn = currentUser && m.user_id === currentUser.id;
  const p = m.profiles || {};
  const name = esc(p.display_name || p.username || 'User');
  const roleBadge = ROLE_BADGES[p.role] || '';
  const avatarHtml = p.avatar_url
    ? '<img src="'+p.avatar_url+'" onerror="this.parentNode.textContent=\'👤\'">'
    : (name.charAt(0) || '?');
  const div = document.createElement('div');
  div.className = 'msg' + (isOwn ? ' own' : '') + (m.hidden ? ' hidden-msg' : '');
  div.dataset.id = m.id; div.dataset.uid = m.user_id; div.dataset.name = name;
  div.innerHTML =
    '<div class="msg-avatar">' + avatarHtml + '</div>' +
    '<div class="msg-body">' +
    (!isOwn ? '<div class="msg-name"><a href="profile.html?id='+m.user_id+'" style="color:inherit;text-decoration:none;">'+name+'</a>'+roleBadge+'</div>' : '') +
    '<div class="msg-bubble">' + esc(m.message) + '</div>' +
    '<div class="msg-time">' + ago(m.created_at) + '</div>' +
    '</div>';
  if (isStaff && !isOwn) {
    div.addEventListener('contextmenu', e => { e.preventDefault(); openCtx(e, m.id, m.user_id, name, !!m.hidden); });
    div.addEventListener('pointerdown', e => {
      const t = setTimeout(() => openCtx(e, m.id, m.user_id, name, !!m.hidden), 600);
      div.addEventListener('pointerup', () => clearTimeout(t), { once:true });
      div.addEventListener('pointermove', () => clearTimeout(t), { once:true });
    });
  }
  return div;
}

function subscribeToRoom() {
  if (channel) SB.removeChannel(channel);
  channel = SB.channel('chat:' + currentRoom)
    .on('broadcast', { event: 'INSERT' }, async (payload) => {
      const m = payload.payload; if (!m) return;
      if (m.hidden && !isStaff) return;
      const { data: p } = await SB.from('profiles').select('username,display_name,avatar_url,role').eq('user_id', m.user_id).single();
      m.profiles = p || {};
      appendMessage(m);
    })
    .on('broadcast', { event: 'UPDATE' }, (payload) => {
      const m = payload.payload; if (!m) return;
      const existing = document.querySelector('.msg[data-id="'+m.id+'"]');
      if (!existing) return;
      if (m.hidden && !isStaff) existing.remove();
      else existing.classList.toggle('hidden-msg', !!m.hidden);
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages', filter: 'room=eq.'+currentRoom }, async (payload) => {
      const m = payload.new;
      if (m.hidden && !isStaff) return;
      // Avoid duplicates from broadcast
      if (document.querySelector('.msg[data-id="'+m.id+'"]')) return;
      const { data: p } = await SB.from('profiles').select('username,display_name,avatar_url,role').eq('user_id', m.user_id).single();
      m.profiles = p || {};
      appendMessage(m);
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'chat_messages', filter: 'room=eq.'+currentRoom }, (payload) => {
      const existing = document.querySelector('.msg[data-id="'+payload.new.id+'"]');
      if (!existing) return;
      if (payload.new.hidden && !isStaff) existing.remove();
      else existing.classList.toggle('hidden-msg', !!payload.new.hidden);
    })
    .subscribe();
}

function appendMessage(m) {
  const el = document.getElementById('messages'); if (!el) return;
  el.appendChild(buildMsg(m));
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 100;
  if (atBottom) scrollToBottom(false);
  else document.getElementById('scrollBtn').style.display = 'block';
}

function setupPresence() {
  if (presenceChannel) SB.removeChannel(presenceChannel);
  presenceChannel = SB.channel('chat-presence-' + currentRoom);
  presenceChannel
    .on('presence', { event: 'sync' }, () => {
      const state = presenceChannel.presenceState();
      const count = Object.keys(state).length;
      document.getElementById('onlineCount').textContent = '🟢 ' + count + ' online';
    })
    .subscribe(async (status) => {
      if (status === 'SUBSCRIBED') await presenceChannel.track({ user_id: currentUser.id });
    });
}

const EDGE_BASE = 'https://novbuvwpjnxwwvdekjhr.supabase.co/functions/v1';

async function sendMsg() {
  if (isMuted) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !currentUser) return;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true; input.value = ''; autoResize(input);
  try {
    const { data: { session } } = await SB.auth.getSession();
    if (!session) throw new Error('Not logged in');
    const res = await fetch(EDGE_BASE + '/chat-send', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + session.access_token,
        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0',
      },
      body: JSON.stringify({ room: currentRoom, message: text }),
    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 429) { input.value = text; autoResize(input); showRateLimit(data.retry_after_ms ?? 3000); return; }
      throw new Error(data.error || 'HTTP ' + res.status);
    }
  } catch(e) {
    // Fallback: insert directly if Edge Function not deployed
    try {
      const { error } = await SB.from('chat_messages').insert({ user_id: currentUser.id, room: currentRoom, message: text });
      if (error) throw error;
    } catch(e2) {
      input.value = text; autoResize(input); showSendError(e2.message || e.message);
    }
  } finally { btn.disabled = false; input.focus(); }
}

let _rlTimer = null;
function showRateLimit(ms) {
  const btn = document.getElementById('sendBtn');
  const end = Date.now() + ms;
  if (_rlTimer) clearInterval(_rlTimer);
  _rlTimer = setInterval(() => {
    const left = Math.ceil((end - Date.now()) / 1000);
    if (left <= 0) { clearInterval(_rlTimer); btn.textContent = '➤'; btn.disabled = false; }
    else { btn.textContent = left + 's'; btn.disabled = true; }
  }, 100);
}

function showSendError(msg) {
  const bar = document.getElementById('errorBar');
  if (bar) { bar.textContent = '⚠️ ' + msg; bar.style.display = 'block'; setTimeout(() => bar.style.display = 'none', 4000); }
}

window.switchRoom = function(room, btn) {
  currentRoom = room;
  document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('messages').innerHTML = '';
  loadMessages();
  subscribeToRoom();
  if (presenceChannel) { SB.removeChannel(presenceChannel); setupPresence(); }
};

// ── STAFF CONTEXT MENU ──
function openCtx(e, msgId, userId, name, isHidden) {
  ctxTarget = { msgId, userId, name, isHidden };
  const menu = document.getElementById('ctxMenu');
  document.getElementById('ctxHide').style.display = isHidden ? 'none' : 'block';
  document.getElementById('ctxUnhide').style.display = isHidden ? 'block' : 'none';
  menu.style.display = 'block';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 170) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 160) + 'px';
  document.addEventListener('click', closeCtx, { once: true });
}
function closeCtx() { document.getElementById('ctxMenu').style.display = 'none'; ctxTarget = null; }

window.ctxAction = async function(action) {
  if (!ctxTarget) return;
  const { msgId, userId, name, isHidden } = ctxTarget;
  closeCtx();
  if (action === 'hide') {
    const reason = prompt('Reason for hiding this message:');
    if (!reason) return;
    await SB.from('chat_messages').update({ hidden: true }).eq('id', msgId);
    await logChatAction('hide_msg', userId, msgId, reason, null);
  } else if (action === 'unhide') {
    await SB.from('chat_messages').update({ hidden: false }).eq('id', msgId);
    await logChatAction('unhide_msg', userId, msgId, 'Staff unhid message', null);
  } else if (action === 'mute') {
    const reason = prompt('Reason for muting "' + name + '":');
    if (!reason) return;
    const h = parseInt(prompt('Mute duration in hours (0 = permanent):') || '0') || 0;
    const expires = h > 0 ? new Date(Date.now() + h * 3600000).toISOString() : null;
    await SB.from('chat_mutes').upsert({ user_id: userId, muted_by: currentUser.id, reason, expires_at: expires }, { onConflict: 'user_id' });
    await logChatAction('mute', userId, null, reason, h || null);
    showSendError('✓ ' + name + ' muted' + (h ? ' for ' + h + 'h' : ' permanently') + '.');
  } else if (action === 'kick') {
    const reason = prompt('Reason for kicking "' + name + '":');
    if (!reason) return;
    try { await SB.from('chat_kicks').insert({ user_id: userId, kicked_by: currentUser.id, reason }); } catch(e) {}
    await logChatAction('kick', userId, null, reason, null);
    await SB.channel('chat-moderation').send({ type: 'broadcast', event: 'kick', payload: { user_id: userId } });
    showSendError('✓ Kick logged for ' + name + '.');
  }
};

async function logChatAction(action, targetUserId, messageId, reason, durationHours) {
  const role = currentProfile?.role || 'mod';
  const expires = durationHours ? new Date(Date.now() + durationHours * 3600000).toISOString() : null;
  await Promise.allSettled([
    SB.from('chat_moderation_log').insert({ performed_by: currentUser.id, performed_role: role, action, target_user_id: targetUserId || null, message_id: messageId || null, room: currentRoom, reason, duration_hours: durationHours || null, expires_at: expires }),
    SB.from('admin_actions').insert({ performed_by: currentUser.id, performed_by_role: role, action_type: 'chat_' + action, target_type: messageId ? 'chat_message' : 'user', target_id: String(messageId || targetUserId || ''), target_user_id: targetUserId || null, reason, reviewed_by_owner: false })
  ]);
}

SB.channel('chat-moderation').on('broadcast', { event: 'kick' }, (payload) => {
  if (currentUser && payload.payload?.user_id === currentUser.id) { alert('You have been kicked from the chat.'); location.href = 'index.html'; }
}).subscribe();

function scrollToBottom(smooth) {
  const el = document.getElementById('messages');
  el.scrollTo({ top: el.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
  document.getElementById('scrollBtn').style.display = 'none';
}
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
document.getElementById('messages')?.addEventListener('scroll', function() {
  const atBottom = this.scrollHeight - this.scrollTop - this.clientHeight < 80;
  document.getElementById('scrollBtn').style.display = atBottom ? 'none' : 'block';
});
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
function ago(d) { if (!d) return ''; const m = Math.floor((Date.now() - new Date(d).getTime()) / 60000); if (m < 1) return 'now'; if (m < 60) return m + 'm ago'; const h = Math.floor(m/60); if (h < 24) return h + 'h ago'; return new Date(d).toLocaleDateString(); }

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();

<!-- Token refresh patch -->
<script>
(function(){
  setInterval(async()=>{
    try{const{error}=await SB.auth.refreshSession();
    if(error){const{data:{session}}=await SB.auth.getSession();if(!session)location.href='login.html?return=chat.html';}}catch(e){}
  },600000);
  SB.auth.onAuthStateChange((event)=>{if(event==='SIGNED_OUT')location.href='login.html?return=chat.html';});
  document.addEventListener('visibilitychange',async()=>{
    if(document.visibilityState==='visible'){setTimeout(async()=>{try{await SB.auth.refreshSession();if(typeof subscribeToRoom==='function')subscribeToRoom();if(typeof setupPresence==='function')setupPresence();}catch(e){}},500);}
  });
})();
</script>
