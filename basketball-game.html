<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Court Shot -- 8BFR Games</title><link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>*{margin:0;padding:0;box-sizing:border-box;}
#bubbleStack,#_8bfr_copyright,.bubble-row,#carrieWrap,#avatarSwitcher,.global-avatar,.avatar-wrap,#pageUpBtn{display:none!important;}
body{font-family:'Work Sans',sans-serif;background:#1a0a00;color:#fff;height:100vh;overflow:hidden;touch-action:none;}
.hdr{position:fixed;top:0;left:0;right:70px;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:.15rem .5rem;background:rgba(0,0,0,.9);height:24px;}.hdr a{color:#f97316;text-decoration:none;font-weight:800;font-size:1rem;}.hdr h1{font-family:'Bebas Neue',cursive;font-size:1rem;color:#f97316;}
.scores{position:fixed;top:24px;left:0;right:70px;display:flex;justify-content:space-around;padding:.15rem;background:rgba(0,0,0,.85);font-size:.7rem;height:22px;align-items:center;z-index:99;}
.area{position:fixed;top:46px;left:0;right:0;bottom:44px;display:flex;align-items:flex-end;justify-content:center;}
canvas{touch-action:none;}
.bot{position:fixed;bottom:0;left:0;right:0;height:44px;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:99;font-size:.7rem;color:#f97316;font-weight:600;}
</style></head><body>
<div class="hdr"><a href="multiplayer-games.html">&larr;</a><h1>Court Shot</h1></div>
<div class="scores"><span style="color:#4ade80;font-weight:700;">You: <span id="myS">0</span></span><span>Round <span id="rnd">1</span>/10</span><span style="color:#fbbf24;font-weight:700;">AI: <span id="aiS">0</span></span></div>
<div class="area"><canvas id="c"></canvas></div>
<div class="bot" id="bb">Swipe UP to shoot! Aim for the hoop.</div>
<script src="scripts.js" defer></script>
<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f');
var cv,ctx,W,H,ball,hoop,myScore=0,aiScore=0,round=1,throwing=false,sx=0,sy=0,currentUser=null;
(async function(){var s=await db.auth.getSession();if(s.data.session)currentUser=s.data.session.user;init();})();
function init(){
cv=document.getElementById('c');ctx=cv.getContext('2d');
W=Math.min(window.innerWidth,400);H=Math.min(window.innerHeight-115,500);
cv.width=W;cv.height=H;
hoop={x:W/2,y:60,r:30};
resetBall();draw();
cv.ontouchstart=function(e){e.preventDefault();sx=e.touches[0].clientX;sy=e.touches[0].clientY;};
cv.ontouchend=function(e){e.preventDefault();if(throwing)return;var ex=e.changedTouches[0].clientX,ey=e.changedTouches[0].clientY;var dy=sy-ey;if(dy>30)throwBall(ex-sx,dy);};
}
function resetBall(){ball={x:W/2,y:H-40,r:14,vx:0,vy:0,active:false};}
function throwBall(dx,dy){
throwing=true;ball.active=true;
ball.vx=dx*0.06;ball.vy=-dy*0.08;
animate();
}
function animate(){
if(!ball.active)return;
ball.x+=ball.vx;ball.y+=ball.vy;ball.vy+=0.3;// gravity
// Check hoop
var dist=Math.sqrt(Math.pow(ball.x-hoop.x,2)+Math.pow(ball.y-hoop.y,2));
if(dist<hoop.r+ball.r&&ball.vy>0){
myScore+=2;if(dist<hoop.r*.5)myScore+=1;// 3-pointer for center
document.getElementById('myS').textContent=myScore;
document.getElementById('bb').textContent='Score! +'+((dist<hoop.r*.5)?3:2);
setTimeout(nextRound,800);return;
}
if(ball.y>H+50){document.getElementById('bb').textContent='Miss!';setTimeout(nextRound,600);return;}
draw();requestAnimationFrame(animate);
}
function nextRound(){
// AI shoots
var aiHit=Math.random()>.45;
if(aiHit){aiScore+=2;document.getElementById('aiS').textContent=aiScore;}
round++;document.getElementById('rnd').textContent=Math.min(round,10);
if(round>10){endGame();return;}
throwing=false;resetBall();draw();
document.getElementById('bb').textContent='Swipe UP to shoot!';
}
async function endGame(){
var won=myScore>aiScore;
document.getElementById('bb').textContent=won?'You Win! '+myScore+'-'+aiScore:'AI Wins! '+aiScore+'-'+myScore;
document.getElementById('bb').style.color=won?'#4ade80':'#ef4444';
if(currentUser)try{await db.rpc('record_game_result',{p_user_id:currentUser.id,p_game:'basketball',p_won:won,p_coins:0});}catch(e){}
setTimeout(function(){if(confirm('Play again?'))location.reload();},2000);
}
function draw(){
ctx.clearRect(0,0,W,H);
// Court floor
ctx.fillStyle='#8B4513';ctx.fillRect(0,H-20,W,20);
ctx.fillStyle='#A0522D';ctx.fillRect(0,H-22,W,2);
// Backboard
ctx.fillStyle='#ddd';ctx.fillRect(hoop.x-25,hoop.y-35,50,5);
ctx.fillStyle='#aaa';ctx.fillRect(hoop.x-2,hoop.y-35,4,35);
// Hoop
ctx.beginPath();ctx.arc(hoop.x,hoop.y,hoop.r,0,Math.PI,false);
ctx.strokeStyle='#ff4500';ctx.lineWidth=3;ctx.stroke();
// Net (simple lines)
for(var i=-3;i<=3;i++){ctx.beginPath();ctx.moveTo(hoop.x+i*8,hoop.y);ctx.lineTo(hoop.x+i*5,hoop.y+30);ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.stroke();}
// Ball
ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fillStyle='#f97316';ctx.fill();ctx.strokeStyle='#7c2d12';ctx.lineWidth=2;ctx.stroke();
// Ball lines
ctx.beginPath();ctx.moveTo(ball.x-ball.r,ball.y);ctx.lineTo(ball.x+ball.r,ball.y);ctx.strokeStyle='#92400e';ctx.lineWidth=1;ctx.stroke();
ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,-.3,Math.PI+.3,false);ctx.stroke();
}
</script></body></html>
