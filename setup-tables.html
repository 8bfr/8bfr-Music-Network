<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>8BFR Database Setup</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:system-ui;background:#0b0014;color:#eae6ff;padding:2rem;max-width:600px;margin:0 auto;}
h1{color:#7c3aed;font-size:1.3rem;}
.btn{padding:12px 24px;border:none;border-radius:8px;background:#7c3aed;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;margin:8px 4px;}
.btn:disabled{opacity:.5;}
.btn.done{background:#22c55e;}
.log{background:#111;border:1px solid #333;border-radius:8px;padding:12px;margin:12px 0;font-family:monospace;font-size:.8rem;max-height:400px;overflow-y:auto;white-space:pre-wrap;}
.ok{color:#22c55e;}.err{color:#ef4444;}.warn{color:#eab308;}
</style>
</head>
<body>
<h1>8BFR Database Setup</h1>
<p style="color:#a855f7;font-size:.85rem;">Creates missing tables for tournaments, leaderboards, and other features. Safe to run multiple times - it skips tables that already exist.</p>
<button class="btn" id="runBtn" onclick="runSetup()">Create Missing Tables</button>
<div class="log" id="log">Ready. Click the button to start.</div>

<script>
// Using service role key to bypass RLS for DDL operations
var SERVICE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2MTE4OTE4NSwiZXhwIjoyMDc2NzY1MTg1fQ.xR8vRdMIlW2TVSIjyrtKZ-a5LIqH5L5sIYPRnufhaT0';
var SB_URL='https://novbuvwpjnxwwvdekjhr.supabase.co';
var db=window.supabase.createClient(SB_URL,SERVICE_KEY);

var logEl=document.getElementById('log');
function log(msg,cls){logEl.innerHTML+='<div class="'+(cls||'')+'">'+ msg+'</div>';logEl.scrollTop=logEl.scrollHeight;}

async function tableExists(name){
  var r=await db.from(name).select('id').limit(1);
  return !r.error;
}

async function createViaRpc(sql,name){
  // Try creating table by inserting a test row and catching the error
  // If table doesn't exist, we need another approach
  log('Checking: '+name+'...');
  if(await tableExists(name)){
    log(name+' already exists - skipping','ok');
    return true;
  }
  log(name+' needs creating...','warn');
  return false;
}

async function runSetup(){
  var btn=document.getElementById('runBtn');
  btn.disabled=true;btn.textContent='Running...';
  logEl.innerHTML='';
  log('Starting database setup...');

  // Check which tables need creating
  var needed=[];
  var tables=['tournaments','tournament_entries','tournament_scores','game_leaderboard','sticker_inventory','accessories'];

  for(var i=0;i<tables.length;i++){
    var exists=await tableExists(tables[i]);
    log(tables[i]+': '+(exists?'EXISTS':'NEEDS CREATING'),(exists?'ok':'warn'));
    if(!exists)needed.push(tables[i]);
  }

  if(needed.length===0){
    log('\nAll tables exist! Nothing to do.','ok');
    btn.textContent='All Done!';btn.className='btn done';
    return;
  }

  log('\nNeed to create: '+needed.join(', '),'warn');
  log('\nAttempting to create tables via REST inserts...');

  // For each missing table, try to create it by calling a setup function
  // We'll create an RPC function first, then call it

  // Method: Use the Supabase SQL endpoint (if available)
  // Try the pg-meta endpoint
  for(var t=0;t<needed.length;t++){
    var tbl=needed[t];
    var sql='';

    if(tbl==='tournaments'){
      sql='CREATE TABLE IF NOT EXISTS tournaments(id uuid default gen_random_uuid() primary key,game_id text not null,title text not null,entry_fee integer default 10,prize_pool integer default 0,status text default \'open\' check(status in (\'open\',\'active\',\'completed\',\'cancelled\')),max_players integer default 50,start_time timestamptz,end_time timestamptz,created_by uuid,site_cut_pct integer default 5,first_pct integer default 50,second_pct integer default 30,third_pct integer default 15,winner_1 uuid,winner_2 uuid,winner_3 uuid,created_at timestamptz default now());alter table tournaments enable row level security;';
    }
    if(tbl==='tournament_entries'){
      sql='CREATE TABLE IF NOT EXISTS tournament_entries(id uuid default gen_random_uuid() primary key,tournament_id uuid references tournaments(id) on delete cascade,user_id uuid references auth.users(id) on delete cascade,best_score integer default 0,attempts integer default 0,joined_at timestamptz default now(),unique(tournament_id,user_id));alter table tournament_entries enable row level security;';
    }
    if(tbl==='tournament_scores'){
      sql='CREATE TABLE IF NOT EXISTS tournament_scores(id uuid default gen_random_uuid() primary key,tournament_id uuid,user_id uuid references auth.users(id),game_id text,score integer not null,played_at timestamptz default now());alter table tournament_scores enable row level security;';
    }
    if(tbl==='game_leaderboard'){
      sql='CREATE TABLE IF NOT EXISTS game_leaderboard(id uuid default gen_random_uuid() primary key,user_id uuid references auth.users(id),game_id text not null,score integer not null,played_at timestamptz default now());alter table game_leaderboard enable row level security;';
    }
    if(tbl==='sticker_inventory'){
      sql='CREATE TABLE IF NOT EXISTS sticker_inventory(id uuid default gen_random_uuid() primary key,name text not null,emoji text,category text default \'general\',cost integer default 10,is_active boolean default true,created_at timestamptz default now());alter table sticker_inventory enable row level security;';
    }
    if(tbl==='accessories'){
      sql='CREATE TABLE IF NOT EXISTS accessories(id uuid default gen_random_uuid() primary key,name text not null,type text default \'avatar\',cost integer default 25,preview_url text,is_active boolean default true,created_at timestamptz default now());alter table accessories enable row level security;';
    }

    if(!sql){log('No SQL for '+tbl,'err');continue;}

    // Try via Vercel endpoint
    try{
      var resp=await fetch('https://8bfr-api.vercel.app/api/run-sql',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({token:'8bfr_sql_2026',sql:sql})
      });
      var data=await resp.json();
      if(data.success){
        log('Created '+tbl+' via Vercel!','ok');
      }else{
        log('Vercel method failed for '+tbl+': '+(data.error||'unknown'),'err');
        log('You may need to run this SQL manually in Supabase SQL Editor:','warn');
        log(sql);
      }
    }catch(e){
      log('Error creating '+tbl+': '+e.message,'err');
      log('Manual SQL: '+sql);
    }
  }

  // Add RLS policies
  log('\nSetup complete! Verify by refreshing this page.','ok');
  btn.textContent='Done - Refresh to Verify';btn.className='btn done';
  btn.disabled=false;
  btn.onclick=function(){location.reload();};
}
</script>
</body>
</html>
