name: Mirror to Backup Repo
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to backup repo
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          git config user.name "8bfr-mirror-bot"
          git config user.email "8bfr.music@gmail.com"
          git remote add backup https://x-access-token:${BACKUP_TOKEN}@github.com/8bfr/8bfr-Music-Network-backup.git
          git push backup main --force
