name: Debug Mirror Backup
on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Test 1 - Is the token set?
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          if [ -z "$BACKUP_TOKEN" ]; then
            echo "::error::BACKUP_TOKEN is empty"
            exit 1
          fi
          echo "Token length: ${#BACKUP_TOKEN} characters"
          echo "Token prefix: ${BACKUP_TOKEN:0:7}..."
          echo "Token suffix: ...${BACKUP_TOKEN: -4}"

      - name: Test 2 - Who am I?
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          curl -s -w "HTTP_CODE:%{http_code}\n" \
            -H "Authorization: Bearer $BACKUP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user

      - name: Test 3 - Can I see the backup repo?
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          curl -s -w "HTTP_CODE:%{http_code}\n" \
            -H "Authorization: Bearer $BACKUP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/8bfr/8bfr-Music-Network-backup

      - name: Test 4 - List repos token can access
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $BACKUP_TOKEN" \
            "https://api.github.com/user/repos?per_page=100" > /tmp/r.json
          echo "Response size: $(wc -c < /tmp/r.json) bytes"
          if grep -q full_name /tmp/r.json; then
            grep -oE '"full_name"[^,]+' /tmp/r.json
          else
            cat /tmp/r.json
          fi

      - name: Test 5 - Try clone
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          git clone https://x-access-token:${BACKUP_TOKEN}@github.com/8bfr/8bfr-Music-Network-backup.git /tmp/backup 2>&1 || echo "Clone failed"
          ls -la /tmp/backup 2>&1 | head -3
