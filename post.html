<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Post — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<!-- Open Graph tags get dynamically updated by JS below -->
<meta property="og:title" id="ogTitle" content="8BFR Music Network">
<meta property="og:description" id="ogDesc" content="Join the 8BFR music community">
<meta property="og:image" id="ogImage" content="https://8bfr.com/assets/final-image.jpg">
<meta property="og:type" content="article">
<meta name="twitter:card" content="summary_large_image">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',system-ui,sans-serif;background:linear-gradient(#0b0014,#000);color:#eae6ff;min-height:100vh;padding-bottom:80px;}
.header{background:rgba(15,0,30,0.9);border-bottom:1px solid rgba(124,58,237,0.5);padding:1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.header a{color:#a855f7;text-decoration:none;font-weight:600;font-size:0.95rem;}
.header h1{font-size:1.1rem;font-weight:800;}
main{max-width:680px;margin:1.5rem auto;padding:0 1rem;}
.post-card{background:rgba(12,6,24,0.9);border:1px solid rgba(124,58,237,0.4);border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.post-header{display:flex;align-items:center;gap:0.85rem;padding:1rem 1.25rem;border-bottom:1px solid rgba(124,58,237,0.2);cursor:pointer;text-decoration:none;color:inherit;}
.ph-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.ph-avatar img{width:100%;height:100%;object-fit:cover;}
.ph-meta{flex:1;min-width:0;}
.ph-name{font-weight:800;font-size:1rem;display:flex;align-items:center;gap:0.3rem;}
.ph-verified{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);}
.ph-time{font-size:0.78rem;color:rgba(168,85,247,0.7);}
.post-media{width:100%;background:#000;position:relative;}
.post-media img{width:100%;display:block;}
.post-media video{width:100%;display:block;max-height:80vh;}
.post-media iframe{width:100%;aspect-ratio:16/9;border:none;display:block;}
.post-media audio{width:100%;padding:1rem;}
.post-text{padding:1.15rem 1.25rem;font-size:1rem;line-height:1.55;white-space:pre-wrap;word-wrap:break-word;}
.post-text a{color:#c084fc;text-decoration:underline;word-break:break-all;}
.post-stats{display:flex;gap:1rem;padding:0.75rem 1.25rem;border-top:1px solid rgba(124,58,237,0.15);font-size:0.85rem;color:rgba(234,230,255,0.7);}
.post-actions{display:flex;gap:0.5rem;padding:0.75rem 1.25rem;border-top:1px solid rgba(124,58,237,0.15);flex-wrap:wrap;}
.btn{background:#7c3aed;color:#fff;text-decoration:none;padding:0.65rem 1.25rem;border-radius:10px;font-weight:700;font-size:0.9rem;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:0.4rem;transition:background 0.15s;}
.btn:hover{background:#6d28d9;}
.btn-ghost{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.4);color:#eae6ff;}
.btn-ghost:hover{background:rgba(124,58,237,0.3);}
.join-cta{margin-top:1.5rem;background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(168,85,247,0.08));border:1px solid rgba(124,58,237,0.4);border-radius:14px;padding:1.5rem 1.25rem;text-align:center;}
.join-cta h2{font-size:1.25rem;font-weight:800;margin-bottom:0.5rem;}
.join-cta p{color:rgba(234,230,255,0.75);font-size:0.9rem;margin-bottom:1rem;line-height:1.5;}
.loading{text-align:center;padding:3rem 1rem;color:rgba(168,85,247,0.7);}
.spinner{width:32px;height:32px;border:3px solid rgba(124,58,237,0.2);border-top-color:#a855f7;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:2rem 1.25rem;text-align:center;}
.error h2{font-size:1.3rem;margin-bottom:0.5rem;color:#fca5a5;}
.error p{color:rgba(234,230,255,0.7);margin-bottom:1.25rem;font-size:0.9rem;}
/* Sticky signup banner for logged-out visitors */
.signup-banner{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;padding:0.7rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:0.75rem;box-shadow:0 4px 20px rgba(124,58,237,0.4);flex-wrap:wrap;}
.signup-banner-text{font-size:0.85rem;font-weight:600;flex:1;min-width:160px;}
.signup-banner-btns{display:flex;gap:0.5rem;flex-shrink:0;}
.signup-banner .btn-white{background:#fff;color:#7c3aed;font-weight:800;padding:0.4rem 1rem;border-radius:8px;text-decoration:none;font-size:0.82rem;}
.signup-banner .btn-outline-white{background:transparent;border:1px solid rgba(255,255,255,0.6);color:#fff;padding:0.4rem 1rem;border-radius:8px;text-decoration:none;font-size:0.82rem;font-weight:700;}
.signup-banner .btn-white:hover{background:#f3e8ff;}
.signup-banner .btn-outline-white:hover{background:rgba(255,255,255,0.15);}
/* Floating popup signup nudge */
.signup-nudge{position:fixed;bottom:1rem;left:1rem;right:1rem;max-width:420px;margin:0 auto;background:rgba(12,6,24,0.98);border:2px solid #a855f7;border-radius:14px;padding:1rem 1.15rem;box-shadow:0 12px 40px rgba(124,58,237,0.5);z-index:9999;transform:translateY(150%);transition:transform 0.4s ease;display:flex;align-items:center;gap:0.75rem;}
.signup-nudge.show{transform:translateY(0);}
.signup-nudge-icon{font-size:1.75rem;flex-shrink:0;}
.signup-nudge-body{flex:1;min-width:0;}
.signup-nudge-title{font-weight:800;font-size:0.95rem;margin-bottom:0.2rem;}
.signup-nudge-sub{font-size:0.78rem;color:rgba(234,230,255,0.75);line-height:1.4;}
.signup-nudge-btn{background:#7c3aed;color:#fff;padding:0.5rem 0.9rem;border-radius:8px;text-decoration:none;font-weight:800;font-size:0.82rem;flex-shrink:0;}
.signup-nudge-close{background:none;border:none;color:rgba(234,230,255,0.4);cursor:pointer;font-size:1.2rem;padding:0 0.25rem;position:absolute;top:0.25rem;right:0.5rem;}
</style>
</head>
<body>

<div class="header">
  <a href="feed.html">← Feed</a>
  <h1>📰 Post</h1>
  <div style="width:60px;"></div>
</div>

<main>
  <div id="content">
    <div class="loading"><div class="spinner"></div>Loading post...</div>
  </div>
</main>

<script>
(async function(){
  var SUPABASE_URL='https://novbuvwpjnxwwvdekjhr.supabase.co';
  var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0';
  var db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

  var params=new URLSearchParams(location.search);
  var postId=params.get('id');
  var container=document.getElementById('content');

  if(!postId){
    container.innerHTML='<div class="error"><h2>Missing Post ID</h2><p>No post was specified in the URL.</p><a href="feed.html" class="btn">Go to Feed</a></div>';
    return;
  }

  function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
  function linkify(s){
    if(!s)return'';
    var escaped=esc(s);
    return escaped.replace(/(https?:\/\/[^\s<>"']+)/gi,function(url){
      return '<a href="'+url+'" target="_blank" rel="noopener">'+url+'</a>';
    });
  }
  function timeAgo(d){
    var s=Math.floor((Date.now()-new Date(d))/1000);
    if(s<60)return 'just now';
    if(s<3600)return Math.floor(s/60)+'m ago';
    if(s<86400)return Math.floor(s/3600)+'h ago';
    if(s<2592000)return Math.floor(s/86400)+'d ago';
    return new Date(d).toLocaleDateString();
  }

  try{
    // Fetch the post
    var pr=await db.from('posts').select('id,user_id,text,media,media_type,likes,comment_count,reshares,is_private,hidden,created_at').eq('id',postId).maybeSingle();
    if(pr.error){ throw pr.error; }
    var post=pr.data;
    if(!post){
      container.innerHTML='<div class="error"><h2>Post Not Found</h2><p>This post may have been deleted or the link is invalid.</p><a href="feed.html" class="btn">Go to Feed</a></div>';
      return;
    }
    // Hide private/hidden posts from public share
    if(post.is_private || post.hidden){
      container.innerHTML='<div class="error"><h2>Post Unavailable</h2><p>This post is private or has been removed.</p><a href="feed.html" class="btn">Go to Feed</a></div>';
      return;
    }

    // Fetch author
    var ar=await db.from('profiles').select('user_id,username,display_name,avatar_url,verified_artist,role').eq('user_id',post.user_id).maybeSingle();
    var author=ar.data||{};
    var authorName=author.display_name||author.username||'Unknown';
    var authorAvatar=author.avatar_url||'';
    var verified=!!author.verified_artist;

    // Detect media (same logic as feed.html)
    var mType=post.media_type;
    var mediaUrl=post.media;
    if(!mediaUrl && post.text){
      var urlMatch=post.text.match(/https?:\/\/[^\s<>"']+/i);
      if(urlMatch){
        var candidate=urlMatch[0];
        if(/youtube\.com|youtu\.be|spotify\.com|soundcloud\.com|bandcamp\.com|\.(jpg|jpeg|png|gif|webp|avif|mp4|webm|mov|mp3|wav|m4a|ogg)(\?|$)/i.test(candidate)){
          mediaUrl=candidate;
        }
      }
    }
    if(mediaUrl && !mType){
      var u=mediaUrl.toLowerCase();
      if(/\.(jpg|jpeg|png|gif|webp|avif|svg)(\?|$)/i.test(u))mType='image';
      else if(/\.(mp4|webm|mov|m4v)(\?|$)/i.test(u)||/youtube\.com|youtu\.be/.test(u))mType='video';
      else if(/\.(mp3|wav|ogg|m4a|aac)(\?|$)/i.test(u))mType='audio';
      else if(/spotify\.com|soundcloud\.com|bandcamp\.com/.test(u))mType='embed';
    }

    // Build media HTML
    var mediaHtml='';
    var ogImageUrl='';
    if(mediaUrl&&(mType==='image'||mType==='photo')){
      mediaHtml='<div class="post-media"><img src="'+esc(mediaUrl)+'" alt=""></div>';
      ogImageUrl=mediaUrl;
    } else if(mediaUrl&&mType==='video'){
      var yt=mediaUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
      if(yt){
        var ytId=yt[1];
        mediaHtml='<div class="post-media"><iframe src="https://www.youtube.com/embed/'+ytId+'?rel=0&modestbranding=1&playsinline=1" allowfullscreen></iframe></div>';
        ogImageUrl='https://img.youtube.com/vi/'+ytId+'/hqdefault.jpg';
      } else {
        mediaHtml='<div class="post-media"><video src="'+esc(mediaUrl)+'" controls playsinline preload="metadata"></video></div>';
      }
    } else if(mediaUrl&&mType==='audio'){
      mediaHtml='<div class="post-media"><audio src="'+esc(mediaUrl)+'" controls preload="metadata"></audio></div>';
    } else if(mediaUrl&&mType==='embed'){
      var embedSrc='';
      var sp=mediaUrl.match(/open\.spotify\.com\/(track|album|playlist|episode|show)\/([a-zA-Z0-9]+)/);
      var sc=/soundcloud\.com/.test(mediaUrl);
      if(sp){embedSrc='https://open.spotify.com/embed/'+sp[1]+'/'+sp[2];}
      else if(sc){embedSrc='https://w.soundcloud.com/player/?url='+encodeURIComponent(mediaUrl)+'&color=%23ff5500';}
      if(embedSrc){
        mediaHtml='<div class="post-media"><iframe src="'+esc(embedSrc)+'" allow="autoplay;encrypted-media" style="height:160px;aspect-ratio:auto;"></iframe></div>';
      }
    }

    // Caption (strip the auto-extracted URL from the display)
    var caption=post.text||'';
    if(mediaUrl && !post.media && caption.indexOf(mediaUrl)!==-1){
      caption=caption.replace(mediaUrl,'').trim();
    }

    // Update Open Graph tags for social sharing
    var ogTitle=authorName+' on 8BFR Music Network';
    var ogDesc=(caption||'Join the 8BFR music community').substring(0,200);
    document.title=ogTitle+' — 8BFR';
    var ogT=document.getElementById('ogTitle'); if(ogT)ogT.setAttribute('content',ogTitle);
    var ogD=document.getElementById('ogDesc'); if(ogD)ogD.setAttribute('content',ogDesc);
    if(ogImageUrl){
      var ogI=document.getElementById('ogImage'); if(ogI)ogI.setAttribute('content',ogImageUrl);
    }

    // Avatar rendering
    var avatarHtml=authorAvatar
      ? '<img src="'+esc(authorAvatar)+'" alt="" onerror="this.outerHTML=\'🎵\';">'
      : '🎵';

    // Check if user is logged in (to show Feed button vs Join CTA)
    var session=await db.auth.getSession();
    var loggedIn=!!(session&&session.data&&session.data.session);

    var joinHtml = loggedIn
      ? '<a href="feed.html" class="btn btn-ghost" style="margin-top:1.5rem;display:inline-flex;">← Back to Feed</a>'
      : '<div class="join-cta">'+
          '<h2>🎵 Join 8BFR Music Network</h2>'+
          '<p>Discover music, connect with artists, and share your sound. Join our community of verified music creators.</p>'+
          '<a href="signup.html?return=post.html?id='+post.id+'" class="btn">Sign Up Free</a> '+
          '<a href="login.html?return=post.html?id='+post.id+'" class="btn btn-ghost">Log In</a>'+
        '</div>';

    // Sticky signup banner for logged-out visitors - inserts at top of body
    if (!loggedIn) {
      var banner = document.createElement('div');
      banner.className = 'signup-banner';
      banner.innerHTML =
        '<div class="signup-banner-text">🎵 Like what you see? Join 8BFR — free forever.</div>'+
        '<div class="signup-banner-btns">'+
          '<a href="signup.html?return=post.html?id='+post.id+'" class="btn-white">Sign Up</a>'+
          '<a href="login.html?return=post.html?id='+post.id+'" class="btn-outline-white">Log In</a>'+
        '</div>';
      document.body.insertBefore(banner, document.body.firstChild);

      // Floating nudge popup after 8 seconds (so user can enjoy content first)
      setTimeout(function(){
        if (document.querySelector('.signup-nudge')) return;
        var nudge = document.createElement('div');
        nudge.className = 'signup-nudge';
        nudge.innerHTML =
          '<button class="signup-nudge-close" onclick="this.parentNode.remove();">✕</button>'+
          '<div class="signup-nudge-icon">💜</div>'+
          '<div class="signup-nudge-body">'+
            '<div class="signup-nudge-title">Discover more like this</div>'+
            '<div class="signup-nudge-sub">Join 8BFR free to like, comment, and follow artists you love.</div>'+
          '</div>'+
          '<a href="signup.html?return=post.html?id='+post.id+'" class="signup-nudge-btn">Join</a>';
        document.body.appendChild(nudge);
        setTimeout(function(){ nudge.classList.add('show'); }, 50);
      }, 8000);
    }

    container.innerHTML=
      '<div class="post-card">'+
        '<a href="profile.html?id='+post.user_id+'" class="post-header">'+
          '<div class="ph-avatar">'+avatarHtml+'</div>'+
          '<div class="ph-meta">'+
            '<div class="ph-name">'+esc(authorName)+(verified?'<span class="ph-verified"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>':'')+'</div>'+
            '<div class="ph-time">'+timeAgo(post.created_at)+'</div>'+
          '</div>'+
        '</a>'+
        mediaHtml+
        (caption?'<div class="post-text">'+linkify(caption)+'</div>':'')+
        '<div class="post-stats">'+
          '<span>❤️ '+(post.likes||0)+' likes</span>'+
          '<span>💬 '+(post.comment_count||0)+' comments</span>'+
          (post.reshares?'<span>🔁 '+post.reshares+' reshares</span>':'')+
        '</div>'+
        '<div class="post-actions">'+
          '<button class="btn" onclick="sharePost()">🔗 Share</button>'+
          '<a href="feed.html" class="btn btn-ghost">📰 Open in Feed</a>'+
        '</div>'+
      '</div>'+
      joinHtml;

    window.sharePost=async function(){
      var url=location.href;
      var shareText='🎵 '+ogTitle+'\n'+url;
      try{
        if(navigator.share){
          await navigator.share({title:ogTitle,text:ogDesc,url:url});
        } else {
          await navigator.clipboard.writeText(shareText);
          alert('📋 Link copied to clipboard!');
        }
      }catch(e){
        if(e.name!=='AbortError'){
          try{await navigator.clipboard.writeText(shareText);alert('📋 Link copied!');}catch(e2){alert('Share link: '+url);}
        }
      }
    };

  }catch(e){
    container.innerHTML='<div class="error"><h2>Something Went Wrong</h2><p>'+esc(e.message||String(e))+'</p><a href="feed.html" class="btn">Go to Feed</a></div>';
  }
})();
</script>

<script src="scripts.js" defer></script>
</body>
</html>
