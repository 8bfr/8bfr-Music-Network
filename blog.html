<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>📰 Blog — 8BFR Music Network</title>
    <link rel="icon" href="assets/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--primary:#7c3aed;--card:#0c0618;--text:#eae6ff;--dim:rgba(168,85,247,.7);--border:rgba(124,58,237,.35);--text-dim:rgba(234,230,255,.5);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:80px;}
        .header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
        .header h1{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--primary);}
        .container{max-width:700px;margin:0 auto;padding:1.5rem;}
        .category-bar{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.75rem;margin-bottom:1.25rem;scrollbar-width:none;}
        .category-bar::-webkit-scrollbar{display:none;}
        .cat-btn{padding:.4rem .85rem;border-radius:20px;font-size:.8rem;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;white-space:nowrap;transition:all .2s;}
        .cat-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
        .cat-btn:hover{border-color:var(--primary);}
        .post-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:1.25rem;transition:all .2s;cursor:pointer;}
        .post-card:hover{border-color:var(--primary);box-shadow:0 0 20px rgba(124,58,237,.15);}
        .post-image{width:100%;height:180px;object-fit:cover;background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(168,85,247,.05));}
        .post-image-emoji{width:100%;height:140px;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(168,85,247,.05));}
        .post-body{padding:1.2rem;}
        .post-cat{font-size:.72rem;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem;}
        .post-title{font-size:1.15rem;font-weight:800;margin-bottom:.4rem;line-height:1.3;}
        .post-preview{font-size:.88rem;color:rgba(234,230,255,.6);line-height:1.5;margin-bottom:.75rem;}
        .post-meta{font-size:.75rem;color:var(--text-dim);display:flex;align-items:center;gap:.75rem;}
        .empty{text-align:center;padding:3rem 1rem;color:rgba(168,85,247,.4);}
        .spinner{width:28px;height:28px;border:3px solid rgba(124,58,237,.2);border-top-color:#a855f7;border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
        @keyframes spin{to{transform:rotate(360deg);}}

        /* Single post view */
        .article{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:2rem;margin-bottom:1.5rem;}
        .article-title{font-size:1.6rem;font-weight:800;line-height:1.3;margin-bottom:.5rem;}
        .article-meta{font-size:.82rem;color:var(--text-dim);margin-bottom:1.5rem;display:flex;gap:1rem;align-items:center;}
        .article-content{line-height:1.8;font-size:.95rem;}
        .article-content h2{color:#7c3aed;font-size:1.3rem;font-weight:800;margin:1.5rem 0 .75rem;}
        .article-content h3{color:#a855f7;font-size:1.1rem;font-weight:700;margin:1.25rem 0 .5rem;}
        .article-content p{margin-bottom:.75rem;}
        .article-content a{color:#a855f7;word-break:break-all;}
        .article-content img{width:100%;max-height:500px;object-fit:cover;border-radius:10px;margin:.75rem 0;}
        .article-content iframe{border:none;}
        .back-btn{display:inline-flex;align-items:center;gap:.4rem;color:var(--dim);text-decoration:none;font-size:.88rem;font-weight:600;margin-bottom:1rem;}
        .back-btn:hover{color:var(--primary);}
    </style>
</head>
<body>
    <div class="header">
        <h1>📰 8BFR Blog</h1>
        <div style="display:flex;gap:1rem;align-items:center;">
            <a href="feed.html" style="color:var(--text-dim);text-decoration:none;font-size:.85rem;">← Feed</a>
            <span id="adminLink"></span>
        </div>
    </div>

    <div class="container">
        <div id="loading"><div class="spinner"></div></div>

        <!-- LIST VIEW -->
        <div id="listView" style="display:none;">
            <div class="category-bar" id="catBar"></div>
            <div id="postList"></div>
        </div>

        <!-- SINGLE POST VIEW -->
        <div id="postView" style="display:none;">
            <a href="#" class="back-btn" onclick="showList();return false;">← Back to Blog</a>
            <div id="postArticle"></div>
        </div>
    </div>

    <script src="scripts.js" defer></script>
    <script>
    (function() {
        var SUPABASE_URL = 'https://novbuvwpjnxwwvdekjhr.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0';
        var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        var OWNER_ID = 'cb556180-f032-4b21-9470-1d786f2664ab';
        var allPosts = [];
        var activeCategory = 'all';

        // ★ renderBlogContent — processes [img:], [video:], **bold**, # headers, auto-links
        function renderBlogContent(text) {
            if (!text) return '';
            var html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Headers
            html = html.replace(/^## (.+)$/gm,
                '<h3 style="color:#a855f7;font-size:1.1rem;font-weight:700;margin:1.25rem 0 .5rem;">$1</h3>');
            html = html.replace(/^# (.+)$/gm,
                '<h2 style="color:#7c3aed;font-size:1.3rem;font-weight:800;margin:1.5rem 0 .75rem;">$1</h2>');

            // Embedded images: [img:URL]
            html = html.replace(/\[img:(https?:\/\/[^\]]+)\]/gi,
                '<div style="margin:1rem 0;border-radius:10px;overflow:hidden;">' +
                '<img src="$1" style="width:100%;max-height:500px;object-fit:cover;border-radius:10px;" ' +
                'onerror="this.style.display=\'none\'"></div>');

            // Embedded YouTube: [video:URL]
            html = html.replace(
                /\[video:https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})[^\]]*\]/gi,
                '<div style="margin:1rem 0;position:relative;padding-bottom:56.25%;height:0;border-radius:10px;overflow:hidden;">' +
                '<iframe src="https://www.youtube.com/embed/$1" style="position:absolute;inset:0;width:100%;height:100%;border:none;" allowfullscreen></iframe></div>');

            // Auto-linkify URLs (not already in href or src)
            html = html.replace(/(^|[^"=])(https?:\/\/[^\s&lt;]+)/gi,
                '$1<a href="$2" target="_blank" rel="noopener" style="color:#a855f7;word-break:break-all;">$2</a>');

            // Bold: **text**
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            // Paragraphs: double newlines
            html = html.split(/\n\n+/).map(function(p) {
                p = p.trim();
                if (!p) return '';
                if (p.startsWith('<h2') || p.startsWith('<h3') || p.startsWith('<div')) return p;
                return '<p style="margin-bottom:.75rem;line-height:1.7;">' + p.replace(/\n/g, '<br>') + '</p>';
            }).join('');

            return html;
        }

        async function init() {
            // Check if admin
            var sess = await db.auth.getSession();
            if (sess.data.session) {
                var user = sess.data.session.user;
                var prof = await db.from('profiles').select('role,badges').eq('id', user.id).single();
                var isOwner = user.id === OWNER_ID;
                var isCoOwner = (prof.data && prof.data.badges && prof.data.badges.indexOf('co-owner') !== -1);
                if (isOwner || isCoOwner) {
                    document.getElementById('adminLink').innerHTML = '<a href="blog-admin.html" style="color:#a855f7;text-decoration:none;font-size:.82rem;font-weight:600;">✏️ Admin</a>';
                }
            }

            // Check for ?slug= or ?id= param
            var params = new URLSearchParams(location.search);
            var slug = params.get('slug');
            var postId = params.get('id');

            if (slug || postId) {
                await loadSinglePost(slug, postId);
            } else {
                await loadAllPosts();
            }
        }
        init();

        async function loadAllPosts() {
            var res = await db.from('blog_posts').select('*').eq('status', 'published').order('created_at', { ascending: false });
            allPosts = res.data || [];
            document.getElementById('loading').style.display = 'none';
            document.getElementById('listView').style.display = 'block';

            // Build category bar
            var cats = ['all'];
            allPosts.forEach(function(p) {
                if (p.category && cats.indexOf(p.category) === -1) cats.push(p.category);
            });
            var catHtml = cats.map(function(c) {
                var icons = { all: '📋', news: '📰', music: '🎵', updates: '🔔', tutorials: '📚', community: '👥' };
                var icon = icons[c] || '📁';
                return '<button class="cat-btn' + (c === 'all' ? ' active' : '') + '" onclick="filterCat(\'' + c + '\',this)">' + icon + ' ' + c.charAt(0).toUpperCase() + c.slice(1) + '</button>';
            }).join('');
            document.getElementById('catBar').innerHTML = catHtml;

            renderPosts(allPosts);
        }

        function renderPosts(posts) {
            if (!posts.length) {
                document.getElementById('postList').innerHTML = '<div class="empty">No blog posts yet. Check back soon!</div>';
                return;
            }
            var html = '';
            posts.forEach(function(p) {
                var isUrl = p.featured_image && p.featured_image.startsWith('http');
                var imageHtml = isUrl
                    ? '<img class="post-image" src="' + p.featured_image + '" onerror="this.outerHTML=\'<div class=post-image-emoji>📝</div>\'">'
                    : '<div class="post-image-emoji">' + (p.featured_image || '📝') + '</div>';
                var preview = (p.content || '').replace(/\[img:[^\]]+\]/gi, '').replace(/\[video:[^\]]+\]/gi, '').replace(/[#*]/g, '').substring(0, 150);
                var icons = { news: '📰', music: '🎵', updates: '🔔', tutorials: '📚', community: '👥' };

                html += '<div class="post-card" onclick="viewPost(\'' + p.id + '\')">' +
                    imageHtml +
                    '<div class="post-body">' +
                        '<div class="post-cat">' + (icons[p.category] || '📁') + ' ' + (p.category || 'blog') + '</div>' +
                        '<div class="post-title">' + (p.title || 'Untitled') + '</div>' +
                        '<div class="post-preview">' + preview + (preview.length >= 150 ? '...' : '') + '</div>' +
                        '<div class="post-meta">' +
                            '<span>📅 ' + new Date(p.created_at).toLocaleDateString() + '</span>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            });
            document.getElementById('postList').innerHTML = html;
        }

        async function loadSinglePost(slug, id) {
            var res;
            if (slug) {
                res = await db.from('blog_posts').select('*').eq('slug', slug).eq('status', 'published').single();
            } else {
                res = await db.from('blog_posts').select('*').eq('id', id).eq('status', 'published').single();
            }

            document.getElementById('loading').style.display = 'none';

            if (!res.data) {
                document.getElementById('postView').style.display = 'block';
                document.getElementById('postArticle').innerHTML = '<div class="empty">Post not found.</div>';
                return;
            }

            var p = res.data;
            document.title = p.title + ' — 8BFR Blog';
            var isUrl = p.featured_image && p.featured_image.startsWith('http');
            var heroHtml = isUrl
                ? '<img src="' + p.featured_image + '" style="width:100%;max-height:300px;object-fit:cover;border-radius:10px;margin-bottom:1.5rem;" onerror="this.style.display=\'none\'">'
                : '';

            document.getElementById('postView').style.display = 'block';
            document.getElementById('postArticle').innerHTML =
                '<div class="article">' +
                    heroHtml +
                    '<div class="article-title">' + (p.title || 'Untitled') + '</div>' +
                    '<div class="article-meta">' +
                        '<span>📅 ' + new Date(p.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) + '</span>' +
                        '<span style="text-transform:capitalize;">' + (p.category || 'blog') + '</span>' +
                    '</div>' +
                    '<div class="article-content">' + renderBlogContent(p.content) + '</div>' +
                '</div>';
        }

        window.filterCat = function(cat, el) {
            activeCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
            el.classList.add('active');
            var filtered = cat === 'all' ? allPosts : allPosts.filter(function(p) { return p.category === cat; });
            renderPosts(filtered);
        };

        window.viewPost = function(id) {
            var post = allPosts.find(function(p) { return p.id === id; });
            if (!post) return;
            history.pushState(null, '', 'blog.html?id=' + id);
            document.getElementById('listView').style.display = 'none';
            document.getElementById('postView').style.display = 'block';

            var isUrl = post.featured_image && post.featured_image.startsWith('http');
            var heroHtml = isUrl
                ? '<img src="' + post.featured_image + '" style="width:100%;max-height:300px;object-fit:cover;border-radius:10px;margin-bottom:1.5rem;" onerror="this.style.display=\'none\'">'
                : '';

            document.title = post.title + ' — 8BFR Blog';
            document.getElementById('postArticle').innerHTML =
                '<div class="article">' +
                    heroHtml +
                    '<div class="article-title">' + (post.title || 'Untitled') + '</div>' +
                    '<div class="article-meta">' +
                        '<span>📅 ' + new Date(post.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) + '</span>' +
                        '<span style="text-transform:capitalize;">' + (post.category || 'blog') + '</span>' +
                    '</div>' +
                    '<div class="article-content">' + renderBlogContent(post.content) + '</div>' +
                '</div>';
        };

        window.showList = function() {
            history.pushState(null, '', 'blog.html');
            document.getElementById('postView').style.display = 'none';
            document.getElementById('listView').style.display = 'block';
            document.title = '📰 Blog — 8BFR Music Network';
        };

        window.addEventListener('popstate', function() {
            var params = new URLSearchParams(location.search);
            if (params.get('id') || params.get('slug')) {
                loadSinglePost(params.get('slug'), params.get('id'));
            } else {
                showList();
            }
        });
    })();
    </script>

    <!-- Avatar toggle (safe version — NO MutationObserver) -->
    <script>
    (function(){
        function updateVisibility() {
            var show = localStorage.getItem('showAvatarBubbles') !== 'false';
            document.querySelectorAll('.avatar-bubble, .chat-bubble-float').forEach(function(el) {
                el.style.display = show ? '' : 'none';
            });
        }
        updateVisibility();
    })();
    </script>
</body>
</html>
