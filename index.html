 class="space-y-4"> <div> <label class="block mb-2">Email</label> <input type="email" id="email" class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white" placeholder="test@example.com"> </div> <div> <label class="block mb-2">Password</label> <input type="password" id="pass" class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white" placeholder="password"> </div> <button onclick="testLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700"> Test Login </button> </div> `; checks.innerHTML += '<li class="text-green-500">✅ App UI rendered successfully!</li>'; } catch (e) { checks.innerHTML += '<li class="text-red-500">❌ Error rendering UI: ' + e.message + '</li>'; } }, 1000); window.testLogin = async function() { const email = document.getElementById('email').value; const pass = document.getElementById('pass').value; alert('Testing login with: ' + email); console.log('Login attempt:', email); try { const response = await fetch(API_URL + '/auth/v1/token?grant_type=password', { method: 'POST', headers: { 'apikey': API_KEY, 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email, password: pass }) }); const data = await response.json(); console.log('Login response:', data); if (data.access_token) { alert('✅ Login successful! Token: ' + data.access_token.substring(0, 20) + '...'); } else { alert('❌ Login failed: ' + (data.error_description || JSON.stringify(data))); } } catch (error) { alert('❌ Error: ' + error.message); console.error(error); } }; </script> </body> </html>
