<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎨 Themes — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<link rel="stylesheet" href="design-system.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-body); background: var(--bg-body); color: var(--text-primary); min-height: 100vh; padding-bottom: 120px; }

.hdr {
  background: var(--bg-overlay);
  border-bottom: 1px solid var(--border);
  padding: 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(10px);
}
.hdr a { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.95rem; }
.hdr h1 { font-family: var(--font-display); font-size: 1.5rem; color: var(--text-primary); letter-spacing: 1px; }

.main { max-width: 1100px; margin: 1.25rem auto; padding: 0 1rem; }

.banner {
  background: linear-gradient(135deg, var(--accent-soft), rgba(6,182,212,0.08));
  border: 1px solid var(--accent-border);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.5rem;
}
.banner h2 { font-family: var(--font-display); font-size: 1.85rem; letter-spacing: 1.5px; margin-bottom: 0.35rem; }
.banner p { color: var(--text-secondary); font-size: 0.92rem; line-height: 1.55; }

.section-title {
  font-family: var(--font-display);
  font-size: 1.25rem;
  color: var(--accent);
  letter-spacing: 1px;
  margin: 1.5rem 0 0.75rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--border);
}

.themes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 1rem;
}

.theme-card {
  background: var(--bg-surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 0;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
  position: relative;
}
.theme-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: var(--shadow-lg); }
.theme-card.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-lg);
}
.theme-card.active::after {
  content: "✓ Active";
  position: absolute;
  top: 0.6rem;
  right: 0.6rem;
  background: var(--accent);
  color: #fff;
  padding: 0.25rem 0.6rem;
  border-radius: var(--radius-full);
  font-size: 0.7rem;
  font-weight: 800;
  letter-spacing: 0.5px;
}

.theme-preview {
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  position: relative;
}

.theme-preview .sample-card {
  width: 100%;
  max-width: 180px;
  padding: 0.6rem 0.85rem;
  border-radius: 8px;
  font-size: 0.75rem;
  backdrop-filter: blur(6px);
}
.theme-preview .sample-btn {
  display: inline-block;
  padding: 0.3rem 0.75rem;
  border-radius: 999px;
  font-size: 0.7rem;
  font-weight: 700;
  margin-top: 0.4rem;
}

.theme-info {
  padding: 0.85rem 1rem;
  background: var(--bg-surface);
  border-top: 1px solid var(--border-subtle);
}
.theme-name { font-weight: 800; font-size: 0.95rem; margin-bottom: 0.15rem; }
.theme-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.35; }

/* Theme preview swatches - hard-coded colors since we can't use CSS variables from child themes */
.t-dark { background: linear-gradient(135deg, #0a0612, #1a0d30); color: #f4f1ff; }
.t-dark .sample-card { background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.35); }
.t-dark .sample-btn { background: #a855f7; color: #fff; }

.t-light { background: linear-gradient(135deg, #fafafb, #f3f4f6); color: #0f172a; }
.t-light .sample-card { background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.22); }
.t-light .sample-btn { background: #a855f7; color: #fff; }

.t-neon { background: radial-gradient(circle at 20% 20%, #14003d, #040012); color: #80ffff; }
.t-neon .sample-card { background: rgba(0,245,255,0.1); border: 1px solid rgba(0,245,255,0.4); }
.t-neon .sample-btn { background: #00f5ff; color: #000; }

.t-sunset { background: linear-gradient(135deg, #3d1510, #1a0805); color: #fff7ed; }
.t-sunset .sample-card { background: rgba(255,122,24,0.15); border: 1px solid rgba(255,122,24,0.4); }
.t-sunset .sample-btn { background: #ff7a18; color: #fff; }

.t-ocean { background: linear-gradient(135deg, #0f2440, #020618); color: #e0f2fe; }
.t-ocean .sample-card { background: rgba(6,182,212,0.15); border: 1px solid rgba(6,182,212,0.4); }
.t-ocean .sample-btn { background: #06b6d4; color: #fff; }

.t-forest { background: linear-gradient(135deg, #12281e, #050d0a); color: #ecfdf5; }
.t-forest .sample-card { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.4); }
.t-forest .sample-btn { background: #10b981; color: #fff; }

.t-royal { background: linear-gradient(135deg, #221c4a, #0c0a1d); color: #fef9e7; }
.t-royal .sample-card { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); }
.t-royal .sample-btn { background: #fbbf24; color: #0c0a1d; }

.t-crimson { background: linear-gradient(135deg, #38141a, #120406); color: #fef2f2; }
.t-crimson .sample-card { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); }
.t-crimson .sample-btn { background: #ef4444; color: #fff; }

.t-monochrome { background: linear-gradient(135deg, #1f1f1f, #0a0a0a); color: #fafafa; }
.t-monochrome .sample-card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.3); }
.t-monochrome .sample-btn { background: #fff; color: #000; }

.t-rose { background: linear-gradient(135deg, #381528, #14060e); color: #fdf2f8; }
.t-rose .sample-card { background: rgba(236,72,153,0.15); border: 1px solid rgba(236,72,153,0.4); }
.t-rose .sample-btn { background: #ec4899; color: #fff; }

/* Avatar size picker */
.avatar-sizes {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.6rem;
  margin-top: 0.75rem;
}
.av-size-btn {
  padding: 0.75rem 0.5rem;
  background: var(--bg-surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 700;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
  transition: border-color 0.15s ease;
}
.av-size-btn:hover { border-color: var(--accent); }
.av-size-btn.active { border-color: var(--accent); background: var(--accent-soft); }
.av-size-btn .circle {
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  margin-bottom: 0.15rem;
}
.av-size-btn.tiny .circle { width: 16px; height: 16px; }
.av-size-btn.small .circle { width: 24px; height: 24px; }
.av-size-btn.medium .circle { width: 32px; height: 32px; }
.av-size-btn.large .circle { width: 44px; height: 44px; }

.msg-ok {
  background: rgba(16,185,129,0.12);
  border: 1px solid rgba(16,185,129,0.35);
  color: #6ee7b7;
  padding: 0.7rem 1rem;
  border-radius: var(--radius);
  font-size: 0.85rem;
  margin-top: 0.75rem;
  text-align: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body class="ds-active">

<div class="hdr">
  <a href="javascript:history.back()">← Back</a>
  <h1>🎨 Themes</h1>
  <div style="width:70px;"></div>
</div>

<main class="main">
  <div class="banner">
    <h2>Make 8BFR YOURS</h2>
    <p>Pick a theme that fits your vibe. Your choice saves automatically and follows you everywhere on the site.</p>
  </div>

  <div class="section-title">🎨 COLOR THEMES</div>
  <div class="themes-grid" id="themesGrid"></div>

  <div class="section-title">👤 AVATAR SIZE</div>
  <div class="ds-card">
    <div style="font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 0.4rem;">How big should the floating avatar appear on the corner of your screen?</div>
    <div class="avatar-sizes">
      <button class="av-size-btn tiny" data-size="tiny" onclick="setAvatarSize(this)"><span class="circle"></span>Tiny</button>
      <button class="av-size-btn small" data-size="small" onclick="setAvatarSize(this)"><span class="circle"></span>Small</button>
      <button class="av-size-btn medium" data-size="medium" onclick="setAvatarSize(this)"><span class="circle"></span>Medium</button>
      <button class="av-size-btn large" data-size="large" onclick="setAvatarSize(this)"><span class="circle"></span>Large</button>
    </div>
    <div id="avatarMsg"></div>
  </div>
</main>

<script>
var THEMES = [
  { id: "dark", name: "Deep Dark", desc: "Original 8BFR vibe — deep purple on black", class: "t-dark" },
  { id: "light", name: "Light Mode", desc: "Clean, bright, easy on the eyes in daylight", class: "t-light" },
  { id: "neon", name: "Neon Cyber", desc: "Electric cyan on pitch black — full vibe", class: "t-neon" },
  { id: "sunset", name: "Sunset", desc: "Warm orange glow, golden hour energy", class: "t-sunset" },
  { id: "ocean", name: "Ocean Deep", desc: "Cool cyan, calm & focused", class: "t-ocean" },
  { id: "forest", name: "Forest", desc: "Rich green, earthy, zen", class: "t-forest" },
  { id: "royal", name: "Royal Gold", desc: "Gold on deep purple — luxury mode", class: "t-royal" },
  { id: "crimson", name: "Crimson Fire", desc: "Bold red for fierce moods", class: "t-crimson" },
  { id: "monochrome", name: "Monochrome", desc: "Pure black + white. Timeless.", class: "t-monochrome" },
  { id: "rose", name: "Rose Gold", desc: "Soft pink, elegant, warm", class: "t-rose" }
];

var THEME_KEY = "8bfr-theme-v2";
var AVATAR_KEY = "8bfr-avatar-size";

function getCurrent() {
  try { return localStorage.getItem(THEME_KEY) || "dark"; } catch(e) { return "dark"; }
}

function getCurrentAvatar() {
  try { return localStorage.getItem(AVATAR_KEY) || "small"; } catch(e) { return "small"; }
}

function applyTheme(name) {
  if (!name || name === "dark") {
    document.body.removeAttribute("data-theme");
  } else {
    document.body.setAttribute("data-theme", name);
  }
  try { localStorage.setItem(THEME_KEY, name); } catch(e){}
}

function applyAvatarSize(size) {
  if (!size || size === "small") {
    document.body.setAttribute("data-avatar-size", "small");
  } else {
    document.body.setAttribute("data-avatar-size", size);
  }
  try { localStorage.setItem(AVATAR_KEY, size); } catch(e){}
}

function renderThemes() {
  var current = getCurrent();
  var grid = document.getElementById("themesGrid");
  var html = "";
  THEMES.forEach(function(t) {
    var active = t.id === current ? " active" : "";
    html += '<div class="theme-card' + active + '" data-theme="' + t.id + '" onclick="pickTheme(\'' + t.id + '\', this)">' +
      '<div class="theme-preview ' + t.class + '">' +
        '<div class="sample-card">' +
          '<div style="font-weight:700;">New Song</div>' +
          '<div style="opacity:0.75;font-size:0.68rem;">Your Artist · 2 min</div>' +
          '<div class="sample-btn">▶ Play</div>' +
        '</div>' +
      '</div>' +
      '<div class="theme-info">' +
        '<div class="theme-name">' + t.name + '</div>' +
        '<div class="theme-desc">' + t.desc + '</div>' +
      '</div>' +
    '</div>';
  });
  grid.innerHTML = html;
}

window.pickTheme = function(id, el) {
  applyTheme(id);
  // Update card selection state
  document.querySelectorAll(".theme-card").forEach(function(c){ c.classList.remove("active"); });
  el.classList.add("active");
};

window.setAvatarSize = function(btn) {
  var size = btn.dataset.size;
  applyAvatarSize(size);
  document.querySelectorAll(".av-size-btn").forEach(function(b){ b.classList.remove("active"); });
  btn.classList.add("active");
  var msg = document.getElementById("avatarMsg");
  msg.innerHTML = '<div class="msg-ok">✓ Avatar size set to ' + size + ' — takes effect on the next page you visit</div>';
  setTimeout(function(){ msg.innerHTML = ""; }, 2500);
};

// Initialize
renderThemes();

// Mark active avatar size button
var currentSize = getCurrentAvatar();
var activeBtn = document.querySelector('.av-size-btn[data-size="' + currentSize + '"]');
if (activeBtn) activeBtn.classList.add("active");
</script>

<script src="scripts.js" defer></script>
</body>
</html>
