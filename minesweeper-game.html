<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Minesweeper -- 8BFR Games</title><link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>*{margin:0;padding:0;box-sizing:border-box;}#bubbleStack,#_8bfr_copyright,.bubble-row,#carrieWrap,#avatarSwitcher,.global-avatar,.avatar-wrap,#pageUpBtn{display:none!important;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#080012,#020005);color:#f0ecff;min-height:100vh;}
.hdr{background:rgba(8,0,18,.97);border-bottom:2px solid #22c55e;padding:.75rem 1rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.hdr h1{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:#22c55e;}.hdr a{color:rgba(255,255,255,.7);text-decoration:none;font-weight:600;font-size:.82rem;}
.container{max-width:420px;margin:0 auto;padding:.75rem;}
.info-bar{display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.82rem;font-weight:600;}
.grid{display:grid;gap:1px;margin-bottom:.75rem;user-select:none;}
.cell{display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.7rem;cursor:pointer;aspect-ratio:1;border-radius:3px;transition:background .1s;}
.cell.hidden{background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.15);}
.cell.hidden:active{background:rgba(124,58,237,.35);}
.cell.revealed{background:rgba(0,0,0,.3);border:1px solid rgba(124,58,237,.08);}
.cell.mine{background:rgba(239,68,68,.2);}
.cell.flag{background:rgba(251,191,36,.15);}
.c1{color:#3b82f6;}.c2{color:#22c55e;}.c3{color:#ef4444;}.c4{color:#7c3aed;}.c5{color:#f97316;}.c6{color:#14b8a6;}.c7{color:#000;}.c8{color:#888;}
.controls{display:flex;gap:.3rem;margin-bottom:.5rem;}
.ctrl{flex:1;padding:.4rem;border-radius:8px;font-weight:700;font-size:.78rem;cursor:pointer;border:1px solid rgba(124,58,237,.3);background:rgba(124,58,237,.08);color:rgba(255,255,255,.7);text-align:center;}
.ctrl.active{background:rgba(251,191,36,.2);border-color:#fbbf24;color:#fbbf24;}
.diff{display:flex;gap:.25rem;margin-bottom:.5rem;}
.diff-btn{flex:1;padding:.3rem;border-radius:8px;font-size:.7rem;font-weight:600;cursor:pointer;border:1px solid rgba(124,58,237,.25);background:rgba(124,58,237,.06);color:rgba(255,255,255,.6);text-align:center;}
.diff-btn.sel{background:rgba(124,58,237,.2);border-color:#7c3aed;color:#fff;}
.msg{text-align:center;padding:.75rem;font-family:'Bebas Neue',cursive;font-size:1.3rem;border-radius:10px;display:none;}.msg.show{display:block;}
.btn{padding:.5rem .8rem;border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;border:none;color:#fff;width:100%;background:#22c55e;}
</style></head><body>
<div class="hdr"><a href="multiplayer-games.html">&larr;</a><h1>Minesweeper</h1><span style="font-size:.7rem;color:#fbbf24;" id="myCoins">0</span></div>
<div class="container">
<div class="diff">
<div class="diff-btn sel" onclick="setDiff(9,10,this)">Easy 9x9</div>
<div class="diff-btn" onclick="setDiff(12,25,this)">Medium 12x12</div>
<div class="diff-btn" onclick="setDiff(16,50,this)">Hard 16x16</div>
</div>
<div class="info-bar"><span>Mines: <span id="mineCount">10</span></span><span id="timer">0:00</span><span>Flags: <span id="flagCount">0</span></span></div>
<div class="controls"><div class="ctrl" onclick="setTool('reveal',this)">Reveal</div><div class="ctrl" onclick="setTool('flag',this)">Flag</div></div>
<div class="grid" id="grid"></div>
<div class="msg" id="msg"></div>
<button class="btn" onclick="init()">New Game</button>
</div>
<script src="scripts.js" defer></script>
<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f');
var SIZE=9,MINES=10,grid=[],revealed=[],flagged=[],tool='reveal',over=false,firstClick=true,timerIv,seconds=0,currentUser=null;
(async function(){var s=await db.auth.getSession();if(s.data.session){currentUser=s.data.session.user;var p=await db.from('profiles').select('coins').eq('user_id',currentUser.id).single();if(p.data)document.getElementById('myCoins').textContent=(p.data.coins||0).toLocaleString();}init();})();
function setDiff(s,m,el){SIZE=s;MINES=m;document.querySelectorAll('.diff-btn').forEach(function(b){b.classList.remove('sel');});el.classList.add('sel');init();}
function setTool(t,el){tool=t;document.querySelectorAll('.ctrl').forEach(function(c){c.classList.remove('active');});el.classList.add('active');}
function init(){
grid=[];revealed=[];flagged=[];over=false;firstClick=true;seconds=0;clearInterval(timerIv);
document.getElementById('timer').textContent='0:00';
document.getElementById('msg').classList.remove('show');
document.getElementById('mineCount').textContent=MINES;
document.getElementById('flagCount').textContent='0';
for(var r=0;r<SIZE;r++){grid[r]=[];revealed[r]=[];flagged[r]=[];for(var c=0;c<SIZE;c++){grid[r][c]=0;revealed[r][c]=false;flagged[r][c]=false;}}
render();
}
function placeMines(sr,sc){
var placed=0;
while(placed<MINES){var r=Math.floor(Math.random()*SIZE);var c=Math.floor(Math.random()*SIZE);
if(grid[r][c]===-1)continue;if(Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1)continue;
grid[r][c]=-1;placed++;
}
for(var r=0;r<SIZE;r++){for(var c=0;c<SIZE;c++){if(grid[r][c]===-1)continue;var count=0;
for(var dr=-1;dr<=1;dr++){for(var dc=-1;dc<=1;dc++){var nr=r+dr,nc=c+dc;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&grid[nr][nc]===-1)count++;}}
grid[r][c]=count;}}
}
function render(){
var el=document.getElementById('grid');
el.style.gridTemplateColumns='repeat('+SIZE+',1fr)';
var html='';
for(var r=0;r<SIZE;r++){for(var c=0;c<SIZE;c++){
var cls='cell';var txt='';
if(revealed[r][c]){
cls+=' revealed';
if(grid[r][c]===-1){cls+=' mine';txt='*';}
else if(grid[r][c]>0){txt=grid[r][c];cls+=' c'+grid[r][c];}
}else if(flagged[r][c]){cls+=' hidden flag';txt='F';}
else{cls+=' hidden';}
html+='<div class="'+cls+'" onclick="click4('+r+','+c+')">'+txt+'</div>';
}}
el.innerHTML=html;
document.getElementById('flagCount').textContent=flagged.flat().filter(Boolean).length;
}
window.click4=function(r,c){
if(over)return;
if(tool==='flag'){flagged[r][c]=!flagged[r][c];render();return;}
if(flagged[r][c]||revealed[r][c])return;
if(firstClick){placeMines(r,c);firstClick=false;timerIv=setInterval(function(){seconds++;var m=Math.floor(seconds/60);var s=seconds%60;document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s;},1000);}
if(grid[r][c]===-1){revealAll();endG(false);return;}
flood(r,c);
render();
checkWin();
};
function flood(r,c){
if(r<0||r>=SIZE||c<0||c>=SIZE||revealed[r][c]||flagged[r][c])return;
revealed[r][c]=true;
if(grid[r][c]===0){for(var dr=-1;dr<=1;dr++){for(var dc=-1;dc<=1;dc++){flood(r+dr,c+dc);}}}
}
function revealAll(){for(var r=0;r<SIZE;r++){for(var c=0;c<SIZE;c++){revealed[r][c]=true;}}render();}
function checkWin(){
var unrevealed=0;
for(var r=0;r<SIZE;r++){for(var c=0;c<SIZE;c++){if(!revealed[r][c])unrevealed++;}}
if(unrevealed===MINES)endG(true);
}
async function endG(won){
over=true;clearInterval(timerIv);
var el=document.getElementById('msg');el.classList.add('show');
el.style.background=won?'rgba(74,222,128,.15)':'rgba(239,68,68,.15)';
el.style.color=won?'#4ade80':'#ef4444';
el.textContent=won?'Cleared! Time: '+document.getElementById('timer').textContent:'BOOM! Game Over';
if(currentUser){try{await db.rpc('record_game_result',{p_user_id:currentUser.id,p_game:'minesweeper',p_won:won,p_coins:0});}catch(e){}}
}
</script></body></html>
