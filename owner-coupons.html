<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎟️ Coupons — 8BFR Owner</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',system-ui,sans-serif;background:linear-gradient(#0b0014,#000);color:#eae6ff;min-height:100vh;padding-bottom:100px;}
.hdr{background:rgba(15,0,30,0.95);border-bottom:1px solid rgba(124,58,237,0.5);padding:1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);}
.hdr a{color:#a855f7;text-decoration:none;font-weight:600;font-size:0.95rem;}
.hdr h1{font-family:'Bebas Neue',cursive;font-size:1.45rem;color:#eae6ff;letter-spacing:1px;}
.main{max-width:880px;margin:1.25rem auto;padding:0 1rem;}
.tabs{display:flex;gap:.4rem;margin-bottom:1rem;}
.tab{flex:1;padding:.6rem 1rem;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.35);border-radius:10px;color:#eae6ff;font-size:0.88rem;font-weight:700;cursor:pointer;text-align:center;}
.tab.active{background:#7c3aed;border-color:#7c3aed;color:#fff;}
.card{background:rgba(12,6,24,0.85);border:1px solid rgba(124,58,237,0.35);border-radius:14px;padding:1.25rem;margin-bottom:1rem;}
.card h2{font-family:'Bebas Neue',cursive;font-size:1.4rem;color:#a855f7;letter-spacing:1px;margin-bottom:.75rem;}
.field{margin-bottom:.85rem;}
.field label{display:block;font-size:0.82rem;font-weight:700;color:#a855f7;margin-bottom:.35rem;}
.field input,.field select,.field textarea{width:100%;padding:.7rem .9rem;background:rgba(0,0,0,0.4);border:1px solid rgba(124,58,237,0.35);border-radius:10px;color:#eae6ff;font-size:0.95rem;outline:none;font-family:inherit;}
.field input[type=checkbox]{width:auto;}
.field input:focus,.field select:focus{border-color:#a855f7;}
.hint{font-size:0.75rem;color:rgba(234,230,255,0.55);margin-top:.3rem;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;}
.btn{background:#7c3aed;color:#fff;border:none;padding:.7rem 1.2rem;border-radius:10px;font-weight:800;font-size:0.92rem;cursor:pointer;font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:.4rem;}
.btn:hover{background:#6d28d9;}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.btn-ghost{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.4);color:#eae6ff;}
.btn-sm{padding:.4rem .8rem;font-size:0.78rem;width:auto;}
.applies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.4rem;margin-bottom:.5rem;}
.applies-opt{padding:.45rem .75rem;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.3);border-radius:8px;cursor:pointer;font-size:0.82rem;font-weight:700;text-align:center;color:#eae6ff;}
.applies-opt:hover{background:rgba(124,58,237,0.2);}
.applies-opt.selected{background:#7c3aed;border-color:#7c3aed;color:#fff;}
.coupon-list{display:grid;gap:.65rem;}
.coupon{background:rgba(0,0,0,0.35);border:1px solid rgba(124,58,237,0.25);border-radius:10px;padding:.85rem 1rem;}
.coupon.disabled{opacity:0.55;}
.coupon-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.4rem;margin-bottom:.4rem;}
.coupon-code{font-family:monospace;font-weight:800;color:#fcd34d;font-size:1.05rem;letter-spacing:1px;}
.coupon-badge{font-size:0.7rem;padding:.2rem .6rem;border-radius:999px;font-weight:700;}
.badge-active{background:rgba(52,211,153,0.18);color:#4ade80;border:1px solid rgba(52,211,153,0.4);}
.badge-disabled{background:rgba(239,68,68,0.18);color:#fca5a5;border:1px solid rgba(239,68,68,0.4);}
.badge-expired{background:rgba(168,85,247,0.18);color:#c4b5fd;border:1px solid rgba(168,85,247,0.35);}
.coupon-meta{font-size:0.8rem;color:rgba(234,230,255,0.7);line-height:1.55;}
.coupon-actions{display:flex;gap:.4rem;margin-top:.55rem;flex-wrap:wrap;}
.coupon-actions button{padding:.35rem .7rem;font-size:0.74rem;border-radius:6px;border:1px solid rgba(124,58,237,0.4);background:rgba(124,58,237,0.15);color:#eae6ff;cursor:pointer;font-weight:700;}
.coupon-actions .del{border-color:rgba(239,68,68,0.4);color:#fca5a5;}
.empty{text-align:center;padding:2rem;color:rgba(168,85,247,0.6);}
.error-msg{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);color:#fca5a5;padding:.7rem 1rem;border-radius:8px;font-size:0.85rem;margin-top:.5rem;}
.success-msg{background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.35);color:#4ade80;padding:.6rem 1rem;border-radius:8px;font-size:0.85rem;margin-top:.5rem;}
.summary{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.4rem;}
.summary span{font-size:0.72rem;background:rgba(124,58,237,0.15);padding:.2rem .55rem;border-radius:6px;color:#c084fc;}
.deny-noowner{padding:2rem;text-align:center;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;color:#fca5a5;}
</style>
</head>
<body>

<div class="hdr">
  <a href="owner-studio.html">← Owner Studio</a>
  <h1>🎟️ Coupons</h1>
  <div style="width:80px;"></div>
</div>

<main class="main" id="mainContent">
  <div class="empty">Loading...</div>
</main>

<script>
var SUPABASE_URL = 'https://novbuvwpjnxwwvdekjhr.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0';
var OWNER_ID = 'cb556180-f032-4b21-9470-1d786f2664ab';
var sb = null, currentUser = null;
var selectedAppliesTo = ['any'];
var allCoupons = [];

async function init(){
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  var { data } = await sb.auth.getUser();
  currentUser = (data && data.user) || null;

  if (!currentUser || currentUser.id !== OWNER_ID) {
    document.getElementById('mainContent').innerHTML = '<div class="deny-noowner">🚫 Owner access only. Sign in as the site owner to manage coupons.</div>';
    return;
  }

  renderApp();
  await loadCoupons();
}

function renderApp() {
  document.getElementById('mainContent').innerHTML =
    '<div class="tabs">' +
    '<div class="tab active" id="tab-create" onclick="switchTab(\'create\')">➕ Create</div>' +
    '<div class="tab" id="tab-list" onclick="switchTab(\'list\')">📋 Manage</div>' +
    '</div>' +
    '<div id="panel-create"></div>' +
    '<div id="panel-list" style="display:none;"></div>';

  renderCreatePanel();
}

window.switchTab = function(name) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('panel-create').style.display = name === 'create' ? 'block' : 'none';
  document.getElementById('panel-list').style.display = name === 'list' ? 'block' : 'none';
  if (name === 'list') loadCoupons();
};

function renderCreatePanel() {
  document.getElementById('panel-create').innerHTML =
    '<div class="card">' +
    '<h2>Create new coupon</h2>' +
    '<div class="field">' +
    '<label>Coupon code <span style="color:#ef4444">*</span></label>' +
    '<input type="text" id="newCode" placeholder="e.g. WELCOME25 or 8BFR" style="text-transform:uppercase;letter-spacing:1px;">' +
    '<div class="hint">Will be converted to uppercase automatically. Letters/numbers/hyphens only.</div>' +
    '</div>' +
    '<div class="field">' +
    '<label>Description (for your records)</label>' +
    '<input type="text" id="newDesc" placeholder="e.g. New member signup discount">' +
    '</div>' +
    '<div class="row">' +
    '<div class="field">' +
    '<label>Discount type</label>' +
    '<select id="newType" onchange="updateValuePlaceholder()">' +
    '<option value="percent">Percent off (%)</option>' +
    '<option value="fixed">Fixed amount off ($)</option>' +
    '<option value="free">Free (100% off)</option>' +
    '</select>' +
    '</div>' +
    '<div class="field">' +
    '<label>Value</label>' +
    '<input type="number" id="newValue" placeholder="25" step="0.01" min="0">' +
    '<div class="hint" id="valueHint">e.g. 25 = 25% off</div>' +
    '</div>' +
    '</div>' +
    '<div class="field">' +
    '<label>Applies to (pick one or more)</label>' +
    '<div class="applies-grid" id="appliesGrid">' +
    '<div class="applies-opt selected" onclick="toggleApplies(this,\'any\')">🌐 ANY</div>' +
    '<div class="applies-opt" onclick="toggleApplies(this,\'songs\')">🎵 Songs</div>' +
    '<div class="applies-opt" onclick="toggleApplies(this,\'beats\')">🥁 Beats</div>' +
    '<div class="applies-opt" onclick="toggleApplies(this,\'plans\')">⭐ Plans</div>' +
    '<div class="applies-opt" onclick="toggleApplies(this,\'coins\')">🪙 Coins</div>' +
    '<div class="applies-opt" onclick="toggleApplies(this,\'ads\')">📢 Ads</div>' +
    '</div>' +
    '<div class="hint">"ANY" works for all paid features. Or pick specific types.</div>' +
    '</div>' +
    '<div class="row3">' +
    '<div class="field">' +
    '<label>Max uses per user</label>' +
    '<input type="number" id="newPerUser" value="1" min="1" placeholder="1">' +
    '<div class="hint">How many times each person can use it</div>' +
    '</div>' +
    '<div class="field">' +
    '<label>Max total uses</label>' +
    '<input type="number" id="newMaxTotal" placeholder="leave blank = unlimited" min="1">' +
    '<div class="hint">Total cap across all users</div>' +
    '</div>' +
    '<div class="field">' +
    '<label>Min purchase ($)</label>' +
    '<input type="number" id="newMin" value="0" min="0" step="0.01">' +
    '<div class="hint">Minimum order to qualify</div>' +
    '</div>' +
    '</div>' +
    '<div class="field">' +
    '<label>Expires (optional)</label>' +
    '<input type="datetime-local" id="newExpires">' +
    '<div class="hint">Leave blank if it never expires</div>' +
    '</div>' +
    '<button class="btn" onclick="createCoupon()">🎟️ Create Coupon</button>' +
    '<div id="createMsg"></div>' +
    '</div>';
}

window.toggleApplies = function(el, val) {
  if (val === 'any') {
    selectedAppliesTo = ['any'];
    document.querySelectorAll('.applies-opt').forEach(function(o){ o.classList.remove('selected'); });
    el.classList.add('selected');
  } else {
    // Remove 'any' if it was selected
    selectedAppliesTo = selectedAppliesTo.filter(function(x){ return x !== 'any'; });
    document.querySelectorAll('.applies-opt').forEach(function(o){
      if (o.textContent.indexOf('ANY') !== -1) o.classList.remove('selected');
    });
    if (el.classList.contains('selected')) {
      el.classList.remove('selected');
      selectedAppliesTo = selectedAppliesTo.filter(function(x){ return x !== val; });
      if (selectedAppliesTo.length === 0) {
        // Auto-revert to 'any' if nothing selected
        selectedAppliesTo = ['any'];
        document.querySelectorAll('.applies-opt')[0].classList.add('selected');
      }
    } else {
      el.classList.add('selected');
      if (selectedAppliesTo.indexOf(val) === -1) selectedAppliesTo.push(val);
    }
  }
};

window.updateValuePlaceholder = function() {
  var t = document.getElementById('newType').value;
  var v = document.getElementById('newValue');
  var h = document.getElementById('valueHint');
  if (t === 'percent') { v.placeholder = '25'; h.textContent = 'e.g. 25 = 25% off'; v.disabled = false; }
  else if (t === 'fixed') { v.placeholder = '5.00'; h.textContent = 'e.g. 5 = $5 off'; v.disabled = false; }
  else { v.value = '0'; v.disabled = true; h.textContent = 'Free = 100% off'; }
};

window.createCoupon = async function() {
  var code = (document.getElementById('newCode').value || '').trim().toUpperCase().replace(/[^A-Z0-9-]/g, '');
  if (!code || code.length < 2) { showCreateMsg('Code is required (2+ chars, letters/numbers/hyphens)', true); return; }

  var type = document.getElementById('newType').value;
  var value = parseFloat(document.getElementById('newValue').value) || 0;
  if (type === 'percent' && (value <= 0 || value > 100)) { showCreateMsg('Percent must be between 1 and 100', true); return; }
  if (type === 'fixed' && value <= 0) { showCreateMsg('Fixed amount must be greater than 0', true); return; }

  var perUser = parseInt(document.getElementById('newPerUser').value) || 1;
  var maxTotal = document.getElementById('newMaxTotal').value;
  maxTotal = maxTotal ? parseInt(maxTotal) : null;
  var minDollars = parseFloat(document.getElementById('newMin').value) || 0;
  var expires = document.getElementById('newExpires').value;
  var desc = document.getElementById('newDesc').value;

  var row = {
    code: code,
    description: desc || null,
    discount_type: type,
    discount_value: value,
    min_purchase_cents: Math.round(minDollars * 100),
    applies_to: selectedAppliesTo,
    max_total_uses: maxTotal,
    max_per_user: perUser,
    expires_at: expires ? new Date(expires).toISOString() : null,
    active: true,
    created_by: currentUser.id
  };

  try {
    var { error } = await sb.from('coupons').insert([row]);
    if (error) { showCreateMsg('Failed: ' + error.message, true); return; }
    showCreateMsg('✓ Coupon "' + code + '" created!', false);
    document.getElementById('newCode').value = '';
    document.getElementById('newDesc').value = '';
    document.getElementById('newValue').value = '';
    setTimeout(function(){ switchTab('list'); }, 1200);
  } catch(e){ showCreateMsg('Failed: ' + e.message, true); }
};

function showCreateMsg(text, isError) {
  document.getElementById('createMsg').innerHTML =
    '<div class="' + (isError ? 'error-msg' : 'success-msg') + '">' + escapeHtml(text) + '</div>';
}

async function loadCoupons() {
  document.getElementById('panel-list').innerHTML = '<div class="card"><div class="empty">Loading coupons...</div></div>';
  try {
    var { data, error } = await sb.from('coupons').select('*').order('created_at', { ascending: false }).limit(200);
    if (error) throw error;
    allCoupons = data || [];
    renderCouponList();
  } catch(e){
    document.getElementById('panel-list').innerHTML = '<div class="card"><div class="empty">Error: ' + escapeHtml(e.message) + '</div></div>';
  }
}

function renderCouponList() {
  if (!allCoupons.length) {
    document.getElementById('panel-list').innerHTML = '<div class="card"><div class="empty">No coupons yet. Create your first one!</div></div>';
    return;
  }

  var html = '<div class="card"><h2>All coupons (' + allCoupons.length + ')</h2><div class="coupon-list">';
  allCoupons.forEach(function(c){
    var expired = c.expires_at && new Date(c.expires_at) < new Date();
    var maxedOut = c.max_total_uses && c.total_uses >= c.max_total_uses;
    var badge, badgeClass;
    if (!c.active) { badge = 'DISABLED'; badgeClass = 'disabled'; }
    else if (expired) { badge = 'EXPIRED'; badgeClass = 'expired'; }
    else if (maxedOut) { badge = 'MAXED OUT'; badgeClass = 'expired'; }
    else { badge = 'ACTIVE'; badgeClass = 'active'; }

    var discountText = c.discount_type === 'percent' ? c.discount_value + '% off'
      : c.discount_type === 'fixed' ? '$' + c.discount_value + ' off'
      : 'FREE';

    var appliesText = (c.applies_to || []).join(', ').toUpperCase();
    var maxText = c.max_total_uses ? c.total_uses + '/' + c.max_total_uses + ' total uses' : c.total_uses + ' uses';
    var perUserText = c.max_per_user + '/user';
    var expText = c.expires_at ? 'Expires ' + new Date(c.expires_at).toLocaleDateString() : 'No expiry';

    html += '<div class="coupon ' + (c.active ? '' : 'disabled') + '">' +
      '<div class="coupon-head">' +
      '<span class="coupon-code">' + escapeHtml(c.code) + '</span>' +
      '<span class="coupon-badge badge-' + badgeClass + '">' + badge + '</span>' +
      '</div>' +
      (c.description ? '<div style="font-size:0.85rem;margin-bottom:.35rem;">' + escapeHtml(c.description) + '</div>' : '') +
      '<div class="coupon-meta"><strong>' + discountText + '</strong> · Applies to ' + appliesText + '</div>' +
      '<div class="summary">' +
      '<span>' + maxText + '</span>' +
      '<span>' + perUserText + '</span>' +
      (c.min_purchase_cents > 0 ? '<span>Min $' + (c.min_purchase_cents/100).toFixed(2) + '</span>' : '') +
      '<span>' + expText + '</span>' +
      '</div>' +
      '<div class="coupon-actions">' +
      '<button onclick="copyCode(\'' + c.code + '\')">📋 Copy</button>' +
      '<button onclick="viewRedemptions(\'' + c.id + '\',\'' + escapeHtml(c.code) + '\')">📊 Stats</button>' +
      '<button onclick="toggleActive(\'' + c.id + '\',' + (!c.active) + ')">' + (c.active ? '⏸️ Disable' : '▶️ Enable') + '</button>' +
      '<button class="del" onclick="deleteCoupon(\'' + c.id + '\',\'' + escapeHtml(c.code) + '\')">🗑️ Delete</button>' +
      '</div>' +
      '</div>';
  });
  html += '</div></div>';
  document.getElementById('panel-list').innerHTML = html;
}

window.copyCode = function(code) {
  navigator.clipboard.writeText(code).then(function(){ alert('Copied: ' + code); });
};

window.toggleActive = async function(id, newValue) {
  try {
    await sb.from('coupons').update({ active: newValue }).eq('id', id);
    loadCoupons();
  } catch(e){ alert('Error: ' + e.message); }
};

window.deleteCoupon = async function(id, code) {
  if (!confirm('Delete coupon "' + code + '"? This will also delete its redemption history.')) return;
  try {
    await sb.from('coupons').delete().eq('id', id);
    loadCoupons();
  } catch(e){ alert('Error: ' + e.message); }
};

window.viewRedemptions = async function(couponId, code) {
  try {
    var { data, error } = await sb.from('coupon_redemptions')
      .select('*').eq('coupon_id', couponId).order('created_at', { ascending: false }).limit(50);
    if (error) throw error;
    if (!data || !data.length) { alert('No redemptions yet for ' + code); return; }
    var msg = code + ' — ' + data.length + ' redemption(s):\n\n';
    data.slice(0, 25).forEach(function(r){
      msg += new Date(r.created_at).toLocaleString() + ' · ' + r.product_type +
             ' · saved $' + ((r.discount_cents || 0)/100).toFixed(2) + '\n';
    });
    alert(msg);
  } catch(e){ alert('Error: ' + e.message); }
};

function escapeHtml(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

init();
</script>

<script src="scripts.js" defer></script>
</body>
</html>
