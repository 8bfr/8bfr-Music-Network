<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pages — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--dark:#0b0014;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);--green:#4ade80;--cyan:#00d9ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:rgba(15,0,30,.9);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.8rem;color:var(--primary);}
.header a{color:var(--text);text-decoration:none;font-weight:600;font-size:.85rem;}
.container{max-width:900px;margin:0 auto;padding:1.5rem;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.25rem;}
.tab{flex:1;text-align:center;padding:.65rem;font-weight:600;font-size:.82rem;cursor:pointer;color:rgba(234,230,255,.5);border:none;border-bottom:2px solid transparent;background:none;transition:all .2s;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.search-bar{margin-bottom:1.25rem;display:flex;gap:.5rem;}
.search-bar input{flex:1;padding:.55rem .85rem;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.88rem;outline:none;}
.search-bar input:focus{border-color:var(--primary);}
.btn{background:var(--primary);color:#fff;border:none;padding:.55rem 1.1rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85rem;transition:all .2s;}
.btn:hover{background:#6d28d9;}.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-sm{padding:.35rem .75rem;font-size:.78rem;}
.btn-ghost{background:rgba(124,58,237,.15);border:1px solid var(--border);color:var(--dim);}
.btn-green{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--green);}
.btn-red{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#fca5a5;}
.btn-gold{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);color:#fbbf24;}
.page-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;}
.page-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .3s;cursor:pointer;}
.page-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.2);}
.pc-cover{height:80px;background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(168,85,247,.15));overflow:hidden;position:relative;}
.pc-cover img{width:100%;height:100%;object-fit:cover;}
.pc-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:3px solid var(--dark);position:absolute;bottom:-28px;left:1rem;overflow:hidden;}
.pc-avatar img{width:100%;height:100%;object-fit:cover;}
.pc-body{padding:2rem 1rem 1rem;}
.pc-name{font-weight:700;font-size:.95rem;margin-bottom:.15rem;}
.pc-cat{font-size:.72rem;color:var(--cyan);margin-bottom:.3rem;}
.pc-desc{font-size:.75rem;color:var(--dim);line-height:1.4;max-height:2.8em;overflow:hidden;margin-bottom:.5rem;}
.pc-stats{display:flex;gap:.75rem;font-size:.7rem;color:rgba(168,85,247,.5);}
.page-detail{display:none;}
.pd-cover{width:100%;height:160px;background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(168,85,247,.15));border-radius:14px;overflow:hidden;margin-bottom:-40px;position:relative;}
.pd-cover img{width:100%;height:100%;object-fit:cover;}
.pd-header{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;position:relative;}
.pd-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:2rem;border:4px solid var(--dark);overflow:hidden;margin-bottom:.5rem;}
.pd-avatar img{width:100%;height:100%;object-fit:cover;}
.pd-name{font-size:1.4rem;font-weight:800;margin-bottom:.15rem;}
.pd-cat{font-size:.82rem;color:var(--cyan);margin-bottom:.25rem;}
.pd-desc{font-size:.88rem;color:var(--dim);line-height:1.6;margin-bottom:.75rem;}
.pd-stats{display:flex;gap:1.25rem;font-size:.82rem;color:var(--dim);margin-bottom:.75rem;}
.pd-stat-num{font-weight:800;color:var(--text);}
.post-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:.75rem;}
.post-header{display:flex;gap:.6rem;align-items:center;margin-bottom:.5rem;}
.post-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1rem;overflow:hidden;flex-shrink:0;}
.post-av img{width:100%;height:100%;object-fit:cover;}
.post-name{font-weight:700;font-size:.85rem;}
.post-time{font-size:.68rem;color:rgba(168,85,247,.4);}
.post-text{font-size:.88rem;line-height:1.6;margin-bottom:.5rem;}
.post-media img,.post-media video{width:100%;border-radius:8px;margin-bottom:.5rem;max-height:300px;object-fit:cover;}
.post-actions-bar{display:flex;gap:.75rem;padding-top:.5rem;border-top:1px solid rgba(124,58,237,.1);}
.post-action{background:none;border:none;color:var(--dim);font-size:.78rem;cursor:pointer;display:flex;align-items:center;gap:.25rem;}
.modal{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:1rem;}
.modal.show{display:flex;}
.modal-box{background:rgba(12,6,24,.98);border:1px solid var(--primary);border-radius:16px;padding:1.5rem;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-box h2{font-family:'Bebas Neue',cursive;color:var(--primary);margin-bottom:1rem;}
.form-group{margin-bottom:.75rem;}
.form-group label{display:block;font-size:.78rem;color:var(--dim);margin-bottom:.25rem;font-weight:600;}
.form-input{width:100%;padding:.55rem .75rem;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.88rem;outline:none;font-family:inherit;}
.form-input:focus{border-color:var(--primary);}
select.form-input{cursor:pointer;}
textarea.form-input{min-height:80px;resize:vertical;}
.post-form{background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem;}
.post-form textarea{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:.6rem;font-size:.88rem;resize:vertical;min-height:60px;font-family:inherit;outline:none;margin-bottom:.5rem;}
.post-form textarea:focus{border-color:var(--primary);}
.empty{text-align:center;padding:3rem;color:var(--dim);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="header">
<a href="feed.html">← Back</a>
<h1>📄 Pages</h1>
<button class="btn btn-sm" onclick="openCreatePage()">+ Create</button>
</div>
<div class="container">
<div id="browseView">
<div class="tabs">
<button class="tab active" onclick="switchTab('discover',this)">🔍 Discover</button>
<button class="tab" onclick="switchTab('my',this)">📄 My Pages</button>
<button class="tab" onclick="switchTab('following',this)">⭐ Following</button>
</div>
<div class="search-bar"><input type="text" id="pageSearch" placeholder="🔍 Search pages..." oninput="searchPages(this.value)"></div>
<div id="pageList"><div class="spinner"></div></div>
</div>
<div class="page-detail" id="pageDetail">
<div style="margin-bottom:.75rem;"><a href="#" onclick="backToBrowse();return false;" style="color:var(--dim);text-decoration:none;font-weight:600;">← Back to Pages</a></div>
<div id="pageDetailContent"></div>
</div>
</div>

<!-- CREATE PAGE MODAL -->
<div class="modal" id="createModal">
<div class="modal-box">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
<h2 style="margin:0;">📄 Create Page</h2>
<button onclick="closeModal()" style="background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;">✕</button>
</div>
<div class="form-group"><label>Page Name *</label><input class="form-input" id="cpName" placeholder="e.g. DJ Night Records"></div>
<div class="form-group"><label>Category</label>
<select class="form-input" id="cpCat">
<option value="artist">🎤 Artist / Band</option><option value="label">🏷️ Record Label</option><option value="producer">🎧 Producer</option><option value="brand">🎯 Brand</option><option value="event">🎪 Events</option><option value="podcast">🎙️ Podcast</option><option value="community">👥 Community</option><option value="other">📄 Other</option>
</select></div>
<div class="form-group"><label>Description</label><textarea class="form-input" id="cpDesc" placeholder="What's this page about?"></textarea></div>
<div class="form-group"><label>Logo/Avatar URL</label><input class="form-input" id="cpAvatar" placeholder="https://..."><div style="font-size:.7rem;color:var(--dim);margin-top:.2rem;">Upload at <a href="https://imgbb.com" target="_blank" style="color:var(--primary);">imgbb.com</a></div></div>
<div class="form-group"><label>Cover Photo URL</label><input class="form-input" id="cpCover" placeholder="https://... (wide banner)"></div>
<div style="display:flex;gap:.5rem;">
<button class="btn" onclick="createPage()" id="cpBtn" style="flex:1;">📄 Create Page</button>
<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
</div>
<div id="cpNotice" style="margin-top:.5rem;font-size:.82rem;text-align:center;"></div>
</div>
</div>

<!-- EDIT PAGE MODAL -->
<div class="modal" id="editModal">
<div class="modal-box">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
<h2 style="margin:0;">✏️ Edit Page</h2>
<button onclick="closeEditModal()" style="background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;">✕</button>
</div>
<div class="form-group"><label>Page Name *</label><input class="form-input" id="epName"></div>
<div class="form-group"><label>Category</label>
<select class="form-input" id="epCat">
<option value="artist">🎤 Artist / Band</option><option value="label">🏷️ Record Label</option><option value="producer">🎧 Producer</option><option value="brand">🎯 Brand</option><option value="event">🎪 Events</option><option value="podcast">🎙️ Podcast</option><option value="community">👥 Community</option><option value="other">📄 Other</option>
</select></div>
<div class="form-group"><label>Description</label><textarea class="form-input" id="epDesc"></textarea></div>
<div class="form-group"><label>Logo/Avatar URL</label><input class="form-input" id="epAvatar"><div style="font-size:.7rem;color:var(--dim);margin-top:.2rem;">Upload at <a href="https://imgbb.com" target="_blank" style="color:var(--primary);">imgbb.com</a></div></div>
<div class="form-group"><label>Cover Photo URL</label><input class="form-input" id="epCover"></div>
<div style="display:flex;gap:.5rem;">
<button class="btn" onclick="savePageEdit()" id="epBtn" style="flex:1;">💾 Save Changes</button>
<button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
</div>
</div>
</div>

<div style="text-align:center;padding:1rem 0;font-size:.72rem;color:rgba(168,85,247,.3);">Copyright 2025-2026 8BFR Music Network</div>
<script src="scripts.js" defer></script>
<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
var SITE_OWNER='cb556180-f032-4b21-9470-1d786f2664ab';
var currentUser=null,currentTab='discover',allPages=[],viewingPage=null;

async function init(){
  try{var s=await db.auth.getSession();currentUser=s.data.session?s.data.session.user:null;}catch(e){}
  loadPages();
}

async function loadPages(){
  var el=document.getElementById('pageList');
  el.innerHTML='<div class="spinner"></div>';
  var query=db.from('pages').select('*').eq('is_active',true);
  if(currentTab==='my'&&currentUser) query=query.eq('owner_id',currentUser.id);
  if(currentTab==='following'&&currentUser){
    var fr=await db.from('page_follows').select('page_id').eq('user_id',currentUser.id);
    var ids=(fr.data||[]).map(function(f){return f.page_id;});
    if(!ids.length){el.innerHTML='<div class="empty">Not following any pages yet.</div>';return;}
    query=query.in('id',ids);
  }
  var result=await query.order('follower_count',{ascending:false}).limit(50);
  if(result.error){el.innerHTML='<div class="empty">Error: '+result.error.message+'</div>';return;}
  allPages=result.data||[];
  renderPages(allPages);
}

function renderPages(pages){
  var el=document.getElementById('pageList');
  if(!pages.length){
    var msgs={discover:'No pages yet — be the first to create one!',my:'You haven\'t created any pages.',following:'Not following any pages yet.'};
    el.innerHTML='<div class="empty"><div style="font-size:2rem;margin-bottom:.5rem;">📄</div>'+(msgs[currentTab]||'No pages.')+'</div>';
    return;
  }
  var cats={artist:'🎤',label:'🏷️',producer:'🎧',brand:'🎯',event:'🎪',podcast:'🎙️',community:'👥',other:'📄'};
  el.innerHTML='<div class="page-grid">'+pages.map(function(p){
    var av=p.avatar_url?'<img src="'+esc(p.avatar_url)+'">':'📄';
    var cov=p.cover_url?'<img src="'+esc(p.cover_url)+'">':'';
    var catIcon=cats[p.category]||'📄';
    return '<div class="page-card" onclick="openPage(\''+p.id+'\')"><div class="pc-cover" style="position:relative;">'+cov+'<div class="pc-avatar">'+av+'</div></div><div class="pc-body"><div class="pc-name">'+esc(p.name)+'</div><div class="pc-cat">'+catIcon+' '+esc(p.category||'page')+'</div><div class="pc-desc">'+esc((p.description||'').substring(0,80))+'</div><div class="pc-stats"><span>👥 '+(p.follower_count||0)+'</span><span>📝 '+(p.post_count||0)+'</span></div></div></div>';
  }).join('')+'</div>';
}

function searchPages(q){if(!q.trim()){renderPages(allPages);return;}var l=q.toLowerCase();renderPages(allPages.filter(function(p){return(p.name||'').toLowerCase().indexOf(l)!==-1||(p.description||'').toLowerCase().indexOf(l)!==-1;}));}
function switchTab(tab,btn){currentTab=tab;document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});btn.classList.add('active');loadPages();}

async function openPage(id){
  document.getElementById('browseView').style.display='none';
  document.getElementById('pageDetail').style.display='block';
  var el=document.getElementById('pageDetailContent');
  el.innerHTML='<div class="spinner"></div>';
  var pr=await db.from('pages').select('*').eq('id',id).single();
  if(!pr.data){el.innerHTML='<div class="empty">Page not found.</div>';return;}
  var page=pr.data;
  viewingPage=page;
  var isPageOwner=currentUser&&page.owner_id===currentUser.id;
  var isSiteOwner=currentUser&&currentUser.id===SITE_OWNER;
  var isAdmin=isPageOwner||isSiteOwner;
  var cats={artist:'🎤',label:'🏷️',producer:'🎧',brand:'🎯',event:'🎪',podcast:'🎙️',community:'👥',other:'📄'};
  var av=page.avatar_url?'<img src="'+esc(page.avatar_url)+'">':'📄';
  var cov=page.cover_url?'<img src="'+esc(page.cover_url)+'" style="width:100%;height:100%;object-fit:cover;">':'';
  var isFollowing=false;
  if(currentUser){var fr=await db.from('page_follows').select('id').eq('page_id',id).eq('user_id',currentUser.id).maybeSingle();isFollowing=!!fr.data;}

  var h='<div class="pd-cover">'+cov+'</div>';
  h+='<div class="pd-header" style="margin-top:40px;">';
  h+='<div style="display:flex;gap:1rem;align-items:flex-end;flex-wrap:wrap;">';
  h+='<div class="pd-avatar" style="margin-top:-50px;">'+av+'</div>';
  h+='<div style="flex:1;min-width:200px;">';
  h+='<div class="pd-name">'+esc(page.name)+'</div>';
  h+='<div class="pd-cat">'+(cats[page.category]||'📄')+' '+esc(page.category||'Page')+'</div>';
  h+='</div>';
  if(currentUser&&!isPageOwner){
    h+='<button class="btn'+(isFollowing?' btn-green':'')+'" id="followPageBtn" onclick="togglePageFollow(\''+id+'\')">'+(isFollowing?'✓ Following':'+ Follow')+'</button>';
  }
  h+='</div>';
  if(page.description) h+='<div class="pd-desc">'+esc(page.description)+'</div>';
  h+='<div class="pd-stats"><span><span class="pd-stat-num">'+(page.follower_count||0)+'</span> followers</span><span><span class="pd-stat-num">'+(page.post_count||0)+'</span> posts</span></div>';

  // Admin buttons
  if(isAdmin){
    h+='<div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.75rem;padding-top:.75rem;border-top:1px solid rgba(124,58,237,.15);">';
    h+='<button class="btn btn-ghost btn-sm" onclick="openEditPage()">✏️ Edit Page</button>';
    if(isSiteOwner&&!isPageOwner) h+='<button class="btn btn-sm" style="background:#dc2626;" onclick="takeOverPage(\''+id+'\')">🔒 Take Over</button>';
    if(isSiteOwner) h+='<button class="btn btn-sm btn-gold" onclick="transferPage(\''+id+'\')">👑 Transfer</button>';
    h+='<button class="btn btn-sm btn-red" onclick="deletePage(\''+id+'\')">🗑️ Delete</button>';
    h+='</div>';
  }
  h+='</div>';

  // Post form (admin only)
  if(isAdmin){
    h+='<div class="post-form" id="pagePostForm">';
    h+='<textarea id="ppText" placeholder="Write a post for this page..."></textarea>';
    h+='<div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">';
    h+='<input class="form-input" id="ppImage" placeholder="Image URL (optional)" style="flex:1;min-width:150px;padding:.4rem .6rem;font-size:.8rem;">';
    h+='<input class="form-input" id="ppVideo" placeholder="Video URL (optional)" style="flex:1;min-width:150px;padding:.4rem .6rem;font-size:.8rem;">';
    h+='<button class="btn btn-sm" onclick="submitPagePost(\''+id+'\')">📝 Post</button>';
    h+='</div></div>';
  }

  h+='<div id="pagePosts"><div class="spinner"></div></div>';
  el.innerHTML=h;

  // Load posts
  var posts=await db.from('page_posts').select('*').eq('page_id',id).order('created_at',{ascending:false}).limit(30);
  var postsEl=document.getElementById('pagePosts');
  if(!posts.data||!posts.data.length){
    postsEl.innerHTML='<div class="empty" style="padding:1.5rem;">No posts yet.'+(isAdmin?' Write the first one above!':'')+'</div>';
  }else{
    postsEl.innerHTML=posts.data.map(function(post){
      var pav=page.avatar_url?'<img src="'+esc(page.avatar_url)+'">':'📄';
      var mediaHtml='';
      if(post.media_url){
        if(post.media_url.match(/\.(mp4|webm|mov)$/i)){
          mediaHtml='<div class="post-media"><video src="'+esc(post.media_url)+'" controls style="width:100%;border-radius:8px;max-height:300px;"></video></div>';
        }else{
          mediaHtml='<div class="post-media"><img src="'+esc(post.media_url)+'" onerror="this.style.display=\'none\'"></div>';
        }
      }
      if(post.video_url){
        mediaHtml+='<div class="post-media"><video src="'+esc(post.video_url)+'" controls style="width:100%;border-radius:8px;max-height:300px;"></video></div>';
      }
      var deleteBtn=isAdmin?'<button class="post-action" onclick="deletePagePost(\''+post.id+'\',\''+id+'\')">🗑️</button>':'';
      return '<div class="post-card"><div class="post-header"><div class="post-av">'+pav+'</div><div><div class="post-name">'+esc(page.name)+'</div><div class="post-time">'+ago(post.created_at)+'</div></div></div>'+(post.text?'<div class="post-text">'+esc(post.text)+'</div>':'')+mediaHtml+'<div class="post-actions-bar"><button class="post-action">❤️ '+(post.likes||0)+'</button><button class="post-action">💬 '+(post.comments||0)+'</button><button class="post-action">🔁 Share</button>'+deleteBtn+'</div></div>';
    }).join('');
  }
}

window.backToBrowse=function(){document.getElementById('browseView').style.display='block';document.getElementById('pageDetail').style.display='none';viewingPage=null;};

// ── FOLLOW ──
window.togglePageFollow=async function(pageId){
  if(!currentUser)return;
  var btn=document.getElementById('followPageBtn');
  var fr=await db.from('page_follows').select('id').eq('page_id',pageId).eq('user_id',currentUser.id).maybeSingle();
  if(fr.data){
    await db.from('page_follows').delete().eq('id',fr.data.id);
    await db.from('pages').update({follower_count:Math.max(0,(viewingPage.follower_count||1)-1)}).eq('id',pageId);
    btn.textContent='+ Follow';btn.className='btn';
  }else{
    await db.from('page_follows').insert({page_id:pageId,user_id:currentUser.id});
    await db.from('pages').update({follower_count:(viewingPage.follower_count||0)+1}).eq('id',pageId);
    btn.textContent='✓ Following';btn.className='btn btn-green';
  }
};

// ── POST (inline form) ──
window.submitPagePost=async function(pageId){
  var text=(document.getElementById('ppText').value||'').trim();
  var image=(document.getElementById('ppImage').value||'').trim();
  var video=(document.getElementById('ppVideo').value||'').trim();
  if(!text&&!image&&!video){alert('Write something, add an image, or add a video.');return;}
  try{
    await db.from('page_posts').insert({page_id:pageId,user_id:currentUser.id,text:text||null,media_url:image||null,video_url:video||null,likes:0,comments:0});
    await db.from('pages').update({post_count:(viewingPage.post_count||0)+1}).eq('id',pageId);
    document.getElementById('ppText').value='';
    document.getElementById('ppImage').value='';
    document.getElementById('ppVideo').value='';
    openPage(pageId);
  }catch(e){alert('Error: '+e.message);}
};

// ── DELETE POST ──
window.deletePagePost=async function(postId,pageId){
  if(!confirm('Delete this post?'))return;
  await db.from('page_posts').delete().eq('id',postId);
  await db.from('pages').update({post_count:Math.max(0,(viewingPage.post_count||1)-1)}).eq('id',pageId);
  openPage(pageId);
};

// ── EDIT PAGE (modal) ──
window.openEditPage=function(){
  if(!viewingPage)return;
  document.getElementById('epName').value=viewingPage.name||'';
  document.getElementById('epCat').value=viewingPage.category||'other';
  document.getElementById('epDesc').value=viewingPage.description||'';
  document.getElementById('epAvatar').value=viewingPage.avatar_url||'';
  document.getElementById('epCover').value=viewingPage.cover_url||'';
  document.getElementById('editModal').classList.add('show');
};
window.closeEditModal=function(){document.getElementById('editModal').classList.remove('show');};
window.savePageEdit=async function(){
  var btn=document.getElementById('epBtn');
  btn.disabled=true;btn.textContent='Saving...';
  try{
    await db.from('pages').update({
      name:document.getElementById('epName').value.trim(),
      category:document.getElementById('epCat').value,
      description:document.getElementById('epDesc').value.trim()||null,
      avatar_url:document.getElementById('epAvatar').value.trim()||null,
      cover_url:document.getElementById('epCover').value.trim()||null
    }).eq('id',viewingPage.id);
    closeEditModal();
    openPage(viewingPage.id);
  }catch(e){alert('Error: '+e.message);}
  btn.disabled=false;btn.textContent='💾 Save Changes';
};

// ── DELETE PAGE ──
window.deletePage=async function(id){
  if(!confirm('Delete this page and all its posts? This cannot be undone.'))return;
  await db.from('page_posts').delete().eq('page_id',id);
  var r=await db.from('pages').delete().eq('id',id);
  if(r.error)alert('Error: '+r.error.message);
  else{alert('🗑️ Page deleted.');backToBrowse();loadPages();}
};

// ── TAKE OVER (site owner only) ──
window.takeOverPage=async function(pageId){
  if(!confirm('Take over this page? The current owner will lose admin access.'))return;
  try{
    await db.from('pages').update({owner_id:currentUser.id}).eq('id',pageId);
    alert('🔒 You are now the owner of this page.');
    openPage(pageId);
  }catch(e){alert('Error: '+e.message);}
};

// ── TRANSFER OWNERSHIP (site owner only) ──
window.transferPage=async function(pageId){
  var newOwner=prompt('Enter the user_id of the new owner:');
  if(!newOwner)return;
  try{
    var pr=await db.from('profiles').select('display_name,username').eq('user_id',newOwner.trim()).single();
    if(!pr.data){alert('User not found.');return;}
    if(!confirm('Transfer this page to '+(pr.data.display_name||pr.data.username)+'?'))return;
    await db.from('pages').update({owner_id:newOwner.trim()}).eq('id',pageId);
    alert('👑 Page transferred to '+(pr.data.display_name||pr.data.username));
    openPage(pageId);
  }catch(e){alert('Error: '+e.message);}
};

// ── CREATE PAGE ──
window.openCreatePage=function(){document.getElementById('createModal').classList.add('show');};
window.closeModal=function(){document.getElementById('createModal').classList.remove('show');};
window.createPage=async function(){
  if(!currentUser){alert('Log in first.');return;}
  var name=document.getElementById('cpName').value.trim();
  if(!name){document.getElementById('cpNotice').textContent='Name is required.';return;}
  var btn=document.getElementById('cpBtn');
  btn.disabled=true;btn.textContent='Creating...';
  try{
    var r=await db.from('pages').insert({
      owner_id:currentUser.id,name:name,category:document.getElementById('cpCat').value,
      description:document.getElementById('cpDesc').value.trim()||null,
      avatar_url:document.getElementById('cpAvatar').value.trim()||null,
      cover_url:document.getElementById('cpCover').value.trim()||null,
      is_active:true,follower_count:0,post_count:0
    });
    if(r.error)throw r.error;
    document.getElementById('cpNotice').innerHTML='<span style="color:var(--green);">✅ Page created!</span>';
    setTimeout(function(){closeModal();loadPages();},800);
  }catch(e){document.getElementById('cpNotice').innerHTML='<span style="color:#ef4444;">'+e.message+'</span>';}
  btn.disabled=false;btn.textContent='📄 Create Page';
};

document.getElementById('createModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)closeEditModal();});

function ago(d){if(!d)return'';var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
