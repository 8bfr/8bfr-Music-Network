<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Site Stats -- 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);--green:#059669;--cyan:#00d9ff;--gold:#fbbf24;--bg:#0b0014;--text-dim:rgba(234,230,255,.55);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(var(--bg),#000);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--primary);letter-spacing:1px;}
.header a{color:var(--text-dim);text-decoration:none;font-size:0.85rem;font-weight:600;}
.container{max-width:800px;margin:0 auto;padding:1.5rem 1rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;}
.card h2{font-family:'Bebas Neue',cursive;font-size:1.2rem;color:var(--dim);margin-bottom:1rem;letter-spacing:1px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.75rem;}
.stat-card{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:12px;padding:1rem;text-align:center;transition:all .2s;}
.stat-card:hover{border-color:var(--primary);transform:translateY(-2px);}
.stat-num{font-family:'Bebas Neue',cursive;font-size:2rem;color:var(--primary);line-height:1;}
.stat-label{font-size:.72rem;color:var(--text-dim);margin-top:.3rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.stat-icon{font-size:1.2rem;margin-bottom:.3rem;}
.top-list{display:flex;flex-direction:column;gap:.5rem;}
.top-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.15);border-radius:10px;transition:all .2s;}
.top-item:hover{border-color:var(--primary);}
.top-rank{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:var(--gold);width:28px;text-align:center;flex-shrink:0;}
.top-avatar{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);object-fit:cover;flex-shrink:0;}
.top-info{flex:1;min-width:0;}
.top-name{font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-detail{font-size:.72rem;color:var(--text-dim);}
.role-grid{display:flex;flex-wrap:wrap;gap:.4rem;}
.role-tag{background:rgba(124,58,237,.1);border:1px solid var(--border);border-radius:20px;padding:.25rem .65rem;font-size:.72rem;color:var(--text-dim);}
.role-tag strong{color:var(--text);margin-right:.15rem;}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.refresh-btn{background:rgba(124,58,237,.15);border:1px solid var(--border);color:var(--dim);padding:.4rem .8rem;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;}
.refresh-btn:hover{border-color:var(--primary);background:rgba(124,58,237,.25);}
</style>
</head>
<body>
<div class="header">
    <h1>Site Stats</h1>
    <a href="feed.html">&larr; Back</a>
</div>
<div class="container">

    <!-- OVERVIEW -->
    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
            <h2>Platform Overview</h2>
            <button class="refresh-btn" onclick="loadAllStats()">Refresh</button>
        </div>
        <div class="stats-grid" id="overviewGrid">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- ROLE BREAKDOWN -->
    <div class="card">
        <h2>Community Roles</h2>
        <div class="role-grid" id="roleBreakdown"></div>
    </div>

    <!-- TOP ARTISTS -->
    <div class="card">
        <h2>Top Artists (by plays)</h2>
        <div class="top-list" id="topArtists"><div class="spinner"></div></div>
    </div>

    <!-- TOP SONGS -->
    <div class="card">
        <h2>Most Played Songs</h2>
        <div class="top-list" id="topSongs"><div class="spinner"></div></div>
    </div>

    <!-- NEWEST MEMBERS -->
    <div class="card">
        <h2>Newest Members</h2>
        <div class="top-list" id="newestMembers"><div class="spinner"></div></div>
    </div>

</div>
<div style="text-align:center;padding:1rem 0;font-size:.72rem;color:rgba(168,85,247,.3);">Copyright 2025-2026 8BFR Music Network</div>
<script src="scripts.js" defer></script>
<script>
var db=supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');

async function loadAllStats(){
    await Promise.all([loadOverview(),loadRoles(),loadTopArtists(),loadTopSongs(),loadNewest()]);
}

async function loadOverview(){
    var grid=document.getElementById('overviewGrid');
    try{
        var [users,songs,posts,groups,pages,playlists]=await Promise.all([
            db.from('profiles').select('user_id',{count:'exact',head:true}),
            db.from('songs').select('id',{count:'exact',head:true}),
            db.from('posts').select('id',{count:'exact',head:true}),
            db.from('groups').select('id',{count:'exact',head:true}),
            db.from('pages').select('id',{count:'exact',head:true}),
            db.from('playlists').select('id',{count:'exact',head:true})
        ]);
        // Total plays
        var {data:playData}=await db.from('songs').select('play_count');
        var totalPlays=0;
        if(playData) playData.forEach(function(s){totalPlays+=(s.play_count||0);});

        var stats=[
            {num:users.count||0,label:'Members'},
            {num:songs.count||0,label:'Songs'},
            {num:posts.count||0,label:'Posts'},
            {num:fmtNum(totalPlays),label:'Total Plays'},
            {num:groups.count||0,label:'Groups'},
            {num:pages.count||0,label:'Pages'},
            {num:playlists.count||0,label:'Playlists'}
        ];
        grid.innerHTML=stats.map(function(s){
            return '<div class="stat-card"><div class="stat-num">'+s.num+'</div><div class="stat-label">'+s.label+'</div></div>';
        }).join('');
    }catch(e){grid.innerHTML='<div style="color:var(--text-dim);padding:1rem;">Error loading stats</div>';}
}

async function loadRoles(){
    var el=document.getElementById('roleBreakdown');
    try{
        var {data}=await db.from('profiles').select('role,badges');
        if(!data){el.innerHTML='--';return;}
        var counts={};
        data.forEach(function(p){
            var r=p.role||'fan';
            counts[r]=(counts[r]||0)+1;
        });
        // Also count verified artists
        var verified=data.filter(function(p){return (p.badges||[]).indexOf('verified')!==-1;}).length;
        counts['verified']=verified;

        el.innerHTML=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];}).map(function(r){
            return '<div class="role-tag"><strong>'+counts[r]+'</strong> '+r+'</div>';
        }).join('');
    }catch(e){el.innerHTML='--';}
}

async function loadTopArtists(){
    var el=document.getElementById('topArtists');
    try{
        var {data:songs}=await db.from('songs').select('uploaded_by,play_count').not('uploaded_by','is',null);
        if(!songs||!songs.length){el.innerHTML='<div style="color:var(--text-dim);padding:.5rem;">No data yet</div>';return;}
        // Aggregate plays per artist
        var artistPlays={};
        songs.forEach(function(s){
            if(!s.uploaded_by)return;
            artistPlays[s.uploaded_by]=(artistPlays[s.uploaded_by]||0)+(s.play_count||0);
        });
        var sorted=Object.keys(artistPlays).sort(function(a,b){return artistPlays[b]-artistPlays[a];}).slice(0,10);
        if(!sorted.length){el.innerHTML='<div style="color:var(--text-dim);padding:.5rem;">No data yet</div>';return;}
        // Fetch profiles
        var {data:profs}=await db.from('profiles').select('user_id,display_name,username,avatar_url,role').in('user_id',sorted);
        var pMap={};
        if(profs) profs.forEach(function(p){pMap[p.user_id]=p;});

        el.innerHTML=sorted.map(function(uid,i){
            var p=pMap[uid]||{};
            var avatar=p.avatar_url||'assets/images/default-avatar.png';
            return '<a href="profile.html?id='+uid+'" style="text-decoration:none;color:inherit;" class="top-item">'+
                '<div class="top-rank">#'+(i+1)+'</div>'+
                '<img src="'+avatar+'" class="top-avatar" onerror="this.src=\'assets/images/default-avatar.png\'">'+
                '<div class="top-info"><div class="top-name">'+esc(p.display_name||p.username||'Unknown')+'</div>'+
                '<div class="top-detail">'+(p.role||'artist')+' -- '+fmtNum(artistPlays[uid])+' plays</div></div>'+
            '</a>';
        }).join('');
    }catch(e){el.innerHTML='<div style="color:var(--text-dim);">Error loading</div>';}
}

async function loadTopSongs(){
    var el=document.getElementById('topSongs');
    try{
        var {data:songs}=await db.from('songs').select('id,title,artist,cover_art,play_count,uploaded_by')
            .not('song_url','is',null).order('play_count',{ascending:false,nullsFirst:false}).limit(10);
        if(!songs||!songs.length){el.innerHTML='<div style="color:var(--text-dim);padding:.5rem;">No songs yet</div>';return;}
        el.innerHTML=songs.map(function(s,i){
            var cover=s.cover_art||'';
            var coverEl=cover?'<img src="'+cover+'" class="top-avatar" style="border-radius:6px;" onerror="this.style.display=\'none\'">':'<div class="top-avatar" style="border-radius:6px;display:flex;align-items:center;justify-content:center;background:rgba(124,58,237,.15);">&#127925;</div>';
            return '<div class="top-item">'+
                '<div class="top-rank">#'+(i+1)+'</div>'+
                coverEl+
                '<div class="top-info"><div class="top-name">'+esc(s.title||'Untitled')+'</div>'+
                '<div class="top-detail">'+esc(s.artist||'Unknown')+' -- '+fmtNum(s.play_count||0)+' plays</div></div>'+
            '</div>';
        }).join('');
    }catch(e){el.innerHTML='<div style="color:var(--text-dim);">Error loading</div>';}
}

async function loadNewest(){
    var el=document.getElementById('newestMembers');
    try{
        var {data:members}=await db.from('profiles').select('user_id,display_name,username,avatar_url,role,created_at')
            .order('created_at',{ascending:false}).limit(10);
        if(!members||!members.length){el.innerHTML='<div style="color:var(--text-dim);padding:.5rem;">No members yet</div>';return;}
        el.innerHTML=members.map(function(m){
            var avatar=m.avatar_url||'assets/images/default-avatar.png';
            var joined=m.created_at?new Date(m.created_at).toLocaleDateString():'?';
            return '<a href="profile.html?id='+m.user_id+'" style="text-decoration:none;color:inherit;" class="top-item">'+
                '<img src="'+avatar+'" class="top-avatar" onerror="this.src=\'assets/images/default-avatar.png\'">'+
                '<div class="top-info"><div class="top-name">'+esc(m.display_name||m.username||'Unknown')+'</div>'+
                '<div class="top-detail">'+(m.role||'fan')+' -- Joined '+joined+'</div></div>'+
            '</a>';
        }).join('');
    }catch(e){el.innerHTML='<div style="color:var(--text-dim);">Error loading</div>';}
}

function fmtNum(n){
    if(n>=1000000)return (n/1000000).toFixed(1)+'M';
    if(n>=1000)return (n/1000).toFixed(1)+'K';
    return n.toString();
}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

loadAllStats();
</script>
</body>
</html>
