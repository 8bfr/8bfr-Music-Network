<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>📻 8BFR Radio</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { background:#000; color:#fff; font-family:sans-serif; }
.overlay {
 position:fixed; inset:0;
 display:flex; align-items:center; justify-content:center;
 background:#000; z-index:9999; flex-direction:column;
}
</style>
</head>

<body>

<!-- START OVERLAY -->
<div id="overlay" class="overlay">
  <h1>📻 8BFR Radio</h1>
  <button id="startBtn">▶ Start</button>
</div>

<h2 id="title">Loading...</h2>
<button id="playBtn">▶</button>

<audio id="audio"></audio>

<script>
(async function(){

const db = supabase.createClient(
  'https://novbuvwpjnxwwvdekjhr.supabase.co',
  'YOUR_KEY'
);

let playlist=[];
let history=[];
let currentIndex=0;
let isPlaying=false;
let session=localStorage.getItem('session')||Date.now().toString();
localStorage.setItem('session',session);

const audio=document.getElementById('audio');
const playBtn=document.getElementById('playBtn');
const title=document.getElementById('title');
const overlay=document.getElementById('overlay');

/* LOAD SONGS */
async function loadSongs(){
  const {data}=await db.from('songs').select('*').not('song_url','is',null);
  playlist=data||[];
}

/* LOAD TRACK */
function loadTrack(i){
  const t=playlist[i];
  if(!t) return;

  audio.src=t.song_url;
  title.textContent=t.title;

  trackPlay(t.id);
}

/* TRACK PLAY */
async function trackPlay(id){
  await db.from('radio_plays').insert({
    song_id:id,
    session:session
  });
}

/* LIKE */
async function likeTrack(id){
  await db.from('radio_events').insert({
    song_id:id,
    type:'like'
  });
}

/* SKIP */
async function skipTrack(id){
  await db.from('radio_events').insert({
    song_id:id,
    type:'skip'
  });
}

/* 🧠 ALGORITHM */
async function getNextTrack(){

  const {data:stats}=await db.rpc('get_radio_stats');

  const recentIds=history.slice(0,10).map(x=>x.id);
  const lastArtist=history[0]?.artist;

  const scored=playlist.map(song=>{
    const s=stats.find(x=>x.song_id===song.id)||{};

    let score =
      (s.plays_24h||0)*2 +
      (s.likes||0)*3 +
      (s.completion_rate||0)*5 -
      (s.skips||0)*6 +
      Math.random()*5;

    if(recentIds.includes(song.id)) score-=1000;
    if(song.artist===lastArtist) score-=500;

    return {...song,score};
  });

  scored.sort((a,b)=>b.score-a.score);

  return scored[0];
}

/* NEXT TRACK */
async function nextTrack(){

  if(history.length){
    await skipTrack(history[0].id);
  }

  const next=await getNextTrack();
  const index=playlist.findIndex(x=>x.id===next.id);

  currentIndex=index;

  history.unshift(next);
  history=history.slice(0,20);

  loadTrack(index);
  play();
}

/* PLAY */
function play(){
  audio.play();
  isPlaying=true;
  playBtn.textContent='⏸';
}

/* PAUSE */
function pause(){
  audio.pause();
  isPlaying=false;
  playBtn.textContent='▶';
}

playBtn.onclick=()=> isPlaying?pause():play();

audio.onended=nextTrack;

/* START */
document.getElementById('startBtn').onclick=()=>{
  overlay.style.display='none';
  play();
  localStorage.setItem('started','1');
};

/* AUTO RESUME */
if(localStorage.getItem('started')){
  overlay.style.display='none';
  setTimeout(play,500);
}

await loadSongs();
loadTrack(0);

})();
</script>

</body>
</html>
