
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>📻 8BFR Radio — 8BFR Music Network</title>
  <link rel="icon" href="assets/images/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(#0b0014, #000); color: #eae6ff; margin: 0; min-height: 100vh; padding-bottom: 80px; overflow-x: hidden; }
    .radio-card { background: rgba(12,6,24,0.85); border: 1px solid rgba(124,58,237,0.4); border-radius: 16px; box-shadow: 0 0 30px rgba(124,58,237,0.2); }
    .vinyl { width: 180px; height: 180px; border-radius: 50%; border: 3px solid rgba(124,58,237,0.5); background: radial-gradient(circle, #1a0030 30%, #0b0014 70%); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(124,58,237,0.3); margin: 0 auto; position: relative; overflow: hidden; }
    .vinyl.spinning { animation: spin 3s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .vinyl-art { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(124,58,237,0.6); }
    .vinyl-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(124,58,237,0.15); }
    .vinyl-ring:nth-child(1) { width: 160px; height: 160px; }
    .vinyl-ring:nth-child(2) { width: 130px; height: 130px; }
    .vinyl-ring:nth-child(3) { width: 100px; height: 100px; }
    .progress-track { width: 100%; height: 6px; background: rgba(124,58,237,0.2); border-radius: 3px; cursor: pointer; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a855f7); border-radius: 3px; transition: width 0.3s linear; }
    .ctrl-btn { width: 48px; height: 48px; border-radius: 50%; border: 1px solid rgba(124,58,237,0.5); background: rgba(12,6,24,0.9); color: #eae6ff; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .ctrl-btn:hover { background: rgba(124,58,237,0.3); border-color: #a855f7; }
    .ctrl-btn.active { background: rgba(124,58,237,0.4); border-color: #a855f7; color: #a855f7; }
    .play-btn { width: 60px; height: 60px; font-size: 1.6rem; background: #7c3aed; border-color: #7c3aed; color: white; }
    .play-btn:hover { background: #6d28d9; }
    .queue-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: rgba(124,58,237,0.05); border: 1px solid rgba(124,58,237,0.15); border-radius: 10px; cursor: pointer; transition: all 0.2s; }
    .queue-item:hover { background: rgba(124,58,237,0.15); border-color: rgba(124,58,237,0.4); }
    .queue-cover { width: 42px; height: 42px; border-radius: 8px; background: linear-gradient(135deg, #7c3aed, #a855f7); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; overflow: hidden; }
    .queue-cover img { width: 100%; height: 100%; object-fit: cover; }
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(124,58,237,0.95); color: white; padding: 0.6rem 1.2rem; border-radius: 20px; font-size: 0.85rem; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .volume-slider { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(124,58,237,0.3); border-radius: 2px; outline: none; }
    .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #a855f7; cursor: pointer; }
    .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; padding: 0.5rem 0.75rem; text-decoration: none; color: #a855f7; transition: all 0.2s; border-radius: 0.5rem; flex: 1; max-width: 100px; }
    .bottom-nav-item:hover { background: rgba(124,58,237,0.2); }
    .bottom-nav-item.active { color: #fff; background: rgba(124,58,237,0.3); }
    .tap-prompt { animation: pulse-glow 2s ease-in-out infinite; }
    @keyframes pulse-glow { 0%,100% { text-shadow: 0 0 10px rgba(168,85,247,0.3); } 50% { text-shadow: 0 0 20px rgba(168,85,247,0.7); } }
  </style>
</head>
<body>
  <header class="px-4 py-4" style="background:rgba(15,0,30,0.9); border-bottom:1px solid rgba(124,58,237,0.5);">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold flex items-center gap-2">📻 8BFR Radio</h1>
        <p class="text-xs text-purple-300/80">Non-stop music from verified artists</p>
      </div>
      <div class="flex items-center gap-2">
        <span class="inline-block w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
        <span class="text-xs text-red-400 font-semibold">LIVE</span>
      </div>
    </div>
  </header>
  <main class="max-w-3xl mx-auto px-4 mt-6">
    <div class="flex gap-4 mb-4 text-sm justify-center">
      <div class="flex items-center gap-1"><span class="text-purple-400">🎵</span><span id="statTracks" class="font-bold text-purple-300">0</span><span class="text-purple-200/60 ml-1">Tracks</span></div>
      <div class="flex items-center gap-1"><span class="text-purple-400">🎤</span><span id="statArtists" class="font-bold text-purple-300">0</span><span class="text-purple-200/60 ml-1">Artists</span></div>
    </div>
    <div class="radio-card p-6 mb-6" id="playerCard">
      <div class="vinyl mb-4" id="vinyl">
        <div class="vinyl-ring"></div><div class="vinyl-ring"></div><div class="vinyl-ring"></div>
        <img id="vinylArt" class="vinyl-art" src="assets/images/default_post.jpg" alt="Album art">
      </div>
      <div class="text-center mb-4">
        <div id="nowTitle" class="font-bold text-lg">Loading radio...</div>
        <a id="nowArtistLink" href="#" class="text-purple-400 text-sm hover:underline"><span id="nowArtist">—</span><span id="nowVerified" style="color:#00d9ff;display:none;"> ✓</span></a>
        <div id="nowExtra" class="text-xs text-purple-300/50 mt-1"></div>
      </div>
      <div class="flex items-center gap-2 mb-4 text-xs text-purple-300/70">
        <span id="timeElapsed">0:00</span>
        <div class="progress-track flex-1" id="progressTrack"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <span id="timeDuration">0:00</span>
      </div>
      <div class="flex items-center justify-center gap-3 mb-4">
        <button class="ctrl-btn active" id="btnShuffle" title="Shuffle">🔀</button>
        <button class="ctrl-btn" id="btnPrev" title="Previous">⏮</button>
        <button class="ctrl-btn play-btn" id="btnPlay" title="Play/Pause">▶</button>
        <button class="ctrl-btn" id="btnNext" title="Next">⏭</button>
        <button class="ctrl-btn" id="btnRepeat" title="Repeat">🔁</button>
      </div>
      <div class="flex justify-center gap-3 mb-4">
        <button class="ctrl-btn" id="btnLike" title="Like" style="width:40px;height:40px;font-size:1rem;">🤍</button>
        <button class="ctrl-btn" id="btnShare" title="Share" style="width:40px;height:40px;font-size:1rem;">🔗</button>
        <button class="ctrl-btn" id="btnBuy" title="Buy" style="width:40px;height:40px;font-size:1rem;display:none;">🛒</button>
      </div>
      <div class="flex items-center gap-2 px-4">
        <span class="text-sm">🔊</span>
        <input type="range" min="0" max="100" value="80" class="volume-slider flex-1" id="volumeSlider">
      </div>
      <audio id="audioPlayer" preload="auto" autoplay muted></audio>
    </div>
    <div id="emptyState" class="radio-card p-6 mb-6" style="display:none;">
      <div style="text-align:center;padding:3rem 1rem;">
        <div style="font-size:4rem;margin-bottom:1rem;">📻</div>
        <h3 class="text-lg font-bold mb-2">No tracks available yet</h3>
        <p class="text-purple-300/70 mb-4">Upload music from your profile to be played on 8BFR Radio.</p>
        <a href="profile.html" style="background:#7c3aed;color:white;padding:0.6rem 1.2rem;border-radius:8px;text-decoration:none;font-weight:600;">Go to Profile</a>
      </div>
    </div>
    <div class="radio-card p-4 mb-6" id="queueSection">
      <h3 class="font-bold text-sm text-purple-400 mb-3">🎶 Up Next</h3>
      <div id="queueList" class="flex flex-col gap-2"></div>
    </div>
  </main>
  <div id="toast" class="toast"></div>
  <nav class="fixed bottom-0 left-0 right-0 z-50 bg-[rgba(15,0,30,0.95)] backdrop-blur-md border-t border-purple-500/40">
    <div class="max-w-6xl mx-auto px-2 py-2">
      <div class="flex items-center justify-around gap-1">
        <a href="index.html" class="bottom-nav-item"><div style="font-size:1.25rem;">🏠</div><div style="font-size:0.7rem;font-weight:600;">Home</div></a>
        <a href="search.html" class="bottom-nav-item"><div style="font-size:1.25rem;">🔍</div><div style="font-size:0.7rem;font-weight:600;">Search</div></a>
        <a href="feed.html" class="bottom-nav-item"><div style="font-size:1.25rem;">📰</div><div style="font-size:0.7rem;font-weight:600;">Feed</div></a>
        <a href="radio.html" class="bottom-nav-item active"><div style="font-size:1.25rem;">📻</div><div style="font-size:0.7rem;font-weight:600;">Radio</div></a>
        <a href="shop.html" class="bottom-nav-item"><div style="font-size:1.25rem;">🛒</div><div style="font-size:0.7rem;font-weight:600;">Shop</div></a>
      </div>
    </div>
  </nav>
  <script>
  (async function(){
    const SUPABASE_URL='https://novbuvwpjnxwwvdekjhr.supabase.co';
    const SUPABASE_KEY='YOUR_SUPABASE_KEY';
    const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

    let playlist=[], currentIndex=-1, isPlaying=false, isShuffled=true, isRepeat=false;
    const audio=document.getElementById('audioPlayer');
    const vinyl=document.getElementById('vinyl');
    const vinylArt=document.getElementById('vinylArt');
    const nowTitle=document.getElementById('nowTitle');
    const nowArtist=document.getElementById('nowArtist');
    const nowArtistLink=document.getElementById('nowArtistLink');
    const nowVerified=document.getElementById('nowVerified');
    const nowExtra=document.getElementById('nowExtra');
    const progressFill=document.getElementById('progressFill');
    const progressTrack=document.getElementById('progressTrack');
    const timeElapsed=document.getElementById('timeElapsed');
    const timeDuration=document.getElementById('timeDuration');
    const btnPlay=document.getElementById('btnPlay');
    const queueList=document.getElementById('queueList');

    function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>{ t.classList.remove('show'); },2000); }

    async function loadSongs(){
      try{
        const {data,error}=await db.from('songs').select('*').not('song_url','is',null).order('created_at',{ascending:false});
        if(error) throw error;
        playlist=data.map(s=>({...s,is_8bfr:!!s.is_8bfr}));
        document.getElementById('statTracks').textContent=playlist.length;
        const artists=new Set(playlist.map(x=>x.artist)); document.getElementById('statArtists').textContent=artists.size;
        if(!playlist.length){ document.getElementById('emptyState').style.display='block'; return; }
        shufflePlaylist();
        currentIndex=0;
        loadTrack(currentIndex);
        audio.muted=false;
        playTrack();
      }catch(e){ console.error(e); showToast('Error loading songs'); }
    }

    function shufflePlaylist(){
      const bfrSongs=playlist.filter(s=>s.is_8bfr);
      const otherSongs=playlist.filter(s=>!s.is_8bfr);
      let combined=[];
      while(bfrSongs.length || otherSongs.length){
        if(bfrSongs.length){ combined.push(bfrSongs.shift()); }
        if(otherSongs.length){ combined.push(otherSongs.shift()); }
      }
      playlist=combined;
    }

    function loadTrack(idx){
      if(idx<0||idx>=playlist.length) return;
      currentIndex=idx;
      const t=playlist[idx];
      audio.src=t.song_url; audio.load();
      vinylArt.src=t.cover_art||'assets/images/default_post.jpg';
      nowTitle.textContent=t.title+(t.explicit?' 🔞':'');
      nowArtist.textContent=t.artist;
      nowVerified.style.display=t.verified?'inline':'none';
      progressFill.style.width='0%';
      timeElapsed.textContent='0:00'; timeDuration.textContent='0:00';
      renderQueue();
    }

    function playTrack(){ audio.play().then(()=>{ isPlaying=true; btnPlay.textContent='⏸'; vinyl.classList.add('spinning'); nowExtra.textContent=''; }).catch(()=>{ nowExtra.innerHTML='<span class="tap-prompt">▶ Tap play</span>'; }); }
    function pauseTrack(){ audio.pause(); isPlaying=false; btnPlay.textContent='▶'; vinyl.classList.remove('spinning'); }
    function nextTrack(){ loadTrack((currentIndex+1)%playlist.length); playTrack(); }
    function prevTrack(){ if(audio.currentTime>3){ audio.currentTime=0; } else { loadTrack((currentIndex-1+playlist.length)%playlist.length); playTrack(); } }

    btnPlay.addEventListener('click',
                             btnPlay.addEventListener('click', () => { isPlaying ? pauseTrack() : playTrack(); });

// Next/Prev Buttons
document.getElementById('btnNext').addEventListener('click', nextTrack);
document.getElementById('btnPrev').addEventListener('click', prevTrack);

// Shuffle/Repeat Toggle
document.getElementById('btnShuffle').addEventListener('click', (e) => {
  isShuffled = !isShuffled;
  e.currentTarget.classList.toggle('active', isShuffled);
  if(isShuffled) shufflePlaylist();
});
document.getElementById('btnRepeat').addEventListener('click', (e) => {
  isRepeat = !isRepeat;
  e.currentTarget.classList.toggle('active', isRepeat);
});

// Volume Control
document.getElementById('volumeSlider').addEventListener('input', e => {
  audio.volume = e.target.value / 100;
});

// Progress Bar
audio.addEventListener('timeupdate', () => {
  const percent = (audio.currentTime / audio.duration) * 100 || 0;
  progressFill.style.width = percent + '%';
  timeElapsed.textContent = formatTime(audio.currentTime);
  timeDuration.textContent = formatTime(audio.duration);
});
progressTrack.addEventListener('click', e => {
  const rect = progressTrack.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  audio.currentTime = (clickX / rect.width) * audio.duration;
});

// Auto-next handling
audio.addEventListener('ended', () => {
  if(isRepeat) playTrack();
  else nextTrack();
});

// Queue Rendering
function renderQueue(){
  queueList.innerHTML = '';
  playlist.forEach((s,i)=>{
    const div=document.createElement('div');
    div.className='queue-item';
    div.innerHTML = `<div class="queue-cover"><img src="${s.cover_art||'assets/images/default_post.jpg'}" alt="cover"></div>
                     <div class="flex flex-col text-xs"><span class="font-semibold">${s.title}</span><span>${s.artist}</span></div>`;
    div.addEventListener('click',()=>{ loadTrack(i); playTrack(); });
    queueList.appendChild(div);
  });
}

// Format time helper
function formatTime(sec){ if(isNaN(sec)) return '0:00'; const m=Math.floor(sec/60), s=Math.floor(sec%60); return m+':'+(s<10?'0':'')+s; }

// Initialize
loadSongs();

})();
  </script>
</body>
</html>
