<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Featured Artists — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;}
  body{background:linear-gradient(#0b0014,#000);color:#eae6ff;font-family:system-ui,sans-serif;margin:0;padding:0;padding-bottom:70px;}
  .header{background:rgba(15,0,30,0.95);border-bottom:1px solid rgba(124,58,237,0.5);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
  .featured-badge{display:inline-block;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;padding:0.4rem 1rem;border-radius:20px;font-size:0.85rem;font-weight:700;margin-bottom:1rem;}
  .artist-card{background:rgba(12,6,24,0.8);border:1px solid rgba(124,58,237,0.35);border-radius:16px;padding:1.5rem;transition:all 0.3s;position:relative;overflow:hidden;}
  .artist-card:hover{border-color:rgba(168,85,247,0.6);box-shadow:0 8px 32px rgba(124,58,237,0.3);}
  .artist-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:2.5rem;margin:0 auto 1rem;box-shadow:0 4px 20px rgba(124,58,237,0.4);overflow:hidden;}
  .artist-avatar img{width:100%;height:100%;object-fit:cover;}
  .artist-name{font-size:1.2rem;font-weight:700;text-align:center;margin-bottom:0.5rem;display:flex;align-items:center;justify-content:center;gap:0.4rem;}
  .verified-badge{color:#00d9ff;font-size:1rem;}
  .artist-badges{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem;}
  .badge{padding:0.3rem 0.75rem;border-radius:20px;font-size:0.75rem;font-weight:600;background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.4);color:#a855f7;}
  .view-profile-btn{display:block;width:100%;padding:0.75rem;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;color:white;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center;text-decoration:none;}
  .view-profile-btn:hover{box-shadow:0 4px 20px rgba(124,58,237,0.5);transform:translateY(-2px);}
  .admin-panel{display:none;background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.35);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:2rem;}
  .admin-panel h3{margin:0 0 1rem;font-size:1rem;font-weight:700;color:#a855f7;}
  .admin-select{width:100%;padding:0.6rem 0.9rem;border-radius:9px;border:1px solid rgba(124,58,237,0.4);background:rgba(0,0,0,0.4);color:#eae6ff;font-size:0.9rem;cursor:pointer;margin-bottom:0.75rem;}
  .admin-select option{background:#1a0030;}
  .feature-btn{padding:0.6rem 1.25rem;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:9px;color:white;font-weight:700;font-size:0.9rem;cursor:pointer;}
  .remove-btn{width:100%;margin-top:0.75rem;padding:0.55rem;border:1px solid rgba(239,68,68,0.5);border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;background:rgba(239,68,68,0.15);color:#ef4444;display:none;}
  .admin-notice{margin-top:0.6rem;font-size:0.8rem;color:rgba(168,85,247,0.6);min-height:1.2em;}
  .spinner{width:40px;height:40px;border-radius:50%;border:3px solid rgba(168,85,247,0.2);border-top-color:#a855f7;animation:spin 0.7s linear infinite;margin:3rem auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media(max-width:640px){.artist-grid{grid-template-columns:1fr !important;}}
</style>
</head>
<body>
<header class="header">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
    <a href="index.html" style="color:#a855f7;text-decoration:none;font-weight:600;">← Home</a>
    <h1 style="font-size:1.25rem;font-weight:800;background:linear-gradient(135deg,#f59e0b,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">⭐ Featured Artists</h1>
    <div style="width:80px;"></div>
  </div>
</header>
<main class="max-w-6xl mx-auto px-4 py-6">
  <div style="text-align:center;margin-bottom:2rem;">
    <div class="featured-badge">✨ HAND-PICKED BY 8BFR</div>
    <p style="color:#a855f7;opacity:0.8;font-size:0.95rem;">Exceptional talent selected by our team</p>
  </div>
  <div class="admin-panel" id="adminPanel">
    <h3>⚙️ Admin — Manage Featured Artists</h3>
    <select class="admin-select" id="artistDropdown"><option value="">Loading…</option></select>
    <button class="feature-btn" id="featureBtn" onclick="featureSelected()">⭐ Feature Artist</button>
    <div class="admin-notice" id="adminNotice"></div>
  </div>
  <div id="loadingSpinner"><div class="spinner"></div></div>
  <div id="featuredArtists" style="display:none;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;" class="artist-grid"></div>
  <div id="emptyState" style="display:none;text-align:center;padding:4rem 2rem;color:#a855f7;opacity:0.7;">
    <div style="font-size:4rem;margin-bottom:1rem;">⭐</div>
    <div style="font-size:1.2rem;font-weight:600;">No featured artists yet</div>
  </div>
</main>
<script src="scripts.js" defer></script>
<script>
const db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
let adminMode=false;

async function isAdmin(){
  try{const{data:{session}}=await db.auth.getSession();if(!session)return false;
  const{data:p}=await db.from('profiles').select('role').eq('user_id',session.user.id).maybeSingle();
  return['owner','admin','mod','moderator'].includes((p?.role||'').toLowerCase());}catch(e){return false;}
}

function showNotice(msg,type){var el=document.getElementById('adminNotice');el.textContent=msg;el.style.color=type==='success'?'#4ade80':type==='warn'?'#f59e0b':'rgba(168,85,247,0.6)';}

async function populateDropdown(featuredIds){
  var dd=document.getElementById('artistDropdown');dd.innerHTML='<option value="">Loading…</option>';
  try{
    // Load REAL profiles
    var{data:profiles}=await db.from('profiles').select('user_id,username,display_name,role,badges').order('username');
    // Load DUMMY profiles (AI artists)
    var{data:dummies}=await db.from('dummy_profiles').select('id,username,display_name,role,badges,verified').order('username');
    
    var allArtists=[];
    // Add real profiles
    (profiles||[]).forEach(function(p){if(p.user_id)allArtists.push({id:p.user_id,name:p.display_name||p.username||p.user_id,type:'real',role:p.role||''});});
    // Add dummy profiles that have artist-related roles
    (dummies||[]).forEach(function(d){allArtists.push({id:'dummy:'+d.id,name:(d.display_name||d.username||'AI Artist')+' (AI)',type:'dummy',role:d.role||''});});

    var fSet=new Set(featuredIds||[]);
    dd.innerHTML='<option value="">— Select an artist to feature —</option>';
    allArtists.forEach(function(a){
      var opt=document.createElement('option');opt.value=a.id;
      var already=fSet.has(a.id);
      opt.textContent=(already?'⭐ ':'')+a.name+(a.role?' ['+a.role+']':'')+(already?' (already featured)':'');
      if(already)opt.style.color='#f59e0b';
      dd.appendChild(opt);
    });
    showNotice(allArtists.length+' artists loaded ('+((dummies||[]).length)+' AI) · '+fSet.size+' featured','info');
  }catch(e){dd.innerHTML='<option value="" disabled>Error loading</option>';showNotice('Error: '+e.message,'warn');}
}

async function featureSelected(){
  var uid=document.getElementById('artistDropdown').value;
  if(!uid){showNotice('Select an artist first.','warn');return;}
  var btn=document.getElementById('featureBtn');btn.disabled=true;btn.textContent='Saving…';
  try{
    // Check if already featured
    var{data:ex}=await db.from('featured_artists').select('id').or('user_id.eq.'+uid+',dummy_id.eq.'+uid).maybeSingle();
    if(ex){showNotice('Already featured!','warn');btn.disabled=false;btn.textContent='⭐ Feature Artist';return;}
    
    var row={expires_at:new Date(Date.now()+365*24*60*60*1000).toISOString()};
    if(uid.startsWith('dummy:'))row.dummy_id=uid.replace('dummy:','');
    else row.user_id=uid;
    
    var{error}=await db.from('featured_artists').insert(row);
    if(error)throw error;
    showNotice('⭐ Artist featured!','success');
    await loadFeaturedArtists();
  }catch(e){showNotice('Error: '+e.message,'warn');}
  finally{btn.disabled=false;btn.textContent='⭐ Feature Artist';}
}

async function removeFeatured(id){
  if(!confirm('Remove from featured?'))return;
  try{var{error}=await db.from('featured_artists').delete().eq('id',id);if(error)throw error;await loadFeaturedArtists();}catch(e){alert('Error: '+e.message);}
}

async function loadFeaturedArtists(){
  var spinner=document.getElementById('loadingSpinner'),grid=document.getElementById('featuredArtists'),empty=document.getElementById('emptyState');
  spinner.style.display='block';grid.style.display='none';empty.style.display='none';
  try{
    var{data:featured,error}=await db.from('featured_artists').select('id,user_id,dummy_id').order('created_at',{ascending:false});
    if(error)throw error;
    if(!featured||!featured.length){empty.style.display='block';if(adminMode)populateDropdown([]);return;}
    
    // Collect IDs
    var realIds=featured.filter(function(f){return f.user_id;}).map(function(f){return f.user_id;});
    var dummyIds=featured.filter(function(f){return f.dummy_id;}).map(function(f){return f.dummy_id;});
    
    var pm={},dm={};
    if(realIds.length){var{data:profiles}=await db.from('profiles').select('user_id,username,display_name,bio,badges,avatar_url,role,verified_artist').in('user_id',realIds);(profiles||[]).forEach(function(p){pm[p.user_id]=p;});}
    if(dummyIds.length){var{data:dummies}=await db.from('dummy_profiles').select('id,username,display_name,bio,badges,avatar_url,role,verified').in('id',dummyIds);(dummies||[]).forEach(function(d){dm[d.id]=d;});}
    
    var featuredIdsList=featured.map(function(f){return f.user_id||(f.dummy_id?'dummy:'+f.dummy_id:'');});
    if(adminMode)populateDropdown(featuredIdsList);
    
    var badgeEmoji={artist:'🎤',beatmaker:'🎚️',songwriter:'✍️',verified:'✓',founder:'👑',rapper:'🎙️',singer:'🎶',producer:'🎹',dj:'🎧'};
    
    grid.innerHTML=featured.map(function(row){
      var p=null,isDummy=false,profileLink='';
      if(row.user_id&&pm[row.user_id]){p=pm[row.user_id];profileLink='profile.html?id='+encodeURIComponent(row.user_id);}
      else if(row.dummy_id&&dm[row.dummy_id]){p=dm[row.dummy_id];isDummy=true;profileLink='profile.html?dummy='+encodeURIComponent(row.dummy_id);}
      if(!p)return'';
      
      var name=p.display_name||p.username||'Artist';
      var badges=Array.isArray(p.badges)?p.badges:[];
      var badgesHTML=badges.map(function(b){return'<span class="badge">'+(badgeEmoji[b]||'')+' '+b.toUpperCase()+'</span>';}).join('');
      if(isDummy)badgesHTML+='<span class="badge" style="background:rgba(0,217,255,0.15);border-color:rgba(0,217,255,0.4);color:#00d9ff;">🤖 AI ARTIST</span>';
      var avInner=p.avatar_url?'<img src="'+p.avatar_url+'" onerror="this.parentNode.textContent=\'🎵\'">':'🎵';
      var verified=(isDummy?p.verified:p.verified_artist);
      
      return'<div class="artist-card">'+
        '<div class="artist-avatar">'+avInner+'</div>'+
        '<div class="artist-name">'+name+(verified?'<span class="verified-badge">✓</span>':'')+'</div>'+
        (badgesHTML?'<div class="artist-badges">'+badgesHTML+'</div>':'')+
        (p.bio?'<div style="text-align:center;font-size:0.9rem;color:#a855f7;opacity:0.8;margin-bottom:1rem;line-height:1.5;">'+p.bio+'</div>':'')+
        '<a href="'+profileLink+'" class="view-profile-btn">👤 View Profile</a>'+
        (adminMode?'<button class="remove-btn" style="display:block;" onclick="removeFeatured(\''+row.id+'\')">❌ Remove Featured</button>':'')+
      '</div>';
    }).filter(Boolean).join('');
    
    grid.style.display='grid';
  }catch(e){grid.innerHTML='<div style="text-align:center;padding:2rem;color:#ef4444;">Error: '+e.message+'</div>';grid.style.display='grid';}
  finally{spinner.style.display='none';}
}

document.addEventListener('DOMContentLoaded',function(){
  loadFeaturedArtists();
  isAdmin().then(function(a){adminMode=a;if(a)document.getElementById('adminPanel').style.display='block';});
});
</script>
</body>
</html>
