<!--
  AUTOMOD INTEGRATION GUIDE
  
  Add this function to any page where users submit text content
  (chat, feed posts, DMs, comments, bios, etc.)
  
  Copy this script block into chat.html, feed.html, dm.html, profile.html
  right before the closing </body> tag.
  
  Then call checkAutoMod() before sending the content.
-->

<script>
// ── AUTOMOD CLIENT HELPER ──
// Returns: { allowed: true/false, warning: "message" }
// Never blocks - only warns. Owner gets notified for serious violations.

window.checkAutoMod = async function(text, contentType, userId, contentId) {
  if (!text || text.length < 3) return { allowed: true };
  try {
    var res = await fetch('https://8bfr-api.vercel.app/api/automod', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: text,
        content_type: contentType || 'message',
        user_id: userId || '',
        content_id: contentId || ''
      })
    });
    var data = await res.json();
    if (data.flagged) {
      return {
        allowed: true,
        flagged: true,
        severity: data.severity,
        warning: data.warning_message || 'This content may violate community guidelines.'
      };
    }
    return { allowed: true, flagged: false };
  } catch(e) {
    // On error, allow content through
    return { allowed: true, flagged: false };
  }
};
</script>
