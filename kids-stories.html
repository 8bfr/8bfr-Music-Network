<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>📖 Kids Stories — 8BFR</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--kp:#8b5cf6;--pink:#ec4899;--blue:#3b82f6;--green:#22c55e;--yellow:#eab308;--bg:#0f0a1a;--card:rgba(15,10,35,.85);--text:#f0eaff;--dim:rgba(168,130,255,.7);--border:rgba(139,92,246,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(135deg,#0f0a1a,#1a0533);color:var(--text);min-height:100vh;padding-bottom:90px;}
.kz-header{background:linear-gradient(135deg,rgba(139,92,246,.25),rgba(236,72,153,.15));border-bottom:2px solid var(--kp);padding:.75rem 1.25rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.kz-header h1{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--kp);}
.container{max-width:600px;margin:0 auto;padding:1.25rem;}
.section-title{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--kp);margin-bottom:.75rem;}
.story-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;cursor:pointer;transition:all .25s;}
.story-card:hover{border-color:var(--kp);transform:translateY(-2px);}
.story-title{font-weight:700;font-size:1rem;margin-bottom:.3rem;}
.story-author{font-size:.82rem;color:var(--dim);}
.story-preview{font-size:.88rem;color:rgba(240,234,255,.6);margin-top:.5rem;line-height:1.5;}
.empty{text-align:center;padding:2.5rem 1rem;color:rgba(168,130,255,.4);}
.spinner{width:28px;height:28px;border:3px solid rgba(139,92,246,.2);border-top-color:#a855f7;border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
#kidNav{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(15,10,35,.97);border-top:2px solid var(--kp);display:flex;justify-content:space-around;padding:.4rem 0;backdrop-filter:blur(12px);}
#kidNav a{text-decoration:none;color:rgba(168,130,255,.5);font-size:.65rem;font-weight:600;text-align:center;padding:.3rem .1rem;display:flex;flex-direction:column;align-items:center;gap:.15rem;}
#kidNav a.active{color:var(--kp);}
.nav-icon{font-size:1.15rem;}
#kidMascot{position:fixed;bottom:80px;right:12px;z-index:160;font-size:2rem;cursor:pointer;animation:float 3s ease-in-out infinite;}
#kidMascotBubble{display:none;position:fixed;bottom:120px;right:12px;z-index:160;background:rgba(139,92,246,.95);color:white;padding:.6rem 1rem;border-radius:14px 14px 4px 14px;font-size:.82rem;font-weight:600;max-width:200px;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
</style>
</head>
<body>
<div class="kz-header">
<h1>📖 Kids Stories</h1>
<a href="kid-zone.html" style="color:var(--dim);text-decoration:none;font-size:.82rem;font-weight:600;">← KidZone</a>

<div class="container">

<a href="kidzone-parent.html"><span class="nav-icon">👨‍👩‍👧</span>Parent</a>
</div>
<div id="kidMascot" onclick="toggleMascotBubble()">🤖</div>
<div id="kidMascotBubble"></div>

<script src="scripts.js" defer></script>

// Mascot
var tips=["📖 Reading is fun!","🎵 Every song tells a story!","✨ What story will you write?","🎤 Maybe you'll be in a story someday!"];
var bubbleOpen=false;
function toggleMascotBubble(){var b=document.getElementById('kidMascotBubble');bubbleOpen=!bubbleOpen;if(bubbleOpen){b.textContent=tips[Math.floor(Math.random()*tips.length)];b.style.display='block';setTimeout(function(){b.style.display='none';bubbleOpen=false;},4000);}else{b.style.display='none';}}
setTimeout(function(){var b=document.getElementById('kidMascotBubble');b.textContent=tips[Math.floor(Math.random()*tips.length)];b.style.display='block';setTimeout(function(){b.style.display='none';},5000);},3000);
</script>

<!-- ★ NAV OVERRIDE -->
<script>
(function(){
  setTimeout(function(){
    var ham=document.querySelector('.hamburger-menu,.ham-menu,#hamburgerMenu,[class*="hamburger"]');if(ham)ham.remove();
    document.querySelectorAll('nav').forEach(function(n){if(n.id!=='kidNav')n.remove();});
    document.querySelectorAll('.avatar-bubble,.chat-bubble-float,[onclick*="hideAvatarBubbles"]').forEach(function(e){e.remove();});
    var av=document.querySelector('button[style*="position:fixed"][style*="top:80px"]');if(av)av.remove();
  },500);
  var page=location.pathname.split('/').pop()||'';
  document.querySelectorAll('#kidNav a').forEach(function(a){if(a.getAttribute('href')===page)a.classList.add('active');});
})();
</script>
</body>
</html>
