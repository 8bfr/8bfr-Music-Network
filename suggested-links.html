<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Suggested Links — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:2rem;}
.header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--primary);}
.container{max-width:800px;margin:0 auto;padding:1.5rem;}
.intro{text-align:center;margin-bottom:2rem;}.intro p{font-size:.9rem;color:var(--dim);line-height:1.7;}
.link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;margin-bottom:2rem;}
.link-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .2s;text-decoration:none;color:var(--text);display:block;}
.link-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,.15);}
.link-img{width:100%;height:140px;background:rgba(124,58,237,.1);display:flex;align-items:center;justify-content:center;font-size:3rem;overflow:hidden;}
.link-img img{width:100%;height:100%;object-fit:cover;}
.link-body{padding:1rem;}.link-name{font-weight:700;font-size:.95rem;margin-bottom:.25rem;}.link-desc{font-size:.8rem;color:var(--dim);line-height:1.5;}.link-cat{font-size:.68rem;color:rgba(168,85,247,.5);margin-top:.4rem;text-transform:uppercase;}
.admin-section{background:rgba(124,58,237,.06);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:2rem;}
.admin-section h3{font-size:1rem;font-weight:700;color:var(--primary);margin-bottom:1rem;}
.form-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:.75rem;}.form-group{flex:1;min-width:200px;}
.form-group label{display:block;font-size:.78rem;font-weight:600;color:var(--dim);margin-bottom:.3rem;}
.form-input{width:100%;padding:.55rem .8rem;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.88rem;outline:none;box-sizing:border-box;}
.btn{background:var(--primary);color:#fff;border:none;padding:.6rem 1.2rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85rem;}
.btn-del{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);padding:.3rem .6rem;font-size:.72rem;border-radius:6px;cursor:pointer;}
.empty{text-align:center;padding:3rem;color:var(--dim);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="header"><a href="index.html" style="color:var(--dim);text-decoration:none;font-weight:600;">← Home</a><h1>🔗 Suggested Links</h1><span></span></div>
<div class="container">
  <div class="intro"><p>Useful resources, tools, and sites recommended by the 8BFR community.</p></div>
  <div id="adminSection" style="display:none;"></div>
  <div id="linkList"><div class="spinner"></div></div>
</div>
<script src="scripts.js" defer></script>
<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
var isOwner=false;
async function init(){
  try{var s=await db.auth.getSession();if(s.data.session){var pr=await db.from('profiles').select('role').eq('user_id',s.data.session.user.id).single();if(pr.data&&(pr.data.role==='owner'||pr.data.role==='co-owner'))isOwner=true;}}catch(e){}
  if(isOwner)showAdmin();loadLinks();
}
function showAdmin(){
  var sec=document.getElementById('adminSection');sec.style.display='block';
  sec.innerHTML='<div class="admin-section"><h3>➕ Add Suggested Link</h3><div class="form-row"><div class="form-group"><label>Name *</label><input class="form-input" id="aName"></div><div class="form-group"><label>Category</label><input class="form-input" id="aCat" placeholder="e.g. Tools, Learning, Distribution"></div></div><div class="form-row"><div class="form-group" style="flex:2;"><label>URL *</label><input class="form-input" id="aUrl"></div></div><div class="form-row"><div class="form-group" style="flex:2;"><label>Description</label><input class="form-input" id="aDesc"></div></div><div class="form-row"><div class="form-group" style="flex:2;"><label>Image URL</label><input class="form-input" id="aImg"></div></div><button class="btn" onclick="addLink()">Add</button> <span id="aNotice" style="font-size:.82rem;margin-left:.5rem;"></span></div>';
}
window.addLink=async function(){
  var n=document.getElementById('aNotice');
  var name=document.getElementById('aName').value.trim(),url=document.getElementById('aUrl').value.trim();
  if(!name||!url){n.textContent='Name+URL required';n.style.color='#ef4444';return;}
  try{await db.from('suggested_links').insert({name:name,url:url,description:document.getElementById('aDesc').value.trim()||null,image_url:document.getElementById('aImg').value.trim()||null,category:document.getElementById('aCat').value.trim()||'general'});
  n.textContent='Added!';n.style.color='#4ade80';document.getElementById('aName').value='';document.getElementById('aUrl').value='';document.getElementById('aDesc').value='';document.getElementById('aImg').value='';loadLinks();}catch(e){n.textContent=e.message;n.style.color='#ef4444';}
};
window.deleteLink=async function(id){if(!confirm('Delete?'))return;try{await db.from('suggested_links').delete().eq('id',id);loadLinks();}catch(e){alert(e.message);}};
async function loadLinks(){
  var el=document.getElementById('linkList');
  try{var r=await db.from('suggested_links').select('*').eq('active',true).order('sort_order');if(r.error)throw r.error;var links=r.data||[];
  if(!links.length){el.innerHTML='<div class="empty"><div style="font-size:3rem;margin-bottom:.75rem;">🔗</div><p>No suggested links yet.</p></div>';return;}
  el.innerHTML='<div class="link-grid">'+links.map(function(l){
    var img=l.image_url?'<img src="'+esc(l.image_url)+'" onerror="this.parentNode.innerHTML=\'🔗\'">':'🔗';
    var del=isOwner?'<button class="btn-del" onclick="event.preventDefault();deleteLink(\''+l.id+'\')">🗑️</button>':'';
    return '<a href="'+esc(l.url)+'" target="_blank" rel="noopener" class="link-card"><div class="link-img">'+img+'</div><div class="link-body"><div class="link-name">'+esc(l.name)+'</div><div class="link-desc">'+esc(l.description||'')+'</div><div class="link-cat">'+esc(l.category||'')+'</div>'+del+'</div></a>';
  }).join('')+'</div>';
  }catch(e){el.innerHTML='<div class="empty"><div style="font-size:3rem;margin-bottom:.75rem;">🔗</div><p>Coming soon!</p></div>';}
}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
init();
</script>
</body>
</html>
