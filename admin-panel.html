<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — 8BFR</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--primary:#7c3aed;--dark:#0b0014;--dark-card:#0c0618;--danger:#ff0044;--warn:#f59e0b;--success:#00ff88;--text:#eae6ff;--text-dim:#a855f7;--border:rgba(124,58,237,.35);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Work Sans',sans-serif;background:radial-gradient(1200px 600px at 10% -10%,rgba(124,58,237,.3),transparent 60%),linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;line-height:1.6;padding-bottom:80px;}
    .header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--primary);padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:0.5rem;}
    .header h1{font-family:'Bebas Neue',cursive;font-size:1.75rem;letter-spacing:2px;color:var(--primary);}
    .container{max-width:1200px;margin:0 auto;padding:1.5rem;}
    .card{background:var(--dark-card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;}
    .card h2{font-family:'Bebas Neue',cursive;font-size:1.4rem;letter-spacing:1px;color:var(--primary);margin-bottom:1rem;border-left:4px solid var(--primary);padding-left:0.75rem;}
    .tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1rem;overflow-x:auto;scrollbar-width:none;}
    .tab-bar::-webkit-scrollbar{display:none;}
    .tab{flex:1;min-width:90px;text-align:center;padding:0.6rem 0.4rem;font-weight:600;font-size:0.82rem;cursor:pointer;color:rgba(234,230,255,0.5);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:all .2s;white-space:nowrap;}
    .tab.active{color:var(--primary);border-bottom-color:var(--primary);}
    .row{display:flex;align-items:center;gap:0.65rem;padding:0.6rem 0.5rem;border-bottom:1px solid rgba(124,58,237,0.12);font-size:0.85rem;}
    .row:last-child{border-bottom:none;}
    .row:hover{background:rgba(124,58,237,0.05);border-radius:6px;}
    .btn{padding:0.28rem 0.6rem;border-radius:5px;font-size:0.72rem;font-weight:700;cursor:pointer;border:none;transition:all .2s;white-space:nowrap;}
    .btn-view{background:rgba(124,58,237,.2);color:#a855f7;border:1px solid rgba(124,58,237,.4);}
    .btn-hide{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.35);}
    .btn-mute{background:rgba(96,165,250,.15);color:#60a5fa;border:1px solid rgba(96,165,250,.35);}
    .btn-kick{background:rgba(249,115,22,.15);color:#f97316;border:1px solid rgba(249,115,22,.35);}
    .btn-report{background:rgba(192,132,252,.15);color:#c084fc;border:1px solid rgba(192,132,252,.35);}
    .btn-promo{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.35);}
    .btn-demo{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.35);}
    .spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:1.5rem auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .badge{display:inline-block;padding:0.1rem 0.45rem;border-radius:4px;font-size:0.68rem;font-weight:700;}
    .badge-admin{background:rgba(124,58,237,.25);color:#c084fc;border:1px solid rgba(124,58,237,.4);}
    .badge-mod{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.3);}
    .badge-hidden{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3);}
    .badge-new{background:rgba(245,158,11,.25);color:#f59e0b;border:1px solid rgba(245,158,11,.5);}
    .stat-row{display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.25rem;}
    .stat{background:rgba(124,58,237,.1);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;text-align:center;flex:1;min-width:100px;}
    .stat h3{font-size:1.4rem;color:var(--primary);}
    .stat p{font-size:.75rem;color:var(--text-dim);}
    /* Reason modal */
    #reasonModal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);align-items:center;justify-content:center;}
    #reasonModal .modal-box{background:rgba(12,4,26,.98);border:1px solid rgba(124,58,237,.55);border-radius:16px;padding:1.5rem;width:min(92vw,400px);}
    #reasonModal h3{color:var(--primary);font-family:'Bebas Neue',cursive;font-size:1.3rem;letter-spacing:1px;margin-bottom:0.75rem;}
    #reasonModal textarea{width:100%;background:rgba(18,3,39,.8);border:1px solid rgba(124,58,237,.4);border-radius:8px;color:var(--text);padding:.5rem .75rem;font-size:.88rem;resize:vertical;min-height:80px;outline:none;font-family:inherit;}
    #reasonModal .modal-btns{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1rem;}
    #reasonModal .modal-btns button{padding:.45rem 1rem;border-radius:8px;font-weight:700;cursor:pointer;border:none;font-size:.85rem;}
    .logout-btn{background:var(--danger);color:white;border:none;padding:.4rem 1rem;border-radius:4px;cursor:pointer;font-weight:600;font-size:.85rem;}
  </style>
</head>
<body>

<div class="header">
  <h1>🛡️ Admin Panel</h1>
  <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
    <a href="profile.html" style="color:var(--text-dim);text-decoration:none;font-size:.85rem;">← Profile</a>
    <span id="adminName" style="font-size:.9rem;font-weight:600;">Loading...</span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <!-- STATS -->
  <div class="stat-row" id="statsRow">
    <div class="stat"><h3 id="sPending">—</h3><p>Pending Flags</p></div>
    <div class="stat"><h3 id="sHidden">—</h3><p>Hidden Items</p></div>
    <div class="stat"><h3 id="sMutes">—</h3><p>Active Mutes</p></div>
    <div class="stat"><h3 id="sMyActions">—</h3><p>My Actions</p></div>
  </div>

  <!-- MAIN PANEL -->
  <div class="card">
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('posts',this)">📝 Posts</button>
      <button class="tab" onclick="switchTab('profiles',this)">👤 Profiles</button>
      <button class="tab" onclick="switchTab('chat',this)">💬 Chat</button>
      <button class="tab" onclick="switchTab('flags',this)">🚩 Flags <span id="flagBadge" style="background:#f59e0b;color:#000;border-radius:999px;padding:.05rem .35rem;font-size:.65rem;font-weight:800;margin-left:2px;"></span></button>
      <button class="tab" onclick="switchTab('users',this)">👥 Users</button>
      <button class="tab" onclick="switchTab('mylog',this)">📋 My Log</button>
    </div>
    <div id="panelContent"><div class="spinner"></div></div>
  </div>

</div>

<!-- REASON MODAL -->
<div id="reasonModal">
  <div class="modal-box">
    <h3 id="modalTitle">Confirm Action</h3>
    <p id="modalDesc" style="font-size:.82rem;color:var(--text-dim);margin-bottom:.75rem;"></p>
    <textarea id="reasonInput" placeholder="Enter reason (required)..."></textarea>
    <div id="modalExtra"></div>
    <div class="modal-btns">
      <button onclick="closeModal()" style="background:rgba(255,255,255,.08);color:var(--text);">Cancel</button>
      <button id="modalConfirmBtn" style="background:var(--primary);color:#fff;">Confirm</button>
    </div>
  </div>
</div>

<script>
const DB = window.supabase.createClient(
  'https://novbuvwpjnxwwvdekjhr.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0'
);
const OWNER_ID = 'cb556180-f032-4b21-9470-1d786f2664ab';
let currentUser = null, currentTab = 'posts';

async function init() {
  try {
    const { data: { session } } = await DB.auth.getSession();
    if (!session) { location.href = 'login.html?return=admin-panel.html'; return; }
    const { data: profile } = await DB.from('profiles').select('*').eq('user_id', session.user.id).single();
    if (!profile || !['owner','admin'].includes(profile.role)) {
      alert('Admin access only.'); location.href = 'index.html'; return;
    }
    currentUser = { ...session.user, profile };
    document.getElementById('adminName').textContent = '🛡️ ' + (profile.display_name || profile.username || 'Admin');
    loadStats();
    loadTab('posts');
  } catch(e) {
    document.getElementById('adminName').textContent = 'Error';
    document.getElementById('panelContent').innerHTML = '<p style="color:#ef4444;padding:1rem;">Init error: ' + e.message + '</p>';
  }
}

async function loadStats() {
  try {
    const [flags, hidden, mutes, myActions] = await Promise.all([
      DB.from('mod_flags').select('*',{count:'exact',head:true}).eq('status','pending'),
      DB.from('hidden_content').select('*',{count:'exact',head:true}),
      DB.from('chat_mutes').select('*',{count:'exact',head:true}),
      DB.from('admin_actions').select('*',{count:'exact',head:true}).eq('performed_by', currentUser.id)
    ]);
    set('sPending', flags.count ?? 0);
    set('sHidden', hidden.count ?? 0);
    set('sMutes', mutes.count ?? 0);
    set('sMyActions', myActions.count ?? 0);
    const fb = document.getElementById('flagBadge');
    if (fb) fb.textContent = (flags.count ?? 0) > 0 ? (flags.count) : '';
  } catch(e) {}
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  loadTab(tab);
}

async function loadTab(tab) {
  const el = document.getElementById('panelContent');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    if (tab === 'posts') await renderPosts(el);
    else if (tab === 'profiles') await renderProfiles(el);
    else if (tab === 'chat') await renderChat(el);
    else if (tab === 'flags') await renderFlags(el);
    else if (tab === 'users') await renderUsers(el);
    else if (tab === 'mylog') await renderMyLog(el);
  } catch(e) {
    el.innerHTML = '<p style="color:#ef4444;padding:1rem;">Error: ' + e.message + '</p>';
  }
}

// ── POSTS ──────────────────────────────────────────────────────────────────
async function renderPosts(el) {
  const { data: posts, error } = await DB.from('posts')
    .select('id,user_id,text,media_type,likes,hidden,created_at')
    .order('created_at', { ascending: false }).limit(50);
  if (error) throw error;
  if (!posts?.length) { el.innerHTML = empty('No posts yet.'); return; }

  const uids = [...new Set(posts.map(p => p.user_id).filter(Boolean))];
  const pm = {};
  if (uids.length) {
    const { data: profiles } = await DB.from('profiles').select('user_id,username,display_name').in('user_id', uids);
    (profiles || []).forEach(p => pm[p.user_id] = p);
  }

  el.innerHTML = posts.map(p => {
    const prof = pm[p.user_id] || {};
    const name = esc(prof.display_name || prof.username || 'Unknown');
    const preview = esc((p.text || '[' + (p.media_type || 'media') + ']').substring(0, 70));
    const hiddenTag = p.hidden ? '<span class="badge badge-hidden">HIDDEN</span>' : '';
    return `<div class="row">
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:.85rem;">${name} ${hiddenTag}</div>
        <div style="font-size:.78rem;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${preview}</div>
        <div style="font-size:.7rem;color:rgba(168,85,247,0.5);">${ago(p.created_at)} · ❤️ ${p.likes||0}</div>
      </div>
      <a href="profile.html?id=${p.user_id}" class="btn btn-view" style="text-decoration:none;">View</a>
      <button class="btn btn-hide" onclick="adminHidePost('${p.id}','${name}',${!!p.hidden})">${p.hidden ? 'Unhide' : 'Hide'}</button>
      <button class="btn btn-report" onclick="adminFlag('post','${p.id}','${name}')">🚩 Flag</button>
    </div>`;
  }).join('');
}

// ── PROFILES ───────────────────────────────────────────────────────────────
async function renderProfiles(el) {
  const { data: profiles, error } = await DB.from('profiles')
    .select('user_id,username,display_name,role,bio,hidden,created_at')
    .order('created_at', { ascending: false }).limit(50);
  if (error) throw error;
  if (!profiles?.length) { el.innerHTML = empty('No profiles.'); return; }

  el.innerHTML = profiles.map(p => {
    const name = esc(p.display_name || p.username || 'Unknown');
    const hiddenTag = p.hidden ? '<span class="badge badge-hidden">HIDDEN</span>' : '';
    const roleTag = `<span class="badge badge-${p.role === 'admin' ? 'admin' : p.role === 'mod' ? 'mod' : ''}" style="${!['admin','mod'].includes(p.role)?'display:none;':''}">${p.role}</span>`;
    return `<div class="row">
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:.85rem;">${name} ${hiddenTag} ${roleTag}</div>
        <div style="font-size:.78rem;color:var(--text-dim);">${esc(p.role||'fan')} · ${ago(p.created_at)}</div>
        ${p.bio ? `<div style="font-size:.75rem;color:rgba(168,85,247,0.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.bio.substring(0,60))}</div>` : ''}
      </div>
      <a href="profile.html?id=${p.user_id}" class="btn btn-view" style="text-decoration:none;">View</a>
      <button class="btn btn-hide" onclick="adminHideProfile('${p.user_id}','${name}',${!!p.hidden})">${p.hidden ? 'Unhide' : 'Hide Profile'}</button>
      <button class="btn btn-report" onclick="adminFlag('profile','${p.user_id}','${name}')">🚩 Flag</button>
    </div>`;
  }).join('');
}

// ── CHAT ───────────────────────────────────────────────────────────────────
async function renderChat(el) {
  let chatHtml = '';
  // Recent chat messages
  try {
    const { data: msgs } = await DB.from('chat_messages')
      .select('id,user_id,message,created_at,hidden,profiles(username,display_name)')
      .order('created_at', { ascending: false }).limit(40);
    if (msgs?.length) {
      chatHtml += '<div style="margin-bottom:.5rem;font-size:.8rem;font-weight:700;color:var(--text-dim);">RECENT MESSAGES</div>';
      chatHtml += msgs.map(m => {
        const name = esc(m.profiles?.display_name || m.profiles?.username || 'Unknown');
        const hiddenTag = m.hidden ? '<span class="badge badge-hidden">HIDDEN</span>' : '';
        return `<div class="row">
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:.84rem;">${name} ${hiddenTag}</div>
            <div style="font-size:.8rem;color:var(--text-dim);">${esc((m.message||'').substring(0,80))}</div>
            <div style="font-size:.7rem;color:rgba(168,85,247,0.5);">${ago(m.created_at)}</div>
          </div>
          <button class="btn btn-hide" onclick="adminHideChatMsg('${m.id}','${name}',${!!m.hidden})">${m.hidden?'Unhide':'Hide'}</button>
          <button class="btn btn-mute" onclick="adminMuteUser('${m.user_id}','${name}')">Mute</button>
          <button class="btn btn-kick" onclick="adminKickUser('${m.user_id}','${name}')">Kick</button>
        </div>`;
      }).join('');
    } else {
      chatHtml += empty('No chat messages found.');
    }
  } catch(e) {
    chatHtml += `<p style="color:var(--text-dim);font-size:.82rem;padding:.5rem;">Chat messages table may not exist yet: ${e.message}</p>`;
  }
  // Active mutes
  try {
    const { data: mutes } = await DB.from('chat_mutes').select('*,profiles(username,display_name)').order('created_at',{ascending:false}).limit(20);
    if (mutes?.length) {
      chatHtml += '<div style="margin:1rem 0 .5rem;font-size:.8rem;font-weight:700;color:var(--text-dim);">ACTIVE MUTES</div>';
      chatHtml += mutes.map(mu => {
        const name = esc(mu.profiles?.display_name || mu.profiles?.username || 'Unknown');
        const exp = mu.expires_at ? 'Expires: ' + new Date(mu.expires_at).toLocaleDateString() : 'Permanent';
        return `<div class="row">
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:.85rem;">${name}</div>
            <div style="font-size:.78rem;color:var(--text-dim);">${esc(mu.reason||'No reason')} · ${exp}</div>
          </div>
          <button class="btn btn-promo" onclick="unmute('${mu.user_id}')">Unmute</button>
        </div>`;
      }).join('');
    }
  } catch(e) {}
  el.innerHTML = chatHtml || empty('No chat data.');
}

// ── FLAGS ──────────────────────────────────────────────────────────────────
async function renderFlags(el) {
  const { data: flags, error } = await DB.from('mod_flags')
    .select('*,profiles(username,display_name)')
    .order('created_at', { ascending: false }).limit(50);
  if (error) throw error;
  if (!flags?.length) { el.innerHTML = empty('No flags yet.'); return; }
  const fb = document.getElementById('flagBadge');
  const pending = flags.filter(f => f.status === 'pending').length;
  if (fb) fb.textContent = pending > 0 ? pending : '';

  el.innerHTML = flags.map(f => {
    const by = esc(f.profiles?.display_name || f.profiles?.username || 'Staff');
    const statusColor = { pending:'#f59e0b', reviewed:'#34d399', dismissed:'rgba(168,85,247,0.4)' };
    const sc = statusColor[f.status] || '#a855f7';
    return `<div class="row" style="background:rgba(0,0,0,0.2);border-radius:8px;margin-bottom:.35rem;border-bottom:none;">
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;">
          <span style="background:rgba(124,58,237,.15);border:1px solid ${sc};color:${sc};border-radius:4px;padding:.1rem .45rem;font-size:.7rem;font-weight:700;">${f.status}</span>
          <span style="font-size:.82rem;font-weight:600;">${f.content_type}: ${esc(f.content_id?.substring(0,12))}...</span>
          ${f.status==='pending'?'<span class="badge badge-new">NEW</span>':''}
        </div>
        <div style="font-size:.78rem;color:var(--text-dim);margin-top:.2rem;">By ${by}: ${esc(f.reason)}</div>
        <div style="font-size:.7rem;color:rgba(168,85,247,0.5);">${ago(f.created_at)}</div>
      </div>
      ${f.status==='pending' ? `
        <button class="btn btn-hide" onclick="resolveFlag('${f.id}','reviewed')">✓ Reviewed</button>
        <button class="btn" style="background:rgba(168,85,247,.1);color:#a855f7;border:1px solid rgba(168,85,247,.3);" onclick="resolveFlag('${f.id}','dismissed')">Dismiss</button>
      ` : ''}
    </div>`;
  }).join('');
}

// ── USERS ──────────────────────────────────────────────────────────────────
async function renderUsers(el) {
  const { data: users, error } = await DB.from('profiles')
    .select('user_id,username,display_name,role,created_at')
    .in('role', ['fan','artist','rapper','singer','musician','beatmaker','producer','dj','mod'])
    .order('created_at', { ascending: false }).limit(60);
  if (error) throw error;
  if (!users?.length) { el.innerHTML = empty('No users found.'); return; }

  el.innerHTML = '<div style="font-size:.78rem;color:var(--text-dim);margin-bottom:.5rem;">Promote/demote mods. All actions are logged and sent to Owner.</div>' +
    users.map(u => {
      const name = esc(u.display_name || u.username || 'Unknown');
      const isMod = u.role === 'mod';
      const roleTag = isMod ? '<span class="badge badge-mod">MOD</span>' : '';
      return `<div class="row">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:.85rem;">${name} ${roleTag}</div>
          <div style="font-size:.78rem;color:var(--text-dim);">${esc(u.role||'fan')} · ${ago(u.created_at)}</div>
        </div>
        <a href="profile.html?id=${u.user_id}" class="btn btn-view" style="text-decoration:none;">View</a>
        ${!isMod
          ? `<button class="btn btn-promo" onclick="changeModStatus('${u.user_id}','${name}','promote')">+ Promote to Mod</button>`
          : `<button class="btn btn-demo" onclick="changeModStatus('${u.user_id}','${name}','demote')">− Demote Mod</button>`
        }
      </div>`;
    }).join('');
}

// ── MY LOG ─────────────────────────────────────────────────────────────────
async function renderMyLog(el) {
  const { data: actions, error } = await DB.from('admin_actions')
    .select('*').eq('performed_by', currentUser.id)
    .order('created_at', { ascending: false }).limit(50);
  if (error) throw error;
  if (!actions?.length) { el.innerHTML = empty('No actions yet.'); return; }

  el.innerHTML = actions.map(a => {
    const reviewed = a.reviewed_by_owner
      ? '<span style="color:#34d399;font-size:.7rem;">✓ Owner reviewed</span>'
      : '<span style="color:#f59e0b;font-size:.7rem;">⏳ Pending review</span>';
    return `<div class="row" style="background:rgba(0,0,0,0.15);border-radius:8px;margin-bottom:.3rem;border-bottom:none;">
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:.84rem;">${esc(a.action_type)} — ${esc(a.target_type||'')}</div>
        <div style="font-size:.78rem;color:var(--text-dim);">${esc(a.reason)}</div>
        <div style="font-size:.7rem;color:rgba(168,85,247,0.5);display:flex;gap:.75rem;">${ago(a.created_at)} ${reviewed}</div>
      </div>
    </div>`;
  }).join('');
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
function adminHidePost(postId, name, currentlyHidden) {
  if (currentlyHidden) {
    // Unhide without reason modal
    doHide('posts', postId, false, 'hide_post', 'post', postId, 'Unhiding post');
    return;
  }
  openModal('Hide Post', `Hide post by "${name}"? Enter reason:`, async (reason) => {
    await doHide('posts', postId, true, 'hide_post', 'post', postId, reason);
  });
}

function adminHideProfile(userId, name, currentlyHidden) {
  if (currentlyHidden) {
    doHide('profiles', userId, false, 'hide_profile', 'profile', userId, 'Unhiding profile', 'user_id');
    return;
  }
  openModal('Hide Profile', `Hide "${name}"'s profile from public? Enter reason:`, async (reason) => {
    await doHide('profiles', userId, true, 'hide_profile', 'profile', userId, reason, 'user_id');
  });
}

function adminHideChatMsg(msgId, name, currentlyHidden) {
  if (currentlyHidden) {
    DB.from('chat_messages').update({hidden:false}).eq('id',msgId).then(() => loadTab('chat'));
    return;
  }
  openModal('Hide Chat Message', `Hide this message from "${name}"? Enter reason:`, async (reason) => {
    await DB.from('chat_messages').update({hidden:true}).eq('id',msgId);
    await logAction('hide_chat_message','chat_message',msgId,null,reason);
    loadTab('chat');
  });
}

function adminMuteUser(userId, name) {
  openModal('Mute in Chat', `Mute "${name}" from chatroom? Enter reason and optional duration:`,
    async (reason, extra) => {
      const hours = parseInt(extra) || 0;
      const expires = hours > 0 ? new Date(Date.now() + hours*3600000).toISOString() : null;
      await DB.from('chat_mutes').upsert({ user_id:userId, muted_by:currentUser.id, reason, expires_at:expires }, { onConflict:'user_id' });
      await logAction('mute_chat','user',userId,userId,reason);
      loadTab('chat'); loadStats();
    },
    { label:'Duration (hours, 0 = permanent)', type:'number', placeholder:'0 = permanent' }
  );
}

function adminKickUser(userId, name) {
  openModal('Kick from Chat', `Kick "${name}" from chatroom? They can rejoin. Enter reason:`, async (reason) => {
    // Signal kick via a chat_kicks table or realtime channel
    try {
      await DB.from('chat_kicks').insert({ user_id:userId, kicked_by:currentUser.id, reason });
    } catch(e) {} // table may not exist yet
    await logAction('kick_chat','user',userId,userId,reason);
    alert('✓ Kick logged. Implement realtime disconnect in your chat page.');
  });
}

window.unmute = async function(userId) {
  if (!confirm('Remove mute for this user?')) return;
  await DB.from('chat_mutes').delete().eq('user_id', userId);
  loadTab('chat'); loadStats();
};

window.adminFlag = function(contentType, contentId, name) {
  openModal('Flag Content', `Flag ${contentType} "${name}" for owner review:`, async (reason) => {
    await DB.from('mod_flags').insert({ flagged_by:currentUser.id, content_type:contentType, content_id:contentId, reason, status:'pending' });
    await logAction('flag_content', contentType, contentId, null, reason);
    loadStats();
    alert('✓ Flagged and sent to owner.');
  });
};

window.resolveFlag = async function(flagId, status) {
  await DB.from('mod_flags').update({ status, reviewed_by:currentUser.id }).eq('id', flagId);
  loadTab('flags'); loadStats();
};

window.changeModStatus = function(userId, name, action) {
  const title = action === 'promote' ? 'Promote to Mod' : 'Demote Mod';
  const desc = action === 'promote'
    ? `Promote "${name}" to Moderator? Send note to owner:`
    : `Demote "${name}" from Moderator? Send reason to owner:`;
  openModal(title, desc, async (reason) => {
    const newRole = action === 'promote' ? 'mod' : 'fan';
    await DB.from('profiles').update({ role: newRole }).eq('user_id', userId);
    await logAction(action === 'promote' ? 'promote_mod' : 'demote_mod', 'user', userId, userId, reason);
    loadTab('users');
    alert('✓ Done. Owner notified.');
  });
};

async function doHide(table, id, hidden, actionType, targetType, targetId, reason, col='id') {
  await DB.from(table).update({ hidden }).eq(col, id);
  if (hidden) await logAction(actionType, targetType, targetId, null, reason);
  loadTab(currentTab);
}

async function logAction(actionType, targetType, targetId, targetUserId, reason) {
  await DB.from('admin_actions').insert({
    performed_by: currentUser.id,
    performed_by_role: currentUser.profile?.role || 'admin',
    action_type: actionType,
    target_type: targetType,
    target_id: String(targetId),
    target_user_id: targetUserId || null,
    reason,
    reviewed_by_owner: false
  });
}

// ── MODAL ──────────────────────────────────────────────────────────────────
let _modalCb = null;
function openModal(title, desc, onConfirm, extraField=null) {
  _modalCb = onConfirm;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').textContent = desc;
  document.getElementById('reasonInput').value = '';
  const extraEl = document.getElementById('modalExtra');
  if (extraField) {
    extraEl.innerHTML = `<input id="modalExtraInput" type="${extraField.type||'text'}" placeholder="${extraField.placeholder||''}" style="width:100%;background:rgba(18,3,39,.8);border:1px solid rgba(124,58,237,.3);border-radius:8px;color:var(--text);padding:.4rem .7rem;font-size:.85rem;margin-top:.5rem;outline:none;" /><div style="font-size:.72rem;color:var(--text-dim);margin-top:.25rem;">${extraField.label||''}</div>`;
  } else {
    extraEl.innerHTML = '';
  }
  document.getElementById('reasonModal').style.display = 'flex';
  document.getElementById('reasonInput').focus();
}

function closeModal() {
  document.getElementById('reasonModal').style.display = 'none';
  _modalCb = null;
}

document.getElementById('modalConfirmBtn').addEventListener('click', async () => {
  const reason = document.getElementById('reasonInput').value.trim();
  if (!reason) { document.getElementById('reasonInput').style.borderColor='#ef4444'; return; }
  const extraInput = document.getElementById('modalExtraInput');
  const extra = extraInput ? extraInput.value : null;
  closeModal();
  if (_modalCb) await _modalCb(reason, extra);
  loadStats();
});

document.getElementById('reasonModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── UTILS ──────────────────────────────────────────────────────────────────
function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function empty(msg) { return `<p style="color:var(--text-dim);text-align:center;padding:1.5rem;">${msg}</p>`; }
function set(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }
function ago(d) {
  if (!d) return '';
  const m = Math.floor((Date.now() - new Date(d).getTime()) / 60000);
  if (m < 1) return 'now'; if (m < 60) return m + 'm';
  const h = Math.floor(m/60); if (h < 24) return h + 'h';
  return Math.floor(h/24) + 'd';
}
async function logout() { await DB.auth.signOut(); location.href = 'login.html'; }

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
</script>
<script src="scripts.js" defer onerror="console.warn('scripts.js failed')"></script>
</body>
