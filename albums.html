<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Albums — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--dark:#0b0014;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:rgba(15,0,30,.9);border-bottom:2px solid var(--primary);padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.8rem;color:var(--primary);}
.header a{color:var(--text);text-decoration:none;font-weight:600;}
.container{max-width:900px;margin:0 auto;padding:1.5rem;}
.album-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;}
.album-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .3s;}
.album-card:hover{transform:translateY(-3px);border-color:var(--primary);box-shadow:0 6px 20px rgba(124,58,237,.25);}
.album-art{aspect-ratio:1;background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(168,85,247,.15));display:flex;align-items:center;justify-content:center;font-size:2.5rem;overflow:hidden;}
.album-art img{width:100%;height:100%;object-fit:cover;}
.album-info{padding:.75rem;}
.album-title{font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.album-artist{font-size:.75rem;color:var(--dim);margin-top:.15rem;}
.album-tracks{font-size:.68rem;color:rgba(168,85,247,.4);margin-top:.25rem;}
.empty{text-align:center;padding:3rem;color:var(--dim);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="header"><a href="feed.html">← Back</a><h1>💿 Albums</h1><div></div></div>
<div class="container">
<div id="albumList"><div class="spinner"></div></div>
</div>
<script src="scripts.js" defer></script>
<script>
const db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
async function init(){
  const{data}=await db.from('songs').select('*').eq('type','album').order('created_at',{ascending:false}).limit(50);
  const el=document.getElementById('albumList');
  const songs=data||[];
  if(!songs.length){el.innerHTML='<div class="empty"><div style="font-size:2.5rem;margin-bottom:.5rem;">💿</div>No albums yet. Artists can upload albums from their profile.</div>';return;}
  // Group by album name or show individually
  el.innerHTML='<div class="album-grid">'+songs.map(s=>{
    const cv=s.cover_art?'<img src="'+esc(s.cover_art)+'">':'💿';
    return '<div class="album-card" onclick="location.href=\'song.html?album='+encodeURIComponent(s.title||'')+'\'"><div class="album-art">'+cv+'</div><div class="album-info"><div class="album-title">'+esc(s.title||'Untitled')+'</div><div class="album-artist">'+esc(s.artist||'Unknown')+'</div></div></div>';
  }).join('')+'</div>';
}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
</body></html>
