<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Games — KidZone</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--kp:#8b5cf6;--green:#22c55e;--yellow:#eab308;--pink:#ec4899;--blue:#3b82f6;--orange:#f97316;--red:#ef4444;--bg:#0f0a1a;--card:rgba(15,10,35,.85);--text:#f0eaff;--dim:rgba(168,130,255,.7);--border:rgba(139,92,246,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(135deg,#0f0a1a,#1a0533);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:linear-gradient(135deg,rgba(34,197,94,.15),rgba(139,92,246,.2));border-bottom:3px solid var(--green);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--green);}
.header a{color:var(--text);text-decoration:none;font-weight:600;font-size:.85rem;}
.container{max-width:800px;margin:0 auto;padding:1.5rem;}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem;}
.game-card{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:all .3s;}
.game-card:hover{transform:translateY(-4px);box-shadow:0 8px 25px rgba(139,92,246,.25);}
.gc-icon{font-size:3rem;margin-bottom:.5rem;}
.gc-name{font-family:'Fredoka One',cursive;font-size:1.1rem;margin-bottom:.25rem;}
.gc-desc{font-size:.78rem;color:var(--dim);margin-bottom:.5rem;}
.gc-reward{font-size:.72rem;background:rgba(234,179,8,.15);color:var(--yellow);padding:.2rem .5rem;border-radius:6px;display:inline-block;}

/* Game Area */
#gameArea{display:none;}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.game-title{font-family:'Fredoka One',cursive;font-size:1.3rem;}
.game-score{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--yellow);}
.game-back{background:none;border:1px solid var(--border);color:var(--dim);padding:.35rem .75rem;border-radius:6px;cursor:pointer;font-size:.82rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.25rem;}

/* Rhythm Game */
.rhythm-lane{width:100%;height:300px;background:rgba(0,0,0,.3);border-radius:12px;position:relative;overflow:hidden;border:1px solid var(--border);}
.rhythm-target{position:absolute;bottom:40px;left:0;right:0;height:4px;background:var(--kp);box-shadow:0 0 10px var(--kp);}
.rhythm-note{position:absolute;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;transition:transform .1s;}
.rhythm-note:active{transform:scale(.8);}
.rhythm-hit-zone{position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:1rem;}
.rhythm-hit-btn{width:60px;height:60px;border-radius:50%;border:3px solid;display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;transition:all .1s;background:rgba(0,0,0,.3);}
.rhythm-hit-btn:active{transform:scale(.85);}
.hit-perfect{color:var(--green);font-family:'Fredoka One';font-size:1.2rem;position:absolute;animation:hitFloat 1s ease forwards;}
.hit-miss{color:var(--red);font-family:'Fredoka One';font-size:1rem;position:absolute;animation:hitFloat 1s ease forwards;}
@keyframes hitFloat{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-40px);}}

/* Quiz */
.quiz-question{font-family:'Fredoka One',cursive;font-size:1.2rem;text-align:center;margin-bottom:1rem;}
.quiz-image{font-size:4rem;text-align:center;margin-bottom:1rem;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
.quiz-opt{padding:.75rem;border-radius:10px;border:2px solid var(--border);background:rgba(0,0,0,.2);cursor:pointer;font-weight:600;font-size:.9rem;text-align:center;transition:all .2s;}
.quiz-opt:hover{border-color:var(--kp);background:rgba(139,92,246,.1);}
.quiz-opt.correct{border-color:var(--green);background:rgba(34,197,94,.15);color:var(--green);}
.quiz-opt.wrong{border-color:var(--red);background:rgba(239,68,68,.1);color:#fca5a5;}
.quiz-progress{display:flex;gap:4px;justify-content:center;margin-bottom:1rem;}
.quiz-dot{width:10px;height:10px;border-radius:50%;background:rgba(139,92,246,.2);}
.quiz-dot.done{background:var(--green);}.quiz-dot.current{background:var(--yellow);border:2px solid var(--yellow);}

/* Result */
.game-result{text-align:center;padding:2rem;}
.result-score{font-family:'Fredoka One',cursive;font-size:3rem;color:var(--yellow);}
.result-label{font-size:1rem;color:var(--dim);margin:.5rem 0;}
.result-coins{font-size:1.2rem;color:var(--yellow);font-weight:700;}
</style>
</head>
<body>
<div class="header"><a href="kid-zone.html">← KidZone</a><h1>🎮 Games</h1><div></div></div>
<div class="container">

<!-- GAME SELECT -->
<div id="gameSelect">
<div class="games-grid">
<div class="game-card" onclick="startGame('rhythm')" style="border-color:rgba(236,72,153,.4);">
<div class="gc-icon">🎵</div><div class="gc-name">Rhythm Game</div><div class="gc-desc">Tap notes to the beat!</div><div class="gc-reward">🪙 10-50 coins</div>
</div>
<div class="game-card" onclick="startGame('quiz')" style="border-color:rgba(59,130,246,.4);">
<div class="gc-icon">🎷</div><div class="gc-name">Instrument Quiz</div><div class="gc-desc">Name that instrument!</div><div class="gc-reward">🪙 5 per correct</div>
</div>
<div class="game-card" onclick="startGame('wordscramble')" style="border-color:rgba(234,179,8,.4);">
<div class="gc-icon">🔤</div><div class="gc-name">Music Word Scramble</div><div class="gc-desc">Unscramble music words!</div><div class="gc-reward">🪙 5 per word</div>
</div>
<div class="game-card" onclick="startGame('memory')" style="border-color:rgba(34,197,94,.4);">
<div class="gc-icon">🧠</div><div class="gc-name">Sound Memory</div><div class="gc-desc">Match the sound pairs!</div><div class="gc-reward">🪙 20-40 coins</div>
</div>
</div>
</div>

<!-- GAME AREA -->
<div id="gameArea">
<div class="game-header">
<button class="game-back" onclick="exitGame()">← Back</button>
<div class="game-title" id="gameTitle"></div>
<div class="game-score" id="gameScore">Score: 0</div>
</div>
<div class="card" id="gameContent"></div>
</div>

</div>

<script src="scripts.js" defer></script>
<script>
const db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
let score=0,currentGame=null,gameTimer=null;

function startGame(game){
  currentGame=game;score=0;
  document.getElementById('gameSelect').style.display='none';
  document.getElementById('gameArea').style.display='block';
  document.getElementById('gameScore').textContent='Score: 0';
  switch(game){
    case'rhythm':startRhythm();break;
    case'quiz':startQuiz();break;
    case'wordscramble':startWordScramble();break;
    case'memory':startMemory();break;
  }
}

function exitGame(){
  clearInterval(gameTimer);
  document.getElementById('gameSelect').style.display='block';
  document.getElementById('gameArea').style.display='none';
  currentGame=null;
}

function addScore(pts){
  score+=pts;
  document.getElementById('gameScore').textContent='Score: '+score;
}

function showResult(title,coins){
  const box=document.getElementById('gameContent');
  box.innerHTML='<div class="game-result"><div style="font-size:3rem;margin-bottom:.5rem;">🎉</div><div class="result-score">'+score+'</div><div class="result-label">'+title+'</div><div class="result-coins">🪙 +'+coins+' KidCoins</div><button onclick="exitGame()" style="margin-top:1rem;padding:.6rem 1.5rem;border-radius:10px;background:var(--kp);color:#fff;border:none;cursor:pointer;font-weight:700;font-size:1rem;">Play Again</button></div>';
  // Award coins (try, but don't break if no kid selected)
  awardGameCoins(coins);
}

async function awardGameCoins(amount){
  try{
    const{data:{session}}=await db.auth.getSession();
    if(!session)return;
    const{data:kids}=await db.from('kid_profiles').select('id').eq('parent_user_id',session.user.id).eq('is_active',true).limit(1);
    if(kids&&kids[0]){
      await db.rpc('award_kidcoins',{p_kid_id:kids[0].id,p_amount:amount,p_reason:'Game: '+currentGame});
    }
  }catch(e){}
}

// ═══ INSTRUMENT QUIZ ═══
const quizData=[
  {emoji:'🎸',name:'Guitar',options:['Guitar','Violin','Ukulele','Bass']},
  {emoji:'🎹',name:'Piano',options:['Organ','Piano','Accordion','Synthesizer']},
  {emoji:'🥁',name:'Drums',options:['Drums','Bongos','Timpani','Xylophone']},
  {emoji:'🎷',name:'Saxophone',options:['Clarinet','Saxophone','Trumpet','Oboe']},
  {emoji:'🎺',name:'Trumpet',options:['Trombone','Trumpet','French Horn','Tuba']},
  {emoji:'🎻',name:'Violin',options:['Violin','Viola','Cello','Guitar']},
  {emoji:'🪗',name:'Accordion',options:['Accordion','Harmonica','Organ','Bagpipes']},
  {emoji:'🪘',name:'Bongos',options:['Snare','Djembe','Bongos','Tambourine']},
  {emoji:'🎤',name:'Microphone',options:['Microphone','Speaker','Megaphone','Headphones']},
  {emoji:'🪈',name:'Flute',options:['Recorder','Flute','Piccolo','Clarinet']},
];
let quizIndex=0,quizQuestions=[];

function startQuiz(){
  document.getElementById('gameTitle').textContent='🎷 Instrument Quiz';
  quizQuestions=quizData.sort(()=>Math.random()-.5).slice(0,10);
  quizIndex=0;score=0;
  showQuizQuestion();
}

function showQuizQuestion(){
  if(quizIndex>=quizQuestions.length){
    const coins=Math.max(5,score);
    showResult('Quiz Complete!',coins);return;
  }
  const q=quizQuestions[quizIndex];
  const opts=q.options.sort(()=>Math.random()-.5);
  const dots=quizQuestions.map((_,i)=>'<div class="quiz-dot'+(i<quizIndex?' done':i===quizIndex?' current':'')+'"></div>').join('');
  document.getElementById('gameContent').innerHTML='<div class="quiz-progress">'+dots+'</div><div class="quiz-image">'+q.emoji+'</div><div class="quiz-question">What instrument is this?</div><div class="quiz-options">'+opts.map(o=>'<div class="quiz-opt" onclick="answerQuiz(this,\''+o+'\',\''+q.name+'\')">'+o+'</div>').join('')+'</div>';
}

function answerQuiz(el,answer,correct){
  document.querySelectorAll('.quiz-opt').forEach(o=>{o.style.pointerEvents='none';if(o.textContent===correct)o.classList.add('correct');});
  if(answer===correct){el.classList.add('correct');addScore(5);}
  else{el.classList.add('wrong');}
  setTimeout(()=>{quizIndex++;showQuizQuestion();},1200);
}

// ═══ WORD SCRAMBLE ═══
const musicWords=['RHYTHM','MELODY','TEMPO','CHORUS','VERSE','BRIDGE','BASS','TREBLE','HARMONY','OCTAVE','PITCH','LYRIC','BEAT','NOTE','CHORD','SCALE','ALBUM','TRACK','REMIX','GROOVE'];
let scrambleIndex=0,scrambleWords=[];

function startWordScramble(){
  document.getElementById('gameTitle').textContent='🔤 Music Word Scramble';
  scrambleWords=musicWords.sort(()=>Math.random()-.5).slice(0,8);
  scrambleIndex=0;score=0;
  showScramble();
}

function showScramble(){
  if(scrambleIndex>=scrambleWords.length){showResult('Words Unscrambled!',Math.max(5,score));return;}
  const word=scrambleWords[scrambleIndex];
  const scrambled=word.split('').sort(()=>Math.random()-.5).join('');
  document.getElementById('gameContent').innerHTML='<div style="text-align:center;"><div style="font-size:.85rem;color:var(--dim);margin-bottom:.5rem;">Unscramble this music word ('+(scrambleIndex+1)+'/'+scrambleWords.length+'):</div><div style="font-family:\'Fredoka One\';font-size:2.5rem;letter-spacing:8px;color:var(--yellow);margin:1rem 0;">'+scrambled+'</div><input type="text" id="scrambleInput" placeholder="Type your answer..." style="width:100%;max-width:300px;padding:.6rem 1rem;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1.1rem;text-align:center;text-transform:uppercase;" onkeydown="if(event.key===\'Enter\')checkScramble(\''+word+'\')"><button onclick="checkScramble(\''+word+'\')" style="margin-top:.75rem;padding:.5rem 1.5rem;border-radius:8px;background:var(--kp);color:#fff;border:none;cursor:pointer;font-weight:700;">Check</button><div id="scrambleFeedback" style="margin-top:.5rem;font-size:.9rem;min-height:1.5em;"></div></div>';
  setTimeout(()=>document.getElementById('scrambleInput').focus(),100);
}

function checkScramble(correct){
  const input=document.getElementById('scrambleInput').value.trim().toUpperCase();
  const fb=document.getElementById('scrambleFeedback');
  if(input===correct){
    fb.innerHTML='<span style="color:var(--green);">✅ Correct! +5 coins</span>';
    addScore(5);
    setTimeout(()=>{scrambleIndex++;showScramble();},1000);
  }else{
    fb.innerHTML='<span style="color:#fca5a5;">❌ Try again!</span>';
  }
}

// ═══ SOUND MEMORY ═══
const memSounds=[
  {id:1,freq:262,name:'C',color:'var(--red)'},
  {id:2,freq:330,name:'E',color:'var(--orange)'},
  {id:3,freq:392,name:'G',color:'var(--yellow)'},
  {id:4,freq:523,name:'C2',color:'var(--green)'},
  {id:5,freq:440,name:'A',color:'var(--blue)'},
  {id:6,freq:349,name:'F',color:'var(--pink)'},
];
let memCards=[],memFlipped=[],memMatched=new Set(),memLocked=false;

function startMemory(){
  document.getElementById('gameTitle').textContent='🧠 Sound Memory';
  score=0;memMatched=new Set();
  // Create pairs
  const pairs=[...memSounds,...memSounds].sort(()=>Math.random()-.5);
  memCards=pairs.map((s,i)=>({...s,idx:i}));
  memFlipped=[];memLocked=false;
  renderMemory();
}

function renderMemory(){
  document.getElementById('gameContent').innerHTML='<p style="font-size:.85rem;color:var(--dim);text-align:center;margin-bottom:1rem;">Find matching sound pairs! Click cards to hear their sound.</p><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;max-width:400px;margin:0 auto;">'+memCards.map((c,i)=>{
    const matched=memMatched.has(c.idx);
    const flipped=memFlipped.includes(i);
    if(matched)return'<div style="aspect-ratio:1;border-radius:10px;background:rgba(34,197,94,.15);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:1.5rem;">✅</div>';
    if(flipped)return'<div style="aspect-ratio:1;border-radius:10px;background:'+c.color+';border:2px solid '+c.color+';display:flex;align-items:center;justify-content:center;font-family:\'Fredoka One\';font-size:1.2rem;color:#fff;">'+c.name+'</div>';
    return'<div style="aspect-ratio:1;border-radius:10px;background:rgba(0,0,0,.3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;" onclick="flipMemCard('+i+')">🎵</div>';
  }).join('')+'</div>';
}

function playTone(freq){
  const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.type='sine';osc.frequency.value=freq;
  gain.gain.setValueAtTime(.3,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.4);
  osc.start();osc.stop(audioCtx.currentTime+.4);
}

function flipMemCard(idx){
  if(memLocked||memFlipped.includes(idx)||memMatched.has(memCards[idx].idx))return;
  memFlipped.push(idx);
  playTone(memCards[idx].freq);
  renderMemory();

  if(memFlipped.length===2){
    memLocked=true;
    const[a,b]=memFlipped;
    if(memCards[a].id===memCards[b].id){
      memMatched.add(memCards[a].idx);memMatched.add(memCards[b].idx);
      addScore(5);
      memFlipped=[];memLocked=false;
      renderMemory();
      if(memMatched.size===memCards.length){
        setTimeout(()=>showResult('Memory Master!',score+20),500);
      }
    }else{
      setTimeout(()=>{memFlipped=[];memLocked=false;renderMemory();},1000);
    }
  }
}

// ═══ RHYTHM GAME (simplified) ═══
let rhythmNotes=[],rhythmActive=false,rhythmTimer=null;

function startRhythm(){
  document.getElementById('gameTitle').textContent='🎵 Rhythm Game';
  score=0;rhythmNotes=[];rhythmActive=true;
  document.getElementById('gameContent').innerHTML='<p style="text-align:center;color:var(--dim);font-size:.85rem;margin-bottom:1rem;">Tap the notes as they reach the line!</p><div class="rhythm-lane" id="rhythmLane"><div class="rhythm-target"></div></div><div style="display:flex;justify-content:center;gap:1rem;margin-top:1rem;"><button class="rhythm-hit-btn" style="border-color:var(--red);" onclick="hitRhythm()" ontouchstart="hitRhythm()">👆</button></div><div id="rhythmFeedback" style="text-align:center;min-height:2rem;margin-top:.5rem;"></div>';
  
  let noteCount=0;
  rhythmTimer=setInterval(()=>{
    if(!rhythmActive)return;
    noteCount++;
    if(noteCount>20){clearInterval(rhythmTimer);rhythmActive=false;setTimeout(()=>showResult('Rhythm Complete!',Math.max(10,score)),500);return;}
    spawnRhythmNote();
  },1200);
}

function spawnRhythmNote(){
  const lane=document.getElementById('rhythmLane');
  if(!lane)return;
  const note=document.createElement('div');
  note.className='rhythm-note';
  const colors=['var(--red)','var(--pink)','var(--blue)','var(--green)','var(--yellow)'];
  const emojis=['🎵','🎶','🎤','🥁','🎸'];
  const ci=Math.floor(Math.random()*5);
  note.style.cssText='background:'+colors[ci]+';left:'+(20+Math.random()*60)+'%;top:-50px;';
  note.textContent=emojis[ci];
  note.dataset.active='true';
  lane.appendChild(note);
  
  let pos=-50;
  const fall=setInterval(()=>{
    pos+=3;
    note.style.top=pos+'px';
    if(pos>300){
      clearInterval(fall);
      if(note.dataset.active==='true'){
        showHitFeedback('Miss!',false);
      }
      note.remove();
    }
  },30);
  note._interval=fall;
  rhythmNotes.push({el:note,fall:fall});
}

function hitRhythm(){
  const lane=document.getElementById('rhythmLane');
  if(!lane)return;
  const target=lane.querySelector('.rhythm-target');
  const targetY=target.offsetTop;
  
  let closest=null,closestDist=999;
  lane.querySelectorAll('.rhythm-note').forEach(n=>{
    if(n.dataset.active!=='true')return;
    const noteY=parseInt(n.style.top)||0;
    const dist=Math.abs(noteY-(targetY-30));
    if(dist<closestDist){closestDist=dist;closest=n;}
  });

  if(closest&&closestDist<60){
    closest.dataset.active='false';
    closest.remove();
    if(closestDist<20){addScore(5);showHitFeedback('Perfect!',true);}
    else{addScore(2);showHitFeedback('Good!',true);}
  }else{
    showHitFeedback('Miss!',false);
  }
}

function showHitFeedback(text,good){
  const fb=document.getElementById('rhythmFeedback');
  if(fb)fb.innerHTML='<span style="color:'+(good?'var(--green)':'var(--red)')+';font-family:\'Fredoka One\';font-size:1.1rem;">'+text+'</span>';
  setTimeout(()=>{if(fb)fb.innerHTML='';},600);
}
</script>
