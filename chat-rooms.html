<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>8BFR Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',system-ui,sans-serif;background:linear-gradient(#0b0014,#000);color:#eae6ff;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.hdr{background:rgba(15,0,30,.95);border-bottom:1px solid rgba(124,58,237,.5);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr h1{font-family:'Bebas Neue',cursive;font-size:1.4rem;letter-spacing:1px;}
.hdr a{color:#a855f7;text-decoration:none;font-size:.85rem;font-weight:600;}
.tabs{display:flex;background:rgba(12,6,24,.9);border-bottom:1px solid rgba(124,58,237,.3);flex-shrink:0;}
.tabs a{flex:1;text-align:center;padding:.7rem;color:rgba(234,230,255,.6);text-decoration:none;font-weight:700;font-size:.85rem;}
.tabs a.active{color:#fff;border-bottom:2px solid #a855f7;}
.wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* room list */
.rooms{flex:1;overflow-y:auto;padding:1rem;}
.room-card{background:rgba(12,6,24,.85);border:1px solid rgba(124,58,237,.35);border-radius:12px;padding:1rem;margin-bottom:.75rem;cursor:pointer;}
.room-card:hover{border-color:#a855f7;}
.room-card h3{font-size:1.05rem;margin-bottom:.2rem;}
.room-card p{font-size:.82rem;color:rgba(234,230,255,.6);}
.new-room{width:100%;padding:.85rem;background:#7c3aed;color:#fff;border:none;border-radius:12px;font-weight:800;font-size:.95rem;cursor:pointer;margin-bottom:1rem;}

/* chat view */
.chat-view{display:none;flex-direction:column;height:100%;}
.chat-view.show{display:flex;}
.chat-top{display:flex;align-items:center;gap:.6rem;padding:.6rem 1rem;background:rgba(12,6,24,.9);border-bottom:1px solid rgba(124,58,237,.3);flex-shrink:0;}
.chat-top button{background:none;border:none;color:#a855f7;font-size:1.3rem;cursor:pointer;}
.chat-top h2{font-size:1rem;}
.messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.6rem;}
.msg{max-width:80%;}
.msg.mine{align-self:flex-end;text-align:right;}
.msg .who{font-size:.72rem;color:#c084fc;font-weight:700;margin-bottom:.15rem;}
.msg .who a{color:#34d399;font-size:.68rem;font-weight:600;text-decoration:none;margin-left:.3rem;}
.msg .bubble{background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.3);border-radius:14px;padding:.5rem .8rem;font-size:.92rem;display:inline-block;word-break:break-word;}
.msg.mine .bubble{background:#7c3aed;border-color:#7c3aed;}
.compose{display:flex;gap:.5rem;padding:.6rem;background:rgba(12,6,24,.95);border-top:1px solid rgba(124,58,237,.3);flex-shrink:0;align-items:center;}
.compose input{flex:1;padding:.7rem 1rem;border-radius:50px;border:1px solid rgba(124,58,237,.4);background:rgba(0,0,0,.4);color:#fff;font-size:.95rem;}
.compose button{background:#7c3aed;border:none;color:#fff;padding:.7rem 1.1rem;border-radius:50px;font-weight:800;cursor:pointer;}
.emoji-bar{display:flex;gap:.2rem;padding:.3rem .6rem;background:rgba(12,6,24,.95);overflow-x:auto;flex-shrink:0;}
.emoji-bar button{background:none;border:none;font-size:1.4rem;cursor:pointer;padding:.2rem;flex-shrink:0;}
.empty{text-align:center;color:rgba(234,230,255,.4);padding:2rem;font-size:.9rem;}
.notice{font-size:.7rem;color:rgba(234,230,255,.45);text-align:center;padding:.4rem;}
</style>
</head>
<body>
<div class="hdr">
  <h1>8BFR Chat</h1>
  <div><a href="chat-feed.html">Feed</a> &nbsp; <a href="index.html">8BFR</a></div>
</div>
<div class="tabs">
  <a href="chat-rooms.html" class="active">Rooms</a>
  <a href="chat-feed.html">Feed</a>
  <a href="#" onclick="goProfile(event)">Profile</a>
</div>

<div class="wrap">
  <!-- ROOM LIST -->
  <div class="rooms" id="roomList">
    <button class="new-room" onclick="createRoom()">+ New Room</button>
    <div id="rooms"><div class="empty">Loading rooms...</div></div>
    <div class="notice">Chat is text + emoji only. Photos and videos go on the Feed.</div>
  </div>

  <!-- CHAT VIEW -->
  <div class="chat-view" id="chatView">
    <div class="chat-top">
      <button onclick="leaveRoom()">&larr;</button>
      <h2 id="roomName"></h2>
    </div>
    <div class="messages" id="messages"></div>
    <div class="emoji-bar" id="emojiBar"></div>
    <div class="compose">
      <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()" maxlength="500">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL='https://novbuvwpjnxwwvdekjhr.supabase.co';
var ANON='sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f';
var db=window.supabase.createClient(SUPABASE_URL,ANON);
var currentUser=null, activeRoom=null, msgChannel=null, profileCache={};
var OWNERID='cb556180-f032-4b21-9470-1d786f2664ab';
var EMOJIS=['\u2764\uFE0F','\uD83D\uDE02','\uD83D\uDD25','\uD83D\uDC4D','\uD83D\uDE0D','\uD83D\uDE4C','\uD83C\uDF89','\uD83D\uDE2E','\uD83D\uDE22','\uD83D\uDE0E','\uD83D\uDC4F','\uD83D\uDCAF','\uD83C\uDFB5','\u2728','\uD83D\uDE4F','\uD83D\uDE18'];

async function init(){
  var s=await db.auth.getSession();
  for(var t=0;t<8&&!(s.data&&s.data.session);t++){await new Promise(function(r){setTimeout(r,400);});s=await db.auth.getSession();}
  if(!s.data||!s.data.session){window.location.href='login.html?return=chat-rooms.html';return;}
  currentUser=s.data.session.user;
  // 18+ gate
  var p=await db.from('profiles').select('is_18_plus').eq('user_id',currentUser.id).maybeSingle();
  if(!p.data||!p.data.is_18_plus){
    if(confirm('8BFR Chat is for adults 18 and over only. Are you 18 or older?')){
      await db.from('profiles').update({is_18_plus:true}).eq('user_id',currentUser.id);
    } else { window.location.href='index.html'; return; }
  }
  // emoji bar
  document.getElementById('emojiBar').innerHTML=EMOJIS.map(function(e){return '<button onclick="addEmoji(\''+e+'\')">'+e+'</button>';}).join('');
  loadRooms();
}

async function loadRooms(){
  var r=await db.from('chatapp_rooms').select('*').order('created_at',{ascending:true});
  var el=document.getElementById('rooms');
  if(!r.data||!r.data.length){el.innerHTML='<div class="empty">No rooms yet. Create the first one!</div>';return;}
  el.innerHTML=r.data.map(function(rm){
    return '<div class="room-card" onclick="enterRoom(\''+rm.id+'\',\''+String(rm.name).replace(/'/g,"\\'")+'\')"><h3>'+esc(rm.name)+'</h3><p>'+esc(rm.description||'')+'</p></div>';
  }).join('');
}

async function createRoom(){
  var name=prompt('Room name:');
  if(!name)return;
  var desc=prompt('Short description (optional):')||'';
  var r=await db.from('chatapp_rooms').insert({name:name.trim(),description:desc.trim(),created_by:currentUser.id});
  if(r.error){alert('Error: '+r.error.message);return;}
  loadRooms();
}

async function enterRoom(id,name){
  activeRoom=id;
  document.getElementById('roomName').textContent=name;
  document.getElementById('roomList').style.display='none';
  document.getElementById('chatView').classList.add('show');
  await loadMessages();
  // realtime
  if(msgChannel)db.removeChannel(msgChannel);
  msgChannel=db.channel('room-'+id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'chatapp_messages',filter:'room_id=eq.'+id},function(payload){
      appendMessage(payload.new);
    }).subscribe();
}

function leaveRoom(){
  if(msgChannel){db.removeChannel(msgChannel);msgChannel=null;}
  activeRoom=null;
  document.getElementById('chatView').classList.remove('show');
  document.getElementById('roomList').style.display='block';
}

async function loadMessages(){
  var r=await db.from('chatapp_messages').select('*').eq('room_id',activeRoom).order('created_at',{ascending:true}).limit(100);
  var box=document.getElementById('messages');box.innerHTML='';
  // cache profiles
  var ids=[...new Set((r.data||[]).map(function(m){return m.user_id;}))];
  await cacheProfiles(ids);
  (r.data||[]).forEach(appendMessage);
  box.scrollTop=box.scrollHeight;
}

async function cacheProfiles(ids){
  var need=ids.filter(function(i){return !profileCache[i];});
  if(!need.length)return;
  var r=await db.from('profiles').select('user_id,display_name,username,donation_link').in('user_id',need);
  (r.data||[]).forEach(function(p){profileCache[p.user_id]=p;});
}

async function appendMessage(m){
  if(!profileCache[m.user_id])await cacheProfiles([m.user_id]);
  var p=profileCache[m.user_id]||{};
  var name=p.display_name||p.username||'Member';
  var donate=p.donation_link?'<a href="'+esc(p.donation_link)+'" target="_blank" rel="noopener">\uD83D\uDCB5 Support</a>':'';
  var mine=m.user_id===currentUser.id?' mine':'';
  var box=document.getElementById('messages');
  var div=document.createElement('div');
  div.className='msg'+mine;
  var allowL=(m.user_id===OWNERID);var body=allowL?esc(m.message).replace(/(https?:\/\/[^\s<]+)/g,function(u){return '<a href="'+u+'" target="_blank" rel="noopener" style="color:#67e8f9;text-decoration:underline;">'+u+'</a>';}):esc(m.message);
  div.innerHTML='<div class="who">'+esc(name)+donate+'</div><div class="bubble">'+body+'</div>';
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

async function sendMsg(){
  var inp=document.getElementById('msgInput');
  var text=inp.value.trim();
  if(!text||!activeRoom)return;
  inp.value='';
  var r=await db.from('chatapp_messages').insert({room_id:activeRoom,user_id:currentUser.id,message:text});
  if(r.error){alert('Failed to send: '+r.error.message);}
}

function addEmoji(e){
  var inp=document.getElementById('msgInput');
  inp.value+=e;inp.focus();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

window.goProfile=function(e){if(e)e.preventDefault();if(currentUser)window.location.href='profile.html?id='+currentUser.id;else window.location.href='login.html?return=chat-rooms.html';};
init();
</script>
</body>
</html>
