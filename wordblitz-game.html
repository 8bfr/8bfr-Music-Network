<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word Blitz -- 8BFR Games</title><link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>*{margin:0;padding:0;box-sizing:border-box;}#bubbleStack,#_8bfr_copyright,.bubble-row,#carrieWrap,#avatarSwitcher,.global-avatar,.avatar-wrap,#pageUpBtn{display:none!important;}body{padding-top:0!important;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#080012,#020005);color:#f0ecff;min-height:100vh;}
.hdr{background:rgba(8,0,18,.97);border-bottom:2px solid #fbbf24;padding:.75rem 1rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.hdr h1{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:#fbbf24;}.hdr a{color:rgba(255,255,255,.7);text-decoration:none;font-weight:600;font-size:.82rem;}
.container{max-width:380px;margin:0 auto;padding:1rem;}
.board{display:flex;flex-direction:column;gap:5px;margin-bottom:1rem;}
.row{display:flex;gap:5px;justify-content:center;}
.tile{width:52px;height:52px;border:2px solid rgba(124,58,237,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.3rem;text-transform:uppercase;transition:all .3s;}
.tile.correct{background:#22c55e;border-color:#22c55e;color:#fff;}
.tile.present{background:#fbbf24;border-color:#fbbf24;color:#000;}
.tile.absent{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.4);}
.tile.active{border-color:#7c3aed;}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
.tile.pop{animation:pop .15s ease;}
.keyboard{display:flex;flex-direction:column;gap:4px;align-items:center;}
.kb-row{display:flex;gap:3px;}
.key{min-width:28px;height:40px;border-radius:6px;border:none;background:rgba(124,58,237,.2);color:#f0ecff;font-weight:700;font-size:.72rem;cursor:pointer;display:flex;align-items:center;justify-content:center;text-transform:uppercase;transition:background .15s;}
.key:active{background:rgba(124,58,237,.4);}
.key.wide{min-width:50px;font-size:.6rem;}
.key.correct{background:#22c55e;color:#fff;}.key.present{background:#fbbf24;color:#000;}.key.absent{background:rgba(255,255,255,.08);color:rgba(255,255,255,.3);}
.msg{text-align:center;padding:.75rem;font-family:'Bebas Neue',cursive;font-size:1.3rem;border-radius:10px;display:none;margin-bottom:.5rem;}.msg.show{display:block;}
.btn{padding:.5rem .8rem;border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;border:none;color:#000;width:100%;background:#fbbf24;}
.streak{text-align:center;font-size:.75rem;color:rgba(255,255,255,.5);margin-bottom:.5rem;}
</style></head><body>
<div class="hdr"><a href="multiplayer-games.html">&larr;</a><h1>Word Blitz</h1><span style="font-size:.7rem;color:#fbbf24;" id="myCoins">0</span></div>
<div class="container">
<div class="streak">Streak: <span id="streak">0</span> | Best: <span id="best">0</span></div>
<div class="board" id="board"></div>
<div class="msg" id="msg"></div>
<div class="keyboard" id="keyboard"></div>
<button class="btn" onclick="init()" style="margin-top:.75rem;">New Word</button>
</div>
<script src="scripts.js" defer></script>
<script>
if(window.GameSession)GameSession.start("wordblitz");

var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f');
var WORDS=['about','above','abuse','actor','acute','admit','adopt','adult','after','again','agent','agree','ahead','alarm','album','alert','alien','align','alike','alive','alley','allow','alone','along','alter','among','anger','angle','angry','anime','apart','apple','apply','arena','argue','arise','aside','asset','atlas','audio','avoid','award','aware','badly','baker','bases','basic','beach','began','begin','being','below','bench','bible','birth','black','blade','blame','blank','blast','blaze','bleed','blend','bless','blind','block','blood','blown','blues','board','bonus','booth','bound','brain','brand','brave','bread','break','breed','brick','bride','brief','bring','broad','broke','brown','brush','buddy','build','bunch','burst','buyer','cabin','candy','cargo','carry','catch','cause','chain','chair','chaos','charm','chart','chase','cheap','check','cheek','chest','chief','child','china','chunk','civil','claim','class','clean','clear','climb','cling','clock','clone','close','cloud','coach','coast','color','comet','comic','coral','count','court','cover','crack','craft','crane','crash','crazy','cream','creek','crime','crisp','cross','crowd','crown','cruel','crush','curve','cycle','daily','dance','death','debug','decor','delay','delta','demon','dense','depot','depth','derby','devil','diary','dirty','dodge','doubt','dough','dozen','draft','drain','drama','drank','dream','dress','drift','drill','drink','drive','drone','drops','drunk','dryer','dying','eager','early','earth','eight','elder','elect','elite','email','ember','empty','enemy','enjoy','enter','entry','equal','error','essay','event','every','exact','exile','exist','extra','fable','faith','fancy','fatal','feast','fence','fiber','field','fifth','fifty','fight','final','first','fixed','flame','flash','fleet','flesh','float','flood','floor','flora','flour','fluid','flush','focus','force','forge','forth','forty','forum','found','frame','frank','fraud','fresh','front','frost','fruit','fully','funny','giant','given','glass','globe','gloom','glory','glove','going','grace','grade','grain','grand','grant','grape','grasp','grass','grave','great','green','grind','groan','gross','group','grove','grown','guard','guess','guide','guilt','guise','pupil','quote','habit','happy','harsh','heart','heavy','hence','herbs','honey','honor','horse','hotel','house','human','humor','hurry','hyper','ideal','image','imply','inbox','index','indie','infra','inner','input','irony','issue','ivory','jewel','joint','joker','judge','juice','known','label','lance','large','laser','later','laugh','layer','learn','least','legal','lemon','level','light','limit','linen','liner','lives','local','lodge','logic','login','login','loose','lover','lower','lucky','lunch','lunar','lying','lyric','macro','magic','major','maker','manor','maple','march','match','maybe','mayor','media','mercy','merit','metal','meter','micro','might','minor','minus','mixer','model','money','month','moral','motor','mount','mouse','mouth','movie','music','myth','named','naval','nerve','never','newly','night','noble','noise','north','noted','novel','nurse','ocean','offer','often','olive','opera','orbit','order','organ','other','outer','owner','oxide','ozone','paint','panel','panic','paper','party','paste','patch','pause','peace','pearl','penal','penny','phase','phone','photo','piano','piece','pilot','pixel','pizza','place','plain','plane','plant','plate','plaza','plead','plumb','point','polar','porch','pound','power','press','price','pride','prime','print','prior','prize','proof','proud','prove','psalm','pulse','punch','puppy','purse','queen','query','quest','queue','quick','quiet','radar','radio','raise','rally','ranch','range','rapid','ratio','reach','react','ready','realm','rebel','reign','relax','relay','remit','renew','repay','reply','rider','ridge','rifle','right','rigid','risky','rival','river','roast','robot','rocky','roman','rough','round','route','royal','rugby','ruler','rumor','rural','sadly','saint','salad','sauce','scale','scare','scene','scope','score','scout','screw','sense','serve','setup','seven','shade','shaft','shake','shall','shame','shape','share','shark','sharp','shave','shelf','shell','shift','shine','shirt','shock','shoot','shore','short','shout','shown','sight','sigma','since','sixty','sized','skill','skull','slate','slave','sleep','slice','slide','slope','small','smart','smell','smile','smoke','snake','solar','solid','solve','sorry','sound','south','space','spare','spark','speak','speed','spend','spent','spice','spike','spine','spite','split','spoke','sport','spray','squad','stack','staff','stage','stain','stake','stall','stamp','stand','stare','start','state','stays','steak','steal','steam','steel','steep','steer','stern','stick','stiff','still','stock','stole','stone','stood','store','storm','story','stove','strap','straw','stray','strip','stuck','study','stuff','style','sugar','suite','sunny','super','surge','swamp','swear','sweat','sweep','sweet','swept','swift','swing','sword','syrup','table','taken','taste','teach','tears','tempo','terms','thank','their','theme','there','thick','thing','think','third','those','three','threw','throw','thumb','tiger','tight','timer','title','today','token','total','touch','tough','towel','tower','toxic','trace','track','trade','trail','train','trait','trash','treat','trend','trial','tribe','trick','tried','troop','truck','truly','trump','trunk','trust','truth','tumor','tuner','twice','twist','ultra','uncle','under','union','unite','unity','until','upper','upset','urban','usage','usual','valid','valor','value','valve','vault','venue','verse','video','vigor','vinyl','viral','virus','visit','vista','vital','vivid','vocal','vodka','voice','voter','wages','watch','water','weary','weave','weird','wheat','wheel','where','which','while','white','whole','whose','width','witch','woman','world','worry','worse','worst','worth','would','wound','write','wrong','wrote','yacht','yield','young','youth','zones'];
var answer='',guesses=[],currentGuess='',row=0,over=false,streak=0,best=0,keyStates={},currentUser=null;
(async function(){var s=await db.auth.getSession();if(s.data.session){currentUser=s.data.session.user;var p=await db.from('profiles').select('coins').eq('user_id',currentUser.id).single();if(p.data)document.getElementById('myCoins').textContent=(p.data.coins||0).toLocaleString();}streak=parseInt(localStorage.getItem('8bfr-word-streak')||'0');best=parseInt(localStorage.getItem('8bfr-word-best')||'0');document.getElementById('streak').textContent=streak;document.getElementById('best').textContent=best;init();})();
function init(){
answer=WORDS[Math.floor(Math.random()*WORDS.length)].toUpperCase();
guesses=[];currentGuess='';row=0;over=false;keyStates={};
document.getElementById('msg').classList.remove('show');
renderBoard();renderKeyboard();
}
function renderBoard(){
var html='';
for(var r=0;r<6;r++){
html+='<div class="row">';
for(var c=0;c<5;c++){
var letter='',cls='tile';
if(r<guesses.length){
letter=guesses[r][c];
if(answer[c]===letter)cls+=' correct';
else if(answer.includes(letter))cls+=' present';
else cls+=' absent';
}else if(r===row&&c<currentGuess.length){
letter=currentGuess[c];cls+=' active pop';
}
html+='<div class="'+cls+'">'+letter+'</div>';
}
html+='</div>';
}
document.getElementById('board').innerHTML=html;
}
function renderKeyboard(){
var rows=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','DEL']];
var html='';
rows.forEach(function(r){
html+='<div class="kb-row">';
r.forEach(function(k){
var cls='key';if(k==='ENTER'||k==='DEL')cls+=' wide';
if(keyStates[k]==='correct')cls+=' correct';
else if(keyStates[k]==='present')cls+=' present';
else if(keyStates[k]==='absent')cls+=' absent';
html+='<button class="'+cls+'" onclick="press(\''+k+'\')">'+k+'</button>';
});
html+='</div>';
});
document.getElementById('keyboard').innerHTML=html;
}
window.press=function(k){
if(over)return;
if(k==='DEL'){currentGuess=currentGuess.slice(0,-1);renderBoard();return;}
if(k==='ENTER'){
if(currentGuess.length!==5)return;
guesses.push(currentGuess);
for(var i=0;i<5;i++){
var l=currentGuess[i];
if(answer[i]===l)keyStates[l]='correct';
else if(answer.includes(l)){if(keyStates[l]!=='correct')keyStates[l]='present';}
else keyStates[l]='absent';
}
if(currentGuess===answer){endG(true);return;}
row++;currentGuess='';
if(row>=6){endG(false);return;}
renderBoard();renderKeyboard();return;
}
if(currentGuess.length<5){currentGuess+=k;renderBoard();}
};
document.addEventListener('keydown',function(e){
if(e.key==='Enter')press('ENTER');
else if(e.key==='Backspace')press('DEL');
else if(/^[a-zA-Z]$/.test(e.key))press(e.key.toUpperCase());
});
async function endG(won){
over=true;renderBoard();renderKeyboard();
var el=document.getElementById('msg');el.classList.add('show');
if(won){streak++;if(streak>best)best=streak;el.style.background='rgba(74,222,128,.15)';el.style.color='#4ade80';el.textContent='Got it in '+(row+1)+'! Streak: '+streak;}
else{streak=0;el.style.background='rgba(239,68,68,.15)';el.style.color='#ef4444';el.textContent='The word was: '+answer;}
localStorage.setItem('8bfr-word-streak',streak);localStorage.setItem('8bfr-word-best',best);
document.getElementById('streak').textContent=streak;document.getElementById('best').textContent=best;
if(currentUser){try{await db.rpc('record_game_result',{p_user_id:currentUser.id,p_game:'wordblitz',p_won:won,p_coins:0});}catch(e){}}if(window.GameSession)GameSession.end();
}
</script></body></html>
