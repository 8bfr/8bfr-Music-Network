<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Group — 8BFR Music Network</title>
  <link rel="icon" href="assets/images/favicon.png"/>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{background:linear-gradient(#0b0014,#000);color:#eae6ff;font-family:system-ui,sans-serif;margin:0;padding-bottom:80px;}
    .container{max-width:720px;margin:0 auto;padding:1rem;}
    .card{background:rgba(12,6,24,0.7);border:1px solid rgba(124,58,237,0.3);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;}
    .card h2{color:#a855f7;margin:0 0 1rem;font-size:1.1rem;}
    .cover{width:100%;height:160px;border-radius:12px 12px 0 0;background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(168,85,247,0.1));overflow:hidden;}
    .cover img{width:100%;height:100%;object-fit:cover;}
    .form-input{width:100%;padding:0.7rem 0.9rem;background:rgba(12,0,25,0.9);border:1px solid rgba(124,58,237,0.35);border-radius:8px;color:#eae6ff;font-size:0.93rem;box-sizing:border-box;}
    .btn{background:#7c3aed;color:white;border:none;padding:0.6rem 1.2rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.88rem;}
    .btn:hover{background:#6d28d9;} .btn:disabled{opacity:0.5;}
    .btn-sm{padding:0.4rem 0.8rem;font-size:0.8rem;}
    .btn-red{background:#dc2626;} .btn-red:hover{background:#b91c1c;}
    .btn-green{background:#059669;} .btn-green:hover{background:#047857;}
    .badge{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.4);color:#a855f7;padding:0.2rem 0.6rem;border-radius:20px;font-size:0.75rem;font-weight:600;}
    .member-row{display:flex;align-items:center;gap:0.75rem;padding:0.6rem;border-bottom:1px solid rgba(124,58,237,0.1);}
    .member-av{width:36px;height:36px;border-radius:50%;background:rgba(124,58,237,0.3);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
    .member-av img{width:100%;height:100%;object-fit:cover;}
    .post-card{background:rgba(0,0,0,0.3);border:1px solid rgba(124,58,237,0.15);border-radius:10px;padding:1rem;margin-bottom:0.75rem;}
    .spinner{width:28px;height:28px;border-radius:50%;border:3px solid rgba(168,85,247,0.2);border-top-color:#a855f7;animation:spin 0.7s linear infinite;margin:2rem auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    header{padding:1rem;background:rgba(15,0,30,0.9);border-bottom:1px solid rgba(124,58,237,0.5);position:sticky;top:0;z-index:100;}
    header div{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
    .tabs{display:flex;gap:0.5rem;margin-bottom:1rem;}
    .tab{padding:0.4rem 0.8rem;border-radius:8px;cursor:pointer;font-size:0.82rem;font-weight:600;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.2);color:#a855f7;}
    .tab.active{background:#7c3aed;color:white;border-color:#7c3aed;}
  </style>
</head>
<body>
  <header><div><a href="search.html" style="color:#a855f7;font-weight:600;text-decoration:none;">← Search</a><h1 style="font-size:1.15rem;font-weight:800;" id="pageTitle">👥 Group</h1><div style="width:60px;"></div></div></header>
  <div class="container">
    <div id="loading"><div class="spinner"></div></div>
    <div id="content" style="display:none;"></div>
  </div>
  <nav style="position:fixed;bottom:0;left:0;right:0;background:rgba(15,0,30,0.95);border-top:1px solid rgba(124,58,237,0.4);display:flex;justify-content:space-around;padding:0.5rem 0;z-index:200;">
    <a href="index.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">🏠<br>Home</a>
    <a href="search.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">🔍<br>Search</a>
    <a href="feed.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">📰<br>Feed</a>
    <a href="radio.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">📻<br>Radio</a>
    <a href="profile.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">👤<br>Profile</a>
  </nav>
  <script src="scripts.js"></script>
  <script>
  (async function(){
    var db=window._8bfrSupabaseClient||(window.supabase?window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0'):null);
    var gid=new URLSearchParams(location.search).get('id');
    if(!gid){document.getElementById('loading').innerHTML='<div style="text-align:center;padding:3rem;color:#b7a7dc;">No group specified. <a href="search.html" style="color:#a855f7;">Browse groups</a></div>';return;}

    var user=null;try{var s=await db.auth.getSession();user=s?.data?.session?.user||null;}catch(e){}
    var OWNER_ID='cb556180-f032-4b21-9470-1d786f2664ab';

    var gr=await db.from('groups').select('*').eq('id',gid).maybeSingle();
    if(gr.error||!gr.data){document.getElementById('loading').innerHTML='<div style="text-align:center;padding:3rem;color:#ef4444;">Group not found.</div>';return;}
    var g=gr.data;
    var isCreator=user&&(user.id===g.created_by||user.id===OWNER_ID);
    document.getElementById('pageTitle').textContent='👥 '+g.name;
    document.title=g.name+' — 8BFR';

    // Check membership
    var isMember=false,myRole='';
    if(user){var mr=await db.from('group_members').select('role,status').eq('group_id',gid).eq('user_id',user.id).maybeSingle();if(mr.data&&mr.data.status==='active'){isMember=true;myRole=mr.data.role;}}
    var isModOrAdmin=isCreator||myRole==='owner'||myRole==='admin'||myRole==='moderator';

    function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
    function ago(d){if(!d)return '';var m=Math.floor((Date.now()-new Date(d).getTime())/60000);if(m<1)return 'Just now';if(m<60)return m+'m';var h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d';}

    var privIcon={public:'🌍',private:'🔒',secret:'👻'};
    var covH=g.cover_url?'<img src="'+g.cover_url+'" onerror="this.style.display=\'none\'">':'';
    var joinBtn='';
    if(!isMember&&user) joinBtn='<button class="btn btn-green btn-sm" onclick="joinGroup()">➕ Join Group</button>';
    else if(isMember&&!isCreator) joinBtn='<button class="btn btn-red btn-sm" onclick="leaveGroup()">🚪 Leave</button>';

    var h='<div class="card" style="padding:0;"><div class="cover">'+covH+'</div><div style="padding:1.5rem;"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;"><h2 style="margin:0;">'+esc(g.name)+'</h2><div style="display:flex;gap:0.5rem;align-items:center;"><span class="badge">'+(privIcon[g.privacy]||'🌍')+' '+esc(g.privacy)+'</span><span class="badge">👥 '+(g.member_count||1)+' members</span>'+joinBtn+'</div></div>'+(g.description?'<p style="color:rgba(234,230,255,0.7);margin-top:0.75rem;line-height:1.6;">'+esc(g.description)+'</p>':'')+'</div></div>';

    // Tabs
    h+='<div class="tabs"><div class="tab active" onclick="showTab(\'posts\')">📝 Posts</div><div class="tab" onclick="showTab(\'members\')">👥 Members</div>'+(g.rules?'<div class="tab" onclick="showTab(\'rules\')">📜 Rules</div>':'')+(isCreator?'<div class="tab" onclick="showTab(\'settings\')">⚙️ Settings</div>':'')+(isModOrAdmin?'<div class="tab" onclick="showTab(\'mod\')">🛡️ Mod</div>':'')+'</div>';

    // Post form
    if(isMember) h+='<div id="postForm" class="card" style="padding:1rem;"><textarea class="form-input" id="gpText" rows="2" placeholder="Post something…" style="margin-bottom:0.5rem;"></textarea><button class="btn btn-sm" onclick="submitGP()">📤 Post</button><span id="gpNotice" style="font-size:0.85rem;margin-left:0.5rem;"></span></div>';

    // Panels
    h+='<div id="panelPosts"><div id="gpList"><div class="spinner"></div></div></div>';
    h+='<div id="panelMembers" style="display:none;"><div class="card"><h2>👥 Members</h2><div id="memberList"><div class="spinner"></div></div></div></div>';
    if(g.rules) h+='<div id="panelRules" style="display:none;"><div class="card"><h2>📜 Group Rules</h2><p style="white-space:pre-wrap;line-height:1.6;color:rgba(234,230,255,0.7);">'+esc(g.rules)+'</p></div></div>';
    if(isCreator) h+='<div id="panelSettings" style="display:none;"><div class="card"><h2>⚙️ Group Settings</h2><div style="display:flex;gap:0.5rem;flex-wrap:wrap;"><button class="btn btn-red" onclick="deleteGroup()">🗑️ Delete Group</button></div><p style="font-size:0.8rem;color:rgba(168,85,247,0.5);margin-top:0.75rem;">More settings coming soon.</p></div></div>';
    if(isModOrAdmin) h+='<div id="panelMod" style="display:none;"><div class="card"><h2>🛡️ Moderation</h2><div id="pendingList"><div class="spinner"></div></div><p style="font-size:0.8rem;color:rgba(168,85,247,0.5);margin-top:0.75rem;">Pending posts and member requests appear here.</p></div></div>';

    document.getElementById('loading').style.display='none';
    var c=document.getElementById('content');c.style.display='block';c.innerHTML=h;

    // Load posts
    (async function(){var el=document.getElementById('gpList');try{var r=await db.from('group_posts').select('id,text,media,media_type,likes,user_id,created_at').eq('group_id',gid).eq('approved',true).order('created_at',{ascending:false}).limit(50);var posts=r.data||[];if(!posts.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:rgba(168,85,247,0.5);">No posts yet.'+(isMember?' Be the first!':'')+'</div>';return;}
    var uids=[];posts.forEach(function(p){if(p.user_id&&uids.indexOf(p.user_id)===-1)uids.push(p.user_id);});
    var pMap={};if(uids.length){var pr=await db.from('profiles').select('user_id,username,display_name,avatar_url').in('user_id',uids);(pr.data||[]).forEach(function(p){pMap[p.user_id]=p;});}
    el.innerHTML=posts.map(function(p){var prof=pMap[p.user_id]||{};var av=prof.avatar_url?'<img src="'+prof.avatar_url+'" style="width:32px;height:32px;border-radius:50%;object-fit:cover;">':'<div style="width:32px;height:32px;border-radius:50%;background:rgba(124,58,237,0.3);display:flex;align-items:center;justify-content:center;">👤</div>';var del=(user&&(p.user_id===user.id||isModOrAdmin))?'<button onclick="delGP(\''+p.id+'\')" style="background:none;border:none;color:rgba(239,68,68,0.5);cursor:pointer;font-size:0.8rem;">🗑️</button>':'';return '<div class="post-card"><div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;">'+av+'<a href="profile.html?id='+p.user_id+'" style="color:#a855f7;text-decoration:none;font-weight:600;font-size:0.88rem;">'+(prof.display_name||prof.username||'User')+'</a><span style="font-size:0.72rem;color:rgba(168,85,247,0.5);margin-left:auto;">'+ago(p.created_at)+'</span>'+del+'</div><div style="line-height:1.6;">'+esc(p.text)+'</div></div>';}).join('');}catch(e){el.innerHTML='<div style="color:#ef4444;">'+e.message+'</div>';}})();

    // Load members
    (async function(){var el=document.getElementById('memberList');try{var r=await db.from('group_members').select('user_id,role,joined_at').eq('group_id',gid).eq('status','active').order('joined_at');var members=r.data||[];if(!members.length){el.innerHTML='<div style="color:rgba(168,85,247,0.5);">No members.</div>';return;}
    var uids=members.map(function(m){return m.user_id;});
    var pMap={};var pr=await db.from('profiles').select('user_id,username,display_name,avatar_url').in('user_id',uids);(pr.data||[]).forEach(function(p){pMap[p.user_id]=p;});
    el.innerHTML=members.map(function(m){var p=pMap[m.user_id]||{};var av=p.avatar_url?'<img src="'+p.avatar_url+'">':'👤';var roleB=m.role!=='member'?'<span class="badge" style="font-size:0.65rem;">'+m.role+'</span>':'';var kickBtn=(isModOrAdmin&&user&&m.user_id!==user.id)?'<button class="btn btn-red btn-sm" style="margin-left:auto;" onclick="kickMember(\''+m.user_id+'\')">Kick</button>':'';return '<div class="member-row"><div class="member-av">'+av+'</div><a href="profile.html?id='+m.user_id+'" style="color:inherit;text-decoration:none;font-weight:600;">'+(p.display_name||p.username||'User')+'</a>'+roleB+kickBtn+'</div>';}).join('');}catch(e){el.innerHTML='<div style="color:#ef4444;">'+e.message+'</div>';}})();

    // Load pending (mod)
    if(isModOrAdmin){(async function(){var el=document.getElementById('pendingList');if(!el)return;try{
      var pending=[];
      if(g.post_approval){var r=await db.from('group_posts').select('id,text,user_id,created_at').eq('group_id',gid).eq('approved',false).order('created_at',{ascending:false}).limit(20);pending=r.data||[];}
      var reqR=await db.from('group_members').select('user_id,joined_at').eq('group_id',gid).eq('status','pending');var requests=reqR.data||[];
      if(!pending.length&&!requests.length){el.innerHTML='<div style="color:rgba(168,85,247,0.5);">Nothing pending.</div>';return;}
      var h='';
      if(requests.length){h+='<h3 style="font-size:0.95rem;color:#a855f7;">Join Requests ('+requests.length+')</h3>';requests.forEach(function(r){h+='<div class="member-row"><span>User: '+r.user_id.substring(0,8)+'…</span><button class="btn btn-green btn-sm" onclick="approveMember(\''+r.user_id+'\')">✅</button><button class="btn btn-red btn-sm" onclick="kickMember(\''+r.user_id+'\')">❌</button></div>';});}
      if(pending.length){h+='<h3 style="font-size:0.95rem;color:#a855f7;margin-top:1rem;">Pending Posts ('+pending.length+')</h3>';pending.forEach(function(p){h+='<div class="post-card"><div style="font-size:0.85rem;">'+esc(p.text)+'</div><div style="display:flex;gap:0.5rem;margin-top:0.5rem;"><button class="btn btn-green btn-sm" onclick="approvePost(\''+p.id+'\')">✅ Approve</button><button class="btn btn-red btn-sm" onclick="delGP(\''+p.id+'\')">❌ Reject</button></div></div>';});}
      el.innerHTML=h;
    }catch(e){el.innerHTML='Error';}})();}

    // Tab switching
    window.showTab=function(t){['posts','members','rules','settings','mod'].forEach(function(x){var p=document.getElementById('panel'+x.charAt(0).toUpperCase()+x.slice(1));if(p)p.style.display=x===t?'block':'none';});document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active');});event.target.classList.add('active');if(t==='posts'){var pf=document.getElementById('postForm');if(pf)pf.style.display='block';}else{var pf=document.getElementById('postForm');if(pf)pf.style.display='none';}};

    // Actions
    window.joinGroup=async function(){if(!user)return;try{await db.from('group_members').insert({group_id:gid,user_id:user.id,role:'member',status:g.privacy==='private'?'pending':'active'});await db.from('groups').update({member_count:(g.member_count||1)+1}).eq('id',gid);location.reload();}catch(e){alert(e.message);}};
    window.leaveGroup=async function(){if(!confirm('Leave group?'))return;try{await db.from('group_members').delete().eq('group_id',gid).eq('user_id',user.id);await db.from('groups').update({member_count:Math.max(0,(g.member_count||1)-1)}).eq('id',gid);location.reload();}catch(e){alert(e.message);}};
    window.deleteGroup=async function(){if(!confirm('Delete this group permanently?'))return;try{await db.from('groups').delete().eq('id',gid);location.href='search.html';}catch(e){alert(e.message);}};
    window.submitGP=async function(){var text=document.getElementById('gpText').value.trim();var n=document.getElementById('gpNotice');if(!text){n.textContent='Write something';return;}try{await db.from('group_posts').insert({group_id:gid,user_id:user.id,text:text,approved:!g.post_approval});n.innerHTML='<span style="color:#4ade80;">✅</span>';document.getElementById('gpText').value='';setTimeout(function(){location.reload();},800);}catch(e){n.innerHTML='<span style="color:#ef4444;">'+e.message+'</span>';}};
    window.delGP=async function(id){if(!confirm('Delete?'))return;try{await db.from('group_posts').delete().eq('id',id);location.reload();}catch(e){alert(e.message);}};
    window.kickMember=async function(uid){if(!confirm('Remove member?'))return;try{await db.from('group_members').delete().eq('group_id',gid).eq('user_id',uid);location.reload();}catch(e){alert(e.message);}};
    window.approveMember=async function(uid){try{await db.from('group_members').update({status:'active'}).eq('group_id',gid).eq('user_id',uid);location.reload();}catch(e){alert(e.message);}};
    window.approvePost=async function(id){try{await db.from('group_posts').update({approved:true}).eq('id',id);location.reload();}catch(e){alert(e.message);}};
  })();
  </script>
</body>
</html>
