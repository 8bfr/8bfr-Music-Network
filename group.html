<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Groups — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--dark:#0b0014;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);--green:#4ade80;--cyan:#00d9ff;--red:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:rgba(15,0,30,.9);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.8rem;color:var(--primary);}
.header a{color:var(--text);text-decoration:none;font-weight:600;font-size:.85rem;}
.container{max-width:900px;margin:0 auto;padding:1.5rem;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.25rem;}
.tab{flex:1;text-align:center;padding:.65rem;font-weight:600;font-size:.82rem;cursor:pointer;color:rgba(234,230,255,.5);border:none;border-bottom:2px solid transparent;background:none;transition:all .2s;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.search-bar{margin-bottom:1.25rem;display:flex;gap:.5rem;}
.search-bar input{flex:1;padding:.55rem .85rem;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.88rem;outline:none;}
.btn{background:var(--primary);color:#fff;border:none;padding:.55rem 1.1rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85rem;transition:all .2s;}
.btn:hover{background:#6d28d9;}.btn:disabled{opacity:.5;}
.btn-sm{padding:.35rem .75rem;font-size:.78rem;}
.btn-ghost{background:rgba(124,58,237,.15);border:1px solid var(--border);color:var(--dim);}
.btn-green{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--green);}
.btn-red{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .3s;cursor:pointer;}
.group-card:hover{border-color:var(--primary);transform:translateY(-2px);}
.gc-cover{height:70px;background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(0,217,255,.15));overflow:hidden;}
.gc-cover img{width:100%;height:100%;object-fit:cover;}
.gc-body{padding:1rem;}
.gc-name{font-weight:700;font-size:.95rem;margin-bottom:.15rem;}
.gc-type{font-size:.68rem;padding:.15rem .4rem;border-radius:4px;display:inline-block;margin-bottom:.3rem;}
.gc-type.public{background:rgba(34,197,94,.15);color:var(--green);}
.gc-type.private{background:rgba(239,68,68,.1);color:#fca5a5;}
.gc-desc{font-size:.75rem;color:var(--dim);line-height:1.4;max-height:2.8em;overflow:hidden;margin-bottom:.5rem;}
.gc-stats{display:flex;gap:.75rem;font-size:.7rem;color:rgba(168,85,247,.5);}
.group-detail{display:none;}
.gd-cover{width:100%;height:140px;background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(0,217,255,.15));border-radius:14px;overflow:hidden;margin-bottom:1rem;}
.gd-cover img{width:100%;height:100%;object-fit:cover;}
.gd-header{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;}
.gd-name{font-size:1.4rem;font-weight:800;margin-bottom:.15rem;}
.gd-stats{display:flex;gap:1.25rem;font-size:.82rem;color:var(--dim);margin:.5rem 0;}
.gd-stat-num{font-weight:800;color:var(--text);}
.gd-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1rem;}
.gd-tab{padding:.55rem .85rem;font-weight:600;font-size:.8rem;cursor:pointer;color:rgba(234,230,255,.45);border:none;border-bottom:2px solid transparent;background:none;transition:all .2s;}
.gd-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.post-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:.75rem;}
.post-header{display:flex;gap:.6rem;align-items:center;margin-bottom:.5rem;}
.post-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1rem;overflow:hidden;flex-shrink:0;}
.post-av img{width:100%;height:100%;object-fit:cover;}
.post-name{font-weight:700;font-size:.85rem;}
.post-time{font-size:.68rem;color:rgba(168,85,247,.4);}
.post-text{font-size:.88rem;line-height:1.6;margin-bottom:.5rem;}
.post-media img{width:100%;border-radius:8px;margin-bottom:.5rem;max-height:300px;object-fit:cover;}
.post-actions-bar{display:flex;gap:.75rem;padding-top:.5rem;border-top:1px solid rgba(124,58,237,.1);}
.post-action{background:none;border:none;color:var(--dim);font-size:.78rem;cursor:pointer;display:flex;align-items:center;gap:.25rem;}
.member-row{display:flex;align-items:center;gap:.6rem;padding:.5rem;border-bottom:1px solid rgba(124,58,237,.08);}
.member-row:last-child{border:none;}
.member-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:.9rem;overflow:hidden;flex-shrink:0;}
.member-av img{width:100%;height:100%;object-fit:cover;}
.member-name{font-weight:600;font-size:.85rem;flex:1;}
.member-role{font-size:.65rem;padding:.1rem .3rem;border-radius:4px;background:rgba(124,58,237,.15);color:var(--dim);}
.modal{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:1rem;}
.modal.show{display:flex;}
.modal-box{background:rgba(12,6,24,.98);border:1px solid var(--primary);border-radius:16px;padding:1.5rem;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-box h2{font-family:'Bebas Neue',cursive;color:var(--primary);margin-bottom:1rem;}
.form-group{margin-bottom:.75rem;}
.form-group label{display:block;font-size:.78rem;color:var(--dim);margin-bottom:.25rem;font-weight:600;}
.form-input{width:100%;padding:.55rem .75rem;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.88rem;outline:none;font-family:inherit;}
textarea.form-input{min-height:80px;resize:vertical;}
.empty{text-align:center;padding:3rem;color:var(--dim);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="header">
<a href="feed.html">← Back</a>
<h1>👥 Groups</h1>
<button class="btn btn-sm" onclick="openCreateGroup()">+ Create</button>
</div>
<div class="container">
<div id="browseView">
<div class="tabs">
<button class="tab active" onclick="switchTab('discover',this)">🔍 Discover</button>
<button class="tab" onclick="switchTab('my',this)">👥 My Groups</button>
</div>
<div class="search-bar"><input type="text" id="groupSearch" placeholder="🔍 Search groups..." oninput="searchGroups(this.value)"></div>
<div id="groupList"><div class="spinner"></div></div>
</div>
<div class="group-detail" id="groupDetail">
<div style="margin-bottom:.75rem;"><a href="#" onclick="backToBrowse();return false;" style="color:var(--dim);text-decoration:none;font-weight:600;">← Back to Groups</a></div>
<div id="groupDetailContent"></div>
</div>
</div>
<div class="modal" id="createModal">
<div class="modal-box">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
<h2 style="margin:0;">👥 Create Group</h2>
<button onclick="closeModal()" style="background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;">✕</button>
</div>
<div class="form-group"><label>Group Name *</label><input class="form-input" id="cgName" placeholder="e.g. Hip-Hop Producers"></div>
<div class="form-group"><label>Privacy</label><select class="form-input" id="cgPrivacy"><option value="public">🌐 Public — anyone can join</option><option value="private">🔒 Private — admin must approve</option></select></div>
<div class="form-group"><label>Category</label><select class="form-input" id="cgCat"><option value="music">🎵 Music</option><option value="production">🎧 Production</option><option value="collab">🤝 Collaboration</option><option value="genre">🎶 Genre</option><option value="local">📍 Local Scene</option><option value="learning">📚 Learning</option><option value="general">💬 General</option></select></div>
<div class="form-group"><label>Description</label><textarea class="form-input" id="cgDesc" placeholder="What's this group about?"></textarea></div>
<div class="form-group"><label>Cover URL (optional)</label><input class="form-input" id="cgCover" placeholder="https://..."></div>
<div style="display:flex;gap:.5rem;">
<button class="btn" onclick="createGroup()" id="cgBtn" style="flex:1;">👥 Create Group</button>
<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
</div>
<div id="cgNotice" style="margin-top:.5rem;font-size:.82rem;text-align:center;"></div>
</div>
</div>
<script src="scripts.js" defer></script>
<script>
const db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
let currentUser=null,currentTab='discover',allGroups=[],viewingGroup=null,groupTab='posts';

async function init(){const{data:{session}}=await db.auth.getSession();currentUser=session?session.user:null;loadGroups();}

async function loadGroups(){
  const el=document.getElementById('groupList');el.innerHTML='<div class="spinner"></div>';
  let query=db.from('groups').select('*').eq('is_active',true);
  if(currentTab==='my'&&currentUser){
    const{data:memberships}=await db.from('group_members').select('group_id').eq('user_id',currentUser.id);
    const ids=(memberships||[]).map(m=>m.group_id);
    if(!ids.length){el.innerHTML='<div class="empty">You haven\'t joined any groups yet.</div>';return;}
    query=query.in('id',ids);
  }
  const{data}=await query.order('member_count',{ascending:false}).limit(50);
  allGroups=data||[];renderGroups(allGroups);
}

function renderGroups(groups){
  const el=document.getElementById('groupList');
  if(!groups.length){el.innerHTML='<div class="empty"><div style="font-size:2rem;margin-bottom:.5rem;">👥</div>No groups yet — create one!</div>';return;}
  el.innerHTML='<div class="group-grid">'+groups.map(g=>{
    const cov=g.cover_url?'<img src="'+esc(g.cover_url)+'">':'';
    return '<div class="group-card" onclick="openGroup(\''+g.id+'\')"><div class="gc-cover">'+cov+'</div><div class="gc-body"><div class="gc-name">'+esc(g.name)+'</div><div class="gc-type '+(g.privacy||'public')+'">'+(g.privacy==='private'?'🔒 Private':'🌐 Public')+'</div><div class="gc-desc">'+esc((g.description||'').substring(0,80))+'</div><div class="gc-stats"><span>👥 '+(g.member_count||0)+' members</span><span>📝 '+(g.post_count||0)+' posts</span></div></div></div>';
  }).join('')+'</div>';
}

function searchGroups(q){if(!q.trim()){renderGroups(allGroups);return;}const l=q.toLowerCase();renderGroups(allGroups.filter(g=>(g.name||'').toLowerCase().includes(l)||(g.description||'').toLowerCase().includes(l)));}
function switchTab(tab,btn){currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');loadGroups();}

async function openGroup(id){
  document.getElementById('browseView').style.display='none';
  document.getElementById('groupDetail').style.display='block';
  const el=document.getElementById('groupDetailContent');
  el.innerHTML='<div class="spinner"></div>';
  const{data:group}=await db.from('groups').select('*').eq('id',id).single();
  if(!group){el.innerHTML='<div class="empty">Group not found.</div>';return;}
  viewingGroup=group;
  const isAdmin=currentUser&&group.owner_id===currentUser.id;
  let isMember=false;
  if(currentUser){const{data:m}=await db.from('group_members').select('id,role').eq('group_id',id).eq('user_id',currentUser.id).maybeSingle();isMember=!!m;}
  const cov=group.cover_url?'<img src="'+esc(group.cover_url)+'" style="width:100%;height:100%;object-fit:cover;">':'';
  let h='<div class="gd-cover">'+cov+'</div>';
  h+='<div class="gd-header">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem;">';
  h+='<div><div class="gd-name">'+esc(group.name)+'</div>';
  h+='<span class="gc-type '+(group.privacy||'public')+'" style="margin-top:.25rem;">'+(group.privacy==='private'?'🔒 Private':'🌐 Public')+'</span></div>';
  if(currentUser){
    if(isMember) h+='<button class="btn btn-red btn-sm" onclick="leaveGroup(\''+id+'\')">Leave Group</button>';
    else h+='<button class="btn btn-sm" onclick="joinGroup(\''+id+'\')">+ Join Group</button>';
  }
  h+='</div>';
  h+='<div style="font-size:.88rem;color:var(--dim);line-height:1.6;margin:.5rem 0;">'+esc(group.description||'')+'</div>';
  h+='<div class="gd-stats"><span><span class="gd-stat-num">'+(group.member_count||0)+'</span> members</span><span><span class="gd-stat-num">'+(group.post_count||0)+'</span> posts</span></div>';
  h+='</div>';
  h+='<div class="gd-tabs">';
  h+='<button class="gd-tab active" onclick="switchGroupTab(\'posts\',this)">📝 Posts</button>';
  h+='<button class="gd-tab" onclick="switchGroupTab(\'members\',this)">👥 Members</button>';
  if(isAdmin) h+='<button class="gd-tab" onclick="switchGroupTab(\'admin\',this)">⚙️ Admin</button>';
  h+='</div>';
  if(isMember||group.privacy==='public'){
    h+='<div id="groupContent"></div>';
    if(isMember) h+='<div style="margin-bottom:1rem;"><button class="btn" onclick="postToGroup(\''+id+'\')">📝 Post in Group</button></div>';
  } else {
    h+='<div class="empty">🔒 Join this group to see posts and participate.</div>';
  }
  el.innerHTML=h;
  if(isMember||group.privacy==='public') loadGroupContent(id,'posts');
}

async function loadGroupContent(id,tab){
  groupTab=tab;
  const el=document.getElementById('groupContent');
  if(!el)return;
  el.innerHTML='<div class="spinner"></div>';
  if(tab==='posts'){
    const{data:posts}=await db.from('group_posts').select('*').eq('group_id',id).order('created_at',{ascending:false}).limit(30);
    if(!posts||!posts.length){el.innerHTML='<div class="empty" style="padding:1.5rem;">No posts yet. Be the first!</div>';return;}
    const uids=[...new Set(posts.map(p=>p.user_id).filter(Boolean))];
    const pm={};
    if(uids.length){const{data:profiles}=await db.from('profiles').select('user_id,username,display_name,avatar_url').in('user_id',uids);if(profiles)profiles.forEach(p=>{pm[p.user_id]=p;});}
    el.innerHTML=posts.map(post=>{
      const u=pm[post.user_id]||{};
      const av=u.avatar_url?'<img src="'+esc(u.avatar_url)+'">':'👤';
      return '<div class="post-card"><div class="post-header"><div class="post-av">'+av+'</div><div><div class="post-name">'+esc(u.display_name||u.username||'User')+'</div><div class="post-time">'+ago(post.created_at)+'</div></div></div>'+(post.text?'<div class="post-text">'+esc(post.text)+'</div>':'')+(post.media_url?'<div class="post-media"><img src="'+esc(post.media_url)+'" onerror="this.style.display=\'none\'"></div>':'')+'<div class="post-actions-bar"><button class="post-action">❤️ '+(post.likes||0)+'</button><button class="post-action">💬 '+(post.comments||0)+'</button></div></div>';
    }).join('');
  } else if(tab==='members'){
    const{data:members}=await db.from('group_members').select('user_id,role,joined_at').eq('group_id',id).order('joined_at').limit(50);
    if(!members||!members.length){el.innerHTML='<div class="empty">No members.</div>';return;}
    const uids=members.map(m=>m.user_id);
    const pm={};if(uids.length){const{data:profiles}=await db.from('profiles').select('user_id,username,display_name,avatar_url').in('user_id',uids);if(profiles)profiles.forEach(p=>{pm[p.user_id]=p;});}
    el.innerHTML=members.map(m=>{
      const u=pm[m.user_id]||{};const av=u.avatar_url?'<img src="'+esc(u.avatar_url)+'">':'👤';
      const roleLabel=m.role==='admin'?'<span class="member-role">⚙️ Admin</span>':m.role==='mod'?'<span class="member-role">🟢 Mod</span>':'';
      return '<div class="member-row"><a href="profile.html?id='+m.user_id+'" style="text-decoration:none;"><div class="member-av">'+av+'</div></a><div class="member-name">'+esc(u.display_name||u.username||'User')+' '+roleLabel+'</div></div>';
    }).join('');
  // ★ FIXED: Real admin tools instead of "coming soon"
  } else if(tab==='admin'){
    el.innerHTML='<div style="padding:.5rem;">'+
      '<h3 style="color:var(--primary);margin-bottom:1rem;">⚙️ Group Admin Tools</h3>'+
      '<div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;">'+
        '<button class="btn btn-ghost btn-sm" onclick="editGroupInfo(\''+id+'\')">✏️ Edit Name/Desc</button>'+
        '<button class="btn btn-sm btn-red" onclick="deleteGroup(\''+id+'\')">🗑️ Delete Group</button>'+
      '</div>'+
      '<div style="border-top:1px solid var(--border);padding-top:.75rem;">'+
        '<h4 style="font-size:.88rem;color:var(--dim);margin-bottom:.5rem;">👥 Member Management</h4>'+
        '<div id="adminMembers">Loading...</div>'+
      '</div></div>';
    loadAdminMembers(id);
  }
}

// ★ NEW: Admin member management
async function loadAdminMembers(groupId){
  var el=document.getElementById('adminMembers');if(!el)return;
  var{data:members}=await db.from('group_members').select('user_id,role').eq('group_id',groupId).limit(50);
  if(!members||!members.length){el.innerHTML='<p style="color:var(--dim);font-size:.82rem;">No members.</p>';return;}
  var uids=members.map(function(m){return m.user_id;});var pm={};
  if(uids.length){var{data:profiles}=await db.from('profiles').select('user_id,username,display_name').in('user_id',uids);if(profiles)profiles.forEach(function(p){pm[p.user_id]=p;});}
  el.innerHTML=members.map(function(m){
    var u=pm[m.user_id]||{};var name=u.display_name||u.username||'User';
    var isMe=currentUser&&m.user_id===currentUser.id;
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;border-bottom:1px solid rgba(124,58,237,.08);font-size:.85rem;">'+
      '<span>'+esc(name)+(m.role==='admin'?' <span style="color:var(--primary);font-size:.68rem;">Admin</span>':'')+'</span>'+
      (!isMe?'<button class="btn btn-sm btn-red" style="font-size:.7rem;padding:.2rem .5rem;" onclick="kickMember(\''+groupId+'\',\''+m.user_id+'\',\''+esc(name).replace(/'/g,'')+'\')">Remove</button>':'')+
    '</div>';
  }).join('');
}

window.kickMember=async function(groupId,userId,name){
  if(!confirm('Remove '+name+' from this group?'))return;
  await db.from('group_members').delete().eq('group_id',groupId).eq('user_id',userId);
  await db.from('groups').update({member_count:Math.max(0,(viewingGroup.member_count||1)-1)}).eq('id',groupId);
  alert('Removed '+name);loadGroupContent(groupId,'admin');
};

window.switchGroupTab=function(tab,btn){
  document.querySelectorAll('.gd-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  if(viewingGroup)loadGroupContent(viewingGroup.id,tab);
};

window.joinGroup=async function(id){
  if(!currentUser)return;
  await db.from('group_members').insert({group_id:id,user_id:currentUser.id,role:'member'});
  await db.from('groups').update({member_count:(viewingGroup.member_count||0)+1}).eq('id',id);
  openGroup(id);
};
window.leaveGroup=async function(id){
  if(!currentUser||!confirm('Leave this group?'))return;
  await db.from('group_members').delete().eq('group_id',id).eq('user_id',currentUser.id);
  await db.from('groups').update({member_count:Math.max(0,(viewingGroup.member_count||1)-1)}).eq('id',id);
  openGroup(id);
};
window.postToGroup=function(id){
  const text=prompt('Write your group post:');if(!text)return;
  const media=prompt('Image URL (optional):');
  db.from('group_posts').insert({group_id:id,user_id:currentUser.id,text:text,media_url:media||null,likes:0,comments:0}).then(({error})=>{
    if(error)alert('Error: '+error.message);
    else{db.from('groups').update({post_count:(viewingGroup.post_count||0)+1}).eq('id',id);loadGroupContent(id,'posts');}
  });
};
window.backToBrowse=function(){document.getElementById('browseView').style.display='block';document.getElementById('groupDetail').style.display='none';viewingGroup=null;};

// ★ FIXED: Edit/delete use existing db variable
window.editGroupInfo=function(id){
  var name=prompt('New group name:',viewingGroup?viewingGroup.name:'');if(!name)return;
  var desc=prompt('New description:',viewingGroup?viewingGroup.description:'');
  db.from('groups').update({name:name,description:desc||null}).eq('id',id).then(function(r){
    if(r.error)alert('Error: '+r.error.message);
    else{alert('✅ Updated!');openGroup(id);}
  });
};
window.deleteGroup=async function(id){
  if(!confirm('Delete this group and all its posts? This cannot be undone.'))return;
  var{error}=await db.from('groups').delete().eq('id',id);
  if(error)alert('Error: '+error.message);
  else{alert('🗑️ Group deleted.');backToBrowse();loadGroups();}
};

window.openCreateGroup=function(){document.getElementById('createModal').classList.add('show');};
window.closeModal=function(){document.getElementById('createModal').classList.remove('show');};
window.createGroup=async function(){
  if(!currentUser){alert('Log in first.');return;}
  const name=document.getElementById('cgName').value.trim();
  if(!name){document.getElementById('cgNotice').textContent='Name required.';return;}
  const btn=document.getElementById('cgBtn');btn.disabled=true;btn.textContent='Creating...';
  try{
    const{data:group,error}=await db.from('groups').insert({
      owner_id:currentUser.id,name:name,privacy:document.getElementById('cgPrivacy').value,
      category:document.getElementById('cgCat').value,description:document.getElementById('cgDesc').value.trim()||null,
      cover_url:document.getElementById('cgCover').value.trim()||null,is_active:true,member_count:1,post_count:0
    }).select().single();
    if(error)throw error;
    await db.from('group_members').insert({group_id:group.id,user_id:currentUser.id,role:'admin'});
    document.getElementById('cgNotice').innerHTML='<span style="color:var(--green);">✅ Group created!</span>';
    setTimeout(()=>{closeModal();loadGroups();},800);
  }catch(e){document.getElementById('cgNotice').innerHTML='<span style="color:#ef4444;">'+e.message+'</span>';}
  btn.disabled=false;btn.textContent='👥 Create Group';
};
document.getElementById('createModal').addEventListener('click',function(e){if(e.target===this)closeModal();});

function ago(d){if(!d)return'';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
