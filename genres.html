<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genres - 8BFR Music Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #7c3aed; --dark: #0b0014; --dark-card: #0c0618; --text: #eae6ff; --text-dim: #a855f7; --border: rgba(124,58,237,.35); --green: #00ff88; --cyan: #00d9ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Work Sans', sans-serif; background: linear-gradient(#0b0014,#000); color: var(--text); min-height: 100vh; padding-bottom: 80px; }
        .header { background: rgba(15,0,30,.9); border-bottom: 2px solid var(--primary); padding: 1.25rem 1.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
        .header h1 { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; color: var(--primary); }
        .header a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .container { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }
        .card { background: var(--dark-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }

        /* Genre Grid */
        .genre-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.75rem; }
        .genre-card { position: relative; border-radius: 14px; overflow: hidden; cursor: pointer; aspect-ratio: 1; display: flex; align-items: flex-end; transition: all 0.3s; border: 2px solid transparent; }
        .genre-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.2); box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .genre-card.active { border-color: var(--primary); box-shadow: 0 0 20px rgba(124,58,237,0.4); }
        .genre-bg { position: absolute; inset: 0; }
        .genre-overlay { position: absolute; inset: 0; background: linear-gradient(transparent 30%, rgba(0,0,0,0.85)); }
        .genre-content { position: relative; z-index: 1; padding: 0.75rem; width: 100%; }
        .genre-emoji { font-size: 1.5rem; margin-bottom: 0.2rem; }
        .genre-name { font-family: 'Bebas Neue', cursive; font-size: 1.1rem; color: white; }
        .genre-count { font-size: 0.7rem; color: rgba(255,255,255,0.6); }

        /* Genre detail view */
        #genreDetail { display: none; }
        .detail-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
        .detail-icon { font-size: 2.5rem; }
        .detail-title { font-family: 'Bebas Neue', cursive; font-size: 2rem; color: var(--primary); }
        .detail-sub { font-size: 0.85rem; color: var(--text-dim); }
        .back-btn { background: rgba(124,58,237,0.2); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s; }
        .back-btn:hover { border-color: var(--primary); }

        /* Song list in genre */
        .song-item { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid rgba(124,58,237,0.1); }
        .song-item:last-child { border: none; }
        .song-num { width: 28px; text-align: center; font-size: 0.85rem; color: var(--text-dim); font-weight: 600; }
        .song-art { width: 44px; height: 44px; border-radius: 8px; background: rgba(124,58,237,0.15); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; overflow: hidden; flex-shrink: 0; }
        .song-art img { width: 100%; height: 100%; object-fit: cover; }
        .song-info { flex: 1; min-width: 0; }
        .song-name { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist-name { font-size: 0.75rem; color: var(--text-dim); }
        .song-play { width: 34px; height: 34px; border-radius: 50%; background: var(--primary); border: none; color: white; cursor: pointer; font-size: 0.85rem; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

        .empty-state { text-align: center; padding: 2rem; color: var(--text-dim); }
        .empty-state .emoji { font-size: 2.5rem; margin-bottom: 0.75rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 500px) {
            .genre-grid { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎶 Genres</h1>
        <a href="feed.html">← Back</a>
    </div>
    <div class="container">

        <!-- GENRE GRID -->
        <div id="genreGrid" class="card">
            <h2 style="font-family:'Bebas Neue',cursive;font-size:1.4rem;color:var(--primary);margin-bottom:1rem;">Browse by Genre</h2>
            <div class="genre-grid" id="genreCards"></div>
        </div>

        <!-- GENRE DETAIL VIEW -->
        <div id="genreDetail" class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
                <div class="detail-header">
                    <div class="detail-icon" id="detailIcon"></div>
                    <div>
                        <div class="detail-title" id="detailTitle"></div>
                        <div class="detail-sub" id="detailSub"></div>
                    </div>
                </div>
                <button class="back-btn" onclick="closeDetail()">← All Genres</button>
            </div>
            <div id="detailSongs"></div>
        </div>
    </div>

    <script src="scripts.js" defer></script>
    <script>
    const SUPABASE_URL = 'https://novbuvwpjnxwwvdekjhr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const genres = [
        { id: 'Hip-Hop', name: 'Hip-Hop', emoji: '🎤', gradient: 'linear-gradient(135deg, #4c1d95, #7c3aed)' },
        { id: 'Rap', name: 'Rap', emoji: '🎤', gradient: 'linear-gradient(135deg, #1e1b4b, #6366f1)' },
        { id: 'Trap', name: 'Trap', emoji: '🔥', gradient: 'linear-gradient(135deg, #991b1b, #ef4444)' },
        { id: 'R&B', name: 'R&B', emoji: '💜', gradient: 'linear-gradient(135deg, #5b21b6, #c084fc)' },
        { id: 'Drill', name: 'Drill', emoji: '🗡️', gradient: 'linear-gradient(135deg, #1e293b, #475569)' },
        { id: 'Boom Bap', name: 'Boom Bap', emoji: '🥁', gradient: 'linear-gradient(135deg, #78350f, #f59e0b)' },
        { id: 'Pop', name: 'Pop', emoji: '✨', gradient: 'linear-gradient(135deg, #9d174d, #f472b6)' },
        { id: 'Rock', name: 'Rock', emoji: '🎸', gradient: 'linear-gradient(135deg, #7f1d1d, #dc2626)' },
        { id: 'Lo-Fi', name: 'Lo-Fi', emoji: '🌙', gradient: 'linear-gradient(135deg, #312e81, #818cf8)' },
        { id: 'Afrobeats', name: 'Afrobeats', emoji: '🌍', gradient: 'linear-gradient(135deg, #14532d, #22c55e)' },
        { id: 'Latin', name: 'Latin', emoji: '💃', gradient: 'linear-gradient(135deg, #9a3412, #fb923c)' },
        { id: 'Country', name: 'Country', emoji: '🤠', gradient: 'linear-gradient(135deg, #713f12, #eab308)' },
        { id: 'EDM', name: 'EDM', emoji: '🎧', gradient: 'linear-gradient(135deg, #164e63, #22d3ee)' },
        { id: 'Jazz', name: 'Jazz', emoji: '🎷', gradient: 'linear-gradient(135deg, #134e4a, #2dd4bf)' },
        { id: 'Soul', name: 'Soul', emoji: '🎹', gradient: 'linear-gradient(135deg, #581c87, #d8b4fe)' },
        { id: 'Reggae', name: 'Reggae', emoji: '🇯🇲', gradient: 'linear-gradient(135deg, #166534, #4ade80)' },
        { id: 'Gospel', name: 'Gospel', emoji: '🙏', gradient: 'linear-gradient(135deg, #78350f, #fcd34d)' },
        { id: 'Rap/Rock', name: 'Rap/Rock', emoji: '🎸', gradient: 'linear-gradient(135deg, #6b21a8, #dc2626)' },
        { id: 'Rap/Metal', name: 'Rap/Metal', emoji: '🤘', gradient: 'linear-gradient(135deg, #18181b, #a855f7)' },
        { id: 'Rap/Country', name: 'Rap/Country', emoji: '🤠', gradient: 'linear-gradient(135deg, #92400e, #7c3aed)' },
        { id: 'Alternative', name: 'Alternative', emoji: '🎵', gradient: 'linear-gradient(135deg, #0f172a, #38bdf8)' },
        { id: 'Indie', name: 'Indie', emoji: '🎶', gradient: 'linear-gradient(135deg, #4c1d95, #a78bfa)' },
        { id: 'Classical', name: 'Classical', emoji: '🎻', gradient: 'linear-gradient(135deg, #1c1917, #d6d3d1)' },
        { id: 'Electronic', name: 'Electronic', emoji: '🔊', gradient: 'linear-gradient(135deg, #0c4a6e, #06b6d4)' },
        { id: 'Other', name: 'Other', emoji: '🌀', gradient: 'linear-gradient(135deg, #334155, #64748b)' }
    ];

    let genreCounts = {};

    async function init() {
        await loadGenreCounts();
        renderGenreGrid();
    }

    async function loadGenreCounts() {
        try {
            var r = await db.from('songs').select('genre').or('is_beat.is.null,is_beat.eq.false');
            if (r.data) {
                r.data.forEach(function(s) {
                    var g = (s.genre || 'Other').trim();
                    // Match to predefined genre (case-insensitive)
                    var matched = genres.find(function(pg) { return pg.id.toLowerCase() === g.toLowerCase(); });
                    var key = matched ? matched.id : 'Other';
                    genreCounts[key] = (genreCounts[key] || 0) + 1;
                });
            }
        } catch(e) {}
    }

    function renderGenreGrid() {
        var grid = document.getElementById('genreCards');
        grid.innerHTML = genres.map(function(g) {
            var safeId = g.id.replace(/[^a-zA-Z0-9]/g, '_');
            var count = genreCounts[g.id] || 0;
            return '<div class="genre-card" onclick="openGenre(\'' + g.id.replace(/'/g, "\\'") + '\')" id="genre-' + safeId + '">' +
                '<div class="genre-bg" style="background:' + g.gradient + ';"></div>' +
                '<div class="genre-overlay"></div>' +
                '<div class="genre-content">' +
                    '<div class="genre-emoji">' + g.emoji + '</div>' +
                    '<div class="genre-name">' + g.name + '</div>' +
                    '<div class="genre-count">' + count + ' songs</div>' +
                '</div></div>';
        }).join('');
    }

    async function openGenre(genreId) {
        var genre = genres.find(function(g) { return g.id === genreId; });
        if (!genre) return;

        var safeId = genreId.replace(/[^a-zA-Z0-9]/g, '_');
        document.querySelectorAll('.genre-card').forEach(function(c) { c.classList.remove('active'); });
        var card = document.getElementById('genre-' + safeId);
        if (card) card.classList.add('active');

        document.getElementById('detailIcon').textContent = genre.emoji;
        document.getElementById('detailTitle').textContent = genre.name;
        document.getElementById('detailSub').textContent = (genreCounts[genreId] || 0) + ' songs';
        document.getElementById('genreDetail').style.display = 'block';
        document.getElementById('genreDetail').scrollIntoView({ behavior: 'smooth', block: 'start' });

        var songsDiv = document.getElementById('detailSongs');
        songsDiv.innerHTML = '<div style="text-align:center;padding:1rem;"><div style="width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;"></div></div>';

        var songs = [];
        try {
            var r = await db.from('songs').select('id,title,artist,cover_art,song_url,play_count,uploaded_by')
                .ilike('genre', genre.name)
                .or('is_beat.is.null,is_beat.eq.false')
                .order('play_count', { ascending: false }).limit(30);
            if (r.data) songs = r.data;
        } catch(e) {}

        if (!songs.length) {
            songsDiv.innerHTML = '<div class="empty-state"><div class="emoji">' + genre.emoji + '</div><p>No ' + genre.name + ' songs uploaded yet.<br>Be the first to upload in this genre!</p></div>';
            return;
        }

        songsDiv.innerHTML = songs.map(function(s, i) {
            var cover = s.cover_art ? '<img src="' + s.cover_art + '" onerror="this.parentNode.textContent=\'🎵\'" alt="">' : '🎵';
            var audio = s.song_url ? '<audio controls preload="metadata" src="' + s.song_url + '" style="width:100%;height:32px;margin-top:6px;"></audio>' : '';
            return '<div class="song-item">' +
                '<div class="song-num">' + (i + 1) + '</div>' +
                '<div class="song-art">' + cover + '</div>' +
                '<div class="song-info">' +
                    '<div class="song-name">' + escHtml(s.title) + '</div>' +
                    '<div class="song-artist-name">' + escHtml(s.artist || 'Unknown') + '</div>' +
                    audio +
                '</div></div>';
        }).join('');
    }

    function closeDetail() {
        document.getElementById('genreDetail').style.display = 'none';
        document.querySelectorAll('.genre-card').forEach(function(c) { c.classList.remove('active'); });
    }

    function escHtml(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
    </script>
<div style="text-align:center;padding:1rem 0;font-size:.72rem;color:rgba(168,85,247,.3);">Copyright 2025-2026 8BFR Music Network</div>
</body>
</html>
