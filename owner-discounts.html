<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Owner Discounts -- 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);--cyan:#00d9ff;--green:#4ade80;--gold:#fbbf24;--danger:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.4rem;color:var(--primary);}
.header a{color:var(--dim);text-decoration:none;font-weight:600;font-size:.85rem;}
.container{max-width:750px;margin:0 auto;padding:1.5rem 1rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;}
.card h2{font-family:'Bebas Neue',cursive;font-size:1.15rem;color:var(--dim);margin-bottom:.6rem;}
.form-group{margin-bottom:.7rem;}
.form-group label{display:block;font-size:.78rem;color:var(--dim);margin-bottom:.25rem;font-weight:600;}
.form-input{width:100%;padding:.55rem .7rem;background:rgba(124,58,237,.08);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;outline:none;font-family:inherit;}
.form-input:focus{border-color:var(--primary);}
select.form-input{appearance:auto;cursor:pointer;}
.row{display:flex;gap:.5rem;flex-wrap:wrap;}
.row .form-group{flex:1;min-width:120px;}
.btn{padding:.6rem 1rem;border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;border:none;transition:all .2s;color:#fff;}
.btn:hover{filter:brightness(1.1);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#a855f7);width:100%;}
.btn-red{background:var(--danger);}
.btn-sm{padding:.35rem .7rem;font-size:.75rem;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1rem;}
.tab{flex:1;text-align:center;padding:.6rem;font-weight:600;font-size:.82rem;cursor:pointer;color:rgba(234,230,255,.5);border:none;border-bottom:2px solid transparent;background:none;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.code-row{background:rgba(0,0,0,.3);border:1px solid rgba(124,58,237,.15);border-radius:10px;padding:.75rem;margin-bottom:.5rem;}
.code-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem;}
.code-name{font-weight:700;font-size:.95rem;font-family:monospace;letter-spacing:.05em;}
.badge{display:inline-block;padding:.15rem .5rem;border-radius:12px;font-size:.65rem;font-weight:700;margin-left:.3rem;}
.badge-free{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3);}
.badge-pct{background:rgba(251,191,36,.15);color:var(--gold);border:1px solid rgba(251,191,36,.3);}
.badge-amt{background:rgba(0,217,255,.15);color:var(--cyan);border:1px solid rgba(0,217,255,.3);}
.badge-type{background:rgba(168,85,247,.15);color:var(--dim);border:1px solid rgba(168,85,247,.3);}
.code-meta{font-size:.72rem;color:rgba(234,230,255,.4);line-height:1.5;}
.grant-row{background:rgba(0,0,0,.3);border:1px solid rgba(74,222,128,.15);border-radius:10px;padding:.75rem;margin-bottom:.5rem;}
.grant-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem;}
.grant-tier{font-weight:700;font-size:.9rem;color:var(--gold);}
.grant-meta{font-size:.72rem;color:rgba(234,230,255,.4);line-height:1.5;}
.empty{text-align:center;padding:2rem;color:var(--dim);font-size:.85rem;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:1rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.msg{padding:.5rem;border-radius:8px;font-size:.8rem;text-align:center;margin-top:.5rem;}
.msg-ok{background:rgba(74,222,128,.08);color:var(--green);border:1px solid rgba(74,222,128,.3);}
.msg-err{background:rgba(239,68,68,.08);color:#fca5a5;border:1px solid rgba(239,68,68,.3);}
.info{font-size:.7rem;color:rgba(234,230,255,.35);line-height:1.4;padding:.4rem .6rem;background:rgba(124,58,237,.04);border-radius:8px;margin-top:.4rem;}
</style>
</head>
<body>
<div class="header">
<a href="owner-panel.html">&larr; Owner Panel</a>
<h1>Owner Discounts</h1>
<div style="width:60px;"></div>
</div>
<div class="container" id="main" style="display:none;">

<div class="tabs">
<button class="tab active" onclick="switchTab('codes',this)">Discount Codes</button>
<button class="tab" onclick="switchTab('grants',this)">Free Subscriptions</button>
</div>

<!-- DISCOUNT CODES TAB -->
<div id="codesTab">
<div class="card">
<h2>Create Discount Code</h2>
<div class="row">
<div class="form-group"><label>Code *</label><input class="form-input" id="dcCode" placeholder="SAVE20" style="text-transform:uppercase;"></div>
<div class="form-group"><label>Item Type</label>
<select class="form-input" id="dcType">
<option value="all">All Items</option>
<option value="song">Songs Only</option>
<option value="beat">Beats Only</option>
<option value="ad">Ads Only</option>
</select></div>
</div>
<div class="row">
<div class="form-group"><label>Discount Type</label>
<select class="form-input" id="dcDiscType" onchange="toggleDiscFields()">
<option value="percent">Percentage Off</option>
<option value="amount">Fixed Amount Off</option>
<option value="free">100% Free</option>
</select></div>
<div class="form-group" id="dcValGroup"><label>Value</label><input class="form-input" id="dcValue" type="number" placeholder="e.g. 20 for 20%"></div>
</div>
<div class="row">
<div class="form-group"><label>Specific Song/Beat (optional)</label>
<select class="form-input" id="dcSongId"><option value="">All items of type</option></select></div>
<div class="form-group"><label>Max Uses (0 = unlimited)</label><input class="form-input" id="dcMaxUses" type="number" value="0"></div>
</div>
<div class="form-group"><label>Expires</label><input class="form-input" id="dcExpires" type="date"></div>
<button class="btn btn-primary" onclick="createCode()">Create Discount Code</button>
<div id="codeMsg"></div>
</div>

<div class="card">
<h2>Active Discount Codes</h2>
<div id="codeList"><div class="spinner"></div></div>
</div>
</div>

<!-- GRANTS TAB -->
<div id="grantsTab" style="display:none;">
<div class="card">
<h2>Grant Free Subscription</h2>
<div class="info" style="margin-bottom:.75rem;color:var(--gold);">Give any user free access to a subscription tier. This bypasses Stripe - no payment needed. Use for promotions, contest winners, or VIP guests.</div>
<div class="form-group"><label>Username or User ID *</label><input class="form-input" id="grUser" placeholder="Username or paste user_id"></div>
<div class="row">
<div class="form-group"><label>Tier *</label>
<select class="form-input" id="grTier">
<option value="vip">VIP ($4.99/mo value)</option>
<option value="pro">Creator Pro ($9.99/mo value)</option>
<option value="elite">Elite ($19.99/mo value)</option>
</select></div>
<div class="form-group"><label>Duration</label>
<select class="form-input" id="grDuration" onchange="toggleForever()">
<option value="7">7 Days</option>
<option value="30">30 Days</option>
<option value="90">90 Days</option>
<option value="365">1 Year</option>
<option value="forever">Forever</option>
</select></div>
</div>
<div class="form-group"><label>Reason (optional)</label><input class="form-input" id="grReason" placeholder="e.g. Contest winner, VIP guest, promo"></div>
<button class="btn btn-primary" onclick="createGrant()">Grant Free Access</button>
<div id="grantMsg"></div>
</div>

<div class="card">
<h2>Active Grants</h2>
<div id="grantList"><div class="spinner"></div></div>
</div>
</div>

</div>

<div id="denied" style="display:none;text-align:center;padding:3rem 1rem;">
<div style="font-size:3rem;margin-bottom:.5rem;">&#x1F512;</div>
<p style="color:var(--dim);">Owner access only.</p>
<a href="index.html" style="color:var(--primary);font-weight:600;">Go Home</a>
</div>

<script src="scripts.js" defer></script>
<script>
var OWNER_ID='cb556180-f032-4b21-9470-1d786f2664ab';
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f');
var currentUser=null;

(async function(){
  var s=await db.auth.getSession();
  if(!s.data.session||s.data.session.user.id!==OWNER_ID){
    document.getElementById('denied').style.display='block';return;
  }
  currentUser=s.data.session.user;
  document.getElementById('main').style.display='block';
  loadSongs();loadCodes();loadGrants();
})();

function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('codesTab').style.display=tab==='codes'?'block':'none';
  document.getElementById('grantsTab').style.display=tab==='grants'?'block':'none';
}

function toggleDiscFields(){
  var v=document.getElementById('dcDiscType').value;
  document.getElementById('dcValGroup').style.display=v==='free'?'none':'block';
}

function toggleForever(){
  // nothing extra needed, handled in createGrant
}

function showMsg(id,text,ok){
  var el=document.getElementById(id);
  el.className='msg '+(ok?'msg-ok':'msg-err');
  el.textContent=text;
  setTimeout(function(){el.textContent='';el.className='';},4000);
}

async function loadSongs(){
  var sel=document.getElementById('dcSongId');
  try{
    var r=await db.from('songs').select('id,title,is_beat').eq('uploaded_by',OWNER_ID).order('created_at',{ascending:false});
    var songs=r.data||[];
    songs.forEach(function(s){
      var opt=document.createElement('option');
      opt.value=s.id;
      opt.textContent=(s.is_beat?'[BEAT] ':'')+s.title;
      sel.appendChild(opt);
    });
  }catch(e){}
}

async function createCode(){
  var code=(document.getElementById('dcCode').value||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(!code){showMsg('codeMsg','Enter a code name','');return;}
  var itemType=document.getElementById('dcType').value;
  var discType=document.getElementById('dcDiscType').value;
  var value=discType==='free'?100:parseFloat(document.getElementById('dcValue').value)||0;
  var songId=document.getElementById('dcSongId').value||null;
  var maxUses=parseInt(document.getElementById('dcMaxUses').value)||0;
  var expires=document.getElementById('dcExpires').value||null;

  if(discType!=='free'&&value<=0){showMsg('codeMsg','Enter a discount value','');return;}

  var row={
    code:code,
    discount_type:discType==='free'?'free':discType,
    discount_value:discType==='percent'?value:null,
    discount_amount:discType==='amount'?value:null,
    song_id:songId,
    item_type:itemType,
    max_uses:maxUses>0?maxUses:null,
    expires_at:expires?new Date(expires).toISOString():null,
    owner_id:OWNER_ID,
    uses:0,
    active:true
  };

  try{
    var r=await db.from('song_discount_codes').insert(row);
    if(r.error)throw r.error;
    showMsg('codeMsg','Code '+code+' created!',true);
    document.getElementById('dcCode').value='';
    loadCodes();
  }catch(e){showMsg('codeMsg','Error: '+e.message,'');}
}

async function loadCodes(){
  var el=document.getElementById('codeList');
  try{
    var r=await db.from('song_discount_codes').select('*').eq('owner_id',OWNER_ID).order('created_at',{ascending:false});
    var codes=r.data||[];
    if(!codes.length){el.innerHTML='<div class="empty">No discount codes yet.</div>';return;}
    el.innerHTML=codes.map(function(c){
      var typeBadge='<span class="badge badge-type">'+c.item_type+'</span>';
      var discBadge='';
      if(c.discount_type==='free')discBadge='<span class="badge badge-free">FREE</span>';
      else if(c.discount_type==='percent')discBadge='<span class="badge badge-pct">'+c.discount_value+'% OFF</span>';
      else if(c.discount_type==='amount')discBadge='<span class="badge badge-amt">$'+c.discount_amount+' OFF</span>';
      var uses=c.uses||0;
      var maxU=c.max_uses?'/'+c.max_uses:'';
      var exp=c.expires_at?new Date(c.expires_at).toLocaleDateString():'Never';
      var active=c.active!==false;
      return '<div class="code-row'+(active?'':' style="opacity:.5;"')+'">'+
        '<div class="code-header"><div><span class="code-name">'+c.code+'</span>'+typeBadge+discBadge+'</div>'+
        '<button class="btn btn-red btn-sm" onclick="deleteCode(\''+c.id+'\')">Delete</button></div>'+
        '<div class="code-meta">Uses: '+uses+maxU+' | Expires: '+exp+(c.song_id?' | Specific item':'')+'</div></div>';
    }).join('');
  }catch(e){el.innerHTML='<div class="empty" style="color:var(--danger);">Error: '+e.message+'</div>';}
}

async function deleteCode(id){
  if(!confirm('Delete this discount code?'))return;
  try{
    await db.from('song_discount_codes').delete().eq('id',id);
    loadCodes();
  }catch(e){alert('Error: '+e.message);}
}

async function createGrant(){
  var userInput=(document.getElementById('grUser').value||'').trim();
  if(!userInput){showMsg('grantMsg','Enter a username or user ID','');return;}
  var tier=document.getElementById('grTier').value;
  var dur=document.getElementById('grDuration').value;
  var reason=document.getElementById('grReason').value.trim();

  // Resolve username to user_id
  var userId=userInput;
  if(userInput.length<30){
    try{
      var r=await db.from('profiles').select('user_id').ilike('username',userInput).single();
      if(r.data)userId=r.data.user_id;
      else{showMsg('grantMsg','User "'+userInput+'" not found','');return;}
    }catch(e){showMsg('grantMsg','User not found','');return;}
  }

  var isForever=dur==='forever';
  var expiresAt=null;
  if(!isForever){
    var days=parseInt(dur)||30;
    expiresAt=new Date(Date.now()+days*86400000).toISOString();
  }

  try{
    var r=await db.from('subscription_grants').insert({
      user_id:userId,
      tier:tier,
      granted_by:OWNER_ID,
      reason:reason||null,
      expires_at:expiresAt,
      is_forever:isForever,
      active:true
    });
    if(r.error)throw r.error;

    // Also update profile subscription_tier
    await db.from('profiles').update({subscription_tier:tier}).eq('user_id',userId);

    // Notify the user
    try{
      var tierNames={vip:'VIP',pro:'Creator Pro',elite:'Elite'};
      var durText=isForever?'forever':dur+' days';
      await db.from('notifications').insert({
        recipient_id:userId,
        notif_type:'system',
        metadata:{
          message:'You have been granted free '+tierNames[tier]+' access for '+durText+'!'+(reason?' Reason: '+reason:''),
          link:'upgrades.html'
        }
      });
    }catch(e){}

    showMsg('grantMsg','Granted '+tier.toUpperCase()+' to user!',true);
    document.getElementById('grUser').value='';
    document.getElementById('grReason').value='';
    loadGrants();
  }catch(e){showMsg('grantMsg','Error: '+e.message,'');}
}

async function loadGrants(){
  var el=document.getElementById('grantList');
  try{
    var r=await db.from('subscription_grants').select('*').eq('granted_by',OWNER_ID).order('created_at',{ascending:false});
    var grants=r.data||[];
    if(!grants.length){el.innerHTML='<div class="empty">No grants yet.</div>';return;}

    // Get usernames
    var uids=grants.map(function(g){return g.user_id;});
    var pr=await db.from('profiles').select('user_id,username,display_name').in('user_id',uids);
    var nameMap={};
    (pr.data||[]).forEach(function(p){nameMap[p.user_id]=p.display_name||p.username||'Unknown';});

    var tierNames={vip:'VIP',pro:'Creator Pro',elite:'Elite'};

    el.innerHTML=grants.map(function(g){
      var name=nameMap[g.user_id]||g.user_id.substring(0,8);
      var exp=g.is_forever?'Forever':g.expires_at?new Date(g.expires_at).toLocaleDateString():'Unknown';
      var isExpired=!g.is_forever&&g.expires_at&&new Date(g.expires_at)<new Date();
      var status=!g.active?'Revoked':isExpired?'Expired':'Active';
      var statusColor=status==='Active'?'var(--green)':status==='Expired'?'var(--gold)':'var(--danger)';
      return '<div class="grant-row">'+
        '<div class="grant-header"><div><span class="grant-tier">'+(tierNames[g.tier]||g.tier)+'</span>'+
        '<span style="font-size:.75rem;color:'+statusColor+';margin-left:.4rem;font-weight:600;">'+status+'</span></div>'+
        '<button class="btn btn-red btn-sm" onclick="revokeGrant(\''+g.id+'\',\''+g.user_id+'\')">Revoke</button></div>'+
        '<div class="grant-meta">User: '+name+' | Expires: '+exp+(g.reason?' | '+g.reason:'')+'</div></div>';
    }).join('');
  }catch(e){el.innerHTML='<div class="empty" style="color:var(--danger);">Error: '+e.message+'</div>';}
}

async function revokeGrant(id,userId){
  if(!confirm('Revoke this grant?'))return;
  try{
    await db.from('subscription_grants').update({active:false}).eq('id',id);
    await db.from('profiles').update({subscription_tier:'free'}).eq('user_id',userId);
    loadGrants();
  }catch(e){alert('Error: '+e.message);}
}
</script>
</body>
</html>
