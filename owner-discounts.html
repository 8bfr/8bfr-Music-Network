<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎁 Discounts & Grants — 8BFR Owner</title>
<link rel="icon" href="assets/images/favicon.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',system-ui,sans-serif;background:linear-gradient(#0b0014,#000);color:#eae6ff;min-height:100vh;padding-bottom:100px;}
.hdr{background:rgba(15,0,30,0.95);border-bottom:1px solid rgba(124,58,237,0.5);padding:1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);}
.hdr a{color:#a855f7;text-decoration:none;font-weight:600;font-size:0.95rem;}
.hdr h1{font-family:'Bebas Neue',cursive;font-size:1.45rem;color:#eae6ff;letter-spacing:1px;}
.main{max-width:900px;margin:1.25rem auto;padding:0 1rem;}
.banner{background:linear-gradient(135deg,rgba(6,182,212,0.12),rgba(124,58,237,0.15));border:1px solid rgba(124,58,237,0.4);border-radius:16px;padding:1.15rem 1.4rem;margin-bottom:1rem;}
.banner h2{font-family:'Bebas Neue',cursive;font-size:1.75rem;color:#fff;letter-spacing:1.5px;margin-bottom:.25rem;}
.banner p{color:rgba(234,230,255,0.85);font-size:0.88rem;line-height:1.5;}
.tabs{display:flex;gap:.4rem;margin-bottom:1rem;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:.55rem 1rem;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.35);border-radius:10px;color:#eae6ff;font-size:0.85rem;font-weight:700;cursor:pointer;white-space:nowrap;}
.tab.active{background:#7c3aed;border-color:#7c3aed;color:#fff;}
.card{background:rgba(12,6,24,0.85);border:1px solid rgba(124,58,237,0.35);border-radius:14px;padding:1.2rem;margin-bottom:1rem;}
.card h2{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:#a855f7;letter-spacing:1px;margin-bottom:.8rem;}
.field{margin-bottom:.85rem;}
.field label{display:block;font-size:0.82rem;font-weight:700;color:#a855f7;margin-bottom:.35rem;}
.field input,.field select,.field textarea{width:100%;padding:.65rem .85rem;background:rgba(0,0,0,0.4);border:1px solid rgba(124,58,237,0.35);border-radius:10px;color:#eae6ff;font-size:0.92rem;outline:none;font-family:inherit;}
.field input:focus,.field select:focus{border-color:#a855f7;}
.hint{font-size:0.75rem;color:rgba(234,230,255,0.55);margin-top:.3rem;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.btn{background:#7c3aed;color:#fff;border:none;padding:.7rem 1.2rem;border-radius:10px;font-weight:800;font-size:0.92rem;cursor:pointer;font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:.4rem;}
.btn:hover{background:#6d28d9;}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.btn-ghost{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.4);color:#eae6ff;}
.btn-sm{padding:.35rem .75rem;font-size:0.75rem;width:auto;}
.user-search-wrap{position:relative;}
.user-results{position:absolute;top:100%;left:0;right:0;background:#1a0b2e;border:1px solid rgba(124,58,237,0.5);border-radius:8px;margin-top:.2rem;max-height:220px;overflow-y:auto;z-index:10;display:none;}
.user-results.show{display:block;}
.user-row{padding:.55rem .85rem;display:flex;align-items:center;gap:.6rem;cursor:pointer;border-bottom:1px solid rgba(124,58,237,0.15);}
.user-row:hover{background:rgba(124,58,237,0.15);}
.user-row img{width:28px;height:28px;border-radius:50%;object-fit:cover;background:#333;}
.user-row .u-name{font-weight:700;font-size:0.88rem;}
.user-row .u-sub{font-size:0.7rem;color:rgba(234,230,255,0.55);}
.picked-user{background:linear-gradient(135deg,rgba(124,58,237,0.18),rgba(6,182,212,0.1));border:1px solid rgba(124,58,237,0.5);padding:.7rem .9rem;border-radius:10px;display:flex;align-items:center;gap:.65rem;margin-bottom:.85rem;}
.picked-user img{width:38px;height:38px;border-radius:50%;object-fit:cover;background:#333;}
.picked-user .clear{margin-left:auto;background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.35);color:#fca5a5;padding:.3rem .7rem;border-radius:6px;cursor:pointer;font-size:0.75rem;font-weight:700;}
.grant-type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.4rem;margin-bottom:.85rem;}
.grant-type{padding:.55rem .4rem;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.3);border-radius:8px;cursor:pointer;text-align:center;transition:all 0.15s;}
.grant-type:hover{background:rgba(124,58,237,0.2);}
.grant-type.selected{background:#7c3aed;border-color:#7c3aed;}
.grant-type .icon{font-size:1.5rem;display:block;margin-bottom:.2rem;}
.grant-type .label{font-size:0.72rem;font-weight:700;}
.grant-config{display:none;background:rgba(0,0,0,0.3);padding:.85rem;border-radius:10px;margin-bottom:.85rem;border:1px solid rgba(124,58,237,0.2);}
.grant-config.show{display:block;}
.grant-list{display:grid;gap:.55rem;}
.grant-item{background:rgba(0,0,0,0.35);border:1px solid rgba(124,58,237,0.25);border-radius:10px;padding:.75rem .95rem;}
.grant-item.inactive{opacity:0.55;}
.grant-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.3rem;margin-bottom:.3rem;}
.grant-title{font-weight:800;font-size:0.95rem;}
.grant-badge{font-size:0.7rem;padding:.2rem .55rem;border-radius:999px;font-weight:700;}
.badge-active{background:rgba(52,211,153,0.18);color:#4ade80;border:1px solid rgba(52,211,153,0.35);}
.badge-expired{background:rgba(168,85,247,0.18);color:#c4b5fd;border:1px solid rgba(168,85,247,0.3);}
.badge-forever{background:rgba(251,191,36,0.18);color:#fcd34d;border:1px solid rgba(251,191,36,0.3);}
.grant-meta{font-size:0.78rem;color:rgba(234,230,255,0.7);}
.grant-actions{display:flex;gap:.4rem;margin-top:.5rem;}
.grant-actions button{padding:.3rem .65rem;font-size:0.72rem;border-radius:6px;border:1px solid rgba(124,58,237,0.4);background:rgba(124,58,237,0.15);color:#eae6ff;cursor:pointer;font-weight:700;}
.grant-actions .revoke{border-color:rgba(239,68,68,0.4);color:#fca5a5;}
.empty{text-align:center;padding:2rem 1rem;color:rgba(168,85,247,0.6);font-size:0.85rem;}
.msg-err{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);color:#fca5a5;padding:.65rem 1rem;border-radius:8px;font-size:0.85rem;margin-top:.5rem;}
.msg-ok{background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.35);color:#4ade80;padding:.55rem .9rem;border-radius:8px;font-size:0.82rem;margin-top:.5rem;}
.song-item{background:rgba(0,0,0,0.35);border:1px solid rgba(124,58,237,0.25);border-radius:10px;padding:.7rem .9rem;display:flex;gap:.6rem;align-items:center;}
.song-item img{width:52px;height:52px;border-radius:8px;object-fit:cover;background:#333;flex-shrink:0;}
.song-info{flex:1;min-width:0;}
.song-title{font-weight:700;font-size:0.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.song-price{font-size:0.78rem;color:#fcd34d;font-weight:700;}
.song-price s{color:rgba(234,230,255,0.5);margin-left:.35rem;}
.song-actions{display:flex;gap:.3rem;flex-wrap:wrap;}
.deny{padding:2rem;text-align:center;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;color:#fca5a5;}
.panel-migrate{background:linear-gradient(135deg,rgba(251,191,36,0.08),rgba(236,72,153,0.08));border:1px solid rgba(251,191,36,0.25);border-radius:10px;padding:.85rem 1.1rem;margin-top:1rem;font-size:0.85rem;line-height:1.5;}
.panel-migrate strong{color:#fcd34d;}
</style>
</head>
<body>

<div class="hdr">
  <a href="owner-studio.html">← Owner Studio</a>
  <h1>🎁 Discounts & Grants</h1>
  <div style="width:80px;"></div>
</div>

<main class="main" id="mainContent">
  <div class="empty">Loading...</div>
</main>

<script>
var SUPABASE_URL = 'https://novbuvwpjnxwwvdekjhr.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0';
var OWNER_ID = 'cb556180-f032-4b21-9470-1d786f2664ab';
var sb = null, currentUser = null;
var pickedUser = null;
var selectedGrantType = null;
var userSearchTimer = null;

async function init(){
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  var { data } = await sb.auth.getUser();
  currentUser = (data && data.user) || null;

  if (!currentUser || currentUser.id !== OWNER_ID) {
    document.getElementById('mainContent').innerHTML = '<div class="deny">🚫 Owner access only. Sign in as the site owner to manage discounts.</div>';
    return;
  }

  renderApp();
}

function renderApp() {
  document.getElementById('mainContent').innerHTML =
    '<div class="banner">' +
    '<h2>Discounts & Grants</h2>' +
    '<p>Directly grant plans, coins, verified checkmarks, algorithm boosts, or free content to any user. Discount your own songs/beats with one click.</p>' +
    '</div>' +
    '<div class="tabs">' +
    '<div class="tab active" data-t="grant" onclick="switchTab(this)">➕ Grant to User</div>' +
    '<div class="tab" data-t="active" onclick="switchTab(this)">📋 Active Grants</div>' +
    '<div class="tab" data-t="mysongs" onclick="switchTab(this)">🎵 My Songs/Beats</div>' +
    '</div>' +
    '<div id="panel-grant"></div>' +
    '<div id="panel-active" style="display:none;"></div>' +
    '<div id="panel-mysongs" style="display:none;"></div>';

  renderGrantPanel();
}

window.switchTab = function(el) {
  var t = el.dataset.t;
  document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
  el.classList.add('active');
  document.querySelectorAll('[id^=panel-]').forEach(function(p){ p.style.display = 'none'; });
  document.getElementById('panel-' + t).style.display = 'block';
  if (t === 'active') loadActiveGrants();
  else if (t === 'mysongs') loadMySongs();
};

// ═══════════════════════════════════════════════════════════════════
// TAB 1: Grant to User
// ═══════════════════════════════════════════════════════════════════

function renderGrantPanel() {
  document.getElementById('panel-grant').innerHTML =
    '<div class="card">' +
    '<h2>Step 1: Pick what to grant</h2>' +
    '<div class="grant-type-grid">' +
    '<div class="grant-type" data-t="plan" onclick="pickGrantType(this)"><span class="icon">⭐</span><div class="label">Subscription Plan</div></div>' +
    '<div class="grant-type" data-t="coins" onclick="pickGrantType(this)"><span class="icon">🪙</span><div class="label">Coins</div></div>' +
    '<div class="grant-type" data-t="verified_artist" onclick="pickGrantType(this)"><span class="icon">✅</span><div class="label">Verified Artist</div></div>' +
    '<div class="grant-type" data-t="verified_beatmaker" onclick="pickGrantType(this)"><span class="icon">✅</span><div class="label">Verified Beatmaker</div></div>' +
    '<div class="grant-type" data-t="algorithm_boost" onclick="pickGrantType(this)"><span class="icon">🚀</span><div class="label">Algorithm Boost</div></div>' +
    '<div class="grant-type" data-t="custom_badge" onclick="pickGrantType(this)"><span class="icon">🏆</span><div class="label">Custom Badge</div></div>' +
    '</div>' +
    '<div id="grantConfig"></div>' +
    '</div>' +

    '<div class="card" id="userPickerCard" style="display:none;">' +
    '<h2>Step 2: Pick a user</h2>' +
    '<div id="userHint" class="hint" style="margin-bottom:.6rem;"></div>' +
    '<div class="field">' +
    '<label>Quick pick (relevant users)</label>' +
    '<select id="userDropdown" onchange="selectFromDropdown(this)">' +
    '<option value="">Loading...</option>' +
    '</select>' +
    '</div>' +
    '<div style="text-align:center;font-size:0.78rem;color:rgba(234,230,255,0.45);margin:.4rem 0;">— or —</div>' +
    '<div class="field user-search-wrap">' +
    '<label>Search any user</label>' +
    '<input type="text" id="userSearch" placeholder="Search by username or display name..." oninput="onUserSearch()" autocomplete="off">' +
    '<div class="user-results" id="userResults"></div>' +
    '</div>' +
    '<div id="pickedUserBox"></div>' +
    '</div>' +

    '<div class="card" id="finalStepCard" style="display:none;">' +
    '<h2>Step 3: Optional settings</h2>' +
    '<div class="row">' +
    '<div class="field">' +
    '<label>Duration</label>' +
    '<select id="duration">' +
    '<option value="">Forever</option>' +
    '<option value="1">1 day</option>' +
    '<option value="7">7 days</option>' +
    '<option value="14">14 days</option>' +
    '<option value="30">30 days</option>' +
    '<option value="90">90 days</option>' +
    '<option value="365">1 year</option>' +
    '</select>' +
    '<div class="hint">Auto-revokes when expired (if cron enabled)</div>' +
    '</div>' +
    '<div class="field">' +
    '<label>Reason / note (optional)</label>' +
    '<input type="text" id="reason" placeholder="e.g. Contest winner, gift, early member">' +
    '</div>' +
    '</div>' +
    '<button class="btn" onclick="createGrant()">🎁 Grant to User</button>' +
    '<div id="grantMsg"></div>' +
    '</div>';

  renderPickedUser();
}

function renderPickedUser() {
  var box = document.getElementById('pickedUserBox');
  if (!box) return;
  if (!pickedUser) { box.innerHTML = ''; return; }
  box.innerHTML =
    '<div class="picked-user">' +
    '<img src="' + (pickedUser.avatar_url || pickedUser.profile_photo_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(pickedUser.username || 'U') + '&background=7c3aed&color=fff') + '" alt="">' +
    '<div><div style="font-weight:800;font-size:0.95rem;">' + escapeHtml(pickedUser.display_name || pickedUser.username || 'Unknown') + '</div>' +
    '<div style="font-size:0.75rem;color:rgba(234,230,255,0.65);">@' + escapeHtml(pickedUser.username || '') +
    (pickedUser.subscription_tier ? ' · ' + escapeHtml(pickedUser.subscription_tier) : '') +
    (pickedUser.coins != null ? ' · ' + pickedUser.coins + ' coins' : '') +
    '</div></div>' +
    '<button class="clear" onclick="clearPickedUser()">✕ Clear</button>' +
    '</div>';
}

window.clearPickedUser = function() {
  pickedUser = null;
  document.getElementById('userSearch').value = '';
  renderPickedUser();
};

window.onUserSearch = function() {
  clearTimeout(userSearchTimer);
  var q = document.getElementById('userSearch').value.trim();
  if (q.length < 2) {
    document.getElementById('userResults').classList.remove('show');
    return;
  }
  userSearchTimer = setTimeout(function(){ doUserSearch(q); }, 300);
};

async function doUserSearch(q) {
  try {
    // Search by username OR display_name, case-insensitive
    var { data, error } = await sb
      .from('profiles')
      .select('user_id,username,display_name,avatar_url,profile_photo_url,subscription_tier,coins,verified_artist')
      .or('username.ilike.%' + q + '%,display_name.ilike.%' + q + '%')
      .limit(8);
    if (error) throw error;

    var results = document.getElementById('userResults');
    if (!data || !data.length) {
      results.innerHTML = '<div style="padding:.7rem 1rem;color:rgba(234,230,255,0.5);font-size:0.85rem;">No users found</div>';
      results.classList.add('show');
      return;
    }

    var html = '';
    data.forEach(function(u){
      var avatar = u.avatar_url || u.profile_photo_url ||
        'https://ui-avatars.com/api/?name=' + encodeURIComponent(u.username || 'U') + '&background=7c3aed&color=fff';
      var attrs = JSON.stringify(u).replace(/"/g,'&quot;');
      html += '<div class="user-row" data-u="' + attrs + '" onclick="selectUser(this)">' +
        '<img src="' + avatar + '" alt="">' +
        '<div><div class="u-name">' + escapeHtml(u.display_name || u.username) + '</div>' +
        '<div class="u-sub">@' + escapeHtml(u.username || '') + (u.subscription_tier ? ' · ' + u.subscription_tier : '') + '</div>' +
        '</div></div>';
    });
    results.innerHTML = html;
    results.classList.add('show');
  } catch(e) {
    console.error(e);
  }
}

window.selectUser = function(el) {
  try {
    pickedUser = JSON.parse(el.dataset.u.replace(/&quot;/g,'"'));
  } catch(e) { return; }
  document.getElementById('userResults').classList.remove('show');
  document.getElementById('userSearch').value = '';
  renderPickedUser();
};

window.pickGrantType = function(el) {
  document.querySelectorAll('.grant-type').forEach(function(x){ x.classList.remove('selected'); });
  el.classList.add('selected');
  selectedGrantType = el.dataset.t;
  renderGrantConfig();

  // Reveal step 2 (user picker) and step 3 (settings)
  document.getElementById('userPickerCard').style.display = 'block';
  document.getElementById('finalStepCard').style.display = 'block';

  // Clear any picked user since the type changed
  pickedUser = null;
  renderPickedUser();

  // Load the filtered dropdown for this grant type
  loadFilteredUserDropdown(selectedGrantType);
};

async function loadFilteredUserDropdown(grantType) {
  var dropdown = document.getElementById('userDropdown');
  var hint = document.getElementById('userHint');
  if (!dropdown) return;

  dropdown.innerHTML = '<option value="">Loading...</option>';

  // Decide the filter + hint text for this grant type
  var hintText = '';
  var users = [];

  try {
    if (grantType === 'plan') {
      hintText = '✨ Showing all active users (sorted by most recent activity)';
      var { data } = await sb.from('profiles')
        .select('user_id,username,display_name,avatar_url,profile_photo_url,subscription_tier,coins')
        .eq('is_active', true)
        .neq('user_id', OWNER_ID)
        .order('created_at', { ascending: false })
        .limit(100);
      users = data || [];

    } else if (grantType === 'coins') {
      hintText = '🪙 Showing all active users';
      var { data } = await sb.from('profiles')
        .select('user_id,username,display_name,avatar_url,profile_photo_url,coins,subscription_tier')
        .eq('is_active', true)
        .neq('user_id', OWNER_ID)
        .order('created_at', { ascending: false })
        .limit(100);
      users = data || [];

    } else if (grantType === 'verified_artist') {
      hintText = '🎵 Showing users who uploaded songs but aren\'t verified yet';
      // Get all users with songs that aren't beats, who aren't owner, not already verified
      var { data: songs } = await sb.from('songs')
        .select('uploaded_by')
        .eq('is_beat', false)
        .eq('hidden', false);
      var uploaderIds = [...new Set((songs || []).map(function(s){ return s.uploaded_by; }).filter(Boolean))];
      if (uploaderIds.length) {
        var { data } = await sb.from('profiles')
          .select('user_id,username,display_name,avatar_url,profile_photo_url,subscription_tier,verified_artist,has_artist_checkmark')
          .in('user_id', uploaderIds)
          .eq('verified_artist', false)
          .neq('user_id', OWNER_ID)
          .limit(100);
        users = data || [];
      }

    } else if (grantType === 'verified_beatmaker') {
      hintText = '🥁 Showing users who uploaded beats but aren\'t verified yet';
      var { data: beats } = await sb.from('songs')
        .select('uploaded_by')
        .eq('is_beat', true)
        .eq('hidden', false);
      var beatmakerIds = [...new Set((beats || []).map(function(s){ return s.uploaded_by; }).filter(Boolean))];
      if (beatmakerIds.length) {
        var { data } = await sb.from('profiles')
          .select('user_id,username,display_name,avatar_url,profile_photo_url,subscription_tier,has_artist_checkmark')
          .in('user_id', beatmakerIds)
          .eq('has_artist_checkmark', false)
          .neq('user_id', OWNER_ID)
          .limit(100);
        users = data || [];
      }

    } else if (grantType === 'algorithm_boost') {
      hintText = '🚀 Showing artists & beatmakers (users who upload content)';
      var { data: uploaders } = await sb.from('songs')
        .select('uploaded_by')
        .eq('hidden', false);
      var uploaderIds = [...new Set((uploaders || []).map(function(s){ return s.uploaded_by; }).filter(Boolean))];
      if (uploaderIds.length) {
        var { data } = await sb.from('profiles')
          .select('user_id,username,display_name,avatar_url,profile_photo_url,algorithm_tier,subscription_tier')
          .in('user_id', uploaderIds)
          .neq('user_id', OWNER_ID)
          .limit(100);
        users = data || [];
      }

    } else if (grantType === 'custom_badge') {
      hintText = '🏆 Showing all active users (badges can go to anyone)';
      var { data } = await sb.from('profiles')
        .select('user_id,username,display_name,avatar_url,profile_photo_url,subscription_tier,badges')
        .eq('is_active', true)
        .neq('user_id', OWNER_ID)
        .order('created_at', { ascending: false })
        .limit(100);
      users = data || [];
    }

    hint.textContent = hintText;

    if (!users.length) {
      dropdown.innerHTML = '<option value="">No relevant users found — use search below</option>';
      return;
    }

    // Build options
    var html = '<option value="">Select a user...</option>';
    // Cache the users by id for quick lookup on select
    window._dropdownUsers = {};
    users.forEach(function(u){
      window._dropdownUsers[u.user_id] = u;
      var label = (u.display_name || u.username || 'Unknown') + ' (@' + (u.username || '') + ')';
      if (u.subscription_tier && u.subscription_tier !== 'free') label += ' · ' + u.subscription_tier;
      html += '<option value="' + u.user_id + '">' + escapeHtml(label) + '</option>';
    });
    dropdown.innerHTML = html;

  } catch(e) {
    console.error('loadFilteredUserDropdown:', e);
    dropdown.innerHTML = '<option value="">Error loading users</option>';
    hint.textContent = 'Error: ' + e.message;
  }
}

window.selectFromDropdown = function(el) {
  var userId = el.value;
  if (!userId) { return; }
  var u = (window._dropdownUsers || {})[userId];
  if (!u) return;
  pickedUser = u;
  renderPickedUser();
  // Clear search field too
  var searchField = document.getElementById('userSearch');
  if (searchField) searchField.value = '';
};

function renderGrantConfig() {
  var box = document.getElementById('grantConfig');
  if (!box) return;
  var html = '<div class="grant-config show">';

  if (selectedGrantType === 'plan') {
    html += '<div class="field"><label>Plan to grant</label>' +
      '<select id="cfgValue">' +
      '<option value="vip">VIP ($4.99/mo value)</option>' +
      '<option value="creator_pro">Creator Pro ($9.99/mo value)</option>' +
      '<option value="elite">Elite ($19.99/mo value)</option>' +
      '<option value="artist_pro">Artist Pro</option>' +
      '</select></div>';
  } else if (selectedGrantType === 'coins') {
    html += '<div class="field"><label>Number of coins</label>' +
      '<input type="number" id="cfgQty" value="100" min="1"></div>';
  } else if (selectedGrantType === 'verified_artist' || selectedGrantType === 'verified_beatmaker') {
    html += '<div style="color:#4ade80;font-size:0.85rem;">✓ This will turn on the verified checkmark for the user.</div>';
  } else if (selectedGrantType === 'algorithm_boost') {
    html += '<div class="field"><label>Boost level</label>' +
      '<select id="cfgValue">' +
      '<option value="boosted">Boosted (2x visibility)</option>' +
      '<option value="featured">Featured (5x visibility)</option>' +
      '<option value="spotlight">Spotlight (10x + pinned)</option>' +
      '</select></div>';
  } else if (selectedGrantType === 'custom_badge') {
    html += '<div class="field"><label>Badge name</label>' +
      '<input type="text" id="cfgValue" placeholder="e.g. founding_member, contest_winner"></div>' +
      '<div class="hint">Uses the badges system. Pick a unique key for this badge type.</div>';
  }
  html += '</div>';
  box.innerHTML = html;
}

window.createGrant = async function() {
  if (!pickedUser) { showMsg('Pick a user first', 'err', 'grantMsg'); return; }
  if (!selectedGrantType) { showMsg('Pick what to grant', 'err', 'grantMsg'); return; }

  var grantValue = null, grantQty = null;
  if (selectedGrantType === 'plan' || selectedGrantType === 'algorithm_boost' || selectedGrantType === 'custom_badge') {
    var cv = document.getElementById('cfgValue');
    if (!cv || !cv.value) { showMsg('Pick a value', 'err', 'grantMsg'); return; }
    grantValue = cv.value;
  } else if (selectedGrantType === 'coins') {
    var cq = document.getElementById('cfgQty');
    if (!cq || !cq.value || parseInt(cq.value) <= 0) { showMsg('Enter coin amount', 'err', 'grantMsg'); return; }
    grantQty = parseInt(cq.value);
  }

  var dur = document.getElementById('duration').value;
  var expiresAt = dur ? new Date(Date.now() + parseInt(dur) * 86400000).toISOString() : null;
  var reason = document.getElementById('reason').value.trim();

  try {
    // Insert grant row
    var { data, error } = await sb.from('grants').insert([{
      user_id: pickedUser.user_id,
      grant_type: selectedGrantType,
      grant_value: grantValue,
      grant_quantity: grantQty,
      expires_at: expiresAt,
      granted_by: currentUser.id,
      reason: reason || null
    }]).select();
    if (error) throw error;

    // Apply the grant (updates profile)
    var grantId = data[0].id;
    var { data: applyResult, error: applyErr } = await sb.rpc('apply_grant', { p_grant_id: grantId });
    if (applyErr) throw applyErr;

    showMsg('✓ Granted to @' + (pickedUser.username || 'user') + '!', 'ok', 'grantMsg');

    // Reset form
    setTimeout(function(){
      clearPickedUser();
      selectedGrantType = null;
      document.querySelectorAll('.grant-type').forEach(function(x){ x.classList.remove('selected'); });
      document.getElementById('grantConfig').innerHTML = '';
      document.getElementById('reason').value = '';
      document.getElementById('grantMsg').innerHTML = '';
      document.getElementById('userPickerCard').style.display = 'none';
      document.getElementById('finalStepCard').style.display = 'none';
    }, 2000);
  } catch(e) {
    showMsg('Failed: ' + e.message, 'err', 'grantMsg');
  }
};

// ═══════════════════════════════════════════════════════════════════
// TAB 2: Active Grants
// ═══════════════════════════════════════════════════════════════════

async function loadActiveGrants() {
  document.getElementById('panel-active').innerHTML = '<div class="card"><div class="empty">Loading grants...</div></div>';
  try {
    var { data, error } = await sb
      .from('grants')
      .select('*,profile:profiles!grants_user_id_fkey(user_id,username,display_name,avatar_url,profile_photo_url)')
      .eq('active', true)
      .order('created_at', { ascending: false })
      .limit(200);

    // Fallback if FK join doesn't work
    if (error || !data) {
      var { data: d2, error: e2 } = await sb.from('grants').select('*').eq('active', true).order('created_at', {ascending: false}).limit(200);
      if (e2) throw e2;
      data = d2 || [];
      // Hydrate profiles manually
      var userIds = [...new Set(data.map(function(g){ return g.user_id; }))];
      if (userIds.length) {
        var { data: profiles } = await sb.from('profiles').select('user_id,username,display_name,avatar_url,profile_photo_url').in('user_id', userIds);
        var map = {};
        (profiles || []).forEach(function(p){ map[p.user_id] = p; });
        data.forEach(function(g){ g.profile = map[g.user_id]; });
      }
    }

    if (!data.length) {
      document.getElementById('panel-active').innerHTML = '<div class="card"><div class="empty">No active grants. Head to the Grant tab to create one.</div></div>';
      return;
    }

    var html = '<div class="card"><h2>Active grants (' + data.length + ')</h2><div class="grant-list">';
    data.forEach(function(g){
      var p = g.profile || {};
      var name = p.display_name || p.username || 'Unknown user';
      var label = grantLabel(g);
      var expired = g.expires_at && new Date(g.expires_at) < new Date();
      var badge, badgeClass;
      if (expired) { badge = 'EXPIRED'; badgeClass = 'expired'; }
      else if (!g.expires_at) { badge = 'FOREVER'; badgeClass = 'forever'; }
      else {
        var daysLeft = Math.ceil((new Date(g.expires_at) - new Date()) / 86400000);
        badge = daysLeft + 'd LEFT'; badgeClass = 'active';
      }

      html += '<div class="grant-item">' +
        '<div class="grant-head">' +
        '<span class="grant-title">' + escapeHtml(label) + ' → @' + escapeHtml(p.username || '') + '</span>' +
        '<span class="grant-badge badge-' + badgeClass + '">' + badge + '</span>' +
        '</div>' +
        '<div class="grant-meta">' + escapeHtml(name) + (g.reason ? ' · "' + escapeHtml(g.reason) + '"' : '') +
        ' · Granted ' + new Date(g.created_at).toLocaleDateString() + '</div>' +
        '<div class="grant-actions">' +
        '<button class="revoke" onclick="revokeGrant(\'' + g.id + '\')">Revoke</button>' +
        '</div></div>';
    });
    html += '</div></div>';
    document.getElementById('panel-active').innerHTML = html;
  } catch(e) {
    document.getElementById('panel-active').innerHTML = '<div class="card"><div class="empty">Error: ' + escapeHtml(e.message) + '</div></div>';
  }
}

function grantLabel(g) {
  if (g.grant_type === 'plan') return '⭐ Plan: ' + (g.grant_value || '');
  if (g.grant_type === 'coins') return '🪙 ' + (g.grant_quantity || 0) + ' coins';
  if (g.grant_type === 'verified_artist') return '✅ Verified Artist';
  if (g.grant_type === 'verified_beatmaker') return '✅ Verified Beatmaker';
  if (g.grant_type === 'algorithm_boost') return '🚀 Boost: ' + (g.grant_value || '');
  if (g.grant_type === 'custom_badge') return '🏆 Badge: ' + (g.grant_value || '');
  return g.grant_type;
}

window.revokeGrant = async function(id) {
  if (!confirm('Revoke this grant? This will undo the profile change.')) return;
  try {
    var { error } = await sb.rpc('revoke_grant', { p_grant_id: id });
    if (error) throw error;
    loadActiveGrants();
  } catch(e){ alert('Failed: ' + e.message); }
};

// ═══════════════════════════════════════════════════════════════════
// TAB 3: My Songs/Beats discounts
// ═══════════════════════════════════════════════════════════════════

async function loadMySongs() {
  document.getElementById('panel-mysongs').innerHTML = '<div class="card"><div class="empty">Loading your songs/beats...</div></div>';
  try {
    // Fetch owner's uploaded songs (and beats — same table)
    var { data: songs, error } = await sb
      .from('songs')
      .select('id,title,artist,cover_art,price,is_beat,hidden')
      .eq('uploaded_by', OWNER_ID)
      .eq('hidden', false)
      .order('created_at', { ascending: false })
      .limit(200);
    if (error) throw error;

    // Fetch active discounts
    var { data: discounts } = await sb.from('song_discounts').select('*').eq('active', true);
    var discountMap = {};
    (discounts || []).forEach(function(d){ discountMap[d.song_id] = d; });

    var beats = (songs || []).filter(function(s){ return s.is_beat; });
    var tracks = (songs || []).filter(function(s){ return !s.is_beat; });

    var html = '<div class="card">' +
      '<h2>Bulk actions</h2>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;">' +
      '<button class="btn btn-ghost" onclick="bulkDiscount(\'songs\',\'percent\',25)">25% off all my songs</button>' +
      '<button class="btn btn-ghost" onclick="bulkDiscount(\'songs\',\'percent\',50)">50% off all my songs</button>' +
      '<button class="btn btn-ghost" onclick="bulkDiscount(\'beats\',\'percent\',25)">25% off all my beats</button>' +
      '<button class="btn btn-ghost" onclick="bulkDiscount(\'beats\',\'percent\',50)">50% off all my beats</button>' +
      '<button class="btn btn-ghost" onclick="bulkDiscount(\'songs\',\'free\',0)">FREE all my songs</button>' +
      '<button class="btn btn-ghost" onclick="bulkDiscount(\'beats\',\'free\',0)">FREE all my beats</button>' +
      '<button class="btn btn-ghost" onclick="clearAllDiscounts()">❌ Clear all discounts</button>' +
      '</div>' +
      '</div>';

    function renderSongList(title, items) {
      if (!items.length) return '';
      var h = '<div class="card"><h2>' + title + ' (' + items.length + ')</h2><div class="grant-list">';
      items.forEach(function(s){
        var d = discountMap[s.id];
        var priceDisplay = d ? (
          d.discount_type === 'free' ? 'FREE' :
          d.discount_type === 'percent' ? ('$' + (s.price * (1 - d.discount_value/100)).toFixed(2) + ' <s>$' + s.price + '</s>') :
          ('$' + Math.max(0, s.price - d.discount_value).toFixed(2) + ' <s>$' + s.price + '</s>')
        ) : ('$' + (s.price || 0));

        h += '<div class="song-item">' +
          '<img src="' + (s.cover_art || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(s.title || 'S') + '&background=7c3aed&color=fff') + '" alt="">' +
          '<div class="song-info">' +
          '<div class="song-title">' + escapeHtml(s.title || '(untitled)') + '</div>' +
          '<div class="song-price">' + priceDisplay + '</div>' +
          '</div>' +
          '<div class="song-actions">';

        if (d) {
          h += '<button class="grant-actions revoke" style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.35);color:#fca5a5;padding:.3rem .6rem;border-radius:6px;font-size:0.72rem;font-weight:700;cursor:pointer;" onclick="removeDiscount(\'' + s.id + '\')">Remove</button>';
        } else {
          h += '<button class="btn-sm" style="background:#7c3aed;border:none;color:#fff;padding:.3rem .6rem;border-radius:6px;font-size:0.72rem;font-weight:700;cursor:pointer;" onclick="showDiscountPrompt(\'' + s.id + '\',\'' + escapeHtml(s.title||'') + '\',' + (s.price||0) + ')">Discount</button>';
        }
        h += '</div></div>';
      });
      h += '</div></div>';
      return h;
    }

    html += renderSongList('🎵 My Songs', tracks);
    html += renderSongList('🥁 My Beats', beats);

    if (!tracks.length && !beats.length) {
      html = '<div class="card"><div class="empty">You haven\'t uploaded any songs or beats yet.</div></div>';
    }

    document.getElementById('panel-mysongs').innerHTML = html;
  } catch(e) {
    document.getElementById('panel-mysongs').innerHTML = '<div class="card"><div class="empty">Error: ' + escapeHtml(e.message) + '</div></div>';
  }
}

window.showDiscountPrompt = async function(songId, title, price) {
  var type = prompt('Discount type for "' + title + '":\n\nEnter: "percent", "fixed", or "free"', 'percent');
  if (!type) return;
  type = type.toLowerCase().trim();
  if (['percent','fixed','free'].indexOf(type) === -1) { alert('Invalid type'); return; }

  var value = 0;
  if (type === 'percent') {
    var v = prompt('Percent off (1-100):', '25');
    if (!v) return;
    value = parseFloat(v);
    if (!(value > 0 && value <= 100)) { alert('Invalid percent'); return; }
  } else if (type === 'fixed') {
    var v = prompt('Dollar amount off:', '5');
    if (!v) return;
    value = parseFloat(v);
    if (!(value > 0)) { alert('Invalid amount'); return; }
  }

  try {
    var { error } = await sb.from('song_discounts').insert([{
      song_id: songId,
      discount_type: type,
      discount_value: value,
      original_price: price,
      created_by: currentUser.id
    }]);
    if (error) throw error;
    loadMySongs();
  } catch(e) { alert('Failed: ' + e.message); }
};

window.removeDiscount = async function(songId) {
  if (!confirm('Remove discount for this song?')) return;
  try {
    await sb.from('song_discounts').update({ active: false }).eq('song_id', songId).eq('active', true);
    loadMySongs();
  } catch(e) { alert('Failed: ' + e.message); }
};

window.bulkDiscount = async function(kind, type, value) {
  if (!confirm(
    type === 'free' ? 'Make ALL your ' + kind + ' FREE?' :
    'Apply ' + value + '% off to ALL your ' + kind + '?'
  )) return;
  try {
    var { data: songs, error } = await sb.from('songs')
      .select('id,price')
      .eq('uploaded_by', OWNER_ID)
      .eq('is_beat', kind === 'beats');
    if (error) throw error;

    // Remove existing active discounts for these songs
    var ids = songs.map(function(s){ return s.id; });
    if (ids.length) {
      await sb.from('song_discounts').update({ active: false }).in('song_id', ids).eq('active', true);
    }

    // Insert new discounts
    var rows = songs.map(function(s){
      return {
        song_id: s.id,
        discount_type: type,
        discount_value: value,
        original_price: s.price,
        created_by: currentUser.id
      };
    });
    if (rows.length) {
      var { error: e2 } = await sb.from('song_discounts').insert(rows);
      if (e2) throw e2;
    }

    loadMySongs();
  } catch(e){ alert('Failed: ' + e.message); }
};

window.clearAllDiscounts = async function() {
  if (!confirm('Remove ALL active discounts on your songs/beats?')) return;
  try {
    var { data: songs } = await sb.from('songs').select('id').eq('uploaded_by', OWNER_ID);
    var ids = (songs || []).map(function(s){ return s.id; });
    if (ids.length) {
      await sb.from('song_discounts').update({ active: false }).in('song_id', ids).eq('active', true);
    }
    loadMySongs();
  } catch(e) { alert('Failed: ' + e.message); }
};

// ═══════════════════════════════════════════════════════════════════
// Utils
// ═══════════════════════════════════════════════════════════════════

function showMsg(text, kind, where) {
  var el = document.getElementById(where);
  if (!el) return;
  el.innerHTML = '<div class="msg-' + (kind === 'err' ? 'err' : 'ok') + '">' + escapeHtml(text) + '</div>';
}

function escapeHtml(s){ if(!s)return''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// Close dropdown when clicking elsewhere
document.addEventListener('click', function(e){
  if (!e.target.closest('.user-search-wrap')) {
    var r = document.getElementById('userResults');
    if (r) r.classList.remove('show');
  }
});

init();
</script>
