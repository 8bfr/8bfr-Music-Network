<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,sans-serif;background:linear-gradient(#0b0014,#000);color:#eae6ff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.card{background:rgba(12,6,24,.85);border:1px solid rgba(124,58,237,.4);border-radius:16px;padding:2rem;max-width:420px;width:100%;}
h1{font-size:1.5rem;font-weight:800;color:#a855f7;text-align:center;margin-bottom:.5rem;}
p{font-size:.85rem;color:rgba(234,230,255,.6);text-align:center;margin-bottom:1.5rem;line-height:1.5;}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:.82rem;color:rgba(234,230,255,.7);margin-bottom:.3rem;font-weight:600;}
input{width:100%;padding:.65rem .85rem;background:rgba(0,0,0,.3);border:1px solid rgba(124,58,237,.35);border-radius:8px;color:#eae6ff;font-size:.9rem;outline:none;}
input:focus{border-color:#a855f7;}
.btn{width:100%;padding:.7rem;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .2s;}
.btn:hover{background:#6d28d9;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.notice{margin-top:1rem;font-size:.85rem;text-align:center;min-height:1.2em;}
.links{text-align:center;margin-top:1.25rem;font-size:.82rem;}
.links a{color:#a855f7;text-decoration:none;font-weight:600;}
.links a:hover{text-decoration:underline;}
.success-icon{font-size:3rem;text-align:center;margin-bottom:.5rem;}
</style>
</head>
<body>
<div class="card">
<!-- Step 1: Request reset -->
<div id="requestForm">
<h1>🔑 Reset Password</h1>
<p>Enter your email and we'll send you a link to reset your password.</p>
<div class="form-group">
<label>Email Address</label>
<input type="email" id="resetEmail" placeholder="your@email.com">
</div>
<button class="btn" onclick="requestReset()" id="resetBtn">Send Reset Link</button>
<div class="notice" id="resetNotice"></div>
</div>

<!-- Step 2: Set new password (shown when user clicks link from email) -->
<div id="newPassForm" style="display:none;">
<div class="success-icon">🔓</div>
<h1>Set New Password</h1>
<p>Enter your new password below.</p>
<div class="form-group">
<label>New Password</label>
<input type="password" id="newPass" placeholder="Min 6 characters">
</div>
<div class="form-group">
<label>Confirm Password</label>
<input type="password" id="confirmPass" placeholder="Confirm password">
</div>
<button class="btn" onclick="updatePassword()" id="updateBtn">Update Password</button>
<div class="notice" id="updateNotice"></div>
</div>

<!-- Step 3: Success -->
<div id="successMsg" style="display:none;">
<div class="success-icon">✅</div>
<h1>Password Updated!</h1>
<p>Your password has been changed successfully. You can now log in with your new password.</p>
<a href="login.html" class="btn" style="display:block;text-align:center;text-decoration:none;margin-top:1rem;">Go to Login</a>
</div>

<div class="links">
<a href="login.html">← Back to Login</a>
</div>
</div>

<script>
const db = window.supabase.createClient(
  'https://novbuvwpjnxwwvdekjhr.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0'
);

// Check if user arrived via a reset link (has access_token in URL hash)
async function init() {
  const hash = window.location.hash;
  if (hash && (hash.includes('access_token') || hash.includes('type=recovery'))) {
    // User clicked the email link - show new password form
    document.getElementById('requestForm').style.display = 'none';
    document.getElementById('newPassForm').style.display = 'block';
  }

  // Also check if there's an active recovery session
  const { data: { session } } = await db.auth.getSession();
  if (session && window.location.hash.includes('recovery')) {
    document.getElementById('requestForm').style.display = 'none';
    document.getElementById('newPassForm').style.display = 'block';
  }
}

async function requestReset() {
  const email = document.getElementById('resetEmail').value.trim();
  const notice = document.getElementById('resetNotice');
  const btn = document.getElementById('resetBtn');

  if (!email) { notice.style.color = '#ef4444'; notice.textContent = 'Enter your email.'; return; }
  btn.disabled = true; btn.textContent = 'Sending...';

  try {
    const { error } = await db.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html'
    });
    if (error) throw error;
    notice.style.color = '#4ade80';
    notice.textContent = '✅ Check your email! We sent a reset link.';
  } catch(e) {
    notice.style.color = '#ef4444';
    notice.textContent = 'Error: ' + e.message;
  }
  btn.disabled = false; btn.textContent = 'Send Reset Link';
}

async function updatePassword() {
  const pass = document.getElementById('newPass').value;
  const confirm = document.getElementById('confirmPass').value;
  const notice = document.getElementById('updateNotice');
  const btn = document.getElementById('updateBtn');

  if (!pass || pass.length < 6) { notice.style.color = '#ef4444'; notice.textContent = 'Password must be 6+ characters.'; return; }
  if (pass !== confirm) { notice.style.color = '#ef4444'; notice.textContent = 'Passwords do not match.'; return; }

  btn.disabled = true; btn.textContent = 'Updating...';
  try {
    const { error } = await db.auth.updateUser({ password: pass });
    if (error) throw error;
    document.getElementById('newPassForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  } catch(e) {
    notice.style.color = '#ef4444';
    notice.textContent = 'Error: ' + e.message;
  }
  btn.disabled = false; btn.textContent = 'Update Password';
}

init();
</script>
  <script src="scripts.js" defer></script>
</body></html>
