<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songs - 8BFR Music Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #7c3aed; --dark: #0b0014; --dark-card: #0c0618; --text: #eae6ff; --text-dim: #a855f7; --border: rgba(124,58,237,.35); --green: #00ff88; --cyan: #00d9ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Work Sans', sans-serif; background: linear-gradient(#0b0014,#000); color: var(--text); min-height: 100vh; padding-bottom: 120px; }
        .header { background: rgba(15,0,30,.9); border-bottom: 2px solid var(--primary); padding: 1.25rem 1.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
        .header h1 { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; color: var(--primary); }
        .header a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
        .card { background: var(--dark-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .filter-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
        .filter-bar input { flex: 1; min-width: 200px; padding: 0.6rem 1rem; background: var(--dark); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; }
        .filter-bar input:focus { outline: none; border-color: var(--primary); }
        .filter-bar select { padding: 0.6rem 0.75rem; background: var(--dark); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; }
        .filter-bar select:focus { outline: none; border-color: var(--primary); }
        .tab-bar { display: flex; gap: 0.4rem; margin-bottom: 1rem; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 0.45rem 0.9rem; border-radius: 8px; border: 1px solid var(--border); background: var(--dark); color: var(--text-dim); cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
        .tab-btn:hover { border-color: var(--primary); }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .songs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
        .song-card { background: var(--dark); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.3s; }
        .song-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
        .song-cover { aspect-ratio: 1; background: rgba(124,58,237,0.15); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; position: relative; overflow: hidden; }
        .song-cover img { width: 100%; height: 100%; object-fit: cover; }
        .song-cover .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .song-card:hover .play-overlay { opacity: 1; }
        .play-overlay button { width: 50px; height: 50px; border-radius: 50%; background: var(--primary); border: none; color: white; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .song-meta { padding: 0.75rem; }
        .song-meta .title { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.2rem; }
        .song-meta .artist { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-meta .stats { display: flex; gap: 0.5rem; margin-top: 0.4rem; font-size: 0.7rem; color: var(--text-dim); }
        .explicit-tag { display: inline-block; background: rgba(239,68,68,0.2); color: #ef4444; font-size: 0.6rem; padding: 0.1rem 0.3rem; border-radius: 3px; font-weight: 700; margin-left: 0.3rem; vertical-align: middle; }
        .price-tag { position: absolute; top: 8px; right: 8px; background: rgba(0,255,136,0.9); color: #000; font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 4px; }
        .songs-list .song-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.5rem; border-radius: 8px; transition: background 0.2s; }
        .songs-list .song-row:hover { background: rgba(124,58,237,0.06); }
        .song-row .row-num { width: 28px; text-align: center; font-size: 0.85rem; color: var(--text-dim); font-weight: 600; flex-shrink: 0; }
        .song-row .row-art { width: 44px; height: 44px; border-radius: 6px; background: rgba(124,58,237,0.15); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; overflow: hidden; flex-shrink: 0; }
        .song-row .row-art img { width: 100%; height: 100%; object-fit: cover; }
        .song-row .row-info { flex: 1; min-width: 0; }
        .song-row .row-title { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-row .row-artist { font-size: 0.75rem; color: var(--text-dim); }
        .song-row .row-stats { font-size: 0.72rem; color: var(--text-dim); display: flex; gap: 0.5rem; flex-shrink: 0; }
        .song-row .row-play { width: 34px; height: 34px; border-radius: 50%; background: var(--primary); border: none; color: white; cursor: pointer; font-size: 0.85rem; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .song-row .row-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }
        .action-btn { background: rgba(124,58,237,0.1); border: 1px solid transparent; color: var(--text-dim); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .action-btn:hover { border-color: var(--primary); color: var(--text); }
        .action-btn.liked { color: #f472b6; border-color: #f472b6; }
        .liked-heart { color: #f472b6; }
        .view-toggle { display: flex; gap: 0.3rem; }
        .view-btn { padding: 0.4rem 0.6rem; border-radius: 6px; border: 1px solid var(--border); background: var(--dark); color: var(--text-dim); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
        .view-btn.active { background: rgba(124,58,237,0.2); border-color: var(--primary); color: var(--primary); }
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(12,6,24,0.97); border-top: 2px solid var(--primary); padding: 0.75rem 1rem; z-index: 200; backdrop-filter: blur(12px); display: none; }
        .player-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 0.75rem; }
        .player-art { width: 44px; height: 44px; border-radius: 6px; background: rgba(124,58,237,0.2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .player-art img { width: 100%; height: 100%; object-fit: cover; }
        .player-info { flex: 1; min-width: 0; }
        .player-title { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { font-size: 0.72rem; color: var(--text-dim); }
        .player-controls { display: flex; align-items: center; gap: 0.5rem; }
        .player-controls button { background: none; border: none; color: var(--text); cursor: pointer; font-size: 1.2rem; padding: 0.25rem; }
        .player-controls .play-main { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .progress-bar { flex: 1; min-width: 80px; height: 4px; background: rgba(124,58,237,0.2); border-radius: 2px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 2px; width: 0%; transition: width 0.1s; }
        .player-time { font-size: 0.7rem; color: var(--text-dim); white-space: nowrap; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-dim); }
        .empty-state .emoji { font-size: 3rem; margin-bottom: 0.75rem; }
        .load-more { text-align: center; margin-top: 1rem; }
        .load-more button { background: rgba(124,58,237,0.2); border: 1px solid var(--border); color: var(--text); padding: 0.6rem 1.5rem; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .load-more button:hover { border-color: var(--primary); }
        @media (max-width: 600px) {
            .songs-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .song-row .row-stats { display: none; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎵 Songs</h1>
        <a href="feed.html">← Back</a>
    </div>
    <div class="container">
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="🔍 Search songs, artists..." oninput="debounceSearch()">
            <select id="genreFilter" onchange="loadSongs()">
                <option value="">All Genres</option>
                <option>Hip-Hop</option><option>Trap</option><option>R&B</option><option>Drill</option>
                <option>Boom Bap</option><option>Pop</option><option>Rock</option><option>Lo-Fi</option>
                <option>Afrobeats</option><option>Latin</option><option>Country</option><option>EDM</option>
                <option>Jazz</option><option>Soul</option><option>Reggae</option><option>Gospel</option>
                <option>Rap</option><option>Rap/Rock</option><option>Rap/Metal</option><option>Rap/Country</option>
            </select>
            <select id="sortFilter" onchange="loadSongs()">
                <option value="newest">Newest</option>
                <option value="popular">Most Popular</option>
                <option value="mostliked">Most Liked</option>
                <option value="az">A → Z</option>
            </select>
            <div class="view-toggle">
                <button class="view-btn active" onclick="setView('grid',this)">▦</button>
                <button class="view-btn" onclick="setView('list',this)">☰</button>
            </div>
        </div>
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchType('all',this)">🎵 All Songs</button>
            <button class="tab-btn" onclick="switchType('singles',this)">💿 Singles</button>
            <button class="tab-btn" onclick="switchType('albums',this)">📀 Albums</button>
            <button class="tab-btn" onclick="switchType('free',this)">🆓 Free</button>
            <button class="tab-btn" onclick="switchType('explicit',this)">🔞 Explicit</button>
        </div>
        <div id="songsContainer"></div>
        <div class="load-more" id="loadMore" style="display:none;">
            <button onclick="loadMoreSongs()">Load More</button>
        </div>
    </div>

    <div class="player-bar" id="playerBar">
        <div class="player-inner">
            <div class="player-art" id="playerArt">🎵</div>
            <div class="player-info">
                <div class="player-title" id="playerTitle">—</div>
                <div class="player-artist" id="playerArtist">—</div>
            </div>
            <div class="player-controls">
                <button onclick="prevSong()">⏮</button>
                <button class="play-main" id="playPauseBtn" onclick="togglePlay()">▶</button>
                <button onclick="nextSong()">⏭</button>
            </div>
            <div class="progress-bar" id="progressBar" onclick="seekAudio(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="player-time"><span id="currentTime">0:00</span> / <span id="totalTime">0:00</span></div>
        </div>
    </div>

    <audio id="audioEl" preload="auto"></audio>

    <script>
    var SUPABASE_URL = 'https://novbuvwpjnxwwvdekjhr.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0';
    var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var allSongs = [];
    var currentView = 'grid';
    var currentType = 'all';
    var currentPage = 0;
    var PAGE_SIZE = 30;
    var searchTimeout = null;
    var currentPlayIndex = -1;
    var playlist = [];
    var currentUserId = '';
    var likedSongs = {};

    async function init() {
        var sess = await db.auth.getSession();
        if (!sess.data.session) { location.href = 'login.html?return=song.html'; return; }
        currentUserId = sess.data.session.user.id;
        await loadUserLikes();
        await loadSongs();
        setupAudioListeners();
    }

    async function loadUserLikes() {
        try {
            var {data} = await db.from('likes').select('content_id').eq('user_id', currentUserId).eq('content_type', 'song');
            if (data) data.forEach(function(l) { likedSongs[l.content_id] = true; });
        } catch(e) {}
    }

    function debounceSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(function(){ loadSongs(); }, 350);
    }

    function switchType(type, btn) {
        currentType = type;
        currentPage = 0;
        document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        loadSongs();
    }

    function setView(view, btn) {
        currentView = view;
        document.querySelectorAll('.view-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        renderSongs(allSongs);
    }

    async function loadSongs() {
        currentPage = 0;
        var container = document.getElementById('songsContainer');
        container.innerHTML = '<div style="text-align:center;padding:2rem;"><div style="width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;"></div></div>';

        var search = document.getElementById('searchInput').value.trim();
        var genre = document.getElementById('genreFilter').value;
        var sort = document.getElementById('sortFilter').value;

        try {
            var query = db.from('songs').select('*')
                .not('song_url', 'is', null)
                .neq('song_url', '');

            // ★ FIXED: "All Songs" excludes beats — beats have their own page
            if (currentType === 'all') query = query.or('is_beat.is.null,is_beat.eq.false');
            else if (currentType === 'singles') query = query.or('type.eq.single,type.is.null').or('is_beat.is.null,is_beat.eq.false');
            else if (currentType === 'albums') query = query.eq('type', 'album');
            else if (currentType === 'free') query = query.or('price.is.null,price.eq.0');
            else if (currentType === 'explicit') query = query.eq('explicit', true);

            if (genre) query = query.ilike('genre', '%' + genre + '%');
            if (search) query = query.or('title.ilike.%' + search + '%,artist.ilike.%' + search + '%');

            switch(sort) {
                case 'popular': query = query.order('play_count', { ascending: false, nullsFirst: false }); break;
                case 'mostliked': query = query.order('created_at', { ascending: false }); break;
                case 'az': query = query.order('title', { ascending: true }); break;
                default: query = query.order('created_at', { ascending: false });
            }

            var result = await query.range(0, PAGE_SIZE - 1);
            if (result.error) throw result.error;
            allSongs = result.data || [];
        } catch(e) {
            console.error('Load songs error:', e);
            allSongs = [];
        }

        renderSongs(allSongs);
    }

    async function loadMoreSongs() {
        currentPage++;
        var from = currentPage * PAGE_SIZE;
        var to = from + PAGE_SIZE - 1;
        try {
            var query = db.from('songs').select('*').not('song_url', 'is', null).neq('song_url', '').order('created_at', { ascending: false }).range(from, to);
            var result = await query;
            if (result.data && result.data.length) {
                allSongs = allSongs.concat(result.data);
                renderSongs(allSongs);
            } else {
                document.getElementById('loadMore').style.display = 'none';
            }
        } catch(e) { console.error(e); }
    }

    function renderSongs(songs) {
        var container = document.getElementById('songsContainer');
        playlist = songs;

        if (!songs.length) {
            container.innerHTML = '<div class="empty-state"><div class="emoji">🎵</div><p>No songs found. Upload your first track from your profile!</p></div>';
            document.getElementById('loadMore').style.display = 'none';
            return;
        }

        if (currentView === 'grid') {
            var html = '<div class="songs-grid">';
            songs.forEach(function(s, i) {
                var cover = s.cover_art ? '<img src="' + esc(s.cover_art) + '" alt="">' : '🎵';
                var priceTag = (s.price && s.price > 0) ? '<span class="price-tag">$' + Number(s.price).toFixed(2) + '</span>' : '';
                var explicitTag = s.explicit ? '<span class="explicit-tag">E</span>' : '';
                html += '<div class="song-card">' +
                    '<div class="song-cover" onclick="playSongAtIndex(' + i + ')">' + cover + priceTag + '<div class="play-overlay"><button>&#9654;</button></div></div>' +
                    '<div class="song-meta">' +
                    '<div class="title">' + esc(s.title) + explicitTag + '</div>' +
                    '<div class="artist">' + esc(s.artist || 'Unknown') + '</div>' +
                    '<div class="stats"><span>&#9654; ' + fmt(s.play_count || 0) + '</span>' +
                    '<span class="' + (likedSongs[s.id] ? 'liked-heart' : '') + '" style="cursor:pointer;' + (likedSongs[s.id] ? 'color:#f472b6;' : '') + '" onclick="event.stopPropagation();toggleLike(\'' + s.id + '\',this)">' + (likedSongs[s.id] ? '&#9829;' : '&#9825;') + '</span>' +
                    '<span style="cursor:pointer;" onclick="event.stopPropagation();shareSong(\'' + s.id + '\',\'' + esc(s.title).replace(/'/g,'') + '\',\'' + esc(s.artist || '').replace(/'/g,'') + '\',\'' + esc(s.cover_art||'').replace(/'/g,'') + '\')">&#128279;</span>' +
                    '</div>' +
                    '</div></div>';
            });
            html += '</div>';
            container.innerHTML = html;
        } else {
            var html = '<div class="songs-list">';
            songs.forEach(function(s, i) {
                var cover = s.cover_art ? '<img src="' + esc(s.cover_art) + '" alt="">' : '🎵';
                var explicitTag = s.explicit ? '<span class="explicit-tag">E</span>' : '';
                html += '<div class="song-row">' +
                    '<div class="row-num">' + (i + 1) + '</div>' +
                    '<div class="row-art" onclick="playSongAtIndex(' + i + ')">' + cover + '</div>' +
                    '<div class="row-info">' +
                    '<div class="row-title">' + esc(s.title) + explicitTag + '</div>' +
                    '<div class="row-artist">' + esc(s.artist || 'Unknown') + '</div>' +
                    '</div>' +
                    '<div class="row-stats"><span>▶ ' + fmt(s.play_count || 0) + '</span></div>' +
                    '<div class="row-actions">' +
                    '<button class="action-btn" onclick="toggleLike(\'' + s.id + '\',this)" title="Like" style="' + (likedSongs[s.id] ? 'color:#f472b6;border-color:#f472b6;' : '') + '">' + (likedSongs[s.id] ? '&#9829;' : '&#9825;') + '</button>' +
                    '<button class="action-btn" onclick="shareSong(\'' + s.id + '\',\'' + esc(s.title).replace(/'/g,'') + '\',\'' + esc(s.artist || '').replace(/'/g,'') + '\',\'' + esc(s.cover_art||'').replace(/'/g,'') + '\')" title="Share">&#128279;</button>' +
                    '</div>' +
                    '<button class="row-play" onclick="playSongAtIndex(' + i + ')">▶</button>' +
                    '</div>';
            });
            html += '</div>';
            container.innerHTML = html;
        }

        document.getElementById('loadMore').style.display = songs.length >= PAGE_SIZE ? 'block' : 'none';
    }

    /* ═══ AUDIO PLAYER ═══ */
    var audio = document.getElementById('audioEl');

    function setupAudioListeners() {
        audio.addEventListener('timeupdate', function() {
            if (audio.duration) {
                document.getElementById('progressFill').style.width = (audio.currentTime / audio.duration * 100) + '%';
                document.getElementById('currentTime').textContent = fmtTime(audio.currentTime);
            }
        });
        audio.addEventListener('loadedmetadata', function() {
            document.getElementById('totalTime').textContent = fmtTime(audio.duration);
        });
        audio.addEventListener('ended', nextSong);
        audio.addEventListener('play', function() { document.getElementById('playPauseBtn').textContent = '⏸'; });
        audio.addEventListener('pause', function() { document.getElementById('playPauseBtn').textContent = '▶'; });
    }

    function playSongAtIndex(idx) {
        if (!playlist[idx]) return;
        var s = playlist[idx];
        currentPlayIndex = idx;

        // ★ FIXED: use song_url not audio_url
        if (s.song_url) {
            audio.src = s.song_url;
            audio.load();
            audio.play().catch(function(e) { console.log('Autoplay blocked:', e); });
        } else {
            alert('No audio file for this song.');
            return;
        }

        document.getElementById('playerBar').style.display = 'block';
        document.getElementById('playerTitle').textContent = s.title;
        document.getElementById('playerArtist').textContent = s.artist || 'Unknown';
        // ★ FIXED: use cover_art not cover_url
        document.getElementById('playerArt').innerHTML = s.cover_art ? '<img src="' + s.cover_art + '" alt="">' : '🎵';

        // ★ FIXED: safe play count increment (no rpc)
        try { db.from('songs').update({ play_count: (s.play_count || 0) + 1 }).eq('id', s.id); } catch(e) {}
    }

    function togglePlay() {
        if (audio.paused) audio.play().catch(function(){});
        else audio.pause();
    }

    function nextSong() {
        if (currentPlayIndex < playlist.length - 1) playSongAtIndex(currentPlayIndex + 1);
    }

    function prevSong() {
        if (audio.currentTime > 3) { audio.currentTime = 0; return; }
        if (currentPlayIndex > 0) playSongAtIndex(currentPlayIndex - 1);
    }

    function seekAudio(e) {
        var bar = document.getElementById('progressBar');
        var pct = e.offsetX / bar.offsetWidth;
        if (audio.duration) audio.currentTime = pct * audio.duration;
    }

    function fmtTime(s) {
        if (!s || isNaN(s)) return '0:00';
        var m = Math.floor(s / 60);
        var sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    async function toggleLike(songId, el) {
        if (!currentUserId) return;
        try {
            if (likedSongs[songId]) {
                await db.from('likes').delete().eq('user_id', currentUserId).eq('content_id', songId).eq('content_type', 'song');
                delete likedSongs[songId];
            } else {
                await db.from('likes').insert({ user_id: currentUserId, content_id: songId, content_type: 'song' });
                likedSongs[songId] = true;
            }
            renderSongs(allSongs);
        } catch(e) { console.log('Like error:', e); }
    }

    function shareSong(id, title, artist, cover) {
        var desc = 'Listen to "' + title + '" by ' + (artist || 'Unknown') + ' on 8BFR';
        if (window.Share) {
            Share.song(id, title + ' — ' + (artist || 'Unknown'), desc, cover || '');
        } else {
            // Fallback while share-kit.js loads
            var text = desc + ' #8BFR';
            if (navigator.share) navigator.share({ title: title, text: text, url: 'https://8bfr.com/song.html?id='+id }).catch(function(){});
            else navigator.clipboard.writeText('https://8bfr.com/song.html?id='+id).then(function(){ alert('Link copied!'); });
        }
    }

    function fmt(n) { return n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(1)+'K' : n.toString(); }
    function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
    </script>
