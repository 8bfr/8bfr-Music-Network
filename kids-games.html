<script>
// Avatar & Bubble Toggle System
(function() {
    // Create toggle button
    const toggleBtn = document.createElement('button');
    toggleBtn.id = 'avatarToggle';
    toggleBtn.innerHTML = '';
    toggleBtn.title = 'Toggle Avatar/Bubbles';
    toggleBtn.style.cssText = `
        position: fixed;
        top: 80px;
        right: 20px;
        z-index: 9999;
        background: rgba(124, 58, 237, 0.9);
        border: 2px solid rgba(124, 58, 237, 1);
        color: white;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px rgba(124, 58, 237, 0.5);
        transition: all 0.3s ease;
    `;
    
    toggleBtn.addEventListener('mouseenter', function() {
        this.style.transform = 'scale(1.1)';
    });
    
    toggleBtn.addEventListener('mouseleave', function() {
        this.style.transform = 'scale(1)';
    });
    
    document.body.appendChild(toggleBtn);
    
    // Load saved preference
    let isHidden = localStorage.getItem('hideAvatarBubbles') === 'true';
    
    function updateVisibility() {
        const elementsToToggle = [
            document.getElementById('homeAvatarSwitcher'),
            ...document.querySelectorAll('[id*="bubble"]'),
            ...document.querySelectorAll('[class*="bubble"]'),
            ...document.querySelectorAll('[id*="avatar"][id*="switcher"]')
        ];
        
        elementsToToggle.forEach(el => {
            if (el) {
                el.style.display = isHidden ? 'none' : '';
            }
        });
        
        toggleBtn.innerHTML = isHidden ? '' : '';
        toggleBtn.title = isHidden ? 'Show Avatar/Bubbles' : 'Hide Avatar/Bubbles';
    }
    
    toggleBtn.addEventListener('click', function() {
        isHidden = !isHidden;
        localStorage.setItem('hideAvatarBubbles', isHidden);
        updateVisibility();
    });
    
    // Apply on load
    updateVisibility();
    
    // Watch for dynamically added elements
    const observer = new MutationObserver(updateVisibility);
    observer.observe(document.body, { childList: true, subtree: true });
})();
</script>

<script>
(function(){
  // Highlight current page in nav
  var page = location.pathname.split('/').pop() || '';
  document.querySelectorAll('#kidNav a').forEach(function(a){
    if(a.getAttribute('href') === page) a.classList.add('active');
  });

  // Mascot speech bubbles
  var tips = [
    " Try making a beat in the Studio!",
    "[Trophy] New challenges every week!",
    " Earn KidCoins by playing games!",
    "[Star] Check out what other kids created!",
    " Record your voice in the Studio!",
    "[Gift] Spend coins in the Rewards shop!",
    "Parent Hub Parents can monitor from the Parent Hub!",
    "[Game] The rhythm game is super fun!",
    " Keep creating  you're awesome!"
  ];
  var bubbleOpen = false;

  window.toggleMascotBubble = function(){
    var bubble = document.getElementById('kidMascotBubble');
    bubbleOpen = !bubbleOpen;
    if(bubbleOpen){
      bubble.textContent = tips[Math.floor(Math.random() * tips.length)];
      bubble.style.display = 'block';
      // Auto-hide after 4 seconds
      setTimeout(function(){ bubble.style.display = 'none'; bubbleOpen = false; }, 4000);
    } else {
      bubble.style.display = 'none';
    }
  };

  // Show a random tip after 3 seconds
  setTimeout(function(){
    var bubble = document.getElementById('kidMascotBubble');
    bubble.textContent = tips[Math.floor(Math.random() * tips.length)];
    bubble.style.display = 'block';
    setTimeout(function(){ bubble.style.display = 'none'; }, 5000);
  }, 3000);

  // Remove the adult avatar toggle if it exists
  var avatarToggle = document.querySelector('[onclick*="hideAvatarBubbles"], button[style*="position:fixed"][style*="top:80px"]');
  if(avatarToggle) avatarToggle.remove();
})();
</script>
