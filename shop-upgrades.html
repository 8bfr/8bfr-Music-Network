    /* HERO STRIP */
    .hero-strip{
      background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(0,217,255,.08));

      background:rgba(6,0,16,.7); backdrop-filter:blur(10px);
      position:sticky; top:57px; z-index:99;

    .tab-bar::-webkit-scrollbar{ display:none; }

      flex-shrink:0; padding:.32rem .8rem; border-radius:999px;

      border:1px solid rgba(124,58,237,.3); background:rgba(14,4,28,.8);

    .upgrade-card{

      border-radius:16px; overflow:hidden; transition:all .2s;

    .upgrade-card.owned-card{ border-color:rgba(16,185,129,.35); background:rgba(16,185,129,.04); }

    .card-inner{ display:flex; align-items:flex-start; gap:1rem; padding:1.1rem 1rem; }
    .card-icon{
      width:58px; height:58px; border-radius:12px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:1.8rem; border:1px solid rgba(124,58,237,.25);
      background:rgba(124,58,237,.1);

    .upgrade-card.owned-card .card-icon{ background:rgba(16,185,129,.1); border-color:rgba(16,185,129,.25); }

    .card-body{ flex:1; min-width:0; }

    .card-desc{ font-size:.8rem; color:#a855f7; opacity:.82; line-height:1.5; margin-bottom:.65rem; }
    .card-perks{ display:flex; flex-wrap:wrap; gap:.35rem; margin-bottom:.8rem; }
    .perk-tag{
      font-size:.68rem; font-weight:700; padding:.2rem .55rem; border-radius:6px;
      background:rgba(124,58,237,.15); border:1px solid rgba(124,58,237,.3); color:#c4b5fd;

    .price-sub{ font-size:.7rem; color:#a855f7; opacity:.7; }

      font-size:.85rem; font-weight:700; cursor:pointer; transition:all .15s;
      white-space:nowrap;

    /* COLOR SWATCHES */
    .swatch-row{ display:flex; gap:.4rem; flex-wrap:wrap; margin:.5rem 0; }

      width:28px; height:28px; border-radius:6px; cursor:pointer;
      border:2px solid transparent; transition:all .15s;
    }
    .swatch:hover,.swatch.selected{ border-color:#fff; transform:scale(1.15); }

    /* BG PREVIEW */
    .bg-preview{
      height:48px; border-radius:8px; margin:.5rem 0;
      display:flex; align-items:center; justify-content:center;
      font-size:.72rem; color:#fff; font-weight:600;
    }

    /* SECTION DIVIDER */
    .section-divider{
      display:flex; align-items:center; gap:.6rem;
      padding:.75rem 1.25rem .25rem; max-width:700px; margin:0 auto;
      font-size:.68rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.1em; color:#a855f7; opacity:.7;
    }
    .section-divider::after{ content:''; flex:1; height:1px; background:rgba(124,58,237,.25); }

    /* MODAL */
    #upgradeModal{
      position:fixed; inset:0; z-index:9999;
      background:rgba(0,0,0,.8); backdrop-filter:blur(6px);
      display:none; align-items:center; justify-content:center;
    }
    #upgradeModal.open{ display:flex; }
    .modal-box{
      background:rgba(12,4,26,.99); border:1px solid rgba(124,58,237,.5);
      border-radius:18px; padding:1.5rem 1.5rem 1.25rem;
      width:min(92vw,380px); text-align:center;

    .modal-icon{ font-size:3.2rem; margin-bottom:.65rem; }
    .modal-title{ font-size:1.05rem; font-weight:800; margin-bottom:.35rem; }
    .modal-cost{ font-size:1.25rem; font-weight:800; color:#fbbf24; margin:.6rem 0; }
    .modal-note{ font-size:.78rem; color:#a855f7; opacity:.8; margin-bottom:1.1rem; line-height:1.5; }
    .modal-row{ display:flex; gap:.75rem; justify-content:center; }
    .m-btn{ padding:.5rem 1.2rem; border-radius:10px; border:none; font-size:.88rem; font-weight:700; cursor:pointer; }
    .m-confirm{ background:var(--purple); color:#fff; }
    .m-confirm:hover{ background:#6d28d9; }
    .m-cancel{ background:rgba(255,255,255,.08); color:#eae6ff; }

    /* TOAST */
    #toast{
      position:fixed; bottom:5.5rem; left:50%; transform:translateX(-50%);
      padding:.5rem 1.2rem; border-radius:999px; font-size:.84rem; font-weight:700;
      z-index:10000; display:none; white-space:nowrap; pointer-events:none;
    }
    #toast.s{ background:rgba(16,185,129,.92); color:#fff; }
    #toast.e{ background:rgba(239,68,68,.92); color:#fff; }
    #toast.i{ background:rgba(124,58,237,.92); color:#fff; }

    @media(min-width:560px){
      .upgrade-grid{ grid-template-columns:1fr 1fr; }
      .upgrade-card.wide{ grid-column:span 2; }
    }
  </style>
</head>

    if(u.applyOnly){
      priceHtml=`<div class="price-block"><div class="price-coins" style="color:#00d9ff;">📬 Apply</div><div class="price-sub">Contact the owner</div></div>`;
    } else if(u.subOption){
      priceHtml=`<div class="price-block">
        <div class="price-coins">🪙 ${u.coinLabel}</div>
        <div class="price-sub">or ${u.subLabel}</div>
      </div>`;
    } else {
      priceHtml=`<div class="price-block">
        <div class="price-coins">🪙 ${u.coins.toLocaleString()}</div>
        ${u.duration?`<div class="price-sub">${u.consumable?'One-time use':'Lasts '+u.duration+' day'+(u.duration>1?'s':'')}</div>`:'<div class="price-sub">Permanent</div>'}
      </div>`;
    }

    // Button
    let btnHtml='';
    if(owned){
      btnHtml=`<button class="buy-btn buy-owned">✓ Active</button>`;
    } else if(u.applyOnly){
      btnHtml=`<a href="contact.html?subject=Verified+Artist+Request" class="buy-btn buy-sub" style="text-decoration:none;display:inline-block;">Apply →</a>`;
    } else if(u.subOption){
      btnHtml=`<div style="display:flex;gap:.5rem;flex-wrap:wrap;">
        <button class="buy-btn buy-purple" onclick="openModal('${u.id}','coins')"${!canAfford&&!isOwner?' disabled style="opacity:.4;cursor:not-allowed;"':''}>🪙 Buy</button>
        <a href="${u.subUrl}" target="_blank" rel="noopener" class="buy-btn buy-sub" style="text-decoration:none;display:inline-block;">💳 Subscribe</a>
      </div>`;
    } else if(!canAfford){
      btnHtml=`<button class="buy-btn buy-nocoins">Need ${(u.coins-userCoins).toLocaleString()} more 🪙</button>`;
    } else {
      btnHtml=`<button class="buy-btn buy-gold" onclick="openModal('${u.id}','coins')">Buy Now ⚡</button>`;
    }

    return `<div class="upgrade-card ${wideClass} ${featClass} ${ownClass}" style="position:relative;">
      ${badge}
      <div class="card-inner">
        <div class="card-icon">${u.icon}</div>
        <div class="card-body">
          <div class="card-title">${u.name}</div>
          <div class="card-desc">${u.desc}</div>
          <div class="card-perks">${perksHtml}</div>
          ${extraHtml}
        </div>
      </div>
      <div class="card-footer">
        ${priceHtml}
        ${btnHtml}
      </div>
    </div>`;
  }

  // ── MODAL ─────────────────────────────────────────────────────
  window.openModal=function(id, method){
    if(!currentUser){ showToast('Log in to purchase upgrades','i'); return; }
    const u=UPGRADES.find(x=>x.id===id);
    if(!u) return;
    pendingItem=u;
    document.getElementById('mIcon').textContent=u.icon;
    document.getElementById('mTitle').textContent=u.name;
    document.getElementById('mCost').textContent=`🪙 ${u.coins.toLocaleString()} coins`;
    document.getElementById('mNote').textContent=
      u.consumable
        ? `One-time use — activates immediately after purchase.`
        : u.duration
          ? `Active for ${u.duration} day${u.duration>1?'s':''} from purchase.`
          : `Permanent upgrade on your profile.`;
    document.getElementById('upgradeModal').classList.add('open');
  };

  window.closeModal=function(){
    document.getElementById('upgradeModal').classList.remove('open');
    pendingItem=null;
  };

  window.confirmPurchase=async function(){
    if(!pendingItem||!currentUser) return;
    const u=pendingItem;
    closeModal();

    if(!isOwner && userCoins<u.coins){
      showToast('Not enough coins!','e'); return;
    }

    try {
      // Deduct coins
      if(!isOwner && u.coins>0){
        const newCoins=userCoins-u.coins;
        const {error}=await sb.from('profiles').update({coins:newCoins}).eq('user_id',currentUser.id);
        if(error) throw error;
        userCoins=newCoins;
        document.getElementById('coinBal').textContent=userCoins.toLocaleString();
      }

      // Calc expiry
      let expiresAt=null;
      if(u.duration){
        const exp=new Date();
        exp.setDate(exp.getDate()+u.duration);
        expiresAt=exp.toISOString();
      }

      // Record ownership
      await sb.from('user_owned_items').upsert({
        user_id:currentUser.id,
        item_id:u.id,
        item_type:u.itemType,
        item_name:u.name,
        coins_paid:isOwner?0:u.coins,
        expires_at:expiresAt
      },{onConflict:'user_id,item_id'});

      // Also update profiles table for key items
      if(u.id==='badge_artist_pro'){
        await sb.from('profiles').update({
          artist_pro:true,
          artist_pro_expires:expiresAt
        }).eq('user_id',currentUser.id);
      }
      if(u.itemType==='profile_bg'){
        await sb.from('profiles').update({profile_bg:u.id}).eq('user_id',currentUser.id);
      }
      if(u.itemType==='theme'){
        await sb.from('profiles').update({ui_theme:u.id}).eq('user_id',currentUser.id);
      }

      // Log transaction
      if(!isOwner && u.coins>0){
        await sb.from('coin_transactions').insert({
          user_id:currentUser.id,
          amount:-u.coins,
          type:'upgrade_purchase',
          description:`Upgrade: ${u.name}`,
          reference_id:u.id
        });
      }

      ownedIds.add(u.id);
      showToast(`✓ ${u.name} activated!`,'s');
      renderShop();

    } catch(e){
      console.error(e);
      showToast('Error: '+(e.message||'Unknown'),'e');
    }
  };

  // ── HELPERS ──────────────────────────────────────────────────
  function showToast(msg,type){
    const t=document.getElementById('toast');
    t.textContent=msg; t.className=type; t.style.display='block';
    clearTimeout(window._tt);
    window._tt=setTimeout(()=>{ t.style.display='none'; },3000);
  }

  if(!currentUser) document.getElementById('coinBal').textContent='—';

})();
</script>
</body>
</html>
