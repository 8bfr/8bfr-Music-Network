<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Playlist — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(#0b0014,#000);color:#eae6ff;min-height:100vh;padding-bottom:90px;}
.header{background:rgba(15,0,30,.9);border-bottom:2px solid #7c3aed;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-size:1.3rem;font-weight:800;color:#7c3aed;}
.header a{color:#eae6ff;text-decoration:none;font-weight:600;font-size:.85rem;}
.container{max-width:800px;margin:0 auto;padding:1.5rem;}
.pl-header{display:flex;gap:1.25rem;align-items:flex-start;background:rgba(12,6,24,.7);border:1px solid rgba(124,58,237,.3);border-radius:16px;padding:1.5rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.pl-cover{width:140px;height:140px;border-radius:12px;background:linear-gradient(135deg,rgba(124,58,237,.4),rgba(168,85,247,.2));display:flex;align-items:center;justify-content:center;font-size:3.5rem;flex-shrink:0;overflow:hidden;position:relative;cursor:pointer;}
.pl-cover img{width:100%;height:100%;object-fit:cover;}
.pl-cover .cover-edit{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:#a855f7;opacity:0;transition:opacity .2s;}
.pl-cover:hover .cover-edit{opacity:1;}
.pl-info{flex:1;min-width:200px;}
.pl-name{font-size:1.6rem;font-weight:800;margin-bottom:.25rem;}
.pl-creator{font-size:.85rem;color:#a855f7;margin-bottom:.35rem;}
.pl-creator a{color:#a855f7;text-decoration:none;font-weight:600;}
.pl-desc{font-size:.82rem;color:rgba(234,230,255,.5);line-height:1.5;margin-bottom:.5rem;}
.pl-stats{display:flex;gap:1rem;font-size:.78rem;color:rgba(168,85,247,.5);margin-bottom:.75rem;}
.pl-actions{display:flex;gap:.4rem;flex-wrap:wrap;}
.btn{background:#7c3aed;color:#fff;border:none;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:.82rem;transition:all .2s;}
.btn:hover{background:#6d28d9;}
.btn-sm{padding:.35rem .75rem;font-size:.75rem;}
.btn-ghost{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);color:#a855f7;}
.btn-red{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#fca5a5;}
.track-list{margin-bottom:1.25rem;}
.track{display:flex;align-items:center;gap:.6rem;padding:.55rem .75rem;border-radius:10px;transition:background .15s;}
.track:hover{background:rgba(124,58,237,.08);}
.track.playing{background:rgba(124,58,237,.15);border-left:3px solid #a855f7;}
.track-num{width:22px;text-align:center;font-size:.75rem;color:rgba(168,85,247,.4);font-weight:600;flex-shrink:0;}
.track.playing .track-num{color:#a855f7;}
.track-cover{width:40px;height:40px;border-radius:6px;background:rgba(124,58,237,.15);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;overflow:hidden;cursor:pointer;}
.track-cover img{width:100%;height:100%;object-fit:cover;}
.track-info{flex:1;min-width:0;cursor:pointer;}
.track-title{font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.track-artist{font-size:.7rem;color:rgba(168,85,247,.5);}
.track-controls{display:flex;gap:.2rem;align-items:center;flex-shrink:0;}
.tc-btn{background:none;border:1px solid rgba(124,58,237,.2);color:rgba(168,85,247,.5);width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.7rem;transition:all .15s;}
.tc-btn:hover{border-color:#a855f7;color:#a855f7;}
.tc-btn.pin{color:#f59e0b;border-color:rgba(245,158,11,.3);}
.tc-btn.pin:hover{border-color:#f59e0b;}
.tc-btn.remove{color:rgba(239,68,68,.5);}
.tc-btn.remove:hover{color:#ef4444;border-color:#ef4444;}
.pinned-badge{font-size:.6rem;background:rgba(245,158,11,.15);color:#f59e0b;padding:.1rem .3rem;border-radius:4px;font-weight:700;margin-left:.3rem;}
.now-playing{position:fixed;bottom:0;left:0;right:0;background:rgba(12,4,26,.97);border-top:2px solid #7c3aed;padding:.5rem 1rem;z-index:200;backdrop-filter:blur(12px);}
.np-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;gap:.75rem;}
.np-cover{width:40px;height:40px;border-radius:6px;background:rgba(124,58,237,.2);display:flex;align-items:center;justify-content:center;font-size:1rem;overflow:hidden;flex-shrink:0;}
.np-cover img{width:100%;height:100%;object-fit:cover;}
.np-info{flex:1;min-width:0;}
.np-title{font-weight:600;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.np-artist{font-size:.68rem;color:rgba(168,85,247,.5);}
.np-controls{display:flex;gap:.5rem;align-items:center;}
.np-btn{background:none;border:none;color:#eae6ff;font-size:1.2rem;cursor:pointer;padding:.25rem;}
.np-progress{flex:1;min-width:60px;height:4px;background:rgba(124,58,237,.2);border-radius:2px;cursor:pointer;}
.np-progress-fill{height:100%;background:#7c3aed;border-radius:2px;width:0%;}
.np-time{font-size:.68rem;color:rgba(168,85,247,.4);white-space:nowrap;}
audio{display:none;}
.add-section{background:rgba(12,6,24,.7);border:1px solid rgba(124,58,237,.3);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem;}
.add-section h3{color:#a855f7;font-size:.95rem;font-weight:700;margin-bottom:.75rem;}
.search-input{width:100%;padding:.55rem .85rem;background:rgba(0,0,0,.3);border:1px solid rgba(124,58,237,.3);border-radius:8px;color:#eae6ff;font-size:.85rem;outline:none;margin-bottom:.75rem;}
.search-input:focus{border-color:#7c3aed;}
.song-browse{max-height:350px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(124,58,237,.3) transparent;}
.sb-row{display:flex;align-items:center;gap:.6rem;padding:.45rem .5rem;border-radius:6px;transition:background .15s;}
.sb-row:hover{background:rgba(124,58,237,.08);}
.sb-art{width:36px;height:36px;border-radius:6px;background:rgba(124,58,237,.15);display:flex;align-items:center;justify-content:center;font-size:.9rem;overflow:hidden;flex-shrink:0;}
.sb-art img{width:100%;height:100%;object-fit:cover;}
.sb-info{flex:1;min-width:0;}
.sb-title{font-weight:600;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-artist{font-size:.7rem;color:rgba(168,85,247,.5);}
.sb-add{background:rgba(0,255,136,.12);border:1px solid rgba(0,255,136,.3);color:#00ff88;padding:.3rem .6rem;border-radius:6px;font-size:.72rem;font-weight:700;cursor:pointer;flex-shrink:0;}
.sb-add:hover{background:rgba(0,255,136,.25);}
.sb-added{color:rgba(168,85,247,.4);font-size:.72rem;font-weight:600;flex-shrink:0;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.show{display:flex;}
.modal{background:rgba(12,6,24,.95);border:1px solid rgba(124,58,237,.3);border-radius:16px;padding:1.5rem;max-width:400px;width:100%;}
.empty{text-align:center;padding:2rem;color:rgba(168,85,247,.4);}
.spinner{width:28px;height:28px;border:3px solid rgba(124,58,237,.2);border-top-color:#a855f7;border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="header">
<a href="playlists.html">← Playlists</a>
<h1>🎶 Playlist</h1>
<div></div>
</div>
<div class="container">
<div id="loading"><div class="spinner"></div></div>
<div id="content" style="display:none;"></div>
</div>

<div class="now-playing" id="nowPlaying" style="display:none;">
<div class="np-inner">
<div class="np-cover" id="npCover">🎵</div>
<div class="np-info"><div class="np-title" id="npTitle">—</div><div class="np-artist" id="npArtist">—</div></div>
<div class="np-controls">
<button class="np-btn" onclick="prevTrack()">⏮</button>
<button class="np-btn" id="npPlayBtn" onclick="togglePlay()">▶️</button>
<button class="np-btn" onclick="nextTrack()">⏭</button>
</div>
<div class="np-progress" onclick="seekAudio(event)"><div class="np-progress-fill" id="npProgressFill"></div></div>
<span class="np-time" id="npTime">0:00</span>
</div>
<audio id="audioPlayer" preload="auto"></audio>
</div>

<div class="modal-overlay" id="coverModal" onclick="if(event.target===this)closeCoverModal()">
<div class="modal">
<h3 style="color:#a855f7;font-size:1rem;margin-bottom:.75rem;">🖼️ Set Playlist Cover</h3>
<input class="search-input" id="coverUrlInput" placeholder="Paste image URL (https://...)" style="margin-bottom:.5rem;">
<div style="font-size:.72rem;color:rgba(168,85,247,.4);margin-bottom:.75rem;">Upload your image at <a href="https://imgbb.com" target="_blank" style="color:#a855f7;">imgbb.com</a> and paste the URL here.</div>
<div style="display:flex;gap:.5rem;">
<button class="btn btn-ghost" onclick="closeCoverModal()">Cancel</button>
<button class="btn" onclick="saveCover()">Save Cover</button>
</div>
</div>
</div>

<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');

var currentUser=null,playlist=null,tracks=[],allSongs=[],currentTrackIdx=-1,isPlaying=false,isOwner=false;
var audio=document.getElementById('audioPlayer');

audio.addEventListener('ended',function(){nextTrack();});
audio.addEventListener('timeupdate',function(){
  if(!audio.duration)return;
  var fill=document.getElementById('npProgressFill');
  if(fill)fill.style.width=(audio.currentTime/audio.duration*100)+'%';
  var t=document.getElementById('npTime');
  if(t)t.textContent=fmtTime(audio.currentTime)+' / '+fmtTime(audio.duration);
});

function fmtTime(s){if(!s||isNaN(s))return'0:00';return Math.floor(s/60)+':'+(Math.floor(s%60)<10?'0':'')+Math.floor(s%60);}
function seekAudio(e){var bar=e.currentTarget;if(audio.duration)audio.currentTime=(e.offsetX/bar.offsetWidth)*audio.duration;}

async function init(){
  var params=new URLSearchParams(location.search);
  var plId=params.get('id');
  if(!plId){document.getElementById('loading').innerHTML='<div class="empty">No playlist specified. <a href="playlists.html" style="color:#a855f7;">Browse playlists</a></div>';return;}

  try{var sess=await db.auth.getSession();currentUser=sess.data.session?sess.data.session.user:null;}catch(e){}

  var plRes=await db.from('playlists').select('*').eq('id',plId).single();
  if(plRes.error||!plRes.data){document.getElementById('loading').innerHTML='<div class="empty">Playlist not found. <a href="playlists.html" style="color:#a855f7;">Browse playlists</a></div>';return;}
  playlist=plRes.data;

  var creatorRes=await db.from('profiles').select('username,display_name').eq('user_id',playlist.user_id).single();
  var creator=creatorRes.data;

  var trackRes=await db.from('playlist_tracks').select('id,song_id,position').eq('playlist_id',plId).order('position');
  var songIds=(trackRes.data||[]).map(function(t){return t.song_id;}).filter(Boolean);

  if(songIds.length){
    var songRes=await db.from('songs').select('id,title,artist,cover_art,song_url,explicit').in('id',songIds);
    var songMap={};(songRes.data||[]).forEach(function(s){songMap[s.id]=s;});
    tracks=(trackRes.data||[]).map(function(t){return{id:t.id,song_id:t.song_id,position:t.position,song:songMap[t.song_id]||null};}).filter(function(t){return t.song;});
  }

  tracks.sort(function(a,b){return(a.position||0)-(b.position||0);});

  isOwner=currentUser&&playlist.user_id===currentUser.id;
  document.getElementById('loading').style.display='none';
  var el=document.getElementById('content');
  el.style.display='block';

  renderPage(creator);

  // Pre-load all songs for the add section
  if(isOwner){
    var allRes=await db.from('songs').select('id,title,artist,cover_art').or('is_beat.is.null,is_beat.eq.false').not('song_url','is',null).neq('song_url','').order('created_at',{ascending:false}).limit(200);
    allSongs=allRes.data||[];
    renderSongBrowser('');
  }
}

function renderPage(creator){
  var el=document.getElementById('content');
  var coverImg=playlist.cover_url?'<img src="'+esc(playlist.cover_url)+'">':'🎶';
  var creatorName=creator?(creator.display_name||creator.username):'Unknown';

  var h='<div class="pl-header">';
  if(isOwner){
    h+='<div class="pl-cover" onclick="openCoverModal()">'+coverImg+'<div class="cover-edit">📷 Change</div></div>';
  }else{
    h+='<div class="pl-cover" style="cursor:default;">'+coverImg+'</div>';
  }
  h+='<div class="pl-info">';
  h+='<div class="pl-name">'+esc(playlist.name||'Untitled Playlist')+'</div>';
  h+='<div class="pl-creator">by <a href="profile.html?id='+playlist.user_id+'">'+esc(creatorName)+'</a></div>';
  if(playlist.description)h+='<div class="pl-desc">'+esc(playlist.description)+'</div>';
  h+='<div class="pl-stats"><span>🎵 '+tracks.length+' tracks</span><span>'+(playlist.is_public===false?'🔒 Private':'🌐 Public')+'</span></div>';
  h+='<div class="pl-actions">';
  if(tracks.length)h+='<button class="btn" onclick="playAll()">▶️ Play All</button><button class="btn btn-ghost" onclick="shufflePlay()">🔀 Shuffle</button>';
  if(isOwner)h+='<button class="btn btn-ghost" onclick="toggleAddSection()">+ Add Songs</button><button class="btn btn-red btn-sm" onclick="deletePlaylist()">🗑️</button>';
  h+='</div></div></div>';

  // Track list
  h+='<div class="track-list" id="trackList">';
  if(!tracks.length){
    h+='<div class="empty">No tracks yet.'+(isOwner?' Click "Add Songs" to get started!':'')+'</div>';
  }else{
    tracks.forEach(function(t,i){
      var s=t.song;
      var cv=s.cover_art?'<img src="'+esc(s.cover_art)+'">':'🎵';
      h+='<div class="track" id="track-'+i+'">';
      h+='<div class="track-num">'+(i+1)+'</div>';
      h+='<div class="track-cover" onclick="playTrack('+i+')">'+cv+'</div>';
      h+='<div class="track-info" onclick="playTrack('+i+')"><div class="track-title">'+esc(s.title||'Untitled')+(s.explicit?' 🔞':'')+'</div><div class="track-artist">'+esc(s.artist||'')+'</div></div>';
      if(isOwner){
        h+='<div class="track-controls">';
        if(i>0)h+='<button class="tc-btn" onclick="moveTrack('+i+',-1)" title="Move up">▲</button>';
        else h+='<button class="tc-btn" style="opacity:.2;cursor:default;">▲</button>';
        if(i<tracks.length-1)h+='<button class="tc-btn" onclick="moveTrack('+i+',1)" title="Move down">▼</button>';
        else h+='<button class="tc-btn" style="opacity:.2;cursor:default;">▼</button>';
        h+='<button class="tc-btn remove" onclick="removeTrack(\''+t.id+'\','+i+')" title="Remove">✕</button>';
        h+='</div>';
      }
      h+='</div>';
    });
  }
  h+='</div>';

  // Add songs section
  if(isOwner){
    h+='<div class="add-section" id="addSection" style="display:none;">';
    h+='<h3>🎵 Add Songs</h3>';
    h+='<input class="search-input" type="text" id="songSearch" placeholder="🔍 Filter songs..." oninput="renderSongBrowser(this.value)">';
    h+='<div class="song-browse" id="songBrowse"></div>';
    h+='</div>';
  }

  el.innerHTML=h;
}

function renderSongBrowser(query){
  var box=document.getElementById('songBrowse');
  if(!box)return;
  var q=(query||'').toLowerCase();
  var existing=tracks.map(function(t){return t.song_id;});

  var filtered=allSongs.filter(function(s){
    if(!q)return true;
    return(s.title||'').toLowerCase().indexOf(q)!==-1||(s.artist||'').toLowerCase().indexOf(q)!==-1;
  });

  if(!filtered.length){box.innerHTML='<p style="font-size:.78rem;color:rgba(168,85,247,.4);padding:.5rem;">No songs found.</p>';return;}

  box.innerHTML=filtered.map(function(s){
    var cv=s.cover_art?'<img src="'+esc(s.cover_art)+'">':'🎵';
    var inList=existing.indexOf(s.id)!==-1;
    var addBtn=inList?'<span class="sb-added">✓ Added</span>':'<button class="sb-add" onclick="event.stopPropagation();addSong(\''+s.id+'\',\''+esc(s.title||'').replace(/'/g,'')+'\',this)">+ Add</button>';
    return '<div class="sb-row"><div class="sb-art">'+cv+'</div><div class="sb-info"><div class="sb-title">'+esc(s.title)+'</div><div class="sb-artist">'+esc(s.artist||'')+'</div></div>'+addBtn+'</div>';
  }).join('');
}

// ── PLAYBACK ──
function playTrack(idx){
  if(idx<0||idx>=tracks.length)return;
  currentTrackIdx=idx;
  var s=tracks[idx].song;
  if(!s.song_url){alert('No audio file for this track.');return;}
  audio.src=s.song_url;
  audio.load();
  audio.play().then(function(){isPlaying=true;document.getElementById('npPlayBtn').textContent='⏸️';}).catch(function(){});
  document.getElementById('nowPlaying').style.display='block';
  document.getElementById('npTitle').textContent=s.title||'Untitled';
  document.getElementById('npArtist').textContent=s.artist||'';
  document.getElementById('npCover').innerHTML=s.cover_art?'<img src="'+esc(s.cover_art)+'">':'🎵';
  document.querySelectorAll('.track').forEach(function(el,i){el.classList.toggle('playing',i===idx);});
}

function togglePlay(){
  if(isPlaying){audio.pause();isPlaying=false;document.getElementById('npPlayBtn').textContent='▶️';}
  else{audio.play().then(function(){isPlaying=true;document.getElementById('npPlayBtn').textContent='⏸️';}).catch(function(){});}
}
function nextTrack(){if(currentTrackIdx<tracks.length-1)playTrack(currentTrackIdx+1);else{isPlaying=false;document.getElementById('npPlayBtn').textContent='▶️';}}
function prevTrack(){if(audio.currentTime>3){audio.currentTime=0;return;}if(currentTrackIdx>0)playTrack(currentTrackIdx-1);}
function playAll(){if(tracks.length)playTrack(0);}
function shufflePlay(){if(tracks.length)playTrack(Math.floor(Math.random()*tracks.length));}

// ── ADD SONG ──
window.toggleAddSection=function(){
  var el=document.getElementById('addSection');
  if(el)el.style.display=el.style.display==='none'?'block':'none';
};

window.addSong=async function(songId,title,btn){
  btn.disabled=true;btn.textContent='Adding...';
  var nextPos=tracks.length;
  try{
    var ins=await db.from('playlist_tracks').insert({playlist_id:playlist.id,song_id:songId,position:nextPos});
    if(ins.error){
      if(ins.error.message.indexOf('duplicate')!==-1||ins.error.message.indexOf('unique')!==-1){btn.textContent='✓ Already';return;}
      throw ins.error;
    }
    btn.outerHTML='<span class="sb-added">✓ Added</span>';
    await db.from('playlists').update({track_count:nextPos+1}).eq('id',playlist.id);
    location.reload();
  }catch(e){btn.textContent='Error';alert(e.message);}
};

// ── REMOVE TRACK ──
window.removeTrack=async function(trackRowId,idx){
  if(!confirm('Remove this track?'))return;
  try{
    await db.from('playlist_tracks').delete().eq('id',trackRowId);
    tracks.splice(idx,1);
    for(var i=0;i<tracks.length;i++){
      await db.from('playlist_tracks').update({position:i}).eq('id',tracks[i].id);
    }
    await db.from('playlists').update({track_count:tracks.length}).eq('id',playlist.id);
    location.reload();
  }catch(e){alert(e.message);}
};

// ── MOVE TRACK ──
window.moveTrack=async function(idx,dir){
  var newIdx=idx+dir;
  if(newIdx<0||newIdx>=tracks.length)return;
  var temp=tracks[idx];tracks[idx]=tracks[newIdx];tracks[newIdx]=temp;
  try{
    await db.from('playlist_tracks').update({position:idx}).eq('id',tracks[idx].id);
    await db.from('playlist_tracks').update({position:newIdx}).eq('id',tracks[newIdx].id);
    location.reload();
  }catch(e){alert(e.message);}
};

// ── CUSTOM COVER ──
window.openCoverModal=function(){document.getElementById('coverModal').classList.add('show');};
window.closeCoverModal=function(){document.getElementById('coverModal').classList.remove('show');};
window.saveCover=async function(){
  var url=(document.getElementById('coverUrlInput').value||'').trim();
  if(!url){alert('Enter an image URL.');return;}
  try{
    await db.from('playlists').update({cover_url:url}).eq('id',playlist.id);
    closeCoverModal();
    location.reload();
  }catch(e){alert(e.message);}
};

// ── DELETE PLAYLIST ──
window.deletePlaylist=async function(){
  if(!confirm('Delete this entire playlist? This cannot be undone.'))return;
  try{
    await db.from('playlist_tracks').delete().eq('playlist_id',playlist.id);
    await db.from('playlists').delete().eq('id',playlist.id);
    location.href='playlists.html';
  }catch(e){alert(e.message);}
};

function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
</body>
</html>
