<!-- Remove the Tailwind CDN script and add this style block instead -->
<style>
/* Reset-ish */
* { box-sizing: border-box; }
html,body { height:100%; margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; color:#0f172a; background:#fff; }

/* Layout utilities (small subset similar to Tailwind) */
.container { max-width: 1024px; margin-left: auto; margin-right: auto; padding-left: 1rem; padding-right: 1rem; }
.mx-auto { margin-left: auto; margin-right: auto; }
.p-4 { padding: 1rem; }
.p-2 { padding: 0.5rem; }
.mt-2 { margin-top: 0.5rem; }
.mt-4 { margin-top: 1rem; }
.mb-2 { margin-bottom: 0.5rem; }
.flex { display:flex; }
.items-center { align-items:center; }
.justify-between { justify-content:space-between; }
.flex-col { flex-direction:column; }
.grid { display:grid; }

/* Text utilities */
.text-center { text-align:center; }
.text-sm { font-size:0.875rem; }
.text-base { font-size:1rem; }
.font-medium { font-weight:500; }

/* Basic colors */
.bg-white { background:#ffffff; }
.bg-gray-50 { background:#f9fafb; }
.text-gray-600 { color:#4b5563; }

/* Button base */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.5rem 0.875rem;
  font-size: 0.9375rem;
  line-height: 1;
  border-radius: 0.5rem;
  border: 1px solid transparent;
  cursor: pointer;
  user-select: none;
  transition: background-color 150ms ease, transform 120ms ease, box-shadow 150ms ease;
  text-decoration: none;
  color: #0f172a;
  background: #eef2ff; /* light default */
}

/* Primary button */
.btn-primary {
  background: #2563eb; /* blue-600 */
  color: #ffffff;
  border-color: rgba(37,99,235,0.9);
  box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 4px 14px rgba(37,99,235,0.12);
}
.btn-primary:hover { background: #1e40af; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); box-shadow: none; }
.btn-primary:focus { outline: 3px solid rgba(37,99,235,0.18); outline-offset: 2px; }

/* Secondary */
.btn-secondary {
  background: #f3f4f6; /* gray-100 */
  color: #111827;
  border-color: #e5e7eb;
}
.btn-secondary:hover { background: #e9ecef; transform: translateY(-1px); }

/* Ghost (no bg) */
.btn-ghost {
  background: transparent;
  color: #2563eb;
  border-color: transparent;
}
.btn-ghost:hover { background: rgba(37,99,235,0.06); }

/* Danger */
.btn-danger {
  background: #ef4444; /* red-500 */
  color: #fff;
  border-color: rgba(239,68,68,0.9);
}
.btn-danger:hover { background: #dc2626; transform: translateY(-1px); }

/* Sizes */
.btn-sm { padding: 0.25rem 0.5rem; font-size:0.8125rem; border-radius:0.375rem; }
.btn-lg { padding: 0.75rem 1.25rem; font-size:1rem; border-radius:0.625rem; }

/* Icon placeholder (if using inline svgs) */
.icon { width:1em; height:1em; display:inline-block; vertical-align:middle; }

/* Disabled */
.btn[disabled], .btn.disabled {
  opacity: 0.5;
  pointer-events: none;
  transform: none;
  box-shadow: none;
}

/* Small card / panel */
.card {
  background: #ffffff;
  border: 1px solid #e6edf3;
  border-radius: 0.75rem;
  padding: 1rem;
  box-shadow: 0 6px 18px rgba(15,23,42,0.04);
}

/* Simple responsive helper */
@media (max-width:640px) {
  .container { padding-left: 0.75rem; padding-right: 0.75rem; }
  .btn { width: 100%; justify-content:center; }
  .btn-inline { display:inline-flex; width:auto; }
}
</style>
