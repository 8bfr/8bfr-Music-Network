<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>8bfr Music Network - Debug</title>
  <style>
    /* Existing styles */

    .button {
      width: 100%;
      background-color: #1E90FF;
      color: white;
      padding: 0.75rem;
      border-radius: 0.25rem;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-bottom: 1rem;
    }
    
    .button span {
      display: inline-block;
    }
    
    .button:hover {
      background-color: #0077CC;
    }

    body {
      background-color: #333;
      color: white;
      font-family: sans-serif;
      padding: 2rem;
    }
    
    h1 {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 1rem;
    }
    
    p {
      font-size: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .container {
      background-color: #444;
      padding: 1.5rem;
      border-radius: 0.5rem;
      margin-bottom: 2rem;
    }
    
    h2 {
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 1rem;
    }
    
    ul {
      list-style: none;
      padding: 0;
    }
    
    li {
      margin-bottom: 0.5rem;
    }
    
    .green {
      color: #32CD32;
    }
    
    .red {
      color: #FF6347;
    }
    
    .yellow {
      color: #FFD700;
    }
    
    .blue {
      color: #1E90FF;
    }
    
    .input {
      width: 100%;
      padding: 0.75rem;
      border-radius: 0.25rem;
      background-color: #555;
      border: 1px solid #666;
      color: white;
      margin-bottom: 1rem;
    }
    
    /* Additional styles for login form */
    .login-form {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
    }

    .login-form div {
      margin-bottom: 1rem;
    }

    .login-form label {
      margin-bottom: 0.5rem;
    }

  </style>
</head>
<body>
  <h1>8bfr Network - Debug Mode</h1>
  <p>If you can see this, the HTML is loading correctly!</p>
  
  <div class="container">
    <h2>Status Check:</h2>
    <ul id="checks">
      <li>⏳ Checking JavaScript...</li>
    </ul>
  </div>

  <div id="app" class="container"></div>

  <script>
    console.log('✅ JavaScript is running!');
    
    const checks = document.getElementById('checks');
    checks.innerHTML = '<li class="green">✅ JavaScript is running!</li>';
    
    // Test API URL
    const API_URL = 'https://qjzcoybmcrmonzjctama.supabase.co';
    const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqemNveWJtY3Jtb256amN0YW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk3MjQyNTEsImV4cCI6MjA3NTMwMDI1MX0.tYckuJJLCYr6hMpHCncArhQAGPQk8drsg5EG101fHYY';
    
    checks.innerHTML += '<li class="green">✅ API_URL is set: ' + API_URL + '</li>';
    
    // Test if we can reach Supabase
    fetch(API_URL + '/rest/v1/', {
      method: 'GET',
      headers: {
        'apikey': API_KEY
      }
    })
    .then(response => {
      checks.innerHTML += '<li class="green">✅ Supabase is reachable! Status: ' + response.status + '</li>';
      return response;
    })
    .catch(error => {
      checks.innerHTML += '<li class="red">❌ Cannot reach Supabase: ' + error.message + '</li>';
      checks.innerHTML += '<li class="yellow">⚠️ This might be a CORS issue. Check Supabase CORS settings.</li>';
    });
    
    // Now try to render the actual app
    setTimeout(() => {
      checks.innerHTML += '<li class="blue">🔄 Attempting to render app...</li>';
      
      try {
        document.getElementById('app').innerHTML = `
          <h2>Login Form Test</h2>
          <div class="login-form">
            <div>
              <label>Email</label>
              <input type="email" id="email" class="input" placeholder="test@example.com">
            </div>
            <div>
              <label>Password</label>
              <input type="password" id="pass" class="input" placeholder="password">
            </div>
            <button onclick="testLogin()" class="button">
              <span>Test Login</span>
            </button>
          </div>
        `;
        checks.innerHTML += '<li class="green">✅ App UI rendered successfully!</li>';
      } catch (e) {
        checks.innerHTML += '<li class="red">❌ Error rendering UI: ' + e.message + '</li>';
      }
    }, 1000);
    
    window.testLogin = async function() {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('pass').value;
      
      alert('Testing login with: ' + email);
      console.log('Login attempt:', email);
      
      try {
        const response = await fetch(API_URL + '/auth/v1/token?grant_type=password', {
          method: 'POST',
          headers: {
            'apikey': API_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email: email, password: pass })
        });
        
        const data = await response.json();
        console.log('Login response:', data);
        
        if (data.access_token) {
          alert('✅ Login successful! Token: ' + data.access_token.substring(0, 20) + '...');
        } else {
          alert('❌ Login failed: ' + (data.error_description || JSON.stringify(data)));
        }
      } catch (error) {
        alert('❌ Error: ' + error.message);
        console.error(error);
      }
    };
  </script>
</body>
</html>
