<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>8bfr Network</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
  <div id="notice" class="p-4 text-center"></div>
  <div id="app"></div>

  <script>
    // IMPORTANT: Replace with your project's anon/public API key before publishing.
    const API_URL = ''https://qjzcoybmcrmonzjctama.supabase.co'
    const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqemNveWJtY3Jtb256amN0YW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk3MjQyNTEsImV4cCI6MjA3NTMwMDI1MX0.tYckuJJLCYr6hMpHCncArhQAGPQk8drsg5EG101fHYY';

    // The origin you will host the site on (GitHub Pages)
    const SITE_ORIGIN = 'https://8bfr.github.io';

    // Friendly notice if the app is not hosted from expected origin
    (function checkOrigin() {
      const noticeEl = document.getElementById('notice');
      const origin = window.location.origin;
      if (origin === 'null' || origin === 'file:' ) {
        noticeEl.innerHTML = '<div class="max-w-4xl mx-auto bg-yellow-600 text-black rounded p-3 font-semibold">Running locally (file://). For auth to work when deployed, add your hosting origin to Supabase Allowed Redirect URLs.</div>';
      } else if (!origin.startsWith(SITE_ORIGIN) && origin !== 'http://localhost:5173' && origin !== 'http://localhost') {
        noticeEl.innerHTML = '<div class="max-w-4xl mx-auto bg-red-600 text-white rounded p-3 font-semibold">Warning: current origin <strong>' + origin + '</strong> does not match the expected site origin <strong>' + SITE_ORIGIN + '</strong>. Be sure to add this origin to Supabase Auth Allowed Redirect URLs and Allowed Origins.</div>';
      } else {
        noticeEl.innerHTML = '';
      }
    })();

    // Basic app state
    window.app = {
      dark: true,
      page: 'login',
      user: null,
      owner: false,
      posts: [],
      mode: 'login',
      modal: false,
      type: 'text',
      token: null
    };

    async function api(url, method = 'GET', data = null) {
      const headers = {
        'apikey': API_KEY,
        'Content-Type': 'application/json'
      };
      if (window.app.token) headers['Authorization'] = `Bearer ${window.app.token}`;
      const opts = { method, headers };
      if (data) opts.body = JSON.stringify(data);
      const res = await fetch(API_URL + url, opts);
      // return parsed json or throw if network failed
      try {
        return await res.json();
      } catch (e) {
        throw new Error('Network/JSON error: ' + e.message);
      }
    }

    window.doLogin = async function () {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('pass').value;

      try {
        // password grant
        const data = await api('/auth/v1/token?grant_type=password', 'POST', { email, password: pass });

        if (data.access_token) {
          window.app.token = data.access_token;
          window.app.user = data.user;
          window.app.owner = email === '8bfr.music@gmail.com';
          window.app.page = 'home';
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('user', JSON.stringify(data.user));
          await getPosts();
          draw();
        } else {
          alert('Login failed: ' + (data.error_description || data.msg || JSON.stringify(data)));
        }
      } catch (error) {
        alert('Login error: ' + error.message + '\\n\\nCheck browser console for network/CORS errors and ensure your GitHub Pages origin is added to Supabase Allowed Origins.');
        console.error(error);
      }
    };

    window.doSignup = async function () {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('pass').value;
      const name = document.getElementById('name') ? document.getElementById('name').value : '';

      try {
        const data = await api('/auth/v1/signup', 'POST', { email, password: pass, data: { username: name } });
        if (data.id) {
          await api('/rest/v1/profiles', 'POST', { id: data.id, username: name, email });
          alert('Account created! Please log in.');
          window.app.mode = 'login';
          draw();
        } else {
          alert('Signup failed: ' + (data.error_description || data.msg || JSON.stringify(data)));
        }
      } catch (error) {
        alert('Signup error: ' + error.message);
        console.error(error);
      }
    };

    window.doLogout = function () {
      localStorage.clear();
      window.app.token = null;
      window.app.user = null;
      window.app.owner = false;
      window.app.page = 'login';
      window.app.posts = [];
      draw();
    };

    async function getPosts () {
      try {
        const data = await api('/rest/v1/posts?select=*,profiles:user_id(username)&order=created_at.desc');
        if (Array.isArray(data)) {
          window.app.posts = data;
          draw();
        } else {
          console.warn('Unexpected posts response', data);
        }
      } catch (e) {
        console.error('Failed to load posts', e);
      }
    }

    window.doPost = async function () {
      const txt = document.getElementById('txt').value;
      if (!txt || !txt.trim()) return;
      try {
        await api('/rest/v1/posts', 'POST', { user_id: window.app.user.id, content: txt, post_type: window.app.type });
        window.app.modal = false;
        await getPosts();
      } catch (e) {
        console.error('Post failed', e);
        alert('Post failed: ' + e.message);
      }
    };

    function init () {
      const token = localStorage.getItem('token');
      const user = localStorage.getItem('user');
      if (token && user) {
        window.app.token = token;
        window.app.user = JSON.parse(user);
        window.app.owner = window.app.user.email === '8bfr.music@gmail.com';
        window.app.page = 'home';
        getPosts();
      }
      document.addEventListener('click', e => {
        const act = e.target.getAttribute('data-act');
        if (!act) return;
        if (act === 'dark') {
          window.app.dark = !window.app.dark;
          document.body.className = window.app.dark ? 'bg-gray-900 text-white' : 'bg-gray-50 text-gray-900';
          draw();
        }
        if (act === 'switch') {
          window.app.mode = window.app.mode === 'login' ? 'signup' : 'login';
          draw();
        }
        if (act === 'page') {
          window.app.page = e.target.getAttribute('data-val');
          draw();
        }
        if (act === 'create') {
          window.app.modal = true;
          draw();
        }
        if (act === 'close') {
          window.app.modal = false;
          draw();
        }
        if (act === 'type') {
          window.app.type = e.target.getAttribute('data-val');
          draw();
        }
      });
      draw();
    }

    function draw () {
      const bg = window.app.dark ? 'bg-gray-900' : 'bg-gray-50';
      const bg2 = window.app.dark ? 'bg-gray-800' : 'bg-white';
      const txt = window.app.dark ? 'text-white' : 'text-gray-900';
      const txt2 = window.app.dark ? 'text-gray-400' : 'text-gray-600';
      const br = window.app.dark ? 'border-gray-700' : 'border-gray-200';

      if (window.app.page === 'login') {
        document.getElementById('app').innerHTML = `
          <div class="min-h-screen ${bg} ${txt} flex items-center justify-center p-4">
            <div class="max-w-6xl w-full grid md:grid-cols-2 gap-20">
              <div class="flex flex-col justify-center space-y-16">
                <div class="flex items-center space-x-3">
                  <svg class="w-14 h-14 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                  <h1 class="text-5xl font-bold">8bfr Network</h1>
                </div>
                <p class="text-2xl ${txt2} leading-relaxed">The professional social network for the music industry. Connect, collaborate, and create.</p>
                <div class="${bg2} p-12 rounded-3xl border ${br} text-center shadow-2xl">
                  <svg class="w-24 h-24 mx-auto mb-8 text-green-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3"/></svg>
                  <h3 class="text-3xl font-bold mb-4 ${txt}">Listen on Spotify</h3>
                  <p class="${txt2} mb-8 text-xl">Check out 8bfr's latest music</p>
                  <a href="https://open.spotify.com/artist/127tw52iDXr7BvgB0IGG2x" target="_blank" class="inline-block bg-green-500 text-white px-10 py-5 rounded-full font-bold text-xl hover:bg-green-600 transition transform hover:scale-105">Open Spotify</a>
                </div>

                <a href="https://www.paypal.com/donate/?business=8bfr.music@gmail.com&item_name=Support+8bfr+Network&currency_code=USD" target="_blank" class="block w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-xl hover:bg-blue-700 transition text-center transform hover:scale-105 shadow-xl">
                  ❤️ Support via PayPal
                </a>
              </div>

              <div class="${bg2} p-10 rounded-3xl border ${br} shadow-2xl">
                <div class="flex justify-between items-center mb-10">
                  <h2 class="text-4xl font-bold">${window.app.mode === 'login' ? 'Welcome Back' : 'Join Network'}</h2>
                  <button data-act="dark" class="p-3 rounded-xl ${txt2} hover:bg-gray-700 text-3xl transition">${window.app.dark ? '☀️' : '🌙'}</button>
                </div>
                <div class="space-y-6">
                  ${window.app.mode === 'signup' ? `<div><label class="block text-base font-medium mb-3 ${txt2}">Username</label><input type="text" id="name" class="w-full px-5 py-4 rounded-xl ${bg} border ${br} focus:ring-2 focus:ring-blue-500 outline-none ${txt} text-lg" required /></div>` : ''}
                  <div><label class="block text-base font-medium mb-3 ${txt2}">Email</label><input type="email" id="email" class="w-full px-5 py-4 rounded-xl ${bg} border ${br} focus:ring-2 focus:ring-blue-500 outline-none ${txt} text-lg" required /></div>
                  <div><label class="block text-base font-medium mb-3 ${txt2}">Password</label><input type="password" id="pass" class="w-full px-5 py-4 rounded-xl ${bg} border ${br} focus:ring-2 focus:ring-blue-500 outline-none ${txt} text-lg" required /></div>
                  <button onclick="${window.app.mode === 'login' ? 'doLogin()' : 'doSignup()'}" class="w-full bg-blue-600 text-white py-5 rounded-xl font-bold text-xl hover:bg-blue-700 transition transform hover:scale-105 shadow-lg">${window.app.mode === 'login' ? 'Sign In' : 'Sign Up'}</button>
                </div>
                <div class="mt-10 text-center"><button data-act="switch" class="${txt2} hover:text-blue-500 transition text-lg font-medium">${window.app.mode === 'login' ? "Don't have an account? Sign up" : 'Already have an account? Sign in'}</button></div>
              </div>
            </div>
          </div>
        `;
      } else {
        document.getElementById('app').innerHTML = `
          <div class="min-h-screen ${bg} ${txt}">
            <nav class="${bg2} border-b ${br} sticky top-0 z-50 shadow-lg">
              <div class="max-w-7xl mx-auto px-6"><div class="flex items-center justify-between h-20">
                <div class="flex items-center space-x-4">
                  <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                  <span class="text-2xl font-bold">8bfr</span>
                  ${window.app.owner ? '<span class="bg-green-600 text-xs px-3 py-1 rounded-full font-semibold">OWNER</span>' : ''}
                </div>

                <div class="flex items-center space-x-4">
                  <button data-act="page" data-val="home" class="px-4 py-2 rounded-lg ${txt2} hover:bg-gray-700">Home</button>
                  <button data-act="create" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700">Create</button>
                  <button onclick="window.doLogout()" class="px-4 py-2 rounded-lg ${txt2} hover:bg-gray-700">Logout</button>
                </div>
              </div></div>
            </nav>

            <main class="max-w-5xl mx-auto p-6">
              <section class="mt-8">
                <div class="flex items-center justify-between mb-6">
                  <h2 class="text-3xl font-bold">Feed</h2>
                  <div class="${txt2}">Signed in as ${window.app.user ? window.app.user.email : 'Guest'}</div>
                </div>

                <div id="posts" class="space-y-6">
                  ${window.app.posts.map(post => {
                    const uname = post.profiles ? post.profiles.username : 'Unknown';
                    return `
                      <article class="${bg2} p-6 rounded-2xl border ${br}">
                        <div class="flex items-start space-x-4">
                          <div class="w-12 h-12 rounded-full bg-gray-600 flex items-center justify-center font-bold text-xl">${(uname||'U').charAt(0).toUpperCase()}</div>
                          <div>
                            <div class="flex items-center space-x-3">
                              <div class="font-semibold">${uname}</div>
                              <div class="${txt2} text-sm">${new Date(post.created_at).toLocaleString()}</div>
                            </div>
                            <div class="mt-3 ${txt2}">${(post.content || '').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
                          </div>
                        </div>
                      </article>
                    `;
                  }).join('')}
                </div>
              </section>
            </main>

            ${window.app.modal ? `
              <div class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50">
                <div class="w-11/12 max-w-2xl ${bg2} p-6 rounded-2xl border ${br}">
                  <div class="flex justify-between items-center mb-4">
                    <h3 class="text-2xl font-bold">Create Post</h3>
                    <button data-act="close" class="${txt2}">Close</button>
                  </div>
                  <div class="space-y-4">
                    <textarea id="txt" rows="6" class="w-full p-4 rounded-xl ${bg} border ${br} ${txt}" placeholder="What's on your mind?"></textarea>
                    <div class="flex items-center space-x-3">
                      <button data-act="type" data-val="text" class="px-4 py-2 rounded-lg ${window.app.type==='text' ? 'bg-blue-600 text-white' : txt2}">Text</button>
                      <button data-act="type" data-val="link" class="px-4 py-2 rounded-lg ${window.app.type==='link' ? 'bg-blue-600 text-white' : txt2}">Link</button>
                      <button onclick="window.doPost()" class="ml-auto px-6 py-3 rounded-xl bg-green-600 hover:bg-green-700">Post</button>
                    </div>
                  </div>
                </div>
              </div>
            `: ''}

          </div>
        `;
      }
    }

    // Initialize after script loads
    init();
  </script>
</body>
</html>
