
<!doctype html>
<html>
<head><meta charset="utf-8"><title>Logging out…</title></head>
<body>
<h2 style="text-align:center;margin-top:50px;">Logging out...</h2>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  setTimeout(() => {
    if (typeof window.supabase === 'undefined') {
      document.body.innerHTML = '<h2 style="text-align:center;color:red;">Library failed to load. Clearing session manually...</h2>';
      // Clear session manually
      localStorage.clear();
      sessionStorage.clear();
      setTimeout(() => window.location.href = '/', 1000);
      return;
    }
    
    const supabase = window.supabase.createClient(
      'https://novbuvwpjnxwwvdekjhr.supabase.co',
      'sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f'
    );
    
    supabase.auth.signOut().then(() => {
      window.location.href = 'index.html';
    });
  }, 500);
</script>
</body>
</html>
