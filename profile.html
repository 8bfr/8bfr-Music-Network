<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Profile - 8BFR Music Network</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{padding-bottom:80px;background:linear-gradient(#0b0014,#000);color:#eae6ff;font-family:system-ui,-apple-system,sans-serif;}
    .profile-header{background:rgba(12,6,24,0.85);border:1px solid rgba(124,58,237,0.35);border-radius:16px;padding:0;margin-bottom:1.5rem;position:relative;overflow:hidden;}
    .cover-banner{width:100%;height:140px;background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(168,85,247,0.1));overflow:hidden;}
    .cover-banner img{width:100%;height:100%;object-fit:cover;}
    .profile-header-inner{padding:0 2rem 2rem 2rem;margin-top:-55px;position:relative;z-index:1;}
    .avatar-ring{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:2.8rem;flex-shrink:0;overflow:hidden;border:4px solid #0b0014;}
    .avatar-ring img{width:100%;height:100%;object-fit:cover;}
    .badge{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.4);color:#a855f7;padding:0.3rem 0.75rem;border-radius:20px;font-size:0.78rem;font-weight:600;display:inline-block;margin:0.2rem;}
    .badge.verified{border-color:#00d9ff;color:#00d9ff;background:rgba(0,217,255,0.08);}
    .badge.owner{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,0.08);}
    .card{background:rgba(12,6,24,0.7);border:1px solid rgba(124,58,237,0.3);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;}
    .card h2{color:#a855f7;margin-bottom:1rem;font-size:1.1rem;font-weight:700;}
    .form-group{margin-bottom:1.25rem;}
    .form-group label{display:block;margin-bottom:0.4rem;font-size:0.88rem;font-weight:600;color:rgba(234,230,255,0.75);}
    .form-input{width:100%;padding:0.7rem 0.9rem;background:rgba(12,0,25,0.9);border:1px solid rgba(124,58,237,0.35);border-radius:8px;color:#eae6ff;font-size:0.93rem;box-sizing:border-box;}
    .form-input:focus{outline:none;border-color:#a855f7;}
    .btn{background:#7c3aed;color:white;border:none;padding:0.7rem 1.5rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem;transition:all 0.2s;}
    .btn:hover{background:#6d28d9;} .btn:disabled{opacity:0.5;cursor:not-allowed;}
    .btn-green{background:#059669;} .btn-green:hover{background:#047857;}
    .btn-red{background:#dc2626;} .btn-red:hover{background:#b91c1c;}
    .song-row{display:flex;align-items:center;gap:0.75rem;background:rgba(0,0,0,0.3);border:1px solid rgba(124,58,237,0.2);border-radius:10px;padding:0.85rem 1rem;margin-bottom:0.6rem;}
    .song-cover{width:46px;height:46px;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;overflow:hidden;}
    .song-cover img{width:100%;height:100%;object-fit:cover;}
    .song-info{flex:1;min-width:0;}
    .song-title{font-weight:700;font-size:0.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .song-meta{font-size:0.78rem;color:rgba(168,85,247,0.7);margin-top:0.1rem;}
    .upload-zone{border:2px dashed rgba(124,58,237,0.4);border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:all 0.2s;}
    .upload-zone:hover{border-color:#a855f7;background:rgba(124,58,237,0.06);}
    .upload-zone input[type=file]{display:none;}
    .spinner{width:32px;height:32px;border-radius:50%;border:3px solid rgba(168,85,247,0.2);border-top-color:#a855f7;animation:spin 0.7s linear infinite;margin:2rem auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    audio{width:100%;border-radius:8px;margin-top:0.5rem;}
    .hint{font-size:0.72rem;color:rgba(168,85,247,0.45);margin-top:0.25rem;}
    .hint a{color:#a855f7;}
    /* Stories */
    .stories-bar{display:flex;gap:0.75rem;overflow-x:auto;padding:0.75rem 0;scrollbar-width:thin;scrollbar-color:rgba(124,58,237,0.3) transparent;margin-bottom:1rem;}
    .story-bubble{min-width:72px;text-align:center;cursor:pointer;flex-shrink:0;}
    .story-ring{width:68px;height:68px;border-radius:50%;padding:3px;background:linear-gradient(135deg,#7c3aed,#a855f7,#ec4899);margin:0 auto 0.3rem;}
    .story-ring.add-new{background:none;border:2px dashed rgba(124,58,237,0.5);display:flex;align-items:center;justify-content:center;}
    .story-ring-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:#0b0014;display:flex;align-items:center;justify-content:center;}
    .story-ring-inner img{width:100%;height:100%;object-fit:cover;}
    .story-label{font-size:0.65rem;color:rgba(234,230,255,0.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72px;}
    /* Modals */
    .modal-overlay{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1rem;}
    .modal-overlay.show{display:flex;}
    .modal-box{background:rgba(12,6,24,0.98);border:1px solid rgba(124,58,237,0.5);border-radius:18px;width:100%;max-width:440px;padding:1.5rem;box-shadow:0 20px 50px rgba(0,0,0,0.8);max-height:90vh;overflow-y:auto;}
    /* Story Viewer Inline */
    .story-viewer-overlay{display:none;position:fixed;inset:0;z-index:11000;background:rgba(0,0,0,0.95);align-items:center;justify-content:center;}
    .story-viewer-overlay.show{display:flex;}
    .story-viewer-card{width:100%;max-width:420px;min-height:60vh;max-height:85vh;border-radius:18px;overflow:hidden;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
    .story-viewer-card img{max-width:100%;max-height:50vh;border-radius:12px;object-fit:contain;margin-bottom:1rem;}
    .story-viewer-text{font-size:1.3rem;font-weight:700;color:white;text-shadow:0 2px 8px rgba(0,0,0,0.6);line-height:1.5;}
    .story-viewer-meta{position:absolute;top:1rem;left:1rem;right:1rem;display:flex;align-items:center;justify-content:space-between;}
    .story-nav-btn{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(124,58,237,0.4);border:none;color:white;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .story-nav-btn:hover{background:rgba(124,58,237,0.7);}
    .story-progress{display:flex;gap:3px;padding:0 1rem;position:absolute;top:0.5rem;left:0;right:0;}
    .story-progress-bar{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.3);}
    .story-progress-bar.active{background:rgba(255,255,255,0.9);}
    .story-progress-bar.done{background:rgba(255,255,255,0.6);}
  </style>
</head>
<body>
  <header style="padding:1rem;background:rgba(15,0,30,0.9);border-bottom:1px solid rgba(124,58,237,0.5);position:sticky;top:0;z-index:100;">
    <div style="max-width:56rem;margin:0 auto;display:flex;align-items:center;justify-content:space-between;">
      <a href="index.html" style="color:#a855f7;font-weight:600;text-decoration:none;">← Home</a>
      <h1 style="font-size:1.25rem;font-weight:800;" id="pageTitle">👤 Profile</h1>
      <div style="width:60px;"></div>
    </div>
  </header>
  <div style="max-width:56rem;margin:0 auto;padding:0 1rem;margin-top:1.25rem;">
    <div id="loadingSpinner"><div class="spinner"></div></div>
    <div id="profileContent" style="display:none;"></div>
  </div>

  <!-- Story Upload Modal -->
  <div id="storyUploadModal" class="modal-overlay">
    <div class="modal-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
        <h3 style="font-size:1.15rem;font-weight:800;color:#a855f7;">📸 Create Story</h3>
        <button onclick="closeStoryModal()" style="background:none;border:none;color:#eae6ff;font-size:1.5rem;cursor:pointer;">✕</button>
      </div>
      <div class="form-group"><label>Story Text (optional)</label><textarea class="form-input" id="storyText" rows="2" placeholder="What's happening?"></textarea></div>
      <div class="form-group"><label>Image URL (optional)</label><input class="form-input" type="url" id="storyMediaUrl" placeholder="https://i.ibb.co/your-image.jpg"><div class="hint">💡 Upload your image to <a href="https://imgbb.com" target="_blank">imgbb.com</a> and paste the direct link</div></div>
      <div class="form-group"><label>Background Color</label><div style="display:flex;gap:0.5rem;flex-wrap:wrap;" id="storyColorPicker">
        <div onclick="pickStoryColor('#7c3aed')" style="width:36px;height:36px;border-radius:8px;background:#7c3aed;cursor:pointer;border:2px solid #a855f7;" class="sco"></div>
        <div onclick="pickStoryColor('#dc2626')" style="width:36px;height:36px;border-radius:8px;background:#dc2626;cursor:pointer;border:2px solid transparent;" class="sco"></div>
        <div onclick="pickStoryColor('#059669')" style="width:36px;height:36px;border-radius:8px;background:#059669;cursor:pointer;border:2px solid transparent;" class="sco"></div>
        <div onclick="pickStoryColor('#d97706')" style="width:36px;height:36px;border-radius:8px;background:#d97706;cursor:pointer;border:2px solid transparent;" class="sco"></div>
        <div onclick="pickStoryColor('#0891b2')" style="width:36px;height:36px;border-radius:8px;background:#0891b2;cursor:pointer;border:2px solid transparent;" class="sco"></div>
        <div onclick="pickStoryColor('#be185d')" style="width:36px;height:36px;border-radius:8px;background:#be185d;cursor:pointer;border:2px solid transparent;" class="sco"></div>
      </div></div>
      <div class="form-group"><label>Expires After</label><select class="form-input" id="storyExpiry"><option value="24">24 hours</option><option value="12">12 hours</option><option value="48">48 hours</option><option value="0">Never</option></select></div>
      <div style="display:flex;gap:0.75rem;">
        <button class="btn" onclick="submitStory()" id="storySubmitBtn" style="flex:1;">📤 Post Story</button>
        <button class="btn" onclick="closeStoryModal()" style="background:rgba(124,58,237,0.15);color:#a855f7;border:1px solid rgba(124,58,237,0.3);">Cancel</button>
      </div>
      <div id="storyNotice" style="margin-top:0.75rem;font-size:0.85rem;text-align:center;"></div>
    </div>
  </div>

  <!-- Inline Story Viewer (TikTok-style) -->
  <div id="storyViewerOverlay" class="story-viewer-overlay" onclick="if(event.target===this)closeStoryViewer()">
    <div class="story-progress" id="storyProgressBars"></div>
    <button class="story-nav-btn" style="left:8px;" onclick="prevStorySlide()">‹</button>
    <div class="story-viewer-card" id="storyViewerCard"></div>
    <button class="story-nav-btn" style="right:8px;" onclick="nextStorySlide()">›</button>
    <button onclick="closeStoryViewer()" style="position:absolute;top:1.2rem;right:1.2rem;background:rgba(0,0,0,0.5);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;z-index:5;">✕</button>
    <div style="position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);">
      <a id="storyViewAllLink" href="stories.html" style="color:#a855f7;font-size:0.85rem;text-decoration:none;background:rgba(0,0,0,0.5);padding:0.4rem 1rem;border-radius:20px;">View All Stories →</a>
    </div>
  </div>

  <!-- Create Post Modal -->
  <div id="createPostModal" class="modal-overlay">
    <div class="modal-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
        <h3 style="font-size:1.15rem;font-weight:800;color:#a855f7;">📝 Create Post</h3>
        <button onclick="closeCreatePost()" style="background:none;border:none;color:#eae6ff;font-size:1.5rem;cursor:pointer;">✕</button>
      </div>
      <div style="display:flex;gap:0.5rem;margin-bottom:1.25rem;">
        <button type="button" class="ptb" data-type="text" onclick="selectPostType('text')" style="flex:1;padding:0.65rem;border-radius:10px;border:1px solid rgba(124,58,237,0.4);background:#7c3aed;color:white;font-weight:600;cursor:pointer;font-size:0.85rem;">📝 Text</button>
        <button type="button" class="ptb" data-type="photo" onclick="selectPostType('photo')" style="flex:1;padding:0.65rem;border-radius:10px;border:1px solid rgba(124,58,237,0.4);background:rgba(124,58,237,0.2);color:white;font-weight:600;cursor:pointer;font-size:0.85rem;">📷 Photo</button>
        <button type="button" class="ptb" data-type="video" onclick="selectPostType('video')" style="flex:1;padding:0.65rem;border-radius:10px;border:1px solid rgba(124,58,237,0.4);background:rgba(124,58,237,0.2);color:white;font-weight:600;cursor:pointer;font-size:0.85rem;">🎬 Video</button>
      </div>
      <input type="hidden" id="postMediaType" value="text">
      <textarea id="postText" placeholder="What's on your mind?" style="width:100%;min-height:100px;padding:0.85rem;background:rgba(12,0,25,0.9);border:1px solid rgba(124,58,237,0.35);border-radius:10px;color:#eae6ff;font-size:0.93rem;resize:vertical;font-family:inherit;margin-bottom:1rem;box-sizing:border-box;"></textarea>
      <div id="postMediaUrlGroup" style="display:none;margin-bottom:1rem;">
        <label style="display:block;margin-bottom:0.4rem;font-size:0.85rem;font-weight:600;color:rgba(234,230,255,0.75);">🔗 Media URL</label>
        <input type="url" id="postMediaUrl" placeholder="Paste image/video URL" class="form-input">
        <div class="hint">💡 Upload images at <a href="https://imgbb.com" target="_blank">imgbb.com</a></div>
      </div>
      <div style="display:flex;gap:0.75rem;">
        <button id="submitPostBtn" onclick="submitPost()" style="flex:1;padding:0.75rem;background:#7c3aed;color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer;">📤 Post</button>
        <button onclick="closeCreatePost()" style="padding:0.75rem 1.25rem;background:rgba(124,58,237,0.15);color:#a855f7;border:1px solid rgba(124,58,237,0.3);border-radius:10px;font-weight:600;cursor:pointer;">Cancel</button>
      </div>
      <div id="postNotice" style="margin-top:0.75rem;font-size:0.85rem;text-align:center;"></div>
    </div>
  </div>

  <nav style="position:fixed;bottom:0;left:0;right:0;background:rgba(15,0,30,0.95);border-top:1px solid rgba(124,58,237,0.4);display:flex;justify-content:space-around;padding:0.5rem 0;z-index:200;">
    <a href="index.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">🏠<br>Home</a>
    <a href="search.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">🔍<br>Search</a>
    <a href="feed.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">📰<br>Feed</a>
    <a href="radio.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">📻<br>Radio</a>
    <a href="profile.html" style="text-decoration:none;text-align:center;color:#a855f7;font-size:0.7rem;">👤<br>Profile</a>
  </nav>
  <script>
  (function(){
  var db;
  if(window._8bfrSupabaseClient){db=window._8bfrSupabaseClient;}
  else if(window.supabase&&window.supabase.createClient){db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');}
  else{document.getElementById('loadingSpinner').innerHTML='<div style="text-align:center;padding:2rem;color:#f87171;">❌ Supabase failed.</div>';return;}

  var OWNER_ID='cb556180-f032-4b21-9470-1d786f2664ab';
  var BI={artist:'🎤',beatmaker:'🎚️',producer:'🎧',singer:'🎙️',musician:'🎸',engineer:'🎛️',songwriter:'🎼',dj:'📀',rapper:'🎤',label:'🏷️',promoter:'🚀',designer:'🎨',blogger:'📰',developer:'🧠',streamer:'📡',gamer:'🎮',influencer:'💫',fan:'💎',supporter:'🤝',owner:'👑',admin:'⚙️',mod:'💬',verified:'🛡️',founder:'⚡',vip_member:'🎖️'};
  var MR=['artist','beatmaker','producer','singer','musician','engineer','songwriter','dj','rapper'];
  var currentUser=null,profileData=null,isOwnProfile=false,storyColor='#7c3aed',allStories=[];
  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
  function ago(d){var m=Math.floor((Date.now()-new Date(d).getTime())/60000);if(m<1)return 'Just now';if(m<60)return m+'m';var h=Math.floor(m/60);if(h<24)return h+'h';var dy=Math.floor(h/24);if(dy<30)return dy+'d';return new Date(d).toLocaleDateString();}
  function showError(m){document.getElementById('loadingSpinner').style.display='none';var c=document.getElementById('profileContent');c.style.display='block';c.innerHTML='<div style="text-align:center;padding:4rem;color:rgba(168,85,247,0.7);">'+m+'</div>';}

  /* ═══ STORY MODAL ═══ */
  window.pickStoryColor=function(c){storyColor=c;document.querySelectorAll('.sco').forEach(function(el){el.style.borderColor=el.style.background===c?'#a855f7':'transparent';});};
  window.openStoryModal=function(){document.getElementById('storyUploadModal').classList.add('show');};
  window.closeStoryModal=function(){document.getElementById('storyUploadModal').classList.remove('show');document.getElementById('storyText').value='';document.getElementById('storyMediaUrl').value='';document.getElementById('storyNotice').textContent='';};
  window.submitStory=async function(){if(!currentUser){document.getElementById('storyNotice').textContent='❌ Sign in first';return;}var text=document.getElementById('storyText').value.trim();var media=document.getElementById('storyMediaUrl').value.trim();var hrs=parseInt(document.getElementById('storyExpiry').value)||24;if(!text&&!media){document.getElementById('storyNotice').textContent='⚠️ Add text or image';return;}var btn=document.getElementById('storySubmitBtn');btn.disabled=true;btn.textContent='Posting…';try{var ins={user_id:currentUser.id,text:text||null,background_color:storyColor,expires_at:hrs>0?new Date(Date.now()+hrs*3600000).toISOString():null};if(media){ins.media_url=media;ins.media_type='image';}var r=await db.from('stories').insert(ins);if(r.error)throw r.error;document.getElementById('storyNotice').innerHTML='<span style="color:#4ade80;">✅ Posted!</span>';setTimeout(function(){closeStoryModal();location.reload();},800);}catch(e){document.getElementById('storyNotice').innerHTML='<span style="color:#ef4444;">❌ '+e.message+'</span>';}btn.disabled=false;btn.textContent='📤 Post Story';};

  /* ═══ INLINE STORY VIEWER (TikTok-style) ═══ */
  var storyIdx=0;
  window.openStoryViewer=function(idx){storyIdx=idx;renderStorySlide();document.getElementById('storyViewerOverlay').classList.add('show');document.body.style.overflow='hidden';};
  window.closeStoryViewer=function(){document.getElementById('storyViewerOverlay').classList.remove('show');document.body.style.overflow='';};
  window.nextStorySlide=function(){if(storyIdx<allStories.length-1){storyIdx++;renderStorySlide();}else closeStoryViewer();};
  window.prevStorySlide=function(){if(storyIdx>0){storyIdx--;renderStorySlide();}};
  function renderStorySlide(){
    var s=allStories[storyIdx];if(!s)return;
    var card=document.getElementById('storyViewerCard');
    var bg=s.media_url?'background:linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.6)),url('+s.media_url+') center/cover;':'background:'+(s.background_color||'#7c3aed')+';';
    card.setAttribute('style','width:100%;max-width:420px;min-height:60vh;max-height:85vh;border-radius:18px;overflow:hidden;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;'+bg);
    var html='';
    if(s.media_url) html+='<img src="'+s.media_url+'" style="max-width:90%;max-height:45vh;border-radius:12px;object-fit:contain;margin-bottom:1rem;" onerror="this.style.display=\'none\'">';
    if(s.text) html+='<div class="story-viewer-text">'+esc(s.text)+'</div>';
    html+='<div style="position:absolute;bottom:1rem;font-size:0.75rem;color:rgba(255,255,255,0.5);">'+ago(s.created_at)+' · '+(storyIdx+1)+'/'+allStories.length+'</div>';
    card.innerHTML=html;
    // Progress bars
    var bars=document.getElementById('storyProgressBars');
    bars.innerHTML=allStories.map(function(_,i){var cls=i<storyIdx?'story-progress-bar done':i===storyIdx?'story-progress-bar active':'story-progress-bar';return '<div class="'+cls+'"></div>';}).join('');
    // Record view
    if(currentUser&&s.id) db.from('story_views').upsert({story_id:s.id,viewer_id:currentUser.id},{onConflict:'story_id,viewer_id'}).catch(function(){});
  }
  // Swipe support
  var touchStartX=0;
  document.getElementById('storyViewerOverlay').addEventListener('touchstart',function(e){touchStartX=e.changedTouches[0].screenX;});
  document.getElementById('storyViewerOverlay').addEventListener('touchend',function(e){var diff=e.changedTouches[0].screenX-touchStartX;if(diff<-50)nextStorySlide();else if(diff>50)prevStorySlide();});

  /* ═══ POST MODAL ═══ */

  /* ═══ PREVIEW URL ═══ */
  window.prevAv=function(){var u=document.getElementById('eAv').value.trim();document.getElementById('ePrevAv').innerHTML=u?'<img src="'+u+'" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML=\'❌\'">':'👤';};
  window.prevCov=function(){var u=document.getElementById('eCov').value.trim();document.getElementById('ePrevCov').innerHTML=u?'<img src="'+u+'" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML=\'❌\'">':'🖼️';};

  /* ═══ SAVE PROFILE ═══ */
  window.saveProfile=async function(){if(!currentUser)return;var n=document.getElementById('saveN');var un=document.getElementById('eUN').value.trim(),dn=document.getElementById('eDN').value.trim(),bio=document.getElementById('eBio').value.trim(),av=document.getElementById('eAv').value.trim(),cov=document.getElementById('eCov').value.trim();var pp=document.getElementById('ePP');if(!un){n.textContent='⚠️ Username required';n.style.color='#ef4444';return;}n.textContent='Saving…';n.style.color='#a855f7';try{var up={username:un,display_name:dn,bio:bio,avatar_url:av||null,cover_url:cov||null};if(pp)up.paypal_email=pp.value.trim()||null;var r=await db.from('profiles').update(up).eq('user_id',currentUser.id);if(r.error)throw r.error;n.textContent='✅ Saved!';n.style.color='#4ade80';if(av){var ae=document.getElementById('avatarDisplay');if(ae)ae.innerHTML='<img src="'+av+'" onerror="this.parentNode.textContent=\'👤\'">';}if(cov){var ce=document.getElementById('coverBanner');if(ce)ce.innerHTML='<img src="'+cov+'" style="width:100%;height:100%;object-fit:cover;">';}setTimeout(function(){n.textContent='';},2500);}catch(e){n.textContent='❌ '+e.message;n.style.color='#ef4444';}};

  /* ═══ STORIES ═══ */
  async function loadStories(uid){var bar=document.getElementById('storiesBar');if(!bar)return;try{var sr=await db.from('stories').select('id,text,background_color,media_url,media_type,created_at,expires_at').eq('user_id',uid).order('created_at',{ascending:false}).limit(20);allStories=(sr.data||[]).filter(function(s){return !s.expires_at||new Date(s.expires_at)>new Date();});var bb='';if(isOwnProfile)bb+='<div class="story-bubble" onclick="openStoryModal()"><div class="story-ring add-new" style="width:68px;height:68px;"><span style="font-size:1.5rem;color:#a855f7;">+</span></div><div class="story-label" style="color:#a855f7;font-weight:600;">Add Story</div></div>';if(!allStories.length&&!isOwnProfile){bar.style.display='none';return;}allStories.forEach(function(s,i){var bg=s.media_url?'background-image:url('+s.media_url+');background-size:cover;background-position:center;':'background:'+(s.background_color||'#7c3aed')+';';bb+='<div class="story-bubble" onclick="openStoryViewer('+i+')"><div class="story-ring"><div class="story-ring-inner" style="'+bg+'"></div></div><div class="story-label">'+ago(s.created_at)+'</div></div>';});bar.innerHTML=bb;}catch(e){bar.style.display='none';}}

  /* ═══ SONGS ═══ */
  async function loadSongs(uid){var el=document.getElementById('songList');if(!el)return;try{var sr=await db.from('songs').select('id,title,artist,cover_art,song_url,explicit,price').eq('uploaded_by',uid).is('dummy_id',null).order('created_at',{ascending:false});var songs=sr.data||[];if(!songs.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:rgba(168,85,247,0.5);">No songs yet.</div>';return;}el.innerHTML=songs.map(function(s){var cv=s.cover_art?'<img src="'+s.cover_art+'" onerror="this.parentNode.textContent=\'🎵\'">':'🎵';var del=isOwnProfile?'<button class="btn btn-red" style="padding:0.4rem 0.75rem;font-size:0.8rem;" onclick="delSong(\''+s.id+'\')">🗑️</button>':'';var pr=parseFloat(s.price)||0;var pt=pr>0?'<span style="color:#4ade80;font-weight:600;font-size:0.85rem;margin-left:0.5rem;">$'+pr.toFixed(2)+'</span>':'';return '<div class="song-row" id="s-'+s.id+'"><div class="song-cover">'+cv+'</div><div class="song-info"><div class="song-title">'+esc(s.title||'Untitled')+(s.explicit?' 🔞':'')+pt+'</div><div class="song-meta">'+esc(s.artist||'')+'</div>'+(s.song_url?'<audio controls src="'+s.song_url+'" preload="none" style="height:32px;margin-top:6px;"></audio>':'')+'</div>'+del+'</div>';}).join('');}catch(e){el.innerHTML='<div style="color:#ef4444;">'+e.message+'</div>';}}

  /* ═══ POSTS ═══ */
  async function loadPosts(uid){var el=document.getElementById('postList');if(!el)return;try{var sr=await db.from('posts').select('id,text,media,media_type,likes,shares,favorites,comments,created_at').eq('user_id',uid).order('created_at',{ascending:false}).limit(30);var posts=sr.data||[];if(!posts.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:rgba(168,85,247,0.5);">No posts yet.</div>';return;}el.innerHTML=posts.map(function(p){var mH='';if(p.media&&(p.media_type==='photo'||p.media_type==='image'))mH='<img src="'+p.media+'" style="width:100%;max-height:400px;object-fit:cover;border-radius:10px;margin-top:0.75rem;" onerror="this.style.display=\'none\'">';else if(p.media&&p.media_type==='video'){var yt=p.media.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);if(yt)mH='<div style="position:relative;padding-bottom:56.25%;margin-top:0.75rem;"><iframe src="https://www.youtube.com/embed/'+yt[1]+'" style="position:absolute;inset:0;width:100%;height:100%;border:none;border-radius:10px;" allowfullscreen></iframe></div>';}var del=isOwnProfile?'<button onclick="deletePost(\''+p.id+'\')" style="background:none;border:none;color:rgba(239,68,68,0.6);cursor:pointer;font-size:0.8rem;">🗑️</button>':'';return '<div style="background:rgba(0,0,0,0.3);border:1px solid rgba(124,58,237,0.2);border-radius:12px;padding:1rem;margin-bottom:0.75rem;"><div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;"><span style="font-size:0.78rem;color:rgba(168,85,247,0.6);">'+ago(p.created_at)+'</span>'+del+'</div>'+(p.text?'<div style="line-height:1.6;">'+esc(p.text)+'</div>':'')+mH+'</div>';}).join('');}catch(e){el.innerHTML='<div style="color:#ef4444;">'+e.message+'</div>';}}

  /* ═══ SOCIAL ═══ */
  async function loadFollowCounts(uid){try{var f1=await db.from('follows').select('id',{count:'exact',head:true}).eq('following_id',uid);var f2=await db.from('follows').select('id',{count:'exact',head:true}).eq('follower_id',uid);var f3=await db.from('friends').select('id',{count:'exact',head:true}).or('user_id.eq.'+uid+',friend_id.eq.'+uid).eq('status','accepted');var el=document.getElementById('followCounts');if(el)el.innerHTML='<span><strong>'+(f1.count||0)+'</strong> Followers</span> · <span><strong>'+(f2.count||0)+'</strong> Following</span> · <span><strong>'+(f3.count||0)+'</strong> Friends</span>';}catch(e){}}
  async function checkRel(tid){if(!currentUser)return;try{var sr=await db.from('follows').select('id').eq('follower_id',currentUser.id).eq('following_id',tid).limit(1);var btn=document.getElementById('followBtn');if(btn&&sr.data&&sr.data.length>0){btn.textContent='✓ Following';btn.style.background='#059669';}}catch(e){}}
  window.toggleFollow=async function(){if(!currentUser||!profileData)return;var btn=document.getElementById('followBtn'),tid=profileData.user_id;try{var sr=await db.from('follows').select('id').eq('follower_id',currentUser.id).eq('following_id',tid).limit(1);if(sr.data&&sr.data.length>0){await db.from('follows').delete().eq('id',sr.data[0].id);btn.textContent='Follow';btn.style.background='#7c3aed';}else{await db.from('follows').insert({follower_id:currentUser.id,following_id:tid});btn.textContent='✓ Following';btn.style.background='#059669';}loadFollowCounts(tid);}catch(e){alert(e.message);}};
  window.sendFR=async function(){if(!currentUser||!profileData)return;var btn=document.getElementById('friendBtn');try{var sr=await db.from('friends').select('id,status').or('and(user_id.eq.'+currentUser.id+',friend_id.eq.'+profileData.user_id+'),and(user_id.eq.'+profileData.user_id+',friend_id.eq.'+currentUser.id+')').limit(1);if(sr.data&&sr.data.length>0){btn.textContent=sr.data[0].status==='accepted'?'🤝 Friends':'⏳ Pending';return;}await db.from('friends').insert({user_id:currentUser.id,friend_id:profileData.user_id,status:'pending'});btn.textContent='⏳ Sent';}catch(e){alert(e.message);}};

  /* ═══ SONG UPLOAD ═══ */
  var selAudio=null,selCover=null;
  window.toggleUF=function(){var f=document.getElementById('uploadForm');f.style.display=f.style.display==='none'?'block':'none';};
  window.uploadSong=async function(){if(!currentUser)return;var title=document.getElementById('uT').value.trim(),artist=document.getElementById('uA').value.trim(),expl=document.getElementById('uEx').value==='true',price=document.getElementById('uPr').value.trim(),af=document.getElementById('uAF').files[0],cf=document.getElementById('uCF').files[0],n=document.getElementById('uN');if(!title){n.textContent='Title needed';return;}if(!af){n.textContent='Audio needed';return;}document.getElementById('uBtn').disabled=true;n.innerHTML='<span style="color:#a855f7;">Uploading…</span>';try{var ext=af.name.split('.').pop();var ap=currentUser.id+'/songs/'+Date.now()+'.'+ext;var ur=await db.storage.from('songs').upload(ap,af,{contentType:af.type});if(ur.error)throw new Error(ur.error.message);var su=db.storage.from('songs').getPublicUrl(ap).data.publicUrl;var cu=null;if(cf){var ce=cf.name.split('.').pop();var cp=currentUser.id+'/covers/'+Date.now()+'.'+ce;var cr=await db.storage.from('songs').upload(cp,cf,{contentType:cf.type});if(!cr.error)cu=db.storage.from('songs').getPublicUrl(cp).data.publicUrl;}var ir=await db.from('songs').insert({title:title,artist:artist||profileData?.display_name||'',uploaded_by:currentUser.id,song_url:su,cover_art:cu,explicit:expl,featured:false,price:price?parseFloat(price):0});if(ir.error)throw new Error(ir.error.message);n.innerHTML='<span style="color:#4ade80;">✅ Done!</span>';setTimeout(function(){toggleUF();loadSongs(currentUser.id);},1200);}catch(e){n.innerHTML='<span style="color:#ef4444;">❌ '+e.message+'</span>';}document.getElementById('uBtn').disabled=false;};
  // File select handlers
  document.addEventListener('change',function(e){
    if(e.target.id==='uAF'){var f=e.target.files[0];if(!f)return;if(f.size>20e6){document.getElementById('uN').textContent='Max 20MB';e.target.value='';return;}document.getElementById('uAT').textContent='✅ '+f.name;var t=document.getElementById('uT');if(!t.value)t.value=f.name.replace(/\.[^/.]+$/,'').replace(/[-_]/g,' ');}
    if(e.target.id==='uCF'&&e.target.files[0])document.getElementById('uCT').textContent='✅ '+e.target.files[0].name;
  });
  window.delSong=async function(id){if(!confirm('Delete?'))return;try{await db.from('songs').delete().eq('id',id).eq('uploaded_by',currentUser.id);var r=document.getElementById('s-'+id);if(r)r.remove();}catch(e){alert(e.message);}};
  window.loadPosts=loadPosts;

  /* ═══ BOOT ═══ */
  setTimeout(function(){var s=document.getElementById('loadingSpinner');if(s&&s.style.display!=='none')showError('Timed out.');},8000);
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){init();});
  else init();
  })();
  </script>
</body>
</html>
