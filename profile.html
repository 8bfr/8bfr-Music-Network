<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Profile - 8BFR Music Network</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{padding-bottom:80px;background:linear-gradient(#0b0014,#000);color:#eae6ff;font-family:system-ui,-apple-system,sans-serif;}
    .profile-header{background:rgba(12,6,24,0.85);border:1px solid rgba(124,58,237,0.35);border-radius:16px;padding:0;margin-bottom:1.5rem;position:relative;overflow:hidden;}
    .cover-banner{width:100%;height:140px;background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(168,85,247,0.1));overflow:hidden;}
    .cover-banner img{width:100%;height:100%;object-fit:cover;}
    .profile-header-inner{padding:0 2rem 2rem 2rem;margin-top:-55px;position:relative;z-index:1;}
    .avatar-ring{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:2.8rem;flex-shrink:0;overflow:hidden;border:4px solid #0b0014;position:relative;z-index:1;}
    .avatar-ring img{width:100%;height:100%;object-fit:cover;}
    /* Frames */
    .avatar-frame-wrap{position:relative;width:118px;height:118px;flex-shrink:0;}
    .avatar-frame-wrap .avatar-ring{position:absolute;top:4px;left:4px;width:110px;height:110px;}
    .frame-overlay{position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:2;}
    @keyframes spin-frame{to{transform:rotate(360deg);}}
    @keyframes pulse-frame{0%,100%{opacity:1;}50%{opacity:.6;}}
    .frame-animated-purple .frame-overlay{background:conic-gradient(#7c3aed,#a855f7,#00d9ff,#7c3aed);animation:spin-frame 3s linear infinite;border-radius:50%;padding:3px;-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#fff calc(100% - 4px));mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#fff calc(100% - 4px));}
    .frame-animated-gold .frame-overlay{background:conic-gradient(#f59e0b,#fbbf24,#d97706,#f59e0b);animation:spin-frame 2.5s linear infinite;border-radius:50%;padding:3px;-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#fff calc(100% - 4px));mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#fff calc(100% - 4px));}
    .frame-glow .frame-overlay{box-shadow:0 0 18px 4px rgba(124,58,237,.8),inset 0 0 10px rgba(124,58,237,.3);border:3px solid rgba(168,85,247,.9);animation:pulse-frame 2s ease-in-out infinite;}
    .frame-music .frame-overlay{border:3px solid rgba(0,217,255,.8);box-shadow:0 0 14px 3px rgba(0,217,255,.6);animation:pulse-frame 1.5s ease-in-out infinite;}
    .frame-fire .frame-overlay{border:3px solid rgba(245,158,11,.9);box-shadow:0 0 16px 4px rgba(245,91,11,.7);}
    .frame-gold .frame-overlay{border:4px solid #fbbf24;box-shadow:0 0 12px 2px rgba(251,191,36,.5);}
    .frame-8bfr .frame-overlay{background:conic-gradient(#7c3aed,#00d9ff,#a855f7,#7c3aed);animation:spin-frame 4s linear infinite;border-radius:50%;-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#fff calc(100% - 4px));mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#fff calc(100% - 4px));}
    /* Cover themes */
    .cover-banner.bg-neon-purple{background:linear-gradient(135deg,#4c1d95,#7c3aed,#a855f7)!important;}
    .cover-banner.bg-midnight-blue{background:linear-gradient(135deg,#0c1445,#1e3a8a,#0369a1)!important;}
    .cover-banner.bg-gold-flame{background:linear-gradient(135deg,#78350f,#d97706,#fbbf24)!important;}
    .cover-banner.bg-galaxy{background:radial-gradient(ellipse at 30% 40%,#312e81,#0f172a,#000)!important;}
    .badge-artist-pro{background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(0,217,255,.1));border:1px solid rgba(0,217,255,.5);color:#00d9ff;padding:0.3rem 0.75rem;border-radius:20px;font-size:0.78rem;font-weight:700;display:inline-block;margin:0.2rem;}
    .badge{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.4);color:#a855f7;padding:0.25rem 0.6rem;border-radius:20px;font-size:0.72rem;font-weight:600;display:inline-block;margin:0.15rem;}
    .badge.verified{border-color:#00d9ff;color:#00d9ff;background:rgba(0,217,255,0.08);}
    .badge.owner{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,0.08);}
    .card{background:rgba(12,6,24,0.7);border:1px solid rgba(124,58,237,0.3);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;}
    .card h2{color:#a855f7;margin-bottom:1rem;font-size:1.1rem;font-weight:700;}
    .form-group{margin-bottom:1.25rem;}
    .form-group label{display:block;margin-bottom:0.4rem;font-size:0.88rem;font-weight:600;color:rgba(234,230,255,0.75);}
    .form-input{width:100%;padding:0.7rem 0.9rem;background:rgba(12,0,25,0.9);border:1px solid rgba(124,58,237,0.35);border-radius:8px;color:#eae6ff;font-size:0.93rem;box-sizing:border-box;}
    .form-input:focus{outline:none;border-color:#a855f7;}
    .form-input-sm{padding:0.4rem 0.7rem;font-size:0.82rem;}
    .btn{background:#7c3aed;color:white;border:none;padding:0.7rem 1.5rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem;transition:all 0.2s;}
    .btn:hover{background:#6d28d9;} .btn:disabled{opacity:0.5;cursor:not-allowed;}
    .btn-sm{padding:0.35rem 0.85rem;font-size:0.8rem;}
    .btn-ghost{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.4);color:#a855f7;}
    .btn-ghost:hover{background:rgba(124,58,237,0.3);}
    .btn-green{background:#059669;} .btn-green:hover{background:#047857;}
    .btn-red{background:#dc2626;} .btn-red:hover{background:#b91c1c;}
    /* Stats bar */
    .stats-bar{display:flex;gap:0;border-radius:12px;overflow:hidden;border:1px solid rgba(124,58,237,0.3);margin-bottom:1.5rem;background:rgba(12,6,24,0.7);}
    .stat-item{flex:1;text-align:center;padding:0.85rem 0.5rem;cursor:pointer;border-right:1px solid rgba(124,58,237,0.2);transition:background 0.2s;}
    .stat-item:last-child{border-right:none;}
    .stat-item:hover{background:rgba(124,58,237,0.1);}
    .stat-num{display:block;font-size:1.1rem;font-weight:800;color:#eae6ff;}
    .stat-label{display:block;font-size:0.65rem;color:rgba(168,85,247,0.7);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
    /* ── BIO COMPACT ── */
    .bio-text{font-size:0.92rem;line-height:1.6;color:rgba(234,230,255,0.7);max-height:4.8em;overflow:hidden;transition:max-height 0.3s;position:relative;}
    .bio-text.expanded{max-height:none;}
    .bio-more{display:none;color:#a855f7;font-size:0.78rem;cursor:pointer;margin-top:0.2rem;font-weight:600;}
    .bio-more:hover{text-decoration:underline;}
    /* ── BADGES COMPACT ── */
    .badges-compact{display:flex;flex-wrap:wrap;gap:0.15rem;max-height:2.2rem;overflow:hidden;transition:max-height 0.3s;}
    .badges-compact.expanded{max-height:none;}
    .badge-toggle{display:none;color:#a855f7;font-size:0.72rem;cursor:pointer;margin-top:0.25rem;font-weight:600;}
    .badge-toggle:hover{text-decoration:underline;}
    /* ── PROFILE CONTENT TABS ── */
    .profile-tabs{display:flex;gap:0;border-bottom:1px solid rgba(124,58,237,0.3);margin-bottom:1rem;overflow-x:auto;scrollbar-width:none;}
    .profile-tabs::-webkit-scrollbar{display:none;}
    .profile-tab{flex-shrink:0;padding:0.7rem 0.85rem;font-weight:600;font-size:0.8rem;cursor:pointer;color:rgba(234,230,255,0.45);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:all 0.2s;white-space:nowrap;}
    .profile-tab.active{color:#a855f7;border-bottom-color:#a855f7;}
    .profile-tab:hover{color:rgba(234,230,255,0.7);}
    /* Post grid */
    .post-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
    .post-thumb{aspect-ratio:1;border-radius:6px;overflow:hidden;cursor:pointer;position:relative;background:rgba(124,58,237,0.15);}
    .post-thumb img{width:100%;height:100%;object-fit:cover;}
    .post-thumb-text{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:0.5rem;font-size:0.75rem;text-align:center;color:rgba(234,230,255,0.8);line-height:1.4;}
    .post-thumb:hover::after{content:'';position:absolute;inset:0;background:rgba(124,58,237,0.3);}
    .post-thumb .pin-badge{position:absolute;top:4px;right:4px;font-size:0.6rem;background:rgba(124,58,237,0.8);padding:2px 5px;border-radius:8px;z-index:1;}
    .post-thumb .hidden-badge{position:absolute;top:4px;left:4px;font-size:0.6rem;background:rgba(239,68,68,0.7);padding:2px 5px;border-radius:8px;z-index:1;}
    /* Song row */
    .song-row{display:flex;align-items:center;gap:0.75rem;background:rgba(0,0,0,0.3);border:1px solid rgba(124,58,237,0.2);border-radius:10px;padding:0.85rem 1rem;margin-bottom:0.6rem;}
    .song-cover{width:46px;height:46px;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;overflow:hidden;}
    .song-cover img{width:100%;height:100%;object-fit:cover;}
    .song-info{flex:1;min-width:0;}
    .song-title{font-weight:700;font-size:0.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .song-meta{font-size:0.78rem;color:rgba(168,85,247,0.7);margin-top:0.1rem;}
    .upload-zone{border:2px dashed rgba(124,58,237,0.4);border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:all 0.2s;}
    .upload-zone:hover{border-color:#a855f7;background:rgba(124,58,237,0.06);}
    .upload-zone input[type=file]{display:none;}
    .spinner{width:32px;height:32px;border-radius:50%;border:3px solid rgba(168,85,247,0.2);border-top-color:#a855f7;animation:spin 0.7s linear infinite;margin:2rem auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    audio{width:100%;border-radius:8px;margin-top:0.5rem;}
    .hint{font-size:0.72rem;color:rgba(168,85,247,0.45);margin-top:0.25rem;}
    .hint a{color:#a855f7;}
    /* Stories */
    .stories-bar{display:flex;gap:0.75rem;overflow-x:auto;padding:0.75rem 0;scrollbar-width:thin;scrollbar-color:rgba(124,58,237,0.3) transparent;margin-bottom:1rem;}
    .story-bubble{min-width:72px;text-align:center;cursor:pointer;flex-shrink:0;}
    .story-ring{width:68px;height:68px;border-radius:50%;padding:3px;background:linear-gradient(135deg,#7c3aed,#a855f7,#ec4899);margin:0 auto 0.3rem;}
    .story-ring.add-new{background:none;border:2px dashed rgba(124,58,237,0.5);display:flex;align-items:center;justify-content:center;}
    .story-ring-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:#0b0014;display:flex;align-items:center;justify-content:center;}
    .story-ring-inner img{width:100%;height:100%;object-fit:cover;}
    .story-label{font-size:0.65rem;color:rgba(234,230,255,0.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72px;}
    .edit-panel{display:none;} .edit-panel.open{display:block;}
    /* Modals */
    .modal-overlay{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1rem;}
    .modal-overlay.show{display:flex;}
    .modal-box{background:rgba(12,6,24,0.98);border:1px solid rgba(124,58,237,0.5);border-radius:18px;width:100%;max-width:440px;padding:1.5rem;box-shadow:0 20px 50px rgba(0,0,0,0.8);max-height:90vh;overflow-y:auto;}
    .post-viewer-overlay{display:none;position:fixed;inset:0;z-index:11000;background:rgba(0,0,0,0.95);flex-direction:column;}
    .post-viewer-overlay.show{display:flex;}
    .post-viewer-inner{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
    .post-viewer-card{width:100%;max-width:480px;max-height:85vh;overflow-y:auto;background:rgba(12,6,24,0.98);border:1px solid rgba(124,58,237,0.3);border-radius:16px;padding:1.25rem;}
    .post-viewer-media img,.post-viewer-media video{width:100%;max-height:50vh;object-fit:contain;border-radius:10px;margin-bottom:1rem;}
    .post-actions{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(124,58,237,0.2);}
    .action-btn{display:flex;align-items:center;gap:0.3rem;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.25);color:#eae6ff;border-radius:20px;padding:0.4rem 0.75rem;font-size:0.8rem;cursor:pointer;transition:all 0.2s;}
    .action-btn:hover{background:rgba(124,58,237,0.3);}
    .action-btn.liked{color:#f472b6;border-color:#f472b6;}
    .action-btn.favorited{color:#fbbf24;border-color:#fbbf24;}
    .pv-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(124,58,237,0.4);border:none;color:white;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
    .pv-nav:hover{background:rgba(124,58,237,0.7);}
    .comment-item{background:rgba(0,0,0,0.2);border-radius:8px;padding:0.6rem 0.85rem;margin-bottom:0.5rem;}
    .comment-author{font-size:0.78rem;font-weight:700;color:#a855f7;}
    .comment-text{font-size:0.85rem;margin-top:0.2rem;}
    .comment-actions{display:flex;gap:0.75rem;margin-top:0.3rem;}
    .comment-action{background:none;border:none;color:rgba(168,85,247,0.6);font-size:0.72rem;cursor:pointer;padding:0;}
    .comment-action:hover{color:#a855f7;}
    /* Post manage dropdown */
    .post-manage{position:absolute;top:4px;right:4px;z-index:3;}
    .post-manage-btn{background:rgba(0,0,0,0.6);border:none;color:#eae6ff;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:0.7rem;display:flex;align-items:center;justify-content:center;}
    .post-manage-menu{display:none;position:absolute;right:0;top:28px;background:rgba(12,6,24,0.98);border:1px solid rgba(124,58,237,0.5);border-radius:8px;padding:0.3rem;min-width:120px;z-index:10;}
    .post-manage-menu.show{display:block;}
    .post-manage-menu button{display:block;width:100%;text-align:left;background:none;border:none;color:#eae6ff;padding:0.4rem 0.6rem;font-size:0.75rem;cursor:pointer;border-radius:4px;}
    .post-manage-menu button:hover{background:rgba(124,58,237,0.2);}
  </style>
</head>
<body>
  <header style="padding:1rem;background:rgba(15,0,30,0.9);border-bottom:1px solid rgba(124,58,237,0.5);position:sticky;top:0;z-index:100;">
    <div style="max-width:56rem;margin:0 auto;display:flex;align-items:center;justify-content:space-between;">
      <a href="index.html" style="color:#a855f7;font-weight:600;text-decoration:none;">← Home</a>
      <h1 style="font-size:1.25rem;font-weight:800;" id="pageTitle">👤 Profile</h1>
      <div style="width:60px;"></div>
    </div>
  </header>
  <div style="max-width:56rem;margin:0 auto;padding:0 1rem;margin-top:1.25rem;">
    <div id="loadingSpinner"><div class="spinner"></div></div>
    <div id="profileContent" style="display:none;"></div>
  </div>

  <!-- Story Upload Modal -->
  <div id="storyUploadModal" class="modal-overlay">
    <div class="modal-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
        <h3 style="font-size:1.15rem;font-weight:800;color:#a855f7;">📸 Create Story</h3>
        <button onclick="closeStoryModal()" style="background:none;border:none;color:#eae6ff;font-size:1.5rem;cursor:pointer;">✕</button>
      </div>
      <div class="form-group"><label>Story Text (optional)</label><textarea class="form-input" id="storyText" rows="2" placeholder="What's happening?"></textarea></div>
      <div class="form-group"><label>Image URL (optional)</label><input class="form-input" type="url" id="storyMediaUrl" placeholder="https://i.ibb.co/your-image.jpg"><div class="hint">💡 Upload to <a href="https://imgbb.com" target="_blank">imgbb.com</a></div></div>
      <div class="form-group"><label>Background Color</label><div style="display:flex;gap:0.5rem;flex-wrap:wrap;" id="storyColorPicker">
        <div onclick="pickStoryColor('#7c3aed')" style="width:36px;height:36px;border-radius:8px;background:#7c3aed;cursor:pointer;border:2px solid #a855f7;" class="sco"></div>
        <div onclick="pickStoryColor('#dc2626')" style="width:36px;height:36px;border-radius:8px;background:#dc2626;cursor:pointer;border:2px solid transparent;" class="sco"></div>
        <div onclick="pickStoryColor('#059669')" style="width:36px;height:36px;border-radius:8px;background:#059669;cursor:pointer;border:2px solid transparent;" class="sco"></div>
        <div onclick="pickStoryColor('#d97706')" style="width:36px;height:36px;border-radius:8px;background:#d97706;cursor:pointer;border:2px solid transparent;" class="sco"></div>
        <div onclick="pickStoryColor('#0891b2')" style="width:36px;height:36px;border-radius:8px;background:#0891b2;cursor:pointer;border:2px solid transparent;" class="sco"></div>
        <div onclick="pickStoryColor('#be185d')" style="width:36px;height:36px;border-radius:8px;background:#be185d;cursor:pointer;border:2px solid transparent;" class="sco"></div>
      </div></div>
      <div class="form-group"><label>Expires After</label><select class="form-input" id="storyExpiry"><option value="24">24 hours</option><option value="12">12 hours</option><option value="48">48 hours</option><option value="0">Never</option></select></div>
      <div style="display:flex;gap:0.75rem;">
        <button class="btn" onclick="submitStory()" id="storySubmitBtn" style="flex:1;">📤 Post Story</button>
        <button class="btn btn-ghost" onclick="closeStoryModal()">Cancel</button>
      </div>
      <div id="storyNotice" style="margin-top:0.75rem;font-size:0.85rem;text-align:center;"></div>
    </div>
  </div>

  <!-- Post Viewer Modal -->
  <div id="postViewerOverlay" class="post-viewer-overlay" onclick="if(event.target===this)closePostViewer()">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;border-bottom:1px solid rgba(124,58,237,0.3);">
      <span id="pvCounter" style="font-size:0.85rem;color:rgba(168,85,247,0.7);"></span>
      <button onclick="closePostViewer()" style="background:none;border:none;color:#eae6ff;font-size:1.5rem;cursor:pointer;">✕</button>
    </div>
    <div class="post-viewer-inner">
      <button class="pv-nav" style="left:8px;" onclick="prevPost()">&#8249;</button>
      <div id="postViewerCard" class="post-viewer-card"></div>
      <button class="pv-nav" style="right:8px;" onclick="nextPost()">&#8250;</button>
    </div>
  </div>

  <!-- Create Post Modal -->
  <div id="createPostModal" class="modal-overlay">
    <div class="modal-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
        <h3 style="font-size:1.15rem;font-weight:800;color:#a855f7;">📝 Create Post</h3>
        <button onclick="closeCreatePost()" style="background:none;border:none;color:#eae6ff;font-size:1.5rem;cursor:pointer;">✕</button>
      </div>
      <div style="display:flex;gap:0.5rem;margin-bottom:1.25rem;">
        <button type="button" class="ptb" data-type="text" onclick="selectPostType('text')" style="flex:1;padding:0.65rem;border-radius:10px;border:1px solid rgba(124,58,237,0.4);background:#7c3aed;color:white;font-weight:600;cursor:pointer;font-size:0.85rem;">📝 Text</button>
        <button type="button" class="ptb" data-type="photo" onclick="selectPostType('photo')" style="flex:1;padding:0.65rem;border-radius:10px;border:1px solid rgba(124,58,237,0.4);background:rgba(124,58,237,0.2);color:white;font-weight:600;cursor:pointer;font-size:0.85rem;">📷 Photo</button>
        <button type="button" class="ptb" data-type="video" onclick="selectPostType('video')" style="flex:1;padding:0.65rem;border-radius:10px;border:1px solid rgba(124,58,237,0.4);background:rgba(124,58,237,0.2);color:white;font-weight:600;cursor:pointer;font-size:0.85rem;">🎬 Video</button>
      </div>
      <input type="hidden" id="postMediaType" value="text">
      <textarea id="postText" placeholder="What's on your mind?" style="width:100%;min-height:100px;padding:0.85rem;background:rgba(12,0,25,0.9);border:1px solid rgba(124,58,237,0.35);border-radius:10px;color:#eae6ff;font-size:0.93rem;resize:vertical;font-family:inherit;margin-bottom:1rem;box-sizing:border-box;"></textarea>
      <div id="postMediaUrlGroup" style="display:none;margin-bottom:1rem;">
        <label style="display:block;margin-bottom:0.4rem;font-size:0.85rem;font-weight:600;color:rgba(234,230,255,0.75);">🔗 Media URL</label>
        <input type="url" id="postMediaUrl" placeholder="Paste image/video URL" class="form-input">
        <div class="hint">💡 Upload images at <a href="https://imgbb.com" target="_blank">imgbb.com</a></div>
      </div>
      <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">

      if(pin==='true'||pin===true){await db.from('posts').update({pinned:false}).eq('user_id',currentUser.id).eq('pinned',true);}

      if(p)p.pinned=pin==='true'||pin===true;
      renderPostGrid();renderPostViewer();

  };

      await db.from('posts').update({likes:p.likes}).eq('id',id);renderPostViewer();

  window.toggleComments=async function(id){var el=document.getElementById('comments-'+id);if(!el)return;if(el.style.display==='none'){el.style.display='block';loadComments(id);}else el.style.display='none';};

  async function loadComments(postId){
    var el=document.getElementById('commentList-'+postId);if(!el)return;
    var TABLE='post_comments';
    try{var test=await db.from('post_comments').select('id').limit(1);if(test.error)TABLE='comments';}catch(e){TABLE='comments';}
    try{
      var r=await db.from(TABLE).select('*').eq('post_id',postId).order('created_at',{ascending:true}).limit(50);
      var comments=r.data||[];
      var uids=[...new Set(comments.map(function(c){return c.user_id;}).filter(Boolean))];
      var pMap={};
      if(uids.length){var pr=await db.from('profiles').select('user_id,username,display_name').in('user_id',uids);if(pr.data)pr.data.forEach(function(p){pMap[p.user_id]=p;});}
      if(!comments.length){el.innerHTML='<div style="text-align:center;padding:1rem;color:rgba(168,85,247,0.4);font-size:0.85rem;">No comments yet.</div>';return;}
      el.innerHTML=comments.map(function(c){
        var pr=pMap[c.user_id]||{};var name=pr.display_name||pr.username||'User';
        var canDel=currentUser&&(c.user_id===currentUser.id);
        return '<div class="comment-item" id="cm-'+c.id+'"><div class="comment-author">'+esc(name)+' <span style="font-weight:400;color:rgba(234,230,255,0.4);font-size:0.7rem;">'+ago(c.created_at)+'</span></div><div class="comment-text">'+esc(c.text||c.content||'')+'</div><div class="comment-actions"><button class="comment-action" onclick="likeComment(\''+c.id+'\',\''+TABLE+'\')">❤️ '+(c.likes||0)+'</button><button class="comment-action" onclick="replyComment(\''+postId+'\',\''+esc(name)+'\')">↩️ Reply</button>'+(canDel?'<button class="comment-action" onclick="deleteComment(\''+c.id+'\',\''+postId+'\',\''+TABLE+'\')">🗑️</button>':'')+'</div></div>';
      }).join('');
    }catch(e){el.innerHTML='<div style="color:#ef4444;">'+e.message+'</div>';}
  }
  window.submitComment=async function(postId){
    if(!currentUser){alert('Sign in');return;}var inp=document.getElementById('commentInput-'+postId);var text=inp?inp.value.trim():'';if(!text)return;
    var TABLE='post_comments';try{var test=await db.from('post_comments').select('id').limit(1);if(test.error)TABLE='comments';}catch(e){TABLE='comments';}
    try{await db.from(TABLE).insert({post_id:postId,user_id:currentUser.id,text:text,likes:0});inp.value='';loadComments(postId);}catch(e){alert(e.message);}
  };

  window.deleteComment=async function(id,postId,table){if(!confirm('Delete?'))return;try{await db.from(table).delete().eq('id',id);loadComments(postId);}catch(e){alert(e.message);}};

  /* ── INIT ── */
  async function init(){
    try{
      var params=new URLSearchParams(location.search);var viewId=params.get('id');var user=null;
      try{var s=await db.auth.getSession();user=s?.data?.session?.user||null;}catch(e){}
      currentUser=user;
      var targetId=viewId||(user?user.id:null);
      if(!targetId){showError('Please <a href="login.html" style="color:#a855f7;">log in</a> to view your profile.');return;}
      isOwnProfile=!viewId||(user&&viewId===user.id);
      var pr=await db.from('profiles').select('*').eq('user_id',targetId).maybeSingle();
      if(pr.error){showError('Error: '+pr.error.message);return;}
      if(!pr.data){
        if(isOwnProfile&&user){
          var meta=user.user_metadata||{};
          var safeRole=(meta.role&&meta.role!=='owner'&&meta.role!=='admin'&&meta.role!=='co-owner')?meta.role:'fan';
          var np={user_id:user.id,username:meta.username||(user.email?user.email.split('@')[0]:'user'),display_name:meta.display_name||meta.name||null,role:safeRole,badges:[safeRole],coins:0};
          var ins=await db.from('profiles').insert(np).select().single();
          if(ins.error){showError('Could not create profile: '+ins.error.message);return;}
          pr={data:ins.data};
        }else{showError('Profile not found.');return;}
      }
      profileData=pr.data;
      document.getElementById('pageTitle').textContent=isOwnProfile?'👤 My Profile':'👤 '+(profileData.display_name||profileData.username);
      document.title=(profileData.display_name||profileData.username)+' — 8BFR';
      document.getElementById('loadingSpinner').style.display='none';
      document.getElementById('profileContent').style.display='block';
      await loadOwnedItems(targetId);
      renderProfile();
    }catch(e){showError('Error: '+e.message);}
  }

  /* ── RENDER PROFILE ── */
  function renderProfile(){

  /* ── OWNED UPGRADES ── */
  var ownedUpgrades=[];
  async function loadOwnedItems(uid){try{var r=await db.from('user_owned_items').select('item_id,item_type,expires_at').eq('user_id',uid);ownedUpgrades=(r.data||[]).filter(function(i){return !i.expires_at||new Date(i.expires_at)>new Date();});}catch(e){ownedUpgrades=[];}}
  function applyOwnedUpgrades(){
    var frameOrder=['frame_animated_purple','frame_animated_gold','frame_8bfr','frame_gold','frame_fire','frame_music','frame_glow'];
    var frameMap={'frame_animated_purple':'frame-animated-purple','frame_animated_gold':'frame-animated-gold','frame_8bfr':'frame-8bfr','frame_gold':'frame-gold','frame_fire':'frame-fire','frame_music':'frame-music','frame_glow':'frame-glow'};
    var activeFrame=null;
    for(var fi=0;fi<frameOrder.length;fi++){if(ownedUpgrades.find(function(o){return o.item_id===frameOrder[fi];})){activeFrame=frameMap[frameOrder[fi]];break;}}
    var avatarEl=document.getElementById('avatarDisplay');
    if(avatarEl&&activeFrame){var wrap=document.createElement('div');wrap.className='avatar-frame-wrap '+activeFrame;avatarEl.parentNode.insertBefore(wrap,avatarEl);wrap.appendChild(avatarEl);var ov=document.createElement('div');ov.className='frame-overlay';wrap.appendChild(ov);}
    var bgMap={'bg_neon_purple':'bg-neon-purple','bg_midnight_blue':'bg-midnight-blue','bg_gold_flame':'bg-gold-flame','bg_galaxy':'bg-galaxy'};
    var bgId=profileData.profile_bg||null;
    if(!bgId){var bk=Object.keys(bgMap);for(var bi=0;bi<bk.length;bi++){if(ownedUpgrades.find(function(o){return o.item_id===bk[bi];})){bgId=bk[bi];break;}}}
    var bannerEl=document.getElementById('coverBanner');
    if(bannerEl&&bgId&&bgMap[bgId]&&!bannerEl.querySelector('img'))bannerEl.classList.add(bgMap[bgId]);
    var hasPro=ownedUpgrades.find(function(o){return o.item_id==='badge_artist_pro';})||profileData.artist_pro;
    if(hasPro){var brs=document.querySelectorAll('.badge');if(brs.length){var pb=document.createElement('span');pb.className='badge-artist-pro';pb.textContent='⚡ Artist Pro';brs[0].parentNode.insertBefore(pb,brs[0]);}}
  }

  /* ── SAVE PROFILE ── */
  window.saveProfile=async function(){
    if(!currentUser)return;var n=document.getElementById('saveN');
    var un=document.getElementById('eUN').value.trim(),dn=document.getElementById('eDN').value.trim(),bio=document.getElementById('eBio').value,av=document.getElementById('eAv').value.trim(),cov=document.getElementById('eCov').value.trim();
    var pp=document.getElementById('ePP');
    if(!un){n.textContent='Username required';n.style.color='#ef4444';return;}
    n.textContent='Saving…';n.style.color='#a855f7';
    try{
      var up={username:un,display_name:dn,bio:bio,avatar_url:av||null,cover_url:cov||null};
      var sKeys=['spotify','apple_music','amazon_music','tidal','deezer','soundcloud','bandlab','audiomack','beatstars','pandora','youtube','youtube_music','instagram','tiktok','twitter','facebook','threads','snapchat','discord','twitch','website'];
      var nSL={};sKeys.forEach(function(k){var el=document.getElementById('sl_'+k);if(el&&el.value.trim())nSL[k]=el.value.trim();});
      up.social_links=nSL;
      if(pp)up.paypal_email=pp.value.trim()||null;
      var r=await db.from('profiles').update(up).eq('user_id',currentUser.id);if(r.error)throw r.error;
      n.textContent='Saved!';n.style.color='#4ade80';
      setTimeout(function(){n.textContent='';location.reload();},1200);
    }catch(e){n.textContent=e.message;n.style.color='#ef4444';}
  };

  async function loadStories(uid){
    var bar=document.getElementById('storiesBar');if(!bar)return;
    try{var sr=await db.from('stories').select('id,text,background_color,media_url,media_type,created_at,expires_at,views').eq('user_id',uid).order('created_at',{ascending:false}).limit(20);

    var bb='';
    if(isOwnProfile)bb+='<div class="story-bubble" onclick="openStoryModal()"><div class="story-ring add-new" style="width:68px;height:68px;"><span style="font-size:1.5rem;color:#a855f7;">+</span></div><div class="story-label" style="color:#a855f7;font-weight:600;">Add Story</div></div>';

    stories.forEach(function(s){var bg=s.media_url?'background-image:url('+s.media_url+');background-size:cover;':'background:'+(s.background_color||'#7c3aed')+';';
    bb+='<div class="story-bubble" onclick="location.href=\'stories.html?id='+s.id+'\'"><div class="story-ring"><div class="story-ring-inner" style="'+bg+'"></div></div><div class="story-label">'+(s.views||0)+' views</div></div>';});
    bar.innerHTML=bb;}catch(e){bar.style.display='none';}
  }

    try{

      var f2=await db.from('follows').select('id',{count:'exact',head:true}).eq('follower_id',uid);
      var f3=await db.from('friends').select('id',{count:'exact',head:true}).or('user_id.eq.'+uid+',friend_id.eq.'+uid).eq('status','accepted');
      var lk=await db.from('posts').select('likes').eq('user_id',uid);
      var totalLikes=(lk.data||[]).reduce(function(a,p){return a+(p.likes||0);},0);
      var rs=await db.from('posts').select('reshares').eq('user_id',uid);
      var totalReshares=(rs.data||[]).reduce(function(a,p){return a+(p.reshares||0);},0);
      function set(id,val){var el=document.getElementById(id);if(el)el.textContent=val;}
      set('sn-followers',f1.count||0);set('sn-following',f2.count||0);set('sn-friends',f3.count||0);set('sn-likes',totalLikes);set('sn-reshares',totalReshares);
    }catch(e){}
  }

  /* ── SONGS ── */
  async function loadSongs(uid){
    var el=document.getElementById('songList');if(!el)return;
    try{var sr=await db.from('songs').select('id,title,artist,cover_art,song_url,explicit,price').eq('uploaded_by',uid).is('dummy_id',null).order('created_at',{ascending:false});
    var songs=sr.data||[];
    if(!songs.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:rgba(168,85,247,0.5);">No songs yet.</div>';return;}
    el.innerHTML=songs.map(function(s){
      var cv=s.cover_art?'<img src="'+s.cover_art+'" onerror="this.parentNode.textContent=\'🎵\'">':'🎵';
      var del=isOwnProfile?'<button class="btn btn-red btn-sm" onclick="delSong(\''+s.id+'\')">🗑️</button>':'';
      var pr=parseFloat(s.price)||0;var pt=pr>0?'<span style="color:#4ade80;font-size:0.8rem;margin-left:0.4rem;">$'+pr.toFixed(2)+'</span>':'';
      return '<div class="song-row" id="s-'+s.id+'"><div class="song-cover">'+cv+'</div><div class="song-info"><div class="song-title">'+esc(s.title||'Untitled')+(s.explicit?' 🔞':'')+pt+'</div><div class="song-meta">'+esc(s.artist||'')+'</div>'+(s.song_url?'<audio controls src="'+s.song_url+'" preload="none" style="height:32px;margin-top:6px;"></audio>':'')+'</div>'+del+'</div>';
    }).join('');}catch(e){el.innerHTML='<div style="color:#ef4444;">'+e.message+'</div>';}
  }

  /* ── POSTS ── */
  async function loadPosts(uid){
    var el=document.getElementById('postList');if(!el)return;
    try{
      // Load ALL posts including hidden/private for own profile
      var q=db.from('posts').select('id,text,media,media_type,likes,shares,favorites,reshares,reshared_from,comment_count,created_at,hidden,pinned,is_private,user_id').eq('user_id',uid).order('created_at',{ascending:false}).limit(100);
      var sr=await q;
      allPosts=sr.data||[];

      // Also load liked and favorited posts for tabs
      if(currentUser){
        var ids=allPosts.map(function(p){return p.id;});
        if(ids.length){
          var lkr=await db.from('post_likes').select('post_id').eq('user_id',currentUser.id).in('post_id',ids);
          var fvr=await db.from('post_favorites').select('post_id').eq('user_id',currentUser.id).in('post_id',ids);
          var likedSet={};(lkr.data||[]).forEach(function(x){likedSet[x.post_id]=true;});
          var favSet={};(fvr.data||[]).forEach(function(x){favSet[x.post_id]=true;});
          allPosts.forEach(function(p){p._liked=!!likedSet[p.id];p._favorited=!!favSet[p.id];});
        }
      }

      // Load user's liked posts (for Likes tab)
      if(currentUser&&(isOwnProfile||uid===currentUser.id)){
        try{
          var likedR=await db.from('post_likes').select('post_id').eq('user_id',uid).order('created_at',{ascending:false}).limit(50);
          var likedIds=(likedR.data||[]).map(function(x){return x.post_id;});
          if(likedIds.length){
            var lp=await db.from('posts').select('id,text,media,media_type,likes,shares,favorites,reshares,reshared_from,comment_count,created_at,hidden,pinned,is_private,user_id').in('id',likedIds);
            window._likedPosts=lp.data||[];
          }else{window._likedPosts=[];}
        }catch(e){window._likedPosts=[];}
      }

      // Load user's favorited posts (for Favorites tab)
      if(currentUser&&(isOwnProfile||uid===currentUser.id)){
        try{
          var favR=await db.from('post_favorites').select('post_id').eq('user_id',uid).order('created_at',{ascending:false}).limit(50);
          var favIds=(favR.data||[]).map(function(x){return x.post_id;});
          if(favIds.length){
            var fp=await db.from('posts').select('id,text,media,media_type,likes,shares,favorites,reshares,reshared_from,comment_count,created_at,hidden,pinned,is_private,user_id').in('id',favIds);
            window._favoritedPosts=fp.data||[];
          }else{window._favoritedPosts=[];}
        }catch(e){window._favoritedPosts=[];}
      }

      renderPostGrid();
    }catch(e){el.innerHTML='<div style="color:#ef4444;">'+e.message+'</div>';}
  }

  function renderPostGrid(){
    var el=document.getElementById('postList');if(!el)return;
    var ms=document.getElementById('musicSection');
    var tc=document.getElementById('tabContent');

    // Show/hide music section vs post grid
    if(activeProfileTab==='music'){
      if(tc)tc.style.display='none';
      if(ms){ms.style.display='block';loadSongs(profileData.user_id);}
      return;
    }else{
      if(tc)tc.style.display='block';
      if(ms)ms.style.display='none';
    }

    // Filter posts based on active tab
    if(activeProfileTab==='posts'){
      filteredPosts=allPosts.filter(function(p){
        if(!isOwnProfile&&(p.hidden||p.is_private))return false;
        if(!p.reshared_from)return true;return false;
      });
      // Sort: pinned first, then by date
      filteredPosts.sort(function(a,b){if(a.pinned&&!b.pinned)return -1;if(!a.pinned&&b.pinned)return 1;return new Date(b.created_at)-new Date(a.created_at);});
    }else if(activeProfileTab==='reshares'){
      filteredPosts=allPosts.filter(function(p){return !!p.reshared_from;});
    }else if(activeProfileTab==='favorites'){
      filteredPosts=window._favoritedPosts||[];
    }else if(activeProfileTab==='likes'){
      filteredPosts=window._likedPosts||[];
    }else if(activeProfileTab==='private'){
      filteredPosts=allPosts.filter(function(p){return p.is_private||p.hidden;});
    }else{
      filteredPosts=allPosts;
    }

    if(!filteredPosts.length){
      var emptyMsg={posts:'No posts yet.',reshares:'No reshares yet.',favorites:'No favorites yet.',likes:'No liked posts yet.',private:'No private or hidden posts.'};
      el.innerHTML='<div style="text-align:center;padding:2rem;color:rgba(168,85,247,0.5);">'+(emptyMsg[activeProfileTab]||'Nothing here.')+'</div>';
      return;
    }

    var gridHtml='<div class="post-grid">';
    filteredPosts.forEach(function(p,i){
      var thumb='';
      if(p.media&&(p.media_type==='photo'||p.media_type==='image')){
        thumb='<img src="'+p.media+'" loading="lazy" onerror="this.parentNode.style.background=\'rgba(124,58,237,0.2)\'">';
      }else if(p.media&&p.media_type==='video'){
        var ytM=p.media.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
        if(ytM)thumb='<img src="https://img.youtube.com/vi/'+ytM[1]+'/hqdefault.jpg" loading="lazy" style="width:100%;height:100%;object-fit:cover;"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;"><div style="width:28px;height:28px;background:rgba(255,0,0,0.85);border-radius:50%;display:flex;align-items:center;justify-content:center;"><div style="width:0;height:0;border-style:solid;border-width:6px 0 6px 12px;border-color:transparent transparent transparent #fff;margin-left:2px;"></div></div></div>';
        else thumb='<div class="post-thumb-text">🎬 Video</div>';
      }else{
        var colors=['rgba(124,58,237,0.3)','rgba(168,85,247,0.25)','rgba(236,72,153,0.2)','rgba(6,182,212,0.2)'];
        thumb='<div class="post-thumb-text" style="background:'+colors[i%4]+';">'+esc((p.text||'').substring(0,60))+'</div>';
      }
      gridHtml+='<div class="post-thumb" onclick="openPostViewer('+i+')">'+thumb;
      if(p.pinned)gridHtml+='<div class="pin-badge">📌</div>';
      if(p.hidden&&isOwnProfile)gridHtml+='<div class="hidden-badge">🙈</div>';
      if(p.is_private&&isOwnProfile)gridHtml+='<div class="hidden-badge">🔒</div>';
      if((p.likes||0)>0)gridHtml+='<div style="position:absolute;bottom:4px;left:4px;font-size:0.65rem;background:rgba(0,0,0,0.6);padding:2px 5px;border-radius:8px;">❤️ '+p.likes+'</div>';
      gridHtml+='</div>';
    });
    gridHtml+='</div>';
    el.innerHTML=gridHtml;
  }

  /* ── SOCIAL ── */
  async function checkRel(tid){if(!currentUser)return;try{var sr=await db.from('follows').select('id').eq('follower_id',currentUser.id).eq('following_id',tid).limit(1);var btn=document.getElementById('followBtn');if(btn&&sr.data&&sr.data.length>0){btn.textContent='✓ Following';btn.style.background='#059669';}}catch(e){}}
  window.toggleFollow=async function(){if(!currentUser||!profileData)return;var btn=document.getElementById('followBtn'),tid=profileData.user_id;try{var sr=await db.from('follows').select('id').eq('follower_id',currentUser.id).eq('following_id',tid).limit(1);if(sr.data&&sr.data.length>0){await db.from('follows').delete().eq('id',sr.data[0].id);btn.textContent='Follow';btn.style.background='#7c3aed';}else{await db.from('follows').insert({follower_id:currentUser.id,following_id:tid});btn.textContent='✓ Following';btn.style.background='#059669';}loadStats(tid);}catch(e){alert(e.message);}};
  window.sendFR=async function(){if(!currentUser||!profileData)return;var btn=document.getElementById('friendBtn');try{var sr=await db.from('friends').select('id,status').or('and(user_id.eq.'+currentUser.id+',friend_id.eq.'+profileData.user_id+'),and(user_id.eq.'+profileData.user_id+',friend_id.eq.'+currentUser.id+')').limit(1);if(sr.data&&sr.data.length>0){btn.textContent=sr.data[0].status==='accepted'?'🤝 Friends':'⏳ Pending';return;}await db.from('friends').insert({user_id:currentUser.id,friend_id:profileData.user_id,status:'pending'});btn.textContent='⏳ Sent';}catch(e){alert(e.message);}};

  /* ── SONG UPLOAD ── */
  window.toggleUF=function(){var f=document.getElementById('uploadForm');f.style.display=f.style.display==='none'?'block':'none';};
  window.uploadSong=async function(){
    if(!currentUser)return;var title=document.getElementById('uT').value.trim(),artist=document.getElementById('uA').value.trim(),expl=document.getElementById('uEx').value==='true',price=document.getElementById('uPr').value.trim(),af=document.getElementById('uAF').files[0],cf=document.getElementById('uCF').files[0],n=document.getElementById('uN');
    if(!title){n.textContent='Title needed';return;}if(!af){n.textContent='Audio needed';return;}
    document.getElementById('uBtn').disabled=true;n.innerHTML='<span style="color:#a855f7;">Uploading…</span>';
    try{var ext=af.name.split('.').pop();var ap=currentUser.id+'/songs/'+Date.now()+'.'+ext;var ur=await db.storage.from('songs').upload(ap,af,{contentType:af.type});if(ur.error)throw new Error(ur.error.message);
    var su=db.storage.from('songs').getPublicUrl(ap).data.publicUrl;var cu=null;
    if(cf){var ce=cf.name.split('.').pop();var cp=currentUser.id+'/covers/'+Date.now()+'.'+ce;var cr=await db.storage.from('songs').upload(cp,cf,{contentType:cf.type});if(!cr.error)cu=db.storage.from('songs').getPublicUrl(cp).data.publicUrl;}
    var ir=await db.from('songs').insert({title:title,artist:artist||profileData?.display_name||'',uploaded_by:currentUser.id,song_url:su,cover_art:cu,explicit:expl,featured:false,price:price?parseFloat(price):0});
    if(ir.error)throw new Error(ir.error.message);
    n.innerHTML='<span style="color:#4ade80;">Done!</span>';setTimeout(function(){toggleUF();loadSongs(currentUser.id);},1200);
    }catch(e){n.innerHTML='<span style="color:#ef4444;">'+e.message+'</span>';}document.getElementById('uBtn').disabled=false;
  };
  document.addEventListener('change',function(e){
    if(e.target.id==='uAF'){var f=e.target.files[0];if(!f)return;if(f.size>20e6){document.getElementById('uN').textContent='Max 20MB';e.target.value='';return;}document.getElementById('uAT').textContent='✅ '+f.name;var t=document.getElementById('uT');if(!t.value)t.value=f.name.replace(/\.[^/.]+$/,'').replace(/[-_]/g,' ');}
    if(e.target.id==='uCF'&&e.target.files[0])document.getElementById('uCT').textContent='✅ '+e.target.files[0].name;
  });
  window.delSong=async function(id){if(!confirm('Delete?'))return;try{await db.from('songs').delete().eq('id',id).eq('uploaded_by',currentUser.id);var r=document.getElementById('s-'+id);if(r)r.remove();}catch(e){alert(e.message);}};

  setTimeout(function(){var s=document.getElementById('loadingSpinner');if(s&&s.style.display!=='none')showError('Timed out.');},8000);
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',function(){init();});
  else init();
  })();
  </script>
