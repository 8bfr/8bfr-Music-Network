<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>8BFR Shop</title>
  <link rel="icon" href="assets/images/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="carrie-closet-data.js?v=3"></script>
  <script src="carrie-supabase-sync.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

    :root { --gold:#f5c842; --purple:#7c3aed; --cyan:#00d9ff; }
    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family:'DM Sans',system-ui,sans-serif;
      background:
        radial-gradient(900px 500px at 15% -5%,rgba(124,58,237,.28),transparent 60%),
        radial-gradient(700px 400px at 90% 10%,rgba(0,217,255,.15),transparent 60%),
        linear-gradient(180deg,#050011 0%,#000 100%);
      color:#eae6ff; min-height:100vh; padding-bottom:80px;
    }

    header {
      background:rgba(8,0,20,.95);
      border-bottom:1px solid rgba(124,58,237,.4);
      padding:1rem 1.5rem; position:sticky; top:0; z-index:100;
    }
    .hdr-inner {
      max-width:1100px; margin:0 auto;
      display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;
    }
    .logo-area { display:flex; align-items:center; gap:.75rem; }
    .logo-area img { height:36px; width:auto; }
    .page-title { font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800; }
    .page-title span { color:var(--gold); }

    .balance-pill {
      display:flex; align-items:center; gap:.4rem;
      background:rgba(245,200,66,.1); border:1px solid rgba(245,200,66,.35);
      border-radius:999px; padding:.35rem .85rem;
      font-size:.85rem; font-weight:600; color:var(--gold);
    }

    main { max-width:1100px; margin:0 auto; padding:1.5rem 1rem 3rem; }

    .cat-tabs { display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:1.25rem; }
    .cat-tab {
      padding:.45rem .9rem; border-radius:999px;
      border:1px solid rgba(124,58,237,.4); background:rgba(15,23,42,.8);
      color:#e5e7eb; font-size:.82rem; font-weight:600; cursor:pointer;
      transition:all .15s; font-family:'DM Sans',sans-serif;
    }
    .cat-tab.active {
      border-color:#a855f7;
      background:linear-gradient(135deg,var(--purple),#a855f7);
      color:#fff; box-shadow:0 0 16px rgba(124,58,237,.4);
    }

    .items-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
      gap:1rem;
    }

    .item-card {
      background:rgba(12,3,28,.9);
      border:1px solid rgba(124,58,237,.35);
      border-radius:14px; padding:1rem;
      text-align:center; position:relative; transition:all .15s;
    }
    .item-card:not(.owned) { cursor:pointer; }
    .item-card:hover:not(.owned) {
      border-color:#a855f7; transform:translateY(-2px);
      box-shadow:0 0 20px rgba(124,58,237,.5);
    }
    .item-card.owned { border-color:rgba(34,197,94,.5); }

    .item-thumb {
      width:100%; aspect-ratio:1; border-radius:8px;
      background:rgba(5,0,17,.6);
      display:flex; align-items:center; justify-content:center;
      overflow:hidden; margin-bottom:.6rem;
    }
    .item-thumb img { max-width:80%; max-height:80%; object-fit:contain; }

    .item-name { font-size:.78rem; font-weight:600; color:#eae6ff; margin-bottom:.3rem; line-height:1.3; }
    .item-label { font-size:.7rem; color:rgba(168,85,247,.65); margin-bottom:.5rem; }

    .price-tag {
      display:inline-flex; align-items:center; gap:.25rem;
      font-size:.78rem; font-weight:700; padding:.2rem .5rem; border-radius:999px;
    }
    .price-tag.cost      { background:rgba(124,58,237,.2); border:1px solid rgba(124,58,237,.4); color:#a855f7; }
    .price-tag.owned-tag { background:rgba(34,197,94,.15); border:1px solid rgba(34,197,94,.4); color:#4ade80; }
    .price-tag.free-tag  { background:rgba(245,200,66,.15); border:1px solid rgba(245,200,66,.4); color:var(--gold); }

    .buy-btn {
      width:100%; margin-top:.6rem; padding:.4rem; border-radius:8px; border:none;
      background:linear-gradient(135deg,var(--purple),#a855f7);
      color:#fff; font-weight:700; font-size:.78rem; cursor:pointer;
      font-family:'DM Sans',sans-serif; transition:all .15s;
    }
    .buy-btn:hover { box-shadow:0 0 14px rgba(124,58,237,.6); }
    .buy-btn:disabled { opacity:.4; cursor:default; }
    .buy-btn.cant-afford { background:rgba(71,85,105,.4); color:#94a3b8; cursor:default; }

    .alert {
      padding:.75rem 1rem; border-radius:10px;
      font-size:.88rem; font-weight:600; margin-bottom:1rem;
    }
    .alert.success { background:rgba(34,197,94,.15); border:1px solid rgba(34,197,94,.4); color:#4ade80; }
    .alert.error   { background:rgba(239,68,68,.15);  border:1px solid rgba(239,68,68,.4);  color:#f87171; }

    .spinner {
      width:32px; height:32px;
      border:3px solid rgba(124,58,237,.2); border-top-color:#a855f7;
      border-radius:50%; animation:spin .7s linear infinite; margin:2rem auto;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    .empty-msg {
      grid-column:1/-1; text-align:center;
      padding:2rem; color:rgba(168,85,247,.5); font-size:.9rem;
    }

    @media(max-width:480px){ .items-grid { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <div class="logo-area">
      <img src="assets/images/logo_8bfr.svg" alt="8BFR"
           onerror="this.onerror=null;this.src='assets/images/8bfr.png'">
      <div class="page-title">8BFR <span>Shop</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;">
      <div class="balance-pill">🪙 <span id="balanceDisplay">—</span> coins</div>
      <a href="coinshop.html"    style="color:var(--cyan);font-size:.82rem;text-decoration:none;">+ Buy Coins</a>
      <a href="carrie-chat.html" style="color:rgba(168,85,247,.7);font-size:.82rem;text-decoration:none;">💬 Carrie</a>
      <a href="index.html"       style="color:rgba(168,85,247,.7);font-size:.82rem;text-decoration:none;">← Home</a>
    </div>
  </div>
</header>

<main>
  <div id="alertBox" style="display:none;" class="alert"></div>
  <div id="loadingSpinner"><div class="spinner"></div></div>

  <div id="shopContent" style="display:none;">
    <div class="cat-tabs" id="catTabs">
      <button class="cat-tab active" data-cat="all">All Items</button>
      <button class="cat-tab" data-cat="hair">Hair</button>
      <button class="cat-tab" data-cat="top">Tops</button>
      <button class="cat-tab" data-cat="bottom">Bottoms</button>
      <button class="cat-tab" data-cat="jewelry">Jewelry</button>
      <button class="cat-tab" data-cat="eyes">Eyes</button>
      <button class="cat-tab" data-cat="shoes">Shoes</button>
    </div>
    <div class="items-grid" id="itemsGrid"></div>
  </div>
</main>

<script src="scripts.js" defer></script>
<script>
(function () {
  var COINS_KEY     = 'carrieCoins_v1';
  var OWNERSHIP_KEY = 'carrieOwnedItems_v1';
  var OWNER_EMAIL   = '8bfr.music@gmail.com';
  var OWNER_PASS    = '197594773839*Ab4444';
  var USER_EMAIL_K  = 'carrieUserEmail_v1';
  var USER_PASS_K   = 'carrieUserPassword_v1';

  var coins      = 0;
  var ownedItems = [];
  var currentCat = 'all';

  var balanceEl  = document.getElementById('balanceDisplay');
  var gridEl     = document.getElementById('itemsGrid');
  var alertEl    = document.getElementById('alertBox');
  var spinner    = document.getElementById('loadingSpinner');
  var content    = document.getElementById('shopContent');

  function isOwnerLS() {
    return localStorage.getItem(USER_EMAIL_K) === OWNER_EMAIL &&
           localStorage.getItem(USER_PASS_K)  === OWNER_PASS;
  }

  function isOwner() {
    if (window.CARRIE_SYNC) return window.CARRIE_SYNC.isOwner;
    return isOwnerLS();
  }

  function showAlert(msg, type) {
    alertEl.textContent   = msg;
    alertEl.className     = 'alert ' + type;
    alertEl.style.display = 'block';
    clearTimeout(alertEl._t);
    alertEl._t = setTimeout(function () { alertEl.style.display = 'none'; }, 5000);
  }

  function updateBalance() {
    balanceEl.textContent = isOwner() ? '∞' : coins.toLocaleString();
  }

  function getItems() {
    return Array.isArray(window.CARRIE_CLOSET_ITEMS) ? window.CARRIE_CLOSET_ITEMS : [];
  }

  function filterItems() {
    var items = getItems();
    if (currentCat === 'all') return items;
    return items.filter(function (it) {
      return it.category === currentCat || it.cat === currentCat;
    });
  }

  // ── Buy ──────────────────────────────────────────────────────
  async function buyItem(item) {
    if (ownedItems.indexOf(item.id) > -1) return;

    if (isOwner()) {
      ownedItems.push(item.id);
      localStorage.setItem(OWNERSHIP_KEY, JSON.stringify(ownedItems));
      render();
      showAlert('✅ ' + item.name + ' unlocked!', 'success');
      return;
    }

    if (coins < (item.coins || 0)) {
      showAlert('Not enough coins — you need ' + (item.coins || 0) + ' 🪙', 'error');
      return;
    }

    if (!confirm('Buy ' + item.name + ' for ' + item.coins + ' coins?')) return;

    // Deduct locally first for instant feedback
    coins -= item.coins;
    ownedItems.push(item.id);
    localStorage.setItem(COINS_KEY, coins.toString());
    localStorage.setItem(OWNERSHIP_KEY, JSON.stringify(ownedItems));
    updateBalance();
    render();
    showAlert('✅ ' + item.name + ' purchased! Equip it in Carrie Chat or the Closet.', 'success');

    // Push to Supabase in background
    if (window.CARRIE_SYNC && window.CARRIE_SYNC.isLoggedIn()) {
      window.CARRIE_SYNC.pushCoins(coins);
      window.CARRIE_SYNC.pushOwnedItem(item.id, item.name, item.coins);
    }
  }

  // ── Render ──────────────────────────────────────────────────
  function render() {
    var list = filterItems();
    gridEl.innerHTML = '';

    if (!list.length) {
      gridEl.innerHTML = '<div class="empty-msg">No items in this category yet.</div>';
      return;
    }

    list.forEach(function (item) {
      var owned     = ownedItems.indexOf(item.id) > -1;
      var canAfford = isOwner() || coins >= (item.coins || 0);

      var card  = document.createElement('div');
      card.className = 'item-card' + (owned ? ' owned' : '');

      var thumb = document.createElement('div');
      thumb.className = 'item-thumb';
      var img = document.createElement('img');
      img.src = item.img; img.alt = item.name;
      img.onerror = function () { this.style.opacity = '.3'; };
      thumb.appendChild(img);

      var name = document.createElement('div');
      name.className = 'item-name';
      name.textContent = item.name;

      var lbl = document.createElement('div');
      lbl.className = 'item-label';
      lbl.textContent = item.label || item.category;

      var tag = document.createElement('div');
      if (isOwner()) {
        tag.className   = 'price-tag free-tag';
        tag.textContent = '👑 Free';
      } else if (owned) {
        tag.className   = 'price-tag owned-tag';
        tag.textContent = '✅ Owned';
      } else {
        tag.className   = 'price-tag cost';
        tag.textContent = '🪙 ' + (item.coins || 0);
      }

      card.appendChild(thumb);
      card.appendChild(name);
      card.appendChild(lbl);
      card.appendChild(tag);

      if (!owned) {
        var btn = document.createElement('button');
        btn.className   = 'buy-btn' + (!canAfford ? ' cant-afford' : '');
        btn.textContent = canAfford ? 'Buy Now' : 'Need More Coins';
        if (canAfford) {
          btn.addEventListener('click', (function (i) {
            return function () { buyItem(i); };
          })(item));
        }
        card.appendChild(btn);
      }

      gridEl.appendChild(card);
    });
  }

  // ── Category tabs ─────────────────────────────────────────────
  document.getElementById('catTabs').addEventListener('click', function (e) {
    var btn = e.target.closest('.cat-tab');
    if (!btn) return;
    document.querySelectorAll('.cat-tab').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render();
  });

  // ── Init ─────────────────────────────────────────────────────
  function loadFromLocal() {
    try { ownedItems = JSON.parse(localStorage.getItem(OWNERSHIP_KEY) || '[]'); } catch (e) { ownedItems = []; }
    try { coins = parseInt(localStorage.getItem(COINS_KEY) || '0', 10) || 0; } catch (e) { coins = 0; }
    if (isOwnerLS()) {
      coins = 999999;
      ownedItems = getItems().map(function (i) { return i.id; });
      localStorage.setItem(COINS_KEY, coins.toString());
      localStorage.setItem(OWNERSHIP_KEY, JSON.stringify(ownedItems));
    }
  }

  function showShop() {
    spinner.style.display = 'none';
    content.style.display = 'block';
    updateBalance();
    render();
  }

  function init() {
    // Wait for closet data
    if (!window.CARRIE_CLOSET_ITEMS) { setTimeout(init, 100); return; }

    loadFromLocal();

    // carrie-supabase-sync.js runs async — give it up to 3s to finish
    // then show the shop either way (localStorage is the fallback)
    var waited = 0;
    var syncWait = setInterval(function () {
      waited += 200;
      var syncDone = window.CARRIE_SYNC !== undefined;
      if (syncDone || waited >= 3000) {
        clearInterval(syncWait);
        // Re-read localStorage in case sync updated it
        loadFromLocal();
        showShop();
      }
    }, 200);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
