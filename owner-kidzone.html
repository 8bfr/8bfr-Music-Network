<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KidZone Admin — Owner Panel</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fredoka+One&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--dark:#0b0014;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);--green:#00ff88;--red:#ef4444;--yellow:#eab308;--cyan:#00d9ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--yellow);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--yellow);}
.header a{color:var(--text);text-decoration:none;font-weight:600;font-size:.85rem;}
.container{max-width:900px;margin:0 auto;padding:1.5rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1.25rem;}
.st{font-family:'Bebas Neue',cursive;font-size:1.2rem;margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:center;}
.tabs{display:flex;gap:.4rem;margin-bottom:1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:.5rem .9rem;border-radius:8px;border:1px solid var(--border);background:var(--dark);color:var(--dim);cursor:pointer;font-size:.82rem;font-weight:600;white-space:nowrap;flex-shrink:0;transition:all .2s;}
.tab:hover{border-color:var(--primary);}.tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.badge-ct{background:rgba(239,68,68,.2);color:var(--red);font-size:.65rem;padding:.1rem .35rem;border-radius:8px;font-weight:700;margin-left:.3rem;}
.btn{padding:.5rem 1rem;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:.85rem;transition:all .2s;}
.btn-green{background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.4);color:var(--green);}
.btn-red{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.btn-purple{background:var(--primary);color:#fff;}.btn-outline{background:rgba(124,58,237,.15);border:1px solid var(--border);color:var(--text);}
input,select,textarea{width:100%;padding:.55rem .75rem;background:var(--dark);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.88rem;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);}
.form-group{margin-bottom:.6rem;}.form-group label{display:block;font-size:.78rem;color:var(--dim);margin-bottom:.25rem;font-weight:600;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:.5rem;margin-bottom:1.25rem;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem;text-align:center;}
.stat-num{font-family:'Bebas Neue',cursive;font-size:1.8rem;color:var(--primary);}
.stat-label{font-size:.7rem;color:var(--dim);}

/* List items */
.list-item{display:flex;gap:.75rem;align-items:center;padding:.6rem .4rem;border-bottom:1px solid rgba(124,58,237,.08);transition:background .15s;}
.list-item:hover{background:rgba(124,58,237,.04);}
.list-item:last-child{border:none;}
.li-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#ec4899);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;border:2px solid var(--yellow);}
.li-info{flex:1;min-width:0;}
.li-name{font-weight:600;font-size:.88rem;}
.li-meta{font-size:.72rem;color:var(--dim);}
.li-actions{display:flex;gap:.3rem;flex-shrink:0;flex-wrap:wrap;}
.li-btn{padding:.3rem .5rem;border-radius:6px;border:1px solid var(--border);background:none;color:var(--dim);cursor:pointer;font-size:.72rem;font-weight:600;transition:all .2s;}
.li-btn:hover{border-color:var(--primary);color:var(--text);}
.li-btn.approve{border-color:rgba(34,197,94,.4);color:var(--green);}
.li-btn.reject{border-color:rgba(239,68,68,.3);color:#fca5a5;}
.li-btn.warn{border-color:rgba(234,179,8,.4);color:var(--yellow);}

.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.3rem;}
.dot-pending{background:var(--yellow);}.dot-approved{background:var(--green);}.dot-rejected{background:var(--red);}

.empty{text-align:center;padding:1.5rem;color:var(--dim);font-size:.85rem;}
@media(max-width:500px){.form-row{grid-template-columns:1fr;}.stats-bar{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="header">
<a href="owner-panel.html">← Owner Panel</a>
<h1>🧸 KidZone Admin</h1>
<a href="owner-monitor.html">👁️ Monitor</a>
</div>
<div class="container">

<!-- STATS -->
<div class="stats-bar" id="statsBar">
<div class="stat-box"><div class="stat-num" id="statParents">-</div><div class="stat-label">Verified Parents</div></div>
<div class="stat-box"><div class="stat-num" id="statKids">-</div><div class="stat-label">Kid Accounts</div></div>
<div class="stat-box"><div class="stat-num" id="statPending">-</div><div class="stat-label">Pending Verify</div></div>
<div class="stat-box"><div class="stat-num" id="statUploads">-</div><div class="stat-label">Kid Uploads</div></div>
<div class="stat-box"><div class="stat-num" id="statChallenges">-</div><div class="stat-label">Challenges</div></div>
<div class="stat-box"><div class="stat-num" id="statFlagged">-</div><div class="stat-label">Flagged</div></div>
</div>

<!-- TABS -->
<div class="tabs">
<button class="tab active" onclick="switchTab('verifications',this)">👨‍👩‍👧 Verifications <span class="badge-ct" id="pendingBadge">0</span></button>
<button class="tab" onclick="switchTab('kids',this)">🧒 All Kids</button>
<button class="tab" onclick="switchTab('uploads',this)">🎵 Uploads</button>
<button class="tab" onclick="switchTab('challenges',this)">🏆 Challenges</button>
<button class="tab" onclick="switchTab('rewards',this)">🎁 Rewards</button>
<button class="tab" onclick="switchTab('flagged',this)">🚩 Flagged</button>
<button class="tab" onclick="switchTab('chat',this)">💬 KZ Chat</button>
</div>

<div id="tabContent"></div>
</div>

<script src="scripts.js" defer></script>
<script>
const SUPABASE_URL='https://novbuvwpjnxwwvdekjhr.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0';
const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
let currentTab='verifications';

async function init(){
  const{data:{session}}=await db.auth.getSession();
  if(!session){location.href='login.html';return;}
  const{data:p}=await db.from('profiles').select('role').eq('user_id',session.user.id).single();
  if(!p||!['owner','co-owner','admin'].includes(p.role)){alert('Staff access only.');location.href='feed.html';return;}
  loadStats();
  loadTab();
}

async function loadStats(){
  try{
    const[parents,kids,pending,uploads,challenges,flagged]=await Promise.all([
      db.from('parent_verifications').select('*',{count:'exact',head:true}).eq('status','approved'),
      db.from('kid_profiles').select('*',{count:'exact',head:true}).eq('is_active',true),
      db.from('parent_verifications').select('*',{count:'exact',head:true}).eq('status','pending'),
      db.from('kid_uploads').select('*',{count:'exact',head:true}),
      db.from('kid_challenges').select('*',{count:'exact',head:true}).eq('is_active',true),
      db.from('kid_uploads').select('*',{count:'exact',head:true}).eq('flagged',true),
    ]);
    document.getElementById('statParents').textContent=parents.count||0;
    document.getElementById('statKids').textContent=kids.count||0;
    document.getElementById('statPending').textContent=pending.count||0;
    document.getElementById('statUploads').textContent=uploads.count||0;
    document.getElementById('statChallenges').textContent=challenges.count||0;
    document.getElementById('statFlagged').textContent=flagged.count||0;
    document.getElementById('pendingBadge').textContent=pending.count||0;
  }catch(e){}
}

function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  loadTab();
}

function loadTab(){
  const c=document.getElementById('tabContent');
  c.innerHTML='<div class="empty">Loading...</div>';
  switch(currentTab){
    case'verifications':loadVerifications();break;
    case'kids':loadAllKids();break;
    case'uploads':loadUploads();break;
    case'challenges':loadChallenges();break;
    case'rewards':loadRewards();break;
    case'flagged':loadFlagged();break;
    case'chat':loadKZChat();break;
  }
}

/* ═══ VERIFICATIONS ═══ */
async function loadVerifications(){
  const{data}=await db.from('parent_verifications').select('*').order('created_at',{ascending:false});
  const c=document.getElementById('tabContent');
  if(!data||!data.length){c.innerHTML='<div class="empty">No verification requests.</div>';return;}

  c.innerHTML=data.map(v=>{
    const dot=v.status==='pending'?'dot-pending':v.status==='approved'?'dot-approved':'dot-rejected';
    const actions=v.status==='pending'?`
      <button class="li-btn approve" onclick="approveParent('${v.id}',true)">✓ Approve</button>
      <button class="li-btn reject" onclick="approveParent('${v.id}',false)">✗ Reject</button>
    `:`<span style="font-size:.72rem;color:var(--dim);">${v.status}</span>`;
    return `<div class="list-item">
      <div class="li-avatar">👨‍👩‍👧</div>
      <div class="li-info"><div class="li-name"><span class="status-dot ${dot}"></span>${esc(v.full_name)}</div><div class="li-meta">${esc(v.email)} · ${timeAgo(v.created_at)}${v.notes?' · Note: '+esc(v.notes):''}</div></div>
      <div class="li-actions">${actions}</div>
    </div>`;
  }).join('');
}

async function approveParent(id,approved){
  const reason=approved?null:prompt('Rejection reason:');
  if(!approved&&!reason)return;
  try{
    await db.rpc('approve_parent_verification',{p_verification_id:id,p_approved:approved,p_reason:reason});
    loadVerifications();loadStats();
  }catch(e){alert('Error: '+e.message);}
}

/* ═══ ALL KIDS ═══ */
async function loadAllKids(){
  const{data}=await db.from('kid_profiles').select('*').order('created_at',{ascending:false});
  const c=document.getElementById('tabContent');
  if(!data||!data.length){c.innerHTML='<div class="empty">No kid accounts yet.</div>';return;}

  c.innerHTML=data.map(k=>`
    <div class="list-item">
      <div class="li-avatar">🧒</div>
      <div class="li-info">
        <div class="li-name">${esc(k.display_name)} <span style="font-size:.7rem;color:var(--dim);">@${esc(k.username)}</span> ${!k.is_active?'<span style="font-size:.65rem;color:var(--red);">INACTIVE</span>':''}</div>
        <div class="li-meta">Age: ${k.age_group} · ${k.level} · 🪙 ${k.kidcoins} · 🎵 ${k.songs_uploaded} songs · XP: ${k.xp}</div>
        <div class="li-meta">Post: ${k.can_post?'✅':'❌'} · Comment: ${k.can_comment?'✅':'❌'} · Message: ${k.can_message?'✅':'❌'} · Limit: ${k.daily_time_limit}min</div>
      </div>
      <div class="li-actions">
        <button class="li-btn" onclick="viewKidActivity('${k.id}')">📋 Activity</button>
        <button class="li-btn warn" onclick="awardCoinsAdmin('${k.id}','${esc(k.display_name)}')">🪙 Give Coins</button>
        ${k.is_active?'<button class="li-btn reject" onclick="deactivateKid(\''+k.id+'\')">🚫</button>':'<button class="li-btn approve" onclick="reactivateKid(\''+k.id+'\')">✅</button>'}
      </div>
    </div>
  `).join('');
}

async function viewKidActivity(kidId){
  const{data}=await db.from('kid_activity_log').select('*').eq('kid_id',kidId).order('created_at',{ascending:false}).limit(20);
  if(!data||!data.length){alert('No activity logged.');return;}
  alert(data.map(a=>new Date(a.created_at).toLocaleString()+' — '+a.action+': '+(a.detail||'')+( a.coins_change?' ('+a.coins_change+' coins)':'')).join('\n'));
}

async function awardCoinsAdmin(kidId,name){
  const amt=prompt('How many KidCoins to give '+name+'?','50');
  if(!amt)return;
  try{await db.rpc('award_kidcoins',{p_kid_id:kidId,p_amount:parseInt(amt),p_reason:'Admin gift'});alert('✅ '+amt+' coins awarded!');loadAllKids();}catch(e){alert('Error: '+e.message);}
}

async function deactivateKid(id){if(!confirm('Deactivate this account?'))return;await db.from('kid_profiles').update({is_active:false}).eq('id',id);loadAllKids();loadStats();}
async function reactivateKid(id){await db.from('kid_profiles').update({is_active:true}).eq('id',id);loadAllKids();loadStats();}

/* ═══ UPLOADS ═══ */
async function loadUploads(){
  const{data}=await db.from('kid_uploads').select('*,kid_profiles(display_name,username)').order('created_at',{ascending:false}).limit(50);
  const c=document.getElementById('tabContent');
  if(!data||!data.length){c.innerHTML='<div class="empty">No uploads yet.</div>';return;}

  c.innerHTML=data.map(u=>{
    const kidName=u.kid_profiles?u.kid_profiles.display_name:'Unknown';
    const flagged=u.flagged?'<span style="color:var(--red);font-size:.7rem;font-weight:700;">🚩 FLAGGED</span> ':'';
    const approved=u.approved_by_parent?'<span style="color:var(--green);font-size:.7rem;">✅ Parent Approved</span>':'<span style="color:var(--yellow);font-size:.7rem;">⏳ Pending</span>';
    return `<div class="list-item${u.flagged?' style="border-left:3px solid var(--red);"':''}">
      <div class="li-avatar">🎵</div>
      <div class="li-info"><div class="li-name">${flagged}${esc(u.title)}</div><div class="li-meta">by ${esc(kidName)} · ${u.type} · ▶ ${u.plays||0} · ❤️ ${u.likes||0} · ${approved}</div>${u.flag_reason?'<div class="li-meta" style="color:var(--red);">Flag: '+esc(u.flag_reason)+'</div>':''}</div>
      <div class="li-actions">
        ${u.flagged?'<button class="li-btn approve" onclick="unflagUpload(\''+u.id+'\')">✓ Clear</button>':''}
        <button class="li-btn reject" onclick="flagUpload('${u.id}')">🚩 Flag</button>
        <button class="li-btn reject" onclick="deleteUpload('${u.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

async function flagUpload(id){const r=prompt('Reason:');if(!r)return;await db.from('kid_uploads').update({flagged:true,flag_reason:r}).eq('id',id);loadUploads();loadStats();}
async function unflagUpload(id){await db.from('kid_uploads').update({flagged:false,flag_reason:null}).eq('id',id);loadUploads();loadStats();}
async function deleteUpload(id){if(!confirm('Delete this upload permanently?'))return;await db.from('kid_uploads').delete().eq('id',id);loadUploads();loadStats();}

/* ═══ CHALLENGES ═══ */
async function loadChallenges(){
  const{data}=await db.from('kid_challenges').select('*').order('created_at',{ascending:false});
  const c=document.getElementById('tabContent');

  let html='<div class="card"><div class="st" style="color:var(--primary);">➕ Create Challenge</div>';
  html+='<div class="form-row"><div class="form-group"><label>Title</label><input type="text" id="chTitle" placeholder="🏆 Challenge name"></div><div class="form-group"><label>Type</label><select id="chType"><option>beat</option><option>rap</option><option>singing</option><option>art</option><option>trivia</option></select></div></div>';
  html+='<div class="form-row"><div class="form-group"><label>Coin Reward</label><input type="number" id="chCoins" value="50"></div><div class="form-group"><label>Difficulty</label><select id="chDiff"><option>easy</option><option>medium</option><option>hard</option></select></div></div>';
  html+='<div class="form-group"><label>Description</label><textarea id="chDesc" style="min-height:60px;" placeholder="What should kids do?"></textarea></div>';
  html+='<div class="form-group"><label>Badge Reward (optional)</label><input type="text" id="chBadge" placeholder="e.g. beat_rookie"></div>';
  html+='<button class="btn btn-purple" onclick="createChallenge()">Create Challenge</button></div>';

  if(data&&data.length){
    html+=data.map(ch=>{
      const active=ch.is_active?'<span style="color:var(--green);">🟢</span>':'<span style="color:var(--red);">🔴</span>';
      return `<div class="list-item"><div class="li-info"><div class="li-name">${active} ${esc(ch.title)}</div><div class="li-meta">${ch.type} · ${ch.difficulty} · 🪙 ${ch.coin_reward} coins${ch.badge_reward?' · 🏅 '+ch.badge_reward:''}</div></div>
        <div class="li-actions"><button class="li-btn" onclick="toggleChallenge('${ch.id}',${!ch.is_active})">${ch.is_active?'Disable':'Enable'}</button><button class="li-btn reject" onclick="deleteChallenge('${ch.id}')">🗑️</button></div></div>`;
    }).join('');
  }

  c.innerHTML=html;
}

async function createChallenge(){
  const title=document.getElementById('chTitle').value.trim();
  if(!title){alert('Enter a title.');return;}
  await db.from('kid_challenges').insert({title,type:document.getElementById('chType').value,coin_reward:parseInt(document.getElementById('chCoins').value)||50,difficulty:document.getElementById('chDiff').value,description:document.getElementById('chDesc').value.trim(),badge_reward:document.getElementById('chBadge').value.trim()||null});
  loadChallenges();loadStats();
}
async function toggleChallenge(id,active){await db.from('kid_challenges').update({is_active:active}).eq('id',id);loadChallenges();}
async function deleteChallenge(id){if(!confirm('Delete?'))return;await db.from('kid_challenges').delete().eq('id',id);loadChallenges();loadStats();}

/* ═══ REWARDS ═══ */
async function loadRewards(){
  const{data}=await db.from('kid_rewards').select('*').order('cost',{ascending:true});
  const c=document.getElementById('tabContent');

  let html='<div class="card"><div class="st" style="color:var(--primary);">➕ Create Reward</div>';
  html+='<div class="form-row"><div class="form-group"><label>Name</label><input type="text" id="rwName" placeholder="🎩 Top Hat"></div><div class="form-group"><label>Category</label><select id="rwCat"><option>avatar</option><option>frame</option><option>sticker</option><option>background</option><option>collectible</option></select></div></div>';
  html+='<div class="form-row"><div class="form-group"><label>Cost (KidCoins)</label><input type="number" id="rwCost" value="50"></div><div class="form-group"><label>Description</label><input type="text" id="rwDesc" placeholder="A cool avatar item"></div></div>';
  html+='<button class="btn btn-purple" onclick="createReward()">Create Reward</button></div>';

  if(data&&data.length){
    html+=data.map(r=>`<div class="list-item"><div class="li-info"><div class="li-name">${esc(r.name)} <span style="font-size:.7rem;color:var(--yellow);">🪙 ${r.cost}</span></div><div class="li-meta">${r.category}${r.description?' · '+esc(r.description):''} · ${r.is_active?'🟢 Active':'🔴 Inactive'}</div></div>
      <div class="li-actions"><button class="li-btn" onclick="toggleReward('${r.id}',${!r.is_active})">${r.is_active?'Disable':'Enable'}</button><button class="li-btn reject" onclick="deleteReward('${r.id}')">🗑️</button></div></div>`).join('');
  }
  c.innerHTML=html;
}

async function createReward(){
  const name=document.getElementById('rwName').value.trim();
  if(!name){alert('Enter a name.');return;}
  await db.from('kid_rewards').insert({name,category:document.getElementById('rwCat').value,cost:parseInt(document.getElementById('rwCost').value)||50,description:document.getElementById('rwDesc').value.trim()});
  loadRewards();
}
async function toggleReward(id,active){await db.from('kid_rewards').update({is_active:active}).eq('id',id);loadRewards();}
async function deleteReward(id){if(!confirm('Delete?'))return;await db.from('kid_rewards').delete().eq('id',id);loadRewards();}

/* ═══ FLAGGED ═══ */
async function loadFlagged(){
  const{data}=await db.from('kid_uploads').select('*,kid_profiles(display_name)').eq('flagged',true).order('created_at',{ascending:false});
  const c=document.getElementById('tabContent');
  if(!data||!data.length){c.innerHTML='<div class="empty">✅ No flagged content!</div>';return;}
  c.innerHTML=data.map(u=>`<div class="list-item" style="border-left:3px solid var(--red);"><div class="li-info"><div class="li-name">🚩 ${esc(u.title)}</div><div class="li-meta">by ${u.kid_profiles?esc(u.kid_profiles.display_name):'?'} · Reason: ${esc(u.flag_reason||'?')}</div></div>
    <div class="li-actions"><button class="li-btn approve" onclick="unflagUpload('${u.id}')">✓ Clear</button><button class="li-btn reject" onclick="deleteUpload('${u.id}')">🗑️ Delete</button></div></div>`).join('');
}

/* ═══ KIDZONE CHAT ═══ */
async function loadKZChat(){
  const{data}=await db.from('kidzone_messages').select('*,kid_profiles(display_name,username)').order('created_at',{ascending:false}).limit(50);
  const c=document.getElementById('tabContent');
  if(!data||!data.length){c.innerHTML='<div class="empty">No KidZone chat messages yet.</div>';return;}
  c.innerHTML=data.map(m=>{
    const name=m.kid_profiles?m.kid_profiles.display_name:'?';
    const hidden=m.hidden?'<span style="color:var(--red);font-size:.7rem;">[HIDDEN]</span> ':'';
    return `<div class="list-item${m.hidden?' style="opacity:.5;"':''}"><div class="li-info"><div class="li-name">${hidden}${esc(name)} <span style="font-size:.68rem;color:var(--dim);">#${m.room}</span></div><div class="li-meta">${esc(m.message)}</div></div>
      <div style="font-size:.65rem;color:var(--dim);">${timeAgo(m.created_at)}</div>
      <div class="li-actions">${!m.hidden?'<button class="li-btn reject" onclick="hideKZMsg(\''+m.id+'\')">Hide</button>':'<button class="li-btn approve" onclick="unhideKZMsg(\''+m.id+'\')">Show</button>'}</div></div>`;
  }).join('');
}

async function hideKZMsg(id){const r=prompt('Reason:');if(!r)return;await db.from('kidzone_messages').update({hidden:true,hidden_by:null,hidden_reason:r}).eq('id',id);loadKZChat();}
async function unhideKZMsg(id){await db.from('kidzone_messages').update({hidden:false}).eq('id',id);loadKZChat();}

function timeAgo(d){if(!d)return'';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>

<script>(function(){var b=document.createElement('button');b.innerHTML='👁️';b.style.cssText='position:fixed;top:80px;right:20px;z-index:9999;background:rgba(124,58,237,0.9);border:2px solid rgba(124,58,237,1);color:white;width:50px;height:50px;border-radius:50%;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(124,58,237,0.5);';document.body.appendChild(b);var h=localStorage.getItem('hideAvatarBubbles')==='true';function u(){document.querySelectorAll('[id*="bubble"],[class*="bubble"],[id*="avatar"][id*="switcher"]').forEach(function(el){if(el)el.style.display=h?'none':'';});b.innerHTML=h?'👁️‍🗨️':'👁️';}b.addEventListener('click',function(){h=!h;localStorage.setItem('hideAvatarBubbles',h);u();});u();})();</script>
