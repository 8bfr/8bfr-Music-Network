<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rewards — KidZone</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--kp:#8b5cf6;--yellow:#eab308;--green:#22c55e;--pink:#ec4899;--bg:#0f0a1a;--card:rgba(15,10,35,.85);--text:#f0eaff;--dim:rgba(168,130,255,.7);--border:rgba(139,92,246,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(135deg,#0f0a1a,#1a0533);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:linear-gradient(135deg,rgba(234,179,8,.15),rgba(139,92,246,.2));border-bottom:3px solid var(--yellow);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--yellow);}
.header a{color:var(--text);text-decoration:none;font-weight:600;font-size:.85rem;}
.container{max-width:900px;margin:0 auto;padding:1.5rem;}
.balance-bar{background:var(--card);border:1px solid rgba(234,179,8,.3);border-radius:14px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;}
.balance-bar .coins{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--yellow);}
.balance-bar .label{font-size:.85rem;color:var(--dim);}
.kid-select select{padding:.45rem .7rem;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;}
.cat-tabs{display:flex;gap:.4rem;margin-bottom:1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{padding:.45rem .85rem;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,.2);color:var(--dim);cursor:pointer;font-size:.82rem;font-weight:600;white-space:nowrap;flex-shrink:0;transition:all .2s;}
.cat-tab:hover{border-color:var(--yellow);}.cat-tab.active{background:rgba(234,179,8,.15);border-color:var(--yellow);color:var(--yellow);}
.rewards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;}
.reward-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:1rem .75rem;text-align:center;transition:all .3s;}
.reward-card:hover{border-color:var(--yellow);transform:translateY(-2px);}
.reward-card.owned{border-color:var(--green);opacity:.85;}
.rc-icon{font-size:2.5rem;margin-bottom:.5rem;}
.rc-name{font-family:'Fredoka One',cursive;font-size:.9rem;margin-bottom:.15rem;}
.rc-desc{font-size:.7rem;color:var(--dim);margin-bottom:.5rem;min-height:2em;}
.rc-price{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--yellow);margin-bottom:.5rem;}
.rc-btn{width:100%;padding:.45rem;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:.82rem;transition:all .2s;}
.rc-btn.buy{background:rgba(234,179,8,.2);border:1px solid rgba(234,179,8,.4);color:var(--yellow);}
.rc-btn.buy:hover{background:rgba(234,179,8,.35);}
.rc-btn.owned-btn{background:rgba(34,197,94,.15);color:var(--green);cursor:default;}
.rc-btn.cant-afford{background:rgba(239,68,68,.1);color:#fca5a5;cursor:not-allowed;}
.empty{text-align:center;padding:2rem;color:var(--dim);}
.purchase-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(12,6,24,.97);border:2px solid var(--yellow);border-radius:20px;padding:2rem;text-align:center;z-index:9999;box-shadow:0 12px 40px rgba(0,0,0,.8);animation:popIn .3s ease;}
@keyframes popIn{from{transform:translate(-50%,-50%) scale(.8);opacity:0;}to{transform:translate(-50%,-50%) scale(1);opacity:1;}}
</style>
</head>
<body>
<div class="header"><a href="kid-zone.html">← KidZone</a><h1>🎁 Rewards Shop</h1><div></div></div>
<div class="container">

<div class="balance-bar">
<div><div class="label">🪙 KidCoins Balance</div><div class="coins" id="coinBalance">0</div></div>
<div class="kid-select" id="kidSelect" style="display:none;"><select id="activeKid" onchange="switchKid()"></select></div>
</div>

<div class="cat-tabs">
<button class="cat-tab active" onclick="filterCat('all',this)">🎁 All</button>
<button class="cat-tab" onclick="filterCat('avatar',this)">🎩 Avatar</button>
<button class="cat-tab" onclick="filterCat('frame',this)">🖼️ Frames</button>
<button class="cat-tab" onclick="filterCat('sticker',this)">🌟 Stickers</button>
<button class="cat-tab" onclick="filterCat('background',this)">🌈 Backgrounds</button>
<button class="cat-tab" onclick="filterCat('collectible',this)">💎 Collectibles</button>
</div>

<div class="rewards-grid" id="rewardsGrid"></div>
</div>

<script src="scripts.js" defer></script>
<script>
const db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
let currentUser=null,myKids=[],activeKid=null,allRewards=[],ownedIds=new Set(),currentCat='all';

async function init(){
  const{data:{session}}=await db.auth.getSession();
  if(!session){location.href='login.html?return=kidzone-rewards.html';return;}
  currentUser=session.user;
  const{data:kids}=await db.from('kid_profiles').select('*').eq('parent_user_id',currentUser.id).eq('is_active',true);
  myKids=kids||[];
  if(myKids.length>0){
    document.getElementById('kidSelect').style.display='block';
    document.getElementById('activeKid').innerHTML=myKids.map(k=>'<option value="'+k.id+'">'+esc(k.display_name)+'</option>').join('');
    activeKid=myKids[0];
    updateBalance();
  }
  await loadOwned();
  await loadRewards();
}

function switchKid(){
  activeKid=myKids.find(k=>k.id===document.getElementById('activeKid').value)||myKids[0];
  updateBalance();
  loadOwned().then(()=>renderRewards());
}

function updateBalance(){
  document.getElementById('coinBalance').textContent=activeKid?(activeKid.kidcoins||0).toLocaleString():'0';
}

async function loadOwned(){
  ownedIds=new Set();
  if(!activeKid)return;
  const{data}=await db.from('kid_reward_purchases').select('reward_id').eq('kid_id',activeKid.id);
  if(data)data.forEach(p=>ownedIds.add(p.reward_id));
}

async function loadRewards(){
  const{data}=await db.from('kid_rewards').select('*').eq('is_active',true).order('cost',{ascending:true});
  allRewards=data||[];
  renderRewards();
}

function filterCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderRewards();
}

function renderRewards(){
  const grid=document.getElementById('rewardsGrid');
  const catIcons={avatar:'🎩',frame:'🖼️',sticker:'🌟',background:'🌈',collectible:'💎'};
  let filtered=currentCat==='all'?allRewards:allRewards.filter(r=>r.category===currentCat);
  if(!filtered.length){grid.innerHTML='<div class="empty">No rewards in this category yet!</div>';return;}

  const balance=activeKid?activeKid.kidcoins||0:0;

  grid.innerHTML=filtered.map(r=>{
    const owned=ownedIds.has(r.id);
    const canAfford=balance>=r.cost;
    const icon=r.image_url?'<img src="'+esc(r.image_url)+'" style="width:48px;height:48px;object-fit:contain;">':r.name.match(/^\p{Emoji}/u)?r.name.split(' ')[0]:(catIcons[r.category]||'🎁');
    let btnHTML='';
    if(owned)btnHTML='<button class="rc-btn owned-btn">✅ Owned</button>';
    else if(!activeKid)btnHTML='<button class="rc-btn cant-afford" disabled>No kid selected</button>';
    else if(!canAfford)btnHTML='<button class="rc-btn cant-afford" disabled>Not enough coins</button>';
    else btnHTML='<button class="rc-btn buy" onclick="buyReward(\''+r.id+'\',\''+esc(r.name)+'\','+r.cost+')">🪙 Buy for '+r.cost+'</button>';

    return '<div class="reward-card'+(owned?' owned':'')+'"><div class="rc-icon">'+icon+'</div><div class="rc-name">'+esc(r.name)+'</div><div class="rc-desc">'+esc(r.description||'')+'</div><div class="rc-price">🪙 '+r.cost+'</div>'+btnHTML+'</div>';
  }).join('');
}

async function buyReward(rewardId,name,cost){
  if(!activeKid){alert('Select a kid first.');return;}
  if(!confirm(activeKid.display_name+' wants to buy '+name+' for '+cost+' KidCoins?'))return;

  // Spend coins via atomic RPC
  const{data:success,error}=await db.rpc('spend_kidcoins',{p_kid_id:activeKid.id,p_amount:cost,p_reason:'Bought: '+name});
  if(error){alert('Error: '+error.message);return;}
  if(success===false){alert('Not enough KidCoins!');return;}

  // Record purchase
  await db.from('kid_reward_purchases').insert({kid_id:activeKid.id,reward_id:rewardId});

  // Update local state
  activeKid.kidcoins=(activeKid.kidcoins||0)-cost;
  ownedIds.add(rewardId);
  updateBalance();
  renderRewards();

  // Celebration!
  showPurchaseToast(name);
}

function showPurchaseToast(name){
  const toast=document.createElement('div');
  toast.className='purchase-toast';
  toast.innerHTML='<div style="font-size:3rem;margin-bottom:.5rem;">🎉</div><div style="font-family:\'Fredoka One\',cursive;font-size:1.3rem;color:var(--yellow);margin-bottom:.25rem;">Reward Unlocked!</div><div style="font-size:.9rem;color:var(--dim);">'+esc(name)+'</div>';
  document.body.appendChild(toast);
  setTimeout(()=>{toast.style.opacity='0';toast.style.transition='opacity .3s';setTimeout(()=>toast.remove(),300);},2500);
}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
<script>(function(){var b=document.createElement('button');b.innerHTML='👁️';b.style.cssText='position:fixed;top:80px;right:20px;z-index:9999;background:rgba(124,58,237,0.9);border:2px solid rgba(124,58,237,1);color:white;width:50px;height:50px;border-radius:50%;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(124,58,237,0.5);';document.body.appendChild(b);var h=localStorage.getItem('hideAvatarBubbles')==='true';function u(){document.querySelectorAll('[id*="bubble"],[class*="bubble"],[id*="avatar"][id*="switcher"]').forEach(function(el){if(el)el.style.display=h?'none':'';});b.innerHTML=h?'👁️‍🗨️':'👁️';}b.addEventListener('click',function(){h=!h;localStorage.setItem('hideAvatarBubbles',h);u();});u();})();</script>
</body></html>
