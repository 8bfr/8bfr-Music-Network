<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Messages — 8BFR</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--dark:#0b0014;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;}
.header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--primary);}
.container{max-width:800px;margin:0 auto;padding:1.5rem;}
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.tab{padding:.5rem 1rem;border-radius:8px;border:1px solid var(--border);background:rgba(124,58,237,.08);color:var(--dim);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s;}
.tab:hover{background:rgba(124,58,237,.15);}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.tab .badge{background:rgba(239,68,68,.8);color:#fff;font-size:.65rem;padding:.1rem .35rem;border-radius:10px;margin-left:.3rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;transition:border-color .15s;}
.card:hover{border-color:var(--primary);}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;}
.card-title{font-weight:700;font-size:.95rem;}
.card-time{font-size:.7rem;color:rgba(234,230,255,.35);}
.card-body{font-size:.88rem;color:var(--dim);line-height:1.6;}
.card-quote{background:rgba(124,58,237,.06);border-left:3px solid var(--primary);padding:.4rem .6rem;border-radius:0 6px 6px 0;margin:.5rem 0;font-size:.82rem;}
.card-actions{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap;}
.btn-sm{padding:.35rem .7rem;border-radius:6px;border:none;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .15s;}
.btn-primary{background:var(--primary);color:#fff;}.btn-primary:hover{background:#6d28d9;}
.btn-outline{background:rgba(124,58,237,.1);border:1px solid var(--border);color:var(--text);}.btn-outline:hover{background:rgba(124,58,237,.2);}
.btn-success{background:rgba(34,197,94,.8);color:#fff;}.btn-danger{background:rgba(239,68,68,.8);color:#fff;}
.status-badge{display:inline-block;font-size:.65rem;padding:.15rem .4rem;border-radius:4px;font-weight:600;text-transform:uppercase;}
.status-pending{background:rgba(245,158,11,.2);color:#f59e0b;}
.status-reviewed{background:rgba(59,130,246,.2);color:#3b82f6;}
.status-action_taken{background:rgba(239,68,68,.2);color:#ef4444;}
.status-dismissed{background:rgba(107,114,128,.2);color:#6b7280;}
.empty{text-align:center;padding:3rem;color:var(--dim);}
.empty div{font-size:3rem;margin-bottom:.75rem;}
.links-row{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.link-card{flex:1;min-width:150px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center;text-decoration:none;color:var(--text);transition:all .2s;}
.link-card:hover{border-color:var(--primary);transform:translateY(-2px);}
.link-card .icon{font-size:1.5rem;margin-bottom:.3rem;}
.link-card .label{font-size:.85rem;font-weight:600;color:var(--primary);}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" style="color:var(--dim);text-decoration:none;font-weight:600;">← Home</a>
  <h1>📬 Messages</h1>
  <span></span>
</div>
<div class="container">
  <div class="links-row">
    <a href="dm.html" class="link-card"><div class="icon">✉️</div><div class="label">Direct Messages</div></a>
    <a href="chat.html" class="link-card"><div class="icon">💬</div><div class="label">Community Chat</div></a>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>
</div>
<script src="scripts.js" defer></script>
<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
var OWNER_ID='cb556180-f032-4b21-9470-1d786f2664ab';
var currentUser=null,isOwner=false,activeTab='notifications';

async function init(){
  try{
    var s=await db.auth.getSession();
    if(!s.data.session){location.href='login.html?return=messages.html';return;}
    currentUser=s.data.session.user;
    isOwner=currentUser.id===OWNER_ID;
    var pr=await db.from('profiles').select('role').eq('user_id',currentUser.id).single();
    if(pr.data&&(pr.data.role==='owner'||pr.data.role==='co-owner'))isOwner=true;
    buildTabs();loadTab(activeTab);
  }catch(e){document.getElementById('content').innerHTML='<div class="empty"><div>⚠️</div><p>'+e.message+'</p></div>';}
}

function buildTabs(){
  var t=document.getElementById('tabs');
  var h='<div class="tab active" data-tab="notifications" onclick="loadTab(\'notifications\')">🔔 Notifications</div>';
  h+='<div class="tab" data-tab="dms" onclick="loadTab(\'dms\')">✉️ Recent DMs</div>';
  if(isOwner) h+='<div class="tab" data-tab="reports" onclick="loadTab(\'reports\')">🚩 Reports <span class="badge" id="reportBadge" style="display:none;">0</span></div>';
  t.innerHTML=h;
  if(isOwner)loadReportCount();
}

async function loadReportCount(){
  try{var r=await db.from('message_reports').select('*',{count:'exact',head:true}).eq('status','pending');
  var b=document.getElementById('reportBadge');
  if(b&&(r.count||0)>0){b.style.display='inline';b.textContent=r.count;}
  }catch(e){}
}

function loadTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tab);});
  if(tab==='notifications')loadNotifications();
  else if(tab==='dms')loadRecentDMs();
  else if(tab==='reports')loadReports();
}

// ★ FIXED: Notifications now show who accepted + link to profile
var NOTIF_NAMES={follow:'New Follower',like:'Post Liked',comment:'New Comment',purchase:'New Purchase',system:'System Update',tip:'Coin Tip',reshare:'Post Reshared',friend_request:'Friend Request',friend_accepted:'Friend Accepted',verification:'Verification Update',badge:'New Badge',mention:'You were mentioned',parent_verified:'Parent Verification Approved',parent_rejected:'Parent Verification Update',parent_verification_request:'New Parent Verification'};
var NOTIF_ICONS={follow:'👤',like:'&#10084;',comment:'&#128172;',purchase:'&#128722;',system:'&#128226;',tip:'&#129689;',reshare:'&#128257;',friend_request:'&#129309;',friend_accepted:'&#127881;',verification:'&#9989;',badge:'&#127941;',mention:'@',parent_verified:'&#128119;',parent_rejected:'&#128119;',parent_verification_request:'&#128119;'};

async function loadNotifications(){
  var box=document.getElementById('content');
  box.innerHTML='<div style="text-align:center;padding:2rem;color:var(--dim);">Loading...</div>';
  try{
    var r=await db.from('notifications').select('*').eq('recipient_id',currentUser.id).order('created_at',{ascending:false}).limit(30);
    if(r.error)throw r.error;
    var data=r.data||[];
    if(!data.length){
      box.innerHTML='<div class="empty"><div>&#128276;</div><h3>No notifications yet</h3><p style="font-size:.85rem;color:var(--dim);">Follow alerts, tips, purchases, and system messages will appear here.</p></div>';
      return;
    }

    // Resolve missing names
    var missingIds=[];
    data.forEach(function(n){
      var m=n.metadata||{};
      if(m.from_id&&!m.from_name)missingIds.push(m.from_id);
    });
    if(missingIds.length){
      missingIds=[...new Set(missingIds)];
      var pr=await db.from('profiles').select('user_id,display_name,username').in('user_id',missingIds);
      var nameMap={};
      if(pr.data)pr.data.forEach(function(p){nameMap[p.user_id]=p.display_name||p.username||'User';});
      data.forEach(function(n){
        var m=n.metadata||{};
        if(m.from_id&&!m.from_name&&nameMap[m.from_id]){
          m.from_name=nameMap[m.from_id];
          if(!m.link)m.link='profile.html?id='+m.from_id;
          n.metadata=m;
        }
      });
    }

    box.innerHTML=data.map(function(n){
      var icon=NOTIF_ICONS[n.notif_type]||'&#128276;';
      var unread=!n.is_read?' style="border-left:3px solid var(--primary);"':'';
      
      var displayTitle=NOTIF_NAMES[n.notif_type]||n.notif_type;
      if(n.notif_type==='friend_accepted'&&n.metadata&&n.metadata.from_name){
        displayTitle=n.metadata.from_name+' accepted your friend request!';
      }
      if(n.notif_type==='friend_request'&&n.metadata&&n.metadata.from_name){
        displayTitle=n.metadata.from_name+' sent a friend request';
      }
      if(n.notif_type==='follow'&&n.metadata&&n.metadata.from_name){
        displayTitle=n.metadata.from_name+' started following you';
      }
      if(n.notif_type==='like'&&n.metadata&&n.metadata.from_name){
        displayTitle=n.metadata.from_name+' liked your post';
      }
      
      var notifLink='#';
      if(n.metadata&&n.metadata.link) notifLink=n.metadata.link;
      else if((n.notif_type==='friend_accepted'||n.notif_type==='friend_request'||n.notif_type==='follow')&&n.metadata&&n.metadata.from_id) notifLink='profile.html?id='+n.metadata.from_id;
      
      var clickAction=notifLink!=='#'?'onclick="markRead(\''+n.id+'\');location.href=\''+notifLink+'\';"':'onclick="markRead(\''+n.id+'\')"';
      
      return '<div class="card"'+unread+' '+clickAction+' style="cursor:pointer;">'+
        '<div class="card-header"><div class="card-title">'+icon+' '+esc(displayTitle)+'</div><div class="card-time">'+timeAgo(n.created_at)+'</div></div>'+
        '<div class="card-body">'+esc((n.metadata&&n.metadata.message)||'')+'</div>'+
        '</div>';
    }).join('');
  }catch(e){
    box.innerHTML='<div class="empty"><div>&#128276;</div><h3>No notifications yet</h3></div>';
  }
}

window.markRead=async function(id){try{await db.from('notifications').update({is_read:true}).eq('id',id).eq('recipient_id',currentUser.id);}catch(e){}};

async function loadRecentDMs(){
  var box=document.getElementById('content');
  box.innerHTML='<div style="text-align:center;padding:2rem;color:var(--dim);">Loading...</div>';
  try{
    var r=await db.from('direct_messages').select('id,sender_id,receiver_id,message,is_read,created_at')
      .or('sender_id.eq.'+currentUser.id+',receiver_id.eq.'+currentUser.id)
      .order('created_at',{ascending:false}).limit(50);
    var data=r.data||[];
    if(!data.length){
      box.innerHTML='<div class="empty"><div>✉️</div><h3>No messages yet</h3><p style="font-size:.85rem;">Start a conversation in <a href="dm.html" style="color:var(--primary);">Direct Messages</a></p></div>';
      return;
    }
    var seen={},recent=[];
    data.forEach(function(dm){var pid=dm.sender_id===currentUser.id?dm.receiver_id:dm.sender_id;if(!seen[pid]){seen[pid]=true;recent.push({dm:dm,partnerId:pid});}});
    var pids=recent.map(function(r){return r.partnerId;});
    var pr=await db.from('profiles').select('user_id,username,display_name,avatar_url').in('user_id',pids);
    var pMap={};if(pr.data)pr.data.forEach(function(p){pMap[p.user_id]=p;});
    box.innerHTML=recent.slice(0,20).map(function(r){
      var p=pMap[r.partnerId]||{username:'user',display_name:'User'};
      var isSent=r.dm.sender_id===currentUser.id;
      var unread=!isSent&&!r.dm.is_read?' <span style="color:var(--primary);font-weight:700;">● NEW</span>':'';
      return '<div class="card" style="cursor:pointer;" onclick="location.href=\'dm.html?user='+r.partnerId+'\'">'+
        '<div class="card-header"><div class="card-title">'+(p.display_name||p.username)+unread+'</div><div class="card-time">'+timeAgo(r.dm.created_at)+'</div></div>'+
        '<div class="card-body">'+(isSent?'You: ':'')+esc((r.dm.message||'').substring(0,100))+'</div></div>';
    }).join('');
  }catch(e){
    box.innerHTML='<div class="empty"><div>✉️</div><h3>No messages yet</h3></div>';
  }
}

async function loadReports(){
  var box=document.getElementById('content');
  box.innerHTML='<div style="text-align:center;padding:2rem;color:var(--dim);">Loading...</div>';
  try{
    var r=await db.from('message_reports').select('*').order('created_at',{ascending:false}).limit(50);
    if(r.error)throw r.error;
    var data=r.data||[];
    if(!data.length){box.innerHTML='<div class="empty"><div>✅</div><h3>No reports</h3><p style="font-size:.85rem;color:var(--dim);">All clear!</p></div>';return;}
    var uids=[];data.forEach(function(rp){if(rp.reporter_id)uids.push(rp.reporter_id);if(rp.reported_user_id)uids.push(rp.reported_user_id);});
    uids=[...new Set(uids)];
    var pr=await db.from('profiles').select('user_id,username,display_name').in('user_id',uids);
    var pMap={};if(pr.data)pr.data.forEach(function(p){pMap[p.user_id]=p;});
    box.innerHTML=data.map(function(rp){
      var reporter=pMap[rp.reporter_id]||{username:'unknown'};
      var reported=pMap[rp.reported_user_id]||{username:'unknown'};
      var src=rp.message_source==='dm'?'DM':'Chat';
      var acts='';
      if(rp.status==='pending'){
        acts='<button class="btn-sm btn-success" onclick="updateReport(\''+rp.id+'\',\'reviewed\')">✅ Reviewed</button>'+
          '<button class="btn-sm btn-danger" onclick="updateReport(\''+rp.id+'\',\'action_taken\')">⚡ Action</button>'+
          '<button class="btn-sm btn-outline" onclick="updateReport(\''+rp.id+'\',\'dismissed\')">Dismiss</button>';
      }
      return '<div class="card">'+
        '<div class="card-header"><div class="card-title">🚩 '+esc(reported.display_name||reported.username)+'</div><span class="status-badge status-'+rp.status+'">'+rp.status+'</span></div>'+
        '<div class="card-body"><div style="font-size:.78rem;color:rgba(234,230,255,.4);margin-bottom:.5rem;">By: '+(reporter.display_name||reporter.username)+' • '+src+' • '+timeAgo(rp.created_at)+'</div>'+
        '<div class="card-quote">"'+esc(rp.message_text||'')+'"</div>'+
        (rp.reason?'<div style="margin-top:.4rem;font-size:.85rem;"><strong>Reason:</strong> '+esc(rp.reason)+'</div>':'')+
        '</div><div class="card-actions">'+acts+
        '<button class="btn-sm btn-outline" onclick="location.href=\'dm.html?user='+rp.reported_user_id+'\'">Message</button>'+
        '<button class="btn-sm btn-danger" onclick="banUser(\''+rp.reported_user_id+'\',\''+esc(reported.display_name||reported.username)+'\')">🚫 Ban</button></div></div>';
    }).join('');
  }catch(e){box.innerHTML='<div class="card">Error: '+e.message+'</div>';}
}

window.updateReport=async function(id,status){
  await db.from('message_reports').update({status:status,reviewed_by:currentUser.id,reviewed_at:new Date().toISOString()}).eq('id',id);
  loadReports();loadReportCount();
};

window.banUser=async function(userId,name){
  if(!confirm('Ban '+name+' from chat?'))return;
  try{await db.from('chatroom_bans').insert({user_id:userId,banned_by:currentUser.id,reason:'Banned after report',ban_type:'permanent'});alert(name+' banned.');}catch(e){alert('Error: '+e.message);}
};

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function timeAgo(d){var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}

init();
</script>
</body>
</html>
