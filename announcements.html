<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Announcements — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { background: linear-gradient(#0b0014, #000); color: #eae6ff; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 0; min-height: 100vh; padding-bottom: 80px; }
.card { border: 1px solid rgba(124,58,237,0.4); background: rgba(12,6,24,0.8); border-radius: 16px; box-shadow: 0 0 24px rgba(124,58,237,0.2); padding: 2rem; margin-bottom: 2rem; }
.btn { display: inline-block; background: #7c3aed; border: 1px solid #7c3aed; color: #fff; padding: 0.75rem 1.5rem; border-radius: 0.75rem; text-decoration: none; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 1rem; }
.btn:hover { background: #6d28d9; }
.btn-secondary { background: transparent; color: #a855f7; border: 1px solid rgba(124,58,237,0.6); }
.btn-secondary:hover { background: rgba(124,58,237,0.2); }
.btn-sm { padding: 0.35rem 0.8rem; font-size: 0.82rem; }
.ann-card { background: rgba(124,58,237,0.05); border: 1px solid rgba(124,58,237,0.3); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; }
.ann-badge { display: inline-block; padding: 0.2rem 0.7rem; border-radius: 50px; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.75rem; }
.badge-new { background: #ef4444; color: #fff; }
.badge-update { background: #3b82f6; color: #fff; }
.badge-feature { background: #10b981; color: #fff; }
.badge-maintenance { background: #f59e0b; color: #000; }
.ann-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.4rem; color: #a855f7; }
.ann-meta { font-size: 0.82rem; opacity: 0.65; margin-bottom: 0.75rem; }
.ann-body { line-height: 1.7; }
.form-input { width: 100%; padding: 0.75rem; background: rgba(18,3,39,0.8); border: 1px solid rgba(124,58,237,0.6); border-radius: 0.75rem; color: #fff; font-size: 0.95rem; box-sizing: border-box; }
.form-input:focus { outline: none; border-color: #a855f7; }
textarea.form-input { resize: vertical; min-height: 120px; font-family: inherit; line-height: 1.6; }
label { display: block; font-weight: 600; margin-bottom: 0.4rem; font-size: 0.88rem; color: #a855f7; }
.spinner { width: 28px; height: 28px; border-radius: 50%; border: 3px solid rgba(168,85,247,0.2); border-top-color: #a855f7; animation: spin 0.7s linear infinite; margin: 2rem auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; padding: 0.5rem 0.75rem; text-decoration: none; color: #a855f7; transition: all 0.2s; border-radius: 0.5rem; flex: 1; max-width: 100px; }
.bottom-nav-item:hover { background: rgba(124,58,237,0.2); }
.bottom-nav-icon { font-size: 1.25rem; line-height: 1; }
.bottom-nav-label { font-size: 0.7rem; font-weight: 600; }
</style>
</head>
<body>

<header class="px-4 py-4" style="background:rgba(15,0,30,0.95);border-bottom:1px solid rgba(124,58,237,0.5);position:sticky;top:0;z-index:50;backdrop-filter:blur(8px);">
  <div style="max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:1rem;">
    <a href="index.html" class="btn btn-secondary btn-sm">← Home</a>
    <h1 style="font-size:1.2rem;font-weight:700;">📢 Announcements</h1>
    <button id="adminToggleBtn" style="display:none;" class="btn btn-sm" onclick="toggleCreateForm()">✏️ New</button>
  </div>
</header>

<main style="max-width:800px;margin:0 auto;padding:1.5rem 1rem;">

  <!-- Hero -->
  <div style="text-align:center;margin-bottom:2rem;padding:2.5rem 2rem;background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(0,217,255,0.1));border-radius:20px;border:1px solid rgba(124,58,237,0.4);">
    <div style="font-size:3.5rem;margin-bottom:0.75rem;">📢</div>
    <h2 style="font-size:2rem;font-weight:800;margin-bottom:0.5rem;text-shadow:0 0 20px rgba(168,85,247,0.6);">Platform Announcements</h2>
    <p style="opacity:0.85;max-width:500px;margin:0 auto;">Latest news, features and updates from 8BFR Music Network</p>
  </div>

  <!-- CREATE FORM (owner only) -->
  <div id="createForm" class="card" style="display:none;border-color:rgba(124,58,237,0.6);">
    <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:1.25rem;color:#a855f7;">📝 Create Announcement</h3>
    <div style="margin-bottom:1rem;">
      <label>Type</label>
      <select id="newType" class="form-input">
        <option value="new">🔴 New</option>
        <option value="update">🔵 Update</option>
        <option value="feature">🟢 Feature</option>
        <option value="maintenance">🟡 Maintenance</option>
      </select>
    </div>
    <div style="margin-bottom:1rem;">
      <label>Title</label>
      <input type="text" id="newTitle" class="form-input" placeholder="Announcement title...">
    </div>
    <div style="margin-bottom:1.25rem;">
      <label>Content</label>
      <textarea id="newContent" class="form-input" placeholder="Write the announcement details..."></textarea>
    </div>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
      <button class="btn" onclick="publishAnnouncement()">📤 Publish</button>
      <button class="btn btn-secondary" onclick="toggleCreateForm()">Cancel</button>
    </div>
    <div id="publishStatus" style="margin-top:0.75rem;font-size:0.88rem;"></div>
  </div>

  <!-- LIST -->
  <div id="loadingSpinner"><div class="spinner"></div></div>
  <div id="announcementsList"></div>
  <div id="emptyState" style="display:none;text-align:center;padding:4rem 2rem;">
    <div style="font-size:4rem;margin-bottom:1rem;opacity:0.4;">📭</div>
    <h3 style="font-size:1.3rem;font-weight:700;margin-bottom:0.5rem;">No Announcements Yet</h3>
    <p style="opacity:0.75;">Check back soon for updates from 8BFR!</p>
  </div>

</main>

<nav class="fixed bottom-0 left-0 right-0 z-50 bg-[rgba(15,0,30,0.95)] backdrop-blur-md border-t border-purple-500/40">
  <div class="max-w-6xl mx-auto px-2 py-2">
    <div class="flex items-center justify-around gap-1">
      <a href="index.html" class="bottom-nav-item"><div class="bottom-nav-icon">🏠</div><div class="bottom-nav-label">Home</div></a>
      <a href="search.html" class="bottom-nav-item"><div class="bottom-nav-icon">🔍</div><div class="bottom-nav-label">Search</div></a>
      <a href="feed.html" class="bottom-nav-item"><div class="bottom-nav-icon">📰</div><div class="bottom-nav-label">Feed</div></a>
      <a href="radio.html" class="bottom-nav-item"><div class="bottom-nav-icon">📻</div><div class="bottom-nav-label">Radio</div></a>
      <a href="profile.html" class="bottom-nav-item"><div class="bottom-nav-icon">👤</div><div class="bottom-nav-label">Profile</div></a>
    </div>
  </div>
</nav>

<script src="scripts.js" defer></script>
<script>
(async function(){
  var db = window.supabase.createClient(
    'https://novbuvwpjnxwwvdekjhr.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0'
  );
  var OWNER_ID = 'cb556180-f032-4b21-9470-1d786f2664ab';
  var isOwner = false;

  // Check auth
  try {
    var { data: { session } } = await db.auth.getSession();
    if (session && session.user.id === OWNER_ID) {
      isOwner = true;
      document.getElementById('adminToggleBtn').style.display = 'inline-block';
    }
  } catch(e) {}

  // Load announcements
  await loadAnnouncements();

  async function loadAnnouncements() {
    document.getElementById('loadingSpinner').style.display = 'block';
    document.getElementById('announcementsList').innerHTML = '';
    document.getElementById('emptyState').style.display = 'none';
    try {
      var { data, error } = await db.from('announcements')
        .select('*')
        .order('created_at', { ascending: false });

      document.getElementById('loadingSpinner').style.display = 'none';

      if (error) throw error;
      if (!data || !data.length) {
        document.getElementById('emptyState').style.display = 'block';
        return;
      }

      var badgeMap = { new: ['badge-new','🔴 NEW'], update: ['badge-update','🔵 UPDATE'], feature: ['badge-feature','🟢 FEATURE'], maintenance: ['badge-maintenance','🟡 MAINTENANCE'] };
      document.getElementById('announcementsList').innerHTML = data.map(function(a) {
        var badge = badgeMap[a.type] || ['badge-update','📢'];
        var dateStr = new Date(a.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
        return '<div class="ann-card" id="ann-'+a.id+'">'+
          '<span class="ann-badge '+badge[0]+'">'+badge[1]+'</span>'+
          '<div class="ann-title">'+esc(a.title)+'</div>'+
          '<div class="ann-meta">📅 '+dateStr+' · By '+esc(a.author||'8BFR Team')+'</div>'+
          '<div class="ann-body">'+esc(a.content)+'</div>'+
          (isOwner ? '<div style="display:flex;gap:0.5rem;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(124,58,237,0.2);">'+
            '<button class="btn btn-secondary btn-sm" onclick="deleteAnn(\''+a.id+'\')">🗑️ Delete</button>'+
          '</div>' : '')+
        '</div>';
      }).join('');
    } catch(e) {
      document.getElementById('loadingSpinner').style.display = 'none';
      // If table doesn't exist yet, show friendly message
      document.getElementById('announcementsList').innerHTML = '<div class="ann-card" style="text-align:center;padding:2rem;color:#a855f7;opacity:0.7;">'+
        (isOwner ? 'No announcements yet. Create the first one above!' : 'No announcements yet. Check back soon!')+
      '</div>';
    }
  }

  window.toggleCreateForm = function() {
    var f = document.getElementById('createForm');
    f.style.display = f.style.display === 'none' ? 'block' : 'none';
    if (f.style.display === 'block') f.scrollIntoView({ behavior: 'smooth' });
  };

  window.publishAnnouncement = async function() {
    if (!isOwner) return;
    var type = document.getElementById('newType').value;
    var title = document.getElementById('newTitle').value.trim();
    var content = document.getElementById('newContent').value.trim();
    var status = document.getElementById('publishStatus');
    if (!title || !content) { status.innerHTML = '<span style="color:#ef4444;">⚠️ Fill in title and content.</span>'; return; }
    status.innerHTML = '<span style="color:#a855f7;">Publishing…</span>';
    try {
      var { error } = await db.from('announcements').insert({
        type: type, title: title, content: content,
        author: '8BFR Team', user_id: OWNER_ID
      });
      if (error) throw error;
      document.getElementById('newTitle').value = '';
      document.getElementById('newContent').value = '';
      status.innerHTML = '<span style="color:#00ff88;">✅ Published!</span>';
      setTimeout(function(){ document.getElementById('createForm').style.display='none'; status.innerHTML=''; }, 1200);
      await loadAnnouncements();
    } catch(e) {
      status.innerHTML = '<span style="color:#ef4444;">❌ '+e.message+'</span>';
    }
  };

  window.deleteAnn = async function(id) {
    if (!isOwner || !confirm('Delete this announcement?')) return;
    try {
      await db.from('announcements').delete().eq('id', id);
      await loadAnnouncements();
    } catch(e) { alert('Error: '+e.message); }
  };

  function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
})();
</script>
</body>
</html>
