<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Translator — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#7c3aed;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:2rem;}
.header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--primary);}
.container{max-width:700px;margin:0 auto;padding:1.5rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;}
.lang-row{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;}
.lang-select{flex:1;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem;color:var(--text);font-size:.88rem;outline:none;}
.lang-select:focus{border-color:var(--primary);}
.lang-select option{background:#1a0a2e;}
.swap-btn{width:40px;height:40px;border-radius:50%;background:rgba(124,58,237,.2);border:1px solid var(--border);color:var(--primary);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.swap-btn:hover{background:rgba(124,58,237,.4);}
textarea{width:100%;min-height:120px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:10px;padding:.85rem;color:var(--text);font-size:.95rem;font-family:inherit;resize:vertical;outline:none;box-sizing:border-box;}
textarea:focus{border-color:var(--primary);}
textarea::placeholder{color:rgba(168,85,247,.4);}
.output-box{width:100%;min-height:120px;background:rgba(124,58,237,.06);border:1px solid var(--border);border-radius:10px;padding:.85rem;color:var(--text);font-size:.95rem;line-height:1.6;white-space:pre-wrap;}
.btn{background:var(--primary);color:#fff;border:none;padding:.7rem 1.5rem;border-radius:10px;cursor:pointer;font-weight:700;font-size:.95rem;width:100%;transition:all .15s;}
.btn:hover{background:#6d28d9;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-row{display:flex;gap:.5rem;margin-top:.75rem;}
.btn-sm{padding:.4rem .8rem;font-size:.8rem;border-radius:8px;background:rgba(124,58,237,.15);border:1px solid var(--border);color:var(--dim);cursor:pointer;}
.btn-sm:hover{background:rgba(124,58,237,.3);}
.char-count{font-size:.72rem;color:rgba(168,85,247,.4);text-align:right;margin-top:.25rem;}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" style="color:var(--dim);text-decoration:none;font-weight:600;">← Home</a>
  <h1>🌐 Translator</h1>
  <span></span>
</div>
<div class="container">
  <div class="card">
    <div class="lang-row">
      <select class="lang-select" id="fromLang">
        <option value="auto">🔍 Detect Language</option>
        <option value="en">English</option><option value="es">Spanish</option><option value="fr">French</option>
        <option value="de">German</option><option value="it">Italian</option><option value="pt">Portuguese</option>
        <option value="ru">Russian</option><option value="ja">Japanese</option><option value="ko">Korean</option>
        <option value="zh">Chinese</option><option value="ar">Arabic</option><option value="hi">Hindi</option>
        <option value="nl">Dutch</option><option value="sv">Swedish</option><option value="pl">Polish</option>
        <option value="tr">Turkish</option><option value="vi">Vietnamese</option><option value="th">Thai</option>
        <option value="uk">Ukrainian</option><option value="id">Indonesian</option><option value="ms">Malay</option>
        <option value="fil">Filipino</option><option value="cs">Czech</option><option value="da">Danish</option>
        <option value="fi">Finnish</option><option value="el">Greek</option><option value="he">Hebrew</option>
        <option value="hu">Hungarian</option><option value="no">Norwegian</option><option value="ro">Romanian</option>
        <option value="sw">Swahili</option><option value="ta">Tamil</option><option value="te">Telugu</option>
        <option value="bn">Bengali</option><option value="ur">Urdu</option>
      </select>
      <button class="swap-btn" onclick="swapLangs()" title="Swap languages">⇄</button>
      <select class="lang-select" id="toLang">
        <option value="en">English</option><option value="es">Spanish</option><option value="fr">French</option>
        <option value="de">German</option><option value="it">Italian</option><option value="pt">Portuguese</option>
        <option value="ru">Russian</option><option value="ja">Japanese</option><option value="ko">Korean</option>
        <option value="zh">Chinese</option><option value="ar">Arabic</option><option value="hi">Hindi</option>
        <option value="nl">Dutch</option><option value="sv">Swedish</option><option value="pl">Polish</option>
        <option value="tr">Turkish</option><option value="vi">Vietnamese</option><option value="th">Thai</option>
        <option value="uk">Ukrainian</option><option value="id">Indonesian</option><option value="ms">Malay</option>
        <option value="fil">Filipino</option><option value="cs">Czech</option><option value="da">Danish</option>
        <option value="fi">Finnish</option><option value="el">Greek</option><option value="he">Hebrew</option>
        <option value="hu">Hungarian</option><option value="no">Norwegian</option><option value="ro">Romanian</option>
        <option value="sw">Swahili</option><option value="ta">Tamil</option><option value="te">Telugu</option>
        <option value="bn">Bengali</option><option value="ur">Urdu</option>
      </select>
    </div>

    <textarea id="inputText" placeholder="Type or paste text to translate..." oninput="updateCount()"></textarea>
    <div class="char-count"><span id="charCount">0</span> characters</div>

    <button class="btn" id="translateBtn" onclick="doTranslate()" style="margin-top:.75rem;">🌐 Translate</button>

    <div style="margin-top:1.25rem;">
      <div style="font-size:.78rem;font-weight:600;color:var(--dim);margin-bottom:.4rem;">Translation:</div>
      <div class="output-box" id="outputBox">Translation will appear here...</div>
      <div class="btn-row">
        <button class="btn-sm" onclick="copyOutput()">📋 Copy</button>
        <button class="btn-sm" onclick="speakOutput()">🔊 Listen</button>
        <button class="btn-sm" onclick="clearAll()">🗑️ Clear</button>
      </div>
    </div>
  </div>

  <div class="card" style="text-align:center;">
    <div style="font-size:.82rem;color:var(--dim);line-height:1.6;">Powered by free translation. Supports 35+ languages. Great for translating lyrics, bios, messages, and social posts.</div>
  </div>
</div>
<script src="scripts.js" defer></script>
<script>
function updateCount(){document.getElementById('charCount').textContent=document.getElementById('inputText').value.length;}

function swapLangs(){
  var f=document.getElementById('fromLang'),t=document.getElementById('toLang');
  if(f.value==='auto')return;
  var tmp=f.value;f.value=t.value;t.value=tmp;
  // Also swap text if output exists
  var inp=document.getElementById('inputText'),out=document.getElementById('outputBox');
  if(out.textContent&&out.textContent!=='Translation will appear here...'){
    inp.value=out.textContent;out.textContent='';updateCount();
  }
}

async function doTranslate(){
  var text=document.getElementById('inputText').value.trim();
  if(!text){document.getElementById('outputBox').textContent='Enter text to translate.';return;}
  var from=document.getElementById('fromLang').value;
  var to=document.getElementById('toLang').value;
  var btn=document.getElementById('translateBtn');
  var out=document.getElementById('outputBox');
  btn.disabled=true;btn.textContent='Translating...';out.textContent='...';

  try{
    // Use MyMemory free translation API
    var url='https://api.mymemory.translated.net/get?q='+encodeURIComponent(text.substring(0,5000))+'&langpair='+from+'|'+to;
    var r=await fetch(url);
    var data=await r.json();
    if(data.responseData&&data.responseData.translatedText){
      out.textContent=data.responseData.translatedText;
    }else{
      out.textContent='Translation unavailable. Try a different language pair.';
    }
  }catch(e){
    out.textContent='Error: '+e.message;
  }
  btn.disabled=false;btn.textContent='🌐 Translate';
}

function copyOutput(){
  var text=document.getElementById('outputBox').textContent;
  navigator.clipboard.writeText(text).then(function(){alert('Copied!');}).catch(function(){});
}

function speakOutput(){
  var text=document.getElementById('outputBox').textContent;
  if(!text||text==='Translation will appear here...')return;
  var lang=document.getElementById('toLang').value;
  var u=new SpeechSynthesisUtterance(text);
  u.lang=lang;
  speechSynthesis.speak(u);
}

function clearAll(){
  document.getElementById('inputText').value='';
  document.getElementById('outputBox').textContent='Translation will appear here...';
  updateCount();
}

// Allow Ctrl+Enter to translate
document.getElementById('inputText').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){doTranslate();}
});
</script>
</body>
</html>
