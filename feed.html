<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Feed - 8BFR Music Network</title>
<link rel="stylesheet" href="styles.css">
<style>
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }

.feed-container {
  position: fixed;
  top: 60px;
  bottom: 60px;
  left: 0;
  right: 0;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

.feed-post {
  scroll-snap-align: start;
  scroll-snap-stop: always;
  height: calc(100vh - 120px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 16px;
  box-sizing: border-box;
  position: relative;
  border-bottom: 1px solid #1a1a2e;
}

.post-card {
  width: 100%;
  max-width: 500px;
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  border-radius: 16px;
  overflow: hidden;
  max-height: 100%;
  display: flex;
  flex-direction: column;
}

.post-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
}
.post-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: #333; object-fit: cover;
}
.post-user { flex: 1; }
.post-username { font-size: 14px; color: #fff; font-weight: 600; }
.post-time { font-size: 11px; color: #666; }
.post-badge {
  display: inline-block; width: 14px; height: 14px; border-radius: 50%;
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  vertical-align: middle; margin-left: 4px; position: relative;
}
.post-badge::after {
  content: '';
  position: absolute; top: 3px; left: 5px;
  width: 4px; height: 7px;
  border: solid #fff; border-width: 0 1.5px 1.5px 0;
  transform: rotate(45deg);
}

.post-body { padding: 0 14px 10px; flex: 1; overflow-y: auto; }
.post-text { font-size: 14px; color: #ddd; line-height: 1.5; margin: 0 0 10px; word-wrap: break-word; }

.post-media {
  width: 100%; max-height: 300px; object-fit: cover;
  border-radius: 8px; margin: 6px 0;
}
.post-audio { width: 100%; margin: 6px 0; }

.post-actions {
  display: flex; gap: 0; padding: 8px 14px 12px;
  border-top: 1px solid #222;
}
.post-action-btn {
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 4px; padding: 8px; border: none; background: none;
  color: #888; font-size: 12px; cursor: pointer;
}
.post-action-btn:hover, .post-action-btn.liked { color: #8b5cf6; }
.post-action-btn svg { width: 18px; height: 18px; }

/* Post counter indicator */
.post-counter {
  position: absolute; top: 8px; right: 16px;
  font-size: 11px; color: #555; background: rgba(0,0,0,0.5);
  padding: 3px 8px; border-radius: 10px;
}

/* Loading skeleton */
.skeleton-post {
  scroll-snap-align: start;
  height: calc(100vh - 120px);
  display: flex; justify-content: center; align-items: center;
}
.skeleton-card {
  width: 90%; max-width: 500px; height: 60%;
  background: #1a1a2e; border-radius: 16px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 0.3; }
}

.empty-feed {
  height: calc(100vh - 120px);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  color: #666; text-align: center; padding: 20px;
}
.empty-feed h2 { color: #aaa; font-size: 18px; margin: 0 0 8px; }
.empty-feed p { font-size: 13px; margin: 4px 0; }

/* Scroll hint */
.scroll-hint {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  color: #555; font-size: 11px; text-align: center;
  animation: fadeHint 3s ease-in-out;
  pointer-events: none;
}
@keyframes fadeHint {
  0%, 80% { opacity: 1; }
  100% { opacity: 0; }
}
</style>
</head>
<body>

<div class="feed-container" id="feedContainer"></div>
<div class="scroll-hint" id="scrollHint">Scroll to see more posts</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="scripts.js" defer></script>
<script>
const SUPABASE_URL = 'https://novbuvwpjnxwwvdekjhr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allPosts = [];
let currentPage = 0;
const PAGE_SIZE = 20;
let loading = false;
let currentUser = null;

async function init() {
  const { data } = await sb.auth.getUser();
  currentUser = data?.user || null;

  showSkeleton();
  await loadPosts();

  // Infinite scroll - load more when near bottom
  const container = document.getElementById('feedContainer');
  container.addEventListener('scroll', () => {
    if (container.scrollTop + container.clientHeight >= container.scrollHeight - 500) {
      loadMorePosts();
    }
  });

  // Hide scroll hint after first scroll
  container.addEventListener('scroll', function hideHint() {
    document.getElementById('scrollHint').style.display = 'none';
    container.removeEventListener('scroll', hideHint);
  }, { once: true });
}

function showSkeleton() {
  const container = document.getElementById('feedContainer');
  container.innerHTML = '<div class="skeleton-post"><div class="skeleton-card"></div></div>';
}

async function loadPosts() {
  if (loading) return;
  loading = true;

  try {
    const { data: posts, error } = await sb.from('posts')
      .select('id,user_id,text,media,media_type,likes,shares,favorites,comment_count,created_at,is_private,hidden,pinned,reshared_from,algorithm_score')
      .eq('is_private', false)
      .eq('hidden', false)
      .order('algorithm_score', { ascending: false, nullsFirst: false })
      .order('created_at', { ascending: false })
      .range(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE - 1);

    if (error) throw error;

    if (!posts || posts.length === 0) {
      if (currentPage === 0) showEmptyFeed();
      loading = false;
      return;
    }

    allPosts = allPosts.concat(posts);
    renderPosts(posts, currentPage === 0);
    currentPage++;
  } catch (err) {
    console.error('Feed load error:', err);
    if (currentPage === 0) showEmptyFeed();
  }
  loading = false;
}

async function loadMorePosts() {
  await loadPosts();
}

function renderPosts(posts, replace) {
  const container = document.getElementById('feedContainer');
  if (replace) container.innerHTML = '';

  // Fetch profiles for all post authors
  const uids = [...new Set(posts.map(p => p.user_id).filter(Boolean))];
  sb.from('profiles').select('user_id,username,display_name,avatar_url,is_verified,verified_artist').in('user_id', uids).then(function(pr) {
    const profileMap = {};
    (pr.data || []).forEach(function(p) { profileMap[p.user_id] = p; });

    posts.forEach((post, i) => {
      if (post.is_private || post.hidden) return;
      const profile = profileMap[post.user_id] || {};
      const username = profile.display_name || profile.username || 'User';
      const avatar = profile.avatar_url || '';
      const verified = profile.is_verified || profile.verified_artist || false;
      const timeAgo = getTimeAgo(post.created_at);
      const globalIndex = (replace ? 0 : allPosts.length - posts.length) + i + 1;

      let mediaHtml = '';
      if (post.media && (post.media_type === 'photo' || post.media_type === 'image')) {
        mediaHtml = '<img class="post-media" src="' + post.media + '" alt="Post" loading="lazy">';
      }
      if (post.media && post.media_type === 'audio') {
        mediaHtml += '<audio class="post-audio" controls preload="none" src="' + post.media + '"></audio>';
      }
      if (post.media && post.media_type === 'video') {
        var yt = post.media.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
        if (yt) {
          mediaHtml += '<div style="position:relative;padding-bottom:56.25%;border-radius:8px;overflow:hidden;margin:6px 0;"><iframe src="https://www.youtube.com/embed/' + yt[1] + '" style="position:absolute;inset:0;width:100%;height:100%;border:none;" allowfullscreen></iframe></div>';
        } else {
          mediaHtml += '<video class="post-media" controls preload="none" playsinline src="' + post.media + '"></video>';
        }
      }

      const badgeHtml = verified ? '<span class="post-badge" title="Verified"></span>' : '';

      const div = document.createElement('div');
      div.className = 'feed-post';
      div.innerHTML =
        '<span class="post-counter">' + globalIndex + '</span>' +
        '<div class="post-card">' +
          '<div class="post-header">' +
            (avatar ? '<img class="post-avatar" src="' + avatar + '" alt="">' : '<div class="post-avatar"></div>') +
            '<div class="post-user">' +
              '<div class="post-username">' + escHtml(username) + badgeHtml + '</div>' +
              '<div class="post-time">' + timeAgo + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="post-body">' +
            (post.text ? '<p class="post-text">' + escHtml(post.text) + '</p>' : '') +
            mediaHtml +
          '</div>' +
          '<div class="post-actions">' +
            '<button class="post-action-btn" onclick="likePost(\'' + post.id + '\', this)">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
              '<span>' + (post.likes || 0) + '</span>' +
            '</button>' +
            '<button class="post-action-btn" onclick="commentPost(\'' + post.id + '\')">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
              '<span>' + (post.comment_count || 0) + '</span>' +
            '</button>' +
            '<button class="post-action-btn" onclick="sharePost(\'' + post.id + '\')">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>' +
              '<span>Share</span>' +
            '</button>' +
          '</div>' +
        '</div>';

      container.appendChild(div);
    });

    setupMediaObserver();
  });
}

function showEmptyFeed() {
  const container = document.getElementById('feedContainer');
  container.innerHTML =
    '<div class="empty-feed">' +
      '<h2>No posts yet</h2>' +
      '<p>Follow some artists or check back later</p>' +
    '</div>';
}

// ---- MEDIA AUTO-PAUSE ----
function setupMediaObserver() {
  const options = { root: document.getElementById('feedContainer'), threshold: 0.5 };
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const media = entry.target.querySelectorAll('audio, video');
      media.forEach(m => {
        if (!entry.isIntersecting && !m.paused) {
          m.pause();
        }
      });
    });
  }, options);

  document.querySelectorAll('.feed-post').forEach(post => observer.observe(post));
}

// ---- ACTIONS ----
async function likePost(postId, btn) {
  if (!currentUser) { window.location.href = 'login.html'; return; }

  btn.classList.toggle('liked');
  const span = btn.querySelector('span');
  let count = parseInt(span.textContent) || 0;

  if (btn.classList.contains('liked')) {
    span.textContent = count + 1;
    await sb.from('likes').insert({ user_id: currentUser.id, post_id: postId }).catch(() => {});
  } else {
    span.textContent = Math.max(0, count - 1);
    await sb.from('likes').delete().match({ user_id: currentUser.id, post_id: postId }).catch(() => {});
  }
}

function commentPost(postId) {
  window.location.href = 'post.html?id=' + postId;
}

async function sharePost(postId) {
  const url = window.location.origin + '/post.html?id=' + postId;
  if (navigator.share) {
    try { await navigator.share({ title: '8BFR Post', url: url }); } catch (e) {}
  } else {
    navigator.clipboard.writeText(url).then(() => alert('Link copied!')).catch(() => {});
  }
}

// ---- HELPERS ----
function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function getTimeAgo(dateStr) {
  const now = new Date();
  const then = new Date(dateStr);
  const diff = Math.floor((now - then) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
  return then.toLocaleDateString();
}

init();
</script>

</body>
</html>
