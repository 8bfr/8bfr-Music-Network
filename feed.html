<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Feed - 8BFR Music Network</title>
<link rel="stylesheet" href="styles.css">
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Work Sans',system-ui,sans-serif;}

/* Kill floating avatar + page-up + bubble stack on feed (conflicts with TikTok-style UI).
   Real IDs from scripts.js: #carrieWrap (avatar), #bubble-top-single (page-up), #bubbleStack (top bubbles) */
#carrieWrap,#bubble-top-single,#bubbleStack,
#avatar-switcher-wrap,.avatar-switcher,#avatarSwitcher,.avatar-toggle,.floating-avatar,
#avatarToggle,[id="avatarToggle"],[onclick*="hideAvatarBubbles"],
#pageUp,#page-up,.page-up-btn,.scroll-top-btn,#scrollTopBtn,.back-to-top,
.bottom-nav,.bottomNav,#bottomNav{display:none!important;visibility:hidden!important;pointer-events:none!important;}

/* Top bar - pushed below status bar / notch */
.feed-top{position:fixed;top:env(safe-area-inset-top,0px);left:0;right:0;z-index:300;padding:10px 12px 6px;display:flex;align-items:center;gap:8px;background:linear-gradient(rgba(0,0,0,.75),transparent);pointer-events:none;}
.feed-top>*{pointer-events:auto;}
.search-box{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:6px 12px;}
.search-box input{flex:1;background:none;border:none;color:#fff;font-size:.82rem;outline:none;}
.search-box input::placeholder{color:rgba(255,255,255,.35);}
.ai-btn{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;color:#fff;font-size:.75rem;font-weight:800;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}

/* Tabs - pushed down below top bar with more space so they don't overlap status bar */
.feed-tabs{position:fixed;top:calc(env(safe-area-inset-top,0px) + 58px);left:0;right:0;z-index:250;display:flex;gap:0;padding:6px 16px;background:linear-gradient(rgba(0,0,0,.6),transparent);}
.feed-tab{padding:10px 14px;font-size:.88rem;font-weight:700;color:rgba(255,255,255,.55);cursor:pointer;border:none;border-bottom:3px solid transparent;background:none;transition:all .2s;text-shadow:0 1px 2px rgba(0,0,0,0.6);}
.feed-tab.active{color:#fff;border-bottom-color:#fff;}

/* Feed */
.feed-container{position:fixed;top:0;bottom:0;left:0;right:0;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;}

/* Post */
.feed-post{scroll-snap-align:start;scroll-snap-stop:always;height:100vh;height:100dvh;position:relative;background:#000;overflow:hidden;}

/* SMART MEDIA FIT:
   - Blurred background fills the whole viewport using the same image (no black bars, no off-screen)
   - Foreground image uses object-fit:contain so nothing gets cropped
   - Works for every aspect ratio: 9:16 portrait, 1:1 square, 4:5, 16:9 landscape, weird sizes all fit perfectly */
.post-media-wrap{width:100%;height:100%;position:relative;background:#000;overflow:hidden;}
.post-media-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(32px) brightness(0.55) saturate(1.3);transform:scale(1.15);z-index:0;}
.post-media-fg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1;}
.post-media-fg img,.post-media-fg video{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block;}
/* YouTube iframe sits centered, 16:9 natural aspect, blurred bg fills rest */
.post-media-fg iframe{width:100%;aspect-ratio:16/9;max-height:100%;border:none;display:block;}
.post-media-wrap audio{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:85%;max-width:350px;z-index:1;}

/* Text-only posts: properly contained within viewport with room for UI */
/* Text-only posts: 
   - Right padding of 74px clears the 54px action button column + breathing room
   - Bottom padding of 220px clears the .post-info overlay (user row + caption + sound credit)
   - Top padding of 110px clears the fixed header (.feed-top ~50px + .feed-tabs ~44px + buffer)
*/
.post-text-only{width:100%;height:100%;box-sizing:border-box;display:flex;align-items:center;justify-content:flex-start;padding:110px 74px 220px 24px;font-size:1.1rem;line-height:1.7;text-align:left;background:linear-gradient(135deg,#0b0014,#1a0533);}
.post-text-only > div{width:100%;max-height:100%;overflow-y:auto;word-wrap:break-word;overflow-wrap:break-word;white-space:pre-wrap;-webkit-overflow-scrolling:touch;}

/* Skeleton loader (shown while first batch of posts loads) */
.feed-skeleton{scroll-snap-align:start;height:100vh;height:100dvh;background:linear-gradient(135deg,#0b0014,#1a0533);position:relative;display:flex;align-items:center;justify-content:center;}
.skel-shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(168,85,247,0.08),transparent);background-size:200% 100%;animation:skelShimmer 1.4s infinite;}
@keyframes skelShimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.skel-icon{width:72px;height:72px;border-radius:50%;background:rgba(168,85,247,0.15);display:flex;align-items:center;justify-content:center;font-size:2rem;z-index:1;animation:skelPulse 1.4s infinite;}
@keyframes skelPulse{0%,100%{opacity:0.5;transform:scale(1);}50%{opacity:1;transform:scale(1.08);}}
.skel-info{position:absolute;bottom:100px;left:14px;right:60px;display:flex;flex-direction:column;gap:8px;z-index:1;}
.skel-line{height:12px;background:rgba(255,255,255,0.12);border-radius:6px;}
.skel-line.sk-w1{width:40%;}.skel-line.sk-w2{width:75%;}.skel-line.sk-w3{width:60%;}

/* Bottom info overlay - right margin clears the 60px action column (+14px breathing room) */
.post-info{position:absolute;bottom:0;left:0;right:74px;padding:14px 4px 14px 14px;background:linear-gradient(transparent,rgba(0,0,0,.8));z-index:10;max-width:calc(100% - 78px);}
.pi-user{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.pi-avatar{width:32px;height:32px;border-radius:50%;background:#333;object-fit:cover;border:2px solid rgba(255,255,255,.3);flex-shrink:0;cursor:pointer;}
.pi-name{font-weight:700;font-size:.88rem;cursor:pointer;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pi-name:hover{text-decoration:underline;}
.pi-badge{display:inline-block;width:13px;height:13px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);vertical-align:middle;margin-left:3px;position:relative;}
.pi-badge::after{content:'';position:absolute;top:2.5px;left:4.5px;width:3.5px;height:6px;border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(45deg);}
.pi-follow{padding:2px 10px;border-radius:4px;background:#ff2d55;color:#fff;font-size:.7rem;font-weight:700;border:none;cursor:pointer;margin-left:6px;}
.pi-follow.following{background:rgba(255,255,255,.15);color:rgba(255,255,255,.6);}
.pi-text{font-size:.85rem;color:rgba(255,255,255,.95);line-height:1.5;max-height:4.5em;overflow:hidden;margin-bottom:4px;word-wrap:break-word;overflow-wrap:break-word;text-shadow:0 1px 3px rgba(0,0,0,0.9);}
.pi-text.expanded{max-height:50vh;overflow-y:auto;}
.pi-more{color:#a855f7;font-size:.72rem;cursor:pointer;font-weight:600;}
.pi-sound{display:flex;align-items:center;gap:6px;font-size:.72rem;color:rgba(255,255,255,.5);margin-top:4px;}
.pi-sound-icon{animation:spinDisc 3s linear infinite;}
@keyframes spinDisc{to{transform:rotate(360deg);}}
.pi-time{font-size:.62rem;color:rgba(255,255,255,.3);}

/* Right side action buttons */
.post-side{position:absolute;right:6px;bottom:100px;display:flex;flex-direction:column;gap:14px;z-index:10;align-items:center;}
.ps-btn{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;background:none;border:none;padding:0;}
.ps-icon{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.12);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;transition:all .2s;}
.ps-icon svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2;}
.ps-btn.liked .ps-icon{background:rgba(255,45,85,.3);}
.ps-btn.liked .ps-icon svg{fill:#ff2d55;stroke:#ff2d55;}
.ps-btn.faved .ps-icon{background:rgba(234,179,8,.3);}
.ps-btn.faved .ps-icon svg{fill:#eab308;stroke:#eab308;}
.ps-count{font-size:.68rem;color:#fff;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.8);}
.ps-avatar{width:42px;height:42px;border-radius:50%;border:2px solid #fff;object-fit:cover;cursor:pointer;background:#333;}

/* Block menu */
.block-menu{position:absolute;right:50px;top:0;background:rgba(20,10,40,.95);border:1px solid rgba(124,58,237,.3);border-radius:10px;padding:4px;display:none;z-index:20;min-width:140px;}
.block-menu.show{display:block;}
.bm-item{padding:8px 12px;font-size:.82rem;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:6px;}
.bm-item:hover{background:rgba(124,58,237,.15);}
.bm-item.danger{color:#ef4444;}

/* Comment panel */
.comment-panel{position:fixed;bottom:0;left:0;right:0;height:60vh;background:rgba(15,10,35,.98);border-top:2px solid rgba(124,58,237,.3);border-radius:16px 16px 0 0;z-index:500;transform:translateY(100%);transition:transform .3s ease;display:flex;flex-direction:column;}
.comment-panel.open{transform:translateY(0);}
.cp-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(124,58,237,.15);}
.cp-header h3{font-size:.95rem;font-weight:700;}
.cp-close{background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;}
.cp-list{flex:1;overflow-y:auto;padding:8px 16px;}
.cp-comment{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid rgba(124,58,237,.06);}
.cp-av{width:28px;height:28px;border-radius:50%;background:#333;flex-shrink:0;object-fit:cover;}
.cp-body{flex:1;}
.cp-name{font-size:.78rem;font-weight:700;color:#a855f7;}
.cp-text{font-size:.82rem;color:rgba(255,255,255,.8);margin-top:2px;}
.cp-time{font-size:.62rem;color:rgba(255,255,255,.3);margin-top:2px;}
.cp-input{display:flex;gap:8px;padding:10px 16px;border-top:1px solid rgba(124,58,237,.15);background:rgba(15,10,35,.98);}
.cp-input input{flex:1;padding:8px 12px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(124,58,237,.2);color:#fff;font-size:.85rem;outline:none;}
.cp-input input:focus{border-color:#7c3aed;}
.cp-input button{padding:8px 16px;border-radius:20px;background:#7c3aed;border:none;color:#fff;font-weight:700;font-size:.82rem;cursor:pointer;}

/* Inline ad */
.feed-ad{scroll-snap-align:start;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0b0014,#1a0533);padding:20px;}
.ad-card{max-width:320px;width:100%;background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.2);border-radius:16px;padding:20px;text-align:center;}
.ad-card img{width:100%;border-radius:10px;margin-bottom:12px;max-height:280px;object-fit:cover;}
.ad-label{font-size:.55rem;color:rgba(168,85,247,.3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.ad-title{font-size:1rem;font-weight:700;margin-bottom:6px;}
.ad-desc{font-size:.8rem;color:rgba(168,85,247,.5);margin-bottom:12px;}
.ad-link{display:inline-block;padding:8px 20px;border-radius:8px;background:#7c3aed;color:#fff;text-decoration:none;font-size:.82rem;font-weight:600;}

.empty-feed{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#666;text-align:center;padding:20px;}
.empty-feed h2{color:#aaa;font-size:16px;margin:0 0 8px;}
</style>
</head>
<body>

<!-- Top: Search + AI -->
<div class="feed-top">
<input type="text" id="searchInput" class="search-box" placeholder="Search posts..." oninput="searchPosts(this.value)" style="flex:1;display:flex;align-items:center;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:6px 12px;color:#fff;font-size:.82rem;outline:none;border:none;">
<button class="ai-btn" onclick="location.href='author.html'" title="AI Post Helper">AI</button>
</div>

<!-- Tabs -->
<div class="feed-tabs">
<button class="feed-tab active" onclick="switchFeed('foryou',this)">For You</button>
<button class="feed-tab" onclick="switchFeed('following',this)">Following</button>
<button class="feed-tab" onclick="switchFeed('friends',this)">Friends</button>
<button class="feed-tab" onclick="switchFeed('latest',this)">Latest</button>
</div>

<div class="feed-container" id="feedContainer"></div>

<!-- Comment Panel -->
<div class="comment-panel" id="commentPanel">
<div class="cp-header"><h3 id="cpTitle">Comments</h3><button class="cp-close" onclick="closeComments()">X</button></div>
<div class="cp-list" id="cpList"></div>
<div class="cp-input"><input type="text" id="cpInput" placeholder="Add a comment..." maxlength="500"><button onclick="submitComment()">Post</button></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="scripts.js" defer></script>
<script>
var sb=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
var OWNER_ID='cb556180-f032-4b21-9470-1d786f2664ab';
var cu=null,pc={},allP=[],cf='foryou',ld=false,pg=0,PS=15;
var friendIds=[],followIds=[],myLikes={},myFavs={},myFollows={},adData=[];
var blockedIds=[]; // users the current user blocked OR was blocked by (filtered from feed; owner is exempt from "blocked-by" half)
var OWNER_ID='cb556180-f032-4b21-9470-1d786f2664ab';
var commentPostId=null;

async function init(){
  // ── INSTANT UI: Show skeleton loaders before ANY network calls so page never looks empty ──
  showSkeletons(3);

  var s=await sb.auth.getSession();
  if(s.data&&s.data.session)cu=s.data.session.user;

  // ── Parallel kickoff: profiles + social data + feed all at once ──
  var profPromise=sb.from('profiles').select('user_id,username,display_name,avatar_url,verified_artist');

  var socialPromises=[];
  if(cu){
    socialPromises.push(sb.from('friends').select('user_id,friend_id').or('user_id.eq.'+cu.id+',friend_id.eq.'+cu.id).eq('status','accepted'));
    socialPromises.push(sb.from('follows').select('following_id').eq('follower_id',cu.id));
    socialPromises.push(sb.from('post_likes').select('post_id').eq('user_id',cu.id));
    socialPromises.push(sb.from('favorites').select('target_id').eq('user_id',cu.id).eq('target_type','post'));
    socialPromises.push(sb.from('user_blocks').select('blocked_id').eq('blocker_id',cu.id));
    if(cu.id!==OWNER_ID){
      socialPromises.push(sb.from('user_blocks').select('blocker_id').eq('blocked_id',cu.id));
    }
  }

  // Wait for profiles (needed for post rendering) + social (needed for block filter)
  var ap=await profPromise;
  if(ap.data)ap.data.forEach(function(p){pc[p.user_id]=p;});

  if(cu){
    var results=await Promise.all(socialPromises);
    (results[0]?.data||[]).forEach(function(f){var fid=f.user_id===cu.id?f.friend_id:f.user_id;friendIds.push(fid);});
    (results[1]?.data||[]).forEach(function(f){followIds.push(f.following_id);myFollows[f.following_id]=true;});
    (results[2]?.data||[]).forEach(function(l){myLikes[l.post_id]=true;});
    (results[3]?.data||[]).forEach(function(f){myFavs[f.target_id]=true;});
    (results[4]?.data||[]).forEach(function(b){if(blockedIds.indexOf(b.blocked_id)===-1)blockedIds.push(b.blocked_id);});
    if(results[5])(results[5]?.data||[]).forEach(function(b){if(blockedIds.indexOf(b.blocker_id)===-1)blockedIds.push(b.blocker_id);});
  }

  // Ads (parallel with the feed load below)
  sb.from('ads').select('*').eq('status','approved').limit(5).then(function(r){adData=r.data||[];});

  loadFeed();
  var fc=document.getElementById('feedContainer');
  fc.addEventListener('scroll',function(){if(this.scrollTop+this.clientHeight>=this.scrollHeight-600&&!ld)loadFeed();});

  // Suppress scripts.js UI that overlaps TikTok-style feed
  // Real IDs: #carrieWrap, #bubble-top-single, #bubbleStack
  var killSelectors='#carrieWrap,#bubble-top-single,#bubbleStack,#avatar-switcher-wrap,.avatar-switcher,#avatarSwitcher,.avatar-toggle,.floating-avatar,#avatarToggle,[id="avatarToggle"],[onclick*="hideAvatarBubbles"],#pageUp,#page-up,.page-up-btn,.scroll-top-btn,#scrollTopBtn,.back-to-top,.bottom-nav,.bottomNav,#bottomNav';
  function killOverlays(){document.querySelectorAll(killSelectors).forEach(function(el){el.style.display='none';el.style.visibility='hidden';el.style.pointerEvents='none';});}
  killOverlays();
  setTimeout(killOverlays,300);
  setTimeout(killOverlays,1000);
  setTimeout(killOverlays,2500);

  // Enter to submit comment
  document.getElementById('cpInput').addEventListener('keydown',function(e){if(e.key==='Enter')submitComment();});
}

function switchFeed(feed,btn){cf=feed;pg=0;allP=[];document.querySelectorAll('.feed-tab').forEach(function(t){t.classList.remove('active');});if(btn)btn.classList.add('active');document.getElementById('feedContainer').innerHTML='';loadFeed();}

async function loadFeed(){
  if(ld)return;ld=true;
  var q=sb.from('posts').select('id,user_id,text,media,media_type,likes,comment_count,created_at,is_private,hidden,algorithm_score').eq('is_private',false).eq('hidden',false);

  // Filter out blocked users
  if(blockedIds.length){
    q=q.not('user_id','in','('+blockedIds.join(',')+')');
  }

  if(cf==='friends'){
    if(!friendIds.length){showEmpty('Add friends to see their posts');ld=false;return;}
    q=q.in('user_id',friendIds);
  }else if(cf==='following'){
    if(!followIds.length){showEmpty('Follow artists to see their posts');ld=false;return;}
    q=q.in('user_id',followIds);
  }

  if(cf==='foryou')q=q.order('algorithm_score',{ascending:false,nullsFirst:false});
  q=q.order('created_at',{ascending:false}).range(pg*PS,(pg+1)*PS-1);
  var r=await q;var posts=r.data||[];
  if(!posts.length&&pg===0){showEmpty('No posts yet');ld=false;return;}
  allP=allP.concat(posts);renderPosts(posts,pg===0);pg++;ld=false;
}

function searchPosts(query){
  if(!query){renderPosts(allP,true);return;}
  var q=query.toLowerCase();
  var filtered=allP.filter(function(p){
    var txt=(p.text||'').toLowerCase();
    var prof=pc[p.user_id]||{};
    var name=((prof.display_name||'')+(prof.username||'')).toLowerCase();
    return txt.indexOf(q)!==-1||name.indexOf(q)!==-1;
  });
  renderPosts(filtered,true);
}

function renderPosts(posts,replace){
  var c=document.getElementById('feedContainer');if(replace)c.innerHTML='';

  posts.forEach(function(post,i){
    var gi=allP.indexOf(post);if(gi===-1)gi=i;
    var p=pc[post.user_id]||{};
    var name=p.display_name||p.username||'User';
    var avatar=p.avatar_url||'';
    var verified=p.verified_artist||false;
    var isFollowing=myFollows[post.user_id]||false;
    var isLiked=myLikes[post.id]||false;
    var isFaved=myFavs[post.id]||false;
    var isMe=cu&&cu.id===post.user_id;

    // Ad every 6 posts
    if(gi>0&&gi%6===0&&adData.length){
      var ad=adData[Math.floor(Math.random()*adData.length)];
      var adDiv=document.createElement('div');adDiv.className='feed-ad';
      adDiv.innerHTML='<div class="ad-card"><div class="ad-label">Sponsored</div>'+(ad.image_url?'<img src="'+esc(ad.image_url)+'" alt="">':'')+'<div class="ad-title">'+esc(ad.title||'')+'</div><div class="ad-desc">'+esc(ad.description||ad.content||'')+'</div>'+(ad.link_url?'<a href="'+esc(ad.link_url)+'" target="_blank" class="ad-link">Check it out</a>':'')+'</div>';
      c.appendChild(adDiv);
    }

    var div=document.createElement('div');div.className='feed-post';

    // Eager-load first 3 posts (no lazy), lazy-load the rest
    var loadMode=(gi<3)?'eager':'lazy';
    var vidPreload=(gi<2)?'metadata':'none';

    // Determine media type - use explicit media_type, or detect from URL extension if missing
    var mType=post.media_type;
    var mediaUrl=post.media;

    // If no media column set, try to extract a URL from the post text
    if(!mediaUrl && post.text){
      var urlMatch=post.text.match(/https?:\/\/[^\s<>"']+/i);
      if(urlMatch){
        var candidate=urlMatch[0];
        // Only treat as media if it's actually a media URL
        if(/youtube\.com|youtu\.be|spotify\.com|soundcloud\.com|bandcamp\.com|\.(jpg|jpeg|png|gif|webp|avif|mp4|webm|mov|mp3|wav|m4a|ogg)(\?|$)/i.test(candidate)){
          mediaUrl=candidate;
        }
      }
    }

    if(mediaUrl && !mType){
      var u=mediaUrl.toLowerCase();
      if(/\.(jpg|jpeg|png|gif|webp|avif|svg)(\?|$)/i.test(u))mType='image';
      else if(/\.(mp4|webm|mov|m4v)(\?|$)/i.test(u)||/youtube\.com|youtu\.be/.test(u))mType='video';
      else if(/\.(mp3|wav|ogg|m4a|aac)(\?|$)/i.test(u))mType='audio';
      else if(/spotify\.com|soundcloud\.com|bandcamp\.com/.test(u))mType='embed';
    }

    // Media - build smart-fit structure (blurred bg + contained fg)
    var mWrap=document.createElement('div');
    var hasM=false,mInner='';
    if(mediaUrl&&(mType==='photo'||mType==='image')){
      var safeUrl=esc(mediaUrl);
      mInner='<div class="post-media-bg" style="background-image:url(\''+safeUrl.replace(/'/g,"\\'")+'\')"></div>'+
             '<div class="post-media-fg"><img src="'+safeUrl+'" alt="" loading="'+loadMode+'" fetchpriority="'+(gi===0?'high':'auto')+'"></div>';
      hasM=true;
    }else if(mediaUrl&&mType==='video'){
      var yt=mediaUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
      if(yt){
        var ytId=yt[1];
        mInner='<div class="post-media-bg" style="background-image:url(\'https://img.youtube.com/vi/'+ytId+'/hqdefault.jpg\')"></div>'+
               '<div class="post-media-fg"><iframe src="https://www.youtube.com/embed/'+ytId+'?rel=0&modestbranding=1&playsinline=1" allowfullscreen loading="'+loadMode+'"></iframe></div>';
      }else{
        mInner='<div class="post-media-bg" style="background-color:#111"></div>'+
               '<div class="post-media-fg"><video src="'+esc(mediaUrl)+'" controls playsinline preload="'+vidPreload+'"></video></div>';
      }
      hasM=true;
    }else if(mediaUrl&&mType==='audio'){
      mInner='<div class="post-media-bg" style="background:linear-gradient(135deg,#0b0014,#1a0533)"></div>'+
             '<audio src="'+esc(mediaUrl)+'" controls preload="none"></audio>';
      hasM=true;
    }else if(mediaUrl&&mType==='embed'){
      // Spotify / SoundCloud / Bandcamp embed
      var embedSrc='';var bgColor='#0b0014';
      var sp=mediaUrl.match(/open\.spotify\.com\/(track|album|playlist|episode|show)\/([a-zA-Z0-9]+)/);
      var sc=/soundcloud\.com/.test(mediaUrl);
      var bc=/bandcamp\.com/.test(mediaUrl);
      if(sp){embedSrc='https://open.spotify.com/embed/'+sp[1]+'/'+sp[2];bgColor='#191414';}
      else if(sc){embedSrc='https://w.soundcloud.com/player/?url='+encodeURIComponent(mediaUrl)+'&color=%23ff5500&auto_play=false';bgColor='#111';}
      else if(bc){embedSrc=mediaUrl;bgColor='#1da0c3';}
      if(embedSrc){
        mInner='<div class="post-media-bg" style="background:'+bgColor+'"></div>'+
               '<div class="post-media-fg"><iframe src="'+esc(embedSrc)+'" allow="autoplay;encrypted-media" loading="'+loadMode+'"></iframe></div>';
        hasM=true;
      }
    }

    if(hasM){mWrap.className='post-media-wrap';mWrap.innerHTML=mInner;}
    else{mWrap.className='post-text-only';mWrap.innerHTML='<div>'+linkify(post.text||'')+'</div>';}
    div.appendChild(mWrap);

    // Bottom info
    var info=document.createElement('div');info.className='post-info';
    // User row
    var userRow=document.createElement('div');userRow.className='pi-user';
    if(avatar){var img=document.createElement('img');img.className='pi-avatar';img.src=avatar;img.alt='';img.onerror=function(){this.style.background='#333';this.src='';};img.onclick=function(){location.href='profile.html?id='+post.user_id;};userRow.appendChild(img);}
    else{var avd=document.createElement('div');avd.className='pi-avatar';avd.onclick=function(){location.href='profile.html?id='+post.user_id;};userRow.appendChild(avd);}

    var nameSpan=document.createElement('span');nameSpan.className='pi-name';nameSpan.textContent=name;
    nameSpan.onclick=function(){location.href='profile.html?id='+post.user_id;};
    userRow.appendChild(nameSpan);

    if(verified){var badge=document.createElement('span');badge.className='pi-badge';userRow.appendChild(badge);}

    // Follow button (not on own posts)
    if(!isMe&&cu){
      var fbtn=document.createElement('button');
      fbtn.className='pi-follow'+(isFollowing?' following':'');
      fbtn.textContent=isFollowing?'Following':'Follow';
      fbtn.setAttribute('data-uid',post.user_id);
      fbtn.onclick=function(e){e.stopPropagation();toggleFollow(this,post.user_id);};
      userRow.appendChild(fbtn);
    }
    info.appendChild(userRow);

    // Text caption (shown below name; strip the media URL if it was extracted from text)
    if(hasM&&post.text){
      var txt=document.createElement('div');txt.className='pi-text';
      var full=post.text;
      // If we pulled media URL out of the text, remove it from the displayed caption to avoid duplication
      if(mediaUrl && full.indexOf(mediaUrl)!==-1 && !post.media){
        full=full.replace(mediaUrl,'').trim();
      }
      if(full){
        var short=full.length>100?full.substring(0,100)+'...':full;
        txt.innerHTML=linkify(short);
        if(full.length>100){
          var more=document.createElement('span');more.className='pi-more';more.textContent=' more';
          more.onclick=function(e){e.stopPropagation();txt.innerHTML=linkify(full);txt.classList.add('expanded');};
          txt.appendChild(more);
        }
        info.appendChild(txt);
      }
    }

    // Sound credit (if media is from the user's songs table)
    if(hasM){
      var sound=document.createElement('div');sound.className='pi-sound';
      sound.innerHTML='<span class="pi-sound-icon">&#9835;</span> '+esc(name)+' - Original Sound';
      info.appendChild(sound);
    }

    // Time
    var timeEl=document.createElement('div');timeEl.className='pi-time';timeEl.textContent=timeAgo(post.created_at);
    info.appendChild(timeEl);

    div.appendChild(info);

    // Right side buttons
    var side=document.createElement('div');side.className='post-side';

    // Profile avatar at top
    if(avatar){var sav=document.createElement('img');sav.className='ps-avatar';sav.src=avatar;sav.onclick=function(){location.href='profile.html?id='+post.user_id;};side.appendChild(sav);}

    // Like
    var likeBtn=document.createElement('button');likeBtn.className='ps-btn'+(isLiked?' liked':'');
    likeBtn.innerHTML='<div class="ps-icon"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div><span class="ps-count">'+(post.likes||0)+'</span>';
    likeBtn.onclick=function(){toggleLike(this,post.id);};
    side.appendChild(likeBtn);

    // Comment
    var cmtBtn=document.createElement('button');cmtBtn.className='ps-btn';
    cmtBtn.innerHTML='<div class="ps-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><span class="ps-count">'+(post.comment_count||0)+'</span>';
    cmtBtn.onclick=function(){openComments(post.id);};
    side.appendChild(cmtBtn);

    // Favorite
    var favBtn=document.createElement('button');favBtn.className='ps-btn'+(isFaved?' faved':'');
    favBtn.innerHTML='<div class="ps-icon"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><span class="ps-count">Save</span>';
    favBtn.onclick=function(){toggleFav(this,post.id);};
    side.appendChild(favBtn);

    // Share
    Share.open({
  type: 'post',
  id: post.id,
  title: authorName + ' on 8BFR',
  description: post.text,
  image: post.media
});

    // More (block/report)
    if(!isMe&&cu){
      var moreBtn=document.createElement('button');moreBtn.className='ps-btn';
      moreBtn.innerHTML='<div class="ps-icon" style="font-size:1.2rem;">...</div>';
      var menu=document.createElement('div');menu.className='block-menu';
      menu.innerHTML='<div class="bm-item" onclick="reportPost(\''+post.id+'\')">Report Post</div><div class="bm-item danger" onclick="blockUser(\''+post.user_id+'\',\''+esc(name)+'\')">Block '+esc(name)+'</div>';
      moreBtn.onclick=function(){menu.classList.toggle('show');};
      moreBtn.style.position='relative';
      moreBtn.appendChild(menu);
      side.appendChild(moreBtn);
    }

    div.appendChild(side);
    c.appendChild(div);
  });
  setupObs();
}

// ---- ACTIONS ----
function toggleLike(btn,id){
  if(!cu){location.href='login.html';return;}
  var liked=btn.classList.toggle('liked');
  var span=btn.querySelector('.ps-count');
  var ct=parseInt(span.textContent)||0;
  span.textContent=liked?ct+1:Math.max(0,ct-1);
  myLikes[id]=liked;
  if(liked){sb.from('post_likes').upsert({post_id:id,user_id:cu.id}).catch(function(){});sb.from('posts').update({likes:ct+1}).eq('id',id).catch(function(){});}
  else{sb.from('post_likes').delete().match({post_id:id,user_id:cu.id}).catch(function(){});sb.from('posts').update({likes:Math.max(0,ct-1)}).eq('id',id).catch(function(){});}
}

function toggleFav(btn,id){
  if(!cu){location.href='login.html';return;}
  var faved=btn.classList.toggle('faved');
  myFavs[id]=faved;
  if(faved){sb.from('favorites').upsert({target_id:id,target_type:'post',user_id:cu.id}).catch(function(){});}
  else{sb.from('favorites').delete().match({target_id:id,target_type:'post',user_id:cu.id}).catch(function(){});}
}

function toggleFollow(btn,uid){
  if(!cu)return;
  var following=btn.classList.toggle('following');
  btn.textContent=following?'Following':'Follow';
  myFollows[uid]=following;
  // Update ALL follow buttons for this user
  document.querySelectorAll('[data-uid="'+uid+'"]').forEach(function(b){b.className='pi-follow'+(following?' following':'');b.textContent=following?'Following':'Follow';});
  if(following){sb.from('follows').upsert({follower_id:cu.id,following_id:uid}).catch(function(){});if(followIds.indexOf(uid)===-1)followIds.push(uid);}
  else{sb.from('follows').delete().match({follower_id:cu.id,following_id:uid}).catch(function(){});followIds=followIds.filter(function(f){return f!==uid;});}
}

function sharePost(id){
  var url=location.origin+'/post.html?id='+id;
  if(navigator.share){navigator.share({title:'8BFR Post',url:url}).catch(function(){});}
  else{navigator.clipboard.writeText(url).then(function(){alert('Link copied!');}).catch(function(){});}
}

function reportPost(id){
  var reason=prompt('Why are you reporting this post?');
  if(!reason)return;
  sb.from('message_reports').insert({reporter_id:cu.id,message_text:'Post: '+id,reason:reason,status:'pending',message_source:'feed'}).catch(function(){});
  alert('Report submitted. Thank you.');
}

function blockUser(uid,name){
  if(!confirm('Block '+name+'? You will no longer see their posts.'))return;
  sb.from('blocks').upsert({blocker_id:cu.id,blocked_id:uid}).catch(function(){
    // If blocks table doesnt exist yet, try user_blocks
    sb.from('user_blocks').upsert({blocker_id:cu.id,blocked_id:uid}).catch(function(){});
  });
  // Remove their posts from view
  allP=allP.filter(function(p){return p.user_id!==uid;});
  renderPosts(allP,true);
  alert(name+' blocked.');
}

// ---- COMMENTS ----
function openComments(postId){
  commentPostId=postId;
  document.getElementById('commentPanel').classList.add('open');
  loadComments(postId);
}
function closeComments(){document.getElementById('commentPanel').classList.remove('open');commentPostId=null;}

async function loadComments(postId){
  var list=document.getElementById('cpList');
  list.innerHTML='<div style="text-align:center;padding:1rem;color:#666;">Loading...</div>';
  var r=await sb.from('post_comments').select('*').eq('post_id',postId).order('created_at',{ascending:true}).limit(50);
  var data=r.data||[];
  var ct=data.length;
  document.getElementById('cpTitle').textContent=ct+' Comment'+(ct!==1?'s':'');
  if(!data.length){list.innerHTML='<div style="text-align:center;padding:2rem;color:#666;">No comments yet. Be the first!</div>';return;}
  // Get profiles for commenters
  var uids=[...new Set(data.map(function(c){return c.user_id;}))];
  var pr=await sb.from('profiles').select('user_id,display_name,username,avatar_url').in('user_id',uids);
  var nm={};(pr.data||[]).forEach(function(p){nm[p.user_id]=p;});
  list.innerHTML=data.map(function(cm){
    var u=nm[cm.user_id]||{};
    var cname=u.display_name||u.username||'User';
    var cav=u.avatar_url||'';
    return '<div class="cp-comment">'+(cav?'<img class="cp-av" src="'+esc(cav)+'" alt="">':'<div class="cp-av"></div>')+'<div class="cp-body"><div class="cp-name" onclick="location.href=\'profile.html?id='+cm.user_id+'\'">'+esc(cname)+'</div><div class="cp-text">'+esc(cm.text)+'</div><div class="cp-time">'+timeAgo(cm.created_at)+'</div></div></div>';
  }).join('');
}

async function submitComment(){
  if(!cu){location.href='login.html';return;}
  var input=document.getElementById('cpInput');
  var text=input.value.trim();
  if(!text||!commentPostId)return;
  input.value='';
  await sb.from('post_comments').insert({post_id:commentPostId,user_id:cu.id,text:text});
  // Update comment count
  var post=allP.find(function(p){return p.id===commentPostId;});
  if(post){post.comment_count=(post.comment_count||0)+1;await sb.from('posts').update({comment_count:post.comment_count}).eq('id',commentPostId);}
  loadComments(commentPostId);
}

// ---- HELPERS ----
function showEmpty(msg){document.getElementById('feedContainer').innerHTML='<div class="empty-feed"><h2>'+msg+'</h2></div>';}
function showSkeletons(n){
  var c=document.getElementById('feedContainer');
  if(!c)return;
  var h='';
  for(var i=0;i<n;i++){
    h+='<div class="feed-skeleton"><div class="skel-shimmer"></div><div class="skel-icon">'+(i===0?'🎵':i===1?'🎤':'🎧')+'</div><div class="skel-info"><div class="skel-line sk-w1"></div><div class="skel-line sk-w2"></div><div class="skel-line sk-w3"></div></div></div>';
  }
  c.innerHTML=h;
}
function setupObs(){var o=new IntersectionObserver(function(es){es.forEach(function(e){e.target.querySelectorAll('audio,video').forEach(function(m){if(!e.isIntersecting&&!m.paused)m.pause();});});},{root:document.getElementById('feedContainer'),threshold:0.5});document.querySelectorAll('.feed-post').forEach(function(p){o.observe(p);});}
function timeAgo(d){var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'now';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function linkify(s){
  if(!s)return'';
  var escaped=esc(s);
  return escaped.replace(/(https?:\/\/[^\s<>"']+)/gi,function(url){
    return '<a href="'+url+'" target="_blank" rel="noopener" style="color:#c084fc;text-decoration:underline;word-break:break-all;" onclick="event.stopPropagation();">'+url+'</a>';
  });
}
init();
</script>
