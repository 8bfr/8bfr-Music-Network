<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>8BFR Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',system-ui,sans-serif;background:linear-gradient(#0b0014,#000);color:#eae6ff;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.hdr{background:rgba(15,0,30,.95);border-bottom:1px solid rgba(124,58,237,.5);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr h1{font-family:'Bebas Neue',cursive;font-size:1.4rem;letter-spacing:1px;}
.hdr a{color:#a855f7;text-decoration:none;font-size:.85rem;font-weight:600;}
.tabs{display:flex;background:rgba(12,6,24,.9);border-bottom:1px solid rgba(124,58,237,.3);flex-shrink:0;}
.tabs a{flex:1;text-align:center;padding:.7rem;color:rgba(234,230,255,.6);text-decoration:none;font-weight:700;font-size:.85rem;}
.tabs a.active{color:#fff;border-bottom:2px solid #a855f7;}
.wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* room list */
.rooms{flex:1;overflow-y:auto;padding:1rem;}
.room-card{background:rgba(12,6,24,.85);border:1px solid rgba(124,58,237,.35);border-radius:12px;padding:1rem;margin-bottom:.75rem;cursor:pointer;}
.room-card:hover{border-color:#a855f7;}
.room-card h3{font-size:1.05rem;margin-bottom:.2rem;}
.room-card p{font-size:.82rem;color:rgba(234,230,255,.6);}
.new-room{width:100%;padding:.85rem;background:#7c3aed;color:#fff;border:none;border-radius:12px;font-weight:800;font-size:.95rem;cursor:pointer;margin-bottom:1rem;}

/* chat view */
.chat-view{display:none;flex-direction:column;position:fixed;inset:0;z-index:200;background:linear-gradient(#0b0014,#000);}
.chat-view.show{display:flex;}
.messages{flex:1 1 auto;min-height:0;}
.chat-top{display:flex;align-items:center;gap:.6rem;padding:.6rem 1rem;background:rgba(12,6,24,.9);border-bottom:1px solid rgba(124,58,237,.3);flex-shrink:0;}
.chat-top button{background:none;border:none;color:#a855f7;font-size:1.3rem;cursor:pointer;}
.chat-top h2{font-size:1rem;}
.messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.6rem;}
.msg{max-width:80%;}
.msg.mine{align-self:flex-end;text-align:right;}
.msg .who{font-size:.72rem;color:#c084fc;font-weight:700;margin-bottom:.15rem;}
.msg .who a{color:#34d399;font-size:.68rem;font-weight:600;text-decoration:none;margin-left:.3rem;}
.msg .bubble{background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.3);border-radius:14px;padding:.5rem .8rem;font-size:.92rem;display:inline-block;word-break:break-word;}
.msg.mine .bubble{background:#7c3aed;border-color:#7c3aed;}
.compose{display:flex;gap:.5rem;padding:.6rem;background:rgba(12,6,24,.95);border-top:1px solid rgba(124,58,237,.3);flex-shrink:0;align-items:center;}
.compose input{flex:1;padding:.7rem 1rem;border-radius:50px;border:1px solid rgba(124,58,237,.4);background:rgba(0,0,0,.4);color:#fff;font-size:.95rem;}
.compose button{background:#7c3aed;border:none;color:#fff;padding:.7rem 1.1rem;border-radius:50px;font-weight:800;cursor:pointer;}
.emoji-bar{display:flex;gap:.2rem;padding:.3rem .6rem;background:rgba(12,6,24,.95);overflow-x:auto;flex-shrink:0;}
.emoji-bar button{background:none;border:none;font-size:1.4rem;cursor:pointer;padding:.2rem;flex-shrink:0;}
.empty{text-align:center;color:rgba(234,230,255,.4);padding:2rem;font-size:.9rem;}
.notice{font-size:.7rem;color:rgba(234,230,255,.45);text-align:center;padding:.4rem;}
</style>
</head>
<body>
<div class="hdr">
  <h1>8BFR Chat</h1>
  <div><a href="chat.html">🎵 Music Chats</a> &nbsp; <a href="index.html">8BFR</a></div>
</div>
<div class="tabs">
  <a href="chat-rooms.html" class="active">Rooms</a>
  <a href="chat-feed.html">Feed</a>
  <a href="#" onclick="goProfile(event)">Profile</a>
</div>

<div class="wrap">
  <!-- ROOM LIST -->
  <div class="rooms" id="roomList">
    <button class="new-room" onclick="createRoom()">+ New Room</button>
    <div id="rooms"><div class="empty">Loading rooms...</div></div>
    <div class="notice">Chat is text + emoji only. Photos and videos go on the Feed.</div>
  </div>

  <!-- CHAT VIEW -->
  <div class="chat-view" id="chatView">
    <div class="chat-top">
      <button onclick="leaveRoom()">&larr;</button>
      <h2 id="roomName" style="flex:1;"></h2>
      <button id="cleanBtn" onclick="toggleCleanup()" style="display:none;background:none;border:1px solid rgba(239,68,68,.4);color:#fca5a5;border-radius:8px;padding:.3rem .6rem;font-size:.75rem;cursor:pointer;">Clean up</button>
    </div>
    <div id="cleanupBar" style="display:none;gap:.5rem;padding:.5rem 1rem;background:rgba(239,68,68,.08);border-bottom:1px solid rgba(239,68,68,.2);align-items:center;font-size:.78rem;"><span id="cleanCount">0 selected</span><button onclick="deleteSelected()" style="background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.5);color:#fca5a5;border-radius:6px;padding:.25rem .6rem;cursor:pointer;font-weight:700;">Delete selected</button><button onclick="clearAllMessages()" style="background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.5);color:#fca5a5;border-radius:6px;padding:.25rem .6rem;cursor:pointer;font-weight:700;">Clear ALL</button><button onclick="toggleCleanup()" style="margin-left:auto;background:none;border:none;color:#a855f7;cursor:pointer;">Done</button></div>
    <div class="messages" id="messages"></div>
    <div class="emoji-bar" id="emojiBar"></div>
    <div class="compose">
      <input type="text" id="msgInput" placeholder="Type a message...  link: [text](https://...)" onkeydown="if(event.key==='Enter')sendMsg()" maxlength="500">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL='https://novbuvwpjnxwwvdekjhr.supabase.co';
var ANON='sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f';
var db=window.supabase.createClient(SUPABASE_URL,ANON);
var currentUser=null, activeRoom=null, msgChannel=null, profileCache={};
var OWNERID='cb556180-f032-4b21-9470-1d786f2664ab';
var canMod=false;
var EMOJIS=['\u2764\uFE0F','\uD83D\uDE02','\uD83D\uDD25','\uD83D\uDC4D','\uD83D\uDE0D','\uD83D\uDE4C','\uD83C\uDF89','\uD83D\uDE2E','\uD83D\uDE22','\uD83D\uDE0E','\uD83D\uDC4F','\uD83D\uDCAF','\uD83C\uDFB5','\u2728','\uD83D\uDE4F','\uD83D\uDE18'];

async function init(){
  var s=await db.auth.getSession();
  for(var t=0;t<8&&!(s.data&&s.data.session);t++){await new Promise(function(r){setTimeout(r,400);});s=await db.auth.getSession();}
  if(!s.data||!s.data.session){window.location.href='login.html?return=chat-rooms.html';return;}
  currentUser=s.data.session.user;
  // 18+ gate + mod check (single lookup)
  var p=await db.from('profiles').select('is_18_plus,chat_mod,role').eq('user_id',currentUser.id).maybeSingle();
  myRole=(p.data&&p.data.role)||'';
  window._isChatMod=(p.data&&p.data.chat_mod)||false;
  canMod=(currentUser.id===OWNERID)||window._isChatMod||myRole==='owner'||myRole==='co-owner'||myRole==='admin'||myRole==='mod';
  if(!p.data||!p.data.is_18_plus){
    if(confirm('8BFR Chat is for adults 18 and over only. Are you 18 or older?')){
      await db.from('profiles').update({is_18_plus:true}).eq('user_id',currentUser.id);
    } else { window.location.href='index.html'; return; }
  }
  // emoji bar
  document.getElementById('emojiBar').innerHTML=EMOJIS.map(function(e){return '<button onclick="addEmoji(\''+e+'\')">'+e+'</button>';}).join('');
  loadRooms();
}

async function loadRooms(){
  var r=await db.from('chatapp_rooms').select('*').order('created_at',{ascending:true});
  var el=document.getElementById('rooms');
  if(!r.data||!r.data.length){el.innerHTML='<div class="empty">No rooms yet. Create the first one!</div>';return;}
  el.innerHTML=r.data.map(function(rm){
    return '<div class="room-card" onclick="enterRoom(\''+rm.id+'\',\''+String(rm.name).replace(/'/g,"\\'")+'\')"><h3>'+esc(rm.name)+'</h3><p>'+esc(rm.description||'')+'</p></div>';
  }).join('');
}

async function createRoom(){
  var name=prompt('Room name:');
  if(!name)return;
  var desc=prompt('Short description (optional):')||'';
  var r=await db.from('chatapp_rooms').insert({name:name.trim(),description:desc.trim(),created_by:currentUser.id});
  if(r.error){alert('Error: '+r.error.message);return;}
  loadRooms();
}

async function enterRoom(id,name){
  activeRoom=id;
  document.getElementById('roomName').textContent=name;
  document.getElementById('roomList').style.display='none';
  document.getElementById('chatView').classList.add('show');
  document.getElementById('cleanBtn').style.display=canMod?'block':'none';
  await loadMessages();
  // realtime
  if(msgChannel)db.removeChannel(msgChannel);
  msgChannel=db.channel('room-'+id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'chatapp_messages',filter:'room_id=eq.'+id},function(payload){
      appendMessage(payload.new);
    }).subscribe();
  // Fallback poll (covers the case where realtime isn't enabled on the table)
  if(window._pollIv)clearInterval(window._pollIv);
  window._pollIv=setInterval(pollNew,3000);
}
async function pollNew(){
  if(!activeRoom)return;
  var r=await db.from('chatapp_messages').select('*').eq('room_id',activeRoom).order('created_at',{ascending:true}).limit(60);
  if(!r.data)return;
  var ids=[...new Set(r.data.map(function(m){return m.user_id;}))];
  await cacheProfiles(ids);
  r.data.forEach(appendMessage); // appendMessage dedupes
}

function leaveRoom(){
  if(window._pollIv){clearInterval(window._pollIv);window._pollIv=null;}
  if(msgChannel){db.removeChannel(msgChannel);msgChannel=null;}
  activeRoom=null;
  document.getElementById('chatView').classList.remove('show');
  document.getElementById('roomList').style.display='block';
}

async function loadMessages(){
  var r=await db.from('chatapp_messages').select('*').eq('room_id',activeRoom).order('created_at',{ascending:true}).limit(100);
  var box=document.getElementById('messages');box.innerHTML='';
  // cache profiles
  var ids=[...new Set((r.data||[]).map(function(m){return m.user_id;}))];
  await cacheProfiles(ids);
  (r.data||[]).forEach(appendMessage);
  box.scrollTop=box.scrollHeight;
}

async function cacheProfiles(ids){
  var need=ids.filter(function(i){return !profileCache[i];});
  if(!need.length)return;
  var r=await db.from('profiles').select('user_id,display_name,username,donate_link').in('user_id',need);
  (r.data||[]).forEach(function(p){profileCache[p.user_id]=p;});
}

async function appendMessage(m){
  if(document.getElementById('msg-'+m.id))return; // already shown
  if(m.hidden && !canMod) return; // hidden messages only visible to staff
  if(!profileCache[m.user_id])await cacheProfiles([m.user_id]);
  var p=profileCache[m.user_id]||{};
  var name=p.display_name||p.username||'Member';
  var donate=p.donate_link?'<a href="'+esc(p.donate_link)+'" target="_blank" rel="noopener">💵 Support</a>':'';
  var mine=m.user_id===currentUser.id?' mine':'';
  var box=document.getElementById('messages');
  var div=document.createElement('div');
  div.className='msg'+mine;
  div.id='msg-'+m.id;
  div.setAttribute('data-id',m.id);
  var body=renderMsgText(m.message,m.user_id===OWNERID);
  if(m.hidden)body='<span style="opacity:.5;font-style:italic;">[hidden] </span>'+body;
  div.innerHTML='<div class="who">'+esc(name)+donate+'</div><div class="bubble">'+body+'</div>';
  // Staff: visible mod button + long-press / right-click (same actions as 8BFR chat)
  if(canMod && m.user_id!==currentUser.id){
    var whoDiv=div.querySelector('.who');
    var modBtn=document.createElement('button');
    modBtn.textContent='⋯';
    modBtn.title='Moderate';
    modBtn.style.cssText='background:none;border:none;color:#a855f7;font-size:1rem;cursor:pointer;margin-left:.4rem;font-weight:900;';
    modBtn.onclick=function(e){e.stopPropagation();openCtx(e,m.id,m.user_id,name,!!m.hidden);};
    whoDiv.appendChild(modBtn);
    div.oncontextmenu=function(e){e.preventDefault();openCtx(e,m.id,m.user_id,name,!!m.hidden);};
    var lpT;
    div.ontouchstart=function(e){lpT=setTimeout(function(){openCtx(e.touches[0],m.id,m.user_id,name,!!m.hidden);},500);};
    div.ontouchend=function(){clearTimeout(lpT);};
    div.ontouchmove=function(){clearTimeout(lpT);};
  }
  if(cleanupMode && canMod){
    div.style.cursor='pointer';
    if(selectedMsgs[m.id])div.style.background='rgba(239,68,68,.25)';
    div.onclick=function(){toggleSelectMsg(m.id,div);};
  }
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}
// Renders [display](https://url) markdown-style links + bare URLs (owner only for clickable)
function renderMsgText(text,allowLinks){
  var safe=esc(text);
  if(!allowLinks)return safe;
  // [display](url)
  safe=safe.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,function(_,disp,url){return '<a href="'+url+'" target="_blank" rel="noopener" style="color:#67e8f9;text-decoration:underline;">'+disp+'</a>';});
  // bare urls not already linked
  safe=safe.replace(/(^|[^"\>])(https?:\/\/[^\s<]+)/g,function(m0,pre,url){return pre+'<a href="'+url+'" target="_blank" rel="noopener" style="color:#67e8f9;text-decoration:underline;word-break:break-all;">'+url+'</a>';});
  return safe;
}
// ===== Full moderation system (ported from 8BFR chat.html) =====
var ctxTarget=null, myRole='';
function openCtx(e,msgId,userId,name,isHidden){
  ctxTarget={msgId:msgId,userId:userId,name:name,isHidden:isHidden};
  var menu=document.getElementById('ctxMenu');
  var isOwner=(currentUser.id===OWNERID)||(myRole==='owner'||myRole==='co-owner');
  var isAdmin=(myRole==='admin');
  var isModRole=(myRole==='mod')||window._isChatMod;
  var items='';
  if(isModRole||isAdmin||isOwner) items+='<div class="ctx-item danger" onclick="ctxAction(\'mute\')">🔇 Mute User</div>';
  if(isAdmin||isOwner||window._isChatMod){
    if(isHidden) items+='<div class="ctx-item" onclick="ctxAction(\'unhide\')">👁️ Unhide Message</div>';
    else items+='<div class="ctx-item danger" onclick="ctxAction(\'hide\')">🙈 Hide Message</div>';
    items+='<div class="ctx-item danger" onclick="ctxAction(\'kick\')">👢 Kick from Chat</div>';
  }
  if(isOwner){
    items+='<div class="ctx-item danger" onclick="ctxAction(\'ban_chat\')">🚫 Ban from Chat</div>';
    items+='<div class="ctx-item danger" onclick="ctxAction(\'delete\')">🗑️ Delete Message</div>';
  }
  items+='<div class="ctx-item" onclick="closeCtx()">Cancel</div>';
  menu.innerHTML=items;menu.style.display='block';
  menu.style.left=Math.min(e.clientX||e.pageX||100,window.innerWidth-180)+'px';
  menu.style.top=Math.min(e.clientY||e.pageY||100,window.innerHeight-220)+'px';
  setTimeout(function(){document.addEventListener('click',closeCtx,{once:true});},50);
}
function closeCtx(){document.getElementById('ctxMenu').style.display='none';ctxTarget=null;}
window.ctxAction=async function(action){
  if(!ctxTarget)return;
  var t=ctxTarget;closeCtx();
  if(action==='mute'){
    var reason=prompt('Reason for muting "'+t.name+'":');if(!reason)return;
    var h=parseInt(prompt('Mute duration in hours (0 = permanent):')||'0')||0;
    var expires=h>0?new Date(Date.now()+h*3600000).toISOString():null;
    await db.from('chat_mutes').upsert({user_id:t.userId,muted_by:currentUser.id,reason:reason,expires_at:expires},{onConflict:'user_id'});
    await logAct('mute',t.userId,null,reason);notifyStaff('mute',t.name,reason);
    alert('\u2713 '+t.name+' muted'+(h?' for '+h+'h':' permanently')+'.');
  } else if(action==='hide'){
    var reason=prompt('Reason for hiding this message:');if(!reason)return;
    await db.from('chatapp_messages').update({hidden:true}).eq('id',t.msgId);
    var el=document.querySelector('.msg[data-id="'+t.msgId+'"]');if(el){var bb=el.querySelector('.bubble');if(bb&&bb.innerHTML.indexOf('[hidden]')<0)bb.innerHTML='<span style="opacity:.5;font-style:italic;">[hidden] </span>'+bb.innerHTML;}
    await logAct('hide_msg',t.userId,t.msgId,reason);notifyStaff('hide',t.name,reason);
  } else if(action==='unhide'){
    await db.from('chatapp_messages').update({hidden:false}).eq('id',t.msgId);
    await logAct('unhide_msg',t.userId,t.msgId,'Unhidden');
  } else if(action==='kick'){
    var reason=prompt('Reason for kicking "'+t.name+'":');if(!reason)return;
    await db.from('chat_mutes').upsert({user_id:t.userId,muted_by:currentUser.id,reason:reason,expires_at:new Date(Date.now()+3600000).toISOString()},{onConflict:'user_id'});
    await logAct('kick',t.userId,null,reason);notifyStaff('kick',t.name,reason);
    alert('\u2713 '+t.name+' kicked (1h chat mute).');
  } else if(action==='ban_chat'){
    var reason=prompt('Reason for banning "'+t.name+'" from chat:');if(!reason)return;
    await db.from('chat_mutes').upsert({user_id:t.userId,muted_by:currentUser.id,reason:reason,expires_at:null},{onConflict:'user_id'});
    await logAct('ban_chat',t.userId,null,reason);
    alert('\u2713 '+t.name+' banned from chat.');
  } else if(action==='delete'){
    if(!confirm('Delete this message permanently?'))return;
    await db.from('chatapp_messages').delete().eq('id',t.msgId);
    var el2=document.querySelector('.msg[data-id="'+t.msgId+'"]');if(el2)el2.remove();
    await logAct('delete_msg',t.userId,t.msgId,'Deleted by owner');
  }
};
async function notifyStaff(action,targetName,reason){
  var labels={mute:'🔇 Muted',hide:'🙈 Hid message from',kick:'👢 Kicked'};
  var myName=(profileCache[currentUser.id]&&(profileCache[currentUser.id].display_name||profileCache[currentUser.id].username))||'Staff';
  try{
    var staff=await db.from('profiles').select('user_id').or('role.in.(owner,co-owner,admin),chat_mod.eq.true');
    if(!staff.data)return;
    for(var i=0;i<staff.data.length;i++){
      if(staff.data[i].user_id===currentUser.id)continue;
      await db.from('notifications').insert({recipient_id:staff.data[i].user_id,notif_type:'chat_moderation',
        metadata:{message:myName+' '+(labels[action]||action)+' '+targetName+': '+reason,link:'chat-rooms.html'},created_at:new Date().toISOString()});
    }
  }catch(e){}
}
async function logAct(action,targetUserId,messageId,reason){
  try{await db.from('chat_moderation_log').insert({performed_by:currentUser.id,performed_role:(myRole||'chat_mod'),action:action,target_user_id:targetUserId||null,message_id:messageId||null,room:activeRoom,reason:reason});}catch(e){}
}
// realtime kick listener
db.channel('chatapp-mod').on('broadcast',{event:'kick'},function(p){if(currentUser&&p.payload&&p.payload.user_id===currentUser.id){alert('You have been removed from chat.');location.href='index.html';}}).subscribe();

async function sendMsg(){
  var inp=document.getElementById('msgInput');
  var text=inp.value.trim();
  if(!text||!activeRoom)return;
  var mp=await db.from('chat_mutes').select('expires_at').eq('user_id',currentUser.id).maybeSingle();
  if(mp.data&&(!mp.data.expires_at||new Date(mp.data.expires_at)>new Date())){alert('You have been muted from chat by a moderator.');inp.value='';return;}
  inp.value='';
  var r=await db.from('chatapp_messages').insert({room_id:activeRoom,user_id:currentUser.id,message:text}).select().single();
  if(r.error){alert('Failed to send: '+r.error.message);return;}
  // Show instantly (don't wait for realtime, which may be off)
  if(r.data && !document.getElementById('msg-'+r.data.id)) appendMessage(r.data);
}

function addEmoji(e){
  var inp=document.getElementById('msgInput');
  inp.value+=e;inp.focus();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

var cleanupMode=false, selectedMsgs={};
window.toggleCleanup=function(){
  cleanupMode=!cleanupMode;selectedMsgs={};
  document.getElementById('cleanupBar').style.display=cleanupMode?'flex':'none';
  updateCleanCount();
  // re-render to add/remove checkboxes
  loadMessages();
};
function updateCleanCount(){var n=Object.keys(selectedMsgs).length;var el=document.getElementById('cleanCount');if(el)el.textContent=n+' selected';}
window.toggleSelectMsg=function(id,el){
  if(selectedMsgs[id]){delete selectedMsgs[id];el.style.background='';}
  else{selectedMsgs[id]=true;el.style.background='rgba(239,68,68,.25)';}
  updateCleanCount();
};
window.deleteSelected=async function(){
  var ids=Object.keys(selectedMsgs);
  if(!ids.length){alert('Tap messages to select them first.');return;}
  if(!confirm('Delete '+ids.length+' selected message(s)?'))return;
  await db.from('chatapp_messages').delete().in('id',ids);
  selectedMsgs={};updateCleanCount();loadMessages();
};
window.clearAllMessages=async function(){
  if(!confirm('Delete ALL messages in this room? This cannot be undone.'))return;
  if(!confirm('Are you absolutely sure? Every message here will be permanently deleted.'))return;
  await db.from('chatapp_messages').delete().eq('room_id',activeRoom);
  loadMessages();
};
window.goProfile=function(e){if(e)e.preventDefault();if(currentUser)window.location.href='profile.html?id='+currentUser.id;else window.location.href='login.html?return=chat-rooms.html';};
init();
</script>
