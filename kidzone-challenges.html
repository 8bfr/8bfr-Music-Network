<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Challenges — KidZone</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--kp:#8b5cf6;--pink:#ec4899;--blue:#3b82f6;--green:#22c55e;--yellow:#eab308;--orange:#f97316;--bg:#0f0a1a;--card:rgba(15,10,35,.85);--text:#f0eaff;--dim:rgba(168,130,255,.7);--border:rgba(139,92,246,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(135deg,#0f0a1a,#1a0533);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(139,92,246,.2));border-bottom:3px solid var(--blue);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--blue);}
.header a{color:var(--text);text-decoration:none;font-weight:600;font-size:.85rem;}
.container{max-width:800px;margin:0 auto;padding:1.5rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.25rem;}
.st{font-family:'Fredoka One',cursive;font-size:1.2rem;margin-bottom:.75rem;}
.challenge{background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;transition:all .3s;}
.challenge:hover{border-color:var(--kp);}
.ch-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;}
.ch-title{font-family:'Fredoka One',cursive;font-size:1.1rem;}
.ch-reward{display:flex;gap:.5rem;flex-shrink:0;}
.ch-reward span{font-size:.75rem;padding:.2rem .5rem;border-radius:6px;font-weight:600;}
.ch-coins{background:rgba(234,179,8,.15);color:var(--yellow);}
.ch-badge-reward{background:rgba(139,92,246,.15);color:var(--kp);}
.ch-diff{font-size:.72rem;margin-bottom:.5rem;}
.ch-diff .easy{color:var(--green);}.ch-diff .medium{color:var(--yellow);}.ch-diff .hard{color:var(--orange);}
.ch-desc{font-size:.88rem;color:var(--dim);line-height:1.6;margin-bottom:.75rem;}
.ch-instructions{font-size:.82rem;color:rgba(168,130,255,.5);padding:.5rem .75rem;background:rgba(139,92,246,.06);border-left:3px solid var(--kp);border-radius:0 8px 8px 0;margin-bottom:.75rem;}
.btn{padding:.55rem 1.1rem;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:.88rem;transition:all .2s;}
.btn-blue{background:var(--blue);color:#fff;}.btn-blue:hover{background:#2563eb;}
.btn-green{background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.4);color:var(--green);}
.btn-dim{background:rgba(139,92,246,.15);border:1px solid var(--border);color:var(--dim);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:1.25rem;text-align:center;cursor:pointer;transition:all .3s;background:rgba(139,92,246,.03);margin:.75rem 0;}
.upload-zone:hover{border-color:var(--kp);background:rgba(139,92,246,.08);}
.upload-zone input{display:none;}
.submitted-badge{display:inline-block;background:rgba(34,197,94,.15);color:var(--green);padding:.3rem .75rem;border-radius:8px;font-size:.82rem;font-weight:600;}
.featured-badge{display:inline-block;background:rgba(234,179,8,.15);color:var(--yellow);padding:.3rem .75rem;border-radius:8px;font-size:.82rem;font-weight:600;}
.empty{text-align:center;padding:2rem;color:var(--dim);}
.kid-select{margin-bottom:1rem;}
.kid-select select{width:100%;padding:.55rem;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;}
</style>
</head>
<body>
<div class="header"><a href="kid-zone.html">← KidZone</a><h1>🏆 Challenges</h1><div></div></div>
<div class="container">

<!-- Kid selector (parent picks which kid) -->
<div class="kid-select" id="kidSelect" style="display:none;">
<label style="font-size:.82rem;color:var(--dim);font-weight:600;">Playing as:</label>
<select id="activeKid" onchange="switchKid()"></select>
</div>

<div id="challengesList"></div>
</div>

<script src="scripts.js" defer></script>
<script>
const db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
let currentUser=null,myKids=[],activeKid=null,mySubmissions={};

async function init(){
  const{data:{session}}=await db.auth.getSession();
  if(!session){location.href='login.html?return=kidzone-challenges.html';return;}
  currentUser=session.user;
  const{data:kids}=await db.from('kid_profiles').select('*').eq('parent_user_id',currentUser.id).eq('is_active',true);
  myKids=kids||[];
  if(myKids.length>0){
    document.getElementById('kidSelect').style.display='block';
    document.getElementById('activeKid').innerHTML=myKids.map(k=>'<option value="'+k.id+'">'+esc(k.display_name)+' (@'+esc(k.username)+')</option>').join('');
    activeKid=myKids[0];
  }
  await loadSubmissions();
  await loadChallenges();
}

function switchKid(){
  const id=document.getElementById('activeKid').value;
  activeKid=myKids.find(k=>k.id===id)||myKids[0];
  loadSubmissions().then(()=>loadChallenges());
}

async function loadSubmissions(){
  if(!activeKid)return;
  const{data}=await db.from('kid_challenge_submissions').select('challenge_id,status,coins_awarded,badge_awarded').eq('kid_id',activeKid.id);
  mySubmissions={};
  if(data)data.forEach(s=>{mySubmissions[s.challenge_id]=s;});
}

async function loadChallenges(){
  const{data}=await db.from('kid_challenges').select('*').eq('is_active',true).order('created_at',{ascending:false});
  const box=document.getElementById('challengesList');
  if(!data||!data.length){box.innerHTML='<div class="empty"><div style="font-size:2.5rem;margin-bottom:.5rem;">🏆</div>No challenges right now — check back soon!</div>';return;}

  box.innerHTML=data.map(ch=>{
    const diff={'easy':'🟢 Easy','medium':'🟡 Medium','hard':'🔴 Hard'}[ch.difficulty]||ch.difficulty;
    const diffClass=ch.difficulty;
    const sub=mySubmissions[ch.id];
    let statusHTML='';
    let actionHTML='';

    if(sub){
      if(sub.status==='featured')statusHTML='<span class="featured-badge">⭐ Featured!</span>';
      else if(sub.status==='approved')statusHTML='<span class="submitted-badge">✅ Completed! +'+sub.coins_awarded+' coins</span>';
      else if(sub.status==='pending')statusHTML='<span class="submitted-badge" style="background:rgba(234,179,8,.15);color:var(--yellow);">⏳ Submitted — awaiting review</span>';
      else if(sub.status==='rejected')statusHTML='<span style="color:#fca5a5;font-size:.82rem;">❌ Not accepted — try again!</span>';

      if(sub.status==='rejected')actionHTML=buildSubmitUI(ch.id);
    } else {
      actionHTML=buildSubmitUI(ch.id);
    }

    return '<div class="challenge"><div class="ch-header"><div class="ch-title">'+esc(ch.title)+'</div><div class="ch-reward"><span class="ch-coins">🪙 '+ch.coin_reward+'</span>'+(ch.badge_reward?'<span class="ch-badge-reward">🏅 Badge</span>':'')+'</div></div><div class="ch-diff"><span class="'+diffClass+'">'+diff+'</span>'+(ch.max_duration_seconds?' · ⏱️ '+ch.max_duration_seconds+'s max':'')+'</div><div class="ch-desc">'+esc(ch.description||'')+'</div>'+(ch.instructions?'<div class="ch-instructions">📋 '+esc(ch.instructions)+'</div>':'')+statusHTML+actionHTML+'</div>';
  }).join('');
}

function buildSubmitUI(challengeId){
  if(!activeKid)return'<p style="font-size:.82rem;color:var(--dim);">Create a kid account to participate.</p>';
  return '<div style="margin-top:.75rem;"><div class="upload-zone" onclick="document.getElementById(\'file_'+challengeId+'\').click()"><input type="file" id="file_'+challengeId+'" accept="audio/*,image/*" onchange="previewSubmission(\''+challengeId+'\',this)"><div style="font-size:1.5rem;margin-bottom:.25rem;">📤</div><div style="color:var(--dim);font-size:.82rem;">Upload your entry (audio or image)</div></div><div id="preview_'+challengeId+'" style="display:none;font-size:.82rem;color:var(--green);margin:.5rem 0;"></div><button class="btn btn-blue" id="submit_'+challengeId+'" onclick="submitEntry(\''+challengeId+'\')" disabled>🚀 Submit Entry</button></div>';
}

function previewSubmission(chId,input){
  const file=input.files[0];if(!file)return;
  document.getElementById('preview_'+chId).style.display='block';
  document.getElementById('preview_'+chId).textContent='✅ Selected: '+file.name+' ('+( file.size/1024).toFixed(1)+' KB)';
  document.getElementById('submit_'+chId).disabled=false;
}

async function submitEntry(chId){
  if(!activeKid){alert('Select a kid account first.');return;}
  const fileInput=document.getElementById('file_'+chId);
  const file=fileInput.files[0];
  const btn=document.getElementById('submit_'+chId);
  btn.disabled=true;btn.textContent='Submitting...';

  let uploadUrl='';
  if(file){
    // Upload to Supabase Storage
    const path='kidzone/'+activeKid.id+'/'+Date.now()+'_'+file.name;
    const{data:upload,error:upErr}=await db.storage.from('kid-uploads').upload(path,file);
    if(!upErr&&upload){
      const{data:pub}=db.storage.from('kid-uploads').getPublicUrl(path);
      uploadUrl=pub.publicUrl||'';
    }
  }

  const{error}=await db.from('kid_challenge_submissions').insert({
    challenge_id:chId,
    kid_id:activeKid.id,
    parent_user_id:currentUser.id,
    upload_url:uploadUrl
  });

  if(error){
    if(error.message.includes('unique')||error.message.includes('duplicate')){alert('Already submitted to this challenge!');}
    else alert('Error: '+error.message);
    btn.disabled=false;btn.textContent='🚀 Submit Entry';
    return;
  }

  btn.textContent='✅ Submitted!';
  await loadSubmissions();
  await loadChallenges();
}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
<script>(function(){var b=document.createElement('button');b.innerHTML='👁️';b.style.cssText='position:fixed;top:80px;right:20px;z-index:9999;background:rgba(124,58,237,0.9);border:2px solid rgba(124,58,237,1);color:white;width:50px;height:50px;border-radius:50%;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(124,58,237,0.5);';document.body.appendChild(b);var h=localStorage.getItem('hideAvatarBubbles')==='true';function u(){document.querySelectorAll('[id*="bubble"],[class*="bubble"],[id*="avatar"][id*="switcher"]').forEach(function(el){if(el)el.style.display=h?'none':'';});b.innerHTML=h?'👁️‍🗨️':'👁️';}b.addEventListener('click',function(){h=!h;localStorage.setItem('hideAvatarBubbles',h);u();});u();})();</script>
</body></html>
