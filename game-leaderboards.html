<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Leaderboards - 8BFR</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--dark:#0b0014;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);--yellow:#eab308;--green:#22c55e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--primary);}
.container{max-width:600px;margin:0 auto;padding:1.25rem;}
.game-tabs{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.5rem;margin-bottom:1rem;scrollbar-width:none;}
.game-tabs::-webkit-scrollbar{display:none;}
.g-tab{padding:.45rem .8rem;border-radius:8px;border:1px solid var(--border);background:var(--dark);color:var(--dim);cursor:pointer;font-size:.78rem;font-weight:600;white-space:nowrap;flex-shrink:0;transition:all .2s;}
.g-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:1rem;}
.card h3{font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--primary);margin-bottom:.75rem;}
.lb-row{display:flex;align-items:center;gap:.6rem;padding:.55rem .4rem;border-bottom:1px solid rgba(124,58,237,.08);}
.lb-row:last-child{border:none;}
.lb-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.78rem;flex-shrink:0;}
.lb-1{background:rgba(234,179,8,.2);color:var(--yellow);border:2px solid rgba(234,179,8,.5);}
.lb-2{background:rgba(192,192,192,.15);color:#c0c0c0;border:2px solid rgba(192,192,192,.3);}
.lb-3{background:rgba(205,127,50,.15);color:#cd7f32;border:2px solid rgba(205,127,50,.3);}
.lb-def{background:rgba(124,58,237,.1);color:var(--dim);border:1px solid var(--border);}
.lb-name{flex:1;font-weight:600;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-score{font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--yellow);}
.lb-date{font-size:.65rem;color:rgba(168,85,247,.4);}
.my-rank{background:rgba(124,58,237,.08);border:1px solid var(--border);border-radius:10px;padding:.75rem;margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;}
.my-rank .rank-num{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--primary);}
.my-rank .rank-info{flex:1;}
.my-rank .rank-label{font-size:.72rem;color:var(--dim);}
.my-rank .rank-score{font-family:'Bebas Neue',cursive;font-size:1.2rem;color:var(--yellow);}
.empty{text-align:center;padding:2rem;color:var(--dim);font-size:.85rem;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="header">
<a href="game-hub.html" style="color:var(--dim);text-decoration:none;font-weight:600;font-size:.85rem;">Games</a>
<h1>Leaderboards</h1>
<a href="game-tournaments.html" style="color:var(--dim);text-decoration:none;font-weight:600;font-size:.85rem;">Tournaments</a>
</div>
<div class="container">
<div class="game-tabs" id="gameTabs"></div>
<div id="myRank"></div>
<div class="card"><h3 id="boardTitle">All Games</h3><div id="board"><div class="spinner"></div></div></div>
</div>
<script src="scripts.js" defer></script>
<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
var currentUser=null,activeGame='all';
var GAMES={all:'All Games',beatTap:'Beat Tap',musicMemory:'Music Memory',musicTrivia:'Music Trivia',wordUnscramble:'Word Unscramble',guessGenre:'Guess Genre',bpmChallenge:'BPM Challenge',lyricsFinish:'Lyrics Finish',numberRush:'Number Rush',colorMatch:'Color Match'};

async function init(){
  var s=await db.auth.getSession();
  if(s.data.session)currentUser=s.data.session.user;
  // Build tabs
  var tabHtml='';
  for(var gid in GAMES){
    tabHtml+='<div class="g-tab'+(gid==='all'?' active':'')+'" onclick="loadBoard(\''+gid+'\',this)">'+GAMES[gid]+'</div>';
  }
  document.getElementById('gameTabs').innerHTML=tabHtml;
  loadBoard('all');
}

async function loadBoard(gameId,btn){
  activeGame=gameId;
  document.querySelectorAll('.g-tab').forEach(function(t){t.classList.remove('active');});
  if(btn)btn.classList.add('active');
  document.getElementById('boardTitle').textContent=GAMES[gameId]||'Leaderboard';
  document.getElementById('board').innerHTML='<div class="spinner"></div>';

  var q=db.from('game_leaderboard').select('user_id,game_id,score,played_at').order('score',{ascending:false}).limit(50);
  if(gameId!=='all')q=q.eq('game_id',gameId);
  var r=await q;
  var data=r.data||[];

  if(!data.length){
    document.getElementById('board').innerHTML='<div class="empty">No scores yet. Be the first to play!</div>';
    document.getElementById('myRank').innerHTML='';
    return;
  }

  // Get unique user IDs for name lookup
  var uids=[...new Set(data.map(function(e){return e.user_id;}))];
  var pr=await db.from('profiles').select('user_id,display_name,username,avatar_url').in('user_id',uids);
  var nameMap={};(pr.data||[]).forEach(function(p){nameMap[p.user_id]=p.display_name||p.username||'Player';});

  // Dedupe - show only best score per user
  var best={};
  data.forEach(function(e){
    var key=e.user_id+(gameId==='all'?'_'+e.game_id:'');
    if(!best[key]||e.score>best[key].score)best[key]=e;
  });
  var sorted=Object.values(best).sort(function(a,b){return b.score-a.score;});

  // Find my rank
  var myRankHtml='';
  if(currentUser){
    var myIdx=sorted.findIndex(function(e){return e.user_id===currentUser.id;});
    if(myIdx>=0){
      myRankHtml='<div class="my-rank"><div class="rank-num">#'+(myIdx+1)+'</div><div class="rank-info"><div class="rank-label">Your best score</div><div class="rank-score">'+sorted[myIdx].score+'</div></div></div>';
    }
  }
  document.getElementById('myRank').innerHTML=myRankHtml;

  // Render board
  var html='';
  sorted.slice(0,25).forEach(function(e,i){
    var rankClass=i===0?'lb-1':i===1?'lb-2':i===2?'lb-3':'lb-def';
    var name=nameMap[e.user_id]||'Player';
    var gameLabel=gameId==='all'?' <span style="font-size:.65rem;color:rgba(0,217,255,.6);">'+(GAMES[e.game_id]||e.game_id)+'</span>':'';
    var isMe=currentUser&&e.user_id===currentUser.id;
    html+='<div class="lb-row"'+(isMe?' style="background:rgba(124,58,237,.06);"':'')+'>'+
      '<div class="lb-rank '+rankClass+'">'+(i+1)+'</div>'+
      '<div class="lb-name">'+esc(name)+(isMe?' (you)':'')+gameLabel+'</div>'+
      '<div class="lb-score">'+e.score+'</div></div>';
  });
  document.getElementById('board').innerHTML=html;
}

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
init();
</script>
</body>
</html>
