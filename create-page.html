<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Create Page — 8BFR Music Network</title>
  <link rel="icon" href="assets/images/favicon.png"/>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{background:linear-gradient(#0b0014,#000);color:#eae6ff;font-family:system-ui,sans-serif;margin:0;padding-bottom:80px;}
    .container{max-width:640px;margin:0 auto;padding:1rem;}
    .card{background:rgba(12,6,24,0.7);border:1px solid rgba(124,58,237,0.3);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;}
    .card h2{color:#a855f7;margin:0 0 1rem;font-size:1.1rem;}
    .form-group{margin-bottom:1.25rem;}
    .form-group label{display:block;margin-bottom:0.4rem;font-size:0.88rem;font-weight:600;color:rgba(234,230,255,0.75);}
    .form-input{width:100%;padding:0.7rem 0.9rem;background:rgba(12,0,25,0.9);border:1px solid rgba(124,58,237,0.35);border-radius:8px;color:#eae6ff;font-size:0.93rem;box-sizing:border-box;}
    .form-input:focus{outline:none;border-color:#a855f7;}
    .btn{background:#7c3aed;color:white;border:none;padding:0.7rem 1.5rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem;}
    .btn:hover{background:#6d28d9;} .btn:disabled{opacity:0.5;}
    .hint{font-size:0.72rem;color:rgba(168,85,247,0.45);margin-top:0.25rem;}
    .hint a{color:#a855f7;}
    header{padding:1rem;background:rgba(15,0,30,0.9);border-bottom:1px solid rgba(124,58,237,0.5);position:sticky;top:0;z-index:100;}
    header div{max-width:640px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
  </style>
</head>
<body>
  <header><div><a href="search.html" style="color:#a855f7;font-weight:600;text-decoration:none;">← Search</a><h1 style="font-size:1.15rem;font-weight:800;">📄 Create Page</h1><div style="width:60px;"></div></div></header>
  <div class="container">
    <div class="card">
      <h2>📄 New Page</h2>
      <div class="form-group"><label>Page Name *</label><input class="form-input" id="pName" placeholder="e.g. My Music Brand"></div>
      <div class="form-group"><label>Description</label><textarea class="form-input" id="pDesc" rows="3" placeholder="What's this page about?"></textarea></div>
      <div class="form-group"><label>Category</label><select class="form-input" id="pCat"><option value="music">🎵 Music</option><option value="artist">🎤 Artist/Band</option><option value="brand">🏷️ Brand</option><option value="community">👥 Community</option><option value="gaming">🎮 Gaming</option><option value="entertainment">🎬 Entertainment</option><option value="education">📚 Education</option><option value="business">💼 Business</option><option value="general">📌 General</option></select></div>
      <div class="form-group"><label>Cover Image URL (optional)</label><input class="form-input" type="url" id="pCover" placeholder="https://i.ibb.co/..."><div class="hint">💡 Upload at <a href="https://imgbb.com" target="_blank">imgbb.com</a></div></div>
      <div class="form-group"><label>Website (optional)</label><input class="form-input" type="url" id="pWeb" placeholder="https://yoursite.com"></div>
      <div class="form-group"><label>Contact Email (optional)</label><input class="form-input" type="email" id="pEmail" placeholder="you@email.com"></div>
      <div style="display:flex;align-items:center;gap:1rem;">
        <button class="btn" id="createBtn" onclick="createPage()">🚀 Create Page</button>
        <span id="notice" style="font-size:0.85rem;"></span>
      </div>
    </div>
  </div>
  <nav style="position:fixed;bottom:0;left:0;right:0;background:rgba(15,0,30,0.95);border-top:1px solid rgba(124,58,237,0.4);display:flex;justify-content:space-around;padding:0.5rem 0;z-index:200;">
    <a href="index.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">🏠<br>Home</a>
    <a href="search.html" style="text-decoration:none;text-align:center;color:#a855f7;font-size:0.7rem;">🔍<br>Search</a>
    <a href="feed.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">📰<br>Feed</a>
    <a href="radio.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">📻<br>Radio</a>
    <a href="profile.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">👤<br>Profile</a>
  </nav>
  <script src="scripts.js"></script>
  <script>
  var db=window._8bfrSupabaseClient||(window.supabase?window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0'):null);
  async function createPage(){
    var n=document.getElementById('notice');
    try{
      var s=await db.auth.getSession();var user=s?.data?.session?.user;
      if(!user){n.innerHTML='<span style="color:#ef4444;">❌ Please <a href="login.html" style="color:#a855f7;">log in</a></span>';return;}
      var name=document.getElementById('pName').value.trim();
      if(!name){n.innerHTML='<span style="color:#ef4444;">⚠️ Page name required</span>';return;}
      var btn=document.getElementById('createBtn');btn.disabled=true;n.innerHTML='<span style="color:#a855f7;">Creating…</span>';
      var r=await db.from('pages').insert({
        name:name,
        description:document.getElementById('pDesc').value.trim()||null,
        category:document.getElementById('pCat').value,
        cover_url:document.getElementById('pCover').value.trim()||null,
        website:document.getElementById('pWeb').value.trim()||null,
        contact_email:document.getElementById('pEmail').value.trim()||null,
        created_by:user.id
      }).select().single();
      if(r.error)throw r.error;
      n.innerHTML='<span style="color:#4ade80;">✅ Page created!</span>';
      setTimeout(function(){window.location.href='page.html?id='+r.data.id;},1000);
    }catch(e){n.innerHTML='<span style="color:#ef4444;">❌ '+e.message+'</span>';document.getElementById('createBtn').disabled=false;}
  }
  </script>
</body>
</html>
