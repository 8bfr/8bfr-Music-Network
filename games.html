<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Games — 8BFR Music Network</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);--red:#ef4444;--green:#22c55e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--primary);}
.coins-display{display:flex;align-items:center;gap:.4rem;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);padding:.3rem .7rem;border-radius:20px;font-size:.82rem;font-weight:700;color:#fbbf24;}
.container{max-width:1100px;margin:0 auto;padding:1.5rem;}

/* Search */
.search-bar{display:flex;gap:.5rem;margin-bottom:1.5rem;}
.search-input{flex:1;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:10px;padding:.65rem 1rem;color:var(--text);font-size:.9rem;outline:none;}
.search-input:focus{border-color:var(--primary);}
.search-input::placeholder{color:rgba(168,85,247,.4);}
.search-btn{background:var(--primary);color:#fff;border:none;padding:.65rem 1.2rem;border-radius:10px;font-weight:700;cursor:pointer;font-size:.9rem;}

/* Categories */
.cat-scroll{display:flex;gap:.4rem;overflow-x:auto;padding:.5rem 0 1rem;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-chip{flex-shrink:0;padding:.45rem .85rem;border-radius:20px;border:1px solid var(--border);background:rgba(124,58,237,.08);color:var(--dim);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.cat-chip:hover{background:rgba(124,58,237,.2);}
.cat-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}

/* Game grid */
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem;}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative;}
.game-card:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:0 8px 20px rgba(124,58,237,.2);}
.game-thumb{width:100%;aspect-ratio:1;background:rgba(124,58,237,.1);overflow:hidden;}
.game-thumb img{width:100%;height:100%;object-fit:cover;}
.game-info{padding:.6rem .7rem;}
.game-title{font-weight:700;font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.game-cat{font-size:.65rem;color:var(--dim);margin-top:.15rem;}

/* Game player overlay */
.player-overlay{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.95);flex-direction:column;}
.player-overlay.show{display:flex;}
.player-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:rgba(15,0,30,.95);border-bottom:1px solid var(--border);}
.player-title{font-weight:700;font-size:.95rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:1rem;}
.player-close{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#f87171;padding:.4rem .85rem;border-radius:8px;font-weight:700;font-size:.82rem;cursor:pointer;}
.player-body{flex:1;display:flex;align-items:center;justify-content:center;position:relative;}
.player-body iframe{width:100%;height:100%;border:none;}

/* Ad overlay before game */
.ad-overlay{position:absolute;inset:0;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:2;}
.ad-overlay.hidden{display:none;}
.ad-timer{font-size:.85rem;color:var(--dim);}
.ad-skip{padding:.5rem 1.5rem;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.9rem;display:none;}
.ad-skip.show{display:block;}

/* Coin reward toast */
.coin-toast{position:fixed;top:80px;right:1rem;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.4);color:#fbbf24;padding:.6rem 1rem;border-radius:10px;font-size:.85rem;font-weight:700;z-index:20000;transform:translateX(120%);transition:transform .3s;}
.coin-toast.show{transform:translateX(0);}

/* Loading */
.loading{text-align:center;padding:3rem;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-more{display:block;width:100%;padding:.75rem;background:rgba(124,58,237,.12);border:1px solid var(--border);border-radius:10px;color:var(--dim);font-weight:600;cursor:pointer;margin-top:1rem;font-size:.88rem;}
.load-more:hover{background:rgba(124,58,237,.25);}
.empty{text-align:center;padding:3rem;color:var(--dim);}

@media(max-width:480px){
  .games-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.5rem;}
}
</style>
</head>
<body>
<div class="header">
  <div>
    <a href="index.html" style="color:var(--dim);text-decoration:none;font-weight:600;font-size:.82rem;">← Home</a>
    <h1 style="margin-top:.2rem;">🎮 8BFR Games</h1>
  </div>
  <div class="coins-display" id="coinsDisplay">🪙 <span id="coinCount">---</span></div>
</div>

<div class="container">
  <div class="search-bar">
    <input class="search-input" id="searchInput" placeholder="Search games..." onkeypress="if(event.key==='Enter')searchGames()">
    <button class="search-btn" onclick="searchGames()">🔍</button>
  </div>

  <div class="cat-scroll" id="catScroll"></div>

  <div id="gamesArea">
    <div class="loading" id="loadingState"><div class="spinner"></div><p style="color:var(--dim);">Loading games...</p></div>
    <div class="games-grid" id="gamesGrid"></div>
    <button class="load-more" id="loadMoreBtn" style="display:none;" onclick="loadMore()">Load More Games</button>
  </div>
</div>

<!-- Game Player -->
<div class="player-overlay" id="playerOverlay">
  <div class="player-header">
    <div class="player-title" id="playerTitle">Game</div>
    <div style="display:flex;align-items:center;gap:.5rem;">
      <span style="font-size:.75rem;color:#fbbf24;" id="coinReward"></span>
      <button class="player-close" onclick="closeGame()">✕ Close</button>
    </div>
  </div>
  <div class="player-body" id="playerBody">
    <div class="ad-overlay" id="adOverlay">
      <div style="font-size:2.5rem;">🎮</div>
      <div style="font-size:1.1rem;font-weight:700;">Loading Game...</div>
      <div id="gamemonetize-video"></div>
      <div class="ad-timer" id="adTimer">Game starts in <span id="adCountdown">5</span>s</div>
      <button class="ad-skip" id="adSkip" onclick="skipAd()">▶ Play Now</button>
    </div>
    <iframe id="gameFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>
</div>

<!-- Coin reward toast -->
<div class="coin-toast" id="coinToast">🪙 +5 coins earned!</div>

<nav style="position:fixed;bottom:0;left:0;right:0;background:rgba(15,0,30,.95);border-top:1px solid rgba(124,58,237,.4);display:flex;justify-content:space-around;padding:.5rem 0;z-index:200;">
  <a href="index.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,.6);font-size:.7rem;">🏠<br>Home</a>
  <a href="feed.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,.6);font-size:.7rem;">📰<br>Feed</a>
  <a href="games.html" style="text-decoration:none;text-align:center;color:#a855f7;font-size:.7rem;">🎮<br>Games</a>
  <a href="radio.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,.6);font-size:.7rem;">📻<br>Radio</a>
  <a href="profile.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,.6);font-size:.7rem;">👤<br>Profile</a>
</nav>

<script src="scripts.js" defer></script>
<script>
var db = window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');

var GM_API = 'https://api.gamemonetize.com/';
var GM_GAME_ID = '4kci7og3klgj0ivy2wz3gdvd9dth5e7n';
var COINS_PER_GAME = 5;
var MAX_DAILY_COINS = 50;
var currentUser = null;
var currentCategory = '';
var currentPage = 0;
var currentSearch = '';
var allGames = [];
var gameStartTime = 0;
var adTimer = null;

var CATEGORIES = [
  {id:'',label:'🔥 All'},
  {id:'action',label:'⚔️ Action'},
  {id:'adventure',label:'🗺️ Adventure'},
  {id:'arcade',label:'👾 Arcade'},
  {id:'puzzle',label:'🧩 Puzzle'},
  {id:'racing',label:'🏎️ Racing'},
  {id:'shooting',label:'🔫 Shooting'},
  {id:'sports',label:'⚽ Sports'},
  {id:'strategy',label:'♟️ Strategy'},
  {id:'multiplayer',label:'👥 Multiplayer'},
  {id:'io',label:'🌐 IO Games'},
  {id:'soccer',label:'⚽ Soccer'},
  {id:'fighting',label:'🥊 Fighting'},
  {id:'clicker',label:'👆 Clicker'},
  {id:'boys',label:'👦 Boys'},
  {id:'girls',label:'👧 Girls'},
  {id:'cooking',label:'🍳 Cooking'},
  {id:'stickman',label:'🏃 Stickman'},
  {id:'3d',label:'🎯 3D'},
  {id:'hypercasual',label:'🎪 Casual'},
  {id:'bejeweled',label:'💎 Match 3'},
  {id:'two-player',label:'👫 2 Player'},
  {id:'baby-hazel',label:'👶 Baby Hazel'}
];

async function init() {
  // Load user coins
  try {
    var s = await db.auth.getSession();
    if (s.data.session) {
      currentUser = s.data.session.user;
      var pr = await db.from('profiles').select('coins').eq('user_id', currentUser.id).single();
      if (pr.data) document.getElementById('coinCount').textContent = (pr.data.coins || 0).toLocaleString();
    }
  } catch(e) {}

  renderCategories();
  loadGames();
}

function renderCategories() {
  var el = document.getElementById('catScroll');
  el.innerHTML = CATEGORIES.map(function(c) {
    return '<button class="cat-chip' + (c.id === currentCategory ? ' active' : '') + '" onclick="selectCategory(\'' + c.id + '\')">' + c.label + '</button>';
  }).join('');
}

function selectCategory(cat) {
  currentCategory = cat;
  currentPage = 0;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  renderCategories();
  loadGames();
}

function searchGames() {
  currentSearch = document.getElementById('searchInput').value.trim();
  currentCategory = '';
  currentPage = 0;
  renderCategories();
  loadGames();
}

function loadMore() {
  currentPage++;
  loadGames(true);
}

async function loadGames(append) {
  var grid = document.getElementById('gamesGrid');
  var loading = document.getElementById('loadingState');
  var loadBtn = document.getElementById('loadMoreBtn');

  if (!append) {
    grid.innerHTML = '';
    loading.style.display = 'block';
    loadBtn.style.display = 'none';
  }

  try {
    var url = GM_API + '?format=json&limit=30&page=' + currentPage;
    if (currentCategory) url += '&category=' + encodeURIComponent(currentCategory);
    if (currentSearch) url += '&title=' + encodeURIComponent(currentSearch);

    var response = await fetch(url);
    var data = await response.json();
    var games = data || [];

    loading.style.display = 'none';

    if (!games.length && !append) {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1;"><div style="font-size:3rem;margin-bottom:.75rem;">🎮</div><p>No games found. Try a different category or search.</p></div>';
      return;
    }

    games.forEach(function(game) {
      var card = document.createElement('div');
      card.className = 'game-card';
      card.onclick = function() { openGame(game); };
      card.innerHTML = '<div class="game-thumb"><img src="' + esc(game.thumb || game.image || '') + '" loading="lazy" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><rect fill=%22%230c0618%22 width=%221%22 height=%221%22/><text x=%22.5%22 y=%22.6%22 text-anchor=%22middle%22 font-size=%22.4%22>🎮</text></svg>\'"></div>' +
        '<div class="game-info"><div class="game-title">' + esc(game.title || 'Game') + '</div>' +
        '<div class="game-cat">' + esc(game.category || '') + '</div></div>';
      grid.appendChild(card);
    });

    loadBtn.style.display = games.length >= 30 ? 'block' : 'none';
  } catch(e) {
    loading.style.display = 'none';
    if (!append) {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1;"><div style="font-size:3rem;margin-bottom:.75rem;">⚠️</div><p>Could not load games. Try refreshing.</p></div>';
    }
    console.error('Games API:', e);
  }
}

function openGame(game) {
  var overlay = document.getElementById('playerOverlay');
  var frame = document.getElementById('gameFrame');
  var adOv = document.getElementById('adOverlay');
  var skipBtn = document.getElementById('adSkip');
  var timerEl = document.getElementById('adCountdown');

  document.getElementById('playerTitle').textContent = game.title || 'Game';
  document.getElementById('coinReward').textContent = '🪙 +' + COINS_PER_GAME + ' coins after 60s';
  frame.src = '';
  adOv.classList.remove('hidden');
  skipBtn.classList.remove('show');
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';

  // Load GameMonetize video ad
  loadVideoAd();

  // Countdown then show game
  var countdown = 5;
  timerEl.textContent = countdown;
  clearInterval(adTimer);
  adTimer = setInterval(function() {
    countdown--;
    timerEl.textContent = countdown;
    if (countdown <= 0) {
      clearInterval(adTimer);
      skipBtn.classList.add('show');
    }
  }, 1000);

  // Store game URL for when ad finishes
  overlay.dataset.gameUrl = game.url || '';
  gameStartTime = 0;
}

function skipAd() {
  var adOv = document.getElementById('adOverlay');
  var frame = document.getElementById('gameFrame');
  var overlay = document.getElementById('playerOverlay');

  adOv.classList.add('hidden');
  clearInterval(adTimer);

  var gameUrl = overlay.dataset.gameUrl || '';
  if (gameUrl) {
    frame.src = gameUrl;
    gameStartTime = Date.now();

    // Award coins after 60 seconds of play
    setTimeout(function() {
      if (document.getElementById('playerOverlay').classList.contains('show')) {
        awardCoins();
      }
    }, 60000);
  }
}

function closeGame() {
  var overlay = document.getElementById('playerOverlay');
  var frame = document.getElementById('gameFrame');
  overlay.classList.remove('show');
  frame.src = '';
  document.body.style.overflow = '';
  clearInterval(adTimer);
  gameStartTime = 0;
}

function loadVideoAd() {
  // Inject GameMonetize video ad
  var container = document.getElementById('gamemonetize-video');
  container.innerHTML = '';
  try {
    window.VIDEO_OPTIONS = {
      gameid: GM_GAME_ID,
      width: '100%',
      height: '280px',
      color: '#3f007e',
      getAds: 'true'
    };
    var d = document;
    var existing = d.getElementById('gamemonetize-video-api');
    if (existing) existing.remove();
    var s = d.createElement('script');
    s.id = 'gamemonetize-video-api';
    s.src = 'https://api.gamemonetize.com/video.js';
    d.head.appendChild(s);
  } catch(e) {
    console.warn('Ad load:', e);
  }
}

async function awardCoins() {
  if (!currentUser) return;
  try {
    // Check daily limit
    var today = new Date().toISOString().split('T')[0];
    var r = await db.from('coin_transactions').select('amount').eq('user_id', currentUser.id).eq('action', 'game_play').gte('created_at', today + 'T00:00:00Z');
    var todayTotal = (r.data || []).reduce(function(a, t) { return a + (t.amount || 0); }, 0);

    if (todayTotal >= MAX_DAILY_COINS) {
      showCoinToast('Daily coin limit reached (50/day)');
      return;
    }

    // Award coins
    var pr = await db.from('profiles').select('coins').eq('user_id', currentUser.id).single();
    var current = (pr.data && pr.data.coins) || 0;
    var newCoins = current + COINS_PER_GAME;

    await db.from('profiles').update({ coins: newCoins }).eq('user_id', currentUser.id);

    // Log transaction
    try {
      await db.from('coin_transactions').insert({
        user_id: currentUser.id,
        amount: COINS_PER_GAME,
        action: 'game_play',
        note: 'Earned from playing game'
      });
    } catch(e) {}

    document.getElementById('coinCount').textContent = newCoins.toLocaleString();
    showCoinToast('🪙 +' + COINS_PER_GAME + ' coins earned!');
  } catch(e) {
    console.warn('Coin award:', e);
  }
}

function showCoinToast(msg) {
  var toast = document.getElementById('coinToast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 3000);
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// Keyboard shortcut to close game
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeGame();
});

init();
</script>
</body>
</html>
