<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notifications -- 8BFR</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:52px;z-index:100;}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--primary);}
.container{max-width:600px;margin:0 auto;padding:1.5rem;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.25rem;}
.tab{flex:1;text-align:center;padding:.65rem;font-weight:600;font-size:.85rem;cursor:pointer;color:rgba(234,230,255,.5);border:none;border-bottom:2px solid transparent;background:none;transition:all .2s;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.notif{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:.6rem;display:flex;gap:.85rem;align-items:flex-start;transition:all .15s;cursor:pointer;text-decoration:none;color:var(--text);}
.notif:hover{border-color:var(--primary);background:rgba(124,58,237,.06);}
.notif.unread{border-left:3px solid var(--primary);}
.notif-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.notif-body{flex:1;min-width:0;}
.notif-title{font-weight:700;font-size:.88rem;margin-bottom:.15rem;}
.notif-msg{font-size:.82rem;color:var(--dim);line-height:1.5;overflow:hidden;text-overflow:ellipsis;}
.notif-time{font-size:.68rem;color:rgba(168,85,247,.4);margin-top:.25rem;}
.empty{text-align:center;padding:3rem;color:var(--dim);}
.mark-all{background:rgba(124,58,237,.12);border:1px solid var(--border);color:var(--dim);padding:.4rem .85rem;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;}
.mark-all:hover{background:rgba(124,58,237,.25);color:#eae6ff;}
.count-badge{background:rgba(239,68,68,.8);color:#fff;font-size:.65rem;padding:.1rem .4rem;border-radius:10px;margin-left:.3rem;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" style="color:var(--dim);text-decoration:none;font-weight:600;">&larr; Home</a>
  <h1>Notifications</h1>
  <span></span>
</div>
<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <div class="tabs" style="flex:1;margin-bottom:0;">
      <button class="tab active" data-tab="all" onclick="switchTab('all',this)">All <span id="allBadge" class="count-badge" style="display:none;"></span></button>
      <button class="tab" data-tab="unread" onclick="switchTab('unread',this)">Unread</button>
    </div>
    <div style="display:flex;gap:.4rem;">
      <button class="mark-all" onclick="markAllRead()">Mark read</button>
      <button class="mark-all" onclick="clearAllNotifs()" style="border-color:rgba(239,68,68,.3);color:#fca5a5;">Clear all</button>
    </div>
  </div>
  <div id="notifList"><div class="spinner"></div></div>
</div>
<nav style="position:fixed;bottom:0;left:0;right:0;background:rgba(15,0,30,0.95);border-top:1px solid rgba(124,58,237,0.4);display:flex;justify-content:space-around;padding:0.5rem 0;z-index:200;">
  <a href="index.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">Home</a>
  <a href="search.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">Search</a>
  <a href="feed.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">Feed</a>
  <a href="radio.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">Radio</a>
  <a href="profile.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">Profile</a>
</nav>
<script src="scripts.js" defer></script>
<script src="scripts.js" defer></script>
<script>
var SUPA='https://novbuvwpjnxwwvdekjhr.supabase.co';
var KEY='sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f';
var db=window.supabase.createClient(SUPA,KEY);
var currentUser=null,activeTab='all',allNotifs=[],profileCache={};

document.getElementById('notifList').innerHTML='<div class="spinner"></div><div style="text-align:center;font-size:.72rem;color:rgba(255,255,255,.3);margin-top:.3rem;" id="loadStatus">Connecting...</div>';

async function init(){
  var statusEl=document.getElementById('loadStatus');
  try{
    if(statusEl)statusEl.textContent='Checking auth...';
    var s=await db.auth.getSession();
    if(!s.data.session){location.href='login.html?return=notifications.html';return;}
    currentUser=s.data.session.user;
    if(statusEl)statusEl.textContent='Loading...';
    await loadNotifications();
  }catch(e){
    document.getElementById('notifList').innerHTML='<div class="empty"><p style="color:#f87171;">Error: '+e.message+'</p><button onclick="location.reload()" style="margin-top:.5rem;padding:.35rem .7rem;background:#7c3aed;color:#fff;border:none;border-radius:6px;">Reload</button></div>';
  }
}

function switchTab(tab,btn){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(btn)btn.classList.add('active');
  renderList();
}

async function loadNotifications(){
  var el=document.getElementById('notifList');
  try{
    var queryP=db.from('notifications').select('*').eq('recipient_id',currentUser.id).order('created_at',{ascending:false}).limit(50);
    var timeoutP=new Promise(function(_,rej){setTimeout(function(){rej(new Error('Timed out. Check notifications RLS in Supabase.'));},8000);});
    var r=await Promise.race([queryP,timeoutP]);
    if(r.error){el.innerHTML='<div class="empty"><p style="color:#f87171;">'+r.error.message+'</p><button onclick="loadNotifications()" style="margin-top:.5rem;padding:.35rem .7rem;background:#7c3aed;color:#fff;border:none;border-radius:6px;">Retry</button></div>';return;}
    allNotifs=r.data||[];

    // Batch-fetch all user profiles referenced in notifications
    var userIds=[];
    allNotifs.forEach(function(n){
      var m=n.metadata||{};
      if(typeof m==='string'){try{m=JSON.parse(m);}catch(e){m={};}}
      if(m.from_id&&userIds.indexOf(m.from_id)===-1)userIds.push(m.from_id);
      if(n.sender_id&&userIds.indexOf(n.sender_id)===-1)userIds.push(n.sender_id);
      if(n.actor_id&&userIds.indexOf(n.actor_id)===-1)userIds.push(n.actor_id);
    });
    if(userIds.length>0){
      try{
        var pr=await db.from('profiles').select('user_id,display_name,username,avatar_url').in('user_id',userIds);
        if(pr.data){pr.data.forEach(function(p){profileCache[p.user_id]=p;});}
      }catch(e){}
    }

    var unread=allNotifs.filter(function(n){return !n.is_read;}).length;
    var badge=document.getElementById('allBadge');
    if(badge){if(unread>0){badge.textContent=unread;badge.style.display='inline';}else badge.style.display='none';}
    renderList();
  }catch(e){
    el.innerHTML='<div class="empty"><p style="color:#f87171;">'+e.message+'</p><button onclick="loadNotifications()" style="margin-top:.5rem;padding:.35rem .7rem;background:#7c3aed;color:#fff;border:none;border-radius:6px;">Retry</button></div>';
  }
}

function getProfile(id){return profileCache[id]||null;}
function getName(meta,n){
  // Try metadata first
  if(meta.from_name&&meta.from_name!=='Someone')return meta.from_name;
  if(meta.sender_name&&meta.sender_name!=='Someone')return meta.sender_name;
  // Try profile cache
  var uid=meta.from_id||n.sender_id||n.actor_id||'';
  var p=getProfile(uid);
  if(p)return p.display_name||p.username||'Unknown';
  return '';
}
function getProfileLink(meta,n){
  var uid=meta.from_id||n.sender_id||n.actor_id||'';
  if(uid)return 'profile.html?id='+uid;
  return '';
}
function getAvatar(meta,n){
  var uid=meta.from_id||n.sender_id||n.actor_id||'';
  var p=getProfile(uid);
  if(p&&p.avatar_url)return '<img src="'+p.avatar_url+'" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">';
  var name=getName(meta,n);
  var letter=name?name.charAt(0).toUpperCase():'?';
  return '<div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1rem;">'+letter+'</div>';
}
function timeAgo(d){
  var s=Math.floor((Date.now()-new Date(d).getTime())/1000);
  if(s<60)return 'just now';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';if(s<604800)return Math.floor(s/86400)+'d ago';
  return new Date(d).toLocaleDateString();
}
function esc(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}

function renderList(){
  var el=document.getElementById('notifList');
  var list=activeTab==='unread'?allNotifs.filter(function(n){return !n.is_read;}):allNotifs;
  if(!list.length){el.innerHTML='<div class="empty"><p>'+(activeTab==='unread'?'All caught up!':'No notifications yet.')+'</p></div>';return;}
  var html='';
  for(var i=0;i<list.length;i++){
    try{
      var n=list[i];
      var meta=n.metadata||{};
      if(typeof meta==='string'){try{meta=JSON.parse(meta);}catch(e){meta={};}}
      var name=getName(meta,n);
      var profLink=getProfileLink(meta,n);
      var title='',preview='',link='',actions='';

      switch(n.notif_type){
        case 'follow':
          title=(name||'Someone')+' followed you';
          link=profLink;
          break;
        case 'friend_request':
          title=(name||'Someone')+' sent you a friend request';
          actions='<div style="display:flex;gap:.3rem;margin-top:.4rem;">'
            +'<button onclick="event.stopPropagation();event.preventDefault();acceptFriend(\''+meta.from_id+'\',\''+n.id+'\',this)" style="padding:.2rem .5rem;border-radius:6px;background:#059669;border:none;color:#fff;font-size:.7rem;font-weight:600;cursor:pointer;">Accept</button>'
            +'<button onclick="event.stopPropagation();event.preventDefault();declineFriend(\''+meta.from_id+'\',\''+n.id+'\',this)" style="padding:.2rem .5rem;border-radius:6px;background:#6b7280;border:none;color:#fff;font-size:.7rem;font-weight:600;cursor:pointer;">Decline</button>'
            +(profLink?'<a href="'+profLink+'" onclick="event.stopPropagation();" style="padding:.2rem .5rem;border-radius:6px;background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.3);color:#a855f7;font-size:.7rem;font-weight:600;text-decoration:none;">View</a>':'')
            +'</div>';
          break;
        case 'friend_accepted':
          title=(name||'Someone')+' accepted your friend request!';
          link=profLink;break;
        case 'like':
          title=(name||'Someone')+' liked your post';
          preview=meta.post_preview||meta.message||'';
          link=meta.post_id?'feed.html':'';break;
        case 'comment':
          title=(name||'Someone')+' commented on your post';
          preview=meta.comment_text||meta.message||'';
          link=meta.post_id?'feed.html':'';break;
        case 'reshare':
          title=(name||'Someone')+' reshared your post';
          link=meta.post_id?'feed.html':'';break;
        case 'dm':case 'direct_message':
          title=(name||'Someone')+' sent you a message';
          preview=meta.message_preview||meta.message||'';
          link=meta.from_id?'dm.html?user='+meta.from_id:'dm.html';break;
        case 'tip':
          title=(name||'Someone')+' sent you '+(meta.amount||'')+' coins';
          preview=meta.note||meta.message||'';
          link=profLink||'profile.html';break;
        case 'purchase':
          title=(name||'Someone')+' purchased your '+(meta.item_type||'item');
          preview=meta.message||'';
          link=meta.link||'profile.html';break;
        case 'new_member':case 'welcome':
          title=(name||meta.message||'New member joined!');
          if(name&&name!=='Someone')title=name+' joined 8BFR!';
          link=profLink||'referrals.html';break;
        case 'referral':
          title=(name||'Someone')+' joined via your invite!';
          preview=meta.message||'+50 coins earned';
          link='referrals.html';break;
        case 'badge':
          title='You earned a new badge!';
          preview=meta.badge_name||meta.message||'';
          link='profile.html';break;
        case 'verification':
          title='Verification update';
          preview=meta.message||'';
          link=meta.link||'profile.html';break;
        case 'system':case 'chat_moderation':
          title=meta.title||'System notification';
          preview=meta.body||meta.message||'';
          link=meta.link||'';break;
        default:
          title=meta.title||meta.message||(name?(name+' - notification'):'Notification');
          preview=meta.body||meta.message||'';
          link=meta.link||profLink||'';
      }

      var cls=n.is_read?'notif':'notif unread';
      var tag=link?'a':'div';
      var hrefAttr=link?(' href="'+link+'"'):'';

      html+='<'+tag+' class="'+cls+'"'+hrefAttr+' onclick="markRead(\''+n.id+'\')" style="text-decoration:none;color:var(--text);">';
      html+=getAvatar(meta,n);
      html+='<div class="notif-body">';
      html+='<div class="notif-title">'+esc(title)+'</div>';
      if(preview)html+='<div class="notif-msg">'+esc(preview.substring(0,120))+'</div>';
      if(actions)html+=actions;
      html+='<div class="notif-time">'+timeAgo(n.created_at)+'</div>';
      html+='</div>';
      html+='<button onclick="event.stopPropagation();event.preventDefault();deleteNotif(\''+n.id+'\')" style="background:none;border:none;color:rgba(234,230,255,.2);font-size:.8rem;cursor:pointer;padding:0 .2rem;align-self:flex-start;">X</button>';
      html+='</'+tag+'>';
    }catch(e){html+='<div class="notif" style="color:#f87171;font-size:.75rem;">Error rendering</div>';}
  }
  el.innerHTML=html;
}

window.markRead=function(id){
  try{db.from('notifications').update({is_read:true}).eq('id',id).eq('recipient_id',currentUser.id);}catch(e){}
  allNotifs.forEach(function(n){if(n.id===id)n.is_read=true;});
  var unread=allNotifs.filter(function(n){return !n.is_read;}).length;
  var badge=document.getElementById('allBadge');
  if(badge){if(unread>0){badge.textContent=unread;badge.style.display='inline';}else badge.style.display='none';}
};
window.markAllRead=async function(){
  try{await db.from('notifications').update({is_read:true}).eq('recipient_id',currentUser.id).eq('is_read',false);
  allNotifs.forEach(function(n){n.is_read=true;});
  var badge=document.getElementById('allBadge');if(badge)badge.style.display='none';
  renderList();}catch(e){alert('Error: '+e.message);}
};
window.deleteNotif=async function(id){
  try{await db.from('notifications').delete().eq('id',id).eq('recipient_id',currentUser.id);
  allNotifs=allNotifs.filter(function(n){return n.id!==id;});renderList();}catch(e){}
};
window.clearAllNotifs=async function(){
  if(!confirm('Delete all notifications?'))return;
  try{await db.from('notifications').delete().eq('recipient_id',currentUser.id);allNotifs=[];renderList();}catch(e){alert('Error: '+e.message);}
};
window.acceptFriend=async function(fromId,notifId,btn){
  if(!fromId)return;
  try{btn.disabled=true;btn.textContent='...';
  await db.from('friends').upsert({user_id:currentUser.id,friend_id:fromId,status:'accepted'},{onConflict:'user_id,friend_id'});
  await db.from('friends').upsert({user_id:fromId,friend_id:currentUser.id,status:'accepted'},{onConflict:'user_id,friend_id'});
  await db.from('notifications').update({is_read:true}).eq('id',notifId);
  var myProf=(await db.from('profiles').select('display_name,username').eq('user_id',currentUser.id).single()).data;
  var myName=myProf?myProf.display_name||myProf.username:'Someone';
  await db.from('notifications').insert({recipient_id:fromId,notif_type:'friend_accepted',metadata:{from_id:currentUser.id,from_name:myName,message:myName+' accepted your friend request!',link:'profile.html?id='+currentUser.id},created_at:new Date().toISOString()});
  btn.textContent='Accepted!';btn.style.background='#22c55e';
  setTimeout(function(){loadNotifications();},1000);
  }catch(e){btn.textContent='Error';}
};
window.declineFriend=async function(fromId,notifId,btn){
  if(!fromId)return;
  try{btn.disabled=true;btn.textContent='...';
  await db.from('friends').delete().eq('user_id',currentUser.id).eq('friend_id',fromId);
  await db.from('friends').delete().eq('user_id',fromId).eq('friend_id',currentUser.id);
  await db.from('notifications').delete().eq('id',notifId);
  allNotifs=allNotifs.filter(function(n){return n.id!==notifId;});renderList();
  }catch(e){btn.textContent='Error';}
};

init();
</script></body></html>
