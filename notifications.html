<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notifications — 8BFR</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--primary);}
.container{max-width:600px;margin:0 auto;padding:1.5rem;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.25rem;}
.tab{flex:1;text-align:center;padding:.65rem;font-weight:600;font-size:.85rem;cursor:pointer;color:rgba(234,230,255,.5);border:none;border-bottom:2px solid transparent;background:none;transition:all .2s;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.notif{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:.6rem;display:flex;gap:.85rem;align-items:flex-start;transition:all .15s;cursor:pointer;text-decoration:none;color:var(--text);}
.notif:hover{border-color:var(--primary);background:rgba(124,58,237,.06);}
.notif.unread{border-left:3px solid var(--primary);}
.notif-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.notif-body{flex:1;min-width:0;}
.notif-title{font-weight:700;font-size:.88rem;margin-bottom:.15rem;}
.notif-msg{font-size:.82rem;color:var(--dim);line-height:1.5;overflow:hidden;text-overflow:ellipsis;}
.notif-time{font-size:.68rem;color:rgba(168,85,247,.4);margin-top:.25rem;}
.empty{text-align:center;padding:3rem;color:var(--dim);}
.empty-icon{font-size:3.5rem;margin-bottom:.75rem;}
.mark-all{background:rgba(124,58,237,.12);border:1px solid var(--border);color:var(--dim);padding:.4rem .85rem;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;}
.mark-all:hover{background:rgba(124,58,237,.25);color:#eae6ff;}
.count-badge{background:rgba(239,68,68,.8);color:#fff;font-size:.65rem;padding:.1rem .4rem;border-radius:10px;margin-left:.3rem;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" style="color:var(--dim);text-decoration:none;font-weight:600;">← Home</a>
  <h1>🔔 Notifications</h1>
  <span></span>
</div>
<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <div class="tabs" style="flex:1;margin-bottom:0;">
      <button class="tab active" data-tab="all" onclick="switchTab('all',this)">All <span id="allBadge" class="count-badge" style="display:none;"></span></button>
      <button class="tab" data-tab="unread" onclick="switchTab('unread',this)">Unread</button>
    </div>
    <div style="display:flex;gap:.4rem;">
      <button class="mark-all" onclick="markAllRead()">Mark read</button>
      <button class="mark-all" onclick="clearAllNotifs()" style="border-color:rgba(239,68,68,.3);color:#fca5a5;">Clear all</button>
    </div>
  </div>
  <div id="notifList"><div class="spinner"></div></div>
</div>
<nav style="position:fixed;bottom:0;left:0;right:0;background:rgba(15,0,30,0.95);border-top:1px solid rgba(124,58,237,0.4);display:flex;justify-content:space-around;padding:0.5rem 0;z-index:200;">
  <a href="index.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">🏠<br>Home</a>
  <a href="search.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">🔍<br>Search</a>
  <a href="feed.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">📰<br>Feed</a>
  <a href="radio.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">📻<br>Radio</a>
  <a href="profile.html" style="text-decoration:none;text-align:center;color:rgba(234,230,255,0.6);font-size:0.7rem;">👤<br>Profile</a>
</nav>
<script src="scripts.js" defer></script>
<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
var currentUser=null,activeTab='all',allNotifs=[];

var ICONS={
  follow:{icon:'👤',bg:'rgba(124,58,237,.15)'},
  like:{icon:'❤️',bg:'rgba(244,114,182,.12)'},
  comment:{icon:'💬',bg:'rgba(124,58,237,.15)'},
  reshare:{icon:'🔁',bg:'rgba(34,197,94,.12)'},
  tip:{icon:'🪙',bg:'rgba(251,191,36,.12)'},
  purchase:{icon:'🛒',bg:'rgba(34,197,94,.15)'},
  friend_request:{icon:'🤝',bg:'rgba(124,58,237,.15)'},
  friend_accepted:{icon:'🎉',bg:'rgba(34,197,94,.12)'},
  verification:{icon:'✅',bg:'rgba(0,217,255,.12)'},
  system:{icon:'📢',bg:'rgba(124,58,237,.15)'},
  badge:{icon:'🏅',bg:'rgba(251,191,36,.12)'},
  mention:{icon:'@',bg:'rgba(124,58,237,.15)'},
  story_view:{icon:'*',bg:'rgba(168,85,247,.12)'},
  parent_verify:{icon:'P',bg:'rgba(139,92,246,.12)'},
  parent_verified:{icon:'P',bg:'rgba(34,197,94,.12)'},
  parent_rejected:{icon:'P',bg:'rgba(239,68,68,.12)'},
  parent_verification_request:{icon:'P',bg:'rgba(249,115,22,.12)'},
  dm:{icon:'DM',bg:'rgba(0,217,255,.12)'},
  direct_message:{icon:'DM',bg:'rgba(0,217,255,.12)'},
  referral:{icon:'+',bg:'rgba(34,197,94,.12)'},
  chat_moderation:{icon:'!',bg:'rgba(251,191,36,.12)'}
};

async function init(){
  try{
    var s=await db.auth.getSession();
    if(!s.data.session){location.href='login.html?return=notifications.html';return;}
    currentUser=s.data.session.user;
    loadNotifications();
    db.channel('notif-live')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:'recipient_id=eq.'+currentUser.id},function(){
        loadNotifications();
      }).subscribe();
  }catch(e){
    document.getElementById('notifList').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>'+e.message+'</p></div>';
  }
}

function switchTab(tab,btn){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(btn)btn.classList.add('active');
  renderList();
}

async function loadNotifications(){
  var el=document.getElementById('notifList');
  try{
    var r=await db.from('notifications')
      .select('*')
      .eq('recipient_id',currentUser.id)
      .order('created_at',{ascending:false})
      .limit(50);
    if(r.error)throw r.error;
    allNotifs=r.data||[];

    // Resolve missing names: if from_id exists but from_name is missing, look it up
    var missingIds=[];
    allNotifs.forEach(function(n){
      var m=n.metadata||{};
      if(m.from_id&&!m.from_name)missingIds.push(m.from_id);
    });
    if(missingIds.length){
      missingIds=[...new Set(missingIds)];
      var pr=await db.from('profiles').select('user_id,display_name,username').in('user_id',missingIds);
      var nameMap={};
      if(pr.data)pr.data.forEach(function(p){nameMap[p.user_id]=p.display_name||p.username||'User';});
      allNotifs.forEach(function(n){
        var m=n.metadata||{};
        if(m.from_id&&!m.from_name&&nameMap[m.from_id]){
          m.from_name=nameMap[m.from_id];
          if(!m.link)m.link='profile.html?id='+m.from_id;
          if(!m.message&&n.notif_type==='friend_accepted')m.message=m.from_name+' accepted your friend request!';
          if(!m.message&&n.notif_type==='friend_request')m.message=m.from_name+' sent you a friend request!';
          n.metadata=m;
        }
      });
    }

    var unreadCount=allNotifs.filter(function(n){return !n.is_read;}).length;
    var badge=document.getElementById('allBadge');
    if(badge){
      if(unreadCount>0){badge.textContent=unreadCount;badge.style.display='inline';}
      else badge.style.display='none';
    }
    renderList();
  }catch(e){
    el.innerHTML='<div class="empty"><div class="empty-icon">🔔</div><h3 style="font-size:1.1rem;font-weight:700;margin-bottom:.5rem;">No notifications yet</h3><p style="font-size:.85rem;">When someone follows you, likes your posts, sends you a tip, or other activity happens — you\'ll see it here.</p></div>';
  }
}

function renderList(){
  var el=document.getElementById('notifList');
  var list=activeTab==='unread'?allNotifs.filter(function(n){return !n.is_read;}):allNotifs;

  if(!list.length){
    var msg=activeTab==='unread'?'All caught up! No unread notifications.':'No notifications yet. Activity will show up here.';
    el.innerHTML='<div class="empty"><div class="empty-icon">'+(activeTab==='unread'?'':'')+'</div><p style="font-size:.88rem;">'+msg+'</p></div>';
    return;
  }

  el.innerHTML=list.map(function(n){
    var cfg=ICONS[n.notif_type]||ICONS.system;
    var unreadClass=!n.is_read?'notif unread':'notif';
    var meta=n.metadata||{};
    var link=meta.link||'#';
    var fromName=meta.from_name||meta.sender_name||'';
    var title='';
    var preview='';
    var actions='';
    var time=timeAgo(n.created_at);

    // Build title and preview based on type
    switch(n.notif_type){
      case 'friend_request':
        title=(fromName||'Someone')+' sent you a friend request';
        link=meta.from_id?'profile.html?id='+meta.from_id:'#';
        actions='<div style="display:flex;gap:.4rem;margin-top:.4rem;">'
          +'<button onclick="event.preventDefault();event.stopPropagation();acceptFriend(\''+meta.from_id+'\',\''+n.id+'\',this)" style="padding:.25rem .6rem;border-radius:8px;background:#059669;border:none;color:#fff;font-size:.75rem;font-weight:600;cursor:pointer;">Accept</button>'
          +'<button onclick="event.preventDefault();event.stopPropagation();declineFriend(\''+meta.from_id+'\',\''+n.id+'\',this)" style="padding:.25rem .6rem;border-radius:8px;background:#6b7280;border:none;color:#fff;font-size:.75rem;font-weight:600;cursor:pointer;">Decline</button>'
          +'</div>';
        break;
      case 'friend_accepted':
        title=(fromName||'Someone')+' accepted your friend request!';
        link=meta.from_id?'profile.html?id='+meta.from_id:'#';
        break;
      case 'follow':
        title=(fromName||'Someone')+' started following you';
        link=meta.from_id?'profile.html?id='+meta.from_id:'#';
        break;
      case 'like':
        title=(fromName||'Someone')+' liked your post';
        preview=meta.post_preview||meta.message||'';
        link=meta.post_id?'feed.html#post-'+meta.post_id:(meta.link||'feed.html');
        break;
      case 'comment':
        title=(fromName||'Someone')+' commented on your post';
        preview=meta.comment_text||meta.message||'';
        link=meta.post_id?'feed.html#post-'+meta.post_id:(meta.link||'feed.html');
        break;
      case 'reshare':
        title=(fromName||'Someone')+' reshared your post';
        link=meta.link||'feed.html';
        break;
      case 'dm':
      case 'direct_message':
        title=(fromName||'Someone')+' sent you a message';
        preview=meta.message_preview||meta.message||'';
        link=meta.from_id?'dm.html?user='+meta.from_id:(meta.link||'dm.html');
        cfg=ICONS.comment;
        break;
      case 'tip':
        title=(fromName||'Someone')+' sent you '+(meta.amount||'')+' coins';
        preview=meta.note||meta.message||'';
        link=meta.link||'profile.html';
        break;
      case 'purchase':
        title=(fromName||'Someone')+' purchased your '+(meta.item_type||'item');
        preview=meta.item_name||meta.message||'';
        link=meta.link||'artist-payouts.html';
        break;
      case 'verification':
        title='Verification update';
        preview=meta.message||'Your verification status has changed.';
        break;
      case 'badge':
        title='You earned a new badge!';
        preview=meta.badge_name||meta.message||'';
        link=meta.link||'profile.html';
        break;
      case 'mention':
        title=(fromName||'Someone')+' mentioned you';
        preview=meta.message||'';
        link=meta.link||'feed.html';
        break;
      case 'chat_moderation':
        title=meta.title||'Chat moderation action';
        preview=meta.body||meta.message||'';
        link=meta.link||'owner-monitor.html';
        break;
      case 'parent_verified':
        title='Parent Verification Approved';
        preview=meta.message||'You can now manage your children in KidZone.';
        link=meta.link||'kidzone_parent.html';
        break;
      case 'parent_rejected':
        title='Parent Verification Update';
        preview=meta.message||'Your verification was not approved.';
        link=meta.link||'kidzone_parent.html';
        break;
      case 'parent_verification_request':
        title='New Parent Verification Request';
        preview=meta.message||'A parent has submitted verification.';
        link=meta.link||'owner-kidzone.html';
        break;
      case 'referral':
        title=(fromName||'Someone')+' joined via your invite!';
        preview=meta.message||'+50 coins earned';
        link='referral.html';
        break;
      default:
        title=meta.title||formatType(n.notif_type);
        preview=meta.body||meta.message||'';
    }

    var previewHtml=preview?'<div class="notif-msg">'+esc(preview.substring(0,120))+'</div>':'';

    return '<a href="'+link+'" class="'+unreadClass+'" onclick="markRead(\''+n.id+'\')">'
      +'<div class="notif-icon" style="background:'+cfg.bg+';">'+cfg.icon+'</div>'
      +'<div class="notif-body">'
        +'<div class="notif-title">'+esc(title)+'</div>'
        +previewHtml
        +actions
        +'<div class="notif-time">'+time+'</div>'
      +'</div>'
      +'<button onclick="event.preventDefault();event.stopPropagation();deleteNotif(\''+n.id+'\',this)" style="background:none;border:none;color:rgba(234,230,255,.25);font-size:.9rem;cursor:pointer;flex-shrink:0;padding:0 .25rem;align-self:flex-start;" title="Delete">X</button>'
    +'</a>';
  }).join('');
}

function formatType(t){
  var m={follow:'New Follower',like:'Post Liked',comment:'New Comment',reshare:'Post Reshared',tip:'Coin Tip Received',purchase:'New Purchase',friend_request:'Friend Request',friend_accepted:'Friend Accepted',verification:'Verification Update',system:'System',badge:'New Badge',mention:'You were mentioned',story_view:'Story Viewed',parent_verify:'Parent Verification'};
  return m[t]||'Notification';
}

window.markRead=async function(id){
  try{await db.from('notifications').update({is_read:true}).eq('id',id).eq('recipient_id',currentUser.id);}catch(e){}
  allNotifs.forEach(function(n){if(n.id===id)n.is_read=true;});
  var unread=allNotifs.filter(function(n){return !n.is_read;}).length;
  var badge=document.getElementById('allBadge');
  if(badge){if(unread>0){badge.textContent=unread;badge.style.display='inline';}else badge.style.display='none';}
};

window.markAllRead=async function(){
  try{
    await db.from('notifications').update({is_read:true}).eq('recipient_id',currentUser.id).eq('is_read',false);
    allNotifs.forEach(function(n){n.is_read=true;});
    var badge=document.getElementById('allBadge');
    if(badge)badge.style.display='none';
    renderList();
  }catch(e){alert('Error: '+e.message);}
};

window.deleteNotif=async function(id,btn){
  try{
    await db.from('notifications').delete().eq('id',id).eq('recipient_id',currentUser.id);
    allNotifs=allNotifs.filter(function(n){return n.id!==id;});
    var unread=allNotifs.filter(function(n){return !n.is_read;}).length;
    var badge=document.getElementById('allBadge');
    if(badge){if(unread>0){badge.textContent=unread;badge.style.display='inline';}else badge.style.display='none';}
    if(btn){var card=btn.closest('.notif');if(card)card.remove();}
    if(!allNotifs.length)renderList();
  }catch(e){alert('Error: '+e.message);}
};

window.clearAllNotifs=async function(){
  if(!confirm('Delete ALL notifications? This cannot be undone.'))return;
  try{
    await db.from('notifications').delete().eq('recipient_id',currentUser.id);
    allNotifs=[];
    var badge=document.getElementById('allBadge');
    if(badge)badge.style.display='none';
    renderList();
  }catch(e){alert('Error: '+e.message);}
};

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function timeAgo(d){var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}

window.acceptFriend=async function(fromId,notifId,btn){
  if(!currentUser)return;
  try{
    var ur=await db.from('friends').update({status:'accepted'}).eq('user_id',fromId).eq('friend_id',currentUser.id).eq('status','pending');
    if(ur.error){alert('Error: '+ur.error.message);return;}
    await db.from('notifications').update({is_read:true}).eq('id',notifId);
    var myProf=(await db.from('profiles').select('display_name,username').eq('user_id',currentUser.id).single()).data;
    var myName=myProf?(myProf.display_name||myProf.username):'Someone';
    await db.from('notifications').insert({recipient_id:fromId,notif_type:'friend_accepted',metadata:{from_id:currentUser.id,from_name:myName,message:myName+' accepted your friend request!',link:'profile.html?id='+currentUser.id},created_at:new Date().toISOString()});
    var row=btn.parentElement;
    row.innerHTML='<span style="color:#4ade80;font-size:.75rem;font-weight:600;">✓ Accepted!</span>';
  }catch(e){alert('Error: '+e.message);}
};

window.declineFriend=async function(fromId,notifId,btn){
  if(!currentUser)return;
  try{
    // Delete friend request row (check both directions)
    await db.from('friends').delete().eq('user_id',fromId).eq('friend_id',currentUser.id).eq('status','pending');
    await db.from('friends').delete().eq('user_id',currentUser.id).eq('friend_id',fromId).eq('status','pending');
    // Delete the notification entirely so it doesn't reappear
    await db.from('notifications').delete().eq('id',notifId);
    // Remove from local array
    allNotifs=allNotifs.filter(function(n){return n.id!==notifId;});
    var row=btn.parentElement;
    row.innerHTML='<span style="color:#9ca3af;font-size:.75rem;">Declined</span>';
    // Update badge count
    var unread=allNotifs.filter(function(n){return !n.is_read;}).length;
    var badge=document.getElementById('allBadge');
    if(badge){if(unread>0){badge.textContent=unread;badge.style.display='inline';}else badge.style.display='none';}
  }catch(e){alert('Error: '+e.message);}
};

init();
</script>
</body>
</html>
