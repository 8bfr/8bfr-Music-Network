<script>
// Avatar & Bubble Toggle System
(function() {
    // Create toggle button
    const toggleBtn = document.createElement('button');
    toggleBtn.id = 'avatarToggle';
    toggleBtn.innerHTML = '👁️';
    toggleBtn.title = 'Toggle Avatar/Bubbles';
    toggleBtn.style.cssText = `
        position: fixed;
        top: 80px;
        right: 20px;
        z-index: 9999;
        background: rgba(124, 58, 237, 0.9);
        border: 2px solid rgba(124, 58, 237, 1);
        color: white;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px rgba(124, 58, 237, 0.5);
        transition: all 0.3s ease;
    `;
    
    toggleBtn.addEventListener('mouseenter', function() {
        this.style.transform = 'scale(1.1)';
    });
    
    toggleBtn.addEventListener('mouseleave', function() {
        this.style.transform = 'scale(1)';
    });
    
    document.body.appendChild(toggleBtn);
    
    // Load saved preference
    let isHidden = localStorage.getItem('hideAvatarBubbles') === 'true';
    
    function updateVisibility() {
        const elementsToToggle = [
            document.getElementById('homeAvatarSwitcher'),
            ...document.querySelectorAll('[id*="bubble"]'),
            ...document.querySelectorAll('[class*="bubble"]'),
            ...document.querySelectorAll('[id*="avatar"][id*="switcher"]')
        ];
        
        elementsToToggle.forEach(el => {
            if (el) {
                el.style.display = isHidden ? 'none' : '';
            }
        });
        
        toggleBtn.innerHTML = isHidden ? '👁️‍🗨️' : '👁️';
        toggleBtn.title = isHidden ? 'Show Avatar/Bubbles' : 'Hide Avatar/Bubbles';
    }
    
    toggleBtn.addEventListener('click', function() {
        isHidden = !isHidden;
        localStorage.setItem('hideAvatarBubbles', isHidden);
        updateVisibility();
    });
    
    // Apply on load
    updateVisibility();
    
    // Watch for dynamically added elements
    const observer = new MutationObserver(updateVisibility);
    observer.observe(document.body, { childList: true, subtree: true });
})();
</script>

  <!-- 
  KIDS.HTML FIX — Paste this BEFORE </body> in your existing kids.html
  Makes the 3 buttons clickable with proper links
-->
<script>
(function(){
  // Wait for buttons to render
  var check = setInterval(function(){
    var btns = document.querySelectorAll('button, .btn, a[class*="btn"], div[class*="card"]');
    if (!btns.length) return;
    clearInterval(check);

    // Find and fix all kid-related buttons/links
    btns.forEach(function(btn){
      var text = (btn.textContent || '').toLowerCase().trim();
      
      // Match common button labels and add click handlers
      if (text.includes('kid zone') || text.includes('kidzone') || text.includes('kids zone') || text.includes('enter')) {
        btn.style.cursor = 'pointer';
        btn.onclick = function(){ location.href = 'kid-zone.html'; };
      }
      else if (text.includes('games') || text.includes('play')) {
        btn.style.cursor = 'pointer';
        btn.onclick = function(){ location.href = 'kidzone-games.html'; };
      }
      else if (text.includes('stories') || text.includes('story')) {
        btn.style.cursor = 'pointer';
        btn.onclick = function(){ location.href = 'kids-stories.html'; };
      }
      else if (text.includes('studio') || text.includes('create') || text.includes('music')) {
        btn.style.cursor = 'pointer';
        btn.onclick = function(){ location.href = 'kidzone-studio.html'; };
      }
      else if (text.includes('challenge')) {
        btn.style.cursor = 'pointer';
        btn.onclick = function(){ location.href = 'kidzone-challenges.html'; };
      }
      else if (text.includes('reward') || text.includes('shop')) {
        btn.style.cursor = 'pointer';
        btn.onclick = function(){ location.href = 'kidzone-rewards.html'; };
      }
      else if (text.includes('parent')) {
        btn.style.cursor = 'pointer';
        btn.onclick = function(){ location.href = 'kidzone-parent.html'; };
      }
    });

    // If no buttons were matched, create navigation links
    var matched = document.querySelectorAll('[onclick]');
    if (matched.length < 2) {
      // Fallback: add navigation below existing content
      var container = document.querySelector('.container, main, [class*="content"], body > div');
      if (!container) container = document.body;
      
      var nav = document.createElement('div');
      nav.style.cssText = 'max-width:600px;margin:1.5rem auto;padding:0 1rem;display:grid;grid-template-columns:1fr 1fr;gap:.75rem;';
      nav.innerHTML = [
        {href:'kid-zone.html',icon:'🧸',label:'KidZone Home'},
        {href:'kidzone-games.html',icon:'🎮',label:'Games'},
        {href:'kids-stories.html',icon:'📖',label:'Stories'},
        {href:'kidzone-studio.html',icon:'🎹',label:'Studio'},
        {href:'kidzone-challenges.html',icon:'🏆',label:'Challenges'},
        {href:'kidzone-rewards.html',icon:'🎁',label:'Rewards'},
        {href:'kidzone-creators.html',icon:'🌟',label:'Creators'},
        {href:'kidzone-parent.html',icon:'👨‍👩‍👧',label:'Parent Hub'},
      ].map(function(item){
        return '<a href="'+item.href+'" style="display:block;background:rgba(12,6,24,.7);border:1px solid rgba(124,58,237,.3);border-radius:12px;padding:1rem;text-align:center;text-decoration:none;color:#eae6ff;transition:all .2s;" onmouseover="this.style.borderColor=\'#7c3aed\'" onmouseout="this.style.borderColor=\'rgba(124,58,237,.3)\'"><div style="font-size:1.5rem;margin-bottom:.3rem;">'+item.icon+'</div><div style="font-weight:600;font-size:.85rem;">'+item.label+'</div></a>';
      }).join('');
      container.appendChild(nav);
    }
  }, 500);
})();
</script>
