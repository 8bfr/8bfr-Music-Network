<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>8-Ball Pool -- 8BFR Games</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:#071a07;color:#e8f5e9;height:100vh;height:100dvh;overflow:hidden;touch-action:none;}
.top{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:.35rem .5rem;background:rgba(0,12,0,.92);}
.top a{color:#4ade80;text-decoration:none;font-weight:600;font-size:.72rem;}
.top h1{font-family:'Bebas Neue',cursive;font-size:1rem;color:#4ade80;}
.info{position:fixed;top:30px;left:0;right:0;z-index:99;display:flex;justify-content:space-between;padding:.15rem .5rem;background:rgba(0,8,0,.88);font-size:.68rem;}
.game-wrap{position:fixed;top:48px;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;}
canvas{touch-action:none;}
.pbar{position:fixed;right:4px;top:50%;transform:translateY(-50%);width:14px;height:140px;background:rgba(0,0,0,.5);border:1px solid #4ade80;border-radius:8px;overflow:hidden;z-index:100;display:none;}
.pfill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#22c55e,#fbbf24,#ef4444);height:0%;}
.spin-ctrl{position:fixed;left:4px;top:50%;transform:translateY(-50%);width:52px;height:52px;background:rgba(0,0,0,.5);border:1px solid rgba(74,222,128,.4);border-radius:50%;z-index:100;display:none;}
.spin-dot{position:absolute;width:8px;height:8px;background:#4ade80;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}
.spin-label{position:fixed;left:4px;top:calc(50% + 32px);font-size:.5rem;color:rgba(255,255,255,.4);z-index:100;display:none;text-align:center;width:52px;}
.hint{position:fixed;bottom:4px;left:0;right:0;text-align:center;font-size:.58rem;color:rgba(255,255,255,.35);z-index:100;}
.phase{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);font-size:.7rem;color:#4ade80;font-weight:700;z-index:100;}
.lobby{position:fixed;inset:0;background:rgba(0,8,0,.96);z-index:200;display:flex;align-items:center;justify-content:center;}
.lcard{background:#0c1f0c;border:2px solid #22c55e;border-radius:14px;padding:1.25rem;max-width:300px;width:90%;text-align:center;}
.lcard h2{font-family:'Bebas Neue',cursive;font-size:1.4rem;color:#4ade80;margin-bottom:.4rem;}
.wgrid{display:flex;gap:.25rem;flex-wrap:wrap;justify-content:center;margin:.4rem 0;}
.wbtn{padding:.35rem .6rem;border-radius:8px;border:1px solid rgba(251,191,36,.3);background:rgba(251,191,36,.08);color:#fbbf24;font-weight:700;font-size:.75rem;cursor:pointer;}
.wbtn.sel{background:rgba(251,191,36,.2);border-color:#fbbf24;}
.btn{padding:.5rem .9rem;border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;border:none;color:#000;width:100%;margin-top:.35rem;background:#22c55e;}
.go{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:none;align-items:center;justify-content:center;}
.gocard{background:#0c1f0c;border:2px solid #22c55e;border-radius:14px;padding:1.5rem;max-width:280px;width:90%;text-align:center;}
.gocard h2{font-family:'Bebas Neue',cursive;font-size:1.6rem;margin-bottom:.3rem;}
</style>
</head>
<body>
<div class="top"><a href="multiplayer-games.html">&larr;</a><h1>8-Ball Pool</h1><span style="font-size:.62rem;color:#fbbf24;font-weight:700;" id="myCoins">0</span></div>
<div class="info">
<div><span style="font-weight:700;" id="p1N">You</span> <span style="color:#4ade80;font-size:.58rem;" id="p1T"></span></div>
<div id="wI" style="color:#fbbf24;font-weight:700;"></div>
<div><span style="font-weight:700;" id="p2N">AI</span> <span style="color:#fbbf24;font-size:.58rem;" id="p2T"></span></div>
</div>
<div class="game-wrap"><canvas id="gc"></canvas></div>
<div class="pbar" id="pBar"><div class="pfill" id="pFill"></div></div>
<div class="spin-ctrl" id="spinCtrl" onclick="cycleSpin()"><div class="spin-dot" id="spinDot"></div></div>
<div class="spin-label" id="spinLabel">Center</div>
<div class="phase" id="phaseText"></div>
<div class="hint">Tap a ball to aim. Drag back for power. Release to shoot.</div>

<div class="lobby" id="lobby">
<div class="lcard">
<h2>8-Ball Pool</h2>
<p style="font-size:.72rem;color:rgba(255,255,255,.45);margin-bottom:.4rem;">Tap ball to aim. Drag back for power.</p>
<div style="font-size:.7rem;color:#fbbf24;margin-bottom:.25rem;">Coins: <span id="lC">0</span></div>
<div class="wgrid">
<div class="wbtn sel" onclick="setW(this,0)">Free</div>
<div class="wbtn" onclick="setW(this,10)">10</div>
<div class="wbtn" onclick="setW(this,25)">25</div>
<div class="wbtn" onclick="setW(this,50)">50</div>
<div class="wbtn" onclick="setW(this,100)">100</div>
</div>
<button class="btn" onclick="startGame()">Play vs AI</button>
</div>
</div>
<div class="go" id="goS"><div class="gocard"><h2 id="goT">Game Over</h2><p id="goM" style="font-size:.82rem;color:rgba(255,255,255,.5);margin-bottom:.4rem;"></p><div id="goC" style="font-size:1rem;color:#fbbf24;font-weight:700;margin-bottom:.6rem;"></div><button class="btn" onclick="location.reload()">Play Again</button></div></div>

<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f');
var OWN='cb556180-f032-4b21-9470-1d786f2664ab';
var user=null,coins=0,wager=0,myTurn=true,active=false;
var engine,world,balls=[],cue,pockets=[];
var TW,TH,BR,PR,CU;
var phase='idle',aimDir=null,power=0,spinX=0,spinY=0,spinMode=0;
var myType=null;
var SOLIDS=['#fbbf24','#2563eb','#ef4444','#7c3aed','#f97316','#22c55e','#7f1d1d'];
var STRIPES=['#fbbf24','#2563eb','#ef4444','#7c3aed','#f97316','#22c55e','#7f1d1d'];
var SPIN_MODES=[{x:0,y:0,n:'Center'},{x:0,y:-1,n:'Top'},{x:0,y:1,n:'Draw'},{x:-1,y:0,n:'Left'},{x:1,y:0,n:'Right'},{x:-1,y:-1,n:'Top-Left'},{x:1,y:-1,n:'Top-Right'},{x:-1,y:1,n:'Draw-Left'},{x:1,y:1,n:'Draw-Right'}];

(async function(){var s=await db.auth.getSession();if(s.data.session){user=s.data.session.user;var p=await db.from('profiles').select('coins,display_name,username').eq('user_id',user.id).single();if(p.data){coins=user.id===OWN?999999:(p.data.coins||0);document.getElementById('lC').textContent=coins.toLocaleString();document.getElementById('myCoins').textContent=coins.toLocaleString();document.getElementById('p1N').textContent=p.data.display_name||p.data.username||'You';}}})();

function setW(el,a){if(a>coins&&user&&user.id!==OWN){alert('Not enough coins.');return;}wager=a;document.querySelectorAll('.wbtn').forEach(function(b){b.classList.remove('sel');});el.classList.add('sel');}

function cycleSpin(){spinMode=(spinMode+1)%SPIN_MODES.length;var s=SPIN_MODES[spinMode];spinX=s.x;spinY=s.y;document.getElementById('spinLabel').textContent=s.n;var dot=document.getElementById('spinDot');dot.style.left=(50+s.x*16)+'%';dot.style.top=(50+s.y*16)+'%';}

function startGame(){
document.getElementById('lobby').style.display='none';
document.getElementById('wI').textContent=wager>0?wager+' coins':'Free';
initPhysics();rackBalls();active=true;myTurn=true;phase='idle';updateTurn();
document.getElementById('spinCtrl').style.display='block';
document.getElementById('spinLabel').style.display='block';
requestAnimationFrame(loop);
}

function initPhysics(){
var cv=document.getElementById('gc');
TW=Math.min(window.innerWidth-6,340);
TH=Math.min(window.innerHeight-52,TW*1.85);
if(TH>window.innerHeight-52){TH=window.innerHeight-52;TW=TH/1.85;}
cv.width=TW;cv.height=TH;
BR=TW*0.021;PR=BR*2.2;CU=BR*2.8;
engine=Matter.Engine.create({gravity:{x:0,y:0}});
world=engine.world;
var cw=CU;
Matter.World.add(world,[
Matter.Bodies.rectangle(TW/2,cw/2,TW-PR*3,cw,{isStatic:true,restitution:0.7,friction:0.03}),
Matter.Bodies.rectangle(TW/2,TH-cw/2,TW-PR*3,cw,{isStatic:true,restitution:0.7,friction:0.03}),
Matter.Bodies.rectangle(cw/2,TH/4,cw,TH/2-PR*2,{isStatic:true,restitution:0.7,friction:0.03}),
Matter.Bodies.rectangle(cw/2,TH*3/4,cw,TH/2-PR*2,{isStatic:true,restitution:0.7,friction:0.03}),
Matter.Bodies.rectangle(TW-cw/2,TH/4,cw,TH/2-PR*2,{isStatic:true,restitution:0.7,friction:0.03}),
Matter.Bodies.rectangle(TW-cw/2,TH*3/4,cw,TH/2-PR*2,{isStatic:true,restitution:0.7,friction:0.03})
]);
// 6 pockets: 4 corners + 2 side middles
pockets=[
{x:CU*.7,y:CU*.7},{x:TW-CU*.7,y:CU*.7},
{x:CU*.7,y:TH-CU*.7},{x:TW-CU*.7,y:TH-CU*.7},
{x:0,y:TH/2},{x:TW,y:TH/2}
];
var cv2=document.getElementById('gc');
cv2.addEventListener('touchstart',function(e){e.preventDefault();onDown(e.touches[0]);},{passive:false});
cv2.addEventListener('touchmove',function(e){e.preventDefault();onDrag(e.touches[0]);},{passive:false});
cv2.addEventListener('touchend',function(e){e.preventDefault();onRelease();},{passive:false});
cv2.addEventListener('mousedown',onDown);
cv2.addEventListener('mousemove',onDrag);
cv2.addEventListener('mouseup',onRelease);
}

function mkBall(x,y,n){var b=Matter.Bodies.circle(x,y,BR,{restitution:0.92,friction:0.04,frictionAir:0.017,density:0.002});b.num=n;b.sunk=false;Matter.World.add(world,b);balls.push(b);if(n===0)cue=b;return b;}

function rackBalls(){
balls=[];var cx=TW/2,cy=TH*0.28,d=BR*2.15;
var order=[1,9,2,10,8,11,3,12,6,13,4,14,5,15,7],ri=0;
for(var row=0;row<5;row++){for(var col=0;col<=row;col++){mkBall(cx+(col-row/2)*d,cy+row*d*0.866,order[ri++]);}}
mkBall(TW/2,TH*0.75,0);
}

// TWO-PHASE AIM
function onDown(e){
if(!active||!myTurn||!cue||cue.sunk)return;
var r=document.getElementById('gc').getBoundingClientRect();
var tx=e.clientX-r.left,ty=e.clientY-r.top;

if(phase==='aimed'){
// Already aimed - this touch starts power drag
phase='power';
document.getElementById('pBar').style.display='block';
document.getElementById('phaseText').textContent='Drag back for power...';
return;
}

// Phase 1: tap a ball to aim at it
var tapped=null;
for(var i=0;i<balls.length;i++){
if(balls[i].sunk||balls[i].num===0)continue;
var dx=balls[i].position.x-tx,dy=balls[i].position.y-ty;
if(Math.sqrt(dx*dx+dy*dy)<BR*4){tapped=balls[i];break;}
}
if(tapped){
var adx=tapped.position.x-cue.position.x;
var ady=tapped.position.y-cue.position.y;
var ad=Math.sqrt(adx*adx+ady*ady);
aimDir={x:adx/ad,y:ady/ad};
phase='aimed';
power=0;
document.getElementById('phaseText').textContent='Tap again to set power, or tap another ball';
}else{
// Tapped empty space while aimed - start power phase
if(phase==='aimed'){
phase='power';
document.getElementById('pBar').style.display='block';
document.getElementById('phaseText').textContent='Drag for power...';
}
}
}

function onDrag(e){
if(phase!=='aimed'&&phase!=='power')return;
if(!cue)return;
var r=document.getElementById('gc').getBoundingClientRect();
var mx=e.clientX-r.left,my=e.clientY-r.top;
// If dragging while aimed, enter power phase
if(phase==='aimed'){phase='power';document.getElementById('pBar').style.display='block';}
if(phase==='power'){
var dx=cue.position.x-mx,dy=cue.position.y-my;
power=Math.min(Math.sqrt(dx*dx+dy*dy)/TH*130,100);
document.getElementById('pFill').style.height=power+'%';
document.getElementById('phaseText').textContent='Power: '+Math.round(power)+'% - Release to shoot';
}
}

function onRelease(){
if(phase==='power'&&power>=5&&aimDir){
// SHOOT
var force=power*0.00022;
var fx=aimDir.x*force;
var fy=aimDir.y*force;
// Apply English (spin offset)
fx+=spinX*force*0.15;
fy+=spinY*force*0.15;
Matter.Body.applyForce(cue,cue.position,{x:fx,y:fy});
// Spin also applies angular velocity
if(spinX||spinY)Matter.Body.setAngularVelocity(cue,(spinX+spinY)*0.05);
phase='idle';aimDir=null;power=0;myTurn=false;
document.getElementById('pBar').style.display='none';
document.getElementById('phaseText').textContent='';
updateTurn();
setTimeout(waitStop,1200);
}else if(phase==='power'){
// Released too soft - cancel
phase='aimed';power=0;
document.getElementById('pBar').style.display='none';
document.getElementById('pFill').style.height='0%';
document.getElementById('phaseText').textContent='Tap again for power or tap another ball';
}
}

function waitStop(){
var moving=false;
for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&Matter.Vector.magnitude(balls[i].velocity)>0.2){moving=true;break;}}
if(moving){setTimeout(waitStop,350);return;}
checkSunk();
if(!active)return;
if(!myTurn)setTimeout(aiShot,500);
}

function checkSunk(){
var sunk=[];
for(var i=0;i<balls.length;i++){
if(balls[i].sunk)continue;
for(var j=0;j<pockets.length;j++){
var dx=balls[i].position.x-pockets[j].x,dy=balls[i].position.y-pockets[j].y;
if(Math.sqrt(dx*dx+dy*dy)<PR){balls[i].sunk=true;sunk.push(balls[i].num);Matter.World.remove(world,balls[i]);break;}
}}
if(cue&&cue.sunk){cue.sunk=false;Matter.Body.setPosition(cue,{x:TW/2,y:TH*0.75});Matter.Body.setVelocity(cue,{x:0,y:0});Matter.World.add(world,cue);myTurn=!myTurn;updateTurn();return;}
if(sunk.indexOf(8)!==-1){var ml=0;for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&balls[i].num!==0&&balls[i].num!==8){if(myType==='s'&&balls[i].num<8)ml++;if(myType==='t'&&balls[i].num>8)ml++;}}endGame(ml===0&&myTurn);return;}
if(!myType&&sunk.length>0){var n=sunk[0];if(n>0&&n<8)myType=myTurn?'s':'t';else if(n>8)myType=myTurn?'t':'s';}
var kept=false;for(var i=0;i<sunk.length;i++){var n=sunk[i];if(myType==='s'&&n>0&&n<8)kept=true;if(myType==='t'&&n>8)kept=true;}
if(!kept)myTurn=!myTurn;
updateTurn();
}

function aiShot(){
if(!active||!cue)return;
var tgt=null,bd=Infinity;
for(var i=0;i<balls.length;i++){if(balls[i].sunk||balls[i].num===0||balls[i].num===8)continue;var d=Matter.Vector.magnitude(Matter.Vector.sub(balls[i].position,cue.position));if(d<bd){bd=d;tgt=balls[i];}}
if(!tgt){for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&balls[i].num===8){tgt=balls[i];break;}}}
if(!tgt){myTurn=true;updateTurn();return;}
var dx=tgt.position.x-cue.position.x+(Math.random()-.5)*BR*3;
var dy=tgt.position.y-cue.position.y+(Math.random()-.5)*BR*3;
var d=Math.sqrt(dx*dx+dy*dy);
var f=0.01+Math.random()*0.012;
Matter.Body.applyForce(cue,cue.position,{x:dx/d*f,y:dy/d*f});
myTurn=true;updateTurn();setTimeout(waitStop,1200);
}

function updateTurn(){
document.getElementById('p1T').textContent=myTurn?'SHOOT':'';
document.getElementById('p2T').textContent=!myTurn?'THINKING':'';
if(myTurn)phase='idle';
document.getElementById('phaseText').textContent=myTurn?'Tap a ball to aim':'';
}

async function endGame(won){
active=false;document.getElementById('goS').style.display='flex';
document.getElementById('goT').textContent=won?'You Win!':'You Lose';
document.getElementById('goT').style.color=won?'#4ade80':'#ef4444';
document.getElementById('goM').textContent=won?'Great game!':'Better luck next time.';
document.getElementById('goC').textContent=wager>0?(won?'+'+wager*2+' coins':'-'+wager+' coins'):'';
if(wager>0&&user&&user.id!==OWN){try{var p=await db.from('profiles').select('coins').eq('user_id',user.id).single();if(p.data)await db.from('profiles').update({coins:Math.max(0,(p.data.coins||0)+(won?wager:-wager))}).eq('user_id',user.id);}catch(e){}}
try{await db.rpc('record_game_result',{p_user_id:user.id,p_game:'pool',p_won:won,p_coins:wager});}catch(e){}
}

function loop(){if(!engine)return;Matter.Engine.update(engine,1000/60);draw();requestAnimationFrame(loop);}

function draw(){
var cv=document.getElementById('gc'),ctx=cv.getContext('2d');
ctx.fillStyle='#0d7a3e';ctx.fillRect(0,0,TW,TH);
// Wood border
ctx.fillStyle='#3d1f0c';ctx.fillRect(0,0,TW,CU);ctx.fillRect(0,TH-CU,TW,CU);
ctx.fillRect(0,0,CU,TH);ctx.fillRect(TW-CU,0,CU,TH);
// Inner felt
ctx.fillStyle='#0a6b35';ctx.fillRect(CU,CU,TW-CU*2,TH-CU*2);
// Side pocket cuts
ctx.fillStyle='#3d1f0c';
ctx.fillRect(0,TH/2-PR,CU,PR*2);ctx.fillRect(TW-CU,TH/2-PR,CU,PR*2);
// Pockets
for(var i=0;i<pockets.length;i++){ctx.beginPath();ctx.arc(pockets[i].x,pockets[i].y,PR,0,Math.PI*2);ctx.fillStyle='#0a0a0a';ctx.fill();ctx.strokeStyle='#2a1508';ctx.lineWidth=2;ctx.stroke();}
// Diamonds
[[TW*.25,CU-1],[TW*.5,CU-1],[TW*.75,CU-1],[TW*.25,TH-CU+1],[TW*.5,TH-CU+1],[TW*.75,TH-CU+1],[CU-1,TH*.25],[CU-1,TH*.5],[CU-1,TH*.75],[TW-CU+1,TH*.25],[TW-CU+1,TH*.5],[TW-CU+1,TH*.75]].forEach(function(d){ctx.beginPath();ctx.arc(d[0],d[1],2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.2)';ctx.fill();});
// Balls
for(var i=0;i<balls.length;i++){
if(balls[i].sunk)continue;
var b=balls[i],n=b.num,x=b.position.x,y=b.position.y;
ctx.beginPath();ctx.arc(x+1,y+2,BR,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.2)';ctx.fill();
ctx.beginPath();ctx.arc(x,y,BR,0,Math.PI*2);
if(n===0){ctx.fillStyle='#f5f5f5';}
else if(n===8){ctx.fillStyle='#1a1a1a';}
else if(n<=7){ctx.fillStyle=SOLIDS[n-1];}
else{ctx.fillStyle='#f5f5f5';ctx.fill();ctx.beginPath();ctx.save();ctx.arc(x,y,BR,0,Math.PI*2);ctx.clip();ctx.fillStyle=STRIPES[n-9];ctx.fillRect(x-BR,y-BR*.35,BR*2,BR*.7);ctx.restore();ctx.beginPath();ctx.arc(x,y,BR,0,Math.PI*2);}
ctx.fill();
var g=ctx.createRadialGradient(x-BR*.25,y-BR*.25,BR*.05,x,y,BR);g.addColorStop(0,'rgba(255,255,255,.3)');g.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=g;ctx.fill();
ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=.5;ctx.stroke();
if(n>0){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,BR*.35,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.font='bold '+Math.round(BR*.6)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n,x,y+.5);}
}
// Aim line
if(phase==='aimed'||phase==='power'){
if(aimDir&&cue&&!cue.sunk){
ctx.beginPath();ctx.moveTo(cue.position.x,cue.position.y);
ctx.lineTo(cue.position.x+aimDir.x*TH*.45,cue.position.y+aimDir.y*TH*.45);
ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
// Ghost ball
ctx.beginPath();ctx.arc(cue.position.x+aimDir.x*TH*.15,cue.position.y+aimDir.y*TH*.15,BR,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;ctx.stroke();
// Cue stick
var pb=phase==='power'?power*.6:5;
var sx=cue.position.x-aimDir.x*(BR*2+pb);
var sy=cue.position.y-aimDir.y*(BR*2+pb);
var ex=cue.position.x-aimDir.x*(BR*2+pb+TW*.35);
var ey=cue.position.y-aimDir.y*(BR*2+pb+TW*.35);
ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);
ctx.strokeStyle='#6B3410';ctx.lineWidth=5;ctx.stroke();
ctx.strokeStyle='#C4A35A';ctx.lineWidth=2;ctx.stroke();
ctx.beginPath();ctx.arc(sx,sy,2.5,0,Math.PI*2);ctx.fillStyle='#7EC8E3';ctx.fill();
}}
}
</script>
<script src="scripts.js" defer></script>
</body>
</html>
