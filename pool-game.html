<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pool -- 8BFR Games</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
#bubbleStack,#_8bfr_copyright,.bubble-row,#carrieWrap,#avatarSwitcher,.global-avatar{display:none!important;}
body{font-family:'Work Sans',sans-serif;background:#071a07;color:#fff;height:100vh;height:100dvh;overflow:hidden;touch-action:none;user-select:none;}
#gameDiv{position:fixed;top:0;left:0;right:0;bottom:0;}
.hud{position:fixed;top:0;left:0;right:70px;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:.15rem .5rem;background:rgba(0,10,0,.88);height:24px;font-size:.58rem;}
.hud a{color:#4ade80;text-decoration:none;font-weight:800;font-size:1.1rem;}
.hud .t{font-family:'Bebas Neue',cursive;color:#4ade80;font-size:.82rem;}
.hud .c{color:#fbbf24;font-weight:700;font-size:.6rem;}
.turn-hud{position:fixed;top:24px;left:0;right:70px;z-index:99;text-align:center;padding:.08rem;background:rgba(0,8,0,.82);font-size:.58rem;height:16px;}
.ctrl-pwr{position:fixed;right:3px;top:50%;transform:translateY(-50%);width:20px;height:140px;z-index:110;display:none;flex-direction:column;align-items:center;}
.pwr-trk{width:12px;flex:1;background:rgba(0,0,0,.5);border:1px solid rgba(74,222,128,.4);border-radius:8px;position:relative;overflow:hidden;}
.pwr-fl{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#22c55e,#fbbf24,#ef4444);height:50%;}
.ctrl-spin{position:fixed;left:3px;bottom:34px;width:44px;height:44px;z-index:110;display:none;}
.sp-ring{width:44px;height:44px;border:2px solid rgba(74,222,238,.35);border-radius:50%;position:relative;background:rgba(0,0,0,.4);}
.sp-dot{position:absolute;width:8px;height:8px;background:#4ade80;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}
.sp-lbl{font-size:.4rem;color:rgba(255,255,255,.35);text-align:center;}
.ctrl-shoot{position:fixed;right:3px;bottom:34px;z-index:110;display:none;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;font-weight:800;font-size:.55rem;border:2px solid rgba(255,255,255,.2);cursor:pointer;}
.ctrl-shoot:active{transform:scale(.9);}
.bot-bar{position:fixed;bottom:0;left:0;right:0;height:28px;background:rgba(0,8,0,.82);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:rgba(255,255,255,.4);z-index:99;}
/* Lobby */
.lobby{position:fixed;inset:0;background:rgba(0,8,0,.97);z-index:200;display:flex;align-items:center;justify-content:center;}
.lc{background:#0c1f0c;border:2px solid #22c55e;border-radius:14px;padding:1.2rem;max-width:320px;width:92%;text-align:center;}
.lc h2{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:#4ade80;margin-bottom:.4rem;}
.mode-grid{display:flex;gap:.3rem;margin-bottom:.5rem;}
.mode-btn{flex:1;padding:.5rem .2rem;border-radius:10px;border:2px solid rgba(74,222,128,.3);background:rgba(74,222,128,.06);color:#4ade80;font-weight:700;font-size:.7rem;cursor:pointer;text-align:center;}
.mode-btn.sel{background:rgba(74,222,128,.15);border-color:#22c55e;}
.mode-btn small{display:block;font-size:.5rem;color:rgba(255,255,255,.4);font-weight:400;margin-top:.1rem;}
.wg{display:flex;gap:.2rem;flex-wrap:wrap;justify-content:center;margin:.3rem 0;}
.wb{padding:.28rem .5rem;border-radius:8px;border:1px solid rgba(251,191,36,.3);background:rgba(251,191,36,.08);color:#fbbf24;font-weight:700;font-size:.68rem;cursor:pointer;}
.wb.sel{background:rgba(251,191,36,.2);border-color:#fbbf24;}
.btn{padding:.5rem .8rem;border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;border:none;color:#000;width:100%;margin-top:.3rem;background:#22c55e;}
/* Game Over */
.go{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:none;align-items:center;justify-content:center;}
.goc{background:#0c1f0c;border:2px solid #22c55e;border-radius:14px;padding:1.5rem;max-width:280px;width:90%;text-align:center;}
.goc h2{font-family:'Bebas Neue',cursive;font-size:1.5rem;margin-bottom:.3rem;}
</style>
</head>
<body>
<div id="gameDiv"></div>
<div class="hud"><a href="multiplayer-games.html">&larr;</a><span class="t" id="gameTitle">8-Ball Pool</span><span style="color:rgba(255,255,255,.3);font-size:.4rem;">8BFR</span><span class="c" id="mc">0</span></div>
<div class="turn-hud"><span id="p1N" style="color:#4ade80;">You</span> vs <span id="p2N" style="color:#fbbf24;">AI</span> &mdash; <span id="turnText" style="color:#4ade80;">Your shot</span></div>
<div class="ctrl-pwr" id="pwrBox"><div class="pwr-trk" id="pwrTrk"><div class="pwr-fl" id="pwrFl"></div></div></div>
<div class="ctrl-spin" id="spinBox"><div class="sp-ring" id="spRing"><div class="sp-dot" id="spDot"></div></div><div class="sp-lbl" id="spLbl">Spin</div></div>
<button class="ctrl-shoot" id="shootBtn" onclick="doShoot()">SHOOT</button>
<div class="bot-bar" id="botBar">Touch table to aim. Set power + spin. SHOOT.</div>

<div class="lobby" id="lobby">
<div class="lc">
<h2>8BFR Pool</h2>
<div class="mode-grid">
<div class="mode-btn sel" onclick="setMode('8ball',this)">8-Ball<small>Classic</small></div>
<div class="mode-btn" onclick="setMode('9ball',this)">9-Ball<small>Rotation</small></div>
<div class="mode-btn" onclick="setMode('trick',this)">Trick Shot<small>Banks only</small></div>
</div>
<p style="font-size:.65rem;color:rgba(255,255,255,.35);margin-bottom:.3rem;" id="modeDesc">Sink all your balls (solids or stripes) then the 8-ball.</p>
<div style="font-size:.65rem;color:#fbbf24;margin-bottom:.2rem;">Coins: <span id="lC">0</span></div>
<div class="wg">
<div class="wb sel" onclick="setW(this,0)">Free</div>
<div class="wb" onclick="setW(this,10)">10</div>
<div class="wb" onclick="setW(this,25)">25</div>
<div class="wb" onclick="setW(this,50)">50</div>
<div class="wb" onclick="setW(this,100)">100</div>
</div>
<button class="btn" onclick="startGame()">Break!</button>
</div>
</div>
<div class="go" id="goS"><div class="goc"><h2 id="goT"></h2><p id="goM" style="font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:.4rem;"></p><div id="goC" style="font-size:1rem;color:#fbbf24;font-weight:700;margin-bottom:.6rem;"></div><button class="btn" onclick="location.reload()">Play Again</button></div></div>

<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f');
var OWN='cb556180-f032-4b21-9470-1d786f2664ab';
var user=null,coins=0,wager=0,gameMode='8ball';
var game=null,scene=null,myTurn=true,active=false;
var aimAngle=0,power=50,spinX=0,spinY=0,myType=null;
var balls=[],cueBall=null,pockets=[],cushionBounces=0;
var TW,TH,BR,PR,CW;
var dSpin=false,dPwr=false;
var SOL=['#fbbf24','#2563eb','#ef4444','#7c3aed','#f97316','#22c55e','#7f1d1d'];
var STR=['#fbbf24','#2563eb','#ef4444','#7c3aed','#f97316','#22c55e','#7f1d1d'];
var DESCS={'8ball':'Sink all your balls (solids or stripes) then the 8-ball.','9ball':'Hit lowest numbered ball first. Sink the 9 to win.','trick':'Only bank/kick shots count! Straight-in shots put the ball back. Sink the 8 with a trick shot to win.'};

(async function(){var s=await db.auth.getSession();if(s.data.session){user=s.data.session.user;var p=await db.from('profiles').select('coins,display_name,username').eq('user_id',user.id).single();if(p.data){coins=user.id===OWN?999999:(p.data.coins||0);document.getElementById('lC').textContent=coins.toLocaleString();document.getElementById('mc').textContent=coins.toLocaleString();document.getElementById('p1N').textContent=p.data.display_name||p.data.username||'You';}}})();

function setMode(m,el){gameMode=m;document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('sel');});el.classList.add('sel');document.getElementById('modeDesc').textContent=DESCS[m];document.getElementById('gameTitle').textContent=m==='8ball'?'8-Ball Pool':m==='9ball'?'9-Ball Pool':'Trick Shot';}
function setW(el,a){if(a>coins&&user&&user.id!==OWN){alert('Not enough coins.');return;}wager=a;document.querySelectorAll('.wb').forEach(function(b){b.classList.remove('sel');});el.classList.add('sel');}

function startGame(){
document.getElementById('lobby').style.display='none';
TW=Math.min(window.innerWidth,360);
TH=Math.min(window.innerHeight-28,TW*1.78);
if(TH>window.innerHeight-28){TH=window.innerHeight-28;TW=TH/1.78;}
BR=TW*.025;PR=BR*2.2;CW=BR*3;

var config={
type:Phaser.CANVAS,
width:TW,height:TH,
parent:'gameDiv',
backgroundColor:'#0d7a3e',
physics:{default:'matter',matter:{gravity:{x:0,y:0},debug:false}},
scene:{create:createScene,update:updateScene}
};
game=new Phaser.Game(config);
}

function createScene(){
scene=this;
var m=this.matter;
// Walls - split for side pockets
var opts={isStatic:true,restitution:.9,friction:.01};
m.add.rectangle(TW/2,CW/2,TW-PR*3,CW,opts);// top
m.add.rectangle(TW/2,TH-CW/2,TW-PR*3,CW,opts);// bottom
m.add.rectangle(CW/2,TH*.25,CW,TH*.42-PR,opts);// left top
m.add.rectangle(CW/2,TH*.75,CW,TH*.42-PR,opts);// left bottom
m.add.rectangle(TW-CW/2,TH*.25,CW,TH*.42-PR,opts);// right top
m.add.rectangle(TW-CW/2,TH*.75,CW,TH*.42-PR,opts);// right bottom

// Pockets: 4 corners + 2 sides
pockets=[{x:CW*.5,y:CW*.5},{x:TW-CW*.5,y:CW*.5},{x:CW*.5,y:TH-CW*.5},{x:TW-CW*.5,y:TH-CW*.5},{x:0,y:TH/2},{x:TW,y:TH/2}];

// Track cushion bounces for trick shot mode
this.matter.world.on('collisionstart',function(event){
event.pairs.forEach(function(pair){
var labels=[pair.bodyA.label,pair.bodyB.label];
if(labels.indexOf('cueball')!==-1&&(pair.bodyA.isStatic||pair.bodyB.isStatic)){cushionBounces++;}
});
});

rackBalls(this);
active=true;myTurn=true;showCtrls();updateTurn();

// Touch to aim
this.input.on('pointerdown',function(p){if(!myTurn||!active||!cueBall)return;aimAt(p.x,p.y);});
this.input.on('pointermove',function(p){if(!myTurn||!active||!cueBall||!p.isDown)return;aimAt(p.x,p.y);});

// Power bar
setupPwrSpin();
}

function aimAt(tx,ty){
if(!cueBall||!cueBall.body)return;
aimAngle=Math.atan2(ty-cueBall.y,tx-cueBall.x);
}

function rackBalls(sc){
balls=[];
var cx=TW/2,cy=TH*.35,d=BR*2.12;
if(gameMode==='9ball'){
// 9-ball diamond rack
var order9=[1,2,3,4,9,5,6,7,8];
var positions=[[0,0],[-1,1],[1,1],[-2,2],[0,2],[2,2],[-1,3],[1,3],[0,4]];
for(var i=0;i<9;i++){makeBall(sc,cx+positions[i][0]*d*.5,cy-positions[i][1]*d*.866,order9[i]);}
} else {
// Standard triangle - apex facing cue ball (bottom)
var order=[1,9,2,10,8,11,3,12,6,13,4,14,5,15,7],ri=0;
for(var row=0;row<5;row++){for(var col=0;col<=row;col++){makeBall(sc,cx+(col-row/2)*d,cy-row*d*.866,order[ri++]);}}
}
// Cue ball
cueBall=makeBall(sc,TW/2,TH*.72,0);
cueBall.body.label='cueball';
}

function makeBall(sc,x,y,num){
var b=sc.matter.add.circle(x,y,BR,{restitution:.94,friction:.01,frictionAir:.014,density:.003,label:'ball'+num});
b.num=num;b.sunk=false;b.gameObject=null;
balls.push(b);
return b;
}

function updateScene(){
if(!active)return;
drawTable(this);
drawBalls(this);
if(myTurn&&cueBall&&!cueBall.sunk)drawAim(this);
// Check if all balls stopped
if(!myTurn){
var moving=false;
for(var i=0;i<balls.length;i++){
if(!balls[i].sunk){
var v=balls[i].body?balls[i].body.velocity:{x:0,y:0};
if(Math.abs(v.x)>.08||Math.abs(v.y)>.08){moving=true;break;}
}
}
if(!moving){onTurnEnd();}
}
// Check pocketed
for(var i=0;i<balls.length;i++){
if(balls[i].sunk)continue;
for(var j=0;j<pockets.length;j++){
var dx=balls[i].body.position.x-pockets[j].x;
var dy=balls[i].body.position.y-pockets[j].y;
if(Math.sqrt(dx*dx+dy*dy)<PR){
balls[i].sunk=true;
balls[i]._pocketTime=Date.now();
this.matter.world.remove(balls[i].body);
}
}
}
}

function drawTable(sc){
var g=sc.add.graphics();g.clear();
// Wood border
g.fillStyle(0x3d1f0c);g.fillRect(0,0,TW,TH);
// Playing surface
g.fillStyle(0x0a6b35);g.fillRect(CW,CW,TW-CW*2,TH-CW*2);
// Side pocket notches
g.fillStyle(0x3d1f0c);g.fillRect(0,TH/2-PR,CW+1,PR*2);g.fillRect(TW-CW-1,TH/2-PR,CW+1,PR*2);
// Pockets
for(var i=0;i<6;i++){g.fillStyle(0x080808);g.fillCircle(pockets[i].x,pockets[i].y,PR);g.lineStyle(2,0x2a1508);g.strokeCircle(pockets[i].x,pockets[i].y,PR);}
// Diamonds
var dm=[[TW*.25,CW*.4],[TW*.5,CW*.4],[TW*.75,CW*.4],[TW*.25,TH-CW*.4],[TW*.5,TH-CW*.4],[TW*.75,TH-CW*.4],[CW*.4,TH*.2],[CW*.4,TH*.4],[CW*.4,TH*.6],[CW*.4,TH*.8],[TW-CW*.4,TH*.2],[TW-CW*.4,TH*.4],[TW-CW*.4,TH*.6],[TW-CW*.4,TH*.8]];
dm.forEach(function(d){g.fillStyle(0xffffff,0.18);g.fillCircle(d[0],d[1],1.5);});
// Head string
g.lineStyle(1,0xffffff,0.06);
var gfx=sc.add.graphics();gfx.lineStyle(1,0xffffff,0.06);
g.destroy();
}

function drawBalls(sc){
var g=sc.add.graphics();g.clear();
for(var i=0;i<balls.length;i++){
if(balls[i].sunk)continue;
var b=balls[i],n=b.num,x=b.body.position.x,y=b.body.position.y;
// Shadow
g.fillStyle(0x000000,0.25);g.fillCircle(x+1,y+2,BR);
// Ball
if(n===0){g.fillStyle(0xf8f8f8);g.fillCircle(x,y,BR);}
else if(n===8){g.fillStyle(0x111111);g.fillCircle(x,y,BR);}
else if(n<=7){
var col=parseInt(SOL[n-1].replace('#',''),16);
g.fillStyle(col);g.fillCircle(x,y,BR);
} else {
// Stripe
g.fillStyle(0xf0f0f0);g.fillCircle(x,y,BR);
var col=parseInt(STR[n-9].replace('#',''),16);
g.fillStyle(col);g.fillRect(x-BR,y-BR*.42,BR*2,BR*.84);
// Clip to circle by redrawing edges
g.fillStyle(0x0a6b35);
// top/bottom arcs - approximate with rects outside circle
}
// Highlight
g.fillStyle(0xffffff,0.2);g.fillCircle(x-BR*.25,y-BR*.25,BR*.4);
// Number
if(n>0){
g.fillStyle(0xffffff);g.fillCircle(x,y,BR*.38);
if(!sc._numTexts)sc._numTexts={};
if(!sc._numTexts[n]){
sc._numTexts[n]=sc.add.text(x,y,n+'',{fontSize:Math.max(7,Math.round(BR*.7))+'px',fontFamily:'sans-serif',fontStyle:'bold',color:'#000'}).setOrigin(.5,.5);
} else {
sc._numTexts[n].setPosition(x,y);
}
}
}
g.destroy();
}

function drawAim(sc){
var g=sc.add.graphics();
var dx=Math.cos(aimAngle),dy=Math.sin(aimAngle);
var cx=cueBall.body.position.x,cy=cueBall.body.position.y;
// Dotted aim line
g.lineStyle(1,0xffffff,0.25);
for(var i=0;i<20;i++){
var sx=cx+dx*(BR+i*8),sy=cy+dy*(BR+i*8);
g.fillStyle(0xffffff,0.2);g.fillCircle(sx,sy,1);
}
// Cue stick
var stx=cx-dx*(BR+8),sty=cy-dy*(BR+8);
var etx=cx-dx*(BR+8+TW*.4),ety=cy-dy*(BR+8+TW*.4);
g.lineStyle(5,0x5C2D0A);g.lineBetween(stx,sty,etx,ety);
g.lineStyle(2,0xB8860B);g.lineBetween(stx,sty,etx,ety);
// Tip
g.fillStyle(0x87CEEB);g.fillCircle(stx,sty,3);
g.destroy();
}

window.doShoot=function(){
if(!myTurn||!active||!cueBall||cueBall.sunk)return;
cushionBounces=0;
var force=power*.0007;
var fx=Math.cos(aimAngle)*force+spinX*force*.15;
var fy=Math.sin(aimAngle)*force+spinY*force*.15;
scene.matter.body.applyForce(cueBall.body,cueBall.body.position,{x:fx,y:fy});
if(spinX||spinY)scene.matter.body.setAngularVelocity(cueBall.body,(spinX+spinY)*.05);
myTurn=false;hideCtrls();updateTurn();
};

function onTurnEnd(){
var sunkThisTurn=[];
for(var i=0;i<balls.length;i++){
if(balls[i].sunk&&balls[i]._pocketTime&&Date.now()-balls[i]._pocketTime<5000){
sunkThisTurn.push(balls[i].num);balls[i]._pocketTime=0;
}
}
// Scratch
if(cueBall&&cueBall.sunk){
cueBall.sunk=false;
var nb=scene.matter.add.circle(TW/2,TH*.72,BR,{restitution:.94,friction:.01,frictionAir:.014,density:.003,label:'cueball'});
nb.num=0;nb.sunk=false;
cueBall.body=nb;
cueBall=nb;cueBall.num=0;cueBall.sunk=false;
balls=balls.filter(function(b){return b.num!==0;});
balls.push(cueBall);
myTurn=!myTurn;updateTurn();if(myTurn)showCtrls();return;
}
// 8-ball sunk
if(sunkThisTurn.indexOf(8)!==-1){
if(gameMode==='trick'){
endGame(cushionBounces>=1&&myTurn);return;
}
var ml=0;for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&balls[i].num!==0&&balls[i].num!==8){if(myType==='s'&&balls[i].num<8)ml++;if(myType==='t'&&balls[i].num>8)ml++;}}
endGame(ml===0&&myTurn);return;
}
// 9-ball sunk (9-ball mode)
if(gameMode==='9ball'&&sunkThisTurn.indexOf(9)!==-1){endGame(myTurn);return;}
// Trick shot mode - check if shot was a trick shot
if(gameMode==='trick'&&sunkThisTurn.length>0){
if(cushionBounces<1){
// Not a trick shot - put balls back
document.getElementById('botBar').textContent='Not a trick shot! Ball returned.';
// Can't easily undelete in matter, so just note it
}
}
// Assign types (8-ball mode)
if(gameMode==='8ball'&&!myType&&sunkThisTurn.length>0){
var n=sunkThisTurn[0];
if(n>0&&n<8)myType=myTurn?'s':'t';
else if(n>8)myType=myTurn?'t':'s';
if(myType)document.getElementById('botBar').textContent='You: '+(myType==='s'?'Solids 1-7':'Stripes 9-15');
}
// Keep turn?
var kept=false;
for(var i=0;i<sunkThisTurn.length;i++){
var n=sunkThisTurn[i];
if(gameMode==='8ball'){if(myType==='s'&&n>0&&n<8)kept=true;if(myType==='t'&&n>8)kept=true;}
else if(gameMode==='9ball'){if(n>0)kept=true;}
else{if(cushionBounces>=1&&n>0)kept=true;}
}
if(!kept)myTurn=!myTurn;
updateTurn();
if(myTurn)showCtrls();
else setTimeout(aiShot,500);
}

function aiShot(){
if(!active||!cueBall||cueBall.sunk)return;
var tgt=null,bd=Infinity;
var validNums=gameMode==='9ball'?getLowestBall():null;
for(var i=0;i<balls.length;i++){
if(balls[i].sunk||balls[i].num===0||balls[i].num===8)continue;
if(gameMode==='9ball'&&balls[i].num!==validNums)continue;
var bpos=balls[i].body?balls[i].body.position:{x:0,y:0};
var cpos=cueBall.body?cueBall.body.position:{x:0,y:0};
var d=Math.sqrt(Math.pow(bpos.x-cpos.x,2)+Math.pow(bpos.y-cpos.y,2));
if(d<bd){bd=d;tgt=balls[i];}
}
if(!tgt){for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&balls[i].num===8){tgt=balls[i];break;}}}
if(!tgt){myTurn=true;updateTurn();showCtrls();return;}
var dx=tgt.body.position.x-cueBall.body.position.x+(Math.random()-.5)*BR*2;
var dy=tgt.body.position.y-cueBall.body.position.y+(Math.random()-.5)*BR*2;
var d=Math.sqrt(dx*dx+dy*dy);
var f=.018+Math.random()*.025;
scene.matter.body.applyForce(cueBall.body,cueBall.body.position,{x:dx/d*f,y:dy/d*f});
myTurn=true;updateTurn();
}

function getLowestBall(){
var lowest=99;
for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&balls[i].num>0&&balls[i].num<lowest)lowest=balls[i].num;}
return lowest;
}

function showCtrls(){document.getElementById('pwrBox').style.display='flex';document.getElementById('spinBox').style.display='block';document.getElementById('shootBtn').style.display='block';}
function hideCtrls(){document.getElementById('pwrBox').style.display='none';document.getElementById('spinBox').style.display='none';document.getElementById('shootBtn').style.display='none';}
function updateTurn(){document.getElementById('turnText').textContent=myTurn?'Your shot':'AI thinking...';document.getElementById('turnText').style.color=myTurn?'#4ade80':'#fbbf24';if(myTurn)document.getElementById('botBar').textContent='Touch to aim. Power + spin. SHOOT.';}

function setupPwrSpin(){
var pt=document.getElementById('pwrTrk');
pt.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();dPwr=true;setPwr(e.touches[0]);},{passive:false});
pt.addEventListener('touchmove',function(e){e.preventDefault();e.stopPropagation();if(dPwr)setPwr(e.touches[0]);},{passive:false});
pt.addEventListener('touchend',function(e){e.preventDefault();dPwr=false;},{passive:false});
pt.addEventListener('mousedown',function(e){dPwr=true;setPwr(e);});
var sr=document.getElementById('spRing');
sr.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();dSpin=true;setSpin(e.touches[0]);},{passive:false});
sr.addEventListener('touchmove',function(e){e.preventDefault();e.stopPropagation();if(dSpin)setSpin(e.touches[0]);},{passive:false});
sr.addEventListener('touchend',function(e){e.preventDefault();dSpin=false;},{passive:false});
sr.addEventListener('mousedown',function(e){dSpin=true;setSpin(e);});
document.addEventListener('mousemove',function(e){if(dPwr)setPwr(e);if(dSpin)setSpin(e);});
document.addEventListener('mouseup',function(){dPwr=false;dSpin=false;});
}
function setPwr(e){var r=document.getElementById('pwrTrk').getBoundingClientRect();power=Math.max(5,Math.min(100,Math.round((1-(e.clientY-r.top)/r.height)*100)));document.getElementById('pwrFl').style.height=power+'%';}
function setSpin(e){var r=document.getElementById('spRing').getBoundingClientRect();var cx=r.left+r.width/2,cy=r.top+r.height/2;var dx=(e.clientX-cx)/(r.width/2),dy=(e.clientY-cy)/(r.height/2);var d=Math.sqrt(dx*dx+dy*dy);if(d>1){dx/=d;dy/=d;}spinX=Math.round(dx*10)/10;spinY=Math.round(dy*10)/10;document.getElementById('spDot').style.left=(50+dx*35)+'%';document.getElementById('spDot').style.top=(50+dy*35)+'%';var l='';if(Math.abs(spinY)>.2)l=spinY<0?'Top':'Draw';if(Math.abs(spinX)>.2)l+=(l?' ':'')+(spinX<0?'L':'R');document.getElementById('spLbl').textContent=l||'Spin';}

async function endGame(won){
active=false;hideCtrls();
document.getElementById('goS').style.display='flex';
document.getElementById('goT').textContent=won?'You Win!':'You Lose';document.getElementById('goT').style.color=won?'#4ade80':'#ef4444';
document.getElementById('goM').textContent=won?'Nice shooting!':'Better luck next time.';
document.getElementById('goC').textContent=wager>0?(won?'+'+wager*2+' coins':'-'+wager+' coins'):'';
if(wager>0&&user&&user.id!==OWN){try{var p=await db.from('profiles').select('coins').eq('user_id',user.id).single();if(p.data)await db.from('profiles').update({coins:Math.max(0,(p.data.coins||0)+(won?wager:-wager))}).eq('user_id',user.id);}catch(e){}}
var gn=gameMode==='9ball'?'pool-9ball':gameMode==='trick'?'pool-trickshot':'pool-8ball';
try{await db.rpc('record_game_result',{p_user_id:user.id,p_game:gn,p_won:won,p_coins:wager});}catch(e){}
}
</script>
