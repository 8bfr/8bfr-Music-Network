<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>8-Ball Pool -- 8BFR Games</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:#071a07;color:#e8f5e9;height:100vh;height:100dvh;overflow:hidden;touch-action:none;}
.top{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:.4rem .6rem;background:rgba(0,15,0,.9);}
.top a{color:#4ade80;text-decoration:none;font-weight:600;font-size:.75rem;}
.top h1{font-family:'Bebas Neue',cursive;font-size:1rem;color:#4ade80;}
.info-bar{position:fixed;top:32px;left:0;right:0;z-index:99;display:flex;justify-content:space-between;padding:.2rem .5rem;background:rgba(0,10,0,.85);font-size:.7rem;}
.p-name{font-weight:700;}.p-turn{color:#4ade80;font-size:.6rem;}
.game-wrap{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:#071a07;}
canvas{touch-action:none;}
.power-bar{position:fixed;right:6px;top:50%;transform:translateY(-50%);width:16px;height:150px;background:rgba(0,0,0,.5);border:1px solid #4ade80;border-radius:8px;overflow:hidden;z-index:100;display:none;}
.power-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#22c55e,#fbbf24,#ef4444);height:0%;transition:height .05s;}
.hint{position:fixed;bottom:8px;left:0;right:0;text-align:center;font-size:.65rem;color:rgba(255,255,255,.4);z-index:100;}
.lobby{position:fixed;inset:0;background:rgba(0,10,0,.95);z-index:200;display:flex;align-items:center;justify-content:center;}
.lobby-card{background:#0c1f0c;border:2px solid #22c55e;border-radius:16px;padding:1.5rem;max-width:320px;width:90%;text-align:center;}
.lobby-card h2{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:#4ade80;margin-bottom:.5rem;}
.wager-grid{display:flex;gap:.3rem;flex-wrap:wrap;justify-content:center;margin:.5rem 0;}
.wager-btn{padding:.4rem .7rem;border-radius:8px;border:1px solid rgba(251,191,36,.3);background:rgba(251,191,36,.08);color:#fbbf24;font-weight:700;font-size:.78rem;cursor:pointer;}
.wager-btn.sel{background:rgba(251,191,36,.2);border-color:#fbbf24;}
.btn{padding:.55rem 1rem;border-radius:10px;font-weight:700;font-size:.85rem;cursor:pointer;border:none;color:#fff;width:100%;margin-top:.4rem;}
.btn-g{background:#22c55e;color:#000;}
.go{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:none;align-items:center;justify-content:center;}
.go-card{background:#0c1f0c;border:2px solid #22c55e;border-radius:16px;padding:1.5rem;max-width:300px;width:90%;text-align:center;}
.go-card h2{font-family:'Bebas Neue',cursive;font-size:1.8rem;margin-bottom:.3rem;}
</style>
</head>
<body>
<div class="top">
<a href="multiplayer-games.html">&larr; Back</a>
<h1>8-Ball Pool</h1>
<span style="font-size:.65rem;color:#fbbf24;font-weight:700;" id="myCoins">0</span>
</div>
<div class="info-bar">
<div><span class="p-name" id="p1N">You</span> <span class="p-turn" id="p1T"></span></div>
<div id="wInfo" style="color:#fbbf24;font-weight:700;"></div>
<div><span class="p-name" id="p2N">AI</span> <span class="p-turn" id="p2T"></span></div>
</div>
<div class="game-wrap"><canvas id="gc"></canvas></div>
<div class="power-bar" id="pBar"><div class="power-fill" id="pFill"></div></div>
<div class="hint" id="hint">Tap a ball to aim, then drag back and release to shoot</div>

<div class="lobby" id="lobby">
<div class="lobby-card">
<h2>8-Ball Pool</h2>
<p style="font-size:.78rem;color:rgba(255,255,255,.5);margin-bottom:.5rem;">Tap a ball to aim. Drag back for power. Release to shoot.</p>
<div style="font-size:.75rem;color:#fbbf24;margin-bottom:.3rem;">Coins: <span id="lCoins">0</span></div>
<div class="wager-grid">
<div class="wager-btn sel" onclick="setW(this,0)">Free</div>
<div class="wager-btn" onclick="setW(this,10)">10</div>
<div class="wager-btn" onclick="setW(this,25)">25</div>
<div class="wager-btn" onclick="setW(this,50)">50</div>
<div class="wager-btn" onclick="setW(this,100)">100</div>
</div>
<button class="btn btn-g" onclick="startGame()">Play vs AI</button>
</div>
</div>

<div class="go" id="goScreen">
<div class="go-card">
<h2 id="goTitle">Game Over</h2>
<p id="goMsg" style="font-size:.85rem;color:rgba(255,255,255,.6);margin-bottom:.5rem;"></p>
<div id="goCoins" style="font-size:1.1rem;color:#fbbf24;font-weight:700;margin-bottom:.75rem;"></div>
<button class="btn btn-g" onclick="location.reload()">Play Again</button>
</div>
</div>

<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f');
var OWNER='cb556180-f032-4b21-9470-1d786f2664ab';
var user=null,coins=0,wager=0,myTurn=true,active=false;
var engine,world,balls=[],cueBall,pockets=[];
var TW,TH,BR,PR,CU;
var aiming=false,aimTarget=null,dragStart=null,power=0;
var myType=null;

var SOLID_COLORS=['#fbbf24','#2563eb','#ef4444','#7c3aed','#f97316','#22c55e','#7f1d1d'];
var STRIPE_COLORS=['#fbbf24','#2563eb','#ef4444','#7c3aed','#f97316','#22c55e','#7f1d1d'];

(async function(){
var s=await db.auth.getSession();
if(s.data.session){user=s.data.session.user;
var p=await db.from('profiles').select('coins,display_name,username').eq('user_id',user.id).single();
if(p.data){coins=user.id===OWNER?999999:(p.data.coins||0);
document.getElementById('lCoins').textContent=coins.toLocaleString();
document.getElementById('myCoins').textContent=coins.toLocaleString();
document.getElementById('p1N').textContent=p.data.display_name||p.data.username||'You';}}
})();

function setW(el,a){if(a>coins&&user&&user.id!==OWNER){alert('Not enough coins.');return;}wager=a;document.querySelectorAll('.wager-btn').forEach(function(b){b.classList.remove('sel');});el.classList.add('sel');}

function startGame(){
document.getElementById('lobby').style.display='none';
document.getElementById('wInfo').textContent=wager>0?wager+' coins':'Free';
initPhysics();rackBalls();active=true;myTurn=true;updateTurn();
requestAnimationFrame(loop);
}

function initPhysics(){
var cv=document.getElementById('gc');
// Vertical table - portrait orientation
TW=Math.min(window.innerWidth-8,340);
TH=Math.min(window.innerHeight-60,TW*1.8);
if(TH>window.innerHeight-60){TH=window.innerHeight-60;TW=TH/1.8;}
cv.width=TW;cv.height=TH;
BR=TW*0.022;PR=BR*2.3;CU=BR*2.5;

engine=Matter.Engine.create({gravity:{x:0,y:0}});
world=engine.world;

// Cushions (vertical table)
var cw=CU;
Matter.World.add(world,[
Matter.Bodies.rectangle(TW/2,cw/2,TW-PR*3,cw,{isStatic:true,restitution:0.7,friction:0.04,label:'wall'}),
Matter.Bodies.rectangle(TW/2,TH-cw/2,TW-PR*3,cw,{isStatic:true,restitution:0.7,friction:0.04,label:'wall'}),
Matter.Bodies.rectangle(cw/2,TH/2,cw,TH-PR*3,{isStatic:true,restitution:0.7,friction:0.04,label:'wall'}),
Matter.Bodies.rectangle(TW-cw/2,TH/2,cw,TH-PR*3,{isStatic:true,restitution:0.7,friction:0.04,label:'wall'})
]);

// 6 pockets
var px=[CU,TW/2,TW-CU];
var py=[CU,TH-CU];
for(var i=0;i<px.length;i++){for(var j=0;j<py.length;j++){pockets.push({x:px[i],y:py[j]});}}

// Touch events
cv.addEventListener('touchstart',function(e){e.preventDefault();onDown(e.touches[0]);},{passive:false});
cv.addEventListener('touchmove',function(e){e.preventDefault();onMove(e.touches[0]);},{passive:false});
cv.addEventListener('touchend',function(e){e.preventDefault();onUp();},{passive:false});
cv.addEventListener('mousedown',onDown);
cv.addEventListener('mousemove',onMove);
cv.addEventListener('mouseup',onUp);
}

function makeBall(x,y,num){
var b=Matter.Bodies.circle(x,y,BR,{restitution:0.92,friction:0.04,frictionAir:0.018,density:0.002,label:'b'+num});
b.num=num;b.sunk=false;
Matter.World.add(world,b);
balls.push(b);
if(num===0)cueBall=b;
return b;
}

function rackBalls(){
balls=[];
// Rack at top of vertical table
var cx=TW/2,cy=TH*0.25;
var d=BR*2.15;
var order=[1,9,2,10,8,11,3,12,6,13,4,14,5,15,7];
var ri=0;
for(var row=0;row<5;row++){
for(var col=0;col<=row;col++){
var bx=cx+(col-row/2)*d;
var by=cy+row*d*0.866;
makeBall(bx,by,order[ri++]);
}}
// Cue ball at bottom
makeBall(TW/2,TH*0.75,0);
}

// TAP-TO-AIM: tap a ball to snap aim line to it
function onDown(e){
if(!active||!myTurn||!cueBall||cueBall.sunk)return;
var r=document.getElementById('gc').getBoundingClientRect();
var tx=e.clientX-r.left,ty=e.clientY-r.top;

// Check if tapped on a target ball
var tapped=null;
for(var i=0;i<balls.length;i++){
if(balls[i].sunk||balls[i].num===0)continue;
var dx=balls[i].position.x-tx,dy=balls[i].position.y-ty;
if(Math.sqrt(dx*dx+dy*dy)<BR*3){tapped=balls[i];break;}
}

if(tapped){
// Snap aim to this ball
aimTarget={x:tapped.position.x,y:tapped.position.y};
aiming=true;
dragStart={x:tx,y:ty};
document.getElementById('pBar').style.display='block';
document.getElementById('hint').textContent='Drag back for power, release to shoot';
}else{
// Manual aim - drag from anywhere
aiming=true;
dragStart={x:tx,y:ty};
aimTarget=null;
document.getElementById('pBar').style.display='block';
}
}

function onMove(e){
if(!aiming||!cueBall)return;
var r=document.getElementById('gc').getBoundingClientRect();
var mx=e.clientX-r.left,my=e.clientY-r.top;
dragStart={x:mx,y:my};

if(!aimTarget){
// Free aim - aim opposite of drag direction
aimTarget={x:cueBall.position.x-(mx-cueBall.position.x),y:cueBall.position.y-(my-cueBall.position.y)};
}

var dx=cueBall.position.x-mx,dy=cueBall.position.y-my;
power=Math.min(Math.sqrt(dx*dx+dy*dy)/TH*120,100);
document.getElementById('pFill').style.height=power+'%';
}

function onUp(){
if(!aiming||!cueBall)return;
aiming=false;
document.getElementById('pBar').style.display='none';
document.getElementById('hint').textContent='Tap a ball to aim, then drag back and release to shoot';

if(power<5){aimTarget=null;power=0;return;}

var dx,dy;
if(aimTarget){
dx=aimTarget.x-cueBall.position.x;
dy=aimTarget.y-cueBall.position.y;
}else{
dx=cueBall.position.x-dragStart.x;
dy=cueBall.position.y-dragStart.y;
}
var dist=Math.sqrt(dx*dx+dy*dy);
if(dist<1){aimTarget=null;power=0;return;}

var force=power*0.00025;
Matter.Body.applyForce(cueBall,cueBall.position,{x:dx/dist*force,y:dy/dist*force});
myTurn=false;power=0;aimTarget=null;
updateTurn();
setTimeout(waitStop,1500);
}

function waitStop(){
var moving=false;
for(var i=0;i<balls.length;i++){
if(!balls[i].sunk&&Matter.Vector.magnitude(balls[i].velocity)>0.25){moving=true;break;}
}
if(moving){setTimeout(waitStop,400);return;}
checkPocketed();
if(!active)return;
if(!myTurn){setTimeout(aiShot,600);}
}

function checkPocketed(){
var sunk=[];
for(var i=0;i<balls.length;i++){
if(balls[i].sunk)continue;
for(var j=0;j<pockets.length;j++){
var dx=balls[i].position.x-pockets[j].x,dy=balls[i].position.y-pockets[j].y;
if(Math.sqrt(dx*dx+dy*dy)<PR){
balls[i].sunk=true;sunk.push(balls[i].num);
Matter.World.remove(world,balls[i]);break;
}}}

// Scratch
if(cueBall&&cueBall.sunk){
cueBall.sunk=false;
Matter.Body.setPosition(cueBall,{x:TW/2,y:TH*0.75});
Matter.Body.setVelocity(cueBall,{x:0,y:0});
Matter.World.add(world,cueBall);
myTurn=!myTurn;updateTurn();return;
}

// 8-ball sunk
if(sunk.indexOf(8)!==-1){
var myLeft=0;
for(var i=0;i<balls.length;i++){
if(!balls[i].sunk&&balls[i].num!==0&&balls[i].num!==8){
if(myType==='solids'&&balls[i].num<8)myLeft++;
if(myType==='stripes'&&balls[i].num>8)myLeft++;
}}
endGame(myLeft===0&&myTurn);return;
}

// Assign types
if(!myType&&sunk.length>0){
var n=sunk[0];
if(n>0&&n<8){myType=myTurn?'solids':'stripes';}
else if(n>8){myType=myTurn?'stripes':'solids';}
}

// Keep turn if sunk own ball
var kept=false;
for(var i=0;i<sunk.length;i++){
var n=sunk[i];
if(myType==='solids'&&n>0&&n<8)kept=true;
if(myType==='stripes'&&n>8)kept=true;
}
if(!kept)myTurn=!myTurn;
updateTurn();
}

function aiShot(){
if(!active||!cueBall)return;
var target=null,bestD=Infinity;
for(var i=0;i<balls.length;i++){
if(balls[i].sunk||balls[i].num===0||balls[i].num===8)continue;
var d=Matter.Vector.magnitude(Matter.Vector.sub(balls[i].position,cueBall.position));
if(d<bestD){bestD=d;target=balls[i];}
}
if(!target){for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&balls[i].num===8){target=balls[i];break;}}}
if(!target){myTurn=true;updateTurn();return;}

var dx=target.position.x-cueBall.position.x+((Math.random()-.5)*BR*2);
var dy=target.position.y-cueBall.position.y+((Math.random()-.5)*BR*2);
var d=Math.sqrt(dx*dx+dy*dy);
var f=0.012+Math.random()*0.01;
Matter.Body.applyForce(cueBall,cueBall.position,{x:dx/d*f,y:dy/d*f});
myTurn=true;updateTurn();
setTimeout(waitStop,1500);
}

function updateTurn(){
document.getElementById('p1T').textContent=myTurn?'YOUR TURN':'';
document.getElementById('p2T').textContent=!myTurn?'THINKING':'';
}

async function endGame(won){
active=false;
document.getElementById('goScreen').style.display='flex';
document.getElementById('goTitle').textContent=won?'You Win!':'You Lose';
document.getElementById('goTitle').style.color=won?'#4ade80':'#ef4444';
document.getElementById('goMsg').textContent=won?'Great shot!':'Better luck next time.';
document.getElementById('goCoins').textContent=wager>0?(won?'+'+wager*2+' coins':'-'+wager+' coins'):'Free Play';
if(wager>0&&user&&user.id!==OWNER){
try{var p=await db.from('profiles').select('coins').eq('user_id',user.id).single();
if(p.data)await db.from('profiles').update({coins:Math.max(0,(p.data.coins||0)+(won?wager:-wager))}).eq('user_id',user.id);}catch(e){}
}
try{await db.rpc('record_game_result',{p_user_id:user.id,p_game:'pool',p_won:won,p_coins:wager});}catch(e){}
}

function loop(){
if(!engine)return;
Matter.Engine.update(engine,1000/60);
draw();
requestAnimationFrame(loop);
}

function draw(){
var cv=document.getElementById('gc'),ctx=cv.getContext('2d');
// Felt
ctx.fillStyle='#0d7a3e';ctx.fillRect(0,0,TW,TH);
// Wood border
ctx.fillStyle='#3d1f0c';
ctx.fillRect(0,0,TW,CU);ctx.fillRect(0,TH-CU,TW,CU);
ctx.fillRect(0,0,CU,TH);ctx.fillRect(TW-CU,0,CU,TH);
// Inner felt with subtle pattern
ctx.fillStyle='#0a6b35';ctx.fillRect(CU,CU,TW-CU*2,TH-CU*2);
// Center line
ctx.strokeStyle='rgba(255,255,255,.08)';ctx.setLineDash([4,4]);
ctx.beginPath();ctx.moveTo(CU,TH*0.5);ctx.lineTo(TW-CU,TH*0.5);ctx.stroke();
ctx.setLineDash([]);
// Diamond markers
var diamonds=[[TW/2,CU+2],[TW/2,TH-CU-2],[CU+2,TH/2],[TW-CU-2,TH/2]];
diamonds.forEach(function(d){ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.arc(d[0],d[1],3,0,Math.PI*2);ctx.fill();});

// Pockets
for(var i=0;i<pockets.length;i++){
ctx.beginPath();ctx.arc(pockets[i].x,pockets[i].y,PR,0,Math.PI*2);
ctx.fillStyle='#111';ctx.fill();
ctx.strokeStyle='#2a1508';ctx.lineWidth=2;ctx.stroke();
}

// Balls
for(var i=0;i<balls.length;i++){
if(balls[i].sunk)continue;
var b=balls[i],n=b.num,x=b.position.x,y=b.position.y;
// Shadow
ctx.beginPath();ctx.arc(x+1,y+2,BR,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.25)';ctx.fill();
// Ball
ctx.beginPath();ctx.arc(x,y,BR,0,Math.PI*2);
if(n===0){ctx.fillStyle='#fff';}
else if(n===8){ctx.fillStyle='#1a1a1a';}
else if(n<=7){ctx.fillStyle=SOLID_COLORS[n-1];}
else{
// Stripe: white base with colored stripe
ctx.fillStyle='#fff';ctx.fill();
ctx.beginPath();ctx.arc(x,y,BR,0,Math.PI*2);
ctx.save();ctx.clip();
ctx.fillStyle=STRIPE_COLORS[n-9];
ctx.fillRect(x-BR,y-BR*0.4,BR*2,BR*0.8);
ctx.restore();
ctx.beginPath();ctx.arc(x,y,BR,0,Math.PI*2);
}
ctx.fill();
// Glossy highlight
var grad=ctx.createRadialGradient(x-BR*0.3,y-BR*0.3,BR*0.1,x,y,BR);
grad.addColorStop(0,'rgba(255,255,255,.35)');grad.addColorStop(1,'rgba(255,255,255,0)');
ctx.fillStyle=grad;ctx.fill();
// Border
ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;ctx.stroke();
// Number
if(n>0){
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,BR*0.38,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#000';ctx.font='bold '+Math.round(BR*0.65)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(n,x,y+1);
}
}

// Aim line
if(aiming&&cueBall&&!cueBall.sunk&&aimTarget){
ctx.beginPath();
ctx.moveTo(cueBall.position.x,cueBall.position.y);
var adx=aimTarget.x-cueBall.position.x,ady=aimTarget.y-cueBall.position.y;
var ad=Math.sqrt(adx*adx+ady*ady);
if(ad>0){
// Dotted aim line
ctx.setLineDash([3,3]);
ctx.lineTo(cueBall.position.x+adx/ad*TH*0.5,cueBall.position.y+ady/ad*TH*0.5);
ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=1;ctx.stroke();
ctx.setLineDash([]);

// Cue stick (pulls back based on power)
var pullBack=power*0.5;
var sx=cueBall.position.x-adx/ad*(BR*2+pullBack);
var sy=cueBall.position.y-ady/ad*(BR*2+pullBack);
var ex=cueBall.position.x-adx/ad*(BR*2+pullBack+TW*0.3);
var ey=cueBall.position.y-ady/ad*(BR*2+pullBack+TW*0.3);
ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);
ctx.strokeStyle='#8B4513';ctx.lineWidth=5;ctx.stroke();
ctx.strokeStyle='#D2B48C';ctx.lineWidth=2;ctx.stroke();
// Cue tip
ctx.beginPath();ctx.arc(sx,sy,2,0,Math.PI*2);ctx.fillStyle='#87CEEB';ctx.fill();
}
}
}
</script>
<script src="scripts.js" defer></script>
</body>
</html>
