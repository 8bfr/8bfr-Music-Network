<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pool Practice -- 8BFR Games</title><link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
#bubbleStack,#_8bfr_copyright,.bubble-row,#carrieWrap,#avatarSwitcher,.global-avatar,.avatar-wrap,#pageUpBtn{display:none!important;}
body{font-family:'Work Sans',sans-serif;background:#071a07;color:#fff;height:100vh;height:100dvh;overflow:hidden;touch-action:none;user-select:none;}
.bar{position:fixed;top:0;left:0;right:70px;z-index:100;display:flex;align-items:center;gap:.3rem;padding:.15rem .4rem;background:rgba(0,10,0,.9);height:24px;font-size:.55rem;}
.bar a{color:#4ade80;text-decoration:none;font-weight:800;font-size:1rem;}
.bar .t{font-family:'Bebas Neue',cursive;color:#4ade80;font-size:.8rem;flex:1;}
.bar .mode{color:#fbbf24;font-weight:600;}
.info{position:fixed;top:24px;left:0;right:70px;z-index:99;text-align:center;padding:.1rem;background:rgba(0,8,0,.82);font-size:.55rem;height:16px;color:rgba(255,255,255,.5);}
.gw{position:fixed;top:40px;left:0;right:0;bottom:28px;display:flex;align-items:center;justify-content:center;}
canvas{touch-action:none;}
.bot{position:fixed;bottom:0;left:0;right:0;height:28px;background:rgba(0,8,0,.82);display:flex;align-items:center;justify-content:center;gap:.4rem;font-size:.55rem;color:rgba(255,255,255,.4);z-index:99;}
.pwr{position:fixed;right:3px;top:45%;transform:translateY(-50%);width:18px;height:130px;z-index:110;flex-direction:column;align-items:center;display:flex;}
.pwr-t{width:10px;flex:1;background:rgba(0,0,0,.5);border:1px solid rgba(74,222,128,.35);border-radius:6px;position:relative;overflow:hidden;}
.pwr-f{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#22c55e,#fbbf24,#ef4444);height:50%;}
.sht{position:fixed;right:2px;bottom:32px;z-index:110;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;font-weight:800;font-size:.5rem;border:2px solid rgba(255,255,255,.2);cursor:pointer;}
.sht:active{transform:scale(.9);}
.lobby{position:fixed;inset:0;background:rgba(0,8,0,.97);z-index:200;display:flex;align-items:center;justify-content:center;}
.lc{background:#0c1f0c;border:2px solid #22c55e;border-radius:14px;padding:1rem;max-width:300px;width:90%;text-align:center;}
.lc h2{font-family:'Bebas Neue',cursive;font-size:1.4rem;color:#4ade80;margin-bottom:.3rem;}
.mg{display:flex;gap:.2rem;margin-bottom:.4rem;}
.mb{flex:1;padding:.4rem .15rem;border-radius:8px;border:2px solid rgba(74,222,128,.3);background:rgba(74,222,128,.06);color:#4ade80;font-weight:700;font-size:.65rem;cursor:pointer;text-align:center;}
.mb.sel{background:rgba(74,222,128,.15);border-color:#22c55e;}
.mb small{display:block;font-size:.45rem;color:rgba(255,255,255,.35);font-weight:400;}
.btn{padding:.45rem .7rem;border-radius:10px;font-weight:700;font-size:.78rem;cursor:pointer;border:none;color:#000;width:100%;margin-top:.25rem;background:#22c55e;}
</style></head><body>
<div class="bar"><a href="multiplayer-games.html">&larr;</a><span class="t" id="gT">8-Ball Practice</span><span class="mode" id="mL">Practice Mode</span></div>
<div class="info" id="inf">Touch table to aim, set power, tap SHOOT. Balls sunk: <span id="sunk">0</span>/15</div>
<div class="gw"><canvas id="cv"></canvas></div>
<div class="bot"><span>Touch to aim</span><span>|</span><span>Power bar right</span><span>|</span><span>SHOOT button</span></div>
<div class="pwr" id="pw"><div class="pwr-t" id="pt"><div class="pwr-f" id="pf"></div></div></div>
<button class="sht" id="sh" onclick="shoot()">SHOOT</button>

<div class="lobby" id="lob"><div class="lc"><h2>8BFR Pool Practice</h2>
<div class="mg"><div class="mb sel" onclick="sM('8b',this)">8-Ball<small>15 balls</small></div><div class="mb" onclick="sM('9b',this)">9-Ball<small>9 balls</small></div><div class="mb" onclick="sM('ts',this)">Trick<small>Banks only</small></div></div>
<p style="font-size:.6rem;color:rgba(255,255,255,.3);margin-bottom:.3rem;" id="md">Practice sinking all balls. No opponent.</p>
<button class="btn" onclick="start()">Start Practice</button>
</div></div>

<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f');
var mode='8b',engine,world,balls=[],cue,pockets=[];
var TW,TH,BR,PR,CW,aim=0,pwr=50,on=false,sunkCount=0,bounces=0,totalBalls=15;
var MDS={'8b':'Practice sinking all balls.','9b':'Sink balls in order, lowest first.','ts':'Only bank shots count! Must hit cushion first.'};
function sM(m,e){mode=m;document.querySelectorAll('.mb').forEach(function(b){b.classList.remove('sel');});e.classList.add('sel');document.getElementById('md').textContent=MDS[m];document.getElementById('gT').textContent=m==='8b'?'8-Ball Practice':m==='9b'?'9-Ball Practice':'Trick Shot Practice';}
function start(){document.getElementById('lob').style.display='none';init();on=true;}

function init(){
var cv=document.getElementById('cv');
TW=Math.min(window.innerWidth-24,310);TH=Math.min(window.innerHeight-76,TW*1.78);
if(TH>window.innerHeight-76){TH=window.innerHeight-76;TW=TH/1.78;}
cv.width=TW;cv.height=TH;BR=TW*.026;PR=BR*2.3;CW=BR*2.5;
if(engine)Matter.Engine.clear(engine);
engine=Matter.Engine.create({gravity:{x:0,y:0}});world=engine.world;
var o={isStatic:true,restitution:.88,friction:.01};
Matter.World.add(world,[
Matter.Bodies.rectangle(TW/2,CW/2,TW-PR*3,CW,o),Matter.Bodies.rectangle(TW/2,TH-CW/2,TW-PR*3,CW,o),
Matter.Bodies.rectangle(CW/2,TH*.25,CW,TH*.42-PR,o),Matter.Bodies.rectangle(CW/2,TH*.75,CW,TH*.42-PR,o),
Matter.Bodies.rectangle(TW-CW/2,TH*.25,CW,TH*.42-PR,o),Matter.Bodies.rectangle(TW-CW/2,TH*.75,CW,TH*.42-PR,o)]);
pockets=[{x:CW*.5,y:CW*.5},{x:TW-CW*.5,y:CW*.5},{x:CW*.5,y:TH-CW*.5},{x:TW-CW*.5,y:TH-CW*.5},{x:0,y:TH/2},{x:TW,y:TH/2}];
Matter.Events.on(engine,'collisionStart',function(ev){ev.pairs.forEach(function(p){if((p.bodyA.label==='cue'||p.bodyB.label==='cue')&&(p.bodyA.isStatic||p.bodyB.isStatic))bounces++;});});
balls=[];sunkCount=0;
var cx=TW/2,cy=TH*.33,d=BR*2.08;
if(mode==='9b'){
var o9=[1,2,3,4,9,5,6,7,8],ps=[[0,0],[-1,1],[1,1],[-2,2],[0,2],[2,2],[-1,3],[1,3],[0,4]];
for(var i=0;i<9;i++)mkB(cx+ps[i][0]*d*.5,cy-ps[i][1]*d*.866,o9[i]);
totalBalls=9;
}else{
var or=[1,9,2,10,8,11,3,12,6,13,4,14,5,15,7],ri=0;
for(var r=0;r<5;r++)for(var c=0;c<=r;c++)mkB(cx+(c-r/2)*d,cy-r*d*.866,or[ri++]);
totalBalls=15;
}
mkB(TW/2,TH*.73,0);
document.getElementById('sunk').textContent='0';
cv.ontouchstart=function(e){e.preventDefault();ta(e.touches[0]);};
cv.ontouchmove=function(e){e.preventDefault();ta(e.touches[0]);};
cv.ontouchend=function(e){e.preventDefault();};
cv.onmousedown=function(e){ta(e);};cv.onmousemove=function(e){if(e.buttons)ta(e);};
var pt=document.getElementById('pt');
pt.ontouchstart=function(e){e.preventDefault();e.stopPropagation();spw(e.touches[0]);};
pt.ontouchmove=function(e){e.preventDefault();e.stopPropagation();spw(e.touches[0]);};
pt.onmousedown=function(e){spw(e);};
requestAnimationFrame(loop);
}
function ta(e){if(!on||!cue||cue.sunk)return;var r=document.getElementById('cv').getBoundingClientRect();aim=Math.atan2(e.clientY-r.top-cue.position.y,e.clientX-r.left-cue.position.x);}
function spw(e){var r=document.getElementById('pt').getBoundingClientRect();pwr=Math.max(5,Math.min(100,Math.round((1-(e.clientY-r.top)/r.height)*100)));document.getElementById('pf').style.height=pwr+'%';}
function mkB(x,y,n){var b=Matter.Bodies.circle(x,y,BR,{restitution:.94,friction:.01,frictionAir:.013,density:.003,label:n===0?'cue':'b'+n});b.num=n;b.sunk=false;Matter.World.add(world,b);balls.push(b);if(n===0)cue=b;}
window.shoot=function(){
if(!on||!cue||cue.sunk)return;bounces=0;
var f=pwr*.0007;
Matter.Body.applyForce(cue,cue.position,{x:Math.cos(aim)*f,y:Math.sin(aim)*f});
setTimeout(wait,600);
};
function wait(){
var mv=false;for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&(Math.abs(balls[i].velocity.x)>.1||Math.abs(balls[i].velocity.y)>.1)){mv=true;break;}}
if(mv){setTimeout(wait,200);return;}
// Check pocketed
for(var i=0;i<balls.length;i++){if(balls[i].sunk)continue;for(var j=0;j<pockets.length;j++){var dx=balls[i].position.x-pockets[j].x,dy=balls[i].position.y-pockets[j].y;if(Math.sqrt(dx*dx+dy*dy)<PR){
if(balls[i].num===0){// Scratch
balls[i].sunk=false;Matter.Body.setPosition(balls[i],{x:TW/2,y:TH*.73});Matter.Body.setVelocity(balls[i],{x:0,y:0});
document.getElementById('inf').textContent='Scratch! Cue ball repositioned.';
}else{
if(mode==='ts'&&bounces<1){// Trick shot fail
document.getElementById('inf').textContent='Not a trick shot! Must hit cushion first.';
}else{
balls[i].sunk=true;sunkCount++;Matter.World.remove(world,balls[i]);
document.getElementById('sunk').textContent=sunkCount;
if(sunkCount>=totalBalls-(mode==='8b'||mode==='ts'?1:0)){document.getElementById('inf').textContent='All balls sunk! Great practice!';}
}}break;}}}
document.getElementById('inf').textContent='Balls sunk: '+sunkCount+'/'+totalBalls+(mode==='ts'?' (banks only)':'');
}
function loop(){if(!engine)return;Matter.Engine.update(engine,1e3/60);draw();requestAnimationFrame(loop);}
function draw(){
var cv=document.getElementById('cv'),c=cv.getContext('2d');
var SC=['#fbbf24','#2563eb','#ef4444','#7c3aed','#f97316','#22c55e','#7f1d1d'];
c.fillStyle='#0d7a3e';c.fillRect(0,0,TW,TH);
c.fillStyle='#3d1f0c';c.fillRect(0,0,TW,CW);c.fillRect(0,TH-CW,TW,CW);c.fillRect(0,0,CW,TH);c.fillRect(TW-CW,0,CW,TH);
c.fillStyle='#0a6b35';c.fillRect(CW,CW,TW-CW*2,TH-CW*2);
c.fillStyle='#3d1f0c';c.fillRect(0,TH/2-PR,CW+1,PR*2);c.fillRect(TW-CW-1,TH/2-PR,CW+1,PR*2);
for(var i=0;i<6;i++){c.beginPath();c.arc(pockets[i].x,pockets[i].y,PR,0,Math.PI*2);c.fillStyle='#080808';c.fill();c.strokeStyle='#2a1508';c.lineWidth=2;c.stroke();}
for(var i=0;i<balls.length;i++){
if(balls[i].sunk)continue;var b=balls[i],n=b.num,x=b.position.x,y=b.position.y;
c.beginPath();c.arc(x+1,y+2,BR,0,Math.PI*2);c.fillStyle='rgba(0,0,0,.25)';c.fill();
c.beginPath();c.arc(x,y,BR,0,Math.PI*2);
if(n===0)c.fillStyle='#f8f8f8';
else if(n===8)c.fillStyle='#111';
else if(n<=7)c.fillStyle=SC[n-1];
else{c.fillStyle='#f0f0f0';c.fill();c.save();c.beginPath();c.arc(x,y,BR,0,Math.PI*2);c.clip();c.fillStyle=SC[n-9];c.fillRect(x-BR,y-BR*.4,BR*2,BR*.8);c.restore();c.beginPath();c.arc(x,y,BR,0,Math.PI*2);}
c.fill();var g=c.createRadialGradient(x-BR*.3,y-BR*.3,0,x,y,BR);g.addColorStop(0,'rgba(255,255,255,.3)');g.addColorStop(1,'rgba(255,255,255,0)');c.fillStyle=g;c.fill();
c.strokeStyle='rgba(0,0,0,.12)';c.lineWidth=.5;c.stroke();
if(n>0){c.beginPath();c.arc(x,y,BR*.36,0,Math.PI*2);c.fillStyle='#fff';c.fill();c.fillStyle='#000';c.font='bold '+Math.max(7,Math.round(BR*.7))+'px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText(n,x,y+.5);}
}
if(cue&&!cue.sunk){var dx=Math.cos(aim),dy=Math.sin(aim),cx2=cue.position.x,cy2=cue.position.y;
for(var i=1;i<20;i++){c.fillStyle='rgba(255,255,255,.15)';c.beginPath();c.arc(cx2+dx*(BR+i*6),cy2+dy*(BR+i*6),1,0,Math.PI*2);c.fill();}
var sx=cx2-dx*(BR+6),sy=cy2-dy*(BR+6),ex=cx2-dx*(BR+TW*.35),ey=cy2-dy*(BR+TW*.35);
c.beginPath();c.moveTo(sx,sy);c.lineTo(ex,ey);c.strokeStyle='#5C2D0A';c.lineWidth=5;c.stroke();
c.beginPath();c.moveTo(sx,sy);c.lineTo(ex,ey);c.strokeStyle='#B8860B';c.lineWidth=2;c.stroke();
c.beginPath();c.arc(sx,sy,2.5,0,Math.PI*2);c.fillStyle='#87CEEB';c.fill();
}
}
</script>
<script src="scripts.js" defer></script>
</body></html>
