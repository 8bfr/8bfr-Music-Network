<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pool -- 8BFR Games</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
#bubbleStack,#_8bfr_copyright,.bubble-row,#carrieWrap,#avatarSwitcher,.global-avatar,.avatar-wrap,#pageUpBtn{display:none!important;}
body{font-family:'Work Sans',sans-serif;background:#071a07;color:#fff;height:100vh;height:100dvh;overflow:hidden;touch-action:none;user-select:none;}
.bar{position:fixed;top:0;left:0;right:70px;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:.15rem .5rem;background:rgba(0,10,0,.9);height:24px;font-size:.58rem;}
.bar a{color:#4ade80;text-decoration:none;font-weight:800;font-size:1.1rem;}.bar .t{font-family:'Bebas Neue',cursive;color:#4ade80;font-size:.8rem;}.bar .c{color:#fbbf24;font-weight:700;font-size:.58rem;}
.turn{position:fixed;top:24px;left:0;right:70px;z-index:99;text-align:center;padding:.08rem;background:rgba(0,8,0,.82);font-size:.58rem;height:16px;}
.gw{position:fixed;top:40px;left:0;right:0;bottom:28px;display:flex;align-items:center;justify-content:center;}
canvas{touch-action:none;}
.bot{position:fixed;bottom:0;left:0;right:0;height:28px;background:rgba(0,8,0,.82);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:rgba(255,255,255,.4);z-index:99;}
.pwr{position:fixed;right:3px;top:50%;transform:translateY(-50%);width:20px;height:140px;z-index:110;display:none;flex-direction:column;align-items:center;}
.pwr-t{width:12px;flex:1;background:rgba(0,0,0,.5);border:1px solid rgba(74,222,128,.4);border-radius:8px;position:relative;overflow:hidden;}
.pwr-f{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#22c55e,#fbbf24,#ef4444);height:50%;}
.spin-c{position:fixed;left:3px;bottom:34px;width:44px;height:44px;z-index:110;display:none;}
.sp-r{width:44px;height:44px;border:2px solid rgba(74,222,128,.35);border-radius:50%;position:relative;background:rgba(0,0,0,.4);}
.sp-d{position:absolute;width:8px;height:8px;background:#4ade80;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}
.sp-l{font-size:.4rem;color:rgba(255,255,255,.35);text-align:center;}
.sht{position:fixed;right:3px;bottom:34px;z-index:110;display:none;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;font-weight:800;font-size:.55rem;border:2px solid rgba(255,255,255,.2);cursor:pointer;}
.sht:active{transform:scale(.9);}
.lobby{position:fixed;inset:0;background:rgba(0,8,0,.97);z-index:200;display:flex;align-items:center;justify-content:center;}
.lc{background:#0c1f0c;border:2px solid #22c55e;border-radius:14px;padding:1.2rem;max-width:320px;width:92%;text-align:center;}
.lc h2{font-family:'Bebas Neue',cursive;font-size:1.4rem;color:#4ade80;margin-bottom:.3rem;}
.mg{display:flex;gap:.25rem;margin-bottom:.4rem;}
.mb{flex:1;padding:.45rem .2rem;border-radius:10px;border:2px solid rgba(74,222,128,.3);background:rgba(74,222,128,.06);color:#4ade80;font-weight:700;font-size:.68rem;cursor:pointer;text-align:center;}
.mb.sel{background:rgba(74,222,128,.15);border-color:#22c55e;}
.mb small{display:block;font-size:.48rem;color:rgba(255,255,255,.4);font-weight:400;margin-top:.05rem;}
.wg{display:flex;gap:.2rem;flex-wrap:wrap;justify-content:center;margin:.3rem 0;}
.wb{padding:.28rem .5rem;border-radius:8px;border:1px solid rgba(251,191,36,.3);background:rgba(251,191,36,.08);color:#fbbf24;font-weight:700;font-size:.68rem;cursor:pointer;}.wb.sel{background:rgba(251,191,36,.2);border-color:#fbbf24;}
.btn{padding:.5rem .8rem;border-radius:10px;font-weight:700;font-size:.8rem;cursor:pointer;border:none;color:#000;width:100%;margin-top:.3rem;background:#22c55e;}
.go{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:none;align-items:center;justify-content:center;}
.goc{background:#0c1f0c;border:2px solid #22c55e;border-radius:14px;padding:1.5rem;max-width:280px;width:90%;text-align:center;}
.goc h2{font-family:'Bebas Neue',cursive;font-size:1.5rem;margin-bottom:.3rem;}
</style>
</head>
<body>
<div class="bar"><a href="multiplayer-games.html">&larr;</a><span class="t" id="gT">8-Ball Pool</span><span style="color:rgba(255,255,255,.3);font-size:.38rem;">8BFR</span><span class="c" id="mc">0</span></div>
<div class="turn"><span id="p1" style="color:#4ade80;">You</span> vs <span style="color:#fbbf24;">AI</span> - <span id="tt" style="color:#4ade80;">Your shot</span></div>
<div class="gw"><canvas id="cv"></canvas></div>
<div class="bot" id="bb">Touch to aim. Power + spin. SHOOT.</div>
<div class="pwr" id="pw"><div class="pwr-t" id="pt"><div class="pwr-f" id="pf"></div></div></div>
<div class="spin-c" id="sb"><div class="sp-r" id="sr"><div class="sp-d" id="sd"></div></div><div class="sp-l" id="sl">Spin</div></div>
<button class="sht" id="sh" onclick="shoot()">SHOOT</button>

<div class="lobby" id="lob"><div class="lc"><h2>8BFR Pool</h2>
<div class="mg"><div class="mb sel" onclick="sM('8b',this)">8-Ball<small>Classic</small></div><div class="mb" onclick="sM('9b',this)">9-Ball<small>Rotation</small></div><div class="mb" onclick="sM('ts',this)">Trick Shot<small>Banks only</small></div></div>
<p style="font-size:.62rem;color:rgba(255,255,255,.35);margin-bottom:.3rem;" id="md">Sink your balls then the 8.</p>
<div style="font-size:.65rem;color:#fbbf24;margin-bottom:.2rem;">Coins: <span id="lC">0</span></div>
<div class="wg"><div class="wb sel" onclick="sW(this,0)">Free</div><div class="wb" onclick="sW(this,10)">10</div><div class="wb" onclick="sW(this,25)">25</div><div class="wb" onclick="sW(this,50)">50</div><div class="wb" onclick="sW(this,100)">100</div></div>
<button class="btn" onclick="go()">Break!</button></div></div>
<div class="go" id="gs"><div class="goc"><h2 id="gt2"></h2><p id="gm" style="font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:.4rem;"></p><div id="gc" style="font-size:1rem;color:#fbbf24;font-weight:700;margin-bottom:.6rem;"></div><button class="btn" onclick="location.reload()">Play Again</button></div></div>

<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f');
var OW='cb556180-f032-4b21-9470-1d786f2664ab',user=null,coins=0,wager=0,mode='8b';
var engine,world,balls=[],cue,pockets=[],TW,TH,BR,PR,CW;
var aim=0,pwr=50,spX=0,spY=0,myT=true,on=false,myTp=null,bounces=0;
var dS=false,dP=false;
var SC=['#fbbf24','#2563eb','#ef4444','#7c3aed','#f97316','#22c55e','#7f1d1d'];
var MDS={'8b':'Sink your balls then the 8.','9b':'Hit lowest first. Sink the 9 to win.','ts':'Only bank shots count! Straight shots return ball.'};
(async function(){var s=await db.auth.getSession();if(s.data.session){user=s.data.session.user;var p=await db.from('profiles').select('coins,display_name').eq('user_id',user.id).single();if(p.data){coins=user.id===OW?999999:(p.data.coins||0);document.getElementById('lC').textContent=coins.toLocaleString();document.getElementById('mc').textContent=coins.toLocaleString();if(p.data.display_name)document.getElementById('p1').textContent=p.data.display_name;}}})();
function sM(m,e){mode=m;document.querySelectorAll('.mb').forEach(function(b){b.classList.remove('sel');});e.classList.add('sel');document.getElementById('md').textContent=MDS[m];document.getElementById('gT').textContent=m==='8b'?'8-Ball':m==='9b'?'9-Ball':'Trick Shot';}
function sW(e,a){if(a>coins&&user&&user.id!==OW){alert('Not enough coins.');return;}wager=a;document.querySelectorAll('.wb').forEach(function(b){b.classList.remove('sel');});e.classList.add('sel');}
function go(){document.getElementById('lob').style.display='none';init();on=true;myT=true;show();ut();}
function show(){document.getElementById('pw').style.display='flex';document.getElementById('sb').style.display='block';document.getElementById('sh').style.display='block';}
function hide(){document.getElementById('pw').style.display='none';document.getElementById('sb').style.display='none';document.getElementById('sh').style.display='none';}
function ut(){document.getElementById('tt').textContent=myT?'Your shot':'AI...';document.getElementById('tt').style.color=myT?'#4ade80':'#fbbf24';if(myT)document.getElementById('bb').textContent='Touch to aim. Set power + spin. SHOOT.';}

function init(){
var cv=document.getElementById('cv');
TW=Math.min(window.innerWidth-12,320);TH=Math.min(window.innerHeight-76,TW*1.78);
if(TH>window.innerHeight-76){TH=window.innerHeight-76;TW=TH/1.78;}
cv.width=TW;cv.height=TH;BR=TW*.027;PR=BR*2.3;CW=BR*2.6;
engine=Matter.Engine.create({gravity:{x:0,y:0}});world=engine.world;
var o={isStatic:true,restitution:.88,friction:.015};
Matter.World.add(world,[
Matter.Bodies.rectangle(TW/2,CW/2,TW-PR*3,CW,o),Matter.Bodies.rectangle(TW/2,TH-CW/2,TW-PR*3,CW,o),
Matter.Bodies.rectangle(CW/2,TH*.25,CW,TH*.42-PR,o),Matter.Bodies.rectangle(CW/2,TH*.75,CW,TH*.42-PR,o),
Matter.Bodies.rectangle(TW-CW/2,TH*.25,CW,TH*.42-PR,o),Matter.Bodies.rectangle(TW-CW/2,TH*.75,CW,TH*.42-PR,o)]);
pockets=[{x:CW*.5,y:CW*.5},{x:TW-CW*.5,y:CW*.5},{x:CW*.5,y:TH-CW*.5},{x:TW-CW*.5,y:TH-CW*.5},{x:0,y:TH/2},{x:TW,y:TH/2}];
// Cushion bounce tracking
Matter.Events.on(engine,'collisionStart',function(ev){ev.pairs.forEach(function(p){if((p.bodyA.label==='cue'||p.bodyB.label==='cue')&&(p.bodyA.isStatic||p.bodyB.isStatic))bounces++;});});
rack();
cv.addEventListener('touchstart',function(e){e.preventDefault();ta(e.touches[0]);},{passive:false});
cv.addEventListener('touchmove',function(e){e.preventDefault();ta(e.touches[0]);},{passive:false});
cv.addEventListener('touchend',function(e){e.preventDefault();},{passive:false});
cv.addEventListener('mousedown',function(e){ta(e);});cv.addEventListener('mousemove',function(e){if(e.buttons)ta(e);});
// Power
var pt=document.getElementById('pt');
pt.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();dP=true;sp(e.touches[0]);},{passive:false});
pt.addEventListener('touchmove',function(e){e.preventDefault();e.stopPropagation();if(dP)sp(e.touches[0]);},{passive:false});
pt.addEventListener('touchend',function(e){e.preventDefault();dP=false;},{passive:false});
// Spin
var sr=document.getElementById('sr');
sr.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();dS=true;ss(e.touches[0]);},{passive:false});
sr.addEventListener('touchmove',function(e){e.preventDefault();e.stopPropagation();if(dS)ss(e.touches[0]);},{passive:false});
sr.addEventListener('touchend',function(e){e.preventDefault();dS=false;},{passive:false});
document.addEventListener('mousemove',function(e){if(dP)sp(e);if(dS)ss(e);});
document.addEventListener('mouseup',function(){dP=false;dS=false;});
requestAnimationFrame(loop);
}
function ta(e){if(!on||!myT||!cue||cue.sunk)return;var r=document.getElementById('cv').getBoundingClientRect();aim=Math.atan2(e.clientY-r.top-cue.position.y,e.clientX-r.left-cue.position.x);}
function sp(e){var r=document.getElementById('pt').getBoundingClientRect();pwr=Math.max(5,Math.min(100,Math.round((1-(e.clientY-r.top)/r.height)*100)));document.getElementById('pf').style.height=pwr+'%';}
function ss(e){var r=document.getElementById('sr').getBoundingClientRect();var cx=r.left+r.width/2,cy=r.top+r.height/2;var dx=(e.clientX-cx)/(r.width/2),dy=(e.clientY-cy)/(r.height/2);var d=Math.sqrt(dx*dx+dy*dy);if(d>1){dx/=d;dy/=d;}spX=Math.round(dx*10)/10;spY=Math.round(dy*10)/10;document.getElementById('sd').style.left=(50+dx*35)+'%';document.getElementById('sd').style.top=(50+dy*35)+'%';var l='';if(Math.abs(spY)>.2)l=spY<0?'Top':'Draw';if(Math.abs(spX)>.2)l+=(l?' ':'')+(spX<0?'L':'R');document.getElementById('sl').textContent=l||'Spin';}
function mb(x,y,n){var b=Matter.Bodies.circle(x,y,BR,{restitution:.94,friction:.012,frictionAir:.013,density:.003,label:n===0?'cue':'b'+n});b.num=n;b.sunk=false;Matter.World.add(world,b);balls.push(b);if(n===0)cue=b;return b;}
function rack(){
balls=[];var cx=TW/2,cy=TH*.35,d=BR*2.1;
if(mode==='9b'){var o9=[1,2,3,4,9,5,6,7,8];var ps=[[0,0],[-1,1],[1,1],[-2,2],[0,2],[2,2],[-1,3],[1,3],[0,4]];for(var i=0;i<9;i++)mb(cx+ps[i][0]*d*.5,cy-ps[i][1]*d*.866,o9[i]);}
else{var or=[1,9,2,10,8,11,3,12,6,13,4,14,5,15,7],ri=0;for(var r=0;r<5;r++)for(var c=0;c<=r;c++)mb(cx+(c-r/2)*d,cy-r*d*.866,or[ri++]);}
mb(TW/2,TH*.72,0);
}
window.shoot=function(){
if(!on||!myT||!cue||cue.sunk)return;bounces=0;
var f=pwr*.0007,fx=Math.cos(aim)*f+spX*f*.15,fy=Math.sin(aim)*f+spY*f*.15;
Matter.Body.applyForce(cue,cue.position,{x:fx,y:fy});
if(spX||spY)Matter.Body.setAngularVelocity(cue,(spX+spY)*.05);
myT=false;hide();ut();setTimeout(wait,800);
};
function wait(){var mv=false;for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&(Math.abs(balls[i].velocity.x)>.12||Math.abs(balls[i].velocity.y)>.12)){mv=true;break;}}if(mv){setTimeout(wait,250);return;}chk();if(!on)return;if(!myT)setTimeout(ai,400);else show();}
function chk(){
var sk=[];for(var i=0;i<balls.length;i++){if(balls[i].sunk)continue;for(var j=0;j<pockets.length;j++){var dx=balls[i].position.x-pockets[j].x,dy=balls[i].position.y-pockets[j].y;if(Math.sqrt(dx*dx+dy*dy)<PR){balls[i].sunk=true;sk.push(balls[i].num);Matter.World.remove(world,balls[i]);break;}}}
if(cue&&cue.sunk){cue.sunk=false;Matter.Body.setPosition(cue,{x:TW/2,y:TH*.72});Matter.Body.setVelocity(cue,{x:0,y:0});Matter.World.add(world,cue);myT=!myT;ut();return;}
if(sk.indexOf(8)!==-1){if(mode==='ts'){end(bounces>=1);return;}var ml=0;for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&balls[i].num!==0&&balls[i].num!==8){if(myTp==='s'&&balls[i].num<8)ml++;if(myTp==='t'&&balls[i].num>8)ml++;}}end(ml===0);return;}
if(mode==='9b'&&sk.indexOf(9)!==-1){end(true);return;}
if(mode==='ts'&&sk.length>0&&bounces<1){document.getElementById('bb').textContent='Not a trick shot! Must hit cushion first.';}
if(mode==='8b'&&!myTp&&sk.length>0){var n=sk[0];if(n>0&&n<8)myTp='s';else if(n>8)myTp='t';if(myTp)document.getElementById('bb').textContent='You: '+(myTp==='s'?'Solids 1-7':'Stripes 9-15');}
var kept=false;for(var i=0;i<sk.length;i++){var n=sk[i];if(mode==='8b'){if(myTp==='s'&&n>0&&n<8)kept=true;if(myTp==='t'&&n>8)kept=true;}else if(n>0)kept=true;}
if(!kept)myT=!myT;ut();
}
function ai(){
if(!on||!cue)return;var tgt=null,bd=1e9;
var low=mode==='9b'?getLow():0;
for(var i=0;i<balls.length;i++){if(balls[i].sunk||balls[i].num===0||balls[i].num===8)continue;if(mode==='9b'&&balls[i].num!==low)continue;var d=Math.sqrt(Math.pow(balls[i].position.x-cue.position.x,2)+Math.pow(balls[i].position.y-cue.position.y,2));if(d<bd){bd=d;tgt=balls[i];}}
if(!tgt){for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&balls[i].num===8){tgt=balls[i];break;}}}
if(!tgt){myT=true;ut();show();return;}
var dx=tgt.position.x-cue.position.x+(Math.random()-.5)*BR*2.5;
var dy=tgt.position.y-cue.position.y+(Math.random()-.5)*BR*2.5;
var d=Math.sqrt(dx*dx+dy*dy);var f=.018+Math.random()*.022;
Matter.Body.applyForce(cue,cue.position,{x:dx/d*f,y:dy/d*f});
myT=true;ut();setTimeout(wait,800);
}
function getLow(){var l=99;for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&balls[i].num>0&&balls[i].num<l)l=balls[i].num;}return l;}
async function end(won){
on=false;hide();document.getElementById('gs').style.display='flex';
document.getElementById('gt2').textContent=won?'You Win!':'You Lose';document.getElementById('gt2').style.color=won?'#4ade80':'#ef4444';
document.getElementById('gm').textContent=won?'Nice!':'Next time.';
document.getElementById('gc').textContent=wager>0?(won?'+'+wager*2:'-'+wager)+' coins':'';
if(wager>0&&user&&user.id!==OW){try{var p=await db.from('profiles').select('coins').eq('user_id',user.id).single();if(p.data)await db.from('profiles').update({coins:Math.max(0,(p.data.coins||0)+(won?wager:-wager))}).eq('user_id',user.id);}catch(e){}}
var gn=mode==='9b'?'pool9':mode==='ts'?'pooltrick':'pool8';
try{await db.rpc('record_game_result',{p_user_id:user.id,p_game:gn,p_won:won,p_coins:wager});}catch(e){}
}
function loop(){if(!engine)return;Matter.Engine.update(engine,1e3/60);draw();requestAnimationFrame(loop);}
function draw(){
var cv=document.getElementById('cv'),c=cv.getContext('2d');
c.fillStyle='#0d7a3e';c.fillRect(0,0,TW,TH);
c.fillStyle='#3d1f0c';c.fillRect(0,0,TW,CW);c.fillRect(0,TH-CW,TW,CW);c.fillRect(0,0,CW,TH);c.fillRect(TW-CW,0,CW,TH);
c.fillStyle='#0a6b35';c.fillRect(CW,CW,TW-CW*2,TH-CW*2);
c.fillStyle='#3d1f0c';c.fillRect(0,TH/2-PR,CW+1,PR*2);c.fillRect(TW-CW-1,TH/2-PR,CW+1,PR*2);
for(var i=0;i<6;i++){c.beginPath();c.arc(pockets[i].x,pockets[i].y,PR,0,Math.PI*2);c.fillStyle='#080808';c.fill();c.strokeStyle='#2a1508';c.lineWidth=2;c.stroke();}
for(var i=0;i<balls.length;i++){
if(balls[i].sunk)continue;var b=balls[i],n=b.num,x=b.position.x,y=b.position.y;
c.beginPath();c.arc(x+1,y+2,BR,0,Math.PI*2);c.fillStyle='rgba(0,0,0,.25)';c.fill();
c.beginPath();c.arc(x,y,BR,0,Math.PI*2);
if(n===0)c.fillStyle='#f8f8f8';
else if(n===8)c.fillStyle='#111';
else if(n<=7)c.fillStyle=SC[n-1];
else{c.fillStyle='#f0f0f0';c.fill();c.save();c.beginPath();c.arc(x,y,BR,0,Math.PI*2);c.clip();c.fillStyle=SC[n-9];c.fillRect(x-BR,y-BR*.4,BR*2,BR*.8);c.restore();c.beginPath();c.arc(x,y,BR,0,Math.PI*2);}
c.fill();var g=c.createRadialGradient(x-BR*.3,y-BR*.3,0,x,y,BR);g.addColorStop(0,'rgba(255,255,255,.3)');g.addColorStop(1,'rgba(255,255,255,0)');c.fillStyle=g;c.fill();
c.strokeStyle='rgba(0,0,0,.12)';c.lineWidth=.5;c.stroke();
if(n>0){c.beginPath();c.arc(x,y,BR*.36,0,Math.PI*2);c.fillStyle='#fff';c.fill();c.fillStyle='#000';c.font='bold '+Math.max(7,Math.round(BR*.7))+'px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText(n,x,y+.5);}
}
if(myT&&cue&&!cue.sunk){var dx=Math.cos(aim),dy=Math.sin(aim),cx=cue.position.x,cy=cue.position.y;
for(var i=1;i<22;i++){c.fillStyle='rgba(255,255,255,.18)';c.beginPath();c.arc(cx+dx*(BR+i*7),cy+dy*(BR+i*7),1,0,Math.PI*2);c.fill();}
var sx=cx-dx*(BR+8),sy=cy-dy*(BR+8),ex=cx-dx*(BR+TW*.4),ey=cy-dy*(BR+TW*.4);
c.beginPath();c.moveTo(sx,sy);c.lineTo(ex,ey);c.strokeStyle='#5C2D0A';c.lineWidth=5;c.stroke();
c.beginPath();c.moveTo(sx,sy);c.lineTo(ex,ey);c.strokeStyle='#B8860B';c.lineWidth=2;c.stroke();
c.beginPath();c.arc(sx,sy,3,0,Math.PI*2);c.fillStyle='#87CEEB';c.fill();
}
}
</script>
<script src="scripts.js" defer></script>
</body>
</html>
