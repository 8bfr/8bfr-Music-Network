<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>8-Ball Pool -- 8BFR Games</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
#bubbleStack,#_8bfr_copyright,.bubble-row,#avatarContainer,.avatar-container,#pageUpBtn,.page-up-btn{display:none!important;}
body{font-family:'Work Sans',sans-serif;background:#071a07;color:#e8f5e9;height:100vh;height:100dvh;overflow:hidden;touch-action:none;user-select:none;}
.top{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;padding:.2rem .4rem;background:rgba(0,12,0,.92);height:28px;gap:.4rem;}
.back-btn{color:#4ade80;text-decoration:none;font-weight:800;font-size:1.2rem;line-height:1;}
.top h1{font-family:'Bebas Neue',cursive;font-size:.95rem;color:#4ade80;flex:1;text-align:center;}
.top-right{display:flex;align-items:center;gap:.4rem;font-size:.58rem;}
.top-right .coins{color:#fbbf24;font-weight:700;}
.top-right .copy{color:rgba(255,255,255,.3);font-size:.45rem;}
.nfo{position:fixed;top:28px;left:0;right:0;z-index:99;display:flex;justify-content:space-between;padding:.1rem .4rem;background:rgba(0,8,0,.88);font-size:.6rem;height:18px;}
.gw{position:fixed;top:46px;left:0;right:0;bottom:38px;display:flex;align-items:center;justify-content:center;}
canvas{touch-action:none;}
/* RIGHT: Power bar */
.pwr{position:fixed;right:3px;top:50%;transform:translateY(-50%);width:22px;height:160px;z-index:110;display:none;flex-direction:column;align-items:center;}
.pwr-track{width:14px;flex:1;background:rgba(0,0,0,.5);border:1px solid #4ade80;border-radius:8px;position:relative;overflow:hidden;}
.pwr-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#22c55e,#fbbf24,#ef4444);height:0%;}
.pwr-label{font-size:.45rem;color:#4ade80;margin-top:2px;}
/* LEFT: Spin dot */
.spin{position:fixed;left:3px;top:50%;transform:translateY(-50%);width:50px;height:50px;z-index:110;display:none;}
.spin-ring{width:50px;height:50px;border:2px solid rgba(74,222,128,.4);border-radius:50%;position:relative;background:rgba(0,0,0,.3);}
.spin-dot{position:absolute;width:10px;height:10px;background:#4ade80;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 6px rgba(74,222,128,.5);}
.spin-lbl{font-size:.45rem;color:rgba(255,255,255,.4);text-align:center;margin-top:1px;}
/* SHOOT button */
.shoot-btn{position:fixed;bottom:4px;left:50%;transform:translateX(-50%);z-index:110;display:none;padding:.4rem 1.6rem;border-radius:30px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;font-weight:800;font-size:.8rem;border:none;cursor:pointer;box-shadow:0 4px 15px rgba(34,197,94,.3);}
.shoot-btn:active{transform:translateX(-50%) scale(.95);}
.phase-txt{position:fixed;bottom:34px;left:0;right:0;text-align:center;font-size:.7rem;color:rgba(255,255,255,.5);z-index:110;font-weight:600;}
.zoom-btn{position:fixed;bottom:6px;right:4px;z-index:120;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(74,222,128,.3);color:#4ade80;font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lobby{position:fixed;inset:0;background:rgba(0,8,0,.96);z-index:200;display:flex;align-items:center;justify-content:center;}
.lc{background:#0c1f0c;border:2px solid #22c55e;border-radius:14px;padding:1.2rem;max-width:300px;width:90%;text-align:center;}
.lc h2{font-family:'Bebas Neue',cursive;font-size:1.4rem;color:#4ade80;margin-bottom:.3rem;}
.wg{display:flex;gap:.2rem;flex-wrap:wrap;justify-content:center;margin:.4rem 0;}
.wb{padding:.3rem .55rem;border-radius:8px;border:1px solid rgba(251,191,36,.3);background:rgba(251,191,36,.08);color:#fbbf24;font-weight:700;font-size:.72rem;cursor:pointer;}
.wb.sel{background:rgba(251,191,36,.2);border-color:#fbbf24;}
.btn{padding:.5rem .8rem;border-radius:10px;font-weight:700;font-size:.8rem;cursor:pointer;border:none;color:#000;width:100%;margin-top:.3rem;background:#22c55e;}
.go{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:none;align-items:center;justify-content:center;}
.gc{background:#0c1f0c;border:2px solid #22c55e;border-radius:14px;padding:1.5rem;max-width:280px;width:90%;text-align:center;}
.gc h2{font-family:'Bebas Neue',cursive;font-size:1.5rem;margin-bottom:.3rem;}
</style>
</head>
<body>
<div class="top">
<a href="multiplayer-games.html" class="back-btn">&larr;</a>
<h1>8-Ball Pool</h1>
<div class="top-right">
<span class="copy">8BFR - James J. Siburt</span>
<span class="coins" id="mc">0</span>
</div>
</div>
<div class="nfo"><div><b id="p1N">You</b> <span style="color:#4ade80;font-size:.55rem;" id="p1T"></span></div><div id="wI" style="color:#fbbf24;font-weight:700;"></div><div><b id="p2N">AI</b> <span style="color:#fbbf24;font-size:.55rem;" id="p2T"></span></div></div>
<div class="gw"><canvas id="cv"></canvas></div>

<div class="pwr" id="pwr"><div class="pwr-track"><div class="pwr-fill" id="pwrF"></div></div><div class="pwr-label">PWR</div></div>
<div class="spin" id="spinBox"><div class="spin-ring" id="spinRing"><div class="spin-dot" id="sDot"></div></div><div class="spin-lbl" id="sLbl">Center</div></div>
<button class="shoot-btn" id="shootBtn" ontouchstart="shoot()" onclick="shoot()">SHOOT</button>
<div class="phase-txt" id="pTxt"></div>
<button class="zoom-btn" id="zoomBtn" onclick="toggleZoom()">&#x1F50D;</button>

<div class="lobby" id="lobby"><div class="lc"><h2>8-Ball Pool</h2><p style="font-size:.7rem;color:rgba(255,255,255,.4);margin-bottom:.4rem;">1. Tap ball to aim  2. Drag to adjust  3. Set spin + power  4. SHOOT</p><div style="font-size:.68rem;color:#fbbf24;margin-bottom:.2rem;">Coins: <span id="lC">0</span></div><div class="wg"><div class="wb sel" onclick="setW(this,0)">Free</div><div class="wb" onclick="setW(this,10)">10</div><div class="wb" onclick="setW(this,25)">25</div><div class="wb" onclick="setW(this,50)">50</div><div class="wb" onclick="setW(this,100)">100</div></div><button class="btn" onclick="startGame()">Play vs AI</button></div></div>
<div class="go" id="goS"><div class="gc"><h2 id="goT"></h2><p id="goM" style="font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:.4rem;"></p><div id="goC" style="font-size:1rem;color:#fbbf24;font-weight:700;margin-bottom:.6rem;"></div><button class="btn" onclick="location.reload()">Play Again</button></div></div>

<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f');
var OWN='cb556180-f032-4b21-9470-1d786f2664ab';
var user=null,coins=0,wager=0,myTurn=true,active=false;
var engine,world,balls=[],cue,pockets=[];
var TW,TH,BR,PR,CU;
// Phase: idle -> aimed -> adjusting (same, can drag) -> shooting
var phase='idle',aimAngle=0,power=50,spinX=0,spinY=0;
var myType=null,draggingSpin=false,draggingPower=false;
var SOL=['#fbbf24','#2563eb','#ef4444','#7c3aed','#f97316','#22c55e','#7f1d1d'];
var STR=['#fbbf24','#2563eb','#ef4444','#7c3aed','#f97316','#22c55e','#7f1d1d'];

var zoomLevel=1;
function toggleZoom(){
zoomLevel=zoomLevel===1?1.5:1;
var cv=document.getElementById('cv');
if(zoomLevel>1&&cue&&!cue.sunk){
var ox=-(cue.position.x*zoomLevel-cv.width/2);
var oy=-(cue.position.y*zoomLevel-cv.height/2);
cv.style.transform='scale('+zoomLevel+')';
cv.style.transformOrigin=cue.position.x+'px '+cue.position.y+'px';
}else{
cv.style.transform='';cv.style.transformOrigin='';
}
document.getElementById('zoomBtn').style.background=zoomLevel>1?'rgba(74,222,128,.3)':'rgba(0,0,0,.5)';
}

(async function(){var s=await db.auth.getSession();if(s.data.session){user=s.data.session.user;var p=await db.from('profiles').select('coins,display_name,username').eq('user_id',user.id).single();if(p.data){coins=user.id===OWN?999999:(p.data.coins||0);document.getElementById('lC').textContent=coins.toLocaleString();document.getElementById('mc').textContent=coins.toLocaleString();document.getElementById('p1N').textContent=p.data.display_name||p.data.username||'You';}}})();
function setW(el,a){if(a>coins&&user&&user.id!==OWN){alert('Not enough coins.');return;}wager=a;document.querySelectorAll('.wb').forEach(function(b){b.classList.remove('sel');});el.classList.add('sel');}

function startGame(){
document.getElementById('lobby').style.display='none';
document.getElementById('wI').textContent=wager>0?wager+' coins':'';
initPhysics();rackBalls();active=true;myTurn=true;phase='idle';updateTurn();
requestAnimationFrame(loop);
}

function initPhysics(){
var cv=document.getElementById('cv');
TW=Math.min(window.innerWidth-66,300);
TH=Math.min(window.innerHeight-96,TW*1.85);
if(TH>window.innerHeight-96){TH=window.innerHeight-96;TW=TH/1.85;}
cv.width=TW;cv.height=TH;
BR=TW*.03;PR=BR*2.2;CU=BR*2.5;
engine=Matter.Engine.create({gravity:{x:0,y:0}});world=engine.world;
var w=CU;
// Walls split for side pockets
Matter.World.add(world,[
Matter.Bodies.rectangle(TW/2,w/2,TW-PR*3,w,{isStatic:true,restitution:.7,friction:.03}),
Matter.Bodies.rectangle(TW/2,TH-w/2,TW-PR*3,w,{isStatic:true,restitution:.7,friction:.03}),
Matter.Bodies.rectangle(w/2,TH*.25,w,TH*.42-PR,{isStatic:true,restitution:.7,friction:.03}),
Matter.Bodies.rectangle(w/2,TH*.75,w,TH*.42-PR,{isStatic:true,restitution:.7,friction:.03}),
Matter.Bodies.rectangle(TW-w/2,TH*.25,w,TH*.42-PR,{isStatic:true,restitution:.7,friction:.03}),
Matter.Bodies.rectangle(TW-w/2,TH*.75,w,TH*.42-PR,{isStatic:true,restitution:.7,friction:.03})
]);
pockets=[{x:CU*.6,y:CU*.6},{x:TW-CU*.6,y:CU*.6},{x:CU*.6,y:TH-CU*.6},{x:TW-CU*.6,y:TH-CU*.6},{x:0,y:TH/2},{x:TW,y:TH/2}];

// CANVAS touch - for aiming and adjusting only
cv.addEventListener('touchstart',function(e){e.preventDefault();cvDown(e.touches[0]);},{passive:false});
cv.addEventListener('touchmove',function(e){e.preventDefault();cvDrag(e.touches[0]);},{passive:false});
cv.addEventListener('touchend',function(e){e.preventDefault();},{passive:false});
cv.addEventListener('mousedown',cvDown);cv.addEventListener('mousemove',cvDrag);

// SPIN dot drag
var sr=document.getElementById('spinRing');
sr.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();draggingSpin=true;spinDrag(e.touches[0]);},{passive:false});
sr.addEventListener('touchmove',function(e){e.preventDefault();e.stopPropagation();if(draggingSpin)spinDrag(e.touches[0]);},{passive:false});
sr.addEventListener('touchend',function(e){e.preventDefault();draggingSpin=false;},{passive:false});
sr.addEventListener('mousedown',function(e){draggingSpin=true;spinDrag(e);});
document.addEventListener('mousemove',function(e){if(draggingSpin)spinDrag(e);});
document.addEventListener('mouseup',function(){draggingSpin=false;});

// POWER bar drag
var pb=document.getElementById('pwr');
pb.addEventListener('touchstart',function(e){e.preventDefault();e.stopPropagation();draggingPower=true;pwrDrag(e.touches[0]);},{passive:false});
pb.addEventListener('touchmove',function(e){e.preventDefault();e.stopPropagation();if(draggingPower)pwrDrag(e.touches[0]);},{passive:false});
pb.addEventListener('touchend',function(e){e.preventDefault();draggingPower=false;},{passive:false});
pb.addEventListener('mousedown',function(e){draggingPower=true;pwrDrag(e);});
document.addEventListener('mousemove',function(e){if(draggingPower)pwrDrag(e);});
document.addEventListener('mouseup',function(){draggingPower=false;});
}

function spinDrag(e){
var r=document.getElementById('spinRing').getBoundingClientRect();
var cx=r.left+r.width/2,cy=r.top+r.height/2;
var dx=(e.clientX-cx)/(r.width/2),dy=(e.clientY-cy)/(r.height/2);
var d=Math.sqrt(dx*dx+dy*dy);if(d>1){dx/=d;dy/=d;}
spinX=Math.round(dx*10)/10;spinY=Math.round(dy*10)/10;
var dot=document.getElementById('sDot');
dot.style.left=(50+dx*35)+'%';dot.style.top=(50+dy*35)+'%';
var lbl='';
if(Math.abs(spinX)<.2&&Math.abs(spinY)<.2)lbl='Center';
else{
if(spinY<-.2)lbl='Follow';else if(spinY>.2)lbl='Draw';
if(spinX<-.2)lbl+=(lbl?' ':'')+'Left';else if(spinX>.2)lbl+=(lbl?' ':'')+'Right';
}
document.getElementById('sLbl').textContent=lbl||'Center';
}

function pwrDrag(e){
var r=document.getElementById('pwr').getBoundingClientRect();
var pct=1-(e.clientY-r.top)/r.height;
power=Math.max(5,Math.min(100,Math.round(pct*100)));
document.getElementById('pwrF').style.height=power+'%';
}

function mkB(x,y,n){var b=Matter.Bodies.circle(x,y,BR,{restitution:.92,friction:.04,frictionAir:.017,density:.002});b.num=n;b.sunk=false;Matter.World.add(world,b);balls.push(b);if(n===0)cue=b;return b;}
function rackBalls(){balls=[];var cx=TW/2,cy=TH*.35,d=BR*2.15,order=[1,9,2,10,8,11,3,12,6,13,4,14,5,15,7],ri=0;for(var row=0;row<5;row++){for(var col=0;col<=row;col++){mkB(cx+(col-row/2)*d,cy-row*d*.866,order[ri++]);}}mkB(TW/2,TH*.75,0);}

// PHASE 1: Tap ball to aim
function cvDown(e){
if(!active||!myTurn||!cue||cue.sunk)return;
var r=document.getElementById('cv').getBoundingClientRect();
var tx=e.clientX-r.left,ty=e.clientY-r.top;

// Find tapped ball
for(var i=0;i<balls.length;i++){
if(balls[i].sunk||balls[i].num===0)continue;
var dx=balls[i].position.x-tx,dy=balls[i].position.y-ty;
if(Math.sqrt(dx*dx+dy*dy)<BR*4){
aimAngle=Math.atan2(balls[i].position.y-cue.position.y,balls[i].position.x-cue.position.x);
enterAimed();return;
}
}
// Tapped empty space - adjust aim to that direction
if(phase==='aimed'){
aimAngle=Math.atan2(ty-cue.position.y,tx-cue.position.x);
}
}

// PHASE 2: Drag to adjust aim
function cvDrag(e){
if(phase!=='aimed'||!cue)return;
var r=document.getElementById('cv').getBoundingClientRect();
var mx=e.clientX-r.left,my=e.clientY-r.top;
aimAngle=Math.atan2(my-cue.position.y,mx-cue.position.x);
}

function enterAimed(){
phase='aimed';power=50;
document.getElementById('pwr').style.display='flex';
document.getElementById('spinBox').style.display='block';
document.getElementById('shootBtn').style.display='block';
document.getElementById('pwrF').style.height='50%';
document.getElementById('pTxt').textContent='Drag on table to adjust aim. Set spin + power. Tap SHOOT.';
}

// PHASE 3: SHOOT
window.shoot=function(){
if(phase!=='aimed'||!cue||!active)return;
phase='shooting';
var force=power*.00025;
var fx=Math.cos(aimAngle)*force;
var fy=Math.sin(aimAngle)*force;
fx+=spinX*force*.12;fy+=spinY*force*.12;
Matter.Body.applyForce(cue,cue.position,{x:fx,y:fy});
if(spinX||spinY)Matter.Body.setAngularVelocity(cue,(spinX+spinY)*.04);
phase='idle';myTurn=false;power=50;
document.getElementById('pwr').style.display='none';
document.getElementById('spinBox').style.display='none';
document.getElementById('shootBtn').style.display='none';
document.getElementById('pTxt').textContent='';
updateTurn();setTimeout(waitStop,1200);
};

function waitStop(){var mv=false;for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&Matter.Vector.magnitude(balls[i].velocity)>.2){mv=true;break;}}if(mv){setTimeout(waitStop,350);return;}checkSunk();if(!active)return;if(!myTurn)setTimeout(aiShot,500);}

function checkSunk(){
var sunk=[];for(var i=0;i<balls.length;i++){if(balls[i].sunk)continue;for(var j=0;j<pockets.length;j++){var dx=balls[i].position.x-pockets[j].x,dy=balls[i].position.y-pockets[j].y;if(Math.sqrt(dx*dx+dy*dy)<PR){balls[i].sunk=true;sunk.push(balls[i].num);Matter.World.remove(world,balls[i]);break;}}}
if(cue&&cue.sunk){cue.sunk=false;Matter.Body.setPosition(cue,{x:TW/2,y:TH*.75});Matter.Body.setVelocity(cue,{x:0,y:0});Matter.World.add(world,cue);myTurn=!myTurn;updateTurn();return;}
if(sunk.indexOf(8)!==-1){var ml=0;for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&balls[i].num!==0&&balls[i].num!==8){if(myType==='s'&&balls[i].num<8)ml++;if(myType==='t'&&balls[i].num>8)ml++;}}endGame(ml===0&&myTurn);return;}
if(!myType&&sunk.length>0){var n=sunk[0];if(n>0&&n<8)myType=myTurn?'s':'t';else if(n>8)myType=myTurn?'t':'s';}
var kept=false;for(var i=0;i<sunk.length;i++){var n=sunk[i];if(myType==='s'&&n>0&&n<8)kept=true;if(myType==='t'&&n>8)kept=true;}
if(!kept)myTurn=!myTurn;updateTurn();
}

function aiShot(){
if(!active||!cue)return;var tgt=null,bd=Infinity;
for(var i=0;i<balls.length;i++){if(balls[i].sunk||balls[i].num===0||balls[i].num===8)continue;var d=Matter.Vector.magnitude(Matter.Vector.sub(balls[i].position,cue.position));if(d<bd){bd=d;tgt=balls[i];}}
if(!tgt){for(var i=0;i<balls.length;i++){if(!balls[i].sunk&&balls[i].num===8){tgt=balls[i];break;}}}
if(!tgt){myTurn=true;updateTurn();return;}
var dx=tgt.position.x-cue.position.x+(Math.random()-.5)*BR*3;
var dy=tgt.position.y-cue.position.y+(Math.random()-.5)*BR*3;
var d=Math.sqrt(dx*dx+dy*dy);var f=.01+Math.random()*.012;
Matter.Body.applyForce(cue,cue.position,{x:dx/d*f,y:dy/d*f});
myTurn=true;updateTurn();setTimeout(waitStop,1200);
}

function updateTurn(){document.getElementById('p1T').textContent=myTurn?'SHOOT':'';document.getElementById('p2T').textContent=!myTurn?'THINKING':'';if(myTurn){phase='idle';document.getElementById('pTxt').textContent='Tap a ball to aim';}}

async function endGame(won){
active=false;document.getElementById('goS').style.display='flex';
document.getElementById('goT').textContent=won?'You Win!':'You Lose';document.getElementById('goT').style.color=won?'#4ade80':'#ef4444';
document.getElementById('goM').textContent=won?'Great game!':'Better luck next time.';
document.getElementById('goC').textContent=wager>0?(won?'+'+wager*2+' coins':'-'+wager+' coins'):'';
if(wager>0&&user&&user.id!==OWN){try{var p=await db.from('profiles').select('coins').eq('user_id',user.id).single();if(p.data)await db.from('profiles').update({coins:Math.max(0,(p.data.coins||0)+(won?wager:-wager))}).eq('user_id',user.id);}catch(e){}}
try{await db.rpc('record_game_result',{p_user_id:user.id,p_game:'pool',p_won:won,p_coins:wager});}catch(e){}
}

function loop(){if(!engine)return;Matter.Engine.update(engine,1e3/60);if(zoomLevel>1&&cue&&!cue.sunk){var cv2=document.getElementById('cv');cv2.style.transformOrigin=cue.position.x+'px '+cue.position.y+'px';}draw();requestAnimationFrame(loop);}

function draw(){
var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
ctx.fillStyle='#0d7a3e';ctx.fillRect(0,0,TW,TH);
ctx.fillStyle='#3d1f0c';ctx.fillRect(0,0,TW,CU);ctx.fillRect(0,TH-CU,TW,CU);ctx.fillRect(0,0,CU,TH);ctx.fillRect(TW-CU,0,CU,TH);
ctx.fillStyle='#0a6b35';ctx.fillRect(CU,CU,TW-CU*2,TH-CU*2);
// Side pocket indents
ctx.fillStyle='#3d1f0c';ctx.fillRect(0,TH/2-PR,CU,PR*2);ctx.fillRect(TW-CU,TH/2-PR,CU,PR*2);
// Pockets
for(var i=0;i<6;i++){ctx.beginPath();ctx.arc(pockets[i].x,pockets[i].y,PR,0,Math.PI*2);ctx.fillStyle='#0a0a0a';ctx.fill();ctx.strokeStyle='#2a1508';ctx.lineWidth=2;ctx.stroke();}
// Diamonds
var dm=[[TW*.25,CU-1],[TW*.5,CU-1],[TW*.75,CU-1],[TW*.25,TH-CU+1],[TW*.5,TH-CU+1],[TW*.75,TH-CU+1],[CU-1,TH*.2],[CU-1,TH*.4],[CU-1,TH*.6],[CU-1,TH*.8],[TW-CU+1,TH*.2],[TW-CU+1,TH*.4],[TW-CU+1,TH*.6],[TW-CU+1,TH*.8]];
dm.forEach(function(d){ctx.beginPath();ctx.arc(d[0],d[1],2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.18)';ctx.fill();});
// Balls
for(var i=0;i<balls.length;i++){
if(balls[i].sunk)continue;var b=balls[i],n=b.num,x=b.position.x,y=b.position.y;
ctx.beginPath();ctx.arc(x+1,y+2,BR,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.2)';ctx.fill();
ctx.beginPath();ctx.arc(x,y,BR,0,Math.PI*2);
if(n===0)ctx.fillStyle='#f5f5f5';
else if(n===8)ctx.fillStyle='#1a1a1a';
else if(n<=7)ctx.fillStyle=SOL[n-1];
else{ctx.fillStyle='#f5f5f5';ctx.fill();ctx.beginPath();ctx.save();ctx.arc(x,y,BR,0,Math.PI*2);ctx.clip();ctx.fillStyle=STR[n-9];ctx.fillRect(x-BR,y-BR*.4,BR*2,BR*.8);ctx.restore();ctx.beginPath();ctx.arc(x,y,BR,0,Math.PI*2);}
ctx.fill();
var g=ctx.createRadialGradient(x-BR*.25,y-BR*.25,BR*.05,x,y,BR);g.addColorStop(0,'rgba(255,255,255,.3)');g.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=g;ctx.fill();
ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=.5;ctx.stroke();
if(n>0){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,BR*.4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.font='bold '+Math.round(BR*.7)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n,x,y+.5);}
}
// Aim line + cue stick
if(phase==='aimed'&&cue&&!cue.sunk){
var dx=Math.cos(aimAngle),dy=Math.sin(aimAngle);
ctx.beginPath();ctx.moveTo(cue.position.x,cue.position.y);
ctx.lineTo(cue.position.x+dx*TH*.4,cue.position.y+dy*TH*.4);
ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
// Ghost ball at aim target
ctx.beginPath();ctx.arc(cue.position.x+dx*TH*.12,cue.position.y+dy*TH*.12,BR,0,Math.PI*2);
ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;ctx.stroke();
// Cue stick behind ball
var pb=8;var sx=cue.position.x-dx*(BR*2+pb),sy=cue.position.y-dy*(BR*2+pb);
var ex=cue.position.x-dx*(BR*2+pb+TW*.4),ey=cue.position.y-dy*(BR*2+pb+TW*.4);
ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.strokeStyle='#6B3410';ctx.lineWidth=5;ctx.stroke();ctx.strokeStyle='#C4A35A';ctx.lineWidth=2;ctx.stroke();
ctx.beginPath();ctx.arc(sx,sy,2.5,0,Math.PI*2);ctx.fillStyle='#7EC8E3';ctx.fill();
}
}
