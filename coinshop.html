<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coin Shop — 8BFR Music Network</title>
  <link rel="icon" href="assets/images/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

    :root {
      --gold: #f5c842;
      --purple: #7c3aed;
      --cyan: #00d9ff;
      --bg: #050011;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background:
        radial-gradient(900px 500px at 15% -5%, rgba(124,58,237,.28), transparent 60%),
        radial-gradient(700px 400px at 90% 10%, rgba(0,217,255,.15), transparent 60%),
        linear-gradient(180deg, #050011 0%, #000 100%);
      color: #eae6ff;
      min-height: 100vh;
    }

    header {
      background: rgba(8,0,20,.95);
      border-bottom: 1px solid rgba(124,58,237,.4);
      padding: 1rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .hdr-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo-area { display: flex; align-items: center; gap: 0.75rem; }
    .logo-area img { height: 36px; width: auto; }
    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
    }
    .page-title span { color: var(--gold); }

    .balance-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(245,200,66,.1);
      border: 1px solid rgba(245,200,66,.35);
      border-radius: 999px;
      padding: 0.35rem 0.85rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--gold);
    }

    .balance-pill .coin-icon { font-size: 1rem; }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    .intro {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .intro h2 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .intro p {
      color: rgba(168,85,247,.7);
      font-size: 0.95rem;
    }

    /* Packages grid */
    .packages-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .pkg-card {
      background: rgba(12,3,28,.9);
      border: 1px solid rgba(124,58,237,.35);
      border-radius: 16px;
      padding: 1.25rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all .18s ease;
      position: relative;
      overflow: hidden;
    }

    .pkg-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(124,58,237,.15), transparent 70%);
      opacity: 0;
      transition: opacity .2s;
    }

    .pkg-card:hover {
      border-color: #a855f7;
      transform: translateY(-3px);
      box-shadow: 0 0 24px rgba(124,58,237,.45);
    }

    .pkg-card:hover::before { opacity: 1; }

    .pkg-card.popular {
      border-color: var(--gold);
      background: rgba(20,10,0,.9);
    }

    .pkg-card.popular::after {
      content: '⭐ BEST VALUE';
      position: absolute;
      top: 10px;
      right: -22px;
      background: var(--gold);
      color: #000;
      font-size: 0.6rem;
      font-weight: 800;
      padding: 0.2rem 1.8rem;
      transform: rotate(45deg);
      letter-spacing: .04em;
    }

    .pkg-coins-display {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 0.2rem;
    }

    .pkg-bonus {
      font-size: 0.7rem;
      color: #4ade80;
      font-weight: 700;
      margin-bottom: 0.5rem;
      min-height: 1rem;
    }

    .pkg-name {
      font-size: 0.8rem;
      color: rgba(168,85,247,.7);
      margin-bottom: 0.75rem;
    }

    .pkg-price {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.75rem;
    }

    .pkg-btn {
      width: 100%;
      padding: 0.55rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--purple), #a855f7);
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all .15s;
      font-family: 'DM Sans', sans-serif;
    }

    .pkg-btn:hover { box-shadow: 0 0 18px rgba(124,58,237,.6); transform: translateY(-1px); }
    .pkg-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

    .pkg-card.popular .pkg-btn {
      background: linear-gradient(135deg, #d4a017, var(--gold));
      color: #000;
    }

    /* Confirm panel */
    .confirm-panel {
      display: none;
      background: rgba(12,3,28,.95);
      border: 1px solid rgba(124,58,237,.5);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .confirm-panel.open { display: block; }

    .confirm-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: var(--gold);
    }

    .confirm-steps {
      font-size: 0.88rem;
      color: rgba(168,85,247,.8);
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    .confirm-btn {
      background: #22c55e;
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background .15s;
    }

    .confirm-btn:hover { background: #16a34a; }
    .confirm-btn:disabled { opacity: 0.5; cursor: default; }

    .cancel-link {
      color: rgba(168,85,247,.5);
      font-size: 0.8rem;
      cursor: pointer;
      margin-left: 1rem;
      text-decoration: underline;
    }

    /* What coins buy */
    .uses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .use-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      background: rgba(124,58,237,.07);
      border: 1px solid rgba(124,58,237,.2);
      border-radius: 10px;
      padding: 0.85rem;
    }

    .use-icon { font-size: 1.4rem; flex-shrink: 0; }

    .use-title { font-size: 0.88rem; font-weight: 600; color: #eae6ff; }
    .use-desc { font-size: 0.78rem; color: rgba(168,85,247,.65); margin-top: 0.15rem; }
    .use-cost { font-size: 0.72rem; color: var(--gold); font-weight: 700; margin-top: 0.2rem; }

    /* Daily reward */
    .daily-card {
      background: rgba(34,197,94,.06);
      border: 1px solid rgba(34,197,94,.25);
      border-radius: 14px;
      padding: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .daily-info h3 { font-weight: 700; font-size: 0.95rem; color: #4ade80; margin-bottom: 0.2rem; }
    .daily-info p { font-size: 0.8rem; color: rgba(168,85,247,.65); }

    .daily-btn {
      background: #22c55e;
      color: #fff;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
      transition: background .15s;
    }

    .daily-btn:hover { background: #16a34a; }
    .daily-btn:disabled { opacity: 0.45; cursor: default; }

    /* Transaction history */
    .history-section { margin-top: 2rem; }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #a855f7;
      margin-bottom: 0.75rem;
    }

    .tx-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid rgba(124,58,237,.12);
      font-size: 0.85rem;
      gap: 0.5rem;
    }

    .tx-row:last-child { border-bottom: none; }
    .tx-desc { flex: 1; color: rgba(234,230,255,.8); }
    .tx-date { font-size: 0.75rem; color: rgba(168,85,247,.5); white-space: nowrap; }
    .tx-amount { font-weight: 700; white-space: nowrap; }
    .tx-amount.positive { color: #4ade80; }
    .tx-amount.negative { color: #f87171; }

    .card-wrap {
      background: rgba(12,3,28,.85);
      border: 1px solid rgba(124,58,237,.25);
      border-radius: 14px;
      overflow: hidden;
    }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .alert.success { background: rgba(34,197,94,.15); border: 1px solid rgba(34,197,94,.4); color: #4ade80; }
    .alert.error { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.4); color: #f87171; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(124,58,237,.2);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .not-logged {
      text-align: center;
      padding: 2rem;
      color: rgba(168,85,247,.7);
    }

    .not-logged a {
      display: inline-block;
      margin-top: 1rem;
      background: var(--purple);
      color: #fff;
      padding: 0.65rem 1.5rem;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
    }

    @media (max-width: 480px) {
      .packages-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <div class="logo-area">
      <img src="assets/images/logo_8bfr.svg" alt="8BFR"
           onerror="this.onerror=null;this.src='assets/images/8bfr.png'">
      <div class="page-title">Coin <span>Shop</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
      <div class="balance-pill">
        <span class="coin-icon">🪙</span>
        <span id="balanceDisplay">—</span> coins
      </div>
      <a href="index.html" style="color:rgba(168,85,247,.7);font-size:0.85rem;text-decoration:none;">← Home</a>
    </div>
  </div>
</header>

<main>
  <div id="loadingState"><div class="spinner"></div></div>
  <div id="mainContent" style="display:none;"></div>
</main>

<script src="scripts.js" defer></script>
<script>
(async function() {
  const SUPABASE_URL = 'https://novbuvwpjnxwwvdekjhr.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0';
  const OWNER_ID = 'cb556180-f032-4b21-9470-1d786f2664ab';

  // ── STRIPE PAYMENT LINKS ──────────────────────────────────────
  // Replace each NULL with your Stripe payment link URL
  // Create links at: https://dashboard.stripe.com/payment-links
  // Set each link price to match the USD amount below
  const STRIPE_LINKS = {
    starter: null,   // $0.99  — https://buy.stripe.com/eVq00j0h4a1dfP805g3sI08
    basic:   null,   // $3.99  — https://buy.stripe.com/9B6dR98NAa1dauOcS23sI07
    popular: null,   // $7.99  — https://buy.stripe.com/aFa14n2pcb5h0Uef0a3sI09
    pro:     null,   // $19.99 — https://buy.stripe.com/eVq7sL2pc5KX32mf0a3sI0a
    mega:    null,   // $49.99 — https://buy.stripe.com/bJe28r8NA4GT46q6tE3sI0b
  // ─────────────────────────────────────────────────────────────

  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const loadingEl = document.getElementById('loadingState');
  const mainEl = document.getElementById('mainContent');
  const balanceEl = document.getElementById('balanceDisplay');

  let user = null;
  let isOwner = false;
  let userCoins = 0;
  let packages = [];
  let pendingPackage = null;

  function timeAgo(d) {
    const m = Math.floor((Date.now() - new Date(d)) / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }

  function formatCoins(n) {
    return Number(n).toLocaleString();
  }

  function updateBalance(coins) {
    userCoins = coins;
    balanceEl.textContent = isOwner ? '∞' : formatCoins(coins);
  }

  function showAlert(msg, type = 'success') {
    const existing = document.getElementById('alertBox');
    if (existing) existing.remove();
    const el = document.createElement('div');
    el.id = 'alertBox';
    el.className = 'alert ' + type;
    el.textContent = msg;
    mainEl.prepend(el);
    setTimeout(() => el.remove(), 5000);
  }

  // ── INIT ──
  try {
    const { data: { session } } = await db.auth.getSession();
    user = session ? session.user : null;
    isOwner = user && user.id === OWNER_ID;
  } catch(e) {}

  // Load packages
  try {
    const { data } = await db.from('coin_packages').select('*').eq('is_active', true).order('sort_order');
    packages = data || [];
  } catch(e) {
    packages = [
      { id: 'starter', name: 'Starter Pack', coins: 100, bonus_coins: 0, price_usd: 0.99 },
      { id: 'basic',   name: 'Basic Pack',   coins: 500, bonus_coins: 0, price_usd: 3.99 },
      { id: 'popular', name: 'Popular Pack',  coins: 1200, bonus_coins: 100, price_usd: 7.99 },
      { id: 'pro',     name: 'Pro Pack',      coins: 3000, bonus_coins: 500, price_usd: 19.99 },
      { id: 'mega',    name: 'Mega Pack',     coins: 10000, bonus_coins: 2000, price_usd: 49.99 },
    ];
  }

  // Load balance if logged in
  if (user) {
    try {
      const { data } = await db.from('profiles').select('coins').eq('user_id', user.id).single();
      updateBalance(isOwner ? 999999999 : (data?.coins || 0));
    } catch(e) { updateBalance(0); }
  } else {
    balanceEl.textContent = 'Log in';
  }

  loadingEl.style.display = 'none';
  mainEl.style.display = 'block';
  render();

  function render() {
    mainEl.innerHTML = buildHTML();
    attachEvents();
  }

  function buildHTML() {
    const pkgCards = packages.map(pkg => {
      const total = pkg.coins + (pkg.bonus_coins || 0);
      const isPopular = pkg.id === 'popular';
      const hasLink = STRIPE_LINKS[pkg.id];
      return `
        <div class="pkg-card${isPopular ? ' popular' : ''}" data-pkg="${pkg.id}">
          <div class="pkg-coins-display">${formatCoins(total)}</div>
          <div class="pkg-bonus">${pkg.bonus_coins > 0 ? '+' + formatCoins(pkg.bonus_coins) + ' bonus!' : ''}</div>
          <div class="pkg-name">${pkg.name}</div>
          <div class="pkg-price">$${Number(pkg.price_usd).toFixed(2)}</div>
          <button class="pkg-btn" data-pkg="${pkg.id}" ${!hasLink ? 'data-coming="true"' : ''}>
            ${!hasLink ? '🔜 Coming Soon' : '🪙 Buy Now'}
          </button>
        </div>`;
    }).join('');

    const dailySection = user ? `
      <div class="daily-card">
        <div class="daily-info">
          <h3>🎁 Daily Coin Reward</h3>
          <p>Claim 10 free coins every day just for logging in</p>
        </div>
        <button class="daily-btn" id="dailyBtn">Claim 10 🪙</button>
      </div>` : '';

    const historySection = user ? `
      <div class="history-section">
        <div class="section-title">📋 Recent Transactions</div>
        <div class="card-wrap" id="txList">
          <div style="text-align:center;padding:1.5rem;color:rgba(168,85,247,.5);font-size:0.85rem;">Loading...</div>
        </div>
      </div>` : '';

    const notLoggedIn = !user ? `
      <div class="card-wrap">
        <div class="not-logged">
          <div style="font-size:2rem;margin-bottom:0.5rem;">🔒</div>
          <p>Log in to purchase coins and track your balance</p>
          <a href="login.html?return=coinshop.html">Log In to Buy</a>
        </div>
      </div>` : '';

    return `
      <div class="intro">
        <h2>🪙 Buy 8BFR Coins</h2>
        <p>Use coins for avatar items, stickers, upgrades, games, and more</p>
      </div>

      ${isOwner ? '<div class="alert success">👑 Owner — you have unlimited coins. All items are free for you.</div>' : ''}

      <div class="packages-grid">${pkgCards}</div>

      <div class="confirm-panel" id="confirmPanel">
        <div class="confirm-title" id="confirmTitle">Complete Your Purchase</div>
        <div class="confirm-steps" id="confirmSteps"></div>
        <button class="confirm-btn" id="confirmBtn">✅ I Completed Payment — Credit My Coins</button>
        <span class="cancel-link" id="cancelBtn">Cancel</span>
      </div>

      ${dailySection}

      <div style="margin-bottom:2rem;">
        <div class="section-title">💎 What You Can Buy with Coins</div>
        <div class="uses-grid">
          <div class="use-item">
            <span class="use-icon">👗</span>
            <div>
              <div class="use-title">Avatar Accessories</div>
              <div class="use-desc">Hair, clothes, jewelry, eyes</div>
              <div class="use-cost">50–500 coins per item</div>
            </div>
          </div>
          <div class="use-item">
            <span class="use-icon">🎭</span>
            <div>
              <div class="use-title">Stickers & Frames</div>
              <div class="use-desc">Chat stickers, profile frames, hats</div>
              <div class="use-cost">100–500 coins</div>
            </div>
          </div>
          <div class="use-item">
            <span class="use-icon">⚡</span>
            <div>
              <div class="use-title">Profile Upgrades</div>
              <div class="use-desc">Backgrounds, animations, themes</div>
              <div class="use-cost">500–2,000 coins</div>
            </div>
          </div>
          <div class="use-item">
            <span class="use-icon">🏅</span>
            <div>
              <div class="use-title">Badge Upgrades</div>
              <div class="use-desc">Artist Pro, Beatmaker, VIP</div>
              <div class="use-cost">1,000–5,000 coins</div>
            </div>
          </div>
          <div class="use-item">
            <span class="use-icon">🎮</span>
            <div>
              <div class="use-title">Games & Tournaments</div>
              <div class="use-desc">Entry fees, power-ups</div>
              <div class="use-cost">10–500 coins</div>
            </div>
          </div>
          <div class="use-item">
            <span class="use-icon">💜</span>
            <div>
              <div class="use-title">Tip Creators</div>
              <div class="use-desc">Send coins to artists you love</div>
              <div class="use-cost">Any amount</div>
            </div>
          </div>
        </div>
      </div>

      ${notLoggedIn}
      ${historySection}
    `;
  }

  function attachEvents() {
    // Package buy buttons
    document.querySelectorAll('.pkg-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const pkgId = this.dataset.pkg;
        if (this.dataset.coming) {
          showAlert('Payment links coming soon — Stripe setup in progress.', 'error');
          return;
        }
        if (!user) { window.location.href = 'login.html?return=coinshop.html'; return; }
        if (isOwner) { showAlert('You\'re the owner — you already have unlimited coins!', 'success'); return; }
        openConfirm(pkgId);
      });
    });

    // Daily claim
    const dailyBtn = document.getElementById('dailyBtn');
    if (dailyBtn) {
      dailyBtn.addEventListener('click', claimDaily);
    }

    // Confirm panel
    const confirmBtn = document.getElementById('confirmBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    if (confirmBtn) confirmBtn.addEventListener('click', completePurchase);
    if (cancelBtn) cancelBtn.addEventListener('click', closeConfirm);

    // Load transaction history
    if (user) loadHistory();
  }

  function openConfirm(pkgId) {
    const pkg = packages.find(p => p.id === pkgId);
    if (!pkg) return;
    pendingPackage = pkg;

    const total = pkg.coins + (pkg.bonus_coins || 0);
    const stripeLink = STRIPE_LINKS[pkgId];

    const panel = document.getElementById('confirmPanel');
    document.getElementById('confirmTitle').textContent = `Buy ${formatCoins(total)} coins for $${Number(pkg.price_usd).toFixed(2)}`;
    document.getElementById('confirmSteps').innerHTML = `
      <strong>Step 1:</strong> Click the button below to pay on Stripe.<br>
      <strong>Step 2:</strong> Complete your payment (takes ~30 seconds).<br>
      <strong>Step 3:</strong> Return here and click "I Completed Payment" to receive your coins.<br><br>
      <a href="${stripeLink}" target="_blank" rel="noopener"
         style="display:inline-block;background:#635bff;color:#fff;padding:0.6rem 1.2rem;border-radius:10px;font-weight:700;text-decoration:none;font-size:0.9rem;margin-bottom:0.5rem;">
        💳 Pay $${Number(pkg.price_usd).toFixed(2)} on Stripe →
      </a>
    `;
    panel.classList.add('open');
    panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function closeConfirm() {
    pendingPackage = null;
    document.getElementById('confirmPanel').classList.remove('open');
  }

  async function completePurchase() {
    if (!pendingPackage || !user) return;
    const btn = document.getElementById('confirmBtn');
    btn.disabled = true;
    btn.textContent = 'Crediting coins...';

    try {
      const { data, error } = await db.rpc('credit_coins_purchase', {
        p_package_id: pendingPackage.id,
        p_stripe_ref: 'manual_confirm_' + Date.now()
      });

      if (error) throw error;
      if (!data.success) throw new Error(data.error || 'Failed to credit coins');

      updateBalance(data.new_balance);
      closeConfirm();
      showAlert(`✅ ${formatCoins(data.coins_added)} coins added! New balance: ${formatCoins(data.new_balance)} 🪙`);
      loadHistory();
    } catch(e) {
      btn.disabled = false;
      btn.textContent = '✅ I Completed Payment — Credit My Coins';
      showAlert('Error: ' + e.message, 'error');
    }
  }

  async function claimDaily() {
    const btn = document.getElementById('dailyBtn');
    if (!btn || !user) return;
    btn.disabled = true;
    btn.textContent = 'Claiming...';

    try {
      const { data, error } = await db.rpc('claim_daily_coins');
      if (error) throw error;
      if (!data.success) {
        btn.textContent = '✅ Claimed Today';
        showAlert('Already claimed today — come back tomorrow!', 'error');
        return;
      }
      updateBalance(data.new_balance);
      btn.textContent = '✅ Claimed!';
      showAlert(`🎁 ${data.coins_added} coins claimed! Come back tomorrow for more.`);
      loadHistory();
    } catch(e) {
      btn.disabled = false;
      btn.textContent = 'Claim 10 🪙';
      showAlert('Error: ' + e.message, 'error');
    }
  }

  async function loadHistory() {
    const listEl = document.getElementById('txList');
    if (!listEl || !user) return;
    try {
      const { data } = await db.from('coin_transactions')
        .select('amount, type, description, created_at')
        .eq('user_id', user.id)
        .order('created_at', { ascending: false })
        .limit(15);

      if (!data || data.length === 0) {
        listEl.innerHTML = '<div style="text-align:center;padding:1.25rem;color:rgba(168,85,247,.45);font-size:0.85rem;">No transactions yet</div>';
        return;
      }

      listEl.innerHTML = data.map(tx => `
        <div class="tx-row">
          <span class="tx-desc">${tx.description || tx.type}</span>
          <span class="tx-date">${timeAgo(tx.created_at)}</span>
          <span class="tx-amount ${tx.amount > 0 ? 'positive' : 'negative'}">
            ${tx.amount > 0 ? '+' : ''}${formatCoins(tx.amount)} 🪙
          </span>
        </div>`).join('');
    } catch(e) {
      listEl.innerHTML = '<div style="padding:1rem;color:#f87171;font-size:0.85rem;">Could not load history.</div>';
    }
  }
})();
</script>

</body>
</html>
