<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>User Management -- 8BFR</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);--green:#059669;--red:#dc2626;--cyan:#00d9ff;--gold:#fbbf24;--bg:#0b0014;--text-dim:rgba(234,230,255,.55);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(var(--bg),#000);color:var(--text);min-height:100vh;padding-bottom:2rem;}
.header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--primary);letter-spacing:1px;}
.header-links{display:flex;align-items:center;gap:1rem;}
.header-links a{color:var(--text-dim);text-decoration:none;font-size:0.85rem;}
.container{max-width:900px;margin:0 auto;padding:1.5rem 1rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.card h2{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:var(--dim);margin-bottom:1rem;letter-spacing:1px;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.25rem;overflow-x:auto;}
.tab{flex-shrink:0;padding:.65rem .9rem;font-weight:600;font-size:.8rem;cursor:pointer;color:var(--text-dim);border:none;border-bottom:2px solid transparent;background:none;transition:all .2s;white-space:nowrap;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.tab:hover{color:var(--text);}
.search-row{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;}
.search-input{flex:1;min-width:150px;background:rgba(124,58,237,.1);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem;color:var(--text);font-size:.85rem;outline:none;}
.search-input:focus{border-color:var(--primary);box-shadow:0 0 8px rgba(124,58,237,.3);}
select.search-input{cursor:pointer;appearance:auto;}
.btn{padding:.5rem 1rem;border-radius:8px;font-weight:600;font-size:.8rem;cursor:pointer;border:none;transition:all .2s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:#6d28d9;}
.btn-sm{padding:.3rem .6rem;border-radius:6px;font-size:.72rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.btn-view{background:rgba(124,58,237,.2);color:#a855f7;border:1px solid rgba(124,58,237,.4);}
.btn-edit{background:rgba(0,217,255,.15);color:var(--cyan);border:1px solid rgba(0,217,255,.4);}
.btn-verify{background:rgba(5,150,105,.15);color:var(--green);border:1px solid rgba(5,150,105,.4);}
.btn-role{background:rgba(251,191,36,.15);color:var(--gold);border:1px solid rgba(251,191,36,.4);}
.btn-del{background:rgba(220,38,38,.15);color:var(--red);border:1px solid rgba(220,38,38,.4);}
.btn-sm:hover{filter:brightness(1.2);transform:translateY(-1px);}
.role-counts{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;}
.role-badge{background:rgba(124,58,237,.12);border:1px solid var(--border);border-radius:20px;padding:.25rem .7rem;font-size:.72rem;color:var(--text-dim);white-space:nowrap;}
.role-badge strong{color:var(--text);margin-right:.2rem;}
.user-card{background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.2);border-radius:10px;padding:.8rem;margin-bottom:.5rem;transition:all .2s;}
.user-card:hover{border-color:var(--primary);background:rgba(124,58,237,.1);}
.user-row{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
.user-avatar{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);object-fit:cover;background:var(--card);}
.user-info{flex:1;min-width:120px;}
.user-name{font-weight:600;font-size:.9rem;color:var(--text);}
.user-name .verified{color:var(--cyan);font-size:.7rem;margin-left:.3rem;}
.user-meta{font-size:.72rem;color:var(--text-dim);margin-top:.15rem;}
.user-actions{display:flex;gap:.35rem;flex-wrap:wrap;align-items:center;}
.user-badges{display:flex;gap:.25rem;flex-wrap:wrap;margin-top:.3rem;}
.badge{font-size:.65rem;padding:.15rem .45rem;border-radius:10px;font-weight:600;}
.badge-owner{background:rgba(220,38,38,.2);color:#ef4444;border:1px solid rgba(220,38,38,.4);}
.badge-co-owner{background:rgba(251,191,36,.15);color:var(--gold);border:1px solid rgba(251,191,36,.4);}
.badge-admin{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.4);}
.badge-mod{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.4);}
.badge-g7{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.4);}
.badge-verified{background:rgba(0,217,255,.12);color:var(--cyan);border:1px solid rgba(0,217,255,.35);}
.badge-default{background:rgba(124,58,237,.1);color:var(--text-dim);border:1px solid var(--border);}
.empty{text-align:center;padding:2rem;color:var(--text-dim);font-size:.9rem;}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:1rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--primary);border-radius:14px;padding:1.5rem;max-width:420px;width:100%;max-height:80vh;overflow-y:auto;}
.modal h3{font-family:'Bebas Neue',cursive;color:var(--primary);font-size:1.2rem;margin-bottom:1rem;}
.modal label{display:block;font-size:.78rem;color:var(--text-dim);margin-bottom:.3rem;margin-top:.75rem;}
.modal input,.modal select,.modal textarea{width:100%;background:rgba(124,58,237,.1);border:1px solid var(--border);border-radius:8px;padding:.5rem .7rem;color:var(--text);font-size:.85rem;outline:none;}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--primary);}
.modal textarea{min-height:60px;resize:vertical;}
.modal-btns{display:flex;gap:.5rem;margin-top:1.25rem;justify-content:flex-end;}
.dropdown-select{width:100%;background:rgba(124,58,237,.1);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem;color:var(--text);font-size:.85rem;outline:none;cursor:pointer;appearance:auto;}
.dropdown-select:focus{border-color:var(--primary);box-shadow:0 0 8px rgba(124,58,237,.3);}
.dropdown-select option{background:#1a0a2e;color:var(--text);}
.section-label{font-size:.78rem;color:var(--text-dim);margin-bottom:.4rem;font-weight:600;}
.divider{border:none;border-top:1px solid var(--border);margin:1rem 0;}
</style>
</head>
<body>
<div class="header">
    <h1>User Management</h1>
    <div class="header-links">
        <a href="owner-panel.html">&larr; Owner Panel</a>
    </div>
</div>

<div class="container">
    <!-- ROLE COUNTS -->
    <div class="role-counts" id="roleCounts"></div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('browse',this)">Browse All</button>
        <button class="tab" onclick="switchTab('search',this)">Search</button>
        <button class="tab" onclick="switchTab('staff',this)">Staff</button>
        <button class="tab" onclick="switchTab('verified',this)">Verified</button>
    </div>

    <!-- BROWSE DROPDOWN -->
    <div id="browseSection">
        <div class="section-label">Select a member from the dropdown:</div>
        <select class="dropdown-select" id="memberDropdown" onchange="selectFromDropdown()">
            <option value="">-- Select a member --</option>
        </select>
        <div style="margin-top:.5rem;font-size:.72rem;color:var(--text-dim);" id="memberCount"></div>
    </div>

    <!-- SEARCH BOX -->
    <div id="searchSection" style="display:none;">
        <div class="search-row">
            <input type="text" class="search-input" id="searchBox" placeholder="Search by name, username, or email..." onkeyup="if(event.key==='Enter')doSearch()">
            <select class="search-input" id="roleFilter" style="max-width:140px;">
                <option value="">All Roles</option>
            </select>
            <button class="btn btn-primary" onclick="doSearch()">Search</button>
        </div>
    </div>

    <!-- USER LIST -->
    <div id="userList"><div class="spinner"></div></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h3>Edit User</h3>
        <input type="hidden" id="editUserId">
        <label>Display Name</label>
        <input type="text" id="editName">
        <label>Username</label>
        <input type="text" id="editUsername">
        <label>Bio</label>
        <textarea id="editBio"></textarea>
        <label>Role</label>
        <select id="editRole"></select>
        <label>Coins</label>
        <input type="number" id="editCoins" min="0">
        <label>Badges (comma-separated)</label>
        <input type="text" id="editBadges" placeholder="artist, verified, g7...">
        <label>Verified Artist</label>
        <select id="editVerifiedArtist">
            <option value="false">No</option>
            <option value="true">Yes</option>
        </select>
        <div class="modal-btns">
            <button class="btn btn-sm btn-del" onclick="closeModal()">Cancel</button>
            <button class="btn btn-sm btn-primary" onclick="saveEdit()">Save Changes</button>
        </div>
    </div>
</div>

<!-- ROLE CHANGE MODAL -->
<div class="modal-overlay" id="roleModal">
    <div class="modal">
        <h3>Change Role / Promote</h3>
        <input type="hidden" id="roleUserId">
        <p style="font-size:.82rem;color:var(--text-dim);margin-bottom:.75rem;" id="roleUserLabel"></p>
        <label>Set Role To:</label>
        <select id="newRole"></select>
        <label style="margin-top:.75rem;">Add Badge</label>
        <select id="addBadge">
            <option value="">-- no badge --</option>
        </select>
        <div class="modal-btns">
            <button class="btn btn-sm btn-del" onclick="closeRoleModal()">Cancel</button>
            <button class="btn btn-sm btn-primary" onclick="saveRole()">Apply</button>
        </div>
    </div>
</div>

<script src="scripts.js" defer></script>
<script>
var db = supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
var OWNER_ID='cb556180-f032-4b21-9470-1d786f2664ab';
var currentTab='browse';
var allUsers=[];
var myUserId='';

var ALL_ROLES=['fan','artist','beatmaker','producer','songwriter','dj','singer','rapper','engineer','dancer','videographer','photographer','manager','label','promoter','journalist','educator','influencer','designer','author','blogger','community_leader','mentor','developer','streamer','gamer','filmmaker','podcaster','musician','student','brand_ambassador'];
var STAFF_ROLES=['owner','co-owner','admin','mod','g7'];
var ALL_BADGES=['owner','co-owner','admin','mod','g7','verified','artist','beatmaker','producer','songwriter','dj','singer','rapper','engineer','dancer','videographer','photographer','manager','label','promoter','journalist','educator','influencer','designer','author','blogger','community_leader','mentor','developer','streamer','gamer','filmmaker','podcaster','musician','student','brand_ambassador','founding_member','beta_tester','top_poster','top_supporter','vip'];

async function init(){
    var s=await db.auth.getSession();
    if(!s.data.session){location.href='login.html';return;}
    myUserId=s.data.session.user.id;
    var pr=await db.from('profiles').select('role').eq('user_id',myUserId).single();
    if(!pr.data||pr.data.role!=='owner'){
        document.getElementById('userList').innerHTML='<div class="empty">Owner access only.</div>';
        return;
    }
    populateSelects();
    loadRoleCounts();
    loadAllMembers();
}

function populateSelects(){
    var roleFilter=document.getElementById('roleFilter');
    var editRole=document.getElementById('editRole');
    var newRole=document.getElementById('newRole');
    var addBadge=document.getElementById('addBadge');
    var combined=STAFF_ROLES.concat(ALL_ROLES);
    combined.forEach(function(r){
        roleFilter.innerHTML+='<option value="'+r+'">'+r+'</option>';
        editRole.innerHTML+='<option value="'+r+'">'+r+'</option>';
        newRole.innerHTML+='<option value="'+r+'">'+r+'</option>';
    });
    ALL_BADGES.forEach(function(b){
        addBadge.innerHTML+='<option value="'+b+'">'+b+'</option>';
    });
}

async function loadRoleCounts(){
    var {data}=await db.from('profiles').select('role');
    if(!data)return;
    var counts={};
    data.forEach(function(p){
        var r=p.role||'fan';
        counts[r]=(counts[r]||0)+1;
    });
    var html='<div class="role-badge"><strong>'+data.length+'</strong> Total</div>';
    Object.keys(counts).sort().forEach(function(r){
        html+='<div class="role-badge"><strong>'+counts[r]+'</strong> '+r+'</div>';
    });
    document.getElementById('roleCounts').innerHTML=html;
}

async function loadAllMembers(){
    var {data,error}=await db.from('profiles').select('user_id,display_name,username,avatar_url,role,verified_artist,badges,coins,bio,created_at').order('created_at',{ascending:false});
    if(error){document.getElementById('userList').innerHTML='<div class="empty">Error: '+error.message+'</div>';return;}
    allUsers=data||[];
    populateDropdown(allUsers);
    renderUsers(allUsers);
}

function populateDropdown(users){
    var dd=document.getElementById('memberDropdown');
    dd.innerHTML='<option value="">-- Select a member ('+users.length+' total) --</option>';
    users.forEach(function(u){
        var label=(u.display_name||'Unknown')+' (@'+(u.username||'?')+') - '+( u.role||'fan');
        if(u.user_id===OWNER_ID) label+=' [OWNER]';
        var opt=document.createElement('option');
        opt.value=u.user_id;
        opt.textContent=label;
        dd.appendChild(opt);
    });
    document.getElementById('memberCount').textContent=users.length+' members loaded';
}

function selectFromDropdown(){
    var uid=document.getElementById('memberDropdown').value;
    if(!uid){renderUsers(allUsers);return;}
    var user=allUsers.find(function(u){return u.user_id===uid;});
    if(user) renderUsers([user]);
}

function switchTab(tab,el){
    currentTab=tab;
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
    el.classList.add('active');
    document.getElementById('browseSection').style.display=tab==='browse'?'block':'none';
    document.getElementById('searchSection').style.display=tab==='search'?'block':'none';
    document.getElementById('memberDropdown').value='';
    if(tab==='browse'){renderUsers(allUsers);}
    else if(tab==='search'){doSearch();}
    else if(tab==='staff'){loadStaff();}
    else if(tab==='verified'){loadVerified();}
}

async function doSearch(){
    var q=document.getElementById('searchBox').value.trim().toLowerCase();
    var role=document.getElementById('roleFilter').value;
    var filtered=allUsers.filter(function(u){
        var matchQ=!q||(u.display_name||'').toLowerCase().includes(q)||(u.username||'').toLowerCase().includes(q);
        var matchR=!role||(u.role||'fan')===role;
        return matchQ&&matchR;
    });
    renderUsers(filtered);
}

function loadStaff(){
    var staff=allUsers.filter(function(u){
        return STAFF_ROLES.indexOf(u.role)!==-1||(u.badges&&u.badges.some(function(b){return STAFF_ROLES.indexOf(b)!==-1;}));
    });
    renderUsers(staff);
}

function loadVerified(){
    var verified=allUsers.filter(function(u){return u.verified_artist===true;});
    renderUsers(verified);
}

function renderUsers(users){
    var list=document.getElementById('userList');
    if(!users||users.length===0){list.innerHTML='<div class="empty">No users found.</div>';return;}
    var html='';
    users.forEach(function(u){
        var isOwner=u.user_id===OWNER_ID;
        var avatar=u.avatar_url||'assets/images/default-avatar.png';
        var name=esc(u.display_name||'Unknown');
        var uname=esc(u.username||'?');
        var role=u.role||'fan';
        var badges=u.badges||[];
        var isVerified=u.verified_artist===true;
        var joined=u.created_at?new Date(u.created_at).toLocaleDateString():'?';

        html+='<div class="user-card">';
        html+='<div class="user-row">';
        html+='<img src="'+avatar+'" class="user-avatar" onerror="this.src=\'assets/images/default-avatar.png\'">';
        html+='<div class="user-info">';
        html+='<div class="user-name">'+name;
        if(isVerified) html+=' <span class="verified">[VERIFIED]</span>';
        if(isOwner) html+=' <span style="color:var(--red);font-size:.7rem;">[OWNER]</span>';
        html+='</div>';
        html+='<div class="user-meta">@'+uname+' | '+role+' | '+( u.coins||0)+' coins | Joined: '+joined+'</div>';

        if(badges.length>0){
            html+='<div class="user-badges">';
            badges.forEach(function(b){
                var cls='badge-default';
                if(b==='owner')cls='badge-owner';
                else if(b==='co-owner')cls='badge-co-owner';
                else if(b==='admin')cls='badge-admin';
                else if(b==='mod')cls='badge-mod';
                else if(b==='g7')cls='badge-g7';
                else if(b==='verified')cls='badge-verified';
                html+='<span class="badge '+cls+'">'+esc(b)+'</span>';
            });
            html+='</div>';
        }
        html+='</div>';

        // Action buttons - owner gets View+Edit only, others get all
        html+='<div class="user-actions">';
        html+='<button class="btn-sm btn-view" onclick="viewUser(\''+u.user_id+'\')">View</button>';
        html+='<button class="btn-sm btn-edit" onclick="openEdit(\''+u.user_id+'\')">Edit</button>';
        if(!isOwner){
            html+='<button class="btn-sm btn-role" onclick="openRoleModal(\''+u.user_id+'\')">Role</button>';
            html+='<button class="btn-sm btn-verify" onclick="toggleVerify(\''+u.user_id+'\','+isVerified+')">'+(isVerified?'Unverify':'Verify')+'</button>';
            html+='<button class="btn-sm btn-del" onclick="fullDeleteUser(\''+u.user_id+'\',\''+esc(name)+'\')">Delete</button>';
        }
        html+='</div>';

        html+='</div></div>';
    });
    list.innerHTML=html;
}

function viewUser(uid){
    window.open('profile.html?id='+uid,'_blank');
}

function openEdit(uid){
    var u=allUsers.find(function(x){return x.user_id===uid;});
    if(!u)return;
    document.getElementById('editUserId').value=uid;
    document.getElementById('editName').value=u.display_name||'';
    document.getElementById('editUsername').value=u.username||'';
    document.getElementById('editBio').value=u.bio||'';
    document.getElementById('editRole').value=u.role||'fan';
    document.getElementById('editRole').disabled=(uid===OWNER_ID);
    document.getElementById('editCoins').value=u.coins||0;
    document.getElementById('editBadges').value=(u.badges||[]).join(', ');
    document.getElementById('editVerifiedArtist').value=u.verified_artist?'true':'false';
    document.getElementById('editModal').classList.add('show');
}

function closeModal(){document.getElementById('editModal').classList.remove('show');}

async function saveEdit(){
    var uid=document.getElementById('editUserId').value;
    var isOwnerAccount=uid===OWNER_ID;
    var badgeStr=document.getElementById('editBadges').value;
    var badges=badgeStr?badgeStr.split(',').map(function(b){return b.trim();}).filter(function(b){return b;}):[  ];
    // Protect owner: cannot change role, must keep owner badge
    if(isOwnerAccount){
        badges=badges.filter(function(b){return b!=='owner';});
        badges.unshift('owner');
    }
    var update={
        display_name:document.getElementById('editName').value.trim(),
        username:document.getElementById('editUsername').value.trim().toLowerCase(),
        bio:document.getElementById('editBio').value.trim(),
        role:isOwnerAccount?'owner':document.getElementById('editRole').value,
        coins:parseInt(document.getElementById('editCoins').value)||0,
        badges:badges,
        verified_artist:document.getElementById('editVerifiedArtist').value==='true'
    };
    var {error}=await db.from('profiles').update(update).eq('user_id',uid);
    if(error){alert('Error: '+error.message);return;}
    alert('User updated.');
    closeModal();
    // Refresh in-memory data
    var idx=allUsers.findIndex(function(u){return u.user_id===uid;});
    if(idx!==-1) Object.assign(allUsers[idx],update);
    renderUsers(currentTab==='browse'?allUsers:null);
    if(currentTab!=='browse')switchTab(currentTab,document.querySelector('.tab.active'));
    loadRoleCounts();
}

function openRoleModal(uid){
    var u=allUsers.find(function(x){return x.user_id===uid;});
    if(!u)return;
    document.getElementById('roleUserId').value=uid;
    document.getElementById('roleUserLabel').textContent=(u.display_name||'Unknown')+' (@'+(u.username||'?')+') - currently: '+(u.role||'fan');
    document.getElementById('newRole').value=u.role||'fan';
    document.getElementById('addBadge').value='';
    document.getElementById('roleModal').classList.add('show');
}

function closeRoleModal(){document.getElementById('roleModal').classList.remove('show');}

async function saveRole(){
    var uid=document.getElementById('roleUserId').value;
    var newRole=document.getElementById('newRole').value;
    var addBadge=document.getElementById('addBadge').value;
    var u=allUsers.find(function(x){return x.user_id===uid;});
    if(!u)return;

    var update={role:newRole};
    if(addBadge){
        var badges=(u.badges||[]).slice();
        if(badges.indexOf(addBadge)===-1) badges.push(addBadge);
        update.badges=badges;
    }
    var {error}=await db.from('profiles').update(update).eq('user_id',uid);
    if(error){alert('Error: '+error.message);return;}
    alert('Role updated to: '+newRole+(addBadge?' + badge: '+addBadge:''));
    closeRoleModal();
    // Refresh in-memory
    var idx=allUsers.findIndex(function(x){return x.user_id===uid;});
    if(idx!==-1){allUsers[idx].role=newRole;if(update.badges)allUsers[idx].badges=update.badges;}
    switchTab(currentTab,document.querySelector('.tab.active'));
    loadRoleCounts();
}

async function toggleVerify(uid,currently){
    var action=currently?'Remove verification from':'Verify';
    if(!confirm(action+' this user?'))return;
    var update={verified_artist:!currently};
    // Add or remove verified badge too
    var u=allUsers.find(function(x){return x.user_id===uid;});
    if(u){
        var badges=(u.badges||[]).slice();
        if(!currently&&badges.indexOf('verified')===-1) badges.push('verified');
        if(currently) badges=badges.filter(function(b){return b!=='verified';});
        update.badges=badges;
    }
    var {error}=await db.from('profiles').update(update).eq('user_id',uid);
    if(error){alert('Error: '+error.message);return;}
    alert(currently?'Verification removed.':'User verified!');
    var idx=allUsers.findIndex(function(x){return x.user_id===uid;});
    if(idx!==-1){allUsers[idx].verified_artist=!currently;allUsers[idx].badges=update.badges;}
    switchTab(currentTab,document.querySelector('.tab.active'));
}

async function fullDeleteUser(uid,name){
    if(!confirm('DELETE user "'+name+'" from the ENTIRE site?\n\nThis will remove:\n- Profile\n- All posts, songs, stories\n- All follows, friends, messages\n- Auth account (login removed)\n\nThis CANNOT be undone.'))return;
    if(!confirm('FINAL CONFIRMATION: Permanently delete "'+name+'"?\n\nType-check: This deletes them from Supabase Auth too. They cannot log in again.'))return;

    var list=document.getElementById('userList');
    list.innerHTML='<div style="text-align:center;padding:2rem;"><div class="spinner"></div><p style="margin-top:1rem;color:var(--text-dim);">Deleting user from all tables + auth...</p></div>';

    try{
        var resp=await fetch('https://8bfr-api.vercel.app/api/delete-user',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({user_id:uid,requester_id:myUserId})
        });
        var result=await resp.json();
        if(resp.ok||resp.status===207){
            var msg='User "'+name+'" fully deleted from database and auth.';
            if(result.warnings&&result.warnings.length>0){
                msg+='\n\nWarnings (non-critical):\n'+result.warnings.join('\n');
            }
            alert(msg);
            // Remove from local array
            allUsers=allUsers.filter(function(u){return u.user_id!==uid;});
            populateDropdown(allUsers);
            renderUsers(allUsers);
            loadRoleCounts();
        }else{
            alert('Delete failed: '+(result.error||'Unknown error'));
            switchTab(currentTab,document.querySelector('.tab.active'));
        }
    }catch(e){
        alert('Network error: '+e.message+'\n\nFallback: User may need manual deletion from Supabase Auth dashboard.');
        switchTab(currentTab,document.querySelector('.tab.active'));
    }
}

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

init();
</script>
