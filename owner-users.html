<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>User Management — 8BFR</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#7c3aed;--card:#0c0618;--text:#eae6ff;--dim:#a855f7;--border:rgba(124,58,237,.35);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:2rem;}
.header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.header h1{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--primary);}
.container{max-width:800px;margin:0 auto;padding:1.5rem;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.25rem;}
.tab{flex:1;text-align:center;padding:.65rem;font-weight:600;font-size:.82rem;cursor:pointer;color:rgba(234,230,255,.5);border:none;border-bottom:2px solid transparent;background:none;transition:all .2s;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:.6rem;}
.search-box{display:flex;gap:.5rem;margin-bottom:1.25rem;}
.search-input{flex:1;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;padding:.55rem .8rem;color:var(--text);font-size:.88rem;outline:none;}
.search-input:focus{border-color:var(--primary);}
.btn{background:var(--primary);color:#fff;border:none;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-weight:600;font-size:.82rem;}
.btn:hover{background:#6d28d9;}
.btn-sm{padding:.3rem .7rem;font-size:.75rem;border-radius:6px;}
.btn-green{background:#059669;}.btn-green:hover{background:#047857;}
.btn-red{background:#dc2626;}.btn-red:hover{background:#b91c1c;}
.btn-ghost{background:rgba(124,58,237,.12);border:1px solid var(--border);color:var(--dim);}
.user-row{display:flex;align-items:center;gap:.75rem;padding:.75rem;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:.5rem;}
.user-row:hover{border-color:var(--primary);}
.user-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;overflow:hidden;}
.user-av img{width:100%;height:100%;object-fit:cover;}
.user-info{flex:1;min-width:0;}
.user-name{font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-meta{font-size:.72rem;color:var(--dim);}
.role-badge{display:inline-block;font-size:.65rem;padding:.15rem .45rem;border-radius:999px;font-weight:700;margin-right:.2rem;}
.role-owner{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.role-co-owner{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.25);}
.role-admin{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.3);}
.role-mod{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.3);}
.role-g7{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.4);}
.role-verified{background:rgba(0,217,255,.1);color:#00d9ff;border:1px solid rgba(0,217,255,.3);}
.actions-row{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.4rem;}
.empty{text-align:center;padding:2rem;color:var(--dim);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.5rem;margin-bottom:1.5rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem;text-align:center;}
.stat-num{font-size:1.2rem;font-weight:800;color:var(--primary);}
.stat-label{font-size:.65rem;color:var(--dim);text-transform:uppercase;margin-top:.1rem;}
</style>
</head>
<body>
<div class="header">
  <a href="owner-panel.html" style="color:var(--dim);text-decoration:none;font-weight:600;">← Owner Panel</a>
  <h1>👥 User Management</h1>
  <span></span>
</div>
<div class="container">
  <div class="stat-cards" id="roleCounts"><div class="spinner"></div></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('search',this)">🔍 Search</button>
    <button class="tab" onclick="switchTab('staff',this)">👑 Staff</button>
    <button class="tab" onclick="switchTab('verified',this)">✅ Verified</button>
    <button class="tab" onclick="switchTab('all',this)">📋 All Users</button>
  </div>

  <div id="searchSection">
    <div class="search-box">
      <input class="search-input" id="userSearch" placeholder="Search by username or email..." onkeypress="if(event.key==='Enter')doSearch()">
      <button class="btn" onclick="doSearch()">Search</button>
    </div>
  </div>

  <div id="userList"><div class="empty">Search for a user or select a tab above.</div></div>
</div>

<script src="scripts.js" defer></script>
<script>
var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
var OWNER_ID='cb556180-f032-4b21-9470-1d786f2664ab';
var currentTab='search';
var STAFF_ROLES=['owner','co-owner','admin','mod','g7'];
var PROMOTE_OPTIONS=[
  {role:'co-owner',label:'👑 Co-Owner',cls:'role-co-owner'},
  {role:'admin',label:'⚙️ Admin',cls:'role-admin'},
  {role:'mod',label:'💬 Mod',cls:'role-mod'},
  {role:'g7',label:'👑 G7',cls:'role-g7'},
  {role:'verified',label:'🛡️ Verified',cls:'role-verified'}
];

async function init(){
  var s=await db.auth.getSession();
  if(!s.data.session){location.href='login.html';return;}
  var pr=await db.from('profiles').select('role').eq('user_id',s.data.session.user.id).single();
  if(!pr.data||pr.data.role!=='owner'){
    document.getElementById('userList').innerHTML='<div class="empty">🔒 Owner access only.</div>';
    return;
  }
  loadRoleCounts();
}

async function loadRoleCounts(){
  var el=document.getElementById('roleCounts');
  try{
    var r=await db.from('profiles').select('role,badges');
    var d=r.data||[];
    var counts={};
    STAFF_ROLES.forEach(function(role){counts[role]=0;});
    counts.verified=0;counts.artist=0;counts.beatmaker=0;counts.total=d.length;
    d.forEach(function(p){
      var b=p.badges||[];
      STAFF_ROLES.forEach(function(role){if(b.indexOf(role)!==-1||p.role===role)counts[role]++;});
      if(b.indexOf('verified')!==-1||p.verified_artist)counts.verified++;
      if(b.indexOf('artist')!==-1)counts.artist++;
      if(b.indexOf('beatmaker')!==-1)counts.beatmaker++;
    });
    el.innerHTML=[
      {n:counts.total,l:'Total Users'},
      {n:counts['co-owner'],l:'Co-Owners'},
      {n:counts.admin,l:'Admins'},
      {n:counts.mod,l:'Mods'},
      {n:counts.g7,l:'G7 Council'},
      {n:counts.verified,l:'Verified'},
      {n:counts.artist,l:'Artists'},
      {n:counts.beatmaker,l:'Beatmakers'}
    ].map(function(s){return '<div class="stat-card"><div class="stat-num">'+s.n+'</div><div class="stat-label">'+s.l+'</div></div>';}).join('');
  }catch(e){el.innerHTML='';}
}

function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(btn)btn.classList.add('active');
  document.getElementById('searchSection').style.display=tab==='search'?'block':'none';
  if(tab==='staff')loadStaff();
  else if(tab==='verified')loadVerified();
  else if(tab==='all')loadAll();
  else document.getElementById('userList').innerHTML='<div class="empty">Search for a user above.</div>';
}

async function doSearch(){
  var q=document.getElementById('userSearch').value.trim();
  if(!q){return;}
  var el=document.getElementById('userList');
  el.innerHTML='<div class="spinner"></div>';
  try{
    var r=await db.from('profiles').select('*').or('username.ilike.%'+q+'%,display_name.ilike.%'+q+'%,email.ilike.%'+q+'%').limit(20);
    renderUsers(r.data||[]);
  }catch(e){el.innerHTML='<div class="empty">Error: '+e.message+'</div>';}
}

async function loadStaff(){
  var el=document.getElementById('userList');
  el.innerHTML='<div class="spinner"></div>';
  try{
    var r=await db.from('profiles').select('*').in('role',STAFF_ROLES).order('role');
    renderUsers(r.data||[]);
  }catch(e){el.innerHTML='<div class="empty">Error: '+e.message+'</div>';}
}

async function loadVerified(){
  var el=document.getElementById('userList');
  el.innerHTML='<div class="spinner"></div>';
  try{
    var r=await db.from('profiles').select('*').eq('verified_artist',true).order('display_name');
    renderUsers(r.data||[]);
  }catch(e){el.innerHTML='<div class="empty">Error: '+e.message+'</div>';}
}

async function loadAll(){
  var el=document.getElementById('userList');
  el.innerHTML='<div class="spinner"></div>';
  try{
    var r=await db.from('profiles').select('*').order('created_at',{ascending:false}).limit(50);
    renderUsers(r.data||[]);
  }catch(e){el.innerHTML='<div class="empty">Error: '+e.message+'</div>';}
}

function renderUsers(users){
  var el=document.getElementById('userList');
  if(!users.length){el.innerHTML='<div class="empty">No users found.</div>';return;}

  el.innerHTML=users.map(function(u){
    var av=u.avatar_url?'<img src="'+esc(u.avatar_url)+'" onerror="this.parentNode.textContent=\'👤\'">':'👤';
    var badges=(u.badges||[]).filter(function(b){return STAFF_ROLES.indexOf(b)!==-1||b==='verified';}).map(function(b){
      var cls='role-badge role-'+(b==='co-owner'?'co-owner':b);
      return '<span class="'+cls+'">'+esc(b)+'</span>';
    }).join('');

    var isProtected=u.user_id===OWNER_ID;

    // Promote buttons
    var promoteHtml='';
    if(!isProtected){
      promoteHtml=PROMOTE_OPTIONS.map(function(opt){
        var has=(u.badges||[]).indexOf(opt.role)!==-1||u.role===opt.role;
        if(has){
          return '<button class="btn-sm btn-red" onclick="demoteUser(\''+u.user_id+'\',\''+opt.role+'\')">✕ '+opt.label+'</button>';
        }else{
          return '<button class="btn-sm btn-ghost" onclick="promoteUser(\''+u.user_id+'\',\''+opt.role+'\')">+ '+opt.label+'</button>';
        }
      }).join('');
    }

    return '<div class="user-row">'
      +'<a href="profile.html?id='+u.user_id+'" style="text-decoration:none;"><div class="user-av">'+av+'</div></a>'
      +'<div class="user-info">'
        +'<div class="user-name">'+esc(u.display_name||u.username||'Unknown')+' '+badges+'</div>'
        +'<div class="user-meta">@'+esc(u.username||'')+' · '+esc(u.role||'fan')+' · 🪙 '+(u.coins||0)+'</div>'
        +(promoteHtml?'<div class="actions-row">'+promoteHtml+'</div>':'')
      +'</div>'
    +'</div>';
  }).join('');
}

window.promoteUser=async function(uid,role){
  if(!confirm('Give '+role+' to this user?'))return;
  try{
    // Add to badges array
    var pr=await db.from('profiles').select('badges,role').eq('user_id',uid).single();
    var badges=pr.data.badges||[];
    if(badges.indexOf(role)===-1)badges.push(role);

    var update={badges:badges};
    // For co-owner, also change primary role and give perks
    if(role==='co-owner'){
      update.role='co-owner';
      update.coins=999999999;
      update.verified_artist=true;
      update.algorithm_points=99999;
      update.algorithm_tier='Diamond';
    }
    // For admin/mod/g7 don't change primary role, just add badge
    var r=await db.from('profiles').update(update).eq('user_id',uid);
    if(r.error)throw r.error;
    alert('✅ '+role+' granted!');
    // Reload current tab
    if(currentTab==='staff')loadStaff();
    else if(currentTab==='all')loadAll();
    else doSearch();
    loadRoleCounts();
  }catch(e){alert('Error: '+e.message);}
};

window.demoteUser=async function(uid,role){
  if(!confirm('Remove '+role+' from this user?'))return;
  try{
    var pr=await db.from('profiles').select('badges,role').eq('user_id',uid).single();
    var badges=(pr.data.badges||[]).filter(function(b){return b!==role;});
    var update={badges:badges};
    // If removing co-owner, revert to fan
    if(role==='co-owner'&&pr.data.role==='co-owner'){
      update.role='fan';
      // Don't reset coins — they keep what they have
    }
    var r=await db.from('profiles').update(update).eq('user_id',uid);
    if(r.error)throw r.error;
    alert('✅ '+role+' removed.');
    if(currentTab==='staff')loadStaff();
    else if(currentTab==='all')loadAll();
    else doSearch();
    loadRoleCounts();
  }catch(e){alert('Error: '+e.message);}
};

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
init();
</script>
</body>
</html>
