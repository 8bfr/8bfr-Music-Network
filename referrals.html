<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>🎁 Refer Friends — 8BFR Music Network</title>
  <link rel="icon" href="assets/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--primary:#7c3aed;--primary-bright:#a855f7;--card:#0c0618;--text:#eae6ff;--dim:rgba(168,85,247,.7);--border:rgba(124,58,237,.35);--success:#22c55e;--danger:#ef4444;--text-dim:rgba(234,230,255,.5);--gold:#fbbf24;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Work Sans',sans-serif;background:linear-gradient(#0b0014,#000);color:var(--text);min-height:100vh;padding-bottom:5rem;}
    .header{background:rgba(15,0,30,.95);border-bottom:2px solid var(--primary);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
    .header h1{font-family:'Bebas Neue',cursive;font-size:1.4rem;color:var(--primary);}
    .header a{color:var(--primary-bright);text-decoration:none;font-weight:600;font-size:.85rem;}
    .container{max-width:680px;margin:0 auto;padding:1.5rem;}
    .hero{background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(168,85,247,.05));border:1px solid var(--border);border-radius:18px;padding:2rem 1.5rem;text-align:center;margin-bottom:1.5rem;}
    .hero h2{font-family:'Bebas Neue',cursive;font-size:2rem;color:var(--primary-bright);letter-spacing:.04em;margin-bottom:.5rem;}
    .hero .gift{font-size:3rem;margin-bottom:.5rem;}
    .hero .reward-box{display:flex;justify-content:center;gap:1rem;margin:1.25rem 0;flex-wrap:wrap;}
    .reward{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:12px;padding:.85rem 1.1rem;flex:1;min-width:140px;max-width:180px;}
    .reward .num{font-family:'Bebas Neue',cursive;font-size:1.8rem;color:var(--gold);}
    .reward .lbl{font-size:.75rem;color:var(--text-dim);margin-top:.2rem;}
    .code-box{background:var(--card);border:2px solid var(--primary);border-radius:14px;padding:1.5rem;text-align:center;margin-bottom:1rem;}
    .code-box .label{font-size:.78rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;}
    .code-display{font-family:'Bebas Neue',cursive;font-size:2.2rem;color:var(--primary-bright);letter-spacing:.15em;background:rgba(124,58,237,.08);padding:.85rem 1rem;border-radius:10px;margin-bottom:.75rem;cursor:pointer;user-select:all;-webkit-user-select:all;border:1px dashed rgba(124,58,237,.4);transition:all .15s;}
    .code-display:hover{background:rgba(124,58,237,.15);border-color:var(--primary-bright);}
    .link-row{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem;font-size:.78rem;color:var(--text-dim);font-family:monospace;word-break:break-all;text-align:left;margin-bottom:.85rem;cursor:pointer;}
    .btn-row{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;}
    .btn{background:var(--primary);color:white;border:none;padding:.65rem 1.25rem;border-radius:10px;cursor:pointer;font-weight:600;font-size:.88rem;display:inline-flex;align-items:center;gap:.4rem;text-decoration:none;transition:transform .1s,background .15s;}
    .btn:hover{background:var(--primary-bright);transform:translateY(-1px);}
    .btn:active{transform:translateY(0);}
    .btn.copy{background:rgba(124,58,237,.2);border:1px solid var(--border);color:var(--primary-bright);}
    .btn.copy.copied{background:var(--success);color:white;border-color:var(--success);}
    .btn.share{background:#1d9bf0;}
    .btn.fb{background:#1877f2;}
    .btn.wa{background:#25d366;}
    .btn.sms{background:#10b981;}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;margin-bottom:1.5rem;}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center;}
    .stat-card .num{font-family:'Bebas Neue',cursive;font-size:1.7rem;color:var(--primary-bright);}
    .stat-card .lbl{font-size:.72rem;color:var(--text-dim);margin-top:.2rem;}
    .stat-card.gold .num{color:var(--gold);}
    .stat-card.green .num{color:var(--success);}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
    .card h3{font-family:'Bebas Neue',cursive;font-size:1.2rem;color:var(--primary-bright);letter-spacing:.04em;margin-bottom:.85rem;}
    .ref-row{display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid rgba(124,58,237,.08);}
    .ref-row:last-child{border-bottom:none;}
    .ref-avatar{width:40px;height:40px;border-radius:50%;background:rgba(124,58,237,.2);display:flex;align-items:center;justify-content:center;font-size:1rem;overflow:hidden;flex-shrink:0;}
    .ref-avatar img{width:100%;height:100%;object-fit:cover;}
    .ref-info{flex:1;min-width:0;}
    .ref-name{font-weight:600;font-size:.9rem;}
    .ref-date{font-size:.72rem;color:var(--text-dim);}
    .ref-reward{font-weight:700;color:var(--gold);font-size:.9rem;}
    .empty{text-align:center;padding:1.5rem;color:var(--text-dim);font-size:.88rem;}
    .how-list{list-style:none;padding:0;}
    .how-list li{display:flex;align-items:flex-start;gap:.75rem;padding:.65rem 0;border-bottom:1px solid rgba(124,58,237,.08);}
    .how-list li:last-child{border-bottom:none;}
    .how-num{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;}
    .how-text{font-size:.88rem;line-height:1.5;}
    .spinner{width:36px;height:36px;border-radius:50%;border:3px solid rgba(168,85,247,.2);border-top-color:var(--primary-bright);animation:spin .7s linear infinite;margin:2rem auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .login-prompt{text-align:center;padding:3rem 1rem;}
  </style>
</head>
<body>

<div class="header">
  <h1>🎁 Refer Friends</h1>
  <a href="profile.html">← Profile</a>
</div>

<div class="container">
  <div id="loading"><div class="spinner"></div></div>
  <div id="content" style="display:none;"></div>
  <div id="loginPrompt" style="display:none;" class="login-prompt">
    <h2 style="color:var(--primary-bright);font-family:'Bebas Neue',cursive;font-size:1.5rem;margin-bottom:.5rem;">Sign in to invite friends</h2>
    <p style="color:var(--text-dim);margin-bottom:1.25rem;">Earn 250 coins for every friend who joins.</p>
    <a href="login.html?return=referrals.html" class="btn">Log In</a>
    <a href="signup.html" class="btn" style="background:rgba(124,58,237,.2);border:1px solid var(--border);color:var(--primary-bright);margin-left:.5rem;">Sign Up</a>
  </div>
</div>

<script>
(async function(){
  var SUPABASE_URL='https://novbuvwpjnxwwvdekjhr.supabase.co';
  var SUPABASE_KEY='sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f';
  var db=window._8bfrSupabaseClient||window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

  var sess=await db.auth.getSession();
  var user=sess&&sess.data&&sess.data.session?sess.data.session.user:null;
  if(!user){
    document.getElementById('loading').style.display='none';
    document.getElementById('loginPrompt').style.display='block';
    return;
  }

  // Load profile + referrals
  var prof=await db.from('profiles').select('referral_code,coins,username,display_name').eq('user_id',user.id).single();
  if(prof.error){
    document.getElementById('loading').innerHTML='<div class="empty" style="color:var(--danger);">Error: '+prof.error.message+'</div>';
    return;
  }
  var p=prof.data||{};

  // If profile has no referral_code yet, generate one
  if(!p.referral_code){
    var newCode=generateCode(p.username||user.email||'user');
    var upd=await db.from('profiles').update({referral_code:newCode}).eq('user_id',user.id);
    if(!upd.error)p.referral_code=newCode;
  }

  // Load my referrals (people I invited)
  var refsRes=await db.from('referrals').select('id,referred_id,referral_code,status,referrer_reward,coins_awarded,created_at,rewarded_at').eq('referrer_id',user.id).order('created_at',{ascending:false});
  var refs=refsRes.data||[];

  // Hydrate invited users' info
  var invitedIds=refs.map(function(r){return r.referred_id;}).filter(Boolean);
  var invitedMap={};
  if(invitedIds.length){
    var ipr=await db.from('profiles').select('user_id,username,display_name,avatar_url').in('user_id',invitedIds);
    (ipr.data||[]).forEach(function(p){invitedMap[p.user_id]=p;});
  }

  render(p,refs,invitedMap);
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';

  function generateCode(seed){
    var clean=(seed||'USER').replace(/[^A-Za-z0-9]/g,'').toUpperCase().substring(0,4)||'USER';
    var rand=Math.floor(Math.random()*0xFFFFF).toString(36).toUpperCase().padStart(4,'0').substring(0,4);
    return (clean+rand).substring(0,8);
  }

  function fmtDate(s){var d=new Date(s);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
  function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

  function render(p,refs,invitedMap){
    var code=p.referral_code||'NOCODE';
    var link='https://8bfr.com/signup.html?ref='+encodeURIComponent(code);
    var totalRefs=refs.length;
    var totalEarned=refs.filter(function(r){return r.status==='rewarded';}).reduce(function(a,r){return a+(r.referrer_reward||r.coins_awarded||0);},0);
    var pendingRefs=refs.filter(function(r){return r.status==='pending';}).length;

    var shareText='Join me on 8BFR Music Network! Use my code '+code+' for bonus coins: '+link;

    var h='';
    // Hero
    h+='<div class="hero">';
    h+='<div class="gift">🎁</div>';
    h+='<h2>Invite Friends, Earn Coins</h2>';
    h+='<div style="color:var(--text-dim);font-size:.95rem;line-height:1.5;max-width:420px;margin:0 auto;">Every friend who joins using your code earns YOU 250 coins, and they get 100 to start.</div>';
    h+='<div class="reward-box">';
    h+='<div class="reward"><div class="num">+250</div><div class="lbl">🪙 You earn</div></div>';
    h+='<div class="reward"><div class="num">+100</div><div class="lbl">🪙 They get</div></div>';
    h+='</div>';
    h+='</div>';

    // Code box
    h+='<div class="code-box">';
    h+='<div class="label">Your referral code</div>';
    h+='<div class="code-display" id="codeDisplay" onclick="copyCode()" title="Tap to copy">'+esc(code)+'</div>';
    h+='<div class="link-row" id="linkDisplay" onclick="copyLink()" title="Tap to copy link">'+esc(link)+'</div>';
    h+='<div class="btn-row">';
    h+='<button class="btn copy" id="copyLinkBtn" onclick="copyLink()">📋 Copy Link</button>';
    h+='<button class="btn share" onclick="shareNative()">📤 Share</button>';
    h+='</div>';
    h+='<div class="btn-row" style="margin-top:.5rem;">';
    h+='<a class="btn wa" href="https://wa.me/?text='+encodeURIComponent(shareText)+'" target="_blank">💬 WhatsApp</a>';
    h+='<a class="btn fb" href="https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(link)+'" target="_blank">f Facebook</a>';
    h+='<a class="btn share" style="background:#1d9bf0;" href="https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText)+'" target="_blank">𝕏 Post</a>';
    h+='<a class="btn sms" href="sms:?&body='+encodeURIComponent(shareText)+'">💬 SMS</a>';
    h+='</div>';
    h+='</div>';

    // Stats
    h+='<div class="stats-grid">';
    h+='<div class="stat-card green"><div class="num">'+totalRefs+'</div><div class="lbl">Friends Invited</div></div>';
    h+='<div class="stat-card gold"><div class="num">'+totalEarned+'</div><div class="lbl">🪙 Coins Earned</div></div>';
    h+='<div class="stat-card"><div class="num">'+pendingRefs+'</div><div class="lbl">⏳ Pending</div></div>';
    h+='</div>';

    // Recent referrals
    h+='<div class="card">';
    h+='<h3>👥 Your Referrals</h3>';
    if(!refs.length){
      h+='<div class="empty">No referrals yet. Share your code to start earning!</div>';
    } else {
      refs.slice(0,20).forEach(function(r){
        var ref=invitedMap[r.referred_id]||{};
        var name=ref.display_name||ref.username||'New Member';
        var av=ref.avatar_url?'<img src="'+ref.avatar_url+'" onerror="this.parentNode.textContent=\'👤\'">':'👤';
        var statusBadge='';
        if(r.status==='rewarded')statusBadge='<span style="font-size:.65rem;background:rgba(34,197,94,.15);color:var(--success);padding:.15rem .4rem;border-radius:4px;border:1px solid rgba(34,197,94,.3);margin-left:.4rem;">✓ Rewarded</span>';
        else if(r.status==='pending')statusBadge='<span style="font-size:.65rem;background:rgba(251,191,36,.15);color:var(--gold);padding:.15rem .4rem;border-radius:4px;margin-left:.4rem;">⏳</span>';
        else if(r.status==='voided')statusBadge='<span style="font-size:.65rem;background:rgba(239,68,68,.15);color:var(--danger);padding:.15rem .4rem;border-radius:4px;margin-left:.4rem;">Voided</span>';
        h+='<div class="ref-row"><div class="ref-avatar">'+av+'</div><div class="ref-info"><div class="ref-name"><a href="profile.html?id='+r.referred_id+'" style="color:var(--text);text-decoration:none;">'+esc(name)+'</a>'+statusBadge+'</div><div class="ref-date">Joined '+fmtDate(r.created_at)+'</div></div><div class="ref-reward">+'+(r.referrer_reward||r.coins_awarded||0)+' 🪙</div></div>';
      });
    }
    h+='</div>';

    // How it works
    h+='<div class="card">';
    h+='<h3>📖 How It Works</h3>';
    h+='<ul class="how-list">';
    h+='<li><div class="how-num">1</div><div class="how-text">Share your code or link with friends</div></li>';
    h+='<li><div class="how-num">2</div><div class="how-text">They sign up and verify their email using your code</div></li>';
    h+='<li><div class="how-num">3</div><div class="how-text">You instantly get <strong style="color:var(--gold);">250 coins</strong>, they get <strong style="color:var(--gold);">100 coins</strong></div></li>';
    h+='<li><div class="how-num">4</div><div class="how-text">No limit — invite as many friends as you want!</div></li>';
    h+='</ul>';
    h+='<div style="font-size:.72rem;color:var(--text-dim);margin-top:1rem;text-align:center;">Rewards trigger only after the new user verifies their email. Self-referrals and abuse may result in voided rewards.</div>';
    h+='</div>';

    document.getElementById('content').innerHTML=h;

    // Stash for copy handlers
    window._refCode=code;
    window._refLink=link;
    window._refShareText=shareText;
  }

  window.copyCode=function(){
    copy(window._refCode);
    flash('codeDisplay','Copied!');
  };

  window.copyLink=function(){
    copy(window._refLink);
    var btn=document.getElementById('copyLinkBtn');
    if(btn){
      var prev=btn.innerHTML;
      btn.innerHTML='✓ Copied!';
      btn.classList.add('copied');
      setTimeout(function(){btn.innerHTML=prev;btn.classList.remove('copied');},1500);
    }
  };

  window.shareNative=function(){
    if(navigator.share){
      navigator.share({
        title:'Join me on 8BFR',
        text:window._refShareText,
        url:window._refLink
      }).catch(function(){});
    } else {
      copyLink();
    }
  };

  function copy(text){
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).catch(function(){fallbackCopy(text);});
    } else {
      fallbackCopy(text);
    }
  }
  function fallbackCopy(text){
    var ta=document.createElement('textarea');
    ta.value=text;
    ta.style.position='fixed';
    ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.select();
    try{document.execCommand('copy');}catch(e){}
    document.body.removeChild(ta);
  }
  function flash(id,msg){
    var el=document.getElementById(id);
    if(!el)return;
    var orig=el.textContent;
    el.textContent=msg;
    el.style.background='rgba(34,197,94,.15)';
    el.style.borderColor='var(--success)';
    setTimeout(function(){
      el.textContent=orig;
      el.style.background='';
      el.style.borderColor='';
    },1200);
  }
})();
</script>

<script src="scripts.js" defer></script>
</body>
</html>
