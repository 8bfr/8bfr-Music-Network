<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Letter Storm -- 8BFR Games</title><link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>*{margin:0;padding:0;box-sizing:border-box;}
#bubbleStack,#_8bfr_copyright,.bubble-row,#carrieWrap,#avatarSwitcher,.global-avatar,.avatar-wrap,#pageUpBtn{display:none!important;}body{padding-top:0!important;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(#080020,#020008);color:#f0ecff;min-height:100vh;}
.hdr{background:rgba(8,0,18,.97);border-bottom:2px solid #a855f7;padding:.5rem .75rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}.hdr a{color:#a855f7;text-decoration:none;font-weight:700;font-size:.8rem;}.hdr h1{font-family:'Bebas Neue',cursive;font-size:1.2rem;color:#a855f7;}
.container{max-width:380px;margin:0 auto;padding:.75rem;}
.info{display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.5rem;font-weight:600;}
.scrambled{display:flex;gap:.3rem;justify-content:center;margin-bottom:.75rem;flex-wrap:wrap;}
.letter{width:40px;height:44px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:1.4rem;border-radius:8px;cursor:pointer;border:2px solid rgba(168,85,247,.3);background:rgba(168,85,247,.1);color:#e8d5ff;user-select:none;transition:all .1s;}
.letter:active{transform:scale(.9);background:rgba(168,85,247,.3);}
.letter.used{opacity:.3;pointer-events:none;}
.guess{display:flex;gap:.3rem;justify-content:center;margin-bottom:.5rem;min-height:44px;flex-wrap:wrap;}
.guess .letter{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.3);color:#4ade80;cursor:pointer;}
.found{background:rgba(0,0,0,.2);border-radius:10px;padding:.5rem;margin-bottom:.5rem;min-height:60px;}
.found-word{display:inline-block;padding:.2rem .5rem;margin:.15rem;border-radius:6px;background:rgba(74,222,128,.12);color:#4ade80;font-size:.75rem;font-weight:600;}
.btns{display:flex;gap:.25rem;justify-content:center;margin-bottom:.5rem;}
.btn2{padding:.4rem .7rem;border-radius:8px;font-weight:700;font-size:.75rem;cursor:pointer;border:none;color:#fff;background:#7c3aed;}
.btn2.g{background:#22c55e;color:#000;}
.msg{text-align:center;padding:.5rem;font-family:'Bebas Neue',cursive;font-size:1.2rem;border-radius:10px;display:none;}.msg.show{display:block;}
</style></head><body>
<div class="hdr"><a href="multiplayer-games.html">&larr;</a><h1>Letter Storm</h1></div>
<div class="container">
<div class="info"><span>Score: <span id="score">0</span></span><span id="timer">2:00</span><span>Words: <span id="wc">0</span></span></div>
<div class="scrambled" id="letters"></div>
<div class="guess" id="guess"></div>
<div class="btns"><button class="btn2" onclick="clearGuess()">Clear</button><button class="btn2 g" onclick="submitGuess()">Submit</button><button class="btn2" onclick="shuffleLetters()">Shuffle</button></div>
<div class="found" id="found"></div>
<div class="msg" id="msg"></div>
</div>
<script src="scripts.js" defer></script>
<script>
if(window.GameSession)GameSession.start("letterstorm");

var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','sb_publishable_xUzu8q8DhqqS9c8SQUDPlA_N8dUVz5f');
var VALID=['the','and','for','are','but','not','you','all','can','had','her','was','one','our','out','day','get','has','him','his','how','its','may','new','now','old','see','way','who','did','let','say','she','too','use','act','age','ago','air','also','any','ask','bad','bag','bar','bed','big','bit','boy','bus','buy','car','cat','cut','dad','dog','dry','ear','eat','end','eye','far','few','fly','fun','game','girl','give','goes','gold','good','grow','half','hand','hang','hard','hate','have','head','hear','help','here','hide','high','hill','hold','hole','home','hope','hour','huge','hunt','hurt','idea','iron','item','join','jump','just','keen','keep','kick','kill','kind','king','know','lack','lake','land','last','late','lead','left','less','life','lift','like','line','link','list','live','lock','long','look','lord','lose','loss','lost','love','luck','made','main','make','male','many','mark','mass','mate','meal','mean','meet','mile','milk','mind','mine','miss','mode','mood','moon','more','most','move','much','must','name','near','neck','need','next','nice','nine','none','nor','nose','note','card','once','only','onto','open','over','pace','pack','page','paid','pain','pair','pale','palm','park','part','pass','past','path','pick','plan','play','plot','plus','poem','poet','poll','pool','poor','port','post','pour','pray','pull','pure','push','race','rain','rank','rare','rate','read','real','rear','rely','rest','rich','ride','ring','rise','risk','road','rock','role','roll','roof','room','root','rope','rose','rule','rush','safe','said','sail','sake','sale','salt','same','sand','sang','save','says','seal','seat','seed','seek','seem','seen','self','sell','send','sept','serve','set','shed','ship','shop','shot','show','shut','sick','side','sign','sing','sink','site','size','skin','slip','slow','snow','soft','soil','sold','sole','some','song','soon','sort','soul','spot','star','stay','stem','step','stop','such','suit','sure','swim','tail','take','tale','talk','tall','tape','task','team','tend','term','test','text','than','that','them','then','they','thin','this','thus','tide','till','time','tiny','told','tone','took','tool','tops','tore','torn','tour','town','tree','trim','trip','true','tube','tuck','tune','turn','twin','type','ugly','unit','upon','used','user','vast','very','view','vine','vote','wage','wait','wake','walk','wall','want','warm','warn','wash','wave','weak','wear','week','well','went','were','west','what','when','whom','wide','wife','wild','will','wind','wine','wing','wire','wise','wish','with','wood','word','wore','work','worm','worn','wrap','yard','yeah','year','zero','zone'];
var letters=[],guess=[],found=[],score=0,seconds=120,timerIv,currentUser=null;
(async function(){var s=await db.auth.getSession();if(s.data.session)currentUser=s.data.session.user;newRound();})();
function newRound(){
var vowels='AEIOU',cons='BCDFGHJKLMNPQRSTVWXYZ';
letters=[];
for(var i=0;i<3;i++)letters.push(vowels[Math.floor(Math.random()*5)]);
for(var i=0;i<5;i++)letters.push(cons[Math.floor(Math.random()*21)]);
shuffleArr(letters);guess=[];found=[];score=0;seconds=120;
document.getElementById('score').textContent='0';document.getElementById('wc').textContent='0';
document.getElementById('found').innerHTML='';document.getElementById('msg').classList.remove('show');
renderLetters();renderGuess();
clearInterval(timerIv);timerIv=setInterval(tick,1000);tick();
}
function shuffleArr(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}}
function shuffleLetters(){shuffleArr(letters);renderLetters();}
function tick(){seconds--;var m=Math.floor(seconds/60),s=seconds%60;document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s;if(seconds<=0){clearInterval(timerIv);endGame();}}
function renderLetters(){document.getElementById('letters').innerHTML=letters.map(function(l,i){return '<div class="letter'+(guess.some(function(g){return g.idx===i;})?' used':'')+'" onclick="pickLetter('+i+')">'+l+'</div>';}).join('');}
function renderGuess(){document.getElementById('guess').innerHTML=guess.map(function(g,i){return '<div class="letter" onclick="removeLetter('+i+')">'+g.letter+'</div>';}).join('');}
window.pickLetter=function(i){if(guess.some(function(g){return g.idx===i;}))return;guess.push({letter:letters[i],idx:i});renderLetters();renderGuess();};
window.removeLetter=function(i){guess.splice(i,1);renderLetters();renderGuess();};
window.clearGuess=function(){guess=[];renderLetters();renderGuess();};
window.submitGuess=function(){
if(guess.length<3){return;}
var word=guess.map(function(g){return g.letter;}).join('').toLowerCase();
if(found.indexOf(word)!==-1){document.getElementById('msg').textContent='Already found!';document.getElementById('msg').classList.add('show');document.getElementById('msg').style.color='#fbbf24';document.getElementById('msg').style.background='rgba(251,191,36,.1)';setTimeout(function(){document.getElementById('msg').classList.remove('show');},1500);return;}
if(VALID.indexOf(word)!==-1||word.length>=5){
found.push(word);var pts=word.length*10;score+=pts;
document.getElementById('score').textContent=score;document.getElementById('wc').textContent=found.length;
document.getElementById('found').innerHTML+=('<span class="found-word">'+word.toUpperCase()+' +'+pts+'</span>');
guess=[];renderLetters();renderGuess();
}else{
document.getElementById('msg').textContent='Not a valid word';document.getElementById('msg').classList.add('show');document.getElementById('msg').style.color='#ef4444';document.getElementById('msg').style.background='rgba(239,68,68,.1)';setTimeout(function(){document.getElementById('msg').classList.remove('show');},1500);
}
};
async function endGame(){
document.getElementById('msg').textContent='Time! Score: '+score+' ('+found.length+' words)';document.getElementById('msg').classList.add('show');document.getElementById('msg').style.color='#4ade80';document.getElementById('msg').style.background='rgba(74,222,128,.1)';
if(currentUser)try{await db.rpc('record_game_resultif(window.GameSession)GameSession.end();',{p_user_id:currentUser.id,p_game:'letterstorm',p_won:score>50,p_coins:0});}catch(e){}
}
</script></body></html>
