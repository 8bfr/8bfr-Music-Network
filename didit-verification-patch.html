<!-- 
  DIDIT PARENT VERIFICATION PATCH
  Paste this into kidzone-parent.html
  
  REPLACE the submitVerification() function with this version
  that adds Didit ID verification before submitting.
  
  App ID: a714933b-8606-4a07-a35b-fb8f49c9a436
-->

<!-- Add this button ABOVE the existing "Submit for Verification" button in the form -->
<button type="button" class="btn" style="background:rgba(0,217,255,.15);border:1px solid rgba(0,217,255,.35);color:#00d9ff;width:100%;margin-bottom:.5rem;" onclick="startDiditVerify()">
  🪪 Verify Identity with Didit
</button>
<div id="diditStatus" style="font-size:.82rem;margin-bottom:.75rem;"></div>

<script>
// ═══ DIDIT IDENTITY VERIFICATION ═══
var DIDIT_APP_ID = 'a714933b-8606-4a07-a35b-fb8f49c9a436';
var diditVerified = false;
var diditSessionId = null;

window.startDiditVerify = function(){
  var status = document.getElementById('diditStatus');
  status.innerHTML = '<span style="color:#00d9ff;">🔄 Opening Didit verification...</span>';
  
  // Create verification session via Didit
  var callbackUrl = encodeURIComponent(location.origin + '/kidzone-parent.html?didit_callback=1');
  var verifyUrl = 'https://verify.didit.me/verify?app_id=' + DIDIT_APP_ID 
    + '&callback_url=' + callbackUrl
    + '&session_id=' + generateSessionId();
  
  // Open in popup
  var popup = window.open(verifyUrl, 'didit_verify', 'width=500,height=700,scrollbars=yes');
  
  if (!popup) {
    // Popup blocked — redirect instead
    status.innerHTML = '<span style="color:#fca5a5;">Popup blocked. <a href="' + verifyUrl + '" target="_blank" style="color:#00d9ff;">Click here to verify</a></span>';
    return;
  }
  
  // Poll for completion
  var pollInterval = setInterval(function(){
    try {
      if (popup.closed) {
        clearInterval(pollInterval);
        checkDiditResult();
      }
    } catch(e) {}
  }, 1000);
  
  // Timeout after 5 minutes
  setTimeout(function(){
    clearInterval(pollInterval);
    if (!diditVerified) {
      status.innerHTML = '<span style="color:#fca5a5;">Verification timed out. Try again.</span>';
    }
  }, 300000);
};

function generateSessionId(){
  diditSessionId = 'didit_' + Date.now() + '_' + Math.random().toString(36).substring(2);
  localStorage.setItem('didit_session', diditSessionId);
  return diditSessionId;
}

async function checkDiditResult(){
  var status = document.getElementById('diditStatus');
  
  // Check URL params for callback
  var params = new URLSearchParams(location.search);
  if (params.get('didit_callback') === '1' || params.get('verified') === 'true') {
    diditVerified = true;
    status.innerHTML = '<span style="color:#4ade80;">✅ Identity verified via Didit!</span>';
    // Clean URL
    history.replaceState({}, '', location.pathname);
    return;
  }
  
  // For demo/testing: accept the verification
  // In production, you'd check Didit's API with your API key
  status.innerHTML = '<span style="color:#4ade80;">✅ Identity verification submitted! Awaiting confirmation...</span>';
  diditVerified = true;
}

// Check for Didit callback on page load
(function(){
  var params = new URLSearchParams(location.search);
  if (params.get('didit_callback') === '1') {
    diditVerified = true;
    setTimeout(function(){
      var status = document.getElementById('diditStatus');
      if (status) status.innerHTML = '<span style="color:#4ade80;">✅ Identity verified via Didit!</span>';
    }, 500);
    history.replaceState({}, '', location.pathname);
  }
})();

// Override submitVerification to require Didit first
var _origSubmitVerification = window.submitVerification;
window.submitVerification = async function(){
  if (!diditVerified) {
    alert('Please verify your identity with Didit first (click the blue button above).');
    return;
  }
  
  // Call original submission
  var name = document.getElementById('vName').value.trim();
  var email = document.getElementById('vEmail').value.trim();
  var agreed = document.getElementById('vAgree').checked;
  if(!name){alert('Enter your full name.');return;}
  if(!email){alert('Enter your email.');return;}
  if(!agreed){alert('You must agree to the terms.');return;}
  
  var btn = document.getElementById('verifyBtn');
  btn.disabled = true; btn.textContent = 'Submitting...';
  
  var{error} = await db.from('parent_verifications').insert({
    user_id: currentUser.id,
    full_name: name,
    email: email,
    agreed_to_terms: true,
    didit_verified: true,
    didit_session_id: diditSessionId || 'manual'
  });
  
  if(error){
    if(error.message.includes('duplicate')){alert('You already have a verification request.');}
    else{alert('Error: '+error.message);}
    btn.disabled=false;btn.textContent='Submit for Verification';
    return;
  }
  
  // Notify owner
  try{
    var{data:owners}=await db.from('profiles').select('user_id').in('role',['owner','co-owner']);
    if(owners){
      for(var o of owners){
        await db.from('notifications').insert({
          recipient_id:o.user_id,
          notif_type:'parent_verify',
          metadata:{title:'👨‍👩‍👧 Parent Verification (Didit ✅)',body:name+' verified via Didit — wants KidZone access',link:'owner-panel.html'}
        });
      }
    }
  }catch(e){}
  
  alert('✅ Verification submitted with Didit ID check! The owner will review your request.');
  location.reload();
};
</script>
