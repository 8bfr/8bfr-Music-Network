<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌟 Creators — KidZone</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--kp:#8b5cf6;--pink:#ec4899;--green:#22c55e;--yellow:#eab308;--card:rgba(15,10,35,.85);--text:#f0eaff;--dim:rgba(168,130,255,.7);--border:rgba(139,92,246,.3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(135deg,#0f0a1a,#1a0533);color:var(--text);min-height:100vh;padding-bottom:90px;}
.kz-header{background:linear-gradient(135deg,rgba(139,92,246,.25),rgba(234,179,8,.15));border-bottom:2px solid var(--yellow);padding:.75rem 1.25rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.kz-header h1{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--yellow);}
.container{max-width:600px;margin:0 auto;padding:1.25rem;}
.section-title{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--kp);margin:1rem 0 .75rem;}
.creator-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1.5rem;}
.creator-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;text-align:center;transition:all .25s;}
.creator-card:hover{border-color:var(--yellow);transform:translateY(-2px);box-shadow:0 4px 20px rgba(234,179,8,.15);}
.creator-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,rgba(139,92,246,.3),rgba(236,72,153,.2));display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto .5rem;overflow:hidden;}
.creator-avatar img{width:100%;height:100%;object-fit:cover;}
.creator-name{font-weight:700;font-size:.95rem;}
.creator-badge{font-size:.75rem;color:var(--dim);margin-top:.15rem;}
.creator-stat{font-size:.78rem;color:rgba(234,179,8,.7);margin-top:.3rem;}
.empty{text-align:center;padding:2.5rem 1rem;color:rgba(168,130,255,.4);}
.spinner{width:28px;height:28px;border:3px solid rgba(139,92,246,.2);border-top-color:#a855f7;border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;}
@keyframes spin{to{transform:rotate(360deg);}}
#kidNav{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(15,10,35,.97);border-top:2px solid var(--kp);display:flex;justify-content:space-around;padding:.4rem 0;backdrop-filter:blur(12px);}
#kidNav a{text-decoration:none;color:rgba(168,130,255,.5);font-size:.65rem;font-weight:600;text-align:center;padding:.3rem .1rem;display:flex;flex-direction:column;align-items:center;gap:.15rem;}
#kidNav a.active{color:var(--kp);}
.nav-icon{font-size:1.15rem;}
#kidMascot{position:fixed;bottom:80px;right:12px;z-index:160;font-size:2rem;cursor:pointer;animation:float 3s ease-in-out infinite;}
#kidMascotBubble{display:none;position:fixed;bottom:120px;right:12px;z-index:160;background:rgba(139,92,246,.95);color:white;padding:.6rem 1rem;border-radius:14px 14px 4px 14px;font-size:.82rem;font-weight:600;max-width:200px;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
</style>
</head>
<body>
<div class="kz-header">
<h1>🌟 Kid Creators</h1>
<a href="kid-zone.html" style="color:var(--dim);text-decoration:none;font-size:.82rem;font-weight:600;">← KidZone</a>
</div>

<div class="container">
<div class="section-title">⭐ Featured Creators</div>
<div id="loading"><div class="spinner"></div></div>
<div id="creatorGrid" class="creator-grid"></div>
<div id="emptyState" class="empty" style="display:none;">
<div style="font-size:2.5rem;margin-bottom:.5rem;">🌟</div>
<p>No kid creators yet!</p>
<p style="font-size:.82rem;margin-top:.25rem;">Be the first to create something in the <a href="kidzone-studio.html" style="color:var(--kp);">Studio</a>!</p>
</div>
</div>

<div id="kidNav">
<a href="kid-zone.html"><span class="nav-icon">🏠</span>Home</a>
<a href="kidzone-creators.html"><span class="nav-icon">🌟</span>Creators</a>
<a href="kidzone-studio.html"><span class="nav-icon">🎹</span>Studio</a>
<a href="kidzone-challenges.html"><span class="nav-icon">🏆</span>Challenges</a>
<a href="kidzone-games.html"><span class="nav-icon">🎮</span>Games</a>
<a href="kidzone-rewards.html"><span class="nav-icon">🎁</span>Rewards</a>
<a href="kidzone-parent.html"><span class="nav-icon">👨‍👩‍👧</span>Parent</a>
</div>
<div id="kidMascot" onclick="toggleMascotBubble()">🤖</div>
<div id="kidMascotBubble"></div>

<script src="scripts.js" defer></script>
<script>
(function(){
  var db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');

  async function load(){
    var res=await db.from('kid_profiles').select('*,profiles(display_name,avatar_url)').order('xp',{ascending:false}).limit(20);
    document.getElementById('loading').style.display='none';
    var kids=res.data||[];
    if(!kids.length){document.getElementById('emptyState').style.display='block';return;}
    var html='';
    kids.forEach(function(k){
      var name=k.kid_display_name||(k.profiles?k.profiles.display_name:'Kid Creator');
      var avatar=k.profiles&&k.profiles.avatar_url?'<img src="'+k.profiles.avatar_url+'" onerror="this.parentElement.textContent=\'🧒\'">':'🧒';
      html+='<div class="creator-card"><div class="creator-avatar">'+avatar+'</div><div class="creator-name">'+name+'</div><div class="creator-badge">⭐ '+(k.xp||0)+' XP</div><div class="creator-stat">🪙 '+(k.coins||0)+' coins · 🎵 '+(k.songs_count||0)+' songs</div></div>';
    });
    document.getElementById('creatorGrid').innerHTML=html;
  }
  load();
})();

var _kzTips=["🌟 You could be featured here!","🎵 Create music to level up!","🏆 Complete challenges for XP!"];
var _kzBO=false;function toggleMascotBubble(){var b=document.getElementById("kidMascotBubble");_kzBO=!_kzBO;if(_kzBO){b.textContent=_kzTips[Math.floor(Math.random()*_kzTips.length)];b.style.display="block";setTimeout(function(){b.style.display="none";_kzBO=false;},4000);}else b.style.display="none";}
setTimeout(function(){var b=document.getElementById("kidMascotBubble");b.textContent=_kzTips[Math.floor(Math.random()*_kzTips.length)];b.style.display="block";setTimeout(function(){b.style.display="none";},5000);},3000);
</script>

<script src="kidzone-menu.js" defer></script>
</body>
</html>
