<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kid Creators — KidZone</title>
<link rel="icon" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Work+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--kp:#8b5cf6;--pink:#ec4899;--blue:#3b82f6;--green:#22c55e;--yellow:#eab308;--bg:#0f0a1a;--card:rgba(15,10,35,.85);--text:#f0eaff;--dim:rgba(168,130,255,.7);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Work Sans',sans-serif;background:linear-gradient(135deg,#0f0a1a,#1a0533);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:linear-gradient(135deg,rgba(139,92,246,.2),rgba(236,72,153,.15));border-bottom:3px solid var(--kp);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.header h1{font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--kp);}
.header a{color:var(--text);text-decoration:none;font-weight:600;font-size:.85rem;}
.container{max-width:900px;margin:0 auto;padding:1.5rem;}
.search-bar{margin-bottom:1.25rem;}
.search-bar input{width:100%;padding:.6rem 1rem;background:rgba(0,0,0,.3);border:1px solid rgba(139,92,246,.3);border-radius:10px;color:var(--text);font-size:.9rem;}
.search-bar input:focus{outline:none;border-color:var(--kp);}
.creators-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;}
.creator-card{background:var(--card);border:2px solid rgba(139,92,246,.2);border-radius:16px;padding:1.25rem .75rem;text-align:center;transition:all .3s;cursor:pointer;}
.creator-card:hover{transform:translateY(-3px);border-color:var(--kp);box-shadow:0 6px 20px rgba(139,92,246,.25);}
.cc-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--kp),var(--pink));display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto .5rem;border:3px solid var(--yellow);overflow:hidden;}
.cc-avatar img{width:100%;height:100%;object-fit:cover;}
.cc-name{font-family:'Fredoka One',cursive;font-size:1rem;margin-bottom:.15rem;}
.cc-level{font-size:.72rem;color:var(--yellow);margin-bottom:.4rem;}
.cc-stats{display:flex;justify-content:center;gap:.6rem;font-size:.7rem;color:var(--dim);}
.cc-badges{display:flex;justify-content:center;gap:.25rem;flex-wrap:wrap;margin-top:.4rem;}
.cc-badge{font-size:.6rem;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);padding:.1rem .35rem;border-radius:4px;color:var(--kp);}
.section-title{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--kp);margin:1.5rem 0 .75rem;display:flex;align-items:center;gap:.5rem;}
.empty{text-align:center;padding:2rem;color:var(--dim);}
</style>
</head>
<body>
<div class="header"><a href="kid-zone.html">← KidZone</a><h1>🌟 Kid Creators</h1><div></div></div>
<div class="container">
<div class="search-bar"><input type="text" id="searchKids" placeholder="🔍 Search creators..." oninput="filterCreators(this.value)"></div>
<div class="section-title">🏆 Top Creators</div>
<div class="creators-grid" id="topCreators"></div>
<div class="section-title">🆕 New Creators</div>
<div class="creators-grid" id="newCreators"></div>
</div>
<script src="scripts.js" defer></script>
<script>
const db=window.supabase.createClient('https://novbuvwpjnxwwvdekjhr.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vdmJ1dndwam54d3d2ZGVramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExODkxODUsImV4cCI6MjA3Njc2NTE4NX0.1UUkdGafh6ZplAX8hi7Bvj94D2gvFQZUl0an1RvcSA0');
let allKids=[];
async function init(){
  const{data:{session}}=await db.auth.getSession();
  if(!session){location.href='login.html?return=kidzone-creators.html';return;}
  const{data:top}=await db.from('kid_profiles').select('*').eq('is_active',true).order('xp',{ascending:false}).limit(12);
  const{data:recent}=await db.from('kid_profiles').select('*').eq('is_active',true).order('created_at',{ascending:false}).limit(12);
  allKids=[...(top||[]),...(recent||[])];
  render(document.getElementById('topCreators'),top||[]);
  render(document.getElementById('newCreators'),recent||[]);
}
function render(el,kids){
  if(!kids.length){el.innerHTML='<div class="empty">No creators yet — be the first!</div>';return;}
  el.innerHTML=kids.map(k=>{
    const badges=(k.badges||[]).slice(0,3).map(b=>'<span class="cc-badge">'+esc(b)+'</span>').join('');
    return '<div class="creator-card"><div class="cc-avatar">'+(k.avatar_url?'<img src="'+esc(k.avatar_url)+'">':'🧒')+'</div><div class="cc-name">'+esc(k.display_name)+'</div><div class="cc-level">'+esc(k.level||'Beginner')+'</div><div class="cc-stats"><span>🪙 '+k.kidcoins+'</span><span>🎵 '+k.songs_uploaded+'</span><span>⭐ '+k.xp+'</span></div><div class="cc-badges">'+badges+'</div></div>';
  }).join('');
}
function filterCreators(q){
  const lower=q.toLowerCase();
  const filtered=allKids.filter(k=>(k.display_name||'').toLowerCase().includes(lower)||(k.username||'').toLowerCase().includes(lower));
  render(document.getElementById('topCreators'),filtered);
  document.getElementById('newCreators').innerHTML='';
}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
<script>(function(){var b=document.createElement('button');b.innerHTML='👁️';b.style.cssText='position:fixed;top:80px;right:20px;z-index:9999;background:rgba(124,58,237,0.9);border:2px solid rgba(124,58,237,1);color:white;width:50px;height:50px;border-radius:50%;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(124,58,237,0.5);';document.body.appendChild(b);var h=localStorage.getItem('hideAvatarBubbles')==='true';function u(){document.querySelectorAll('[id*="bubble"],[class*="bubble"],[id*="avatar"][id*="switcher"]').forEach(function(el){if(el)el.style.display=h?'none':'';});b.innerHTML=h?'👁️‍🗨️':'👁️';}b.addEventListener('click',function(){h=!h;localStorage.setItem('hideAvatarBubbles',h);u();});u();})();</script>
</body></html>
